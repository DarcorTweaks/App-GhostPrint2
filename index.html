<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostPrint ERP v8.5 - Control Administrativo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #0d0d1a; color: #e2e8f0; font-family: ui-sans-serif, system-ui; padding-bottom: 96px; }
        .btn { background: #6d28d9; color: white; padding: 10px; border-radius: 12px; cursor: pointer; font-weight: 700; border: none; font-size: 10px; text-transform: uppercase; transition: 0.2s; }
        .btn:active { transform: scale(0.95); opacity: 0.8; }
        .card { background: rgba(255, 255, 255, 0.95); padding: 18px; margin: 12px 0; border-radius: 20px; color: #1e293b; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        input, select { border: 1px solid #e2e8f0; padding: 12px; margin: 8px 0; border-radius: 12px; width: 100%; background: #f8fafc; color: #1e293b; font-weight: 600; }
        label { font-size: 9px; font-weight: 900; text-transform: uppercase; color: #64748b; margin-left: 4px; }
        header { background: linear-gradient(to right, #4c1d95, #000); color: white; padding: 16px; position: sticky; top: 0; z-index: 50; }
        nav { padding: 8px; display: flex; gap: 8px; overflow-x: auto; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(10px); position: sticky; top: 68px; z-index: 40; }
        .badge-cliente { background: #f1f5f9; border-left: 4px solid #6d28d9; padding: 10px; margin-bottom: 10px; border-radius: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <h1 class="text-xl font-black uppercase text-purple-400 italic">GhostPrint ERP v8.5</h1>
    <p id="sync-status" class="text-[9px] font-bold text-amber-400 uppercase italic">Conectado a la Nube</p>
</header>

<nav>
    <button onclick="setView('dashboard')" class="btn">🏠 Dashboard</button>
    <button onclick="setView('ventas')" class="btn !bg-green-600">💵 Vender</button>
    <button onclick="setView('compras')" class="btn !bg-blue-600">📦 Compras</button>
    <button onclick="setView('gastos')" class="btn !bg-red-600">📉 Gastos</button>
    <button onclick="setView('reportes')" class="btn !bg-indigo-600">📊 Reportes</button>
    <button onclick="setView('cobranzas')" class="btn !bg-amber-500">⏳ Cobros</button>
    <button onclick="setView('config')" class="btn !bg-slate-700">⚙️ Catálogo</button>
</nav>

<div id="app" class="p-4 max-w-4xl mx-auto"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI",
    authDomain: "ghost-print-contabilidad.firebaseapp.com",
    projectId: "ghost-print-contabilidad",
    storageBucket: "ghost-print-contabilidad.firebasestorage.app",
    messagingSenderId: "867057362556",
    appId: "1:867057362556:web:6bd2a461817219a4000bf9"
};

const appF = initializeApp(firebaseConfig);
const db = getFirestore(appF);
const docRef = doc(db, "sistema", "datos_principales");

window.state = { ventas: [], gastos: [], inventario: {}, serviciosExtra: [], comprasInversion: [] };
window.view = "dashboard";
window.selectedDate = new Date().toISOString().split('T')[0];
let carritoVenta = [];

window.save = async () => { await setDoc(docRef, window.state); };
window.setView = (v) => { window.view = v; render(); };

onSnapshot(docRef, (snap) => {
    if (snap.exists()) { 
        window.state = snap.data();
        document.getElementById("sync-status").innerText = "Sincronizado ✓"; 
        render();
    }
});

window.render = function() {
    let app = document.getElementById("app");
    if(!app) return;
    let html = "";

    // Lógica de fechas (Filtrado Administrativo)
    const filtrarPorFecha = (lista) => (lista || []).filter(item => {
        const itemDate = new Date(item.id).toISOString().split('T')[0];
        return itemDate === window.selectedDate;
    });

    if(window.view === "dashboard"){
        let totalV = (window.state.ventas || []).reduce((a,b)=>a+b.total,0);
        let totalG = (window.state.gastos || []).reduce((a,b)=>a+b.amount,0);
        let dineroC = (window.state.ventas || []).reduce((a,b)=>a+(b.abonado || 0), 0);
        html = `
        <div class="grid grid-cols-2 gap-3 mb-3 text-white">
            <div class="card !m-0 bg-green-600 p-4"><b>Caja Real: $${dineroC.toFixed(2)}</b></div>
            <div class="card !m-0 bg-amber-500 p-4"><b>Cuentas x Cobrar: $${(totalV - dineroC).toFixed(2)}</b></div>
        </div>
        <div class="card !m-0 mb-4 bg-slate-900 border-l-8 border-purple-500 p-4 text-white">
            <h2 class="text-3xl font-black italic">$${(totalV - totalG).toFixed(2)}</h2>
            <p class="text-purple-400 text-[9px] font-black uppercase">Utilidad Histórica Total</p>
        </div>
        <div class="card"><canvas id="chartDash" height="180"></canvas></div>`;
        setTimeout(() => initDashChart(totalV, totalG, dineroC), 100);
    }

    if(window.view === "ventas"){
        html = `<div class="card"><h2 class="font-black mb-4 uppercase text-purple-700 italic text-sm border-b pb-2">Nueva Orden de Venta</h2>
            <div class="grid grid-cols-2 gap-2">
                <div><label>Nombre del Cliente</label><input id="cliV" placeholder="NOMBRE" oninput="renderCarritoInner()"></div>
                <div><label>WhatsApp</label><input id="telV" type="number" placeholder="412..." oninput="renderCarritoInner()"></div>
            </div>
            <div class="grid grid-cols-2 gap-2 mt-2">
                <select id="pSel"><option value="">- Material -</option>${Object.keys(window.state.inventario).map(p=>`<option value="${p}">${p}</option>`).join("")}</select>
                <select id="sSel"><option value="">- Servicio -</option>${(window.state.serviciosExtra || []).map(s=>`<option value="${s}">${s}</option>`).join("")}</select>
            </div>
            <label>Tipo de Venta</label>
            <select id="tCli" onchange="toggleLibre()"><option value="detal">DETAL ($9 m²)</option><option value="mayor">MAYOR ($10 ML)</option><option value="libre">LIBRE (Personalizado)</option></select>
            <div id="divLibre" class="hidden"><input id="pLibre" type="number" step="0.01" placeholder="Precio $"></div>
            <div class="grid grid-cols-2 gap-2 items-end">
                <div><label>Metros / Cantidad</label><input id="cQty" type="number" value="1" step="0.01"></div>
                <button onclick="addItemCarrito()" class="btn !bg-blue-600 mb-[8px] h-[46px]">+ Cargar al Carrito</button>
            </div>
            <div id="listaCarrito" class="mt-4 border-t-2 border-dashed pt-4"></div>
            <div id="totalVenta" class="p-4 bg-slate-800 text-white text-center font-black mt-2 rounded-xl text-2xl italic uppercase">Total: $0.00</div>
            <button onclick="procesarV()" class="btn w-full bg-green-600 mt-4 py-4 font-black text-sm">FINALIZAR VENTA</button></div>`;
        setTimeout(() => renderCarritoInner(), 10);
    }

    if(window.view === "compras"){
        html = `<div class="card border-l-4 border-blue-600"><h3 class="font-black text-[10px] uppercase mb-2 italic">Mis Compras de Material (Inversión)</h3>
            <label>Seleccionar Material</label><select id="mCom">${Object.keys(window.state.inventario).map(p=>`<option value="${p}">${p}</option>`).join("")}</select>
            <div class="grid grid-cols-2 gap-2">
                <div><label>Cantidad (Metros)</label><input id="qCom" type="number" placeholder="0.00"></div>
                <div><label>Inversión Total $</label><input id="vCom" type="number" placeholder="0.00"></div>
            </div>
            <button onclick="regCom()" class="btn w-full bg-blue-700 mt-2 py-3 italic">Cargar Entrada de Almacén</button></div>
            <div class="grid grid-cols-2 gap-2 mt-4">${Object.entries(window.state.inventario).map(([n,i])=>`
                <div class="bg-white p-3 rounded-xl border text-center shadow-sm relative">
                    <b class="text-[9px] text-slate-500 uppercase">${n}</b><br>
                    <span class="text-blue-700 font-black text-xl">${(i.stock || 0).toFixed(2)}</span><br>
                    <p class="text-[8px] font-bold text-slate-400 italic">Costo Actual: $${(i.costoMetro || 0).toFixed(2)}/m</p>
                    <button onclick="ajustarManual('${n}')" class="text-blue-500 text-[9px] font-bold mt-1 uppercase underline">Ajustar Stock</button>
                </div>`).join("")}</div>`;
    }

    if(window.view === "gastos"){
        html = `<div class="card"><h2 class="font-black text-[10px] uppercase mb-2 text-red-600 italic">Mis Gastos Operativos (Fijos/Variables)</h2>
            <input id="gNom" placeholder="Ej: Pago de Local, Comida, Luz"><input id="gMon" type="number" placeholder="Monto Total $"><button onclick="regG()" class="btn w-full bg-red-600 mt-2 italic font-black">Registrar Gasto del Día</button></div>
            ${(window.state.gastos || []).slice().reverse().map(g=>`<div class="card flex justify-between py-2 border-l-4 border-red-500 font-bold uppercase text-xs"><div>${g.name}<br><small class="text-slate-400 font-normal">${new Date(g.id).toLocaleDateString()}</small><br><b>$${g.amount.toFixed(2)}</b></div><button onclick="borrarG(${g.id})" class="text-red-500 px-2 font-black text-lg">×</button></div>`).join("")}`;
    }

    if(window.view === "reportes"){
        const vD = filtrarPorFecha(window.state.ventas);
        const gD = filtrarPorFecha(window.state.gastos);
        const iD = filtrarPorFecha(window.state.comprasInversion);
        
        let tV = vD.reduce((a,b)=>a+b.total, 0);
        let tG = gD.reduce((a,b)=>a+b.amount, 0);
        let tI = iD.reduce((a,b)=>a+b.amount, 0);

        html = `<div class="card"><label class="text-purple-700">Seleccionar Fecha para Reporte Administrativo</label><input type="date" id="reportDate" value="${window.selectedDate}" onchange="cambiarFecha(this.value)"></div>
        <div class="grid grid-cols-3 gap-2">
            <div class="card text-center !m-0 p-2"><p class="text-[8px] uppercase">Ventas Brutas</p><b class="text-green-600">$${tV.toFixed(2)}</b></div>
            <div class="card text-center !m-0 p-2"><p class="text-[8px] uppercase">Gastos Op.</p><b class="text-red-600">$${tG.toFixed(2)}</b></div>
            <div class="card text-center !m-0 p-2"><p class="text-[8px] uppercase">Material Adq.</p><b class="text-blue-600">$${tI.toFixed(2)}</b></div>
        </div>
        <div class="card bg-slate-900 text-white mt-4 border-l-4 border-green-500"><h3 class="font-black text-xs uppercase italic">Utilidad Neta del Día: $${(tV-tG).toFixed(2)}</h3><p class="text-[8px] opacity-60">Ventas totales menos gastos operativos de la fecha seleccionada.</p></div>
        <div class="mt-4"><h4 class="text-[10px] font-black uppercase mb-2">Detalle de Ventas del Día</h4>
        ${vD.map(v=>`<div class="bg-white p-2 rounded mb-1 text-[9px] flex justify-between text-slate-800"><b>${v.cliente}</b><span>$${v.total.toFixed(2)}</span></div>`).join("")}</div>`;
    }

    if(window.view === "cobranzas"){
        html = (window.state.ventas || []).filter(v=>!v.pagado).sort((a,b)=>b.id-a.id).map(v=>`
            <div class="card flex justify-between items-center border-l-4 border-amber-500">
                <div><b class="text-xs uppercase">${v.cliente}</b><br><small class="text-red-600 font-bold italic">Resta: $${(v.total-(v.abonado||0)).toFixed(2)}</small></div>
                <div class="flex gap-2">
                    <button onclick="enviarWS(${v.id})" class="bg-green-600 text-white p-2 px-3 rounded-lg font-bold text-[9px]">WS</button>
                    <button onclick="abonarV(${v.id})" class="bg-blue-600 text-white p-2 px-3 rounded-lg font-bold text-[9px]">ABONAR</button>
                </div>
            </div>`).join("") || '<div class="card text-center italic opacity-50 uppercase text-[10px]">Sin cuentas pendientes</div>';
    }

    if(window.view === "config"){
        html = `<div class="card"><h2 class="font-black uppercase text-[10px] mb-2">Añadir Material al Catálogo</h2><input id="nP" placeholder="EJ: LONA FRONT"><button onclick="addC('p')" class="btn bg-blue-600 w-full font-black">Guardar en Base de Datos</button></div>
                <div class="card"><h2 class="font-black uppercase text-[10px] mb-2 text-purple-700">Añadir Servicio al Catálogo</h2><input id="nS" placeholder="EJ: VECTORIZACIÓN"><button onclick="addC('s')" class="btn bg-purple-600 w-full font-black">Guardar en Base de Datos</button></div>
                <div class="card"><h2 class="font-black uppercase text-[10px] border-b pb-2 mb-2 italic">Mis Materiales</h2>
                ${Object.keys(window.state.inventario).map(n => `<div class="flex justify-between py-2 border-b text-xs uppercase font-bold text-slate-600"><span>${n}</span><button onclick="borrarItemX('p','${n}')" class="text-red-500 text-lg">×</button></div>`).join("")}
                <h2 class="font-black uppercase text-[10px] border-b pb-2 mt-4 mb-2 text-purple-700 italic">Mis Servicios</h2>
                ${(window.state.serviciosExtra || []).map((s, idx) => `<div class="flex justify-between py-2 border-b text-xs uppercase font-bold text-slate-600"><span>${s}</span><button onclick="borrarItemX('s',${idx})" class="text-red-500 text-lg">×</button></div>`).join("")}</div>`;
    }

    app.innerHTML = html;
};

// --- FUNCIONES ADMINISTRATIVAS ---
window.cambiarFecha = (val) => { window.selectedDate = val; render(); };
window.toggleLibre = () => { document.getElementById("divLibre").classList.toggle("hidden", document.getElementById("tCli").value !== "libre"); };

window.addItemCarrito = () => {
    let p = document.getElementById("pSel").value, s = document.getElementById("sSel").value, t = document.getElementById("tCli").value, c = parseFloat(document.getElementById("cQty").value) || 0;
    if(!p && !s) return;
    let pre = (t === "detal") ? 9 : (t === "mayor") ? 10 : parseFloat(document.getElementById("pLibre").value) || 0;
    carritoVenta.push({ nombre: ((p && s) ? `${p} + ${s}` : (p || s)).toUpperCase(), qty: c, sub: c * pre, esProd: !!p, prodKey: p });
    renderCarritoInner();
};

window.renderCarritoInner = () => {
    let div = document.getElementById("listaCarrito"), totalDiv = document.getElementById("totalVenta");
    if(!div) return;
    let cli = document.getElementById("cliV")?.value.toUpperCase() || "SIN NOMBRE";
    let tel = document.getElementById("telV")?.value || "N/A";
    let head = `<div class="badge-cliente"><b class="text-purple-700 text-[11px] uppercase italic">CLIENTE: ${cli}</b><br><small class="text-slate-500 font-bold">WHATSAPP: ${tel}</small></div>`;
    let items = carritoVenta.map((v,i)=>`<div class="flex justify-between py-2 border-b text-[11px] uppercase font-bold items-center"><span>${v.qty} ${v.nombre}</span><div class="flex gap-3"><b>$${v.sub.toFixed(2)}</b><button onclick="removeItemCarrito(${i})" class="text-red-500 text-lg font-black">×</button></div></div>`).join("");
    div.innerHTML = head + (items || '<p class="text-center opacity-40 italic py-4">Carrito vacío</p>');
    totalDiv.innerText = `TOTAL: $${carritoVenta.reduce((a,b)=>a+b.sub,0).toFixed(2)}`;
};

window.removeItemCarrito = (i) => { carritoVenta.splice(i, 1); renderCarritoInner(); };

window.procesarV = async () => {
    let cli = document.getElementById("cliV").value.toUpperCase();
    if(!cli || carritoVenta.length === 0) return alert("Faltan datos");
    carritoVenta.forEach(i => { if (i.esProd && window.state.inventario[i.prodKey]) window.state.inventario[i.prodKey].stock -= i.qty; });
    window.state.ventas.push({id: Date.now(), cliente: cli, telefono: document.getElementById("telV").value, total: carritoVenta.reduce((a,b)=>a+b.sub, 0), abonado: 0, pagado: false, items: [...carritoVenta]});
    await window.save(); carritoVenta = []; setView('cobranzas');
};

window.regCom = async () => {
    let m = document.getElementById("mCom").value, q = parseFloat(document.getElementById("qCom").value), v = parseFloat(document.getElementById("vCom").value);
    if(q > 0) { 
        window.state.inventario[m].stock += q; 
        window.state.inventario[m].costoMetro = v / q;
        if(!window.state.comprasInversion) window.state.comprasInversion = [];
        window.state.comprasInversion.push({id: Date.now(), name: m, amount: v}); 
        await window.save(); render(); 
    }
};

window.regG = async () => {
    let n = document.getElementById("gNom").value, m = parseFloat(document.getElementById("gMon").value);
    if(n && m) { window.state.gastos.push({id: Date.now(), name: n.toUpperCase(), amount: m}); await window.save(); render(); }
};

window.addC = async (t) => {
    if(t==='p'){ let n=document.getElementById("nP").value.toUpperCase(); if(n) window.state.inventario[n]={stock:0, costoMetro:0}; }
    else { let n=document.getElementById("nS").value.toUpperCase(); if(n) window.state.serviciosExtra.push(n); }
    await window.save(); render();
};

window.ajustarManual = async (name) => {
    let n = parseFloat(prompt(`Ajustar Stock Manual de ${name}:`, window.state.inventario[name].stock));
    if(!isNaN(n)) { window.state.inventario[name].stock = n; await window.save(); render(); }
};

window.borrarItemX = async (type, key) => {
    if(confirm(`¿Eliminar ${key}?`)) {
        if(type==='p') delete window.state.inventario[key];
        else window.state.serviciosExtra.splice(key,1);
        await window.save(); render();
    }
};

window.abonarV = async (id) => { let v = window.state.ventas.find(x=>x.id===id), m = parseFloat(prompt("¿Monto a abonar?")); if(m){ v.abonado += m; if(v.abonado >= v.total) v.pagado = true; await window.save(); render(); } };
window.borrarG = async (id) => { if(confirm("¿Eliminar gasto?")){ window.state.gastos=window.state.gastos.filter(x=>x.id!==id); await window.save(); render(); } };
window.enviarWS = (id) => {
    let v = window.state.ventas.find(x => x.id === id);
    let msg = `Hola ${v.cliente}, pendiente de GhostPrint: *$${(v.total-(v.abonado||0)).toFixed(2)}*.`;
    window.open(`https://api.whatsapp.com/send?phone=${v.telefono}&text=${encodeURIComponent(msg)}`, '_blank');
};

window.initDashChart = (v, g, c) => {
    new Chart(document.getElementById('chartDash'), { type: 'bar', data: { labels: ['Ventas', 'Gastos', 'Caja'], datasets: [{ data: [v, g, c], backgroundColor: ['#6d28d9', '#ef4444', '#22c55e'], borderRadius: 10 }] }, options: { plugins: { legend: { display: false } } } });
};

render();
</script>
</body>
</html>
