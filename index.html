<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GhostPrint PRO v22 FIX</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { background-color: #030308; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .card-pro { background: #111122; border: 1px solid #2d2d44; border-radius: 20px; padding: 18px; margin-bottom: 12px; }
        nav { background: rgba(10, 10, 20, 0.95); display: flex; gap: 8px; overflow-x: auto; padding: 14px; position: sticky; top: 0; }
        .btn-nav { background: #1e1e30; color: #64748b; padding: 12px 18px; border-radius: 14px; font-size: 10px; font-weight: 800; cursor: pointer; }
        .active { background: #7c3aed !important; color: white !important; }
        input, select { background: #070712; border: 1px solid #334155; color: white; padding: 14px; border-radius: 14px; width: 100%; margin: 6px 0; }
        .btn-main { background: linear-gradient(135deg, #7c3aed, #4c1d95); color: white; padding: 16px; border-radius: 16px; width: 100%; font-weight: 900; }
    </style>
</head>

<body>

<nav>
    <div onclick="setView('inicio')" class="btn-nav active" id="n-inicio">ADMIN</div>
    <div onclick="setView('ventas')" class="btn-nav" id="n-ventas">VENTAS</div>
    <div onclick="setView('gastos')" class="btn-nav" id="n-gastos">GASTOS</div>
    <div onclick="setView('compras')" class="btn-nav" id="n-compras">COMPRAS</div>
    <div onclick="setView('inventario')" class="btn-nav" id="n-inventario">STOCK</div>
</nav>

<div id="app" class="p-4 max-w-2xl mx-auto"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

// 🔥 FIREBASE
const firebaseConfig = {
apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI",
authDomain: "ghost-print-contabilidad.firebaseapp.com",
projectId: "ghost-print-contabilidad"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const docRef = db.collection("sistema").doc("datos_principales");

// 🔥 STATE
window.state = JSON.parse(localStorage.getItem('gp_v21_4')) || {
ventas: [],
gastos: [],
inventario: {},
serviciosExtra: ["DISEÑO","MONTAJE"],
comprasInversion: []
};

// 🔥 SYNC
window.sync = async function(){
localStorage.setItem('gp_v21_4', JSON.stringify(window.state));
await docRef.set(window.state);
};

docRef.onSnapshot(doc=>{
if(doc.exists){
const d = doc.data();
window.state = {
ventas: d.ventas || [],
gastos: d.gastos || [],
inventario: d.inventario || {},
serviciosExtra: d.serviciosExtra || [],
comprasInversion: d.comprasInversion || []
};
render();
}
});

// 🔥 VIEW
window.setView = function(v){
window.currentView = v;
document.querySelectorAll('.btn-nav').forEach(b=>b.classList.remove('active'));
document.getElementById('n-'+v).classList.add('active');
render();
};

// 🔥 ADMIN LOGICA CORRECTA
function calcular(vM, gM){

const totalVendido = vM.reduce((a,b)=>a + Number(b.total),0);

const totalCobrado = vM.reduce((a,b)=>{
return a + (b.abonado !== undefined ? Number(b.abonado) : (b.pagado ? Number(b.total) : 0));
},0);

const totalDeuda = vM.filter(v=>!v.pagado)
.reduce((a,b)=>a + (b.total - (b.abonado||0)),0);

const totalGastos = gM.reduce((a,b)=>a + Number(b.amount),0);

// 🔥 COSTO REAL
const costoProduccion = vM.reduce((a,b)=>a + (b.costoMaterial || 0),0);

// 💰 CAJA
const caja = totalCobrado - totalGastos;

// 📈 GANANCIA
const ganancia = totalCobrado - costoProduccion - totalGastos;

// 🔮 PROYECCION
const proyeccion = totalVendido - costoProduccion - totalGastos;

return {caja,ganancia,proyeccion,totalDeuda,totalVendido};
}

// 🔥 RENDER
window.render = function(){

const app = document.getElementById("app");
const vM = window.state.ventas || [];
const gM = window.state.gastos || [];

const d = calcular(vM, gM);

// ADMIN
if(window.currentView === "inicio"){
app.innerHTML = `
<div class="card-pro text-center">
<h2 class="text-4xl font-black">$${d.caja.toFixed(2)}</h2>
<p>CAJA REAL</p>
</div>

<div class="grid grid-cols-2 gap-2">
<div class="card-pro">GANANCIA<br><b>$${d.ganancia.toFixed(2)}</b></div>
<div class="card-pro">PROYECCIÓN<br><b>$${d.proyeccion.toFixed(2)}</b></div>
<div class="card-pro">VENTAS<br><b>$${d.totalVendido.toFixed(2)}</b></div>
<div class="card-pro">DEUDA<br><b>$${d.totalDeuda.toFixed(2)}</b></div>
</div>
`;
}

// COMPRAS
if(window.currentView === "compras"){
app.innerHTML = `
<div class="card-pro">
<input id="mInv" placeholder="Material">
<input id="qInv" type="number" placeholder="Cantidad">
<input id="pInv" type="number" placeholder="Costo Total">
<button onclick="saveInv()" class="btn-main">GUARDAR</button>
</div>
`;
}

// INVENTARIO
if(window.currentView === "inventario"){
app.innerHTML = Object.entries(window.state.inventario || {}).map(([n,i])=>`
<div class="card-pro flex justify-between">
<b>${n}</b>
<span>${i.stock} | $${i.costo.toFixed(2)}</span>
</div>
`).join("");
}

};

// 🔥 COMPRAS PRO
window.saveInv = async ()=>{
const m = document.getElementById("mInv").value.toUpperCase();
const q = parseFloat(document.getElementById("qInv").value);
const p = parseFloat(document.getElementById("pInv").value);

if(m && q && p){

if(!window.state.inventario[m]){
window.state.inventario[m] = {stock:0,costo:0};
}

const stock = window.state.inventario[m].stock;
const costo = window.state.inventario[m].costo;

const nuevoStock = stock + q;
const costoUnit = p/q;

const nuevoCosto = ((stock*costo)+(q*costoUnit))/nuevoStock;

window.state.inventario[m].stock = nuevoStock;
window.state.inventario[m].costo = nuevoCosto;

window.state.comprasInversion.push({
id:Date.now(),
material:m,
amount:p,
qty:q
});

await sync();
setView('inicio');
}
};

window.currentView = "inicio";
render();

</script>
</body>
</html>
