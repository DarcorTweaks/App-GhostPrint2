<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostPrint ERP v3 - Auto Ink Connector</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d0d1a; color: #e2e8f0; font-family: sans-serif; padding-bottom: 100px; }
        .btn { background: #6d28d9; color: white; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 11px; border: none; }
        .card { background: white; padding: 20px; margin: 15px 0; border-radius: 20px; color: #1e293b; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        input, select { border: 1px solid #cbd5e1; padding: 12px; margin: 8px 0; border-radius: 10px; width: 100%; background: #f1f5f9; color: #1e293b; font-weight: bold; }
        label { font-size: 10px; color: #64748b; font-weight: 800; text-transform: uppercase; }
        header { background: #4c1d95; color: white; padding: 20px; text-align: center; }
        nav { display: flex; gap: 10px; padding: 10px; overflow-x: auto; background: #1e1e38; position: sticky; top: 0; z-index: 100; }
    </style>
</head>
<body>

<header>
    <h1 class="text-xl font-black italic">GHOSTPRINT ERP</h1>
    <p id="sync-status" class="text-[10px] text-amber-400">CARGANDO SISTEMA...</p>
</header>

<nav>
    <button onclick="setView('ventas')" class="btn !bg-green-600">💵 Vender</button>
    <button onclick="setView('compras')" class="btn !bg-blue-600">📦 Stock</button>
    <button onclick="setView('cobranzas')" class="btn !bg-amber-500">⏳ Cobros</button>
    <button onclick="setView('config')" class="btn !bg-slate-700">⚙️ Config</button>
</nav>

<div id="app" class="p-4 max-w-lg mx-auto"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI",
    authDomain: "ghost-print-contabilidad.firebaseapp.com",
    projectId: "ghost-print-contabilidad",
    storageBucket: "ghost-print-contabilidad.firebasestorage.app",
    messagingSenderId: "867057362556",
    appId: "1:867057362556:web:6bd2a461817219a4000bf9"
};

const appF = initializeApp(firebaseConfig);
const db = getFirestore(appF);
const docRef = doc(db, "sistema", "datos_principales");

window.state = { ventas: [], inventario: {}, serviciosExtra: [] };
window.view = "ventas";
let carrito = [];

onSnapshot(docRef, (snap) => {
    if (snap.exists()) { 
        window.state = snap.data();
        document.getElementById("sync-status").innerText = "SINCRO OK ✓"; 
        render();
    }
});

window.save = async () => { await setDoc(docRef, window.state); };
window.setView = (v) => { window.view = v; render(); };

window.render = function() {
    let app = document.getElementById("app"), html = "";
    
    if(window.view === "ventas"){
        html = `<div class="card">
            <h2 class="font-bold uppercase text-purple-800">Nueva Impresión</h2>
            <label>Cliente</label><input id="cliV" placeholder="NOMBRE">
            <label>Material</label>
            <select id="pSel">
                <option value="">-- SELECCIONA MATERIAL --</option>
                ${Object.keys(window.state.inventario).map(p=>`<option value="${p}">${p}</option>`).join("")}
            </select>
            <label>Cantidad (Metros)</label><input id="cQty" type="number" value="1">
            <button onclick="addCart()" class="btn w-full mt-2">+ AÑADIR</button>
            <div id="lista" class="mt-4 border-t pt-2 text-sm"></div>
            <div id="total" class="font-bold text-xl mt-2 text-center text-slate-800">TOTAL: $0.00</div>
            <button onclick="finalizarVenta()" class="btn w-full !bg-green-600 mt-4 py-4">FINALIZAR Y DESCONTAR TINTA</button>
        </div>`;
        setTimeout(() => updateCartUI(), 10);
    }

    if(window.view === "compras"){
        html = `<div class="card">
            <h2 class="font-bold uppercase text-blue-800">Almacén Actual</h2>
            ${Object.entries(window.state.inventario).map(([n,i])=>`
            <div class="flex justify-between items-center py-2 border-b">
                <span class="font-bold uppercase">${n}</span>
                <span class="text-blue-600 font-black">${(i.stock || 0).toFixed(2)}</span>
            </div>`).join("")}
            <hr class="my-4">
            <label>Añadir Stock a:</label>
            <select id="mCom">${Object.keys(window.state.inventario).map(p=>`<option value="${p}">${p}</option>`).join("")}</select>
            <input id="qCom" type="number" placeholder="Cantidad">
            <button onclick="cargarStock()" class="btn w-full !bg-blue-800">Cargar</button>
        </div>`;
    }

    if(window.view === "config"){
        html = `<div class="card">
            <label>Nombre Nuevo Material</label><input id="nP">
            <button onclick="crearProd()" class="btn w-full">Crear Material</button>
            <p class="text-[10px] mt-4 text-gray-500">Nota: Crea uno llamado "TINTA" para control automático.</p>
        </div>`;
    }

    if(window.view === "cobranzas"){
        html = window.state.ventas.slice(-10).reverse().map(v=>`
        <div class="card !py-2 flex justify-between items-center">
            <span class="font-bold">${v.cliente}</span>
            <span class="font-bold text-green-600">$${v.total.toFixed(2)}</span>
            <button onclick="borrarV(${v.id})" class="text-red-500 font-bold">X</button>
        </div>`).join("");
    }

    app.innerHTML = html;
};

window.addCart = () => {
    let p = document.getElementById("pSel").value, q = parseFloat(document.getElementById("cQty").value);
    if(!p || q <= 0) return;
    carrito.push({ nombre: p, qty: q, precio: 10, sub: q * 10 });
    updateCartUI();
};

function updateCartUI() {
    let l = document.getElementById("lista");
    if(!l) return;
    l.innerHTML = carrito.map((i, idx)=>`<div>${i.qty}m - ${i.nombre} <button onclick="carrito.splice(${idx},1);updateCartUI();" class="text-red-500 font-bold">X</button></div>`).join("");
    document.getElementById("total").innerText = "TOTAL: $" + carrito.reduce((a,b)=>a+b.sub,0).toFixed(2);
}

window.finalizarVenta = async () => {
    let cli = document.getElementById("cliV").value.toUpperCase();
    if(!cli || carrito.length === 0) return alert("Falta cliente o material");

    // 1. Asegurar que existe el ítem TINTA en el inventario
    if(!window.state.inventario["TINTA"]) {
        window.state.inventario["TINTA"] = { stock: 0 };
    }

    // 2. Procesar descuento de material Y tinta
    carrito.forEach(item => {
        // Restar material
        if(window.state.inventario[item.nombre]) {
            window.state.inventario[item.nombre].stock -= item.qty;
        }
        
        // REGLA DE ORO: Si el material no es tinta, descontar de TINTA automáticamente
        if(item.nombre !== "TINTA") {
            window.state.inventario["TINTA"].stock -= item.qty; 
        }
    });

    window.state.ventas.push({ id: Date.now(), cliente: cli, total: carrito.reduce((a,b)=>a+b.sub,0), items: [...carrito] });
    await window.save();
    carrito = [];
    alert("Venta procesada. ¡Tinta descontada automáticamente!");
    setView('compras');
};

window.borrarV = async (id) => {
    let idx = window.state.ventas.findIndex(v => v.id === id);
    let v = window.state.ventas[idx];
    v.items.forEach(i => {
        if(window.state.inventario[i.nombre]) window.state.inventario[i.nombre].stock += i.qty;
        if(i.nombre !== "TINTA") window.state.inventario["TINTA"].stock += i.qty;
    });
    window.state.ventas.splice(idx,1);
    await window.save();
    render();
};

window.cargarStock = async () => {
    let m = document.getElementById("mCom").value, q = parseFloat(document.getElementById("qCom").value);
    if(m && q) { window.state.inventario[m].stock += q; await window.save(); render(); }
};

window.crearProd = async () => {
    let n = document.getElementById("nP").value.toUpperCase();
    if(n) { window.state.inventario[n] = { stock: 0 }; await window.save(); render(); }
};

render();
</script>
</body>
</html>
