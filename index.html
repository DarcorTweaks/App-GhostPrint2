<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostPrint ERP v6.5 - Pro Reports</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background-color: #0d0d1a;
            background-image: radial-gradient(at 10% 10%, rgba(109, 40, 217, 0.2) 0px, transparent 50%), radial-gradient(at 90% 90%, rgba(79, 70, 229, 0.15) 0px, transparent 50%);
            background-attachment: fixed; background-size: cover;
            font-family: ui-sans-serif, system-ui; color: #e2e8f0; padding-bottom: 96px;
        }
        .btn { background: #6d28d9; color: white; padding: 10px 14px; border-radius: 12px; cursor: pointer; font-weight: 700; border: none; transition: 0.2s; text-transform: uppercase; font-size: 10px; }
        .card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(5px); padding: 20px; margin: 12px 0; border-radius: 20px; color: #1e293b; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        input, select { border: 1px solid #e2e8f0; padding: 12px; margin: 8px 0; border-radius: 12px; width: 100%; background: #f8fafc; color: #1e293b; font-weight: 600; }
        label { font-size: 10px; color: #64748b; font-weight: 800; text-transform: uppercase; display: block; margin-top: 8px; }
        header { background: linear-gradient(to right, #4c1d95, #000); color: white; padding: 16px; display: flex; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
        nav { padding: 8px; display: flex; gap: 8px; overflow-x: auto; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); position: sticky; top: 72px; z-index: 40; }
    </style>
</head>
<body>

<header>
    <div>
        <h1 class="text-2xl font-black italic uppercase text-purple-400">GhostPrint ERP</h1>
        <p id="sync-status" class="text-[9px] font-bold text-amber-300 uppercase italic">Conectando...</p>
    </div>
</header>

<nav>
    <button onclick="setView('dashboard')" class="btn">🏠 Inicio</button>
    <button onclick="setView('ventas')" class="btn !bg-green-600">💵 Vender</button>
    <button onclick="setView('cobranzas')" class="btn !bg-amber-500">⏳ Cobros</button>
    <button onclick="setView('compras')" class="btn !bg-blue-600">📦 Stock</button>
    <button onclick="setView('gastos')" class="btn !bg-red-600">📉 Gastos</button>
    <button onclick="setView('reportes')" class="btn !bg-indigo-600">📊 Reportes</button>
    <button onclick="setView('config')" class="btn !bg-slate-700">⚙️ Catálogo</button>
</nav>

<div id="app" class="p-4 max-w-4xl mx-auto"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI",
    authDomain: "ghost-print-contabilidad.firebaseapp.com",
    projectId: "ghost-print-contabilidad",
    storageBucket: "ghost-print-contabilidad.firebasestorage.app",
    messagingSenderId: "867057362556",
    appId: "1:867057362556:web:6bd2a461817219a4000bf9"
};

const appF = initializeApp(firebaseConfig);
const db = getFirestore(appF);
const docRef = doc(db, "sistema", "datos_principales");

window.state = { ventas: [], gastos: [], inventario: {}, serviciosExtra: [], mermas: [] };
window.view = "dashboard";
window.reportMonth = new Date().getMonth();
window.reportYear = new Date().getFullYear();

onSnapshot(docRef, (snap) => {
    if (snap.exists()) { 
        window.state = snap.data();
        window.state.inventario = window.state.inventario || {};
        window.state.serviciosExtra = window.state.serviciosExtra || [];
        window.state.ventas = window.state.ventas || [];
        window.state.gastos = window.state.gastos || [];
        window.state.mermas = window.state.mermas || [];
        document.getElementById("sync-status").innerText = "En Línea ✓"; 
        render();
    }
});

window.save = async () => { await setDoc(docRef, window.state); };
window.setView = (v) => { window.view = v; render(); };

window.render = function() {
    let app = document.getElementById("app");
    if(!app) return;
    let html = "";

    if(window.view === "dashboard"){
        let totalV = window.state.ventas.reduce((a,b)=>a+b.total,0);
        let dineroC = window.state.ventas.reduce((a,b)=>a+(b.abonado || 0), 0);
        html = `
        <div class="grid grid-cols-2 gap-3 mb-4">
            <div class="card !m-0 bg-green-600 text-white text-center"><p class="text-[9px] font-bold uppercase">Caja Real</p><b class="text-xl">$${dineroC.toFixed(2)}</b></div>
            <div class="card !m-0 bg-amber-500 text-white text-center"><p class="text-[9px] font-bold uppercase">Por Cobrar</p><b class="text-xl">$${(totalV - dineroC).toFixed(2)}</b></div>
        </div>
        <div class="card"><canvas id="chartDash" height="180"></canvas></div>`;
        setTimeout(() => initDashChart(), 100);
    }

    if(window.view === "reportes"){
        // LÓGICA DE FILTRADO POR MES
        let filteredVentas = window.state.ventas.filter(v => {
            let d = new Date(v.id);
            return d.getMonth() == window.reportMonth && d.getFullYear() == window.reportYear;
        });
        let filteredGastos = window.state.gastos.filter(g => {
            let d = new Date(g.id);
            return d.getMonth() == window.reportMonth && d.getFullYear() == window.reportYear;
        });

        let totalV = filteredVentas.reduce((a,b)=>a+b.total, 0);
        let totalG = filteredGastos.reduce((a,b)=>a+b.amount, 0);

        // Ranking Clientes
        let clientMap = filteredVentas.reduce((a, b) => { a[b.cliente] = (a[b.cliente] || 0) + b.total; return a; }, {});
        let sortedClients = Object.entries(clientMap).sort((a,b) => b[1] - a[1]).slice(0, 5);

        html = `
        <div class="card bg-indigo-900 text-white">
            <h2 class="text-center font-black uppercase italic text-xs mb-4">Analítica de Negocio</h2>
            <div class="grid grid-cols-2 gap-2">
                <select id="repM" onchange="window.reportMonth=this.value; render();" class="!m-0 !py-2 !text-xs">
                    ${['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'].map((m,i)=>`<option value="${i}" ${window.reportMonth==i?'selected':''}>${m}</option>`).join("")}
                </select>
                <select id="repY" onchange="window.reportYear=this.value; render();" class="!m-0 !py-2 !text-xs">
                    <option value="2025">2025</option><option value="2026" selected>2026</option>
                </select>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <div class="card !m-0 bg-white border-l-4 border-green-500">
                <p class="text-[9px] font-bold text-slate-400 uppercase">Ventas Mes</p>
                <b class="text-lg text-green-600">$${totalV.toFixed(2)}</b>
            </div>
            <div class="card !m-0 bg-white border-l-4 border-red-500">
                <p class="text-[9px] font-bold text-slate-400 uppercase">Gastos Mes</p>
                <b class="text-lg text-red-600">$${totalG.toFixed(2)}</b>
            </div>
        </div>

        <div class="card mt-4">
            <h3 class="font-black uppercase text-purple-700 text-[10px] mb-3 border-b pb-1">Top 5 Clientes del Mes</h3>
            ${sortedClients.map(([name, total]) => `
                <div class="flex justify-between py-2 border-b text-[11px]">
                    <span class="font-bold uppercase">${name}</span>
                    <span class="text-green-600 font-black">$${total.toFixed(2)}</span>
                </div>
            `).join("") || '<p class="text-center text-slate-400 text-[10px] py-4">No hay ventas este mes</p>'}
        </div>

        <div class="card mt-4 bg-red-50">
            <h3 class="font-black uppercase text-red-700 text-[10px] mb-3 border-b pb-1">Auditoría de Mermas (Pérdidas)</h3>
            <div class="max-h-60 overflow-y-auto">
                ${window.state.mermas.filter(m => {
                    let d = new Date(m.id);
                    return d.getMonth() == window.reportMonth && d.getFullYear() == window.reportYear;
                }).map(m => `
                    <div class="py-2 border-b text-[10px]">
                        <div class="flex justify-between font-black uppercase">
                            <span>${m.name}</span>
                            <span class="text-red-600">-${m.qty}m</span>
                        </div>
                        <p class="text-slate-500 italic text-[9px]">${m.reason}</p>
                    </div>
                `).join("") || '<p class="text-center text-slate-400 text-[10px] py-4">Sin mermas este mes</p>'}
            </div>
        </div>
        `;
    }

    // --- LAS DEMÁS VISTAS SE MANTIENEN IGUAL (V6.4) ---
    if(window.view === "ventas"){
        html = `<div class="card"><h2 class="font-black mb-4 uppercase text-purple-700 italic border-b pb-2 text-sm">Punto de Venta</h2>
            <label>Cliente</label><input id="cliV" placeholder="NOMBRE">
            <div class="grid grid-cols-2 gap-2">
                <div><label>Material</label><select id="pSel"><option value="">-- Ninguno --</option>${Object.keys(window.state.inventario).map(p=>`<option value="${p}">${p}</option>`).join("")}</select></div>
                <div><label>Servicio</label><select id="sSel"><option value="">-- Ninguno --</option>${window.state.serviciosExtra.map(s=>`<option value="${s}">${s}</option>`).join("")}</select></div>
            </div>
            <label>Tarifa</label><select id="tCli"><option value="detal">DETAL ($9) - m²</option><option value="mayor">MAYOR ($10) - ML</option><option value="libre">LIBRE - Unidad</option></select>
            <label>Cantidad</label><input id="cQty" type="number" value="1" step="0.01">
            <button onclick="addItemCarrito()" class="btn w-full !bg-blue-600 mt-2">+ AÑADIR</button>
            <div id="listaCarrito" class="mt-4 border-t pt-2 space-y-1 text-xs"></div>
            <div id="totalVenta" class="p-3 bg-slate-800 text-white text-center font-bold mt-2 rounded-xl text-xl uppercase italic">Total: $0.00</div>
            <button onclick="procesarV()" class="btn w-full bg-green-600 mt-4 py-4 font-black">REGISTRAR VENTA</button></div>`;
        setTimeout(() => renderCarritoInner(), 10);
    }
    if(window.view === "compras"){
        html = `
        <div class="card bg-blue-50 border-l-4 border-blue-600"><h3 class="font-black text-[10px] uppercase mb-2 text-blue-800">Cargar Stock</h3>
            <label>Material</label><select id="mCom">${Object.keys(window.state.inventario).map(p=>`<option value="${p}">${p}</option>`).join("")}</select>
            <label>Metros/Und</label><input id="qCom" type="number"><label>Costo $</label><input id="vCom" type="number"><button onclick="regCom()" class="btn w-full bg-blue-700 mt-2">Cargar</button>
        </div>
        <div class="card bg-red-50 border-l-4 border-red-600 mt-4"><h3 class="font-black text-[10px] uppercase mb-2 text-red-800">Reportar Merma</h3>
            <label>Material</label><select id="mMerma">${Object.keys(window.state.inventario).map(p=>`<option value="${p}">${p}</option>`).join("")}</select>
            <label>Metros</label><input id="qMerma" type="number"><label>Motivo</label><input id="rMerma"><button onclick="regMerma()" class="btn w-full bg-red-600 mt-2">Descontar</button>
        </div>
        <div class="grid grid-cols-2 gap-2 mt-4">${Object.entries(window.state.inventario).map(([n,i])=>`<div class="card !m-0 p-3 bg-white text-center"><b class="text-[9px] uppercase text-slate-500">${n}</b><br><span class="text-blue-700 font-black text-lg">${(i.stock || 0).toFixed(2)}</span></div>`).join("")}</div>`;
    }
    if(window.view === "config"){
        html = `<div class="card border-l-4 border-blue-600"><h2 class="font-black uppercase text-blue-700 mb-4 text-xs italic border-b pb-2 text-sm">Catálogo de Materiales</h2>
            <input id="nP" placeholder="EJ: BANNER 1.37"><button onclick="addC('p')" class="btn bg-blue-600 mt-2 w-full">Guardar</button>
            <div class="mt-4 space-y-2">${Object.entries(window.state.inventario).map(([n,i])=>`<div class="flex justify-between items-center p-2 bg-slate-100 rounded-lg text-[10px] font-bold uppercase"><span>${n}</span><div class="flex gap-2"><button onclick="editStock('${n}')" class="text-blue-600">EDIT</button><button onclick="deleteMaterial('${n}')" class="text-red-500">BORRAR</button></div></div>`).join("")}</div>
        </div><div class="card border-l-4 border-purple-600 mt-4"><h2 class="font-black uppercase text-purple-700 mb-4 text-xs italic border-b pb-2 text-sm">Servicios Extra</h2>
            <input id="nS" placeholder="EJ: INSTALACIÓN"><button onclick="addC('s')" class="btn bg-purple-600 mt-2 w-full">Guardar</button>
            <div class="mt-4 space-y-2">${window.state.serviciosExtra.map((s, idx) => `<div class="flex justify-between items-center p-2 bg-slate-100 rounded-lg text-[10px] font-bold uppercase"><span>${s}</span><button onclick="deleteServicio(${idx})" class="text-red-500">BORRAR</button></div>`).join("")}</div>
        </div>`;
    }
    if(window.view === "cobranzas"){
        html = `${window.state.ventas.filter(v=>!v.pagado).reverse().map(v=>`
            <div class="card flex justify-between items-center border-l-4 border-amber-500">
                <div><b class="uppercase text-xs">${v.cliente}</b><br><small class="text-red-600 font-bold italic">Resta: $${(v.total-(v.abonado||0)).toFixed(2)}</small></div>
                <div class="flex gap-1"><button onclick="abonarV(${v.id})" class="bg-blue-600 text-white p-2 rounded text-[8px] font-bold">ABONO</button><button onclick="borrarV(${v.id})" class="bg-red-500 text-white p-2 rounded text-[8px] font-bold italic">X</button></div>
            </div>`).join("")}`;
    }
    if(window.view === "gastos"){
        html = `<div class="card"><label>Descripción</label><input id="gNom"><label>Monto $</label><input id="gMon" type="number"><button onclick="regG()" class="btn w-full bg-red-600 mt-2">Cargar Gasto</button></div>
        ${window.state.gastos.slice().reverse().map(g=>`<div class="card flex justify-between py-2 border-l-4 border-red-500"><div><small class="uppercase font-bold">${g.name}</small><br><b>$${g.amount.toFixed(2)}</b></div><button onclick="borrarG(${g.id})" class="text-red-500 font-bold text-xs">X</button></div>`).join("")}`;
    }

    app.innerHTML = html;
};

// --- GRÁFICOS ---
window.initDashChart = () => {
    let totalV = window.state.ventas.reduce((a,b)=>a+b.total,0);
    let totalG = window.state.gastos.reduce((a,b)=>a+b.amount,0);
    new Chart(document.getElementById('chartDash'), {
        type: 'bar',
        data: { labels: ['Ventas Totales', 'Gastos'], datasets: [{ data: [totalV, totalG], backgroundColor: ['#6d28d9', '#ef4444'], borderRadius: 8 }] },
        options: { plugins: { legend: { display: false } } }
    });
};

// --- MOTOR DE LÓGICA ---
window.addC = async (t) => {
    if(t==='p'){ let n=document.getElementById("nP").value.toUpperCase(); if(n) window.state.inventario[n]={stock:0}; }
    else { let n=document.getElementById("nS").value.toUpperCase(); if(n) window.state.serviciosExtra.push(n); }
    await window.save(); render();
};
window.deleteMaterial = async (n) => { if(confirm(`Eliminar ${n}?`)) { delete window.state.inventario[n]; await window.save(); render(); } };
window.deleteServicio = async (i) => { if(confirm(`Eliminar?`)) { window.state.serviciosExtra.splice(i,1); await window.save(); render(); } };
window.editStock = async (n) => { let v = parseFloat(prompt(`Stock de ${n}:`, window.state.inventario[n].stock)); if(!isNaN(v)){ window.state.inventario[n].stock = v; await window.save(); render(); } };
window.regCom = async () => {
    let m = document.getElementById("mCom").value, q = parseFloat(document.getElementById("qCom").value), v = parseFloat(document.getElementById("vCom").value);
    if(q > 0) { window.state.inventario[m].stock += q; window.state.gastos.push({id:Date.now(), name:`COMPRA: ${m}`, amount: v}); await window.save(); render(); }
};
window.regMerma = async () => {
    let m = document.getElementById("mMerma").value, q = parseFloat(document.getElementById("qMerma").value), r = document.getElementById("rMerma").value || "Sin motivo";
    if(m && q > 0) { window.state.inventario[m].stock -= q; window.state.mermas.push({id:Date.now(), name:m, qty:q, reason:r.toUpperCase()}); await window.save(); render(); }
};
window.addItemCarrito = () => {
    let p = document.getElementById("pSel").value, s = document.getElementById("sSel").value, t = document.getElementById("tCli").value, c = parseFloat(document.getElementById("cQty").value) || 0;
    if(!p && !s) return;
    let uni = (t === "detal") ? "m²" : (t === "mayor" ? "ML" : "Und");
    let pre = (t === "detal") ? 9 : (t === "mayor" ? 10 : 12);
    let nom = (p && s) ? `${p} + ${s}` : (p || s);
    carritoVenta.push({ nombre: nom.toUpperCase(), qty: c, unidad: uni, sub: c * pre, esProd: !!p, prodKey: p });
    renderCarritoInner();
};
window.renderCarritoInner = () => {
    let div = document.getElementById("listaCarrito"), totalDiv = document.getElementById("totalVenta");
    if(!div) return;
    div.innerHTML = carritoVenta.map((v,i)=>`<div class="flex justify-between py-1 border-b bg-white px-2 rounded"><span><b>${v.qty}${v.unidad}</b> - ${v.nombre}</span><button onclick="removeItemCarrito(${i})" class="text-red-500 font-bold px-2">X</button></div>`).join("");
    totalDiv.innerText = `TOTAL: $${carritoVenta.reduce((a,b)=>a+b.sub,0).toFixed(2)}`;
};
window.removeItemCarrito = (i) => { carritoVenta.splice(i, 1); renderCarritoInner(); };
window.procesarV = async () => {
    let cliente = document.getElementById("cliV").value.toUpperCase();
    if(!cliente || carritoVenta.length === 0) return alert("Faltan datos");
    let keyT = Object.keys(window.state.inventario).find(k => k.toUpperCase().includes("TINTA"));
    carritoVenta.forEach(i => {
        if (i.esProd && i.prodKey && window.state.inventario[i.prodKey]) {
            window.state.inventario[i.prodKey].stock -= i.qty;
            if (keyT && i.prodKey.toUpperCase() !== keyT.toUpperCase()) window.state.inventario[keyT].stock -= i.qty;
        }
    });
    window.state.ventas.push({id:Date.now(), cliente, total: carritoVenta.reduce((a,b)=>a+b.sub, 0), abonado:0, pagado:false, items: [...carritoVenta]});
    await window.save(); carritoVenta = []; setView('cobranzas');
};
window.regG = async () => {
    let n = document.getElementById("gNom").value, m = parseFloat(document.getElementById("gMon").value);
    if(n && m) { window.state.gastos.push({id:Date.now(), name:n.toUpperCase(), amount: m}); await window.save(); render(); }
};
window.abonarV = async (id) => {
    let v = window.state.ventas.find(x=>x.id===id), m = parseFloat(prompt("¿Monto?"));
    if(m){ v.abonado += m; if(v.abonado >= v.total) v.pagado = true; await window.save(); render(); }
};
window.borrarV = async (id) => {
    if(confirm("¿Anular?")){
        let vIdx = window.state.ventas.findIndex(x => x.id === id);
        let venta = window.state.ventas[vIdx];
        let keyT = Object.keys(window.state.inventario).find(k => k.toUpperCase().includes("TINTA"));
        venta.items.forEach(i => {
            if (i.esProd && i.prodKey && window.state.inventario[i.prodKey]) {
                window.state.inventario[i.prodKey].stock += i.qty;
                if (keyT && i.prodKey.toUpperCase() !== keyT.toUpperCase()) window.state.inventario[keyT].stock += i.qty;
            }
        });
        window.state.ventas.splice(vIdx, 1); await window.save(); render();
    }
};
window.borrarG = async (id) => { if(confirm("¿Borrar?")){ window.state.gastos=window.state.gastos.filter(x=>x.id!==id); await window.save(); render(); } };

render();
</script>
</body>
</html>
