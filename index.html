<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GhostPrint PRO v21.8</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { background-color: #030308; color: #f8fafc; font-family: 'Inter', sans-serif; padding-bottom: 100px; }
        .card-pro { background: #111122; border: 1px solid #2d2d44; border-radius: 20px; padding: 18px; margin-bottom: 12px; }
        nav { background: rgba(10, 10, 20, 0.95); display: flex; gap: 8px; overflow-x: auto; padding: 14px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #334155; }
        .btn-nav { background: #1e1e30; color: #64748b; padding: 12px 18px; border-radius: 14px; font-size: 10px; font-weight: 800; white-space: nowrap; cursor: pointer; text-transform: uppercase; }
        .active { background: #7c3aed !important; color: white !important; }
        input, select { background: #070712; border: 1px solid #334155; color: white; padding: 14px; border-radius: 14px; width: 100%; margin: 6px 0; font-weight: 700; outline: none; }
        .btn-main { background: linear-gradient(135deg, #7c3aed 0%, #4c1d95 100%); color: white; padding: 16px; border-radius: 16px; width: 100%; font-weight: 900; text-transform: uppercase; cursor: pointer; border: none; }
        #bill-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:200; padding:20px; align-items: center; justify-content: center; }
        .ghost-icon { font-size: 40px; filter: drop-shadow(0 0 10px #7c3aed); }
    </style>
</head>
<body>

<div class="p-4 flex justify-between items-center bg-[#0a0a14] border-b border-white/5">
    <div class="flex items-center gap-2">
        <span class="ghost-icon">👻</span>
        <div>
            <h1 class="text-xl font-black italic leading-none tracking-tighter text-purple-500">GHOST PRINT</h1>
            <p class="text-[8px] font-black opacity-40 uppercase tracking-[2px]">Admin System Online</p>
        </div>
    </div>
</div>

<nav>
    <div onclick="setView('inicio')" class="btn-nav active" id="n-inicio">📊 ADMIN</div>
    <div onclick="setView('ventas')" class="btn-nav" id="n-ventas">💵 Ventas</div>
    <div onclick="setView('cobros')" class="btn-nav" id="n-cobros">⏳ Cuentas</div>
    <div onclick="setView('gastos')" class="btn-nav" id="n-gastos">💸 Gastos</div>
    <div onclick="setView('compras')" class="btn-nav" id="n-compras">🛒 Compras</div>
    <div onclick="setView('inventario')" class="btn-nav" id="n-inventario">📦 Stock</div>
    <div onclick="setView('catalogo')" class="btn-nav" id="n-catalogo">⚙️ Config</div>
</nav>

<div id="app" class="p-4 max-w-2xl mx-auto"></div>

<div id="bill-modal" onclick="closeBill()">
    <div class="bg-white p-6 rounded-3xl w-full max-w-xs text-black shadow-2xl relative overflow-hidden" onclick="event.stopPropagation()">
        <div class="text-center mb-2">
            <span class="text-4xl">👻</span>
            <h2 class="text-2xl font-black italic text-purple-600 leading-none">GHOSTPRINT</h2>
        </div>
        <div class="border-t border-dashed my-4 border-gray-300"></div>
        <p class="text-[10px] font-bold opacity-40 uppercase italic text-center">Saldo Pendiente:</p>
        <p id="b-monto" class="text-5xl font-black text-purple-700 text-center my-2"></p>
        <p class="text-[10px] font-bold opacity-40 uppercase italic">Cliente:</p>
        <p id="b-cli" class="text-xl font-black uppercase mb-4 text-gray-800"></p>
        <p class="text-[10px] font-bold opacity-40 uppercase italic">Detalle:</p>
        <p id="b-det" class="text-[11px] font-bold mb-4 text-gray-600 italic"></p>
        <div class="border-t border-dashed my-4 border-gray-300"></div>
        <button id="btn-wa" class="btn-main !from-green-600 !to-green-800 mt-2 shadow-lg text-white">COMPARTIR WHATSAPP</button>
        <button onclick="closeBill()" class="w-full text-gray-400 font-bold py-2 mt-2">Cerrar</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI", authDomain: "ghost-print-contabilidad.firebaseapp.com", projectId: "ghost-print-contabilidad", storageBucket: "ghost-print-contabilidad.firebasestorage.app", messagingSenderId: "867057362556", appId: "1:867057362556:web:6bd2a461817219a4000bf9" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const docRef = db.collection("sistema").doc("datos_principales");

    window.state = JSON.parse(localStorage.getItem('gp_v21_8')) || { ventas: [], gastos: [], inventario: {}, serviciosExtra: ["DISEÑO", "MONTAJE"], comprasInversion: [] };
    const fmtFecha = (f) => { if(!f) return "S/F"; const [y, m, d] = f.split("-"); return `${d}/${m}`; }

    window.sync = async function() { localStorage.setItem('gp_v21_8', JSON.stringify(window.state)); await docRef.set(window.state); };
    docRef.onSnapshot(doc => { if(doc.exists) { window.state = doc.data(); render(); } });

    window.setView = function(v) {
        window.currentView = v;
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
        document.getElementById('n-' + v).classList.add('active');
        render();
    };

    window.render = function() {
        const app = document.getElementById("app");
        const vM = window.state.ventas || [];
        const gM = window.state.gastos || [];
        const cM = window.state.comprasInversion || [];

        // --- DASHBOARD LÓGICA DARCOR (SIN NEGATIVOS) ---
        const totalVendido = vM.reduce((a, b) => a + Number(b.total), 0);
        const totalCobrado = vM.reduce((a, b) => a + (Number(b.abonado) || (b.pagado ? b.total : 0)), 0);
        const totalDeuda = vM.filter(v => !v.pagado).reduce((a, b) => a + (b.total - (b.abonado || 0)), 0);
        const totalGastos = gM.reduce((a, b) => a + Number(b.amount), 0);
        const totalStockComp = cM.reduce((a, b) => a + Number(b.amount), 0);
        let flujoCaja = totalCobrado - totalGastos - totalStockComp;
        const cajaFinal = flujoCaja < 0 ? 0 : flujoCaja;

        if(window.currentView === "inicio") {
            app.innerHTML = `
                <div class="card-pro !bg-gradient-to-br !from-purple-600 !to-indigo-900 border-none text-center mb-4 shadow-2xl">
                    <p class="text-[10px] font-black uppercase opacity-60 tracking-[3px]">Efectivo en Caja Real</p>
                    <h2 class="text-6xl font-black italic">$${cajaFinal.toFixed(2)}</h2>
                    ${flujoCaja < 0 ? `<p class="text-[9px] font-bold text-orange-400 mt-2 uppercase">Recuperando Inversión: $${Math.abs(flujoCaja).toFixed(2)}</p>` : ''}
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="card-pro border-l-4 border-green-500"><p class="text-[9px] opacity-40 font-black">Bruto Vendido</p><b class="text-xl">$${totalVendido.toFixed(2)}</b></div>
                    <div class="card-pro border-l-4 border-orange-500"><p class="text-[9px] opacity-40 font-black">Cuentas x Cobrar</p><b class="text-xl text-orange-400">$${totalDeuda.toFixed(2)}</b></div>
                </div>
            `;
        }

        // --- CUENTAS POR COBRAR (RECUPERADO EDITAR Y RECIBO) ---
        if(window.currentView === "cobros") {
            const deudas = vM.filter(v => !v.pagado);
            app.innerHTML = `<div class="space-y-2">${deudas.reverse().map(v => { 
                const det = v.items ? v.items.map(i=>i.d).join(' / ') : 'TRABAJO'; 
                return `
                <div class="card-pro border-l-4 border-purple-500 flex justify-between items-center">
                    <div>
                        <b class="text-xs uppercase">${v.cliente}</b><br>
                        <span class="text-purple-400 text-[9px] font-black uppercase leading-tight">${det}</span><br>
                        <span class="text-orange-400 text-[10px] font-black italic">FALTAN: $${(v.total - (v.abonado||0)).toFixed(2)}</span>
                    </div>
                    <div class="flex gap-1">
                        <button onclick="editVentaProfunda(${v.id})" class="bg-white/5 p-2 rounded-lg text-xs">✏️</button>
                        <button onclick="showBill('${v.cliente}', ${(v.total-(v.abonado||0))}, '${v.telefono}', '${det}')" class="bg-green-600 p-2 rounded-lg text-xs">📋</button>
                        <button onclick="abonoM('${v.cliente}')" class="bg-purple-600 px-3 py-1 rounded-lg text-[9px] font-black uppercase italic">Cobrar</button>
                    </div>
                </div>`}).join("")}</div>`;
        }

        // --- COMPRAS (CON HISTORIAL PROFESIONAL) ---
        if(window.currentView === "compras") {
            app.innerHTML = `
                <div class="card-pro border-t-4 border-blue-600 mb-4">
                    <h2 class="text-lg font-black uppercase italic mb-4">Cargar Inversión Stock</h2>
                    <input type="date" id="fC" value="${new Date().toISOString().split('T')[0]}">
                    <select id="mInv"><option value="">Material...</option>${Object.keys(window.state.inventario || {}).map(m=>`<option value="${m}">${m}</option>`).join("")}</select>
                    <input id="qInv" type="number" placeholder="Cantidad (unidades)">
                    <input id="pInv" type="number" placeholder="Costo Total $">
                    <button onclick="saveInv()" class="btn-main !bg-blue-600 mt-4">REGISTRAR COMPRA</button>
                </div>
                <div class="flex justify-between items-center px-2 mb-4">
                    <h3 class="text-[10px] font-black uppercase opacity-40 italic text-blue-500">Historial de Compras</h3>
                    <div class="bg-blue-500/10 border border-blue-500/20 px-3 py-1 rounded-full text-blue-500 text-[10px] font-black italic">TOTAL: $${totalStockComp.toFixed(2)}</div>
                </div>
                <div class="space-y-2">
                    ${cM.slice().reverse().map(c => `
                        <div class="card-pro !py-3 flex justify-between items-center border-l-2 border-blue-900 bg-[#0a0d16]">
                            <div><p class="text-xs font-black uppercase">${c.material} (${c.qty} Unid)</p><p class="text-[9px] font-bold text-gray-600 font-mono">${fmtFecha(c.fecha)}</p></div>
                            <b class="text-blue-400 font-black">$${Number(c.amount).toFixed(2)}</b>
                        </div>
                    `).join("")}
                </div>
            `;
        }

        // --- GASTOS ---
        if(window.currentView === "gastos") {
            app.innerHTML = `<div class="card-pro border-t-4 border-red-600 mb-4"><h2 class="text-lg font-black uppercase italic mb-4">Registrar Gasto</h2><input type="date" id="fG" value="${new Date().toISOString().split('T')[0]}"><input id="dG" placeholder="Descripción"><input id="aG" type="number" placeholder="Monto $"><button onclick="saveGasto()" class="btn-main !bg-red-600 mt-4">GUARDAR GASTO</button></div><div class="flex justify-between items-center px-2 mb-4"><h3 class="text-[10px] font-black uppercase opacity-40 text-red-500">Historial</h3><div class="bg-red-500/10 px-3 py-1 rounded-full text-red-500 text-[10px] font-black">TOTAL: $${totalGastos.toFixed(2)}</div></div><div class="space-y-2">${gM.slice().reverse().map(g => `<div class="card-pro !py-3 flex justify-between items-center border-l-2 border-red-900 bg-[#160a0a]"><div><p class="text-xs font-black uppercase">${g.desc}</p><p class="text-[9px] font-bold text-gray-600 font-mono">${fmtFecha(g.fecha)}</p></div><b class="text-red-500">-$${Number(g.amount).toFixed(2)}</b></div>`).join("")}</div>`;
        }

        // --- OTRAS VISTAS (VENTAS, INVENTARIO, CATALOGO) ---
        if(window.currentView === "ventas") { app.innerHTML = `<div class="card-pro"><h2 class="text-lg font-black uppercase italic mb-4">Nueva Venta</h2><input type="date" id="fV" value="${new Date().toISOString().split('T')[0]}"><input id="cli" placeholder="CLIENTE"><input id="tel" type="number" placeholder="WHATSAPP"><div class="bg-white/5 p-4 rounded-xl mt-3"><div class="grid grid-cols-2 gap-2"><select id="pS"><option value="">Material...</option>${Object.keys(window.state.inventario || {}).map(m=>`<option value="${m}">${m}</option>`).join("")}</select><select id="sS"><option value="">Servicio...</option>${(window.state.serviciosExtra || []).map(s=>`<option value="${s}">${s}</option>`).join("")}</select></div><input id="qV" type="number" placeholder="Cantidad" value="1"><select id="tC" onchange="document.getElementById('pL').classList.toggle('hidden', this.value !== 'libre')"><option value="detal">DETAL ($9)</option><option value="mayor">MAYOR ($10)</option><option value="libre">LIBRE</option></select><input id="pL" class="hidden" type="number" placeholder="Precio $"><button onclick="addCart()" class="btn-main !p-3 mt-3">+ AÑADIR</button></div><div id="cart-list" class="mt-4"></div><div id="total-disp" class="text-5xl font-black text-center my-6 text-purple-400">$0.00</div><button onclick="finalizarVenta()" class="btn-main">GUARDAR</button></div>`; updateCartUI(); }
        if(window.currentView === "inventario") { app.innerHTML = `<div class="space-y-2">${Object.entries(window.state.inventario || {}).map(([n, i]) => `<div class="card-pro flex justify-between items-center"><div><p class="text-[9px] font-black opacity-50 uppercase">${n}</p><h4 class="text-3xl font-black italic">${(i.stock || 0).toFixed(2)}</h4></div><button onclick="registrarMerma('${n}')" class="bg-orange-600/20 p-2 rounded-lg text-[9px] font-black text-orange-400">MERMA</button></div>`).join("")}</div>`; }
        if(window.currentView === "catalogo") { app.innerHTML = `<div class="card-pro"><h2 class="text-[10px] font-black opacity-40 mb-4 uppercase italic text-center">Configuración del Sistema</h2><input id="newM" placeholder="NUEVO MATERIAL"><button onclick="addMat()" class="btn-main !p-3 mb-6">AÑADIR MATERIAL</button><div class="flex flex-wrap gap-2 mb-8">${Object.keys(window.state.inventario).map(m=>`<span class="bg-white/5 px-3 py-1 rounded-full text-[10px] font-bold uppercase border border-white/10">${m} <button onclick="delMat('${m}')" class="text-red-500 ml-1">×</button></span>`).join("")}</div><input id="newS" placeholder="NUEVO SERVICIO"><button onclick="addServicio()" class="btn-main !p-3">AÑADIR SERVICIO</button></div>`; }
    };

    // --- FUNCIONES MOTOR ---
    let cart = [];
    window.updateCartUI = () => { const list = document.getElementById("cart-list"); const disp = document.getElementById("total-disp"); if(list && disp) { list.innerHTML = cart.map((c, index) => `<div class="flex justify-between items-center py-2 border-b border-white/5 italic text-[11px] font-bold"><span>${c.d}</span><b>$${c.p}</b></div>`).join(""); disp.innerText = "$" + cart.reduce((a,b)=>a+b.p,0).toFixed(2); } };
    window.addCart = () => { let m = document.getElementById("pS").value, s = document.getElementById("sS").value, q = parseFloat(document.getElementById("qV").value) || 1, t = document.getElementById("tC").value, p = (t === "detal") ? 9 : (t === "mayor") ? 10 : parseFloat(document.getElementById("pL").value) || 0, d = (m && s) ? m + " + " + s : m || s; if(d) { cart.push({ d, p: (p*q), mat: m, qtyV: q }); updateCartUI(); } };
    window.finalizarVenta = async () => { let cli = document.getElementById("cli").value; if(!cli || !cart.length) return; cart.forEach(c => { if(c.mat && window.state.inventario[c.mat]) window.state.inventario[c.mat].stock -= c.qtyV; }); window.state.ventas.push({ id: Date.now(), fecha: document.getElementById('fV').value, cliente: cli.toUpperCase(), telefono: document.getElementById("tel").value, total: cart.reduce((a,b)=>a+b.p,0), abonado: 0, pagado: false, items: [...cart] }); await window.sync(); cart = []; setView('inicio'); };
    window.saveGasto = async () => { const d = document.getElementById("dG").value, a = parseFloat(document.getElementById("aG").value), f = document.getElementById('fG').value; if(d && a) { window.state.gastos.push({ id: Date.now(), fecha: f, desc: d.toUpperCase(), amount: a }); await window.sync(); setView('gastos'); } };
    window.saveInv = async () => { const m = document.getElementById("mInv").value, q = parseFloat(document.getElementById("qInv").value), p = parseFloat(document.getElementById("pInv").value), f = document.getElementById('fC').value; if(m && q) { window.state.inventario[m].stock += q; if(!window.state.comprasInversion) window.state.comprasInversion = []; window.state.comprasInversion.push({ id: Date.now(), fecha: f, material: m, amount: p, qty: q }); await window.sync(); setView('compras'); } };
    window.showBill = (cli, mon, tel, det) => { document.getElementById('b-cli').innerText = cli; document.getElementById('b-monto').innerText = "$" + mon.toFixed(2); document.getElementById('b-det').innerText = det; document.getElementById('bill-modal').style.display = 'flex'; document.getElementById('btn-wa').onclick = () => window.open(`https://api.whatsapp.com/send?phone=${tel}&text=👻 *GHOSTPRINT PRO*%0A------------------%0A*CLIENTE:* ${cli}%0A*DETALLE:* ${det}%0A*SALDO:* $${mon.toFixed(2)}%0A------------------%0A_Gracias por su preferencia!_`, '_blank'); };
    window.closeBill = () => document.getElementById('bill-modal').style.display = 'none';
    window.abonoM = async (name) => { let m = parseFloat(prompt(`Pago de ${name}:`)); if(!m) return; let vCli = window.state.ventas.filter(v => v.cliente === name && !v.pagado); vCli.forEach(v => { if(m <= 0) return; let p = v.total - (v.abonado||0); if(m >= p) { v.abonado = v.total; v.pagado = true; m -= p; } else { v.abonado = (v.abonado||0) + m; m = 0; } }); await window.sync(); render(); };
    window.editVentaProfunda = async (id) => { const v = window.state.ventas.find(x => x.id === id); if(!v) return; if(confirm(`¿Editar este trabajo? Se devolverá el stock temporalmente.`)) { if(v.items) { v.items.forEach(item => { if(item.mat && window.state.inventario[item.mat]) window.state.inventario[item.mat].stock += item.qtyV; }); cart = [...v.items]; } const cliN = v.cliente; const telN = v.telefono; window.state.ventas = window.state.ventas.filter(x => x.id !== id); await window.sync(); setView('ventas'); setTimeout(() => { document.getElementById('cli').value = cliN; document.getElementById('tel').value = telN; updateCartUI(); }, 100); } };
    window.addMat = async () => { let n = document.getElementById("newM").value.toUpperCase(); if(n) { if(!window.state.inventario) window.state.inventario = {}; window.state.inventario[n] = {stock: 0}; await window.sync(); render(); } };
    window.delMat = async (m) => { if(confirm(`¿Eliminar material ${m}?`)){ delete window.state.inventario[m]; await window.sync(); render(); } };
    window.addServicio = async () => { let s = document.getElementById("newS").value.toUpperCase(); if(s) { if(!window.state.serviciosExtra) window.state.serviciosExtra = []; window.state.serviciosExtra.push(s); await window.sync(); render(); } };

    window.currentView = "inicio";
    render();
</script>
</body>
</html>
