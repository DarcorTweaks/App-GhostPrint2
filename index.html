<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GhostPrint PRO v16.7 - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { background-color: #030308; color: #f8fafc; font-family: 'Inter', sans-serif; padding-bottom: 100px; }
        .card-pro { background: #111122; border: 1px solid #2d2d44; border-radius: 24px; padding: 20px; margin-bottom: 12px; }
        nav { background: rgba(10, 10, 20, 0.95); display: flex; gap: 8px; overflow-x: auto; padding: 14px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #334155; }
        .btn-nav { background: #1e1e30; color: #64748b; padding: 12px 18px; border-radius: 14px; font-size: 10px; font-weight: 800; white-space: nowrap; cursor: pointer; text-transform: uppercase; }
        .active { background: #7c3aed !important; color: white !important; box-shadow: 0 0 20px rgba(124, 58, 237, 0.4); }
        input, select { background: #070712; border: 1px solid #334155; color: white; padding: 14px; border-radius: 14px; width: 100%; margin: 6px 0; font-weight: 700; outline: none; }
        .btn-main { background: linear-gradient(135deg, #7c3aed 0%, #4c1d95 100%); color: white; padding: 18px; border-radius: 18px; width: 100%; font-weight: 900; text-transform: uppercase; cursor: pointer; border: none; }
        .ghost-logo { font-size: 28px; filter: drop-shadow(0 0 8px #7c3aed); margin-right: 8px; }
        
        /* Gráficas de Barras Mejoradas */
        .bar-container { display: flex; align-items: flex-end; gap: 8px; height: 150px; padding: 15px; background: rgba(255,255,255,0.02); border-radius: 20px; border: 1px border-white/5; }
        .bar-item { flex: 1; display: flex; flex-direction: column; align-items: center; height: 100%; justify-content: flex-end; }
        .bar-fill { width: 100%; border-radius: 8px 8px 4px 4px; min-height: 4px; transition: height 1s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; }
        .bar-fill::after { content: attr(data-val); position: absolute; top: -20px; left: 50%; transform: translateX(-50%); font-size: 8px; font-weight: 900; color: white; opacity: 0.7; }
        
        /* Modal Factura */
        #bill-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:200; padding:20px; overflow-y: auto; }
        .bill-card { background: white; color: black; border-radius: 25px; padding: 25px; max-width: 350px; margin: 0 auto; }
    </style>
</head>
<body>

<header class="p-5 bg-[#0a0a1a] border-b border-white/5 flex justify-between items-center">
    <div class="flex items-center">
        <span class="ghost-logo">👻</span>
        <h1 class="text-xl font-black italic text-white uppercase tracking-tighter">GhostPrint <span class="text-purple-500">PRO</span></h1>
    </div>
    <span class="text-[8px] font-black uppercase bg-purple-500/20 text-purple-400 px-3 py-1.5 rounded-full border border-purple-500/30">v16.7</span>
</header>

<nav id="main-nav">
    <div onclick="setView('inicio')" class="btn-nav active" id="n-inicio">🏠 Inicio</div>
    <div onclick="setView('ventas')" class="btn-nav" id="n-ventas">💵 Ventas</div>
    <div onclick="setView('compras')" class="btn-nav" id="n-compras">🛒 Compras</div>
    <div onclick="setView('gastos')" class="btn-nav" id="n-gastos">💸 Gastos</div>
    <div onclick="setView('inventario')" class="btn-nav" id="n-inventario">📦 Stock</div>
    <div onclick="setView('reportes')" class="btn-nav" id="n-reportes">📊 Análisis</div>
    <div onclick="setView('cobros')" class="btn-nav" id="n-cobros">⏳ Cuentas</div>
</nav>

<div id="app" class="p-4 max-w-2xl mx-auto"></div>

<div id="bill-modal">
    <div class="bill-card shadow-2xl">
        <div class="text-center">
            <span class="text-4xl">👻</span>
            <h2 class="text-xl font-black italic uppercase tracking-tighter mt-1">GhostPrint <span class="text-purple-600">PRO</span></h2>
            <p id="b-fecha" class="text-[9px] font-black text-gray-400 uppercase"></p>
        </div>
        <div class="border-t-2 dashed border-gray-200 my-4"></div>
        <p class="text-[9px] uppercase font-black text-gray-400">Cliente:</p>
        <p id="b-cli" class="text-lg font-black uppercase text-gray-800 mb-4"></p>
        <p class="text-[9px] uppercase font-black text-gray-400">Saldo Pendiente:</p>
        <p id="b-monto" class="text-4xl font-black text-purple-700"></p>
        <div class="border-t-2 dashed border-gray-200 my-4"></div>
        <p class="text-[8px] text-center font-bold text-gray-400">Guatire, Miranda</p>
    </div>
    <div class="max-w-[350px] mx-auto mt-4 space-y-2">
        <button id="btn-wa" class="btn-main !from-green-600 !to-green-800 flex justify-center items-center gap-2 italic font-black">📱 ENVIAR WHATSAPP</button>
        <button onclick="closeBill()" class="btn-main !from-gray-800 !to-black text-xs">CERRAR</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI",
        authDomain: "ghost-print-contabilidad.firebaseapp.com",
        projectId: "ghost-print-contabilidad",
        storageBucket: "ghost-print-contabilidad.firebasestorage.app",
        messagingSenderId: "867057362556",
        appId: "1:867057362556:web:6bd2a461817219a4000bf9"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const docRef = db.collection("sistema").doc("datos_principales");

    window.state = JSON.parse(localStorage.getItem('gp_v16_7')) || { ventas: [], gastos: [], inventario: {}, serviciosExtra: ["OJALETES", "DISEÑO", "MONTAJE", "CORTE"], comprasInversion: [] };
    window.currentView = "inicio";
    let cart = [];

    window.sync = async function() {
        localStorage.setItem('gp_v16_7', JSON.stringify(window.state));
        await docRef.set(window.state).catch(e => console.log("Offline"));
    };

    docRef.onSnapshot(doc => { if(doc.exists) { window.state = doc.data(); render(); } });

    window.setView = function(v) {
        window.currentView = v;
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
        document.getElementById('n-' + v).classList.add('active');
        render();
    };

    window.render = function() {
        const app = document.getElementById("app");
        const mesActual = new Date().getMonth();
        const anioActual = new Date().getFullYear();
        
        const filterDate = (arr) => (arr || []).filter(i => { const d = new Date(i.id); return d.getMonth() === mesActual && d.getFullYear() === anioActual; });
        const vM = filterDate(window.state.ventas);
        const gM = filterDate(window.state.gastos);
        const cM = filterDate(window.state.comprasInversion);

        const totalVendido = vM.reduce((a, b) => a + (Number(b.total) || 0), 0);
        const totalCobrado = vM.reduce((a, b) => a + (Number(b.abonado) || (b.pagado ? b.total : 0)), 0);
        const totalGastos = gM.reduce((a, b) => a + (Number(b.amount) || 0), 0);
        const totalInversion = cM.reduce((a, b) => a + (Number(b.amount) || 0), 0);
        const utilidadReal = totalCobrado - totalGastos - totalInversion;
        const pendiente = totalVendido - totalCobrado;

        if(window.currentView === "inicio") {
            const maxVal = Math.max(totalVendido, totalCobrado, (totalGastos+totalInversion), 1);
            app.innerHTML = `
                <div class="card-pro !bg-gradient-to-br !from-purple-600 !to-indigo-900 border-none shadow-[0_10px_30px_rgba(124,58,237,0.3)]">
                    <p class="text-[10px] font-black text-purple-200 uppercase tracking-widest text-center">Saldo Disponible en Mano</p>
                    <h2 class="text-6xl font-black text-white italic text-center my-2">$${utilidadReal.toFixed(2)}</h2>
                </div>

                <div class="card-pro border-white/5">
                    <p class="text-[10px] font-black opacity-40 uppercase mb-4 tracking-tighter">Movimiento Mensual</p>
                    <div class="bar-container">
                        <div class="bar-item"><div class="bar-fill bg-purple-500 shadow-[0_0_15px_#7c3aed]" style="height:${(totalVendido/maxVal)*100}%" data-val="$${totalVendido.toFixed(0)}"></div><span class="text-[8px] mt-2 font-black opacity-50">VENDIDO</span></div>
                        <div class="bar-item"><div class="bar-fill bg-green-500 shadow-[0_0_15px_#22c55e]" style="height:${(totalCobrado/maxVal)*100}%" data-val="$${totalCobrado.toFixed(0)}"></div><span class="text-[8px] mt-2 font-black opacity-50">COBRADO</span></div>
                        <div class="bar-item"><div class="bar-fill bg-red-500 shadow-[0_0_15px_#ef4444]" style="height:${((totalGastos+totalInversion)/maxVal)*100}%" data-val="$${(totalGastos+totalInversion).toFixed(0)}"></div><span class="text-[8px] mt-2 font-black opacity-50">SALIDAS</span></div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="card-pro !mb-0 border-l-4 border-amber-500"><p class="text-[9px] font-bold opacity-40 uppercase">Por Cobrar</p><b class="text-2xl font-black text-amber-500">$${pendiente.toFixed(2)}</b></div>
                    <div class="card-pro !mb-0 border-l-4 border-blue-400"><p class="text-[9px] font-bold opacity-40 uppercase">Inversión</p><b class="text-2xl font-black text-blue-400">$${totalInversion.toFixed(2)}</b></div>
                </div>
            `;
        }

        if(window.currentView === "reportes") {
            app.innerHTML = `
                <div class="card-pro border-none bg-gradient-to-r from-[#1a1a3a] to-[#0a0a1a]">
                    <h3 class="text-xl font-black italic uppercase text-white mb-6 border-b border-white/10 pb-2">Reporte Ejecutivo</h3>
                    <div class="space-y-4">
                        <div class="flex justify-between items-center"><span class="text-xs font-bold opacity-60">UTILIDAD LIMPIA</span><b class="text-2xl font-black text-green-500">$${utilidadReal.toFixed(2)}</b></div>
                        <div class="flex justify-between items-center"><span class="text-xs font-bold opacity-60">TOTAL COBRADO</span><b class="text-lg font-black">$${totalCobrado.toFixed(2)}</b></div>
                        <div class="flex justify-between items-center"><span class="text-xs font-bold opacity-60">GASTOS OPERATIVOS</span><b class="text-lg font-black text-red-400">-$${totalGastos.toFixed(2)}</b></div>
                        <div class="flex justify-between items-center"><span class="text-xs font-bold opacity-60">MATERIAL EN STOCK</span><b class="text-lg font-black text-blue-400">-$${totalInversion.toFixed(2)}</b></div>
                    </div>
                    <div class="mt-8 p-4 bg-white/5 rounded-2xl border border-white/10">
                        <p class="text-[10px] font-black uppercase text-purple-400 mb-1">Rendimiento Mensual</p>
                        <div class="w-full bg-white/10 h-2 rounded-full overflow-hidden">
                            <div class="bg-purple-500 h-full" style="width: ${(totalCobrado/Math.max(totalVendido,1))*100}%"></div>
                        </div>
                        <p class="text-[9px] mt-2 font-bold opacity-50">Has cobrado el ${((totalCobrado/Math.max(totalVendido,1))*100).toFixed(0)}% de lo vendido este mes.</p>
                    </div>
                </div>
            `;
        }

        // --- VISTAS RESTANTES (Ventas, Compras, Gastos, Inventario, Cobros) ---
        // Se mantienen con su código funcional original intacto
        if(window.currentView === "ventas") {
            app.innerHTML = `<div class="card-pro"><h2 class="text-lg font-black text-white mb-4 uppercase text-center italic">Nueva Venta</h2><input type="date" id="fV" value="${new Date().toISOString().split('T')[0]}"><input id="cli" placeholder="CLIENTE"><input id="tel" type="number" placeholder="WHATSAPP"><div class="bg-white/5 p-4 rounded-xl mt-3 border border-white/10"><div class="grid grid-cols-2 gap-2"><select id="pS"><option value="">Material...</option>${Object.keys(window.state.inventario || {}).filter(k=>!k.includes('TINTA')).map(m=>`<option value="${m}">${m}</option>`).join("")}</select><select id="sS"><option value="">Servicio...</option>${(window.state.serviciosExtra || []).map(s=>`<option value="${s}">${s}</option>`).join("")}</select></div><input id="qV" type="number" placeholder="Metros/Cant" value="1"><select id="tC" onchange="document.getElementById('pL').classList.toggle('hidden', this.value !== 'libre')"><option value="detal">DETAL ($9)</option><option value="mayor">MAYOR ($10)</option><option value="libre">PRECIO LIBRE</option></select><input id="pL" class="hidden" type="number" placeholder="Monto $"><button onclick="addCart()" class="btn-main !p-3 mt-3">+ Añadir</button></div><div id="cart-list" class="mt-4 space-y-2 text-[10px]"></div><div id="total-disp" class="text-4xl font-black text-center my-6 text-white italic underline decoration-purple-600">Total: $0.00</div><button onclick="finalizarVenta()" class="btn-main uppercase">Guardar Venta</button></div>`;
        }
        if(window.currentView === "compras") {
            app.innerHTML = `<div class="card-pro border-t-4 border-blue-500"><h2 class="text-lg font-black text-white mb-4 uppercase text-center italic">Carga Stock</h2><input type="date" id="fC" value="${new Date().toISOString().split('T')[0]}"><select id="mInv"><option value="">Material...</option>${Object.keys(window.state.inventario || {}).map(m=>`<option value="${m}">${m}</option>`).join("")}</select><div class="grid grid-cols-2 gap-2"><input id="qInv" type="number" placeholder="Cant"><input id="pInv" type="number" placeholder="Precio"></div><button onclick="saveInv()" class="btn-main mt-4">Guardar</button></div><div class="space-y-2">${cM.reverse().map(c => `<div class="card-pro !py-3 flex justify-between items-center border-l-2 border-blue-800"><div><p class="text-[8px] opacity-40">${new Date(c.id).toLocaleDateString()}</p><b class="text-xs uppercase">${c.material}</b></div><b class="text-blue-400">$${c.amount.toFixed(2)}</b></div>`).join("")}</div>`;
        }
        if(window.currentView === "gastos") {
            app.innerHTML = `<div class="card-pro border-t-4 border-red-500"><h2 class="text-lg font-black text-white mb-4 uppercase text-center italic">Nuevo Gasto</h2><input type="date" id="fG" value="${new Date().toISOString().split('T')[0]}"><input id="dG" placeholder="Descripción"><input id="aG" type="number" placeholder="Monto $"><button onclick="saveGasto()" class="btn-main mt-4 !bg-red-600">Guardar</button></div><div class="space-y-2">${gM.reverse().map(g => `<div class="card-pro !py-3 flex justify-between items-center border-l-2 border-red-900"><div><p class="text-[8px] opacity-40">${new Date(g.id).toLocaleDateString()}</p><b class="text-xs uppercase">${g.desc}</b></div><b class="text-red-400">-$${g.amount.toFixed(2)}</b></div>`).join("")}</div>`;
        }
        if(window.currentView === "inventario") {
            app.innerHTML = `<h2 class="text-2xl font-black italic uppercase mb-4 px-2">Stock</h2><div class="grid grid-cols-1 gap-3">${Object.entries(window.state.inventario || {}).map(([n, i])=>`<div class="card-pro flex justify-between items-center border-l-4 border-blue-600"><div><p class="text-[9px] font-black text-blue-400 uppercase">${n}</p><h4 class="text-3xl font-black text-white">${(i.stock || 0).toFixed(2)}</h4></div><div class="flex gap-2"><button onclick="editMatInv('${n}')" class="bg-white/5 p-3 rounded-xl">✏️</button><button onclick="delMatInv('${n}')" class="bg-red-500/10 p-3 rounded-xl text-red-500">🗑️</button></div></div>`).join("")}</div><div class="card-pro mt-4"><input id="newM" placeholder="Nuevo Item..."><button onclick="addMat()" class="btn-main !p-3">Crear Item</button></div>`;
        }
        if(window.currentView === "cobros") {
            let d = (window.state.ventas || []).filter(v => !v.pagado);
            app.innerHTML = d.map(v => `<div class="card-pro flex justify-between items-center border-l-4 border-amber-500"><div><b class="text-xs uppercase font-black">${v.cliente}</b><br><span class="text-red-400 text-[10px] font-black italic">Debe: $${(v.total - (v.abonado || 0)).toFixed(2)}</span></div><div class="flex gap-2"><button onclick="showBill('${v.cliente}', ${(v.total-(v.abonado||0))}, '${v.telefono}')" class="bg-green-600 p-3 rounded-2xl">📋</button><button onclick="abono(${v.id})" class="bg-blue-600 px-4 py-2 rounded-2xl text-[10px] font-black">Abonar</button></div></div>`).join("") || '<p class="text-center py-20 opacity-30 font-black">SIN PENDIENTES</p>';
        }
    };

    // --- FUNCIONES LÓGICAS (No cambiaron, se mantienen 100% funcionales) ---
    window.showBill = (cliente, monto, telf) => {
        const ahora = new Date();
        const fechaStr = ahora.toLocaleDateString() + " " + ahora.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        document.getElementById('b-cli').innerText = cliente;
        document.getElementById('b-monto').innerText = "$" + monto.toFixed(2);
        document.getElementById('b-fecha').innerText = fechaStr;
        document.getElementById('bill-modal').style.display = 'block';
        document.getElementById('btn-wa').onclick = () => {
            const msg = `*GHOSTPRINT PRO*%0A*Fecha:* ${fechaStr}%0A*Cliente:* ${cliente}%0A*Saldo:* $${monto.toFixed(2)}%0AFavor reportar captura.`;
            window.open(`https://api.whatsapp.com/send?phone=${telf}&text=${msg}`, '_blank');
        };
    };
    window.closeBill = () => { document.getElementById('bill-modal').style.display = 'none'; };
    window.saveInv = async () => { const m = document.getElementById("mInv").value, q = parseFloat(document.getElementById("qInv").value), p = parseFloat(document.getElementById("pInv").value), f = document.getElementById("fC").value; if(m && q && p) { window.state.inventario[m].stock += q; if(!window.state.comprasInversion) window.state.comprasInversion = []; window.state.comprasInversion.push({ id: new Date(f+"T12:00:00").getTime(), material: m, amount: (q * p), qty: q }); await window.sync(); setView('inicio'); } };
    window.saveGasto = async () => { const d = document.getElementById("dG").value, a = parseFloat(document.getElementById("aG").value), f = document.getElementById("fG").value; if(d && a) { if(!window.state.gastos) window.state.gastos = []; window.state.gastos.push({ id: new Date(f+"T12:00:00").getTime(), desc: d.toUpperCase(), amount: a }); await window.sync(); setView('inicio'); } };
    window.finalizarVenta = async () => { let cli = document.getElementById("cli").value, tel = document.getElementById("tel").value, fec = document.getElementById("fV").value; if(!cli || !cart.length) return; cart.forEach(c => { if(c.mat && window.state.inventario[c.mat]) window.state.inventario[c.mat].stock -= c.qtyV; Object.keys(window.state.inventario).forEach(key => { if(key.includes("TINTA")) window.state.inventario[key].stock -= (c.qtyV / 300); }); }); window.state.ventas.push({ id: new Date(fec+"T12:00:00").getTime(), cliente: cli.toUpperCase(), telefono: tel, total: cart.reduce((a,b)=>a+b.p,0), abonado: 0, pagado: false }); await window.sync(); cart = []; setView('inicio'); };
    window.addMat = async () => { let n = document.getElementById("newM").value.toUpperCase(); if(n) { if(!window.state.inventario) window.state.inventario = {}; window.state.inventario[n] = {stock: 0}; await window.sync(); render(); } };
    window.delMatInv = async (n) => { if(confirm(`Eliminar ${n}?`)){ delete window.state.inventario[n]; await window.sync(); render(); } };
    window.editMatInv = async (old) => { let n = prompt("Nuevo nombre:", old); if(n) { window.state.inventario[n.toUpperCase()] = window.state.inventario[old]; delete window.state.inventario[old]; await window.sync(); render(); } };
    window.addCart = () => { let m = document.getElementById("pS").value, s = document.getElementById("sS").value, q = parseFloat(document.getElementById("qV").value) || 1, t = document.getElementById("tC").value; let p = (t === "detal") ? 9 : (t === "mayor") ? 10 : parseFloat(document.getElementById("pL").value) || 0; let d = (m && s) ? m + " + " + s : m || s; if(d) { cart.push({ d, p: (p*q), mat: m, qtyV: q }); renderCart(); } };
    function renderCart() { document.getElementById("cart-list").innerHTML = cart.map((c, i) => `<div class="flex justify-between py-1"><span>${c.d} (${c.qtyV}m)</span><b>$${c.p} <button onclick="cart.splice(${i},1);renderCart()" class="text-red-500">×</button></b></div>`).join(""); document.getElementById("total-disp").innerText = "Total: $" + cart.reduce((a,b)=>a+b.p,0).toFixed(2); }
    window.abono = async (id) => { let v = window.state.ventas.find(x => x.id === id); let m = parseFloat(prompt(`Saldo: $${(v.total-v.abonado).toFixed(2)}. Abona?`)); if(m) { v.abonado = (v.abonado||0) + m; if(v.abonado >= v.total) v.pagado = true; await window.sync(); render(); } };

    render();
</script>
</body>
</html>
