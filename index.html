<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GhostPrint PRO v18.4 - Full Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { background-color: #030308; color: #f8fafc; font-family: 'Inter', sans-serif; padding-bottom: 100px; }
        .card-pro { background: #111122; border: 1px solid #2d2d44; border-radius: 24px; padding: 20px; margin-bottom: 12px; }
        nav { background: rgba(10, 10, 20, 0.95); display: flex; gap: 8px; overflow-x: auto; padding: 14px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #334155; }
        .btn-nav { background: #1e1e30; color: #64748b; padding: 12px 18px; border-radius: 14px; font-size: 10px; font-weight: 800; white-space: nowrap; cursor: pointer; text-transform: uppercase; }
        .active { background: #7c3aed !important; color: white !important; box-shadow: 0 0 20px rgba(124, 58, 237, 0.4); }
        input, select { background: #070712; border: 1px solid #334155; color: white; padding: 14px; border-radius: 14px; width: 100%; margin: 6px 0; font-weight: 700; outline: none; }
        .btn-main { background: linear-gradient(135deg, #7c3aed 0%, #4c1d95 100%); color: white; padding: 18px; border-radius: 18px; width: 100%; font-weight: 900; text-transform: uppercase; cursor: pointer; border: none; }
        .bar-container { display: flex; align-items: flex-end; gap: 8px; height: 100px; padding: 10px; background: rgba(255,255,255,0.02); border-radius: 20px; }
        .bar-item { flex: 1; display: flex; flex-direction: column; align-items: center; height: 100%; justify-content: flex-end; }
        .bar-fill { width: 100%; border-radius: 6px; min-height: 4px; transition: height 1s ease; position: relative; }
        .bar-fill::after { content: attr(data-val); position: absolute; top: -20px; left: 50%; transform: translateX(-50%); font-size: 10px; font-weight: 900; color: white; white-space: nowrap; }
    </style>
</head>
<body>

<header class="p-5 bg-[#0a0a1a] border-b border-white/5 flex justify-between items-center">
    <div class="flex items-center">
        <span class="text-2xl mr-2">👻</span>
        <h1 class="text-xl font-black italic text-white uppercase tracking-tighter">GhostPrint <span class="text-purple-500">PRO</span></h1>
    </div>
</header>

<nav id="main-nav">
    <div onclick="setView('inicio')" class="btn-nav active" id="n-inicio">🏠 Inicio</div>
    <div onclick="setView('ventas')" class="btn-nav" id="n-ventas">💵 Ventas</div>
    <div onclick="setView('inventario')" class="btn-nav" id="n-inventario">📦 Stock</div>
    <div onclick="setView('reportes')" class="btn-nav" id="n-reportes">📊 Análisis</div>
    <div onclick="setView('cobros')" class="btn-nav" id="n-cobros">⏳ Cuentas</div>
    <div onclick="setView('gastos')" class="btn-nav" id="n-gastos">💸 Gastos</div>
    <div onclick="setView('compras')" class="btn-nav" id="n-compras">🛒 Carga</div>
    <div onclick="setView('catalogo')" class="btn-nav" id="n-catalogo">⚙️ Config</div>
</nav>

<div id="app" class="p-4 max-w-2xl mx-auto"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI",
        authDomain: "ghost-print-contabilidad.firebaseapp.com",
        projectId: "ghost-print-contabilidad",
        storageBucket: "ghost-print-contabilidad.firebasestorage.app",
        messagingSenderId: "867057362556",
        appId: "1:867057362556:web:6bd2a461817219a4000bf9"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const docRef = db.collection("sistema").doc("datos_principales");

    window.state = JSON.parse(localStorage.getItem('gp_v18_4')) || { ventas: [], gastos: [], inventario: {}, serviciosExtra: ["OJALETES", "DISEÑO", "MONTAJE", "CORTE"], comprasInversion: [], mermas: [] };
    window.currentView = "inicio";
    let cart = [];

    window.sync = async function() {
        localStorage.setItem('gp_v18_4', JSON.stringify(window.state));
        await docRef.set(window.state).catch(e => console.log("Offline"));
    };

    docRef.onSnapshot(doc => { if(doc.exists) { window.state = doc.data(); render(); } });

    window.setView = function(v) {
        window.currentView = v;
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
        const activeNav = document.getElementById('n-' + v);
        if(activeNav) activeNav.classList.add('active');
        render();
    };

    window.render = function() {
        const app = document.getElementById("app");
        const mesActual = new Date().getMonth();
        const anioActual = new Date().getFullYear();
        
        const filterDate = (arr) => (arr || []).filter(i => { const d = new Date(i.id); return d.getMonth() === mesActual && d.getFullYear() === anioActual; });
        const vM = filterDate(window.state.ventas);
        const gM = filterDate(window.state.gastos);
        const cM = filterDate(window.state.comprasInversion);

        const totalVendido = vM.reduce((a, b) => a + (Number(b.total) || 0), 0);
        const totalCobrado = vM.reduce((a, b) => a + (Number(b.abonado) || (b.pagado ? b.total : 0)), 0);
        const totalGastos = gM.reduce((a, b) => a + (Number(b.amount) || 0), 0);
        const totalStock = cM.reduce((a, b) => a + (Number(b.amount) || 0), 0);
        const porCobrar = totalVendido - totalCobrado;
        const utilidadCaja = totalCobrado - totalGastos - totalStock;

        if(window.currentView === "inicio") {
            const maxVal = Math.max(totalVendido, totalCobrado, totalStock, totalGastos, 1);
            app.innerHTML = `
                <div class="card-pro !bg-gradient-to-br !from-purple-600 !to-indigo-900 border-none shadow-xl">
                    <p class="text-[10px] font-black text-purple-200 uppercase tracking-widest text-center italic">Caja Disponible</p>
                    <h2 class="text-6xl font-black text-white italic text-center my-2 leading-none">$${utilidadCaja.toFixed(2)}</h2>
                </div>
                <div class="card-pro">
                    <div class="bar-container">
                        <div class="bar-item"><div class="bar-fill bg-purple-500" style="height:${(totalVendido/maxVal)*100}%" data-val="$${totalVendido.toFixed(0)}"></div><span class="text-[9px] mt-2 font-black uppercase">Ventas</span></div>
                        <div class="bar-item"><div class="bar-fill bg-green-500" style="height:${(totalCobrado/maxVal)*100}%" data-val="$${totalCobrado.toFixed(0)}"></div><span class="text-[9px] mt-2 font-black uppercase">Cobros</span></div>
                        <div class="bar-item"><div class="bar-fill bg-blue-500" style="height:${(totalStock/maxVal)*100}%" data-val="$${totalStock.toFixed(0)}"></div><span class="text-[9px] mt-2 font-black uppercase">Stock</span></div>
                        <div class="bar-item"><div class="bar-fill bg-red-500" style="height:${(totalGastos/maxVal)*100}%" data-val="$${totalGastos.toFixed(0)}"></div><span class="text-[9px] mt-2 font-black uppercase">Gastos</span></div>
                    </div>
                </div>`;
        }

        if(window.currentView === "inventario") {
            const stockBajo = Object.entries(window.state.inventario).filter(([n, i]) => i.stock < 5);
            app.innerHTML = `
                ${stockBajo.length > 0 ? `<div class="bg-red-600/20 border border-red-600 p-3 rounded-2xl mb-4 text-red-500 font-black text-[10px] uppercase text-center italic">🚨 ¡REPONER MATERIAL PRONTO! (${stockBajo.length} ALERTAS)</div>` : ''}
                <div class="space-y-3">
                    ${Object.entries(window.state.inventario || {}).map(([n, i]) => `
                        <div class="card-pro border-l-4 ${i.stock < 5 ? 'border-red-600' : 'border-green-500'}">
                            <div class="flex justify-between items-center">
                                <div><p class="text-[9px] font-black uppercase opacity-50">${n}</p><h4 class="text-3xl font-black text-white">${(i.stock || 0).toFixed(2)}</h4></div>
                                <div class="flex gap-2">
                                    <button onclick="registrarMerma('${n}')" class="bg-red-600/20 text-red-500 p-2 rounded-xl text-[10px] font-black">⚠ MERMA</button>
                                    <button onclick="editMatInv('${n}')" class="bg-white/5 p-2 rounded-xl text-[10px] font-black">EDITAR</button>
                                    <button onclick="delMatInv('${n}')" class="bg-white/5 p-2 rounded-xl text-[10px] font-black text-red-400">X</button>
                                </div>
                            </div>
                            <div class="w-full bg-white/5 h-1.5 mt-3 rounded-full overflow-hidden"><div class="${i.stock < 5 ? 'bg-red-500' : 'bg-green-500'} h-full" style="width: ${Math.min(i.stock*10, 100)}%"></div></div>
                        </div>
                    `).join("")}
                </div>`;
        }

        if(window.currentView === "reportes") {
            const percMeta = totalGastos > 0 ? Math.min((totalCobrado / totalGastos) * 100, 100) : 0;
            app.innerHTML = `
                <div class="space-y-4">
                    <div class="card-pro">
                        <h3 class="text-[10px] font-black uppercase text-purple-400 mb-4 italic">Meta: Gastos vs Cobros</h3>
                        <div class="flex justify-between mb-2 font-black text-xl italic"><span>$${totalCobrado.toFixed(0)} / $${totalGastos.toFixed(0)}</span><span>${percMeta.toFixed(0)}%</span></div>
                        <div class="w-full bg-white/5 h-3 rounded-full overflow-hidden"><div class="bg-purple-600 h-full" style="width: ${percMeta}%"></div></div>
                    </div>
                    <div class="card-pro">
                        <p class="text-[9px] font-black uppercase opacity-40 mb-2">Últimos Gastos (Mes)</p>
                        ${gM.slice(-3).reverse().map(g => `<div class="flex justify-between text-xs py-1 border-b border-white/5"><span>${g.desc}</span><b>$${g.amount}</b></div>`).join("")}
                    </div>
                    <div class="card-pro">
                        <p class="text-[9px] font-black uppercase opacity-40 mb-2">Última Inversión Stock (Mes)</p>
                        ${cM.slice(-3).reverse().map(c => `<div class="flex justify-between text-xs py-1 border-b border-white/5"><span>${c.material}</span><b>$${c.amount}</b></div>`).join("")}
                    </div>
                </div>`;
        }

        if(window.currentView === "gastos") {
            app.innerHTML = `<div class="card-pro border-t-4 border-red-500"><h2 class="text-lg font-black uppercase mb-4 italic">Nuevo Gasto</h2><input type="date" id="fG" value="${new Date().toISOString().split('T')[0]}"><input id="dG" placeholder="Descripción"><input id="aG" type="number" placeholder="Monto $"><button onclick="saveGasto()" class="btn-main mt-4 !bg-red-600">Guardar Gasto</button></div><p class="text-[10px] font-black opacity-30 uppercase ml-2 mb-2">Historial Completo</p><div class="space-y-2">${(window.state.gastos || []).slice(-10).reverse().map(g => `<div class="card-pro !py-3 flex justify-between items-center border-l-2 border-red-500 text-[11px]"><div><b class="uppercase">${g.desc}</b></div><b>-$${g.amount.toFixed(2)}</b></div>`).join("")}</div>`;
        }
        if(window.currentView === "compras") {
            app.innerHTML = `<div class="card-pro border-t-4 border-blue-500"><h2 class="text-lg font-black uppercase mb-4 italic">Carga de Stock</h2><input type="date" id="fC" value="${new Date().toISOString().split('T')[0]}"><select id="mInv"><option value="">Material...</option>${Object.keys(window.state.inventario || {}).map(m=>`<option value="${m}">${m}</option>`).join("")}</select><div class="grid grid-cols-2 gap-2"><input id="qInv" type="number" placeholder="Cant"><input id="pInv" type="number" placeholder="Precio Un."></div><button onclick="saveInv()" class="btn-main mt-4">Guardar Stock</button></div><p class="text-[10px] font-black opacity-30 uppercase ml-2 mb-2">Historial Compras</p><div class="space-y-2">${(window.state.comprasInversion || []).slice(-10).reverse().map(c => `<div class="card-pro !py-3 flex justify-between items-center border-l-2 border-blue-500 text-[11px]"><div><b class="uppercase">${c.material} (${c.qty})</b></div><b>$${c.amount.toFixed(2)}</b></div>`).join("")}</div>`;
        }
        if(window.currentView === "ventas") {
            app.innerHTML = `<div class="card-pro"><h2 class="text-lg font-black uppercase italic mb-4">Venta</h2><input id="cli" placeholder="CLIENTE"><input id="tel" type="number" placeholder="WHATSAPP"><div class="bg-white/5 p-4 rounded-xl mt-3"><div class="grid grid-cols-2 gap-2"><select id="pS"><option value="">Material...</option>${Object.keys(window.state.inventario || {}).map(m=>`<option value="${m}">${m}</option>`).join("")}</select><select id="sS"><option value="">Servicio...</option>${(window.state.serviciosExtra || []).map(s=>`<option value="${s}">${s}</option>`).join("")}</select></div><input id="qV" type="number" placeholder="Cantidad" value="1"><button onclick="addCart()" class="btn-main !p-3 mt-3">+ Añadir</button></div><div id="cart-list" class="mt-4 space-y-1 text-[10px]"></div><div id="total-disp" class="text-4xl font-black text-center my-6 italic">$0.00</div><button onclick="finalizarVenta()" class="btn-main">Guardar</button></div>`;
        }
    };

    // FUNCIONES CORE RESTAURADAS
    window.delMatInv = async (n) => { if(confirm(`Eliminar ${n}?`)){ delete window.state.inventario[n]; await window.sync(); render(); } };
    window.editMatInv = async (old) => { let n = prompt("Nuevo nombre:", old); if(n) { window.state.inventario[n.toUpperCase()] = window.state.inventario[old]; delete window.state.inventario[old]; await window.sync(); render(); } };
    window.saveInv = async () => { const m = document.getElementById("mInv").value, q = parseFloat(document.getElementById("qInv").value), p = parseFloat(document.getElementById("pInv").value), f = document.getElementById("fC").value; if(m && q && p) { if(!window.state.inventario[m]) window.state.inventario[m] = {stock:0}; window.state.inventario[m].stock += q; if(!window.state.comprasInversion) window.state.comprasInversion = []; window.state.comprasInversion.push({ id: new Date(f+"T12:00:00").getTime(), material: m, amount: (q * p), qty: q }); await window.sync(); setView('inicio'); } };
    window.saveGasto = async () => { const d = document.getElementById("dG").value, a = parseFloat(document.getElementById("aG").value), f = document.getElementById("fG").value; if(d && a) { if(!window.state.gastos) window.state.gastos = []; window.state.gastos.push({ id: new Date(f+"T12:00:00").getTime(), desc: d.toUpperCase(), amount: a }); await window.sync(); setView('inicio'); } };
    window.registrarMerma = async (material) => { let cant = parseFloat(prompt(`Merma de ${material}:`)); if(cant > 0) { window.state.inventario[material].stock -= cant; await window.sync(); render(); } };
    window.addMat = async () => { let n = document.getElementById("newM").value.toUpperCase(); if(n) { if(!window.state.inventario) window.state.inventario = {}; window.state.inventario[n] = {stock: 0}; await window.sync(); render(); } };
    window.addServicio = async () => { let s = document.getElementById("newS").value.toUpperCase(); if(s) { if(!window.state.serviciosExtra) window.state.serviciosExtra = []; window.state.serviciosExtra.push(s); await window.sync(); render(); } };
    window.addCart = () => { let m = document.getElementById("pS").value, s = document.getElementById("sS").value, q = parseFloat(document.getElementById("qV").value) || 1; let d = (m && s) ? m + " + " + s : m || s; if(d) { cart.push({ d, p: (9*q), mat: m, qtyV: q }); renderCart(); } };
    function renderCart() { document.getElementById("cart-list").innerHTML = cart.map((c, i) => `<div class="flex justify-between"><span>${c.d}</span><b>$${c.p}</b></div>`).join(""); document.getElementById("total-disp").innerText = "$" + cart.reduce((a,b)=>a+b.p,0).toFixed(2); }
    window.finalizarVenta = async () => { let cli = document.getElementById("cli").value; if(!cli || !cart.length) return; cart.forEach(c => { if(c.mat) window.state.inventario[c.mat].stock -= c.qtyV; }); window.state.ventas.push({ id: Date.now(), cliente: cli.toUpperCase(), total: cart.reduce((a,b)=>a+b.p,0), abonado: 0, pagado: false }); await window.sync(); cart = []; setView('inicio'); };

    render();
</script>
</body>
</html>
