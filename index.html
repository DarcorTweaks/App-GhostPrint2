<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GhostPrint PRO FINAL</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { background:#030308; color:white; font-family:Inter; }
.card { background:#111122; padding:15px; border-radius:15px; margin-bottom:10px; }
.btn { background:#7c3aed; padding:12px; border-radius:12px; width:100%; font-weight:bold; }
</style>
</head>

<body>

<div class="p-4 text-center text-purple-400 font-black text-2xl">
👻 GHOSTPRINT PRO
</div>

<div id="app" class="p-4"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

// 🔥 FIREBASE
const firebaseConfig = {
apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI",
authDomain: "ghost-print-contabilidad.firebaseapp.com",
projectId: "ghost-print-contabilidad"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const docRef = db.collection("sistema").doc("datos_principales");

// 🔥 STATE
window.state = JSON.parse(localStorage.getItem('gp_v21_4')) || {
ventas: [],
gastos: [],
inventario: {},
serviciosExtra: ["DISEÑO","MONTAJE"],
comprasInversion: []
};

// 🔥 SYNC
window.sync = async ()=>{
localStorage.setItem('gp_v21_4', JSON.stringify(window.state));
await docRef.set(window.state);
};

docRef.onSnapshot(doc=>{
if(doc.exists){
const d = doc.data();
window.state = {
ventas: d.ventas || [],
gastos: d.gastos || [],
inventario: d.inventario || {},
serviciosExtra: d.serviciosExtra || [],
comprasInversion: d.comprasInversion || []
};
render();
}
});

// 🔥 CALCULOS PRO
function calcular(){

const v = window.state.ventas;
const g = window.state.gastos;

const totalVendido = v.reduce((a,b)=>a + Number(b.total),0);

const totalCobrado = v.reduce((a,b)=>{
return a + (b.abonado !== undefined ? Number(b.abonado) : (b.pagado ? Number(b.total) : 0));
},0);

const totalDeuda = v.filter(x=>!x.pagado)
.reduce((a,b)=>a + (b.total - (b.abonado||0)),0);

const totalGastos = g.reduce((a,b)=>a + Number(b.amount),0);

// 🔥 COSTO REAL
const costoProduccion = v.reduce((a,b)=>a + (b.costoMaterial || 0),0);

// 💰 CAJA
const caja = totalCobrado - totalGastos;

// 📈 GANANCIA REAL
const ganancia = totalCobrado - costoProduccion - totalGastos;

// 🔮 PROYECCION
const proyeccion = totalVendido - costoProduccion - totalGastos;

return {caja,ganancia,proyeccion,totalDeuda,totalVendido};
}

// 🔥 RENDER
function render(){

const d = calcular();

document.getElementById("app").innerHTML = `
<div class="card text-center">
<p class="text-sm opacity-60">CAJA REAL</p>
<h2 class="text-4xl font-black">$${d.caja.toFixed(2)}</h2>
</div>

<div class="grid grid-cols-2 gap-2">
<div class="card">
<p class="text-xs opacity-50">GANANCIA</p>
<b>$${d.ganancia.toFixed(2)}</b>
</div>

<div class="card">
<p class="text-xs opacity-50">PROYECCIÓN</p>
<b>$${d.proyeccion.toFixed(2)}</b>
</div>

<div class="card">
<p class="text-xs opacity-50">VENTAS</p>
<b>$${d.totalVendido.toFixed(2)}</b>
</div>

<div class="card">
<p class="text-xs opacity-50">DEUDA</p>
<b>$${d.totalDeuda.toFixed(2)}</b>
</div>
</div>

<div class="mt-4 space-y-2">
<button class="btn" onclick="addMat()">➕ Crear Material</button>
<button class="btn" onclick="saveInv()">🛒 Comprar Material</button>
<button class="btn" onclick="vender()">💵 Vender Servicio</button>
</div>
`;
}

// 🔥 CREAR MATERIAL
window.addMat = async ()=>{
let n = prompt("Nombre del material");
if(n){
window.state.inventario[n.toUpperCase()] = {stock:0,costo:0};
await sync(); render();
}
};

// 🔥 COMPRAS (PROMEDIO)
window.saveInv = async ()=>{
let m = prompt("Material");
let q = parseFloat(prompt("Cantidad"));
let p = parseFloat(prompt("Costo total"));

if(m && q && p){

m = m.toUpperCase();

if(!window.state.inventario[m]){
window.state.inventario[m] = {stock:0,costo:0};
}

const stock = window.state.inventario[m].stock;
const costo = window.state.inventario[m].costo;

const nuevoStock = stock + q;
const costoUnit = p/q;

const nuevoCosto = ((stock*costo)+(q*costoUnit))/nuevoStock;

window.state.inventario[m].stock = nuevoStock;
window.state.inventario[m].costo = nuevoCosto;

window.state.comprasInversion.push({
id:Date.now(),
material:m,
amount:p,
qty:q
});

await sync(); render();
}
};

// 🔥 VENTA
window.vender = async ()=>{

let cli = prompt("Cliente");
let mat = prompt("Material");
let qty = parseFloat(prompt("Cantidad"));
let precio = parseFloat(prompt("Precio venta"));

if(cli && mat && qty && precio){

mat = mat.toUpperCase();

let costoUnit = window.state.inventario[mat]?.costo || 0;
let costoTotal = costoUnit * qty;

if(window.state.inventario[mat]){
window.state.inventario[mat].stock -= qty;
}

window.state.ventas.push({
id:Date.now(),
cliente:cli,
total:precio,
abonado:precio,
pagado:true,
costoMaterial:costoTotal
});

await sync(); render();
}
};

render();

</script>
</body>
</html>
