<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>GhostPrint PRO 2026</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
    .btn{background:#6d28d9;color:white;padding:10px 16px;border-radius:10px;cursor:pointer;transition:all 0.2s;font-weight:600}
    .btn:hover{background:#5b21b6;transform:translateY(-1px);shadow:0 4px 10px rgba(109,40,217,0.3)}
    .card{background:white;padding:20px;margin:12px 0;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,0.04);border:1px solid #f1f1f1}
    input,select{border:1px solid #e2e8f0;padding:12px;margin:8px 0;border-radius:12px;width:100%;transition:border 0.2s}
    input:focus{border-color:#6d28d9;outline:none}
    label{font-size:11px;color:#94a3b8;font-weight:800;text-transform:uppercase;margin-left:4px;letter-spacing:0.05em}
    .stock-low{color:#ef4444;font-weight:bold;animation:pulse 2s infinite}
    @keyframes pulse{0%{opacity:1}50%{opacity:0.5}100%{opacity:1}}
    .hidden{display:none}
</style>
</head>
<body class="bg-slate-50 font-sans text-slate-800">

<div class="bg-gradient-to-r from-purple-800 to-indigo-700 text-white p-5 shadow-lg flex justify-between items-center sticky top-0 z-50">
    <div>
        <h1 class="text-2xl font-black tracking-tighter italic">GHOSTPRINT PRO</h1>
        <p class="text-[10px] uppercase opacity-70 font-bold tracking-widest">Control de Producción & Finanzas</p>
    </div>
    <div class="flex items-center gap-3">
        <span id="sync-status" class="bg-white/20 px-3 py-1 rounded-full text-[10px] font-bold">Sincronizando...</span>
    </div>
</div>

<div class="p-3 flex gap-2 flex-wrap bg-white/80 backdrop-blur shadow-sm sticky top-[72px] z-40 overflow-x-auto">
    <button onclick="setView('dashboard')" class="btn text-sm">Dashboard</button>
    <button onclick="setView('ventas')" class="btn text-sm bg-indigo-600">Nueva Venta</button>
    <button onclick="setView('cobranzas')" class="btn text-sm">Cobranzas</button>
    <button onclick="setView('compras')" class="btn text-sm">Catálogo/Servicios</button>
    <button onclick="setView('gastos')" class="btn text-sm">Gastos</button>
    <button onclick="setView('inventario')" class="btn text-sm">Inventario</button>
    <button onclick="setView('reporte')" class="btn text-sm">Reporte Final</button>
</div>

<div id="app" class="p-4 max-w-5xl mx-auto pb-20"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI",
    authDomain: "ghost-print-contabilidad.firebaseapp.com",
    projectId: "ghost-print-contabilidad",
    storageBucket: "ghost-print-contabilidad.firebasestorage.app",
    messagingSenderId: "867057362556",
    appId: "1:867057362556:web:6bd2a461817219a4000bf9"
};

const appF = initializeApp(firebaseConfig);
const db = getFirestore(appF);
const docRef = doc(db, "sistema", "datos_principales");

window.state = { ventas:[], gastos:[], serviciosExtra: [], inventario:{} };
window.view = "dashboard";
window.filtroDashboard = "total"; // total, mes, hoy

onSnapshot(docRef, (snap) => {
    if (snap.exists()) {
        const d = snap.data();
        window.state = { 
            ventas: d.ventas || [], 
            gastos: d.gastos || [], 
            serviciosExtra: d.serviciosExtra || [],
            inventario: d.inventario || {}
        };
        document.getElementById("sync-status").innerText = "Sincronizado ✓";
        render();
    } else { window.save(); }
});

window.save = async () => { await setDoc(docRef, window.state); };
window.setView = (v) => { window.view = v; render(); };

// --- LÓGICA DE PRECIOS ---
window.calcularTotal = () => {
    let prod = document.getElementById("producto")?.value;
    let tipo = document.getElementById("tipoCliente")?.value;
    let cant = parseFloat(document.getElementById("cantidad")?.value) || 0;
    let prec = 0;

    if (tipo === "libre") {
        document.getElementById("divPrecioLibre").classList.remove("hidden");
        prec = parseFloat(document.getElementById("precioLibreInput").value) || 0;
    } else {
        document.getElementById("divPrecioLibre").classList.add("hidden");
        // REGLA DE ORO: VINIL/BANNER -> Lineal $10 | M2 $9
        if (prod && (prod.includes("VINIL") || prod.includes("BANNER"))) {
            prec = (tipo === "mayorista_lineal") ? 10 : 9;
        } else {
            let costo = window.state.inventario[prod]?.costo || 0;
            prec = costo > 0 ? costo * 2.5 : 10;
        }
    }
    document.getElementById("total").innerText = (cant * prec).toFixed(2);
};

window.render = function() {
    let app = document.getElementById("app");
    if(!app) return;
    let html = "";

    const filtrarData = (arr) => {
        const hoy = new Date().toLocaleDateString();
        const mes = new Date().getMonth();
        if(window.filtroDashboard === 'hoy') return arr.filter(x => x.fecha === hoy);
        if(window.filtroDashboard === 'mes') return arr.filter(x => new Date(x.fecha).getMonth() === mes);
        return arr;
    };

    if(window.view === "dashboard"){
        let vF = filtrarData(window.state.ventas);
        let gF = filtrarData(window.state.gastos);
        let vT = vF.reduce((a,b) => a + b.total, 0);
        let gT = gF.reduce((a,b) => a + (b.amount || 0), 0);
        
        html = `<div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-black">📊 Balance General</h2>
            <select class="w-auto p-2 text-xs font-bold bg-purple-100 border-none" onchange="window.filtroDashboard=this.value; render()">
                <option value="total" ${window.filtroDashboard=='total'?'selected':''}>Todo el tiempo</option>
                <option value="mes" ${window.filtroDashboard=='mes'?'selected':''}>Este Mes</option>
                <option value="hoy" ${window.filtroDashboard=='hoy'?'selected':''}>Hoy solamente</option>
            </select>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="card bg-green-50">Ventas<br><b class="text-2xl text-green-700">$${vT.toFixed(2)}</b></div>
            <div class="card bg-red-50">Gastos<br><b class="text-2xl text-red-600">$${gT.toFixed(2)}</b></div>
            <div class="card bg-purple-600 text-white">Utilidad<br><b class="text-2xl">$${(vT-gT).toFixed(2)}</b></div>
        </div>
        <div class="card mt-6"><canvas id="grafica"></canvas></div>`;
        app.innerHTML = html;
        new Chart(document.getElementById("grafica"), {type:'bar', data:{labels:['Ingresos','Egresos'], datasets:[{label:'$', data:[vT, gT], backgroundColor:['#10b981','#ef4444']}]}});
        return;
    }

    if(window.view === "ventas"){
        let tItem = document.getElementById("tipoItem")?.value || "material";
        html = `<h2>💰 Registrar Operación</h2><div class="card">
            <label>Cliente</label><input id="cliente" placeholder="Nombre completo">
            <div class="grid grid-cols-2 gap-2">
                <div><label>Categoría</label><select id="tipoItem" onchange="render()"><option value="material" ${tItem=='material'?'selected':''}>Material</option><option value="servicio" ${tItem=='servicio'?'selected':''}>Servicio</option></select></div>
                <div><label>Tarifa</label><select id="tipoCliente" onchange="window.calcularTotal()"><option value="mayorista_lineal">Lineal ($10)</option><option value="detal_m2">M2 ($9)</option><option value="libre">Manual</option></select></div>
            </div>
            <div id="divPrecioLibre" class="hidden animate-pulse">
                <label>Descripción Especial</label><input id="descLibre" placeholder="Ej: Corte Laser personalizado">
                <label>Precio por unidad</label><input id="precioLibreInput" type="number" oninput="window.calcularTotal()" placeholder="0.00">
            </div>
            <label>Producto / Servicio</label>
            <select id="producto" onchange="window.calcularTotal()">${(tItem=="servicio" ? ["DISEÑO","IMPRESIÓN","INSTALACION", ...window.state.serviciosExtra] : Object.keys(window.state.inventario)).map(p=>`<option value="${p}">${p}</option>`).join("")}</select>
            <label>Cantidad</label><input id="cantidad" type="number" value="1" oninput="window.calcularTotal()">
            <div class="text-center py-6 bg-slate-900 text-white rounded-2xl my-4"><p class="text-[10px] uppercase opacity-50">Total Final</p><b class="text-4xl">$<span id="total">0.00</span></b></div>
            <button onclick="confirmarVenta()" class="btn w-full py-4 text-lg">PROCESAR VENTA</button>
        </div>
        <h3 class="font-bold text-sm text-slate-400 mt-6">HISTORIAL RECIENTE</h3>
        ${window.state.ventas.slice(-5).reverse().map(v=>`<div class="card py-3 flex justify-between items-center text-sm"><div><b>${v.cliente}</b><br><small>${v.producto}</small></div><b class="text-purple-700">$${v.total.toFixed(2)}</b></div>`).join("")}`;
    }

    if(window.view === "inventario"){
        html = `<h2>📦 Inventario Dinámico</h2>` + Object.entries(window.state.inventario).map(([k,v])=>`
        <div class="card ${v.stock < 5 ? 'border-red-300 bg-red-50' : ''}">
            <div class="flex justify-between font-bold">
                <span class="${v.stock < 5 ? 'text-red-600' : 'text-purple-800'}">${k}</span>
                <button onclick="if(confirm('¿Eliminar?')){delete window.state.inventario['${k}']; window.save();}" class="text-red-300 hover:text-red-600 text-xs">ELIMINAR</button>
            </div>
            <div class="grid grid-cols-2 gap-4 mt-2">
                <div><label>Stock</label><input id="s-${k}" value="${v.stock}" class="${v.stock < 5 ? 'stock-low' : ''}"></div>
                <div><label>Costo $</label><input id="c-${k}" value="${v.costo}"></div>
            </div>
            <button onclick="window.state.inventario['${k}'].stock=parseFloat(document.getElementById('s-${k}').value); window.state.inventario['${k}'].costo=parseFloat(document.getElementById('c-${k}').value); window.save(); alert('Stock Actualizado');" class="btn w-full mt-2 text-xs bg-slate-800">Actualizar</button>
        </div>`).join("");
    }

    if(window.view === "gastos"){
        html = `<h2>💸 Registro de Egresos</h2><div class="card"><label>Motivo</label><input id="gn" placeholder="Ej: Compra de tintas..."><label>Monto $</label><input id="ga" type="number" placeholder="0.00"><button onclick="regGasto()" class="btn w-full mt-2">Guardar Gasto</button></div>
        ${window.state.gastos.slice(-8).reverse().map(g=>`<div class="card py-3 flex justify-between text-sm"><span>${g.name}</span><b class="text-red-500">-$${g.amount.toFixed(2)}</b></div>`).join("")}`;
    }

    if(window.view === "cobranzas"){
        html = `<h2>🧾 Cobranzas Pendientes</h2>${window.state.ventas.filter(v=>!v.pagado).map(v=>`<div class="card flex justify-between items-center"><div><b>${v.cliente}</b><br><small>Saldo: $${(v.total-v.abonado).toFixed(2)}</small></div><button onclick="abonar(${v.id})" class="btn text-xs bg-indigo-500">Abonar</button></div>`).join("") || '<div class="card text-center text-slate-400 font-bold uppercase tracking-widest py-10">Todo al día ✨</div>'}`;
    }

    if(window.view === "compras") {
        html = `<h2>⚙️ Configuración</h2>
        <div class="card border-l-8 border-green-500"><h3>➕ Nuevo Servicio</h3><input id="nsv" placeholder="Ej: LAMINADO"><button onclick="if(document.getElementById('nsv').value){window.state.serviciosExtra.push(document.getElementById('nsv').value.toUpperCase()); window.save(); render();}" class="btn w-full bg-green-600 mt-2">Añadir</button></div>
        <div class="card border-l-8 border-blue-500"><h3>➕ Nuevo Material</h3><input id="nm" placeholder="Nombre"><div class="flex gap-2"><input id="ns" type="number" placeholder="Stock"><input id="nc" type="number" placeholder="Costo"></div><button onclick="registrarNuevoMat()" class="btn w-full bg-blue-600 mt-2">Crear</button></div>
        <div class="card border-l-8 border-orange-500"><h3>📥 Surtir Inventario</h3><select id="cp">${Object.keys(window.state.inventario).map(p=>`<option>${p}</option>`).join("")}</select><input id="cq" type="number" placeholder="Cantidad a sumar"><button onclick="surtir()" class="btn w-full bg-orange-500 mt-2">Añadir Stock</button></div>`;
    }

    if(window.view === "reporte"){
        let vT = window.state.ventas.reduce((a,b) => a + b.total, 0);
        let gT = window.state.gastos.reduce((a,b) => a + (b.amount || 0), 0);
        let caja = window.state.ventas.reduce((a,b) => a + (b.abonado || 0), 0) - gT;
        html = `<h2>📊 Reporte Ejecutivo</h2>
        <div class="card bg-slate-900 text-white text-center py-10 rounded-3xl shadow-2xl">
            <p class="text-[10px] uppercase tracking-[0.3em] font-bold opacity-60 mb-2">Efectivo Real en Mano</p>
            <h1 class="text-6xl font-black italic">$${caja.toFixed(2)}</h1>
        </div>
        <div class="grid grid-cols-2 gap-4 mt-4">
            <div class="card bg-white">Ventas<br><b class="text-green-600">$${vT.toFixed(2)}</b></div>
            <div class="card bg-white">Gastos<br><b class="text-red-500">-$${gT.toFixed(2)}</b></div>
        </div>`;
    }

    app.innerHTML = html;
    if(window.view === "ventas") window.calcularTotal();
};

// --- ACCIONES MEJORADAS ---
window.confirmarVenta = async () => {
    const cli = document.getElementById("cliente").value;
    const tot = parseFloat(document.getElementById("total").innerText);
    const prod = document.getElementById("producto").value;
    const tipo = document.getElementById("tipoCliente").value;
    const desc = document.getElementById("descLibre")?.value;

    if(!cli || tot <= 0) return alert("Error: Cliente o Total vacío");

    window.state.ventas.push({
        id: Date.now(),
        fecha: new Date().toLocaleDateString(),
        cliente: cli.toUpperCase(),
        producto: tipo === "libre" ? (desc || prod) : prod,
        total: tot,
        pagado: false,
        abonado: 0
    });
    
    await window.save();
    alert("¡Venta Registrada!");
    window.setView('ventas'); // Limpia el formulario
};

window.regGasto = async () => {
    let n = document.getElementById("gn").value;
    let a = parseFloat(document.getElementById("ga").value);
    if(n && a){
        window.state.gastos.push({id:Date.now(), fecha:new Date().toLocaleDateString(), name:n.toUpperCase(), amount:a});
        await window.save();
        render();
    }
};

window.abonar = async (id) => {
    let v = window.state.ventas.find(x => x.id === id);
    let m = parseFloat(prompt(`Abono para ${v.cliente} (Faltan $${(v.total-v.abonado).toFixed(2)}):`));
    if(m){
        v.abonado += m;
        if(v.abonado >= v.total) v.pagado = true;
        await window.save();
        render();
    }
};

window.registrarNuevoMat = async () => {
    let n = document.getElementById("nm").value.toUpperCase();
    if(n){
        window.state.inventario[n] = {
            stock: parseFloat(document.getElementById("ns").value) || 0,
            costo: parseFloat(document.getElementById("nc").value) || 0
        };
        await window.save(); render();
    }
};

window.surtir = async () => {
    let p = document.getElementById("cp").value;
    let q = parseFloat(document.getElementById("cq").value) || 0;
    window.state.inventario[p].stock += q;
    await window.save(); alert('Stock aumentado');
};

window.render();
</script>
</body>
</html>
