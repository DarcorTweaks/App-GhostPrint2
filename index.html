<script type="module">
// ... (resto del código igual hasta la función addItemCarrito)

window.addItemCarrito = () => {
    const p = document.getElementById("pSel").value;
    const s = document.getElementById("sSel").value;
    const t = document.getElementById("tCli").value; // "mayor", "detal" o "libre"
    const inputQty = document.getElementById("cQty");
    const cant = parseFloat(inputQty.value) || 0;
    
    if(cant <= 0) return alert("Ingresa una cantidad válida");

    let nombreItem = "";
    if(p && s) nombreItem = `${p} + ${s}`;
    else if(p) nombreItem = p;
    else if(s) nombreItem = s;
    else if(t === "libre") nombreItem = "VENTA LIBRE";
    else return alert("Selecciona material o servicio");

    let precioUnitario = 0;

    if (t === "libre") {
        precioUnitario = parseFloat(document.getElementById("pMan").value) || 0;
    } else {
        // CORRECCIÓN: Si hay un producto (p), aplicamos la tarifa elegida (9 o 10)
        // Si no hay producto pero hay servicio (s), cobramos la base de 12
        if (p && window.state.inventario[p]) {
            precioUnitario = (t === "mayor") ? 10 : 9;
        } else {
            precioUnitario = 12; // Tarifa base para servicios solos
        }
    }
    
    carritoVenta.push({ 
        nombre: nombreItem, 
        qty: cant, 
        precio: precioUnitario, 
        sub: cant * precioUnitario, 
        esProd: p ? !!window.state.inventario[p] : false,
        prodBase: p // Guardamos el nombre del producto para descontar stock luego
    });

    // Limpieza
    document.getElementById("pSel").value = "";
    document.getElementById("sSel").value = "";
    inputQty.value = "1";
    
    render();
};

window.procesarV = async () => {
    let c = document.getElementById("cliV").value;
    if(!c || carritoVenta.length === 0) return alert("Faltan datos");
    
    let total = carritoVenta.reduce((a,b)=>a+b.sub, 0);

    carritoVenta.forEach(i => { 
        if(i.esProd && i.prodBase) { 
            // Usamos prodBase para asegurar que descontamos el stock del material correcto
            if(window.state.inventario[i.prodBase]){
                window.state.inventario[i.prodBase].stock -= i.qty; 
                window.state.gastos.push({
                    id: Date.now() + Math.random(), 
                    name: `COSTO: ${i.prodBase}`, 
                    amount: (window.state.inventario[i.prodBase].costo || 0) * i.qty
                }); 
            }
        }
    });

    window.state.ventas.push({
        id: Date.now(), 
        cliente: c.toUpperCase(), 
        telefono: document.getElementById("telV").value, 
        total: total, 
        abonado: 0, 
        pagado: false, 
        items: [...carritoVenta]
    });

    carritoVenta = []; 
    await window.save(); 
    setView('cobranzas');
};
// ... (resto del código igual)
</script>
