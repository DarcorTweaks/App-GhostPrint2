<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostPrint ERP v3 - Nebula Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background-color: #0d0d1a;
            background-image: radial-gradient(at 10% 10%, rgba(109, 40, 217, 0.2) 0px, transparent 50%), radial-gradient(at 90% 90%, rgba(79, 70, 229, 0.15) 0px, transparent 50%);
            background-attachment: fixed; background-size: cover;
            font-family: ui-sans-serif, system-ui; color: #e2e8f0; padding-bottom: 96px;
        }
        .btn { background: #6d28d9; color: white; padding: 10px 14px; border-radius: 12px; cursor: pointer; font-weight: 700; border: none; transition: 0.2s; text-transform: uppercase; font-size: 10px; }
        .card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(5px); padding: 20px; margin: 12px 0; border-radius: 20px; color: #1e293b; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        input, select { border: 1px solid #e2e8f0; padding: 12px; margin: 8px 0; border-radius: 12px; width: 100%; background: #f8fafc; color: #1e293b; font-weight: 600; }
        label { font-size: 10px; color: #64748b; font-weight: 800; text-transform: uppercase; display: block; margin-top: 8px; }
        header { background: linear-gradient(to right, #4c1d95, #000); color: white; padding: 16px; display: flex; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
        nav { padding: 8px; display: flex; gap: 8px; overflow-x: auto; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); position: sticky; top: 72px; z-index: 40; }
    </style>
</head>
<body>

<header>
    <div>
        <h1 class="text-2xl font-black italic uppercase">GhostPrint ERP</h1>
        <p id="sync-status" class="text-[9px] font-bold text-amber-300 uppercase">Sincronizando...</p>
    </div>
</header>

<nav>
    <button onclick="setView('dashboard')" class="btn">🏠 Inicio</button>
    <button onclick="setView('ventas')" class="btn !bg-green-600">💵 Vender</button>
    <button onclick="setView('cobranzas')" class="btn !bg-amber-500">⏳ Cobros</button>
    <button onclick="setView('compras')" class="btn !bg-blue-600">📦 Compras</button>
    <button onclick="setView('gastos')" class="btn !bg-red-600">📉 Gastos</button>
    <button onclick="setView('config')" class="btn !bg-slate-700">⚙️ Catálogo</button>
</nav>

<div id="app" class="p-4 max-w-4xl mx-auto"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI",
    authDomain: "ghost-print-contabilidad.firebaseapp.com",
    projectId: "ghost-print-contabilidad",
    storageBucket: "ghost-print-contabilidad.firebasestorage.app",
    messagingSenderId: "867057362556",
    appId: "1:867057362556:web:6bd2a461817219a4000bf9"
};

const appF = initializeApp(firebaseConfig);
const db = getFirestore(appF);
const docRef = doc(db, "sistema", "datos_principales");

window.state = { ventas: [], gastos: [], inventario: {}, serviciosExtra: [] };
window.view = "dashboard";
let carritoVenta = [];
let tempNombre = ""; // Memoria para el nombre
let tempTel = "";    // Memoria para el tlf

onSnapshot(docRef, (snap) => {
    if (snap.exists()) { 
        window.state = snap.data();
        window.state.inventario = window.state.inventario || {};
        window.state.serviciosExtra = window.state.serviciosExtra || [];
        window.state.ventas = window.state.ventas || [];
        window.state.gastos = window.state.gastos || [];
        document.getElementById("sync-status").innerText = "Sincronizado ✓"; 
    }
    render();
});

window.save = async () => { await setDoc(docRef, window.state); };
window.setView = (v) => { window.view = v; render(); };

window.render = function() {
    let app = document.getElementById("app"), html = "";
    if(!app) return;

    if(window.view === "dashboard"){
        let vT = window.state.ventas.reduce((a,b)=>a+b.total,0);
        let gT = window.state.gastos.reduce((a,b)=>a+b.amount,0);
        html = `<div class="grid grid-cols-1 md:grid-cols-3 gap-3">
            <div class="card !m-0 bg-green-50 border-b-4 border-green-500 text-sm uppercase font-bold">Ventas: $${vT.toFixed(2)}</div>
            <div class="card !m-0 bg-red-50 border-b-4 border-red-500 text-sm uppercase font-bold">Gastos: $${gT.toFixed(2)}</div>
            <div class="card !m-0 bg-slate-900 text-white italic text-sm uppercase font-bold text-purple-400">Neto: $${(vT-gT).toFixed(2)}</div>
        </div>`;
    }

    if(window.view === "ventas"){
        html = `<div class="card"><h2 class="font-black mb-4 uppercase text-purple-700">Punto de Venta</h2>
            <label>Cliente</label>
            <input id="cliV" placeholder="NOMBRE" value="${tempNombre}" oninput="tempNombre = this.value">
            <label>WhatsApp</label>
            <input id="telV" type="number" placeholder="58..." value="${tempTel}" oninput="tempTel = this.value">
            
            <div class="grid grid-cols-2 gap-2">
                <div><label>Material</label><select id="pSel"><option value="">-- Ver --</option>${Object.keys(window.state.inventario).map(p=>`<option value="${p}">${p}</option>`).join("")}</select></div>
                <div><label>Servicio</label><select id="sSel"><option value="">-- Ver --</option>${window.state.serviciosExtra.map(s=>`<option value="${s}">${s}</option>`).join("")}</select></div>
            </div>
            
            <label>Tarifa</label>
            <select id="tCli" onchange="document.getElementById('divLibre').style.display = (this.value==='libre'?'block':'none')">
                <option value="detal">Detal ($9)</option>
                <option value="mayor">Mayor ($10)</option>
                <option value="libre">Manual</option>
            </select>
            <div id="divLibre" style="display:none"><label>Precio $</label><input id="pMan" type="number" value="0"></div>
            
            <label>Metros/Cantidad</label><input id="cQty" type="number" value="1">
            <button onclick="addItemCarrito()" class="btn w-full !bg-blue-600 mt-2">+ Añadir a la lista</button>
            
            <div class="mt-4 border-t pt-2">${carritoVenta.map((v,i)=>`
                <div class="flex justify-between items-center py-2 border-b text-xs">
                    <span><b>${v.qty}x</b> ${v.nombre} ($${v.sub.toFixed(2)})</span>
                    <button onclick="removeItemCarrito(${i})" class="text-red-500 font-bold px-2">QUITAR</button>
                </div>`).join("")}</div>
            
            <div class="p-3 bg-slate-800 text-white text-center font-bold mt-4 rounded-xl text-xl uppercase">Total: $${carritoVenta.reduce((a,b)=>a+b.sub,0).toFixed(2)}</div>
            <button onclick="procesarV()" class="btn w-full bg-green-600 mt-4 py-4 text-sm">✓ Generar Factura</button></div>`;
    }

    if(window.view === "cobranzas"){
        html = `<h2 class="text-white font-bold mb-2 uppercase text-xs">Cuentas por Cobrar</h2>
        ${window.state.ventas.filter(v=>!v.pagado).reverse().map(v=>`
            <div class="card flex justify-between items-center border-l-4 border-amber-500">
                <div><b class="uppercase text-xs">${v.cliente}</b><br><span class="text-red-600 font-bold">$${(v.total-(v.abonado||0)).toFixed(2)}</span></div>
                <div class="flex gap-1">
                    <button onclick="enviarWS(${v.id})" class="bg-green-600 text-white p-2 rounded text-[8px] font-bold">WS</button>
                    <button onclick="abonarV(${v.id})" class="bg-blue-600 text-white p-2 rounded text-[8px] font-bold">ABONAR</button>
                    <button onclick="borrarV(${v.id})" class="bg-red-500 text-white p-2 rounded text-[8px] font-bold">X</button>
                </div>
            </div>`).join("")}`;
    }

    if(window.view === "compras"){
        html = `<div class="card bg-blue-50">
            <label>Insumo/Material</label><select id="mCom">${Object.keys(window.state.inventario).map(p=>`<option value="${p}">${p}</option>`).join("")}</select>
            <label>Cantidad</label><input id="qCom" type="number"><label>Inversión $</label><input id="vCom" type="number">
            <button onclick="regCom()" class="btn w-full bg-blue-700 mt-2">Cargar Inventario</button>
        </div>
        <div class="grid grid-cols-2 gap-2 mt-4">${Object.entries(window.state.inventario).map(([n,i])=>`
            <div class="card !m-0 p-3"><div><b class="text-[9px] uppercase">${n}</b><br><span class="text-blue-700 font-bold text-lg">${(i.stock || 0).toFixed(2)}</span></div></div>`).join("")}
        </div>`;
    }

    if(window.view === "config"){
        html = `<div class="card"><label>Nuevo Material</label><input id="nP"><button onclick="addC('p')" class="btn bg-blue-600 mt-2 w-full">Guardar</button>
            <hr class="my-6"><label>Nuevo Servicio</label><input id="nS"><button onclick="addC('s')" class="btn bg-purple-600 mt-2 w-full">Guardar</button></div>`;
    }

    app.innerHTML = html;
};

window.addItemCarrito = () => {
    let p = document.getElementById("pSel").value, s = document.getElementById("sSel").value, t = document.getElementById("tCli").value, c = parseFloat(document.getElementById("cQty").value) || 0;
    if(!p && !s && t !== "libre") return alert("Selecciona un material o servicio");
    let nombre = (p && s) ? `${p} + ${s}` : (p || s || "MANUAL");
    let pre = (t === "libre") ? (parseFloat(document.getElementById("pMan").value) || 0) : (p ? (t === "mayor" ? 10 : 9) : 12);
    carritoVenta.push({ nombre: nombre.toUpperCase(), qty: c, sub: c * pre, esProd: !!p, prodKey: p });
    render();
};

window.removeItemCarrito = (i) => { carritoVenta.splice(i, 1); render(); };

window.procesarV = async () => {
    if(!tempNombre || tempNombre.length < 2) return alert("⚠️ Error: El nombre del cliente es obligatorio.");
    if(carritoVenta.length === 0) return alert("⚠️ Error: No has añadido nada a la lista.");

    let total = carritoVenta.reduce((a,b)=>a+b.sub, 0);

    // Descuento stock y tinta (1 kit = 300m)
    carritoVenta.forEach(i => { 
        if(i.esProd && i.prodKey && window.state.inventario[i.prodKey]) {
            window.state.inventario[i.prodKey].stock -= i.qty;
            if(window.state.inventario["TINTA"] && i.prodKey !== "TINTA") {
                window.state.inventario["TINTA"].stock -= (i.qty / 300);
            }
        } 
    });

    let nuevaVenta = {id:Date.now(), cliente:tempNombre.toUpperCase(), telefono:tempTel, total:total, abonado:0, pagado:false, items: [...carritoVenta]};
    window.state.ventas.push(nuevaVenta);
    
    let nota = `🧾 *GHOSTPRINT - NOTA DE ENTREGA*\n--------------------------------\n👤 Cliente: ${nuevaVenta.cliente}\n📅 Fecha: ${new Date().toLocaleDateString()}\n--------------------------------\n`;
    nuevaVenta.items.forEach(i => nota += `• ${i.qty}x ${i.nombre}: $${i.sub.toFixed(2)}\n`);
    nota += `--------------------------------\n💰 *TOTAL: $${nuevaVenta.total.toFixed(2)}*`;
    
    // Limpiamos todo
    carritoVenta = []; tempNombre = ""; tempTel = "";
    await window.save(); 
    
    alert("¡Venta procesada con éxito!");
    prompt("Copia para WhatsApp:", nota);
    setView('cobranzas');
};

window.enviarWS = (id) => {
    let v = window.state.ventas.find(x => x.id === id);
    let msg = `Hola ${v.cliente}, tu saldo en GhostPrint es: *$${(v.total-(v.abonado||0)).toFixed(2)}*.`;
    window.open(`https://api.whatsapp.com/send?phone=${v.telefono}&text=${encodeURIComponent(msg)}`, '_blank');
};
window.abonarV = async (id) => {
    let v = window.state.ventas.find(x=>x.id===id), m = parseFloat(prompt("¿Monto del abono?"));
    if(m){ v.abonado += m; if(v.abonado >= v.total) v.pagado = true; await window.save(); render(); }
};
window.regCom = async () => {
    let m = document.getElementById("mCom").value, q = parseFloat(document.getElementById("qCom").value), v = parseFloat(document.getElementById("vCom").value);
    if(q > 0) { window.state.inventario[m].stock += q; window.state.gastos.push({id:Date.now(), name:`COMPRA: ${m}`, amount: v}); await window.save(); render(); }
};
window.addC = async (t) => {
    if(t==='p'){
        let n=document.getElementById("nP").value.toUpperCase();
        if(n) window.state.inventario[n]={stock:0, costo:0};
    } else {
        let n=document.getElementById("nS").value.toUpperCase();
        if(n) window.state.serviciosExtra.push(n);
    }
    await window.save(); render();
};
window.borrarV = async (id) => { if(confirm("¿Borrar venta?")){ window.state.ventas=window.state.ventas.filter(x=>x.id!==id); await window.save(); render(); } };

render();
</script>
</body>
</html>
