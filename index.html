<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostPrint ERP v9.0 - VERSIÓN FINAL REPARADA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0a14; color: #e2e8f0; font-family: system-ui; padding-bottom: 100px; }
        header { background: linear-gradient(to right, #4c1d95, #1e1e2f); padding: 15px; text-align: center; font-weight: 900; border-bottom: 2px solid #6d28d9; }
        nav { background: #1e1e2f; display: flex; gap: 5px; overflow-x: auto; padding: 10px; position: sticky; top: 0; z-index: 100; }
        .btn { background: #6d28d9; color: white; padding: 10px 14px; border-radius: 8px; font-size: 10px; font-weight: 800; text-transform: uppercase; white-space: nowrap; cursor: pointer; }
        .card { background: white; padding: 18px; margin: 15px 0; border-radius: 15px; color: #1e293b; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
        input, select { border: 2px solid #e2e8f0; padding: 10px; margin: 5px 0; border-radius: 8px; width: 100%; font-weight: 700; color: #0f172a; }
        label { font-size: 10px; font-weight: 900; color: #64748b; text-transform: uppercase; display: block; margin-top: 5px; }
        .badge-cliente { background: #f1f5f9; border-left: 4px solid #6d28d9; padding: 10px; margin-bottom: 10px; border-radius: 8px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<header>GhostPrint ERP v9.0</header>

<nav>
    <button onclick="setView('ventas')" class="btn !bg-green-600">💵 Vender</button>
    <button onclick="setView('reportes')" class="btn !bg-indigo-600">📊 Reportes</button>
    <button onclick="setView('compras')" class="btn !bg-blue-600">📦 Compras</button>
    <button onclick="setView('gastos')" class="btn !bg-red-600">📉 Gastos</button>
    <button onclick="setView('config')" class="btn !bg-slate-600">⚙️ Catálogo</button>
</nav>

<div id="app" class="p-4 max-w-2xl mx-auto"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI",
    authDomain: "ghost-print-contabilidad.firebaseapp.com",
    projectId: "ghost-print-contabilidad",
    storageBucket: "ghost-print-contabilidad.firebasestorage.app",
    messagingSenderId: "867057362556",
    appId: "1:867057362556:web:6bd2a461817219a4000bf9"
};

const appF = initializeApp(firebaseConfig);
const db = getFirestore(appF);
const docRef = doc(db, "sistema", "datos_principales");

window.state = { ventas: [], gastos: [], inventario: {}, serviciosExtra: [], comprasInversion: [] };
window.view = "ventas";
let carritoVenta = [];
let fechaHoy = new Date().toISOString().split('T')[0];

window.save = async () => { await setDoc(docRef, window.state); };
window.setView = (v) => { window.view = v; render(); };

onSnapshot(docRef, (snap) => {
    if (snap.exists()) { window.state = snap.data(); render(); }
});

window.render = function() {
    let app = document.getElementById("app");
    if(!app) return;
    let html = "";

    if(window.view === "ventas"){
        html = `<div class="card">
            <h2 class="font-black italic border-b mb-4">NUEVA VENTA</h2>
            <label>Fecha de Venta</label>
            <input type="date" id="fVenta" value="${fechaHoy}" class="!bg-amber-50">
            
            <div class="grid grid-cols-2 gap-2">
                <div><label>Cliente</label><input id="cliV" placeholder="NOMBRE" oninput="renderCarritoInner()"></div>
                <div><label>WhatsApp</label><input id="telV" type="number" placeholder="CELULAR" oninput="renderCarritoInner()"></div>
            </div>

            <div class="grid grid-cols-2 gap-2 mt-2">
                <div><label>Material</label><select id="pSel"><option value="">- Seleccione -</option>${Object.keys(window.state.inventario).map(p=>`<option value="${p}">${p}</option>`).join("")}</select></div>
                <div><label>Servicio</label><select id="sSel"><option value="">- Seleccione -</option>${(window.state.serviciosExtra || []).map(s=>`<option value="${s}">${s}</option>`).join("")}</select></div>
            </div>

            <label>Tipo de Precio</label>
            <select id="tCli" onchange="toggleLibre()"><option value="detal">DETAL ($9)</option><option value="mayor">MAYOR ($10)</option><option value="libre">PRECIO LIBRE</option></select>
            <div id="divLibre" class="hidden"><input id="pLibre" type="number" step="0.01" placeholder="Monto Unitario $"></div>

            <div class="grid grid-cols-2 gap-2 items-end mt-2">
                <div><label>Cantidad/Metros</label><input id="cQty" type="number" value="1" step="0.01"></div>
                <button onclick="addItem()" class="btn !bg-blue-600 h-[46px] mb-[6px]">+ AÑADIR</button>
            </div>

            <div id="listaCarrito" class="mt-4 border-t-2 border-dashed pt-2"></div>
            <div id="totalVenta" class="bg-slate-900 text-white p-4 text-center text-2xl font-black rounded-xl mt-3 italic">TOTAL: $0.00</div>
            <button onclick="procesarVenta()" class="btn w-full !bg-green-600 py-4 mt-4 font-black">GUARDAR VENTA</button>
        </div>`;
        setTimeout(() => renderCarritoInner(), 10);
    }

    if(window.view === "compras"){
        html = `<div class="card">
            <h2 class="font-black italic border-b mb-4">CARGAR STOCK / INVERSIÓN</h2>
            <label>Fecha de Compra</label><input type="date" id="fCompra" value="${fechaHoy}" class="!bg-amber-50">
            <label class="mt-2">Material</label>
            <select id="mCom">${Object.keys(window.state.inventario).map(p=>`<option value="${p}">${p}</option>`).join("")}</select>
            <div class="grid grid-cols-2 gap-2">
                <div><label>Metros Comprados</label><input id="qCom" type="number" step="0.01"></div>
                <div><label>Costo Total $</label><input id="vCom" type="number" step="0.01"></div>
            </div>
            <button onclick="registrarCompra()" class="btn w-full !bg-blue-700 mt-2 py-3">CARGAR A INVENTARIO</button>
        </div>
        <div class="grid grid-cols-2 gap-2 mt-4">${Object.entries(window.state.inventario).map(([n, i]) => `
            <div class="bg-white p-4 rounded-xl border text-center shadow-sm">
                <p class="text-[9px] font-black text-slate-400 uppercase">${n}</p>
                <p class="text-2xl font-black text-blue-700">${(i.stock || 0).toFixed(2)}</p>
                <p class="text-[9px] uppercase font-bold text-slate-500 italic">Metros en Stock</p>
            </div>`).join("")}
        </div>`;
    }

    if(window.view === "gastos"){
        html = `<div class="card">
            <h2 class="font-black italic border-b mb-4">GASTOS OPERATIVOS</h2>
            <label>Fecha del Gasto</label><input type="date" id="fGasto" value="${fechaHoy}" class="!bg-amber-50">
            <input id="gNom" placeholder="DESCRIPCIÓN (Comida, Luz, etc.)" class="mt-2">
            <input id="gMon" type="number" step="0.01" placeholder="MONTO $">
            <button onclick="registrarGasto()" class="btn w-full !bg-red-600 mt-2 py-3">GUARDAR GASTO</button>
        </div>`;
    }

    if(window.view === "reportes"){
        html = `<div class="card !bg-slate-900 text-white">
            <label class="text-white opacity-60">Consultar Fecha:</label>
            <input type="date" id="fRep" value="${fechaHoy}" onchange="renderReporteDetalle(this.value)" class="!bg-white !text-black">
        </div>
        <div id="areaReporte"></div>`;
        setTimeout(() => renderReporteDetalle(fechaHoy), 10);
    }

    if(window.view === "config"){
        html = `<div class="card">
            <h2 class="font-black italic border-b mb-4">CATÁLOGO DE PRODUCTOS</h2>
            <label>Nuevo Material</label>
            <div class="flex gap-2"><input id="nP" placeholder="EJ: LONA"><button onclick="addCat('p')" class="btn !bg-blue-600">Añadir</button></div>
            <label class="mt-4">Nuevo Servicio</label>
            <div class="flex gap-2"><input id="nS" placeholder="EJ: DISEÑO"><button onclick="addCat('s')" class="btn !bg-purple-600">Añadir</button></div>
        </div>
        <div class="card">
            <h3 class="font-black text-xs border-b mb-2">MATERIALES</h3>
            ${Object.keys(window.state.inventario).map(n=>`<div class="flex justify-between py-2 border-b text-[10px] font-bold uppercase"><span>${n}</span><button onclick="delCat('p','${n}')" class="text-red-500 font-black">ELIMINAR</button></div>`).join("")}
            <h3 class="font-black text-xs border-b mb-2 mt-4">SERVICIOS</h3>
            ${(window.state.serviciosExtra || []).map((s,i)=>`<div class="flex justify-between py-2 border-b text-[10px] font-bold uppercase"><span>${s}</span><button onclick="delCat('s',${i})" class="text-red-500 font-black">ELIMINAR</button></div>`).join("")}
        </div>`;
    }

    app.innerHTML = html;
};

// --- LOGICA DE CARRITO Y VENTAS ---

window.toggleLibre = () => { document.getElementById("divLibre").classList.toggle("hidden", document.getElementById("tCli").value !== "libre"); };

window.addItem = () => {
    let p = document.getElementById("pSel").value, s = document.getElementById("sSel").value, t = document.getElementById("tCli").value, q = parseFloat(document.getElementById("cQty").value) || 0;
    if(!p && !s) return;
    let pre = (t === "detal") ? 9 : (t === "mayor") ? 10 : parseFloat(document.getElementById("pLibre").value) || 0;
    carritoVenta.push({ nombre: (p && s ? p+" + "+s : p||s).toUpperCase(), qty: q, sub: q*pre, prodKey: p });
    renderCarritoInner();
};

window.renderCarritoInner = () => {
    let div = document.getElementById("listaCarrito"), totalDiv = document.getElementById("totalVenta");
    if(!div) return;
    let cli = document.getElementById("cliV")?.value.toUpperCase() || "SIN NOMBRE";
    let tel = document.getElementById("telV")?.value || "S/N";
    let head = `<div class="badge-cliente"><b>CLIENTE: ${cli}</b><br><small>WHATSAPP: ${tel}</small></div>`;
    let items = carritoVenta.map((v,i)=>`<div class="flex justify-between py-1 border-b text-[10px] font-bold uppercase italic"><span>${v.qty} ${v.nombre}</span><b>$${v.sub.toFixed(2)}</b></div>`).join("");
    div.innerHTML = head + items;
    totalDiv.innerText = "TOTAL: $" + carritoVenta.reduce((a,b)=>a+b.sub,0).toFixed(2);
};

window.procesarVenta = async () => {
    let f = document.getElementById("fVenta").value, cli = document.getElementById("cliV").value;
    if(!cli || !carritoVenta.length) return alert("Falta cliente o productos");
    let ts = new Date(f + "T" + new Date().toLocaleTimeString('en-GB')).getTime();
    
    carritoVenta.forEach(i => { if(i.prodKey && window.state.inventario[i.prodKey]) window.state.inventario[i.prodKey].stock -= i.qty; });
    window.state.ventas.push({id: ts, cliente: cli.toUpperCase(), total: carritoVenta.reduce((a,b)=>a+b.sub,0)});
    await window.save(); carritoVenta = []; setView('reportes');
};

// --- LOGICA DE COMPRAS Y GASTOS ---

window.registrarCompra = async () => {
    let f = document.getElementById("fCompra").value, m = document.getElementById("mCom").value, q = parseFloat(document.getElementById("qCom").value), v = parseFloat(document.getElementById("vCom").value);
    if(q > 0) {
        let ts = new Date(f + "T" + new Date().toLocaleTimeString('en-GB')).getTime();
        window.state.inventario[m].stock += q;
        if(!window.state.comprasInversion) window.state.comprasInversion = [];
        window.state.comprasInversion.push({id: ts, name: m, amount: v});
        await window.save(); render();
    }
};

window.registrarGasto = async () => {
    let f = document.getElementById("fGasto").value, n = document.getElementById("gNom").value, m = parseFloat(document.getElementById("gMon").value);
    if(n && m) {
        let ts = new Date(f + "T" + new Date().toLocaleTimeString('en-GB')).getTime();
        window.state.gastos.push({id: ts, name: n.toUpperCase(), amount: m});
        await window.save(); setView('reportes');
    }
};

// --- REPORTES ---

window.renderReporteDetalle = (fecha) => {
    const filtrar = (lista) => (lista || []).filter(i => new Date(i.id).toISOString().split('T')[0] === fecha);
    let vD = filtrar(window.state.ventas), gD = filtrar(window.state.gastos), iD = filtrar(window.state.comprasInversion);
    let tV = vD.reduce((a,b)=>a+b.total,0), tG = gD.reduce((a,b)=>a+b.amount,0);
    
    document.getElementById("areaReporte").innerHTML = `
        <div class="card !bg-slate-900 text-white text-center border-l-8 border-purple-500">
            <p class="text-[10px] uppercase font-bold text-slate-400 italic">Utilidad Neta del Día</p>
            <h2 class="text-4xl font-black italic">$${(tV-tG).toFixed(2)}</h2>
        </div>
        <div class="card">
            <h3 class="font-black text-xs border-b mb-2 uppercase text-green-600">Ventas Registradas</h3>
            ${vD.map(v=>`<div class="flex justify-between py-1 border-b text-[10px] font-bold"><span>${v.cliente}</span><b>$${v.total.toFixed(2)}</b></div>`).join("") || "Sin movimientos"}
            <h3 class="font-black text-xs border-b mb-2 mt-4 uppercase text-red-500">Gastos Registrados</h3>
            ${gD.map(g=>`<div class="flex justify-between py-1 border-b text-[10px] font-bold"><span>${g.name}</span><b>$${g.amount.toFixed(2)}</b></div>`).join("") || "Sin movimientos"}
            <h3 class="font-black text-xs border-b mb-2 mt-4 uppercase text-blue-500">Compras de Material</h3>
            ${iD.map(i=>`<div class="flex justify-between py-1 border-b text-[10px] font-bold"><span>${i.name}</span><b>$${i.amount.toFixed(2)}</b></div>`).join("") || "Sin movimientos"}
        </div>`;
};

// --- CONFIGURACIÓN ---

window.addCat = async (t) => {
    let id = t === 'p' ? 'nP' : 'nS';
    let n = document.getElementById(id).value.toUpperCase();
    if(!n) return;
    if(t === 'p') window.state.inventario[n] = {stock: 0};
    else { if(!window.state.serviciosExtra) window.state.serviciosExtra = []; window.state.serviciosExtra.push(n); }
    await window.save(); render();
};

window.delCat = async (t, k) => {
    if(confirm("¿Estás seguro de eliminar esto del catálogo?")){
        if(t === 'p') delete window.state.inventario[k];
        else window.state.serviciosExtra.splice(k, 1);
        await window.save(); render();
    }
};

render();
</script>
</body>
</html>
