<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GhostPrint MASTER v30.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { background-color: #030308; color: #f8fafc; font-family: 'Inter', sans-serif; padding-bottom: 100px; }
        .card-pro { background: #111122; border: 1px solid #2d2d44; border-radius: 20px; padding: 18px; margin-bottom: 12px; }
        nav { background: rgba(10, 10, 20, 0.95); display: flex; gap: 8px; overflow-x: auto; padding: 14px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #334155; }
        .btn-nav { background: #1e1e30; color: #64748b; padding: 12px 18px; border-radius: 14px; font-size: 10px; font-weight: 800; white-space: nowrap; cursor: pointer; text-transform: uppercase; }
        .active { background: #7c3aed !important; color: white !important; }
        
        input, select, textarea { background: #070712; border: 1px solid #334155; color: white; padding: 16px; border-radius: 14px; width: 100%; margin: 8px 0; font-size: 16px; font-weight: 700; outline: none; }
        .btn-main { background: linear-gradient(135deg, #7c3aed 0%, #4c1d95 100%); color: white; padding: 18px; border-radius: 18px; width: 100%; font-weight: 900; text-transform: uppercase; cursor: pointer; border: none; font-size: 14px; }
        .ghost-glow { filter: drop-shadow(0 0 10px #7c3aed); }
        .progress-bar { height: 10px; background: #1e1e30; border-radius: 10px; overflow: hidden; margin-top: 8px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #7c3aed, #10b981); transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body>

<div class="p-4 flex justify-between items-center bg-[#0a0a14] border-b border-white/5">
    <div class="flex items-center gap-3">
        <span class="text-4xl ghost-glow">👻</span>
        <div>
            <h1 class="text-xl font-black italic text-purple-500 leading-none">GHOST PRINT</h1>
            <p class="text-[8px] font-black opacity-40 uppercase tracking-widest text-purple-300">Inteligencia Financiera v30.2</p>
        </div>
    </div>
</div>

<nav id="mainNav">
    <div onclick="setView('inicio')" class="btn-nav active" id="n-inicio">📊 CONTROL</div>
    <div onclick="setView('ventas')" class="btn-nav" id="n-ventas">💵 Ventas</div>
    <div onclick="setView('cobrar')" class="btn-nav" id="n-cobrar">📑 POR COBRAR</div>
    <div onclick="setView('compras')" class="btn-nav" id="n-compras">🛒 Compras</div>
    <div onclick="setView('gastos')" class="btn-nav" id="n-gastos">💸 Gastos</div>
    <div onclick="setView('inventario')" class="btn-nav" id="n-inventario">📦 Stock</div>
    <div onclick="setView('catalogo')" class="btn-nav" id="n-catalogo">⚙️ CATALOGO</div>
</nav>

<div id="app" class="p-4 max-w-2xl mx-auto"></div>

<!-- Modal Recibo -->
<div id="receiptModal" class="fixed inset-0 bg-black/90 z-[200] hidden flex items-center justify-center p-4">
    <div class="bg-white text-black p-6 rounded-2xl w-full max-w-sm shadow-2xl relative">
        <div id="receiptContent" class="text-[11px] font-mono border-black pt-4"></div>
        <div class="mt-6 flex gap-2">
            <button onclick="closeReceipt()" class="flex-1 bg-gray-200 p-3 rounded-xl font-bold">Cerrar</button>
            <button onclick="shareReceipt()" class="flex-1 bg-purple-600 text-white p-3 rounded-xl font-bold">WhatsApp</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI", authDomain: "ghost-print-contabilidad.firebaseapp.com", projectId: "ghost-print-contabilidad", storageBucket: "ghost-print-contabilidad.firebasestorage.app", messagingSenderId: "867057362556", appId: "1:867057362556:web:6bd2a461817219a4000bf9" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const docRef = db.collection("sistema").doc("datos_principales");

    const SERVICIOS_DEFECTO = ["DISEÑO", "IMPRESIÓN", "CORTE", "INSTALACIÓN", "LAMINADO", "ACABADO"];

    window.state = { 
        ventas: [], 
        inventario: {}, 
        compras: [], 
        gastos: [], 
        servicios: SERVICIOS_DEFECTO,
        metaMensual: 3000 
    };
    window.currentView = 'inicio';
    window.cart = [];

    window.sync = async function() { await docRef.set(window.state); render(); };
    docRef.onSnapshot(doc => { if(doc.exists) { window.state = doc.data(); render(); } });

    window.setView = function(v) { 
        window.currentView = v; 
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active')); 
        document.getElementById('n-'+v)?.classList.add('active'); 
        render(); 
    };

    window.render = function() {
        const app = document.getElementById("app");
        const inv = window.state.inventario || {};
        const serv = window.state.servicios || SERVICIOS_DEFECTO;
        const today = new Date().toISOString().split('T')[0];

        if(window.currentView === 'inicio') {
            const vM = window.state.ventas || [];
            const gM = window.state.gastos || [];
            const cM = window.state.compras || [];
            
            let inversionAlmacenActual = 0;
            let proyeccionVentaTotal = 0;
            
            Object.keys(inv).forEach(matName => {
                const item = inv[matName];
                const ultimasCompras = cM.filter(c => c.m === matName);
                const costoUnitario = ultimasCompras.length > 0 
                    ? (ultimasCompras[ultimasCompras.length-1].costo / ultimasCompras[ultimasCompras.length-1].c) 
                    : 0;
                
                inversionAlmacenActual += (item.stock || 0) * costoUnitario;
                proyeccionVentaTotal += (item.stock || 0) * (item.precioDetal || 0);
            });

            const totalVentasBrutas = vM.reduce((a, b) => a + (Number(b.total) || 0), 0);
            const totalRecaudado = vM.reduce((a, b) => a + (Number(b.abono) || 0), 0);
            const totalGastos = gM.reduce((a, b) => a + (Number(b.monto) || 0), 0);
            
            const gananciaNeta = totalVentasBrutas - totalGastos;
            const cajaDisponible = totalRecaudado - totalGastos;

            const meta = window.state.metaMensual || 3000;
            const porcentajeMeta = Math.min((totalVentasBrutas / meta) * 100, 100);

            app.innerHTML = `
                <div class="card-pro bg-gradient-to-br from-[#1a1a3a] to-[#070712] border-purple-500/40 text-center py-2">
                    <p class="text-[10px] opacity-50 uppercase font-black mb-1">Caja Real (Cobrado - Gastos)</p>
                    <h2 class="text-5xl font-black italic text-white">$${cajaDisponible.toLocaleString()}</h2>
                    <div class="flex justify-center gap-6 mt-4">
                         <div class="text-center"><p class="text-[8px] opacity-40 uppercase">Ingresos</p><span class="text-xs font-bold text-green-400">+$${totalRecaudado.toLocaleString()}</span></div>
                         <div class="text-center"><p class="text-[8px] opacity-40 uppercase">Egresos</p><span class="text-xs font-bold text-red-400">-$${totalGastos.toLocaleString()}</span></div>
                    </div>
                </div>

                <div class="card-pro border-white/5">
                    <div class="flex justify-between items-end">
                        <div><p class="text-[10px] opacity-40 uppercase font-black">Meta de Ventas Mes</p>
                        <h3 class="text-2xl font-black italic text-purple-400">$${totalVentasBrutas.toLocaleString()} <span class="text-xs font-normal opacity-30 text-white">OBJETIVO: $${meta.toLocaleString()}</span></h3></div>
                        <button onclick="cambiarMeta()" class="text-[9px] bg-purple-500/20 px-3 py-2 rounded-xl text-purple-300 font-black">EDITAR META</button>
                    </div>
                    <div class="progress-bar"><div class="progress-fill" style="width: ${porcentajeMeta}%"></div></div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="card-pro border-blue-500/30">
                        <p class="text-[9px] opacity-50 uppercase font-black text-blue-300">Inversión en Almacén</p>
                        <h2 class="text-2xl font-black text-white">$${inversionAlmacenActual.toLocaleString()}</h2>
                    </div>
                    <div class="card-pro border-green-500/30">
                        <p class="text-[9px] opacity-50 uppercase font-black text-green-300">Ganancia Proyectada</p>
                        <h2 class="text-2xl font-black text-white">$${(proyeccionVentaTotal - inversionAlmacenActual).toLocaleString()}</h2>
                    </div>
                </div>

                <div class="card-pro">
                    <div class="flex justify-between items-center mb-4">
                         <p class="text-[10px] opacity-40 uppercase font-black italic">Flujo de Ventas vs Gastos</p>
                         <div class="flex gap-3">
                            <span class="flex items-center gap-1 text-[8px] text-purple-400 font-bold">● VENTAS</span>
                            <span class="flex items-center gap-1 text-[8px] text-red-500 font-bold">● GASTOS</span>
                         </div>
                    </div>
                    <div class="h-48"><canvas id="mainChart"></canvas></div>
                </div>

                <div class="card-pro bg-green-500/5 border-green-500/20 text-center py-6">
                    <p class="text-[10px] opacity-50 uppercase font-black mb-1 text-green-400">Utilidad Neta (Ventas - Gastos)</p>
                    <h2 class="text-4xl font-black italic text-green-500">$${gananciaNeta.toLocaleString()}</h2>
                </div>
            `;
            setTimeout(() => initChart(vM, gM), 200);
        }
        else if(window.currentView === 'ventas') renderVentas(app, inv, serv, today);
        else if(window.currentView === 'compras') renderCompras(app, inv);
        else if(window.currentView === 'gastos') renderGastos(app, today);
        else if(window.currentView === 'inventario') renderInventario(app, inv);
        else if(window.currentView === 'catalogo') renderCatalogo(app, inv, serv);
        else if(window.currentView === 'cobrar') renderPorCobrar(app);
    };

    function initChart(ventas, gastos) {
        const ctx = document.getElementById('mainChart');
        if(!ctx) return;
        const dataMap = {};
        [...ventas, ...gastos].forEach(item => {
            const fecha = item.fecha || (item.f ? item.f.split('T')[0] : 'Sin fecha');
            if(!dataMap[fecha]) dataMap[fecha] = { v: 0, g: 0 };
            if(item.total) dataMap[fecha].v += Number(item.total);
            if(item.monto) dataMap[fecha].g += Number(item.monto);
        });
        const labels = Object.keys(dataMap).sort().slice(-7);
        const vData = labels.map(l => dataMap[l].v);
        const gData = labels.map(l => dataMap[l].g);

        new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    { label: 'Ventas', data: vData, borderColor: '#a855f7', backgroundColor: 'rgba(168, 85, 247, 0.1)', fill: true, tension: 0.4, borderWidth: 3, pointRadius: 0 },
                    { label: 'Gastos', data: gData, borderColor: '#ef4444', borderDash: [5, 5], fill: false, tension: 0.4, borderWidth: 2, pointRadius: 0 }
                ]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: '#64748b', font: { size: 8 } } }, x: { grid: { display: false }, ticks: { color: '#64748b', font: { size: 8 } } } } }
        });
    }

    function renderVentas(app, inv, serv, today) {
        app.innerHTML = `
            <div class="card-pro">
                <h2 class="text-xl font-black italic text-purple-500 mb-4 uppercase text-center">Nueva Venta</h2>
                <input id="vDate" type="date" value="${today}">
                <div class="grid grid-cols-2 gap-2"><input id="cli" placeholder="CLIENTE" class="uppercase font-bold"><input id="wha" type="tel" placeholder="WHATSAPP"></div>
                <div class="bg-white/5 p-4 rounded-2xl border border-white/10 mt-2">
                    <input id="vConcepto" placeholder="CONCEPTO DEL TRABAJO" class="uppercase !bg-purple-900/10 !border-purple-500/30 text-xs">
                    <div class="grid grid-cols-2 gap-2 mt-2">
                        <select id="vMat" onchange="updateVentaUI()"><option value="">-- MATERIAL --</option>${Object.keys(inv).map(m=>`<option value="${m}">${m}</option>`).join("")}</select>
                        <select id="vServ" onchange="updateVentaUI()"><option value="">-- SERVICIO --</option>${serv.map(s=>`<option value="${s}">${s}</option>`).join("")}</select>
                    </div>
                    <div class="flex gap-2"><select id="vTipo" onchange="updateVentaUI()" class="w-1/2"><option value="DETAL">DETAL</option><option value="MAYOR">MAYOR</option><option value="LIBRE">LIBRE</option></select><input id="vCant" type="number" placeholder="CANT" oninput="updateVentaUI()" class="w-1/2"></div>
                    <input id="vPrec" type="number" placeholder="PRECIO TOTAL $" class="text-3xl text-purple-400 font-black text-center">
                    <button onclick="addItem()" class="btn-main !bg-purple-600/20 !text-purple-400 !py-3 mt-2">+ AÑADIR TRABAJO</button>
                </div>
                <div id="vLista" class="mt-4 space-y-2">
                    ${window.cart.map((item, idx) => `<div class="flex justify-between items-center bg-white/5 p-3 rounded-xl border-l-4 border-purple-500 text-xs"><div><div class="text-purple-300 font-black uppercase text-[9px] mb-1">${item.concepto || 'SIN CONCEPTO'}</div><b>${item.m}</b><br><span class="opacity-40">${item.c} und - ${item.t}</span></div><div class="flex items-center gap-4"><b>$${item.p.toFixed(2)}</b><button onclick="removeItem(${idx})" class="text-red-500">✕</button></div></div>`).join("")}
                </div>
                <div class="text-4xl font-black text-center my-6 text-white italic">$${window.cart.reduce((a,b)=>a+b.p, 0).toFixed(2)}</div>
                <input id="vAbono" type="number" placeholder="ABONO / PAGO $" class="text-2xl text-green-500 font-black text-center">
                <button onclick="saveVenta()" class="btn-main mt-4 py-4">GUARDAR VENTA</button>
            </div>`;
    }

    function renderPorCobrar(app) {
        const ventas = window.state.ventas || [];
        const deudasActivas = ventas.filter(v => (v.total - v.abono) > 0.01);
        const resumenPorCliente = deudasActivas.reduce((acc, v) => {
            if(!acc[v.cliente]) { acc[v.cliente] = { nombre: v.cliente, deudaTotal: 0, ventas: [], whatsapp: v.whatsapp }; }
            acc[v.cliente].deudaTotal += (v.total - v.abono);
            acc[v.cliente].ventas.push(v);
            return acc;
        }, {});
        const clientesDeudores = Object.values(resumenPorCliente);
        app.innerHTML = `
            <h2 class="text-lg font-black italic text-red-500 mb-4 uppercase px-2 tracking-tighter">Deudas Pendientes</h2>
            <div class="space-y-6">
                ${clientesDeudores.length === 0 ? '<p class="text-center opacity-40 py-10">NO HAY DEUDAS PENDIENTES</p>' : ''}
                ${clientesDeudores.map(c => `
                    <div class="bg-[#1a1a2e] rounded-3xl overflow-hidden border border-red-500/20 shadow-xl">
                        <div class="bg-gradient-to-r from-red-900/40 to-transparent p-5 flex justify-between items-center border-b border-white/5">
                            <div><h3 class="text-xl font-black text-white italic uppercase">${c.nombre}</h3></div>
                            <div class="text-right"><p class="text-2xl font-black text-red-500 italic">$${c.deudaTotal.toFixed(2)}</p></div>
                        </div>
                        <div class="p-4 space-y-4">
                            ${c.ventas.slice().reverse().map(v => `
                                <div class="bg-black/30 p-4 rounded-2xl border border-white/5">
                                    <div class="flex justify-between items-start mb-2"><span class="text-[9px] opacity-40">${v.fecha}</span><b class="text-red-400">$${(v.total - v.abono).toFixed(2)}</b></div>
                                    <div class="grid grid-cols-2 gap-2 mb-2">
                                        <button onclick="abonar(${v.id})" class="bg-green-600/10 text-green-500 py-2 rounded-xl text-[9px] font-bold">Abonar</button>
                                        <button onclick="liquidar(${v.id})" class="bg-green-600/80 text-white py-2 rounded-xl text-[9px] font-bold">Liquidar</button>
                                        <button onclick="showReceipt(${v.id})" class="bg-purple-600/20 text-purple-400 py-2 rounded-xl col-span-2 text-[10px] font-bold">📄 Ver Recibo</button>
                                    </div>
                                    <div class="flex gap-2 border-t border-white/5 pt-2">
                                        <button onclick="editVenta(${v.id})" class="flex-1 bg-white/5 text-gray-400 py-2 rounded-lg text-[9px]">EDITAR</button>
                                        <button onclick="delVenta(${v.id})" class="flex-1 bg-red-900/20 text-red-500 py-2 rounded-lg text-[9px]">BORRAR</button>
                                    </div>
                                </div>`).join("")}
                        </div>
                    </div>`).join("")}
            </div>`;
    }

    function renderCompras(app, inv) {
        const compras = window.state.compras || [];
        app.innerHTML = `
            <div class="card-pro">
                <h2 class="text-lg font-black italic text-blue-400 mb-4 uppercase text-center">Entrada de Stock</h2>
                <select id="cMat"><option value="">-- SELECCIONAR MATERIAL --</option>${Object.keys(inv).map(m=>`<option value="${m}">${m}</option>`).join("")}</select>
                <div class="grid grid-cols-2 gap-2"><input id="cCant" type="number" placeholder="CANTIDAD"><input id="cCosto" type="number" placeholder="COSTO TOTAL $"></div>
                <div class="grid grid-cols-2 gap-2 mt-2"><input id="cVentaD" type="number" placeholder="P. DETAL $"><input id="cVentaM" type="number" placeholder="P. MAYOR $"></div>
                <button onclick="saveCompra()" class="btn-main !bg-blue-600 mt-4">INGRESAR STOCK</button>
            </div>
            <div class="space-y-1">
                ${compras.slice().reverse().map((c, idx) => {
                    const originalIdx = compras.length - 1 - idx;
                    return `
                    <div class="bg-white/5 p-3 rounded-xl flex justify-between items-center border border-white/5 text-[11px]">
                        <div><div class="font-black text-blue-400">${c.m}</div><div class="opacity-40">${c.f.split('T')[0]}</div></div>
                        <div class="flex items-center gap-2 text-right">
                            <div class="mr-2"><b>${c.c} und</b><br><span class="text-green-500">$${(c.costo || 0).toFixed(2)}</span></div>
                            <button onclick="editCompra(${originalIdx})" class="p-2 bg-blue-600/10 text-blue-400 rounded-lg text-xs">✏️</button>
                            <button onclick="delCompra(${originalIdx})" class="p-2 bg-red-500/10 text-red-500 rounded-lg text-xs">🗑️</button>
                        </div>
                    </div>`}).join("")}
            </div>`;
    }

    function renderGastos(app, today) {
        const gastos = window.state.gastos || [];
        app.innerHTML = `
            <div class="card-pro text-center bg-red-900/10 border-red-500/30">
                <p class="text-[10px] opacity-40 uppercase font-black italic">Gastos Totales Acumulados</p>
                <h2 class="text-3xl font-black text-red-500">$${gastos.reduce((a,b)=>a+Number(b.monto), 0).toLocaleString()}</h2>
            </div>
            <div class="card-pro">
                <h2 class="text-lg font-black italic text-red-500 mb-4 uppercase text-center">Nuevo Gasto</h2>
                <input id="gDate" type="date" value="${today}"><input id="gDesc" placeholder="CONCEPTO"><input id="gMonto" type="number" placeholder="MONTO $">
                <button onclick="saveGasto()" class="btn-main mt-2 !bg-red-600">REGISTRAR GASTO</button>
            </div>
            <div class="space-y-1">
                ${gastos.slice().reverse().map((g, idx) => `
                    <div class="bg-white/5 p-4 rounded-xl flex justify-between items-center text-[11px] border border-white/5">
                        <div><div class="font-black text-white uppercase">${g.desc}</div><div class="opacity-40">${g.fecha}</div></div>
                        <div class="flex items-center gap-4"><b class="text-red-500">$${Number(g.monto).toFixed(2)}</b><button onclick="delGasto(${gastos.length - 1 - idx})" class="text-red-500">✕</button></div>
                    </div>`).join("")}
            </div>`;
    }

    function renderInventario(app, inv) {
        app.innerHTML = `<div class="space-y-3">
            ${Object.entries(inv).map(([n, i]) => `
                <div class="card-pro flex justify-between items-center border-l-4 ${i.stock < 5 ? 'border-red-600' : 'border-blue-600'}">
                    <div class="flex-1"><b class="uppercase text-purple-400 text-[10px] font-black">${n}</b><br><span class="text-4xl font-black italic text-white">${(i.stock || 0).toFixed(2)}</span></div>
                    <div class="flex flex-col gap-2">
                        <button onclick="registrarMerma('${n}')" class="bg-red-600/20 text-red-500 px-3 py-1 rounded-lg text-[10px] font-black">MERMA</button>
                        <div class="flex gap-2">
                            <button onclick="editItemInv('${n}')" class="p-2 bg-blue-600/10 text-blue-400 rounded-lg">✏️</button>
                            <button onclick="delItemInv('${n}')" class="p-2 bg-red-600/10 text-red-500 rounded-lg">🗑️</button>
                        </div>
                    </div>
                </div>`).join("")}
        </div>`;
    }

    function renderCatalogo(app, inv, serv) {
        app.innerHTML = `
            <div class="card-pro">
                <h3 class="text-xs font-black text-blue-400 uppercase mb-4 italic">Materiales</h3>
                <input id="nMat" placeholder="NOMBRE DEL PRODUCTO"><button onclick="crearMat()" class="btn-main !py-3 !bg-blue-600/20">AÑADIR MATERIAL</button>
                <div class="mt-4 space-y-1">${Object.keys(inv).map(m => `<div class="bg-black/40 p-2 rounded flex justify-between text-xs"><span>${m}</span><button onclick="delMat('${m}')" class="text-red-500 font-bold">✕</button></div>`).join("")}</div>
            </div>
            <div class="card-pro mt-4">
                <h3 class="text-xs font-black text-purple-400 uppercase mb-4 italic">Servicios</h3>
                <input id="nServ" placeholder="Nombre"><button onclick="crearServicio()" class="btn-main !py-3 !bg-purple-600/20">AÑADIR SERVICIO</button>
                <div class="grid grid-cols-2 gap-2 mt-4">${serv.map((s, idx) => `<div class="bg-black/40 p-2 rounded flex justify-between text-[10px]"><span>${s}</span><button onclick="delServicio(${idx})" class="text-red-500">✕</button></div>`).join("")}</div>
            </div>`;
    }

    // --- ACCIONES ---
    window.cambiarMeta = async () => { const nueva = prompt("Nueva Meta Mensual ($):", window.state.metaMensual || 3000); if(nueva && !isNaN(nueva)) { window.state.metaMensual = parseFloat(nueva); await window.sync(); } };
    window.updateVentaUI = () => {
        const mat = document.getElementById("vMat").value, tipo = document.getElementById("vTipo").value, cant = parseFloat(document.getElementById("vCant").value) || 1;
        if (tipo === "LIBRE") return;
        if (mat && window.state.inventario[mat]) {
            const info = window.state.inventario[mat];
            const pUnit = (tipo === "MAYOR") ? (info.precioMayor || 0) : (info.precioDetal || 0);
            document.getElementById("vPrec").value = (cant * pUnit).toFixed(2);
        }
    };
    window.addItem = () => {
        const mat = document.getElementById("vMat").value, serv = document.getElementById("vServ").value, concepto = document.getElementById("vConcepto").value.trim().toUpperCase();
        let m = (mat && serv) ? `${mat} + ${serv}` : (mat || serv);
        const p = parseFloat(document.getElementById("vPrec").value) || 0, c = parseFloat(document.getElementById("vCant").value) || 1;
        if(m && p) { 
            window.cart.push({ m, p, c, t: document.getElementById("vTipo").value, mat_key: mat, concepto: concepto || "TRABAJO GENERAL" }); 
            document.getElementById("vConcepto").value = ""; document.getElementById("vMat").value = ""; document.getElementById("vServ").value = ""; document.getElementById("vPrec").value = ""; document.getElementById("vCant").value = "";
            render(); 
        }
    };
    window.saveVenta = async () => {
        const cli = document.getElementById("cli").value.trim().toUpperCase(); if(!cli || !window.cart.length) return;
        const abono = parseFloat(document.getElementById("vAbono").value) || 0, total = window.cart.reduce((a,b)=>a+b.p,0);
        window.cart.forEach(i => { if(i.mat_key && window.state.inventario[i.mat_key]) window.state.inventario[i.mat_key].stock -= i.c; });
        window.state.ventas.push({ id: Date.now(), cliente: cli, whatsapp: document.getElementById("wha").value, items: [...window.cart], total, abono, fecha: document.getElementById("vDate").value });
        await window.sync(); window.cart = [];
    };
    window.saveCompra = async () => {
        const m = document.getElementById("cMat").value, c = parseFloat(document.getElementById("cCant").value), costo = parseFloat(document.getElementById("cCosto").value);
        if(!m || isNaN(c)) return;
        window.state.inventario[m].stock += c;
        if(document.getElementById("cVentaD").value) window.state.inventario[m].precioDetal = parseFloat(document.getElementById("cVentaD").value);
        if(document.getElementById("cVentaM").value) window.state.inventario[m].precioMayor = parseFloat(document.getElementById("cVentaM").value);
        window.state.compras.push({ m, c, costo, f: new Date().toISOString() });
        await window.sync();
    };
    window.editCompra = async (idx) => {
        const c = window.state.compras[idx];
        let nC = parseFloat(prompt("Nueva Cantidad:", c.c));
        let nCost = parseFloat(prompt("Nuevo Costo Total $:", c.costo));
        if(!isNaN(nC) && !isNaN(nCost)) {
            const diff = nC - c.c;
            window.state.inventario[c.m].stock += diff;
            c.c = nC; c.costo = nCost;
            await window.sync();
        }
    };
    window.saveGasto = async () => {
        const d = document.getElementById("gDesc").value, m = parseFloat(document.getElementById("gMonto").value);
        if(d && m) { window.state.gastos.push({ desc: d, monto: m, fecha: document.getElementById("gDate").value }); await window.sync(); }
    };
    window.delGasto = async (idx) => { if(confirm("¿Borrar gasto?")) { window.state.gastos.splice(idx, 1); await window.sync(); } };
    window.delCompra = async (idx) => { if(confirm("¿Borrar compra? (Se restará del stock)")) { 
        const c = window.state.compras[idx];
        window.state.inventario[c.m].stock -= c.c;
        window.state.compras.splice(idx, 1); 
        await window.sync(); 
    } };
    window.registrarMerma = async (n) => {
        let m = parseFloat(prompt(`Cantidad Merma para ${n}:`));
        if(!isNaN(m)) { window.state.inventario[n].stock -= m; window.state.gastos.push({ desc: `MERMA: ${n}`, monto: 0, fecha: new Date().toISOString().split('T')[0] }); await window.sync(); }
    };
    window.editItemInv = async (n) => {
        const i = window.state.inventario[n];
        let nStock = parseFloat(prompt("Cantidad Stock Actual:", i.stock));
        let pD = parseFloat(prompt("Precio Detal $:", i.precioDetal));
        let pM = parseFloat(prompt("Precio Mayor $:", i.precioMayor));
        if(!isNaN(nStock)) window.state.inventario[n].stock = nStock;
        if(!isNaN(pD)) window.state.inventario[n].precioDetal = pD; 
        if(!isNaN(pM)) window.state.inventario[n].precioMayor = pM; 
        await window.sync();
    };
    window.crearMat = async () => { const n = document.getElementById("nMat").value.toUpperCase(); if(n) { window.state.inventario[n] = { stock: 0, precioDetal: 0, precioMayor: 0 }; await window.sync(); } };
    window.crearServicio = async () => { const s = document.getElementById("nServ").value.toUpperCase(); if(s) { window.state.servicios.push(s); await window.sync(); } };
    window.delMat = async (n) => { if(confirm(`¿ELIMINAR ${n}?`)) { delete window.state.inventario[n]; await window.sync(); } };
    window.delServicio = async (idx) => { window.state.servicios.splice(idx, 1); await window.sync(); };
    window.delItemInv = async (n) => { if(confirm(`¿ELIMINAR ${n} DEL SISTEMA?`)) { delete window.state.inventario[n]; await window.sync(); } };
    window.liquidar = async (id) => { const v = window.state.ventas.find(x => x.id === id); v.abono = v.total; await window.sync(); };
    window.abonar = async (id) => { const v = window.state.ventas.find(x => x.id === id); let m = parseFloat(prompt(`Abonar:`)); if(!isNaN(m)) { v.abono += m; await window.sync(); } };
    window.delVenta = async (id) => { if(confirm("¿Seguro que deseas eliminar esta venta por completo?")) { window.state.ventas = window.state.ventas.filter(v => v.id !== id); await window.sync(); } };
    window.editVenta = async (id) => { 
        const v = window.state.ventas.find(x => x.id === id);
        let nT = parseFloat(prompt("Nuevo Total de la Venta ($):", v.total));
        let nA = parseFloat(prompt("Abono total actual ($):", v.abono));
        if(!isNaN(nT) && !isNaN(nA)) { v.total = nT; v.abono = nA; await window.sync(); }
    };
    window.removeItem = (idx) => { window.cart.splice(idx, 1); render(); };

    window.showReceipt = (id) => {
        const v = window.state.ventas.find(x => x.id === id);
        document.getElementById("receiptContent").innerHTML = `
            <div class="text-center mb-4">
                <span class="text-2xl">👻</span>
                <h2 class="text-xl font-black italic text-purple-600">GHOST PRINT</h2>
            </div>
            <div class="flex justify-between mb-2"><span>#${v.id.toString().slice(-6)}</span><span>${v.fecha}</span></div>
            <p class="font-black uppercase">${v.cliente}</p>
            <div class="border-y border-dashed border-black my-4 py-2">
                ${v.items.map(i => `<div class="mb-2"><div class="text-[9px] text-gray-500 italic">${i.concepto}</div><div class="flex justify-between"><span>${i.c}x ${i.m}</span><span>$${i.p.toFixed(2)}</span></div></div>`).join("")}
            </div>
            <div class="flex justify-between font-black"><span>TOTAL:</span><span>$${v.total.toFixed(2)}</span></div>
            <div class="flex justify-between text-green-700"><span>PAGADO:</span><span>$${v.abono.toFixed(2)}</span></div>
            <div class="flex justify-between text-red-600 font-black border-t border-black"><span>DEUDA:</span><span>$${(v.total - v.abono).toFixed(2)}</span></div>`;
        window.currentReceiptId = id; document.getElementById("receiptModal").classList.remove("hidden");
    };
    window.closeReceipt = () => document.getElementById("receiptModal").classList.add("hidden");
    window.shareReceipt = () => { 
        const v = window.state.ventas.find(x => x.id === window.currentReceiptId); 
        const conceptos = v.items.map(i => `• ${i.concepto} (${i.m})`).join("%0A");
        const msg = `*GHOST PRINT*%0A*Recibo:* #${v.id.toString().slice(-6)}%0A*Cliente:* ${v.cliente}%0A*Trabajos:*%0A${conceptos}%0A*Total:* $${v.total}%0A*Pagado:* $${v.abono}%0A*Pendiente:* $${(v.total-v.abono).toFixed(2)}`;
        window.open(`https://wa.me/${v.whatsapp}?text=${msg}`, '_blank'); 
    };

    render();
</script>
</body>
</html>
