<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GhostPrint PRO v14.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #05050a; color: #e2e8f0; font-family: 'Inter', sans-serif; padding-bottom: 90px; }
        .card-pro { background: #161625; border: 1px solid #2d2d44; border-radius: 20px; padding: 18px; margin-bottom: 12px; }
        nav { background: #11111d; display: flex; gap: 8px; overflow-x: auto; padding: 12px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #334155; }
        .btn-nav { background: #26263d; color: #94a3b8; padding: 10px 14px; border-radius: 12px; font-size: 10px; font-weight: 800; white-space: nowrap; cursor: pointer; }
        .active { background: #6d28d9 !important; color: white !important; box-shadow: 0 0 15px rgba(109, 40, 217, 0.4); }
        input, select { background: #0a0a14; border: 1px solid #334155; color: white; padding: 12px; border-radius: 12px; width: 100%; margin: 5px 0; font-weight: 700; }
        .btn-main { background: linear-gradient(to right, #6d28d9, #4c1d95); color: white; padding: 16px; border-radius: 16px; width: 100%; font-weight: 900; text-transform: uppercase; cursor: pointer; border: none; }
        /* Estilo de la Gráfica */
        .bar { transition: height 0.5s ease-in-out; width: 45px; border-radius: 8px 8px 0 0; position: relative; }
        .bar-label { font-size: 9px; font-weight: 900; text-transform: uppercase; margin-top: 8px; color: #94a3b8; }
    </style>
</head>
<body>

<header class="p-4 bg-[#1e1e2f] border-b-2 border-purple-600 flex justify-between items-center">
    <div>
        <h1 class="text-xl font-black italic text-purple-400 uppercase leading-none">GhostPrint PRO</h1>
        <p class="text-[8px] font-bold opacity-40 uppercase">Mañana v14.2</p>
    </div>
    <div id="status-box" class="flex items-center gap-2 px-3 py-1 bg-black/30 rounded-full">
        <div id="dot" class="w-2 h-2 rounded-full bg-green-500"></div>
        <span id="st-text" class="text-[9px] font-black uppercase">Online</span>
    </div>
</header>

<nav id="main-nav">
    <div onclick="setView('inicio')" class="btn-nav active" id="n-inicio">🏠 INICIO</div>
    <div onclick="setView('ventas')" class="btn-nav" id="n-ventas">💵 VENTAS</div>
    <div onclick="setView('reportes')" class="btn-nav" id="n-reportes">📊 REPORTES</div>
    <div onclick="setView('inventario')" class="btn-nav" id="n-inventario">📦 STOCK</div>
    <div onclick="setView('cobros')" class="btn-nav" id="n-cobros">⏳ COBROS</div>
    <div onclick="setView('gastos')" class="btn-nav" id="n-gastos">📉 GASTOS</div>
    <div onclick="setView('config')" class="btn-nav" id="n-config">⚙️ CONFIG</div>
</nav>

<div id="app" class="p-4 max-w-xl mx-auto"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI",
        authDomain: "ghost-print-contabilidad.firebaseapp.com",
        projectId: "ghost-print-contabilidad",
        storageBucket: "ghost-print-contabilidad.firebasestorage.app",
        messagingSenderId: "867057362556",
        appId: "1:867057362556:web:6bd2a461817219a4000bf9"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const docRef = db.collection("sistema").doc("datos_principales");

    window.state = JSON.parse(localStorage.getItem('gp_v14_2')) || { ventas: [], gastos: [], inventario: {}, serviciosExtra: [], comprasInversion: [] };
    window.currentView = "inicio";
    let cart = [];

    window.sync = async function() {
        localStorage.setItem('gp_v14_2', JSON.stringify(window.state));
        try { await docRef.set(window.state); } catch(e) { console.log("Modo Local"); }
    };

    docRef.onSnapshot(doc => { if(doc.exists) { window.state = doc.data(); render(); } });

    window.setView = function(v) {
        window.currentView = v;
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
        const btn = document.getElementById('n-' + v);
        if(btn) btn.classList.add('active');
        render();
    };

    window.render = function() {
        const app = document.getElementById("app");
        const mesActual = new Date().getMonth();
        let html = "";

        if(window.currentView === "inicio") {
            let vM = (window.state.ventas || []).filter(v => new Date(v.id).getMonth() === mesActual);
            let gM = (window.state.gastos || []).filter(g => new Date(g.id).getMonth() === mesActual);
            let cM = (window.state.comprasInversion || []).filter(c => new Date(c.id).getMonth() === mesActual);
            
            let tV = vM.reduce((a,b)=>a+(b.total||0),0);
            let tG = gM.reduce((a,b)=>a+(b.amount||0),0);
            let tI = cM.reduce((a,b)=>a+(b.amount||0),0);
            let neta = tV - tG - tI;

            // Lógica de Gráfica
            let max = Math.max(tV, tG + tI, 1);
            let hV = (tV / max) * 150;
            let hG = ((tG + tI) / max) * 150;

            html = `
            <div class="card-pro border-l-4 border-purple-500 shadow-xl shadow-purple-900/20">
                <p class="text-[10px] font-black text-purple-400 uppercase tracking-widest">Utilidad Neta del Mes</p>
                <h2 class="text-5xl font-black italic text-white">$${neta.toFixed(2)}</h2>
            </div>

            <div class="card-pro flex flex-col items-center">
                <p class="text-[9px] font-black opacity-40 uppercase mb-6 self-start tracking-tighter">Comparativa de Flujo ($)</p>
                <div class="flex items-end justify-center gap-12 h-[150px] w-full border-b border-white/10 pb-1">
                    <div class="flex flex-col items-center">
                        <div class="bar bg-green-500 shadow-[0_0_15px_rgba(34,197,94,0.4)]" style="height: ${hV}px">
                            <span class="absolute -top-6 left-1/2 -translate-x-1/2 text-[10px] font-black">$${tV.toFixed(0)}</span>
                        </div>
                        <span class="bar-label">Ventas</span>
                    </div>
                    <div class="flex flex-col items-center">
                        <div class="bar bg-red-500 shadow-[0_0_15px_rgba(239,68,68,0.4)]" style="height: ${hG}px">
                            <span class="absolute -top-6 left-1/2 -translate-x-1/2 text-[10px] font-black">$${(tG+tI).toFixed(0)}</span>
                        </div>
                        <span class="bar-label">Egresos</span>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-2">
                <div class="bg-green-600/10 p-4 rounded-2xl border border-green-500/20">
                    <p class="text-[8px] font-bold text-green-400 uppercase">Ingresos</p>
                    <b class="text-xl font-black">$${tV.toFixed(2)}</b>
                </div>
                <div class="bg-red-600/10 p-4 rounded-2xl border border-red-500/20">
                    <p class="text-[8px] font-bold text-red-400 uppercase">Gastos/Stock</p>
                    <b class="text-xl font-black">-$${(tG + tI).toFixed(2)}</b>
                </div>
            </div>`;
        }

        if(window.currentView === "ventas") {
            html = `<div class="card-pro">
                <h2 class="text-lg font-black text-purple-400 italic mb-4 uppercase leading-none">Nueva Venta</h2>
                <input type="date" id="fV" value="${new Date().toISOString().split('T')[0]}">
                <input id="cli" placeholder="CLIENTE"><input id="tel" type="number" placeholder="WHATSAPP">
                
                <div class="bg-white/5 p-4 rounded-xl mt-3 border border-white/10">
                    <div class="grid grid-cols-2 gap-2">
                        <select id="pS"><option value="">Material...</option>${Object.keys(window.state.inventario || {}).map(m=>`<option value="${m}">${m}</option>`).join("")}</select>
                        <select id="sS"><option value="">Servicio...</option>${(window.state.serviciosExtra || []).map(s=>`<option value="${s}">${s}</option>`).join("")}</select>
                    </div>
                    <select id="tC" onchange="toggleLibre(this.value)">
                        <option value="detal">PRECIO DETAL ($9)</option><option value="mayor">PRECIO MAYOR ($10)</option><option value="libre">PRECIO PERSONALIZADO</option>
                    </select>
                    <input id="pL" class="hidden" type="number" placeholder="Monto $">
                    <button onclick="addCart()" class="btn-main !p-3 mt-3 shadow-lg shadow-purple-600/20">+ AÑADIR AL DETALLE</button>
                </div>
                <div id="cart-list" class="mt-4 space-y-2"></div>
                <div id="total-disp" class="text-3xl font-black text-center my-6 italic text-white underline decoration-purple-600">TOTAL: $0.00</div>
                <button onclick="finalizarVenta()" class="btn-main">PROCESAR VENTA</button>
            </div>`;
        }

        if(window.currentView === "reportes") {
            let vM = (window.state.ventas || []).filter(v => new Date(v.id).getMonth() === mesActual).reverse();
            html = `<div class="card-pro"><h2 class="text-lg font-black text-purple-400 italic mb-4">HISTORIAL DE VENTAS</h2>
                ${vM.map(v => `<div class="border-b border-white/5 py-3 flex justify-between items-center">
                    <div><b class="text-sm uppercase">${v.cliente}</b><br><span class="text-[9px] opacity-40">${new Date(v.id).toLocaleDateString()}</span></div>
                    <b class="text-purple-400 font-black text-lg">$${v.total.toFixed(2)}</b>
                </div>`).join("") || '<p class="text-center py-10 opacity-30 italic">No hay ventas este mes</p>'}
            </div>`;
        }

        if(window.currentView === "inventario") {
            html = `<div class="card-pro">
                <h2 class="text-lg font-black text-blue-400 italic mb-3">CARGA DE STOCK</h2>
                <input type="date" id="fC" value="${new Date().toISOString().split('T')[0]}">
                <select id="mInv">${Object.keys(window.state.inventario || {}).map(m=>`<option value="${m}">${m}</option>`).join("")}</select>
                <div class="grid grid-cols-2 gap-2">
                    <input id="qInv" type="number" placeholder="Metros"><input id="pInv" type="number" placeholder="$/m">
                </div>
                <button onclick="saveInv()" class="btn-main !from-blue-600 !to-blue-800 mt-2">GUARDAR ENTRADA</button>
            </div>
            <div class="grid grid-cols-2 gap-2">
                ${Object.entries(window.state.inventario || {}).map(([n, i])=>`<div class="card-pro text-center">
                    <p class="text-[8px] font-black opacity-50 uppercase">${n}</p>
                    <h4 class="text-2xl font-black text-white">${(i.stock || 0).toFixed(2)}m</h4>
                </div>`).join("")}
            </div>`;
        }

        if(window.currentView === "gastos") {
            let gM = (window.state.gastos || []).filter(g => new Date(g.id).getMonth() === mesActual).reverse();
            html = `<div class="card-pro">
                <h2 class="text-lg font-black text-red-500 italic mb-3 uppercase">Gastos</h2>
                <input type="date" id="fG" value="${new Date().toISOString().split('T')[0]}">
                <input id="gNom" placeholder="Concepto"><input id="gMon" type="number" placeholder="Monto $">
                <button onclick="saveGasto()" class="btn-main !from-red-600 !to-red-800 mt-2">REGISTRAR</button>
            </div>
            <div class="space-y-2">
                ${gM.map(g => `<div class="card-pro !py-3 flex justify-between items-center">
                    <div><p class="text-[8px] opacity-40">${new Date(g.id).toLocaleDateString()}</p><b class="uppercase text-xs">${g.name}</b></div>
                    <div class="flex items-center gap-3"><b class="text-red-400">$${g.amount}</b>
                        <button onclick="editGasto(${g.id})" class="text-blue-400">✏️</button>
                        <button onclick="delGasto(${g.id})" class="text-red-600">🗑️</button>
                    </div>
                </div>`).join("")}
            </div>`;
        }

        if(window.currentView === "cobros") {
            let deudas = (window.state.ventas || []).filter(v => !v.pagado);
            html = deudas.map(v => `<div class="card-pro flex justify-between items-center border-l-4 border-amber-500">
                <div><b class="text-sm uppercase">${v.cliente}</b><br><span class="text-red-400 font-bold text-xs">DEBE: $${(v.total - (v.abonado || 0)).toFixed(2)}</span></div>
                <div class="flex gap-2">
                    <button onclick="ws('${v.telefono}', ${(v.total-(v.abonado||0))})" class="bg-green-600 p-3 rounded-xl">📱</button>
                    <button onclick="abono(${v.id})" class="bg-blue-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase">Abono</button>
                </div>
            </div>`).join("") || '<p class="text-center py-20 opacity-30 italic">Sin deudas</p>';
        }

        if(window.currentView === "config") {
            html = `<div class="card-pro text-center">
                <h2 class="text-lg font-black text-slate-400 mb-4 italic uppercase">Catálogo</h2>
                <input id="newM" placeholder="Material"><button onclick="addMat()" class="btn-main !from-slate-600 !to-slate-800 mt-2">Añadir Material</button>
                <input id="newS" class="mt-4" placeholder="Servicio"><button onclick="addSer()" class="btn-main !from-indigo-600 !to-indigo-800 mt-2">Añadir Servicio</button>
            </div>`;
        }
        app.innerHTML = html;
    };

    window.toggleLibre = (v) => { document.getElementById("pL").className = (v === "libre") ? "block" : "hidden"; };

    window.addCart = function() {
        let m = document.getElementById("pS").value, s = document.getElementById("sS").value, t = document.getElementById("tC").value;
        let p = (t === "detal") ? 9 : (t === "mayor") ? 10 : parseFloat(document.getElementById("pL").value) || 0;
        let d = (m && s) ? m + " + " + s : m || s;
        if(d) {
            cart.push({ d, p, mat: m });
            renderCart();
        }
    };

    function renderCart() {
        document.getElementById("cart-list").innerHTML = cart.map((c, i) => `<div class="bg-white/5 p-2 rounded-lg flex justify-between text-[11px] border border-white/5"><span>${c.d}</span><b>$${c.p.toFixed(2)} <button onclick="cart.splice(${i},1);renderCart()" class="text-red-500 ml-2">×</button></b></div>`).join("");
        document.getElementById("total-disp").innerText = "TOTAL: $" + cart.reduce((a,b)=>a+b.p,0).toFixed(2);
    }

    window.finalizarVenta = async function() {
        let cli = document.getElementById("cli").value, tel = document.getElementById("tel").value, fec = document.getElementById("fV").value;
        if(!cli || !cart.length) return alert("Faltan datos");
        cart.forEach(c => { if(c.mat && window.state.inventario[c.mat]) window.state.inventario[c.mat].stock -= 1; });
        window.state.ventas.push({ id: new Date(fec+"T12:00:00").getTime(), cliente: cli.toUpperCase(), telefono: tel, total: cart.reduce((a,b)=>a+b.p,0), abonado: 0, pagado: false });
        await window.sync(); cart = []; setView('inicio');
    };

    window.saveInv = async function() {
        let m = document.getElementById("mInv").value, q = parseFloat(document.getElementById("qInv").value), p = parseFloat(document.getElementById("pInv").value), f = document.getElementById("fC").value;
        if(m && q && p) {
            window.state.inventario[m].stock += q;
            if(!window.state.comprasInversion) window.state.comprasInversion = [];
            window.state.comprasInversion.push({ id: new Date(f+"T12:00:00").getTime(), amount: q*p });
            await window.sync(); setView('inicio');
        }
    };

    window.saveGasto = async function() {
        let n = document.getElementById("gNom").value, m = parseFloat(document.getElementById("gMon").value), f = document.getElementById("fG").value;
        if(n && m) { window.state.gastos.push({ id: new Date(f+"T12:00:00").getTime(), name: n.toUpperCase(), amount: m }); await window.sync(); render(); }
    };

    window.delGasto = async (id) => { if(confirm("¿Borrar?")){ window.state.gastos = window.state.gastos.filter(g => g.id !== id); await window.sync(); render(); } };
    window.editGasto = (id) => {
        let g = window.state.gastos.find(x => x.id === id);
        let n = prompt("Concepto:", g.name); let a = parseFloat(prompt("Monto:", g.amount));
        if(n && a) { g.name = n.toUpperCase(); g.amount = a; window.sync(); render(); }
    };

    window.addMat = async function() { let n = document.getElementById("newM").value.toUpperCase(); if(n) { if(!window.state.inventario) window.state.inventario = {}; window.state.inventario[n] = {stock: 0}; await window.sync(); render(); } };
    window.addSer = async function() { let n = document.getElementById("newS").value.toUpperCase(); if(n) { if(!window.state.serviciosExtra) window.state.serviciosExtra = []; window.state.serviciosExtra.push(n); await window.sync(); render(); } };
    window.abono = async function(id) { let v = window.state.ventas.find(x => x.id === id); let m = parseFloat(prompt(`Deuda: $${(v.total-v.abonado).toFixed(2)}. Abono?`)); if(m) { v.abonado = (v.abonado||0) + m; if(v.abonado >= v.total) v.pagado = true; await window.sync(); render(); } };
    window.ws = (t, d) => window.open(`https://api.whatsapp.com/send?phone=${t}&text=Hola, saldo pendiente: $${d.toFixed(2)} en GhostPrint.`, '_blank');

    render();
</script>
</body>
</html>
