<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>GhostPrint PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--p:#7B3FA0;--p2:#9B5FC0;--p3:#5a2878;--o:#F07020;--o2:#f59340;--g:#22c55e;--r:#ef4444;--y:#f59e0b;--ink:#0d0810;--ink2:#130d18;--ink3:#1e1230;--bd:rgba(255,255,255,.08);--tx:#f5f0ff;--mt:rgba(245,240,255,.42)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--ink);color:var(--tx);font-family:"DM Sans",sans-serif;overflow-x:hidden;min-height:100vh}
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 80% 50% at 50% -5%,rgba(123,63,160,.25),transparent 60%),radial-gradient(ellipse 50% 40% at 90% 80%,rgba(240,112,32,.06),transparent 60%)}
#cvbg{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.15}
#hdr{position:fixed;top:0;left:0;right:0;z-index:100;height:60px;padding:0 16px;display:none;align-items:center;justify-content:space-between;background:rgba(13,8,16,.93);border-bottom:1px solid var(--bd);backdrop-filter:blur(20px)}
#hdr img{width:40px;height:40px;border-radius:8px;object-fit:cover}
.hb{font-family:"Bebas Neue";font-size:18px;letter-spacing:2px}
.hs{font-size:8px;letter-spacing:.22em;color:var(--mt);text-transform:uppercase;font-weight:600}
.ub{background:rgba(123,63,160,.25);border:1px solid rgba(123,63,160,.4);border-radius:999px;padding:4px 11px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--p2)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--g);box-shadow:0 0 8px var(--g);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#nav{position:fixed;bottom:0;left:0;right:0;z-index:100;height:68px;background:rgba(13,8,16,.96);border-top:1px solid var(--bd);backdrop-filter:blur(20px);display:none;align-items:center;justify-content:space-around}
.nb{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;padding:6px 2px;border:none;background:none;color:rgba(245,240,255,.28);cursor:pointer;font-family:"DM Sans";font-size:8px;font-weight:700;text-transform:uppercase}
.nb .ic{font-size:18px;transition:transform .2s cubic-bezier(.34,1.56,.64,1);display:block}
.nb.on{color:var(--p2)}
.nb.on .ic{transform:translateY(-4px) scale(1.1);filter:drop-shadow(0 0 6px var(--p))}
.nb:active{opacity:.6}
#app{position:relative;z-index:1;padding:72px 14px 86px;max-width:520px;margin:0 auto}
.c{background:rgba(26,18,40,.75);border:1px solid var(--bd);border-radius:20px;padding:18px;margin-bottom:12px;backdrop-filter:blur(8px);position:relative;overflow:hidden}
.c::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent)}
.cp{border-color:rgba(123,63,160,.3);background:rgba(123,63,160,.07)}
.co{border-color:rgba(240,112,32,.25);background:rgba(240,112,32,.05)}
.cg{border-color:rgba(34,197,94,.2);background:rgba(34,197,94,.04)}
.cr{border-color:rgba(239,68,68,.2);background:rgba(239,68,68,.04)}
.cy{border-color:rgba(245,158,11,.2);background:rgba(245,158,11,.04)}
.pt{font-family:"Bebas Neue";font-size:25px;letter-spacing:2px;line-height:1;margin-bottom:2px}
.ps{font-size:9px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--mt)}
.bn{font-family:"Bebas Neue";font-size:48px;letter-spacing:-1px;line-height:1}
.bns{font-family:"Bebas Neue";font-size:28px;letter-spacing:-1px;line-height:1}
.mo{font-family:"JetBrains Mono";font-size:10px;color:var(--mt)}
.inp{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--bd);border-radius:12px;color:var(--tx);padding:12px 14px;font-size:15px;font-family:"DM Sans";font-weight:500;outline:none;transition:border-color .2s;margin:5px 0;-webkit-appearance:none}
.inp:focus{border-color:var(--p);background:rgba(123,63,160,.06)}
.inp::placeholder{color:rgba(245,240,255,.18)}
select.inp{cursor:pointer}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:13px;font-family:"Bebas Neue";font-size:16px;letter-spacing:1.5px;cursor:pointer;transition:transform .12s,opacity .12s}
.btn:active{transform:scale(.96);opacity:.82}
.bp{background:linear-gradient(135deg,var(--p),var(--p3));color:#fff;box-shadow:0 4px 18px rgba(123,63,160,.35)}
.bo{background:linear-gradient(135deg,var(--o),#c45010);color:#fff;box-shadow:0 4px 18px rgba(240,112,32,.3)}
.bs{background:rgba(255,255,255,.06);border:1px solid var(--bd);color:var(--tx)}
.bgr{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:var(--g)}
.br{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#f87171}
.by{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);color:var(--y)}
.bsm{width:auto;display:inline-block;padding:6px 12px;font-size:11px;border-radius:9px;letter-spacing:1px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.tile{background:rgba(255,255,255,.04);border:1px solid var(--bd);border-radius:13px;padding:13px}
.tlbl{font-size:8px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--mt);margin-bottom:5px}
.prog{height:5px;background:rgba(255,255,255,.06);border-radius:999px;overflow:hidden;margin-top:8px}
.progf{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--p),var(--o));transition:width .8s ease}
.pill{display:inline-block;padding:3px 9px;border-radius:999px;font-size:8px;font-weight:800;letter-spacing:.07em;text-transform:uppercase}
.pg{background:rgba(34,197,94,.15);color:var(--g);border:1px solid rgba(34,197,94,.25)}
.pr{background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.25)}
.pp{background:rgba(123,63,160,.2);color:var(--p2);border:1px solid rgba(123,63,160,.3)}
.sr{border-radius:13px;padding:13px;margin-bottom:8px;border:1px solid var(--bd);background:rgba(255,255,255,.03);position:relative}
.sr.paid{border-color:rgba(34,197,94,.25);background:rgba(34,197,94,.04)}
.sr.debt{border-color:rgba(239,68,68,.2);background:rgba(239,68,68,.04)}
.dv{height:1px;background:var(--bd);margin:11px 0}
.ci{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:rgba(255,255,255,.04);border:1px solid var(--bd);border-radius:10px;margin-bottom:6px;gap:8px}
.tst{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-6px);background:var(--ink3);border:1px solid var(--bd);color:var(--tx);padding:8px 16px;border-radius:999px;font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;z-index:999;opacity:0;pointer-events:none;transition:all .22s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;max-width:92vw}
.tst.on{opacity:1;transform:translateX(-50%) translateY(0)}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;display:none;align-items:center;justify-content:center;padding:14px;backdrop-filter:blur(12px)}
.ov.open{display:flex}
.ob{background:var(--ink2);border:1px solid var(--bd);border-radius:20px;width:100%;max-width:400px;max-height:90vh;overflow-y:auto}
.pdot{width:13px;height:13px;border-radius:50%;border:2px solid rgba(255,255,255,.18);transition:all .18s cubic-bezier(.34,1.56,.64,1)}
.pdot.on{background:var(--o);border-color:var(--o);box-shadow:0 0 12px var(--o);transform:scale(1.25)}
.key{width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,.05);border:1px solid var(--bd);font-family:"Bebas Neue";font-size:24px;color:var(--tx);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .1s;user-select:none}
.key:active{background:var(--p);border-color:var(--p);transform:scale(.87);box-shadow:0 0 16px rgba(123,63,160,.6)}
.mc{background:rgba(255,255,255,.03);border:1px solid var(--bd);border-radius:13px;padding:13px;margin-bottom:8px}
.qb{background:rgba(255,255,255,.04);border:1px solid var(--bd);border-radius:13px;padding:11px 7px;text-align:center;cursor:pointer;transition:transform .15s cubic-bezier(.34,1.56,.64,1)}
.qb:active{transform:scale(.92)}
.ae{display:flex;justify-content:space-between;align-items:center;padding:7px 10px;background:rgba(34,197,94,.05);border:1px solid rgba(34,197,94,.15);border-radius:9px;margin-bottom:5px}
.fa{animation:fadeUp .28s ease both}
.fa1{animation-delay:.05s}.fa2{animation-delay:.1s}.fa3{animation-delay:.14s}.fa4{animation-delay:.18s}
@keyframes fadeUp{from{opacity:0;transform:translateY(13px)}to{opacity:1;transform:none}}
.ch{position:relative;height:200px}.ch2{position:relative;height:220px}
::-webkit-scrollbar{display:none}
.sec{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:12px}
.empty{text-align:center;padding:34px 14px;border:1px dashed rgba(255,255,255,.1);border-radius:14px;color:var(--mt);font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase}
@media(max-width:380px){#app{padding:68px 10px 82px}.bn{font-size:40px}.key{width:58px;height:58px;font-size:22px}}
</style>
</head>

(function(){var cv=document.getElementById("cvbg");if(!cv)return;var ctx=cv.getContext("2d");function draw(){var W=cv.width=window.innerWidth,H=cv.height=window.innerHeight;ctx.clearRect(0,0,W,H);for(var l=0;l<26;l++){var p=l/26,bY=H*.05+p*H*.9,amp=26+p*52,freq=.003+p*.002,ph=l*1.1,isO=l%5===0,a=isO?.13:.08;ctx.beginPath();ctx.moveTo(0,bY);for(var x=0;x<=W;x+=4){var y=bY+Math.sin(x*freq+ph)*amp+Math.sin(x*freq*2.1+ph*.6)*(amp*.35)+Math.sin(x*freq*.4+ph*1.2)*(amp*.5);ctx.lineTo(x,y);}ctx.strokeStyle=isO?"rgba(240,112,32,"+a+")":"rgba(123,63,160,"+a+")";ctx.lineWidth=isO?1.4:.7;ctx.stroke();}}draw();window.addEventListener("resize",draw);})();
