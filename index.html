<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GhostPrint MASTER v28.9.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { background-color: #030308; color: #f8fafc; font-family: 'Inter', sans-serif; padding-bottom: 100px; }
        .card-pro { background: #111122; border: 1px solid #2d2d44; border-radius: 20px; padding: 18px; margin-bottom: 12px; }
        nav { background: rgba(10, 10, 20, 0.95); display: flex; gap: 8px; overflow-x: auto; padding: 14px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #334155; }
        .btn-nav { background: #1e1e30; color: #64748b; padding: 12px 18px; border-radius: 14px; font-size: 10px; font-weight: 800; white-space: nowrap; cursor: pointer; text-transform: uppercase; }
        .active { background: #7c3aed !important; color: white !important; }
        
        input, select { background: #070712; border: 1px solid #334155; color: white; padding: 16px; border-radius: 14px; width: 100%; margin: 8px 0; font-size: 16px; font-weight: 700; outline: none; }
        input::placeholder { font-size: 14px; opacity: 0.5; }
        
        .btn-main { background: linear-gradient(135deg, #7c3aed 0%, #4c1d95 100%); color: white; padding: 18px; border-radius: 18px; width: 100%; font-weight: 900; text-transform: uppercase; cursor: pointer; border: none; font-size: 14px; }
        .alert-low { border: 2px solid #ef4444 !important; background: rgba(239, 68, 68, 0.1) !important; }
        .ghost-glow { filter: drop-shadow(0 0 10px #7c3aed); }
        .icon-btn-lg { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; border-radius: 12px; transition: all 0.2s; cursor: pointer; font-size: 18px; }
        ::-webkit-calendar-picker-indicator { filter: invert(1); }
        
        .chart-bar { height: 8px; border-radius: 4px; background: #2d2d44; overflow: hidden; margin: 8px 0; }
        .chart-fill { height: 100%; transition: width 0.5s ease-in-out; }
    </style>
</head>
<body>

<div class="p-4 flex justify-between items-center bg-[#0a0a14] border-b border-white/5">
    <div class="flex items-center gap-3">
        <span class="text-4xl ghost-glow">👻</span>
        <div>
            <h1 class="text-xl font-black italic text-purple-500 leading-none">GHOST PRINT</h1>
            <p class="text-[8px] font-black opacity-40 uppercase tracking-widest text-purple-300">Master Suite v28.9.2</p>
        </div>
    </div>
</div>

<nav id="mainNav">
    <div onclick="setView('inicio')" class="btn-nav active" id="n-inicio">📊 CONTROL</div>
    <div onclick="setView('ventas')" class="btn-nav" id="n-ventas">💵 Ventas</div>
    <div onclick="setView('cobrar')" class="btn-nav" id="n-cobrar">📑 POR COBRAR</div>
    <div onclick="setView('compras')" class="btn-nav" id="n-compras">🛒 Compras</div>
    <div onclick="setView('gastos')" class="btn-nav" id="n-gastos">💸 Gastos</div>
    <div onclick="setView('inventario')" class="btn-nav" id="n-inventario">📦 Stock</div>
    <div onclick="setView('catalogo')" class="btn-nav" id="n-catalogo">⚙️ CATALOGO</div>
</nav>

<div id="app" class="p-4 max-w-2xl mx-auto"></div>

<div id="receiptModal" class="fixed inset-0 bg-black/90 z-[200] hidden flex items-center justify-center p-4">
    <div class="bg-white text-black p-6 rounded-2xl w-full max-w-sm shadow-2xl relative overflow-hidden">
        <div class="text-center mb-4">
             <span class="text-4xl">👻</span>
             <h2 class="text-xl font-black italic leading-none text-purple-600">GHOST PRINT</h2>
             <p class="text-[8px] font-bold uppercase tracking-tighter">Soluciones Gráficas Profesionales</p>
        </div>
        <div id="receiptContent" class="text-[11px] font-mono border-t border-dashed border-black pt-4"></div>
        <div class="mt-6 flex gap-2 no-print">
            <button onclick="closeReceipt()" class="flex-1 bg-gray-200 p-3 rounded-xl font-bold">Cerrar</button>
            <button onclick="shareReceipt()" class="flex-1 bg-purple-600 text-white p-3 rounded-xl font-bold">WhatsApp</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI", authDomain: "ghost-print-contabilidad.firebaseapp.com", projectId: "ghost-print-contabilidad", storageBucket: "ghost-print-contabilidad.firebasestorage.app", messagingSenderId: "867057362556", appId: "1:867057362556:web:6bd2a461817219a4000bf9" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const docRef = db.collection("sistema").doc("datos_principales");

    const SERVICIOS_DEFECTO = ["DISEÑO", "IMPRESIÓN", "DISEÑO E IMPRESIÓN", "INSTALACIÓN", "POP", "ROTULACIÓN", "LAMINADO", "IMPRESIÓN Y CORTE"];

    window.state = { ventas: [], inventario: {}, compras: [], gastos: [], servicios: SERVICIOS_DEFECTO };
    window.currentView = 'inicio';
    window.cart = [];

    window.sync = async function() { await docRef.set(window.state); render(); };
    docRef.onSnapshot(doc => { if(doc.exists) { window.state = doc.data(); render(); } });

    window.setView = function(v) { 
        window.currentView = v; 
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active')); 
        document.getElementById('n-'+v)?.classList.add('active'); 
        if(v === 'ventas') window.cart = []; 
        render(); 
    };

    window.render = function() {
        const app = document.getElementById("app");
        const inv = window.state.inventario || {};
        const serv = window.state.servicios || SERVICIOS_DEFECTO;
        const today = new Date().toISOString().split('T')[0];

        if(window.currentView === 'inicio') {
            const vM = window.state.ventas || [];
            const gM = window.state.gastos || [];
            const now = new Date();
            const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
            const currentVentas = vM.filter(item => new Date(item.fecha) >= startOfMonth);
            const currentGastos = gM.filter(item => new Date(item.fecha) >= startOfMonth);
            
            const totalVentas = currentVentas.reduce((a, b) => a + (Number(b.total) || 0), 0);
            const totalAbonos = currentVentas.reduce((a, b) => a + (Number(b.abono) || 0), 0);
            const totalDeuda = totalVentas - totalAbonos;
            const totalGastos = currentGastos.reduce((a, b) => a + (Number(b.monto) || 0), 0);
            const totalCaja = totalAbonos - totalGastos;
            
            const cobroPct = totalVentas > 0 ? (totalAbonos / totalVentas) * 100 : 0;
            const gastoPct = totalVentas > 0 ? Math.min((totalGastos / totalVentas) * 100, 100) : 0;

            app.innerHTML = `
                <div class="card-pro text-center bg-gradient-to-br from-green-900/40 to-[#111122] border-green-500/30">
                    <p class="text-[10px] opacity-60 uppercase font-black tracking-widest text-green-300">Total en Caja (Efectivo Real)</p>
                    <h2 class="text-5xl font-black italic text-green-400">$${totalCaja.toLocaleString()}</h2>
                </div>
                <div class="card-pro bg-[#16162a]">
                    <div class="mb-4">
                        <div class="flex justify-between text-[10px] font-black uppercase mb-1">
                            <span class="text-purple-400">Efectividad de Cobro</span>
                            <span class="text-white">${cobroPct.toFixed(0)}%</span>
                        </div>
                        <div class="chart-bar"><div class="chart-fill bg-purple-500" style="width: ${cobroPct}%"></div></div>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="card-pro text-center bg-purple-900/10 border-purple-500/20">
                        <p class="text-[9px] opacity-40 uppercase font-black">Facturado Total</p>
                        <h2 class="text-2xl font-black text-purple-500">$${totalVentas.toLocaleString()}</h2>
                    </div>
                    <div class="card-pro text-center bg-red-900/10 border-red-500/20">
                        <p class="text-[9px] opacity-40 uppercase font-black">Por Cobrar ⚠️</p>
                        <h2 class="text-2xl font-black text-red-500">$${totalDeuda.toLocaleString()}</h2>
                    </div>
                </div>
            `;
        }

        else if(window.currentView === 'ventas') {
            app.innerHTML = `
                <div class="card-pro">
                    <h2 class="text-xl font-black italic text-purple-500 mb-6 uppercase text-center tracking-tighter">Punto de Venta</h2>
                    <input id="vDate" type="date" value="${today}" class="mb-4">
                    <div class="grid grid-cols-2 gap-2 mb-4">
                        <input id="cli" placeholder="CLIENTE" class="!m-0 text-lg uppercase" value="${window.pendingCli || ''}" oninput="window.pendingCli = this.value">
                        <input id="wha" type="tel" placeholder="WHA" class="!m-0 text-lg" value="${window.pendingWha || ''}" oninput="window.pendingWha = this.value">
                    </div>
                    
                    <div class="bg-white/5 p-5 rounded-2xl border border-white/10">
                        <select id="vMat" onchange="updateVentaUI()" class="text-lg">
                            <option value="">-- SELECCIONAR --</option>
                            <optgroup label="MATERIALES">${Object.keys(inv).map(m=>`<option value="${m}">${m}</option>`).join("")}</optgroup>
                            <optgroup label="SERVICIOS">${serv.map(s=>`<option value="${s}">${s}</option>`).join("")}</optgroup>
                        </select>
                        <div class="flex gap-2">
                            <select id="vModo" onchange="updateVentaUI()" class="w-1/2 text-lg">
                                <option value="detal">DETAL</option>
                                <option value="mayor">MAYOR</option>
                                <option value="libre">LIBRE</option>
                            </select>
                            <input id="vCant" type="number" placeholder="CANT" oninput="updateVentaUI()" class="w-1/2 text-lg">
                        </div>
                        <input id="vPrec" type="number" placeholder="PRECIO TOTAL $" class="text-xl text-purple-400 font-black">
                        <button onclick="addItem()" class="btn-main !bg-purple-600/20 border border-purple-500/30 !text-purple-400 !py-3 mt-2">+ AGREGAR AL CARRITO</button>
                    </div>

                    <div id="vLista" class="mt-6 space-y-2">
                        ${window.cart.map((item, idx) => `
                            <div class="flex justify-between items-center bg-white/5 p-4 rounded-xl border-l-4 border-purple-500">
                                <div>
                                    <div class="text-[12px] font-black uppercase text-white">${item.m} <span class="text-purple-400 ml-1 text-[10px]">— x${item.c}</span></div>
                                    <div class="text-[9px] opacity-40 uppercase font-bold">${item.modo}</div>
                                </div>
                                <div class="flex items-center gap-4">
                                    <b class="text-lg text-white">$${item.p.toFixed(2)}</b>
                                    <button onclick="removeItem(${idx})" class="p-2 text-red-500">✕</button>
                                </div>
                            </div>
                        `).join("")}
                    </div>

                    <div id="vTotalDisplay" class="text-6xl font-black text-center my-8 text-white tracking-tighter">$${window.cart.reduce((a,b)=>a+b.p, 0).toFixed(2)}</div>
                    <input id="vAbono" type="number" placeholder="ABONO $" class="text-3xl text-green-500 font-black text-center bg-transparent border-none">
                    <button onclick="saveVenta()" class="btn-main text-lg py-5 shadow-xl mt-4">FINALIZAR VENTA</button>
                </div>
            `;
        }

        else if(window.currentView === 'cobrar') renderPorCobrar(app);
        else if(window.currentView === 'compras') renderCompras(app, inv);
        else if(window.currentView === 'gastos') renderGastos(app, today);
        else if(window.currentView === 'inventario') renderInventario(app, inv);
        else if(window.currentView === 'catalogo') renderCatalogo(app, inv, serv);
    };

    // --- LÓGICA DE VENTAS ACTUALIZADA ---
    window.updateVentaUI = () => {
        const m = document.getElementById("vMat").value;
        const modo = document.getElementById("vModo").value;
        const c = parseFloat(document.getElementById("vCant").value) || 0;
        const info = window.state.inventario[m];

        if(info && modo !== "libre") {
            let precioUnitario = (modo === "detal") ? (info.precioDetal || 0) : (info.precioMayor || 0);
            document.getElementById("vPrec").value = (precioUnitario * c).toFixed(2);
        }
    };

    window.addItem = () => {
        const m = document.getElementById("vMat").value;
        const p = parseFloat(document.getElementById("vPrec").value) || 0;
        const c = parseFloat(document.getElementById("vCant").value) || 0;
        const modo = document.getElementById("vModo").value;
        const cliName = document.getElementById("cli").value.trim();
        
        if(!cliName) { alert("⚠️ Escribe el nombre del cliente"); return; }
        if(m && p) {
            window.cart.push({ m, p, c, modo: modo.toUpperCase(), cli_temp: cliName.toUpperCase() });
            render();
        }
    };

    window.saveVenta = async () => {
        const cliInput = document.getElementById("cli").value.trim();
        if(!cliInput || !window.cart.length) return;

        const abono = parseFloat(document.getElementById("vAbono").value) || 0;
        const total = window.cart.reduce((a,b)=>a+b.p,0);
        const id = Date.now();
        
        window.cart.forEach(i => { if(window.state.inventario[i.m]) window.state.inventario[i.m].stock -= i.c; });
        
        window.state.ventas.push({ 
            id, 
            cliente: cliInput.toUpperCase(), 
            whatsapp: document.getElementById("wha").value || "", 
            items: [...window.cart], 
            total, 
            abono, 
            fecha: document.getElementById("vDate").value 
        });
        
        await window.sync();
        showReceipt(id);
        window.cart = []; 
        window.pendingCli = ""; 
        window.pendingWha = "";
        render();
    };

    // --- LÓGICA DE COMPRAS ACTUALIZADA ---
    function renderCompras(app, inv) {
        app.innerHTML = `
            <div class="card-pro">
                <h2 class="text-lg font-black italic text-blue-400 mb-4 uppercase text-center">Carga de Stock</h2>
                <select id="cMat"><option value="">-- MATERIAL --</option>${Object.keys(inv).map(m=>`<option value="${m}">${m}</option>`).join("")}</select>
                <div class="grid grid-cols-2 gap-2">
                    <input id="cCant" type="number" placeholder="CANTIDAD">
                    <input id="cCosto" type="number" placeholder="COSTO TOTAL $">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <input id="cVentaDetal" type="number" placeholder="P. DETAL $">
                    <input id="cVentaMayor" type="number" placeholder="P. MAYOR $">
                </div>
                <button onclick="saveCompra()" class="btn-main !bg-blue-600 mt-4">CARGAR COMPRA</button>
            </div>`;
    }

    window.saveCompra = async () => {
        const m = document.getElementById("cMat").value;
        const c = parseFloat(document.getElementById("cCant").value);
        if(m && c) {
            window.state.inventario[m].stock += c;
            window.state.inventario[m].precioDetal = parseFloat(document.getElementById("cVentaDetal").value) || 0;
            window.state.inventario[m].precioMayor = parseFloat(document.getElementById("cVentaMayor").value) || 0;
            if(!window.state.compras) window.state.compras = [];
            window.state.compras.push({ m, c, f: new Date().toISOString() });
            await window.sync();
        }
    };

    // --- MÓDULO POR COBRAR (SIN CAMBIOS PARA NO DAÑAR) ---
    function renderPorCobrar(app) {
        const ventas = window.state.ventas || [];
        const deudoresMap = {};
        ventas.forEach(v => {
            const deuda = v.total - v.abono;
            if (deuda > 0.01) {
                if (!deudoresMap[v.cliente]) deudoresMap[v.cliente] = { nombre: v.cliente, totalDeuda: 0, facturas: [] };
                deudoresMap[v.cliente].totalDeuda += deuda;
                deudoresMap[v.cliente].facturas.push(v);
            }
        });
        app.innerHTML = `<h2 class="text-lg font-black text-red-500 mb-4">POR COBRAR</h2><div class="space-y-4">
            ${Object.values(deudoresMap).map(d => `<div class="card-pro border-l-4 border-red-600">
                <div class="flex justify-between"><b>${d.nombre}</b><span class="text-red-500 font-black">$${d.totalDeuda.toFixed(2)}</span></div>
                ${d.facturas.map(f => `<div class="text-[10px] mt-2 flex justify-between opacity-60"><span>${f.fecha}</span><button onclick="liquidar(${f.id})" class="text-green-500">LIQUIDAR</button></div>`).join("")}
            </div>`).join("")}</div>`;
    }

    window.liquidar = async (id) => {
        const v = window.state.ventas.find(x => x.id === id);
        if(v) { v.abono = v.total; await window.sync(); }
    };

    // --- MANTENIMIENTO DE OTROS MÓDULOS ---
    function renderGastos(app, today) {
        app.innerHTML = `<div class="card-pro"><h2 class="text-red-500 font-black">GASTOS</h2>
        <input id="gDesc" placeholder="DESC"><input id="gMonto" type="number" placeholder="$">
        <button onclick="saveGasto()" class="btn-main !bg-red-600">GUARDAR</button></div>`;
    }
    window.saveGasto = async () => {
        const d = document.getElementById("gDesc").value, m = parseFloat(document.getElementById("gMonto").value);
        if(d && m) { window.state.gastos.push({ desc: d, monto: m, fecha: new Date().toISOString().split('T')[0] }); await window.sync(); }
    };

    function renderInventario(app, inv) {
        app.innerHTML = `<div class="space-y-3">${Object.entries(inv).map(([n, i]) => `
            <div class="card-pro border-l-4 border-blue-600 flex justify-between items-center">
                <div><b class="text-purple-400 text-xs">${n}</b><br><span class="text-3xl font-black">${i.stock.toFixed(2)}</span></div>
                <button onclick="editStock('${n}')" class="icon-btn-lg bg-blue-600/20 text-blue-400">✏️</button>
            </div>`).join("")}</div>`;
    }
    window.editStock = async (m) => {
        let n = parseFloat(prompt(`AJUSTE STOCK (${m}):`, window.state.inventario[m].stock));
        if(!isNaN(n)) { window.state.inventario[m].stock = n; await window.sync(); }
    };

    function renderCatalogo(app, inv, serv) {
        app.innerHTML = `<div class="card-pro"><input id="nMat" placeholder="NUEVO MATERIAL"><button onclick="crearMat()" class="btn-main">+ REGISTRAR</button></div>`;
    }
    window.crearMat = async () => {
        const n = document.getElementById("nMat").value.toUpperCase();
        if(n) { window.state.inventario[n] = { stock: 0, precioDetal: 0, precioMayor: 0 }; await window.sync(); }
    };

    window.showReceipt = (id) => {
        const v = window.state.ventas.find(x => x.id === id);
        document.getElementById("receiptContent").innerHTML = `<p class="font-black">${v.cliente}</p><hr>${v.items.map(i => `<div class="flex justify-between"><span>${i.m}</span><span>$${i.p.toFixed(2)}</span></div>`).join("")}<hr><p>TOTAL: $${v.total.toFixed(2)}</p>`;
        document.getElementById("receiptModal").classList.remove("hidden");
    };
    window.closeReceipt = () => document.getElementById("receiptModal").classList.add("hidden");
    window.shareReceipt = () => { alert("Enviando a WhatsApp..."); };

    render();
</script>
</body>
</html>
