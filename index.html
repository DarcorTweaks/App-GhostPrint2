<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GhostPrint PRO v15.4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { background-color: #030308; color: #f8fafc; font-family: 'Inter', sans-serif; padding-bottom: 100px; }
        .card-pro { background: #111122; border: 1px solid #2d2d44; border-radius: 24px; padding: 20px; margin-bottom: 12px; }
        nav { background: rgba(10, 10, 20, 0.95); display: flex; gap: 8px; overflow-x: auto; padding: 14px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #334155; }
        .btn-nav { background: #1e1e30; color: #64748b; padding: 12px 18px; border-radius: 14px; font-size: 10px; font-weight: 800; white-space: nowrap; cursor: pointer; text-transform: uppercase; }
        .active { background: #7c3aed !important; color: white !important; box-shadow: 0 0 20px rgba(124, 58, 237, 0.4); }
        input, select { background: #070712; border: 1px solid #334155; color: white; padding: 14px; border-radius: 14px; width: 100%; margin: 6px 0; font-weight: 700; outline: none; }
        .btn-main { background: linear-gradient(135deg, #7c3aed 0%, #4c1d95 100%); color: white; padding: 18px; border-radius: 18px; width: 100%; font-weight: 900; text-transform: uppercase; cursor: pointer; border: none; }
        .bar-chart { display: flex; align-items: flex-end; gap: 12px; height: 120px; padding: 10px; background: rgba(255,255,255,0.03); border-radius: 18px; }
        .bar { flex: 1; border-radius: 6px 6px 2px 2px; transition: height 0.8s ease; position: relative; min-height: 2px; }
        .bar-label { font-size: 8px; text-align: center; margin-top: 8px; font-weight: 800; text-transform: uppercase; opacity: 0.5; }
    </style>
</head>
<body>

<header class="p-5 bg-[#0a0a1a] border-b border-white/5 flex justify-between items-center">
    <h1 class="text-xl font-black italic text-white uppercase tracking-tighter">GhostPrint <span class="text-purple-500">PRO</span></h1>
    <span class="text-[8px] font-black uppercase bg-green-500/20 text-green-400 px-3 py-1.5 rounded-full border border-green-500/30">v15.4</span>
</header>

<nav id="main-nav">
    <div onclick="setView('inicio')" class="btn-nav active" id="n-inicio">🏠 Inicio</div>
    <div onclick="setView('ventas')" class="btn-nav" id="n-ventas">💵 Ventas</div>
    <div onclick="setView('compras')" class="btn-nav" id="n-compras">🛒 Compras</div>
    <div onclick="setView('inventario')" class="btn-nav" id="n-inventario">📦 Stock</div>
    <div onclick="setView('reportes')" class="btn-nav" id="n-reportes">📊 Reportes</div>
    <div onclick="setView('cobros')" class="btn-nav" id="n-cobros">⏳ Cuentas</div>
</nav>

<div id="app" class="p-4 max-w-2xl mx-auto"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI",
        authDomain: "ghost-print-contabilidad.firebaseapp.com",
        projectId: "ghost-print-contabilidad",
        storageBucket: "ghost-print-contabilidad.firebasestorage.app",
        messagingSenderId: "867057362556",
        appId: "1:867057362556:web:6bd2a461817219a4000bf9"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const docRef = db.collection("sistema").doc("datos_principales");

    window.state = JSON.parse(localStorage.getItem('gp_v15_4')) || { ventas: [], gastos: [], inventario: {}, serviciosExtra: [], comprasInversion: [] };
    window.currentView = "inicio";
    let cart = [];

    window.sync = async function() {
        localStorage.setItem('gp_v15_4', JSON.stringify(window.state));
        await docRef.set(window.state).catch(e => console.log("Offline"));
    };

    docRef.onSnapshot(doc => { if(doc.exists) { window.state = doc.data(); render(); } });

    window.setView = function(v) {
        window.currentView = v;
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
        document.getElementById('n-' + v).classList.add('active');
        render();
    };

    // Función para calcular total en tiempo real en compras
    window.calcCompraTotal = () => {
        const q = parseFloat(document.getElementById("qInv").value) || 0;
        const p = parseFloat(document.getElementById("pInv").value) || 0;
        const total = q * p;
        document.getElementById("compra-total-label").innerText = "Total Inversión: $" + total.toFixed(2);
    };

    window.render = function() {
        const app = document.getElementById("app");
        const mesActual = new Date().getMonth();
        const anioActual = new Date().getFullYear();
        let html = "";

        const vM = (window.state.ventas || []).filter(i => { const d = new Date(i.id); return d.getMonth() === mesActual && d.getFullYear() === anioActual; });
        const gM = (window.state.gastos || []).filter(i => { const d = new Date(i.id); return d.getMonth() === mesActual && d.getFullYear() === anioActual; });
        const cM = (window.state.comprasInversion || []).filter(i => { const d = new Date(i.id); return d.getMonth() === mesActual && d.getFullYear() === anioActual; });

        const tV = vM.reduce((a, b) => a + (Number(b.total) || 0), 0);
        const tG = gM.reduce((a, b) => a + (Number(b.amount) || 0), 0);
        const tC = cM.reduce((a, b) => a + (Number(b.amount) || 0), 0);
        const uN = tV - (tG + tC);

        if(window.currentView === "inicio") {
            const max = Math.max(tV, (tG+tC), 1);
            html = `
            <div class="card-pro !bg-gradient-to-br !from-purple-600 !to-indigo-900 border-none">
                <p class="text-[10px] font-black text-purple-200 uppercase mb-1 tracking-widest text-center">Utilidad Real del Mes</p>
                <h2 class="text-5xl font-black text-white italic text-center">$${uN.toFixed(2)}</h2>
            </div>
            <div class="card-pro">
                <div class="bar-chart">
                    <div class="flex-1 flex flex-col items-center"><div class="bar bg-green-500 shadow-[0_0_10px_#22c55e] w-10/12" style="height: ${(tV/max)*100}%"></div><span class="bar-label">Ventas</span></div>
                    <div class="flex-1 flex flex-col items-center"><div class="bar bg-red-500 shadow-[0_0_10px_#ef4444] w-10/12" style="height: ${((tG+tC)/max)*100}%"></div><span class="bar-label">Egresos</span></div>
                </div>
            </div>`;
        }

        if(window.currentView === "compras") {
            html = `
            <div class="card-pro border-t-4 border-blue-500">
                <h2 class="text-lg font-black text-white mb-4 italic uppercase text-center">Entrada de Material</h2>
                <input type="date" id="fC" value="${new Date().toISOString().split('T')[0]}">
                <select id="mInv">${Object.keys(window.state.inventario || {}).map(m=>`<option value="${m}">${m}</option>`).join("")}</select>
                <div class="grid grid-cols-2 gap-2">
                    <input id="qInv" type="number" placeholder="Metros" oninput="calcCompraTotal()">
                    <input id="pInv" type="number" placeholder="Precio x Metro" oninput="calcCompraTotal()">
                </div>
                <div id="compra-total-label" class="text-center font-black text-blue-400 my-2 text-sm uppercase">Total Inversión: $0.00</div>
                <button onclick="saveInv()" class="btn-main mt-2">Registrar Compra</button>
            </div>
            <p class="text-[10px] font-black opacity-30 uppercase ml-2 mb-2">Historial de Compras</p>
            <div class="space-y-2">${cM.reverse().map(c => `
                <div class="card-pro !py-3 flex justify-between items-center">
                    <div>
                        <p class="text-[8px] opacity-40">${new Date(c.id).toLocaleDateString()}</p>
                        <b class="text-xs uppercase">${c.material} (${c.qty}m)</b>
                    </div>
                    <div class="flex items-center gap-3">
                        <b class="text-blue-400">$${c.amount.toFixed(2)}</b>
                        <button onclick="delCompra(${c.id})" class="text-red-600 bg-red-600/10 p-2 rounded-lg text-xs">🗑️</button>
                    </div>
                </div>`).join("")}</div>`;
        }

        // --- VISTAS RESTANTES IGUAL QUE ANTES PARA NO ROMPER NADA ---
        if(window.currentView === "ventas") {
            html = `<div class="card-pro"><h2 class="text-lg font-black text-white mb-4 uppercase text-center italic">Nueva Venta</h2><input type="date" id="fV" value="${new Date().toISOString().split('T')[0]}"><input id="cli" placeholder="CLIENTE"><input id="tel" type="number" placeholder="WHATSAPP"><div class="bg-white/5 p-4 rounded-xl mt-3 border border-white/10"><div class="grid grid-cols-2 gap-2"><select id="pS"><option value="">Material...</option>${Object.keys(window.state.inventario || {}).map(m=>`<option value="${m}">${m}</option>`).join("")}</select><select id="sS"><option value="">Servicio...</option>${(window.state.serviciosExtra || []).map(s=>`<option value="${s}">${s}</option>`).join("")}</select></div><select id="tC" onchange="document.getElementById('pL').classList.toggle('hidden', this.value !== 'libre')"><option value="detal">DETAL ($9)</option><option value="mayor">MAYOR ($10)</option><option value="libre">PRECIO LIBRE</option></select><input id="pL" class="hidden" type="number" placeholder="Monto $"><button onclick="addCart()" class="btn-main !p-3 mt-3 shadow-lg">+ Añadir</button></div><div id="cart-list" class="mt-4 space-y-2 text-[10px]"></div><div id="total-disp" class="text-4xl font-black text-center my-6 text-white italic tracking-tighter uppercase underline decoration-purple-600">Total: $0.00</div><button onclick="finalizarVenta()" class="btn-main">Guardar Venta</button></div>`;
        }
        if(window.currentView === "inventario") {
            html = `<h2 class="text-2xl font-black italic uppercase mb-4 px-2 tracking-tighter">Stock Inventario</h2><div class="grid grid-cols-1 gap-3">${Object.entries(window.state.inventario || {}).map(([n, i])=>`<div class="card-pro flex justify-between items-center border-l-4 border-blue-600"><div><p class="text-[9px] font-black text-blue-400 uppercase tracking-widest">${n}</p><h4 class="text-3xl font-black text-white">${(i.stock || 0).toFixed(2)} <span class="text-xs opacity-40">mts</span></h4></div><div class="flex gap-2"><button onclick="editMatInv('${n}')" class="bg-white/5 p-3 rounded-xl">✏️</button><button onclick="delMatInv('${n}')" class="bg-red-500/10 p-3 rounded-xl text-red-500">🗑️</button></div></div>`).join("")}</div>`;
        }
        if(window.currentView === "reportes") {
            const cliMap = {}; vM.forEach(v => { cliMap[v.cliente] = (cliMap[v.cliente] || 0) + v.total; });
            const topCli = Object.entries(cliMap).sort((a,b)=>b[1]-a[1]).slice(0, 5);
            html = `<div class="card-pro"><h3 class="text-[10px] font-black text-purple-400 uppercase mb-4 text-center">Top 5 Clientes</h3><div class="space-y-4">${topCli.map(([name, total]) => `<div><div class="flex justify-between text-[11px] mb-1"><span class="font-bold uppercase">${name}</span><span class="font-black">$${total.toFixed(2)}</span></div><div class="w-full bg-white/5 h-2 rounded-full overflow-hidden"><div class="bg-purple-600 h-full rounded-full" style="width: ${(total/topCli[0][1])*100}%"></div></div></div>`).join("")}</div></div>`;
        }
        if(window.currentView === "cobros") {
            let d = (window.state.ventas || []).filter(v => !v.pagado);
            html = d.map(v => `<div class="card-pro flex justify-between items-center border-l-4 border-amber-500"><div><b class="text-xs uppercase font-black">${v.cliente}</b><br><span class="text-red-400 text-[10px] font-black">Debe: $${(v.total - (v.abonado || 0)).toFixed(2)}</span></div><div class="flex gap-2"><button onclick="ws('${v.telefono}', ${(v.total-(v.abonado||0))})" class="bg-green-600 p-3 rounded-2xl">📱</button><button onclick="abono(${v.id})" class="bg-blue-600 px-4 py-2 rounded-2xl text-[10px] font-black">Abonar</button></div></div>`).join("") || '<p class="text-center py-20 opacity-30">Sin pendientes</p>';
        }

        app.innerHTML = html;
    };

    // LOGICA ACTUALIZADA PARA COMPRAS
    window.saveInv = async () => {
        const m = document.getElementById("mInv").value, 
              q = parseFloat(document.getElementById("qInv").value), 
              pMeter = parseFloat(document.getElementById("pInv").value), 
              f = document.getElementById("fC").value;
        
        if(m && q && pMeter) { 
            const totalCompra = q * pMeter; // CALCULO AUTOMATICO
            window.state.inventario[m].stock += q; 
            if(!window.state.comprasInversion) window.state.comprasInversion = []; 
            window.state.comprasInversion.push({ 
                id: new Date(f+"T12:00:00").getTime(), 
                material: m, 
                amount: totalCompra, // GUARDA EL TOTAL
                qty: q 
            }); 
            await window.sync(); setView('compras'); 
        }
    };

    // RESTO DE FUNCIONES IGUALES
    window.delCompra = async (id) => { if(confirm("¿Borrar?")){ const comp = window.state.comprasInversion.find(c => c.id === id); if(comp && window.state.inventario[comp.material]) window.state.inventario[comp.material].stock -= comp.qty; window.state.comprasInversion = window.state.comprasInversion.filter(c => c.id !== id); await window.sync(); render(); } };
    window.delMatInv = async (n) => { if(confirm(`Eliminar ${n}?`)){ delete window.state.inventario[n]; await window.sync(); render(); } };
    window.editMatInv = async (old) => { let n = prompt("Nuevo nombre:", old); if(n) { window.state.inventario[n.toUpperCase()] = window.state.inventario[old]; delete window.state.inventario[old]; await window.sync(); render(); } };
    window.addCart = () => { let m = document.getElementById("pS").value, s = document.getElementById("sS").value, t = document.getElementById("tC").value; let p = (t === "detal") ? 9 : (t === "mayor") ? 10 : parseFloat(document.getElementById("pL").value) || 0; let d = (m && s) ? m + " + " + s : m || s; if(d) { cart.push({ d, p, mat: m }); renderCart(); } };
    function renderCart() { document.getElementById("cart-list").innerHTML = cart.map((c, i) => `<div class="flex justify-between py-1"><span>${c.d}</span><b>$${c.p} <button onclick="cart.splice(${i},1);renderCart()" class="text-red-500">×</button></b></div>`).join(""); document.getElementById("total-disp").innerText = "Total: $" + cart.reduce((a,b)=>a+b.p,0).toFixed(2); }
    window.finalizarVenta = async () => { let cli = document.getElementById("cli").value, tel = document.getElementById("tel").value, fec = document.getElementById("fV").value; if(!cli || !cart.length) return; cart.forEach(c => { if(c.mat && window.state.inventario[c.mat]) window.state.inventario[c.mat].stock -= 1; }); window.state.ventas.push({ id: new Date(fec+"T12:00:00").getTime(), cliente: cli.toUpperCase(), telefono: tel, total: cart.reduce((a,b)=>a+b.p,0), abonado: 0, pagado: false }); await window.sync(); cart = []; setView('inicio'); };
    window.abono = async (id) => { let v = window.state.ventas.find(x => x.id === id); let m = parseFloat(prompt(`Saldo: $${(v.total-v.abonado).toFixed(2)}. Cuánto abona?`)); if(m) { v.abonado = (v.abonado||0) + m; if(v.abonado >= v.total) v.pagado = true; await window.sync(); render(); } };
    window.ws = (t, d) => window.open(`https://api.whatsapp.com/send?phone=${t}&text=GhostPrint Saldo Pendiente: $${d.toFixed(2)}`, '_blank');
    window.resetData = async () => { if(confirm("RESET?")){ window.state = { ventas: [], gastos: [], inventario: {}, serviciosExtra: [], comprasInversion: [] }; await window.sync(); location.reload(); } };

    render();
</script>
</body>
</html>
