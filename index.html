<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostPrint ERP v8.1 - Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #0d0d1a; color: #e2e8f0; font-family: ui-sans-serif, system-ui; padding-bottom: 96px; }
        .btn { background: #6d28d9; color: white; padding: 10px; border-radius: 12px; cursor: pointer; font-weight: 700; border: none; font-size: 10px; text-transform: uppercase; }
        .card { background: rgba(255, 255, 255, 0.95); padding: 18px; margin: 12px 0; border-radius: 20px; color: #1e293b; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        input, select { border: 1px solid #e2e8f0; padding: 12px; margin: 8px 0; border-radius: 12px; width: 100%; background: #f8fafc; color: #1e293b; font-weight: 600; }
        label { font-size: 9px; font-weight: 900; text-transform: uppercase; color: #64748b; margin-left: 4px; }
        header { background: linear-gradient(to right, #4c1d95, #000); color: white; padding: 16px; position: sticky; top: 0; z-index: 50; }
        nav { padding: 8px; display: flex; gap: 8px; overflow-x: auto; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(10px); position: sticky; top: 68px; z-index: 40; }
        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <h1 class="text-xl font-black uppercase text-purple-400 italic">GhostPrint ERP v8.1</h1>
    <p id="sync-status" class="text-[9px] font-bold text-amber-400 uppercase">Conectando...</p>
</header>

<nav>
    <button onclick="setView('dashboard')" class="btn">🏠 Inicio</button>
    <button onclick="setView('ventas')" class="btn !bg-green-600">💵 Venta</button>
    <button onclick="setView('compras')" class="btn !bg-blue-600">📦 Almacén</button>
    <button onclick="setView('gastos')" class="btn !bg-red-600">📉 Gastos</button>
    <button onclick="setView('reportes')" class="btn !bg-indigo-600">📊 Reporte</button>
    <button onclick="setView('cobranzas')" class="btn !bg-amber-500">⏳ Cobros</button>
    <button onclick="setView('config')" class="btn !bg-slate-700">⚙️ Catálogo</button>
</nav>

<div id="app" class="p-4 max-w-4xl mx-auto"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI",
    authDomain: "ghost-print-contabilidad.firebaseapp.com",
    projectId: "ghost-print-contabilidad",
    storageBucket: "ghost-print-contabilidad.firebasestorage.app",
    messagingSenderId: "867057362556",
    appId: "1:867057362556:web:6bd2a461817219a4000bf9"
};

const appF = initializeApp(firebaseConfig);
const db = getFirestore(appF);
const docRef = doc(db, "sistema", "datos_principales");

window.state = { ventas: [], gastos: [], inventario: {}, serviciosExtra: [], mermas: [], comprasInversion: [] };
window.view = "dashboard";
let carritoVenta = [];

// --- PERSISTENCIA ---
window.save = async () => { await setDoc(docRef, window.state); };
window.setView = (v) => { window.view = v; render(); };

onSnapshot(docRef, (snap) => {
    if (snap.exists()) { 
        window.state = snap.data();
        document.getElementById("sync-status").innerText = "Sincronizado ✓"; 
        render();
    }
});

// --- FUNCIONES DE ALMACÉN ---
window.editStockManual = async (name) => {
    let actual = window.state.inventario[name].stock || 0;
    let nuevo = parseFloat(prompt(`Ajustar Stock de ${name}:`, actual));
    if (!isNaN(nuevo)) {
        window.state.inventario[name].stock = nuevo;
        await window.save();
        render();
    }
};

window.deleteMaterialStock = async (name) => {
    if (confirm(`¿Eliminar ${name} del catálogo por completo?`)) {
        delete window.state.inventario[name];
        await window.save();
        render();
    }
};

// --- RENDERIZADO ---
window.render = function() {
    let app = document.getElementById("app");
    if(!app) return;
    let html = "";

    if(window.view === "dashboard"){
        let totalV = (window.state.ventas || []).reduce((a,b)=>a+b.total,0);
        let totalG = (window.state.gastos || []).reduce((a,b)=>a+b.amount,0);
        let dineroC = (window.state.ventas || []).reduce((a,b)=>a+(b.abonado || 0), 0);
        html = `
        <div class="grid grid-cols-2 gap-3 mb-3">
            <div class="card !m-0 bg-green-600 text-white text-center p-4"><b>Caja: $${dineroC.toFixed(2)}</b></div>
            <div class="card !m-0 bg-amber-500 text-white text-center p-4"><b>Deuda: $${(totalV - dineroC).toFixed(2)}</b></div>
        </div>
        <div class="card !m-0 mb-4 bg-slate-900 border-l-8 border-purple-500 p-4 text-white">
            <p class="text-purple-400 text-[9px] font-black uppercase">Utilidad Operativa (Ventas - Gastos)</p>
            <h2 class="text-3xl font-black italic">$${(totalV - totalG).toFixed(2)}</h2>
        </div>
        <div class="card"><canvas id="chartDash" height="180"></canvas></div>`;
        setTimeout(() => initDashChart(totalV, totalG, dineroC), 100);
    }

    if(window.view === "compras"){
        html = `<div class="card border-l-4 border-blue-600"><h3 class="font-black text-[10px] uppercase mb-2">Ingreso de Material</h3>
            <select id="mCom">${Object.keys(window.state.inventario).map(p=>`<option value="${p}">${p}</option>`).join("")}</select>
            <input id="qCom" type="number" placeholder="Metros/Unidades"><input id="vCom" type="number" placeholder="Costo total en $"><button onclick="regCom()" class="btn w-full bg-blue-700 mt-2">Cargar a Almacén</button></div>
            <div class="space-y-2 mt-4">${Object.entries(window.state.inventario).map(([n,i])=>`
                <div class="flex justify-between items-center bg-white p-3 rounded-xl border border-blue-100 shadow-sm">
                    <div><b class="text-xs text-slate-700 uppercase">${n}</b><br><span class="text-blue-600 font-black text-lg">${(i.stock || 0).toFixed(2)}</span></div>
                    <div class="flex gap-2">
                        <button onclick="editStockManual('${n}')" class="bg-blue-100 text-blue-700 p-2 rounded-lg font-bold text-[10px]">EDITAR</button>
                        <button onclick="deleteMaterialStock('${n}')" class="bg-red-100 text-red-600 p-2 rounded-lg font-bold text-[10px]">BORRAR</button>
                    </div>
                </div>`).join("")}</div>`;
    }

    if(window.view === "gastos"){
        html = `<div class="card"><h2 class="font-black text-[10px] uppercase mb-2">Gastos (Luz, Alquiler, Personal)</h2>
            <input id="gNom" placeholder="Ej: Pago de Local"><input id="gMon" type="number" placeholder="Monto $"><button onclick="regG()" class="btn w-full bg-red-600 mt-2">Registrar Gasto</button></div>
            ${(window.state.gastos || []).slice().reverse().map(g=>`<div class="card flex justify-between py-2 border-l-4 border-red-500"><div class="text-xs uppercase font-bold">${g.name}<br><b>$${g.amount.toFixed(2)}</b></div><button onclick="borrarG(${g.id})" class="text-red-500">X</button></div>`).join("")}`;
    }

    if(window.view === "ventas"){
        html = `<div class="card"><h2 class="font-black mb-4 uppercase text-purple-700 italic text-sm">Venta</h2>
            <input id="cliV" placeholder="CLIENTE" oninput="renderCarritoInner()">
            <div class="grid grid-cols-2 gap-2"><select id="pSel"><option value="">- Material -</option>${Object.keys(window.state.inventario).map(p=>`<option value="${p}">${p}</option>`).join("")}</select><select id="sSel"><option value="">- Servicio -</option>${(window.state.serviciosExtra || []).map(s=>`<option value="${s}">${s}</option>`).join("")}</select></div>
            <select id="tCli"><option value="detal">DETAL ($9)</option><option value="mayor">MAYOR ($10)</option></select>
            <input id="cQty" type="number" value="1" step="0.01"><button onclick="addItemCarrito()" class="btn !bg-blue-600 w-full">+ Añadir</button>
            <div id="listaCarrito" class="mt-4 border-t pt-2"></div>
            <div id="totalVenta" class="p-3 bg-slate-800 text-white text-center font-bold mt-2 rounded-xl text-xl">Total: $0.00</div>
            <button onclick="procesarV()" class="btn w-full bg-green-600 mt-4 py-4 font-black">FINALIZAR VENTA</button></div>`;
        setTimeout(() => renderCarritoInner(), 10);
    }

    if(window.view === "reportes"){
        let totalV = (window.state.ventas || []).reduce((a,b)=>a+b.total, 0);
        let totalG = (window.state.gastos || []).reduce((a,b)=>a+b.amount, 0);
        let totalI = (window.state.comprasInversion || []).reduce((a,b)=>a+b.amount, 0);
        html = `<div class="grid grid-cols-3 gap-2">
            <div class="card text-center !m-0 p-2"><p class="text-[8px]">VENTAS</p><b class="text-green-600">$${totalV.toFixed(2)}</b></div>
            <div class="card text-center !m-0 p-2"><p class="text-[8px]">GASTOS</p><b class="text-red-600">$${totalG.toFixed(2)}</b></div>
            <div class="card text-center !m-0 p-2"><p class="text-[8px]">INVERSIÓN</p><b class="text-blue-600">$${totalI.toFixed(2)}</b></div>
        </div><div class="card bg-green-50 mt-4"><h3 class="font-bold text-xs uppercase italic">Utilidad Real de Bolsillo: $${(totalV-totalG).toFixed(2)}</h3><p class="text-[9px] opacity-70 mt-1">Nota: Las compras de material se consideran inversión (Activo) y no restan de tu utilidad operativa.</p></div>`;
    }

    if(window.view === "config"){
        html = `<div class="card"><h2 class="font-black uppercase text-[10px]">Nuevo Material</h2><input id="nP" placeholder="Nombre..."><button onclick="addC('p')" class="btn bg-blue-600 w-full">Crear</button></div><div class="card mt-2"><h2 class="font-black uppercase text-[10px]">Nuevo Servicio</h2><input id="nS" placeholder="Nombre..."><button onclick="addC('s')" class="btn bg-purple-600 w-full">Crear</button></div>`;
    }

    if(window.view === "cobranzas"){
        html = (window.state.ventas || []).filter(v=>!v.pagado).map(v=>`<div class="card flex justify-between items-center border-l-4 border-amber-500"><div><b class="text-xs uppercase">${v.cliente}</b><br><small class="text-red-600">Debe: $${(v.total-v.abonado).toFixed(2)}</small></div><button onclick="abonarV(${v.id})" class="bg-blue-600 text-white p-2 rounded text-[10px] font-bold">ABONAR</button></div>`).join("");
    }

    app.innerHTML = html;
};

// --- LOGICA DE DATOS ---
window.regCom = async () => {
    let m = document.getElementById("mCom").value, q = parseFloat(document.getElementById("qCom").value), v = parseFloat(document.getElementById("vCom").value);
    if(q > 0) { 
        window.state.inventario[m].stock += q; 
        if(!window.state.comprasInversion) window.state.comprasInversion = [];
        window.state.comprasInversion.push({id: Date.now(), name: m, amount: v}); 
        await window.save(); render(); 
    }
};

window.regG = async () => {
    let n = document.getElementById("gNom").value, m = parseFloat(document.getElementById("gMon").value);
    if(n && m) { window.state.gastos.push({id: Date.now(), name: n.toUpperCase(), amount: m}); await window.save(); render(); }
};

window.addItemCarrito = () => {
    let p = document.getElementById("pSel").value, s = document.getElementById("sSel").value, t = document.getElementById("tCli").value, c = parseFloat(document.getElementById("cQty").value) || 0;
    if(!p && !s) return;
    let pre = (t === "detal") ? 9 : 10;
    carritoVenta.push({ nombre: ((p && s) ? `${p} + ${s}` : (p || s)).toUpperCase(), qty: c, sub: c * pre, esProd: !!p, prodKey: p });
    renderCarritoInner();
};

window.renderCarritoInner = () => {
    let div = document.getElementById("listaCarrito"), totalDiv = document.getElementById("totalVenta");
    if(!div) return;
    let items = carritoVenta.map((v,i)=>`<div class="flex justify-between py-1 text-[11px] border-b"><span>${v.qty} ${v.nombre}</span><b>$${v.sub.toFixed(2)}</b></div>`).join("");
    div.innerHTML = items || '<p class="text-center opacity-40">Vacío</p>';
    totalDiv.innerText = `Total: $${carritoVenta.reduce((a,b)=>a+b.sub,0).toFixed(2)}`;
};

window.procesarV = async () => {
    let cli = document.getElementById("cliV").value.toUpperCase();
    if(!cli || carritoVenta.length === 0) return alert("Faltan datos");
    carritoVenta.forEach(i => { if (i.esProd && window.state.inventario[i.prodKey]) window.state.inventario[i.prodKey].stock -= i.qty; });
    window.state.ventas.push({id: Date.now(), cliente: cli, total: carritoVenta.reduce((a,b)=>a+b.sub, 0), abonado: 0, pagado: false, items: [...carritoVenta]});
    await window.save(); carritoVenta = []; setView('cobranzas');
};

window.addC = async (t) => {
    if(t==='p'){ let n=document.getElementById("nP").value.toUpperCase(); if(n) window.state.inventario[n]={stock:0}; }
    else { let n=document.getElementById("nS").value.toUpperCase(); if(n) window.state.serviciosExtra.push(n); }
    await window.save(); render();
};

window.abonarV = async (id) => { let v = window.state.ventas.find(x=>x.id===id), m = parseFloat(prompt("Monto?")); if(m){ v.abonado += m; if(v.abonado >= v.total) v.pagado = true; await window.save(); render(); } };
window.borrarG = async (id) => { if(confirm("Borrar?")){ window.state.gastos=window.state.gastos.filter(x=>x.id!==id); await window.save(); render(); } };

window.initDashChart = (v, g, c) => {
    new Chart(document.getElementById('chartDash'), { type: 'bar', data: { labels: ['Venta', 'Gasto', 'Caja'], datasets: [{ data: [v, g, c], backgroundColor: ['#6d28d9', '#ef4444', '#22c55e'], borderRadius: 8 }] }, options: { plugins: { legend: { display: false } } } });
};

render();
</script>
</body>
</html>
