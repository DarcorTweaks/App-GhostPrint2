<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostPrint PRO - ESTABLE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #05050a; color: #e2e8f0; font-family: 'Inter', sans-serif; padding-bottom: 70px; }
        .card { background: #161625; border: 1px solid #2d2d44; border-radius: 15px; padding: 15px; margin-bottom: 10px; }
        nav { background: #11111d; display: flex; gap: 8px; overflow-x: auto; padding: 10px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #334155; }
        .btn-nav { background: #26263d; color: #94a3b8; padding: 8px 12px; border-radius: 10px; font-size: 10px; font-weight: 800; white-space: nowrap; cursor: pointer; }
        .active { background: #6d28d9 !important; color: white !important; }
        input, select { background: #0a0a14; border: 1px solid #334155; color: white; padding: 10px; border-radius: 10px; width: 100%; margin: 5px 0; font-size: 14px; }
        .btn-main { background: #6d28d9; color: white; padding: 15px; border-radius: 12px; width: 100%; font-weight: 900; border: none; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

<header class="p-4 bg-[#1e1e2f] border-b-2 border-purple-600 flex justify-between items-center">
    <h1 class="font-black italic text-purple-400 tracking-tighter">GHOSTPRINT PRO</h1>
    <span id="st" class="text-[10px] font-bold text-green-500 uppercase">● Online</span>
</header>

<nav id="navbar">
    <div onclick="menu('inicio')" class="btn-nav active" id="m-inicio">INICIO</div>
    <div onclick="menu('ventas')" class="btn-nav" id="m-ventas">VENTAS</div>
    <div onclick="menu('inventario')" class="btn-nav" id="m-inventario">STOCK</div>
    <div onclick="menu('gastos')" class="btn-nav" id="m-gastos">GASTOS</div>
    <div onclick="menu('cobros')" class="btn-nav" id="m-cobros">COBROS</div>
    <div onclick="menu('config')" class="btn-nav" id="m-config">CONFIG</div>
</nav>

<div id="app" class="p-4"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    // Configuración Directa
    const firebaseConfig = {
        apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI",
        authDomain: "ghost-print-contabilidad.firebaseapp.com",
        projectId: "ghost-print-contabilidad",
        storageBucket: "ghost-print-contabilidad.firebasestorage.app",
        messagingSenderId: "867057362556",
        appId: "1:867057362556:web:6bd2a461817219a4000bf9"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const docRef = db.collection("sistema").doc("datos_principales");

    // Datos
    window.data = JSON.parse(localStorage.getItem('ghost_stable')) || { ventas: [], gastos: [], inventario: {}, serviciosExtra: [], comprasInversion: [] };
    window.seccion = "inicio";
    let temporal = [];

    // Navegación
    window.menu = function(s) {
        window.seccion = s;
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
        document.getElementById('m-' + s).classList.add('active');
        pintar();
    };

    // Guardado
    window.subir = function() {
        localStorage.setItem('ghost_stable', JSON.stringify(window.data));
        docRef.set(window.data).catch(() => console.log("Guardado local"));
    };

    // Sincronización
    docRef.onSnapshot(doc => {
        if(doc.exists) {
            window.data = doc.data();
            localStorage.setItem('ghost_stable', JSON.stringify(window.data));
            pintar();
        }
    });

    // Dibujar pantalla
    window.pintar = function() {
        const app = document.getElementById("app");
        const hoy = new Date().getMonth();
        let html = "";

        if(window.seccion === "inicio") {
            let vM = (window.data.ventas || []).filter(v => new Date(v.id).getMonth() === hoy);
            let gM = (window.data.gastos || []).filter(g => new Date(g.id).getMonth() === hoy);
            let tV = vM.reduce((a,b)=>a+(b.total||0),0);
            let tG = gM.reduce((a,b)=>a+(b.amount||0),0);
            html = `<div class="card border-l-4 border-purple-500">
                <p class="text-[10px] font-bold opacity-50">BALANCE MENSUAL</p>
                <h2 class="text-4xl font-black italic">$${(tV - tG).toFixed(2)}</h2>
            </div>
            <div class="card bg-green-500/10 flex justify-between"><span>Ventas</span><b>$${tV.toFixed(2)}</b></div>
            <div class="card bg-red-500/10 flex justify-between"><span>Gastos</span><b>-$${tG.toFixed(2)}</b></div>`;
        }

        if(window.seccion === "ventas") {
            html = `<div class="card">
                <h3 class="font-black mb-2 uppercase text-purple-400">Nueva Venta</h3>
                <input id="c" placeholder="Nombre Cliente">
                <input id="t" type="number" placeholder="WhatsApp">
                <select id="m">${Object.keys(window.data.inventario || {}).map(m=>`<option value="${m}">${m}</option>`).join("")}</select>
                <input id="p" type="number" placeholder="Precio $">
                <button onclick="addList()" class="btn-main !p-2 mt-2" style="background:#334155">+ Añadir</button>
                <div id="lista" class="my-3 text-xs opacity-70"></div>
                <button onclick="confirmarVenta()" class="btn-main">Guardar Venta</button>
            </div>`;
        }

        if(window.seccion === "inventario") {
            html = `<div class="card">
                <h3 class="font-black mb-2 text-blue-400 uppercase">Cargar Stock</h3>
                <select id="mat">${Object.keys(window.data.inventario || {}).map(m=>`<option value="${m}">${m}</option>`).join("")}</select>
                <input id="can" type="number" placeholder="Metros">
                <button onclick="masStock()" class="btn-main">Cargar</button>
            </div>
            <div class="grid grid-cols-2 gap-2">
                ${Object.entries(window.data.inventario || {}).map(([n, i])=>`<div class="card text-center"><p class="text-[10px] opacity-50 uppercase">${n}</p><h4 class="text-xl font-black">${(i.stock||0).toFixed(2)}m</h4></div>`).join("")}
            </div>`;
        }

        if(window.seccion === "config") {
            html = `<div class="card">
                <h3 class="font-black mb-2 uppercase text-slate-400">Nuevo Material</h3>
                <input id="nM" placeholder="Nombre (Ej: DTF TEXTIL)">
                <button onclick="nuevoMat()" class="btn-main">Añadir al Catálogo</button>
            </div>`;
        }

        app.innerHTML = html;
    };

    // Lógica de Botones
    window.addList = function() {
        let m = document.getElementById("m").value, p = parseFloat(document.getElementById("p").value) || 0;
        if(m && p) temporal.push({m, p});
        document.getElementById("lista").innerHTML = temporal.map(x => `<div>${x.m} - $${x.p}</div>`).join("");
    };

    window.confirmarVenta = function() {
        let c = document.getElementById("c").value;
        if(!c || !temporal.length) return alert("Faltan datos");
        let total = temporal.reduce((a,b)=>a+b.p,0);
        temporal.forEach(x => { if(window.data.inventario[x.m]) window.data.inventario[x.m].stock -= 1; });
        window.data.ventas.push({ id: Date.now(), cliente: c.toUpperCase(), total: total });
        window.subir(); temporal = []; menu('inicio');
    };

    window.masStock = function() {
        let m = document.getElementById("mat").value, c = parseFloat(document.getElementById("can").value);
        if(m && c) { window.data.inventario[m].stock += c; window.subir(); pintar(); }
    };

    window.nuevoMat = function() {
        let n = document.getElementById("nM").value.toUpperCase();
        if(n) { if(!window.data.inventario) window.data.inventario = {}; window.data.inventario[n] = {stock:0}; window.subir(); pintar(); }
    };

    // Inicio
    pintar();
</script>
</body>
</html>
