<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GhostPrint MASTER v26.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { background-color: #030308; color: #f8fafc; font-family: 'Inter', sans-serif; padding-bottom: 100px; }
        .card-pro { background: #111122; border: 1px solid #2d2d44; border-radius: 20px; padding: 18px; margin-bottom: 12px; }
        nav { background: rgba(10, 10, 20, 0.95); display: flex; gap: 8px; overflow-x: auto; padding: 14px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #334155; }
        .btn-nav { background: #1e1e30; color: #64748b; padding: 12px 18px; border-radius: 14px; font-size: 10px; font-weight: 800; white-space: nowrap; cursor: pointer; text-transform: uppercase; }
        .active { background: #7c3aed !important; color: white !important; }
        input, select { background: #070712; border: 1px solid #334155; color: white; padding: 14px; border-radius: 14px; width: 100%; margin: 6px 0; font-weight: 700; outline: none; }
        .btn-main { background: linear-gradient(135deg, #7c3aed 0%, #4c1d95 100%); color: white; padding: 16px; border-radius: 16px; width: 100%; font-weight: 900; text-transform: uppercase; cursor: pointer; border: none; }
        .alert-low { border: 2px solid #ef4444 !important; background: rgba(239, 68, 68, 0.1) !important; }
        .ghost-glow { filter: drop-shadow(0 0 10px #7c3aed); }
        ::-webkit-calendar-picker-indicator { filter: invert(1); }
        .icon-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 10px; transition: all 0.2s; }
        .badge-debt { background: rgba(239, 68, 68, 0.1); color: #ef4444; padding: 2px 8px; border-radius: 6px; font-size: 9px; font-weight: 900; }
        .badge-paid { background: rgba(34, 197, 94, 0.1); color: #22c55e; padding: 2px 8px; border-radius: 6px; font-size: 9px; font-weight: 900; }
    </style>
</head>
<body>

<div class="p-4 flex justify-between items-center bg-[#0a0a14] border-b border-white/5">
    <div class="flex items-center gap-3">
        <span class="text-4xl ghost-glow">👻</span>
        <div>
            <h1 class="text-xl font-black italic text-purple-500 leading-none">GHOST PRINT</h1>
            <p class="text-[8px] font-black opacity-40 uppercase">Master Suite v26.5</p>
        </div>
    </div>
</div>

<nav>
    <div onclick="setView('inicio')" class="btn-nav active" id="n-inicio">📊 ADMIN</div>
    <div onclick="setView('ventas')" class="btn-nav" id="n-ventas">💵 Ventas</div>
    <div onclick="setView('cobrar')" class="btn-nav" id="n-cobrar">📑 CxC</div>
    <div onclick="setView('compras')" class="btn-nav" id="n-compras">🛒 Compras</div>
    <div onclick="setView('gastos')" class="btn-nav" id="n-gastos">💸 Gastos</div>
    <div onclick="setView('inventario')" class="btn-nav" id="n-inventario">📦 Stock</div>
    <div onclick="setView('catalogo')" class="btn-nav" id="n-catalogo">⚙️ Config</div>
</nav>

<div id="app" class="p-4 max-w-2xl mx-auto"></div>

<div id="receiptModal" class="fixed inset-0 bg-black/90 z-[200] hidden flex items-center justify-center p-4">
    <div class="bg-white text-black p-6 rounded-2xl w-full max-w-sm shadow-2xl relative overflow-hidden">
        <div class="text-center mb-4">
             <span class="text-4xl">👻</span>
             <h2 class="text-xl font-black italic leading-none">GHOST PRINT</h2>
             <p class="text-[8px] font-bold uppercase tracking-tighter">Soluciones Gráficas Profesionales</p>
        </div>
        <div id="receiptContent" class="text-[11px] font-mono border-t border-dashed border-black pt-4"></div>
        <div class="mt-6 flex gap-2 no-print">
            <button onclick="closeReceipt()" class="flex-1 bg-gray-200 p-3 rounded-xl font-bold">Cerrar</button>
            <button onclick="shareReceipt()" class="flex-1 bg-purple-600 text-white p-3 rounded-xl font-bold">Compartir</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI", authDomain: "ghost-print-contabilidad.firebaseapp.com", projectId: "ghost-print-contabilidad", storageBucket: "ghost-print-contabilidad.firebasestorage.app", messagingSenderId: "867057362556", appId: "1:867057362556:web:6bd2a461817219a4000bf9" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const docRef = db.collection("sistema").doc("datos_principales");

    const SERVICIOS_POR_DEFECTO = [
        "DISEÑO", "IMPRESIÓN", "DISEÑO E IMPRESIÓN", "INSTALACIÓN", "POP", 
        "DESINSTALACIÓN", "ROTULACIÓN", "LAMINADO", "LAMINADO E IMPRESIÓN", 
        "IMPRESIÓN Y CORTE", "VINIL DE ROTULACIÓN"
    ];

    window.state = JSON.parse(localStorage.getItem('gp_v26_5')) || { 
        ventas: [], inventario: {}, compras: [], gastos: [], servicios: SERVICIOS_POR_DEFECTO 
    };

    window.currentView = "inicio";
    window.currentReceiptId = null;
    let cart = [];

    window.sync = async function() { 
        localStorage.setItem('gp_v26_5', JSON.stringify(window.state)); 
        await docRef.set(window.state); 
        render(); 
    };
    
    docRef.onSnapshot(doc => { 
        if(doc.exists) { 
            const data = doc.data();
            if(!data.servicios || data.servicios.length === 0) data.servicios = SERVICIOS_POR_DEFECTO;
            window.state = data; 
            render(); 
        } 
    });

    window.setView = function(v) { 
        window.currentView = v; 
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active')); 
        document.getElementById('n-'+v)?.classList.add('active'); 
        render(); 
    };

    window.render = function() {
        const app = document.getElementById("app");
        const inv = window.state.inventario || {};
        const serv = window.state.servicios || SERVICIOS_POR_DEFECTO;
        const today = new Date().toISOString().split('T')[0];

        if(window.currentView === "inicio") {
            const vM = window.state.ventas || [];
            const gM = window.state.gastos || [];
            const cM = window.state.compras || [];
            
            const totalVentas = vM.reduce((a, b) => a + (Number(b.total) || 0), 0);
            const totalPendiente = vM.reduce((a, b) => a + ((Number(b.total) || 0) - (Number(b.abono) || 0)), 0);
            const totalGastos = gM.reduce((a, b) => a + (Number(b.monto) || 0), 0);
            const totalCompras = cM.reduce((a, b) => a + (Number(b.c * b.co) || 0), 0);

            app.innerHTML = `
                <div class="grid grid-cols-1 gap-4">
                    <div class="card-pro text-center bg-gradient-to-br from-purple-900/40 to-[#111122]">
                        <p class="text-[10px] opacity-40 uppercase font-black tracking-widest">Facturación Total</p>
                        <h2 class="text-5xl font-black italic text-purple-500">$${totalVentas.toFixed(2)}</h2>
                        <div class="mt-2 text-[10px] font-bold text-red-400 uppercase">Por Cobrar: $${totalPendiente.toFixed(2)}</div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="card-pro text-center bg-red-900/10 border-red-900/30">
                            <p class="text-[9px] opacity-40 uppercase font-black">Gastos</p>
                            <h2 class="text-2xl font-black text-red-500">$${totalGastos.toFixed(2)}</h2>
                        </div>
                        <div class="card-pro text-center bg-blue-900/10 border-blue-900/30">
                            <p class="text-[9px] opacity-40 uppercase font-black">Inversión Stock</p>
                            <h2 class="text-2xl font-black text-blue-500">$${totalCompras.toFixed(2)}</h2>
                        </div>
                    </div>
                    <div class="card-pro text-center border-green-500/20 bg-green-500/5">
                        <p class="text-[10px] opacity-40 uppercase font-black tracking-widest">Utilidad Estimada</p>
                        <h2 class="text-4xl font-black italic text-green-500">$${(totalVentas - totalGastos - totalCompras).toFixed(2)}</h2>
                    </div>
                </div>
            `;
        }

        if(window.currentView === "ventas") {
            const filterDate = window.vFilterDate || today;
            const filtradas = (window.state.ventas || []).filter(v => v.fecha === filterDate);
            
            app.innerHTML = `
                <div class="card-pro">
                    <h2 class="text-lg font-black italic text-purple-500 mb-4 uppercase">Nueva Venta</h2>
                    <input id="vDate" type="date" value="${today}" class="mb-2">
                    <div class="grid grid-cols-2 gap-2">
                        <input id="cli" placeholder="CLIENTE">
                        <input id="wha" type="tel" placeholder="WHATSAPP">
                    </div>
                    <div class="bg-white/5 p-4 rounded-xl mt-4 border border-white/10">
                        <select id="vMat" onchange="updateVentaUI()">
                            <option value="">-- SELECCIONAR --</option>
                            <optgroup label="STOCK">
                                ${Object.keys(inv).map(m=>`<option value="${m}">${m}</option>`).join("")}
                            </optgroup>
                            <optgroup label="SERVICIOS">
                                ${serv.map(s=>`<option value="${s}">${s}</option>`).join("")}
                            </optgroup>
                        </select>
                        <div class="flex gap-2">
                            <select id="vTipo" onchange="updateVentaUI()" class="w-1/3">
                                <option value="ML">ML</option><option value="M2">M2</option><option value="UNID">UNID</option>
                            </select>
                            <input id="vCant" type="number" placeholder="CANT" oninput="updateVentaUI()" class="w-2/3">
                        </div>
                        <p id="vCalc" class="text-[9px] font-black text-purple-400 my-2 uppercase"></p>
                        <input id="vPrec" type="number" placeholder="PRECIO $">
                        <button onclick="addItem()" class="btn-main !p-3 mt-3 text-[10px]">+ AÑADIR A LISTA</button>
                    </div>
                    <div id="vLista" class="mt-4 space-y-1"></div>
                    <div id="vTotal" class="text-5xl font-black text-center my-6">$0.00</div>
                    <div class="card-pro bg-purple-900/10 border-purple-500/20 mb-4">
                        <p class="text-[9px] font-black opacity-40 uppercase mb-1">Abono Inicial</p>
                        <input id="vAbono" type="number" placeholder="0.00" class="!m-0">
                    </div>
                    <button onclick="saveVenta()" class="btn-main">GUARDAR VENTA</button>
                </div>

                <div class="mt-8">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-[10px] font-black opacity-30 uppercase">Registros del día</h3>
                        <input type="date" value="${filterDate}" onchange="window.vFilterDate=this.value; render();" class="!w-auto !p-2 !text-[10px]">
                    </div>
                    <div class="space-y-2">
                        ${filtradas.map(v => `
                            <div class="card-pro flex justify-between items-center py-3">
                                <div>
                                    <b class="text-[10px] uppercase">${v.cliente || 'S/N'}</b>
                                    <div class="text-xl font-black">$${v.total.toFixed(2)}</div>
                                    <span class="${v.total > v.abono ? 'badge-debt' : 'badge-paid'}">${v.total > v.abono ? 'PENDIENTE' : 'PAGADO'}</span>
                                </div>
                                <div class="flex gap-2">
                                    <button onclick="showReceipt(${v.id})" class="icon-btn bg-white/5">🧾</button>
                                    <button onclick="delVenta(${v.id})" class="text-red-500 icon-btn bg-red-500/10">🗑️</button>
                                </div>
                            </div>
                        `).join("")}
                    </div>
                </div>
            `;
            // Reset local cart visual if returning to view
            cart = [];
        }

        if(window.currentView === "cobrar") {
            const deudores = (window.state.ventas || []).filter(v => v.total > v.abono);
            app.innerHTML = `
                <h2 class="text-lg font-black italic text-red-500 mb-4 uppercase">Cuentas por Cobrar</h2>
                <div class="space-y-3">
                    ${deudores.length ? deudores.map(v => `
                        <div class="card-pro border-l-4 border-l-red-500">
                            <div class="flex justify-between items-start mb-2">
                                <div>
                                    <b class="text-xs uppercase">${v.cliente}</b>
                                    <p class="text-[9px] opacity-40">${v.fecha} | ${v.whatsapp || 'Sin WhatsApp'}</p>
                                </div>
                                <div class="text-right">
                                    <div class="text-[9px] font-bold opacity-40 uppercase text-red-500">Saldo</div>
                                    <div class="text-lg font-black text-red-500">$${(v.total - v.abono).toFixed(2)}</div>
                                </div>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="abonar(${v.id})" class="flex-1 bg-green-600/20 text-green-500 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest">Abonar</button>
                                <button onclick="liquidar(${v.id})" class="flex-1 bg-blue-600/20 text-blue-400 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest">Liquidar</button>
                                <button onclick="showReceipt(${v.id})" class="icon-btn bg-white/10">🧾</button>
                            </div>
                        </div>
                    `).join("") : '<p class="text-center opacity-30 italic py-10">No hay deudas pendientes</p>'}
                </div>
            `;
        }

        if(window.currentView === "compras") {
            const filterDate = window.cFilterDate || today;
            const comprasTotal = window.state.compras || [];

            app.innerHTML = `
                <div class="card-pro">
                    <h2 class="text-lg font-black italic text-blue-400 mb-4 uppercase">Carga de Rollos</h2>
                    <input id="cDate" type="date" value="${today}" class="mb-2">
                    <select id="cMat"><option value="">-- MATERIAL --</option>${Object.keys(inv).map(m=>`<option value="${m}">${m}</option>`).join("")}</select>
                    <div class="grid grid-cols-2 gap-2">
                        <input id="cCant" type="number" placeholder="Metros (ML)">
                        <input id="cCosto" type="number" placeholder="Costo ML $">
                    </div>
                    <div class="bg-blue-900/10 p-4 rounded-xl border border-blue-500/20 mt-2">
                        <div class="grid grid-cols-2 gap-2">
                            <div><p class="text-[8px] font-black text-blue-400 uppercase">Precio M2 $</p><input id="cVentaM2" type="number"></div>
                            <div><p class="text-[8px] font-black text-blue-400 uppercase">Precio ML $</p><input id="cVentaML" type="number"></div>
                        </div>
                    </div>
                    <button onclick="saveCompra()" class="btn-main !bg-blue-600 mt-4">INGRESAR COMPRA</button>
                </div>
                <div class="mt-8">
                    <h3 class="text-[10px] font-black opacity-30 uppercase tracking-[0.2em] mb-4">Historial de Compras</h3>
                    <div class="space-y-2">
                        ${[...comprasTotal].reverse().slice(0, 10).map((c, idx) => `
                            <div class="card-pro flex justify-between items-center py-3 bg-white/5">
                                <div>
                                    <b class="text-blue-400 text-[10px] uppercase">${c.m}</b>
                                    <div class="text-white text-lg font-black leading-none">${c.c} ML <small class="text-[9px] opacity-40 font-normal">($${c.co}/ML)</small></div>
                                    <div class="text-[8px] opacity-30 mt-1 uppercase font-bold">${c.f}</div>
                                </div>
                                <button onclick="delCompra(${comprasTotal.indexOf(c)})" class="bg-red-500/20 text-red-400 icon-btn">🗑️</button>
                            </div>
                        `).join("")}
                    </div>
                </div>
            `;
        }

        if(window.currentView === "gastos") {
            const filterDate = window.gFilterDate || today;
            const filtrados = (window.state.gastos || []).filter(g => g.fecha === filterDate);
            app.innerHTML = `
                <div class="card-pro">
                    <h2 class="text-lg font-black italic text-red-500 mb-4 uppercase">Registrar Gasto</h2>
                    <input id="gDate" type="date" value="${today}">
                    <input id="gDesc" placeholder="DESCRIPCIÓN">
                    <input id="gMonto" type="number" placeholder="MONTO $">
                    <button onclick="saveGasto()" class="btn-main !from-red-600 !to-red-900 mt-2">GUARDAR GASTO</button>
                </div>
                <div class="mt-8">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-[10px] font-black opacity-30 uppercase tracking-[0.2em]">Gastos del Día</h3>
                        <input type="date" value="${filterDate}" onchange="window.gFilterDate=this.value; render();" class="!w-auto !p-2 !text-[10px]">
                    </div>
                    <div class="space-y-2">
                    ${filtrados.map((g, idx) => `
                        <div class="card-pro flex justify-between items-center py-3">
                            <div><b class="text-red-400 text-[10px] uppercase">${g.desc}</b><br><span class="text-white text-xl font-black italic">$${g.monto.toFixed(2)}</span></div>
                            <button onclick="delGasto(${window.state.gastos.indexOf(g)})" class="text-red-500 icon-btn bg-red-500/10">🗑️</button>
                        </div>`).join("")}
                    </div>
                </div>
            `;
        }

        if(window.currentView === "inventario") {
            app.innerHTML = `
                <h2 class="text-[10px] font-black opacity-30 uppercase mb-4 tracking-[0.2em]">Control de Stock</h2>
                <div class="space-y-2">
                    ${Object.entries(inv).map(([n, i]) => {
                        const lowStock = i.stock < 5;
                        return `
                        <div class="card-pro flex justify-between items-center ${lowStock ? 'alert-low' : ''}">
                            <div>
                                <b class="uppercase text-purple-400 text-[10px] tracking-widest">${n}</b>
                                <br><span class="text-3xl font-black italic">${i.stock} <small class="text-xs opacity-40 font-normal">ML</small></span>
                                <div class="text-[9px] opacity-60 font-bold mt-1 uppercase">M2: $${i.precioM2} | ML: $${i.precioML} | ANCHO: ${i.ancho}m</div>
                            </div>
                            <button onclick="editStock('${n}')" class="bg-blue-600/20 text-blue-400 icon-btn">✏️</button>
                        </div>`;
                    }).join("")}
                </div>`;
        }

        if(window.currentView === "catalogo") {
            app.innerHTML = `
                <div class="card-pro">
                    <h3 class="text-[11px] font-black opacity-50 mb-4 uppercase italic tracking-wider text-purple-400">Nuevo Material Base</h3>
                    <input id="nMat" placeholder="NOMBRE DEL MATERIAL">
                    <input id="aMat" type="number" step="0.01" placeholder="ANCHO (EJ: 1.52)">
                    <button onclick="crearMat()" class="btn-main mt-2">AÑADIR MATERIAL</button>
                </div>
                <div class="card-pro mt-4">
                    <h3 class="text-[11px] font-black opacity-50 mb-4 uppercase italic tracking-wider text-purple-400">Servicios Activos</h3>
                    <div class="flex gap-2 mb-2">
                        <input id="newServ" placeholder="NOMBRE SERVICIO">
                        <button onclick="addServ()" class="bg-purple-600 px-6 rounded-xl font-black text-[10px] uppercase">OK</button>
                    </div>
                    <div class="space-y-1 max-h-60 overflow-y-auto">
                        ${serv.map(s => `<div class="flex justify-between bg-white/5 p-2 rounded-lg text-[9px] font-bold"><span>${s}</span><button onclick="delServ('${s}')" class="text-red-500 font-black">BORRAR</button></div>`).join("")}
                    </div>
                </div>
            `;
        }
    };

    // --- LOGICA DE NEGOCIO ---
    window.updateVentaUI = () => {
        const m = document.getElementById("vMat").value, t = document.getElementById("vTipo").value, c = parseFloat(document.getElementById("vCant").value) || 0;
        const info = window.state.inventario[m];
        let final = 0;
        if(info) {
            if(t === "ML") { final = c * info.precioML; document.getElementById("vCalc").innerText = `${c} ML x $${info.precioML}`; }
            else if(t === "M2") { final = c * info.precioM2; document.getElementById("vCalc").innerText = `${c} M² x $${info.precioM2}`; }
            else { final = c * info.precioML; }
        } else {
            document.getElementById("vCalc").innerText = "SERVICIO / OTRO";
        }
        if(final > 0) document.getElementById("vPrec").value = final.toFixed(2);
    };

    window.addItem = () => {
        const m = document.getElementById("vMat").value, p = parseFloat(document.getElementById("vPrec").value) || 0, c = parseFloat(document.getElementById("vCant").value) || 0;
        if(m && p) { 
            cart.push({ m, p, c }); 
            document.getElementById("vTotal").innerText = "$" + cart.reduce((a,b)=>a+b.p,0).toFixed(2); 
            document.getElementById("vLista").innerHTML += `<div class="flex justify-between bg-white/5 p-3 rounded-lg text-[10px] font-black uppercase border-l-2 border-purple-500"><span>${m}</span><b class="text-purple-400">$${p}</b></div>`; 
        }
    };

    window.saveVenta = async () => {
        if(!cart.length) return;
        const abono = parseFloat(document.getElementById("vAbono").value) || 0;
        cart.forEach(i => { if(window.state.inventario[i.m]) window.state.inventario[i.m].stock -= i.c; });
        window.state.ventas.push({ 
            id: Date.now(), cliente: document.getElementById("cli").value.toUpperCase(), whatsapp: document.getElementById("wha").value,
            items: cart, total: cart.reduce((a,b)=>a+b.p,0), abono, fecha: document.getElementById("vDate").value 
        });
        await window.sync(); 
        cart = []; 
        setView('inicio');
    };

    window.saveCompra = async () => {
        const m = document.getElementById("cMat").value, c = parseFloat(document.getElementById("cCant").value);
        if(m && c) {
            window.state.inventario[m].stock += c;
            window.state.inventario[m].precioM2 = parseFloat(document.getElementById("cVentaM2").value) || window.state.inventario[m].precioM2;
            window.state.inventario[m].precioML = parseFloat(document.getElementById("cVentaML").value) || window.state.inventario[m].precioML;
            window.state.compras.push({ m, c, co: parseFloat(document.getElementById("cCosto").value) || 0, f: document.getElementById("cDate").value });
            await window.sync(); setView('inventario');
        }
    };

    window.saveGasto = async () => {
        const desc = document.getElementById("gDesc").value.toUpperCase(), monto = parseFloat(document.getElementById("gMonto").value);
        if(desc && monto) { window.state.gastos.push({ desc, monto, fecha: document.getElementById("gDate").value }); await window.sync(); }
    };

    window.editStock = async (m) => {
        let n = parseFloat(prompt(`Ajustar stock de ${m}:`, window.state.inventario[m].stock));
        if(!isNaN(n)) { window.state.inventario[m].stock = n; await window.sync(); }
    };

    window.crearMat = async () => {
        const n = document.getElementById("nMat").value.toUpperCase(), a = parseFloat(document.getElementById("aMat").value);
        if(n && a) { window.state.inventario[n] = { stock: 0, precioM2: 0, precioML: 0, ancho: a }; await window.sync(); }
    };

    window.addServ = async () => {
        const s = document.getElementById("newServ").value.toUpperCase();
        if(s) { window.state.servicios.push(s); await window.sync(); }
    };

    window.abonar = async (id) => {
        const v = window.state.ventas.find(x => x.id === id);
        const monto = parseFloat(prompt(`Deuda: $${(v.total - v.abono).toFixed(2)}\nAbonar:`));
        if(monto > 0) { v.abono += monto; await window.sync(); }
    };

    window.liquidar = async (id) => {
        const v = window.state.ventas.find(x => x.id === id);
        if(confirm("¿Liquidar deuda completa?")) { v.abono = v.total; await window.sync(); }
    };

    window.delVenta = async (id) => { if(confirm("¿Borrar venta?")) { window.state.ventas = window.state.ventas.filter(v => v.id !== id); await window.sync(); } };
    window.delGasto = async (i) => { if(confirm("¿Borrar gasto?")) { window.state.gastos.splice(i, 1); await window.sync(); } };
    window.delCompra = async (i) => { if(confirm("¿Borrar compra?")) { window.state.compras.splice(i, 1); await window.sync(); } };
    window.delServ = async (s) => { window.state.servicios = window.state.servicios.filter(x => x !== s); await window.sync(); };

    // --- RECIBOS Y WHATSAPP ---
    window.showReceipt = (id) => {
        const v = window.state.ventas.find(x => x.id === id);
        window.currentReceiptId = id;
        document.getElementById("receiptContent").innerHTML = `
            <p>FECHA: ${v.fecha}</p>
            <p>CLIENTE: ${v.cliente}</p>
            <div class="border-y border-dashed my-2 py-2">
                ${v.items.map(i => `<div class="flex justify-between"><span>${i.m}</span><span>$${i.p.toFixed(2)}</span></div>`).join("")}
            </div>
            <div class="text-right font-black">
                <p>TOTAL: $${v.total.toFixed(2)}</p>
                <p>ABONADO: $${v.abono.toFixed(2)}</p>
                <p class="text-purple-600">SALDO: $${(v.total - v.abono).toFixed(2)}</p>
            </div>
        `;
        document.getElementById("receiptModal").classList.remove("hidden");
    };

    window.closeReceipt = () => document.getElementById("receiptModal").classList.add("hidden");

    window.shareReceipt = () => {
        const v = window.state.ventas.find(x => x.id === window.currentReceiptId);
        let msg = `*GHOST PRINT COMPROBANTE*%0AFecha: ${v.fecha}%0ACliente: ${v.cliente}%0A---%0A`;
        v.items.forEach(i => msg += `${i.m}: $${i.p.toFixed(2)}%0A`);
        msg += `---%0A*TOTAL: $${v.total.toFixed(2)}*%0AAbono: $${v.abono.toFixed(2)}%0A*Pendiente: $${(v.total - v.abono).toFixed(2)}*`;
        window.open(`https://wa.me/${v.whatsapp}?text=${msg}`, '_blank');
    };

    render();
</script>
</body>
</html>
