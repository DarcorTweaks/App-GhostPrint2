<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GhostPrint PRO v14.6 - Enterprise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #05050a; color: #e2e8f0; font-family: 'Inter', sans-serif; padding-bottom: 90px; }
        .card-pro { background: #161625; border: 1px solid #2d2d44; border-radius: 20px; padding: 18px; margin-bottom: 12px; }
        nav { background: #11111d; display: flex; gap: 8px; overflow-x: auto; padding: 12px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #334155; }
        .btn-nav { background: #26263d; color: #94a3b8; padding: 10px 14px; border-radius: 12px; font-size: 10px; font-weight: 800; white-space: nowrap; cursor: pointer; }
        .active { background: #6d28d9 !important; color: white !important; box-shadow: 0 0 15px rgba(109, 40, 217, 0.4); }
        input, select { background: #0a0a14; border: 1px solid #334155; color: white; padding: 12px; border-radius: 12px; width: 100%; margin: 5px 0; font-weight: 700; }
        .btn-main { background: linear-gradient(to right, #6d28d9, #4c1d95); color: white; padding: 16px; border-radius: 16px; width: 100%; font-weight: 900; text-transform: uppercase; cursor: pointer; border: none; }
        .bar { transition: height 0.6s ease; width: 30px; border-radius: 4px; position: relative; }
    </style>
</head>
<body>

<header class="p-4 bg-[#1e1e2f] border-b-2 border-purple-600 flex justify-between items-center">
    <h1 class="text-xl font-black italic text-purple-400 uppercase tracking-tighter">GhostPrint PRO</h1>
    <span class="text-[9px] font-black uppercase bg-purple-500 text-white px-3 py-1 rounded-full shadow-[0_0_10px_#6d28d9]">v14.6 Elite</span>
</header>

<nav id="main-nav">
    <div onclick="setView('inicio')" class="btn-nav active" id="n-inicio">🏠 INICIO</div>
    <div onclick="setView('ventas')" class="btn-nav" id="n-ventas">💵 VENTAS</div>
    <div onclick="setView('reportes')" class="btn-nav" id="n-reportes">📊 REPORTES</div>
    <div onclick="setView('inventario')" class="btn-nav" id="n-inventario">📦 STOCK</div>
    <div onclick="setView('cobros')" class="btn-nav" id="n-cobros">⏳ COBROS</div>
    <div onclick="setView('gastos')" class="btn-nav" id="n-gastos">📉 GASTOS</div>
    <div onclick="setView('config')" class="btn-nav" id="n-config">⚙️ CONFIG</div>
</nav>

<div id="app" class="p-4 max-w-2xl mx-auto"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI",
        authDomain: "ghost-print-contabilidad.firebaseapp.com",
        projectId: "ghost-print-contabilidad",
        storageBucket: "ghost-print-contabilidad.firebasestorage.app",
        messagingSenderId: "867057362556",
        appId: "1:867057362556:web:6bd2a461817219a4000bf9"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const docRef = db.collection("sistema").doc("datos_principales");

    window.state = JSON.parse(localStorage.getItem('gp_v14_6')) || { ventas: [], gastos: [], inventario: {}, serviciosExtra: [], comprasInversion: [] };
    window.currentView = "inicio";
    let cart = [];

    window.sync = async function() {
        localStorage.setItem('gp_v14_6', JSON.stringify(window.state));
        await docRef.set(window.state).catch(e => console.log("Modo Offline"));
    };

    docRef.onSnapshot(doc => { if(doc.exists) { window.state = doc.data(); render(); } });

    window.setView = function(v) {
        window.currentView = v;
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
        document.getElementById('n-' + v).classList.add('active');
        render();
    };

    window.render = function() {
        const app = document.getElementById("app");
        const mesActual = new Date().getMonth();
        const anioActual = new Date().getFullYear();
        let html = "";

        // Filtro estricto por fecha para evitar basura de pruebas
        const filterByMonth = (arr) => (arr || []).filter(i => {
            const d = new Date(i.id);
            return d.getMonth() === mesActual && d.getFullYear() === anioActual && i.id > 100000;
        });

        const vM = filterByMonth(window.state.ventas);
        const gM = filterByMonth(window.state.gastos);
        const cM = filterByMonth(window.state.comprasInversion);

        const tVentas = vM.reduce((a, b) => a + (Number(b.total) || 0), 0);
        const tGastos = gM.reduce((a, b) => a + (Number(b.amount) || 0), 0);
        const tCompras = cM.reduce((a, b) => a + (Number(b.amount) || 0), 0);
        const uNeta = tVentas - (tGastos + tCompras);

        if(window.currentView === "inicio") {
            const max = Math.max(tVentas, tGastos, tCompras, 1);
            html = `
            <div class="card-pro border-l-4 border-green-500 shadow-xl shadow-green-900/20">
                <p class="text-[10px] font-black text-green-400 tracking-widest uppercase">Utilidad Real (Neta)</p>
                <h2 class="text-5xl font-black italic text-white">$${uNeta.toFixed(2)}</h2>
            </div>
            
            <div class="card-pro border-l-4 border-purple-500">
                <p class="text-[10px] font-black text-purple-400 tracking-widest uppercase">Volumen de Ventas</p>
                <h2 class="text-3xl font-black text-white">$${tVentas.toFixed(2)}</h2>
            </div>

            <div class="grid grid-cols-2 gap-2 mb-2">
                <div class="bg-red-900/10 p-4 rounded-2xl border border-red-500/20">
                    <p class="text-[8px] font-black text-red-500 uppercase">Gastos Op.</p>
                    <b class="text-lg font-black text-white">$${tGastos.toFixed(2)}</b>
                </div>
                <div class="bg-blue-900/10 p-4 rounded-2xl border border-blue-500/20">
                    <p class="text-[8px] font-black text-blue-500 uppercase">Compras Stock</p>
                    <b class="text-lg font-black text-white">$${tCompras.toFixed(2)}</b>
                </div>
            </div>`;
        }

        if(window.currentView === "reportes") {
            // Análisis de Top Clientes
            const cliMap = {};
            vM.forEach(v => { cliMap[v.cliente] = (cliMap[v.cliente] || 0) + v.total; });
            const topCli = Object.entries(cliMap).sort((a,b)=>b[1]-a[1]).slice(0, 3);

            html = `
            <div class="flex justify-between items-end mb-4">
                <h2 class="text-2xl font-black italic text-purple-400">DASHBOARD ELITE</h2>
                <span class="text-[10px] font-bold opacity-40 uppercase">${new Intl.DateTimeFormat('es-ES', { month: 'long'}).format(new Date())}</span>
            </div>

            <div class="grid grid-cols-3 gap-2 mb-4">
                <div class="card-pro !p-3 text-center border-t-2 border-green-500">
                    <p class="text-[7px] font-bold opacity-50 uppercase">Ventas</p>
                    <b class="text-sm text-green-400">$${tVentas.toFixed(0)}</b>
                </div>
                <div class="card-pro !p-3 text-center border-t-2 border-red-500">
                    <p class="text-[7px] font-bold opacity-50 uppercase">Egresos</p>
                    <b class="text-sm text-red-400">$${(tGastos+tCompras).toFixed(0)}</b>
                </div>
                <div class="card-pro !p-3 text-center border-t-2 border-blue-500">
                    <p class="text-[7px] font-bold opacity-50 uppercase">Balance</p>
                    <b class="text-sm text-blue-400">$${uNeta.toFixed(0)}</b>
                </div>
            </div>

            <div class="card-pro">
                <h3 class="text-[10px] font-black text-purple-300 uppercase mb-4 tracking-widest">🏆 TOP CLIENTES DEL MES</h3>
                <div class="space-y-3">
                    ${topCli.map(([name, total], i) => `
                        <div class="flex justify-between items-center bg-white/5 p-2 rounded-xl">
                            <span class="text-xs font-bold uppercase"><span class="text-purple-500 mr-2">#${i+1}</span> ${name}</span>
                            <b class="text-white text-sm">$${total.toFixed(2)}</b>
                        </div>
                    `).join("") || '<p class="text-[10px] opacity-30 italic">Sin datos de clientes</p>'}
                </div>
            </div>

            <div class="card-pro overflow-hidden">
                <h3 class="text-[10px] font-black text-purple-300 uppercase mb-4 tracking-widest">📜 HISTORIAL DETALLADO</h3>
                <div class="max-h-[300px] overflow-y-auto space-y-2 pr-1">
                    ${vM.map(v => `<div class="flex justify-between text-[10px] border-b border-white/5 pb-2">
                        <span><b class="text-green-500">VENTA</b> ${v.cliente}</span>
                        <b class="text-white">$${v.total.toFixed(2)}</b>
                    </div>`).join("")}
                    ${gM.map(g => `<div class="flex justify-between text-[10px] border-b border-white/5 pb-2">
                        <span><b class="text-red-500">GASTO</b> ${g.name}</span>
                        <b class="text-red-400">-$${g.amount.toFixed(2)}</b>
                    </div>`).join("")}
                    ${cM.map(c => `<div class="flex justify-between text-[10px] border-b border-white/5 pb-2">
                        <span><b class="text-blue-500">STOCK</b> Compra Material</span>
                        <b class="text-blue-400">-$${c.amount.toFixed(2)}</b>
                    </div>`).join("")}
                </div>
            </div>`;
        }

        if(window.currentView === "ventas") {
            html = `<div class="card-pro">
                <h2 class="text-lg font-black text-purple-400 mb-4 italic uppercase leading-none">Nueva Venta</h2>
                <input type="date" id="fV" value="${new Date().toISOString().split('T')[0]}">
                <input id="cli" placeholder="NOMBRE CLIENTE">
                <input id="tel" type="number" placeholder="WHATSAPP">
                <div class="bg-white/5 p-4 rounded-xl mt-3 border border-white/10">
                    <div class="grid grid-cols-2 gap-2">
                        <select id="pS"><option value="">Material...</option>${Object.keys(window.state.inventario || {}).map(m=>`<option value="${m}">${m}</option>`).join("")}</select>
                        <select id="sS"><option value="">Servicio...</option>${(window.state.serviciosExtra || []).map(s=>`<option value="${s}">${s}</option>`).join("")}</select>
                    </div>
                    <select id="tC" onchange="document.getElementById('pL').classList.toggle('hidden', this.value !== 'libre')">
                        <option value="detal">PRECIO DETAL ($9)</option><option value="mayor">PRECIO MAYOR ($10)</option><option value="libre">PRECIO PERSONALIZADO</option>
                    </select>
                    <input id="pL" class="hidden" type="number" placeholder="Monto $">
                    <button onclick="addCart()" class="btn-main !p-3 mt-3 shadow-lg">+ Añadir al Detalle</button>
                </div>
                <div id="cart-list" class="mt-4 space-y-2 text-xs italic"></div>
                <div id="total-disp" class="text-3xl font-black text-center my-6 text-white italic underline">TOTAL: $0.00</div>
                <button onclick="finalizarVenta()" class="btn-main">Procesar Venta</button>
            </div>`;
        }

        if(window.currentView === "inventario") {
            html = `<div class="card-pro">
                <h2 class="text-lg font-black text-blue-400 mb-3 italic uppercase leading-none text-center">Inversión de Stock</h2>
                <input type="date" id="fC" value="${new Date().toISOString().split('T')[0]}">
                <select id="mInv">${Object.keys(window.state.inventario || {}).map(m=>`<option value="${m}">${m}</option>`).join("")}</select>
                <div class="grid grid-cols-2 gap-2"><input id="qInv" type="number" placeholder="Mts"><input id="pInv" type="number" placeholder="$/m"></div>
                <button onclick="saveInv()" class="btn-main !from-blue-600 !to-blue-800 mt-2">Guardar Compra</button>
            </div>
            <div class="grid grid-cols-2 gap-2">${Object.entries(window.state.inventario || {}).map(([n, i])=>`<div class="card-pro text-center">
                <p class="text-[8px] font-black opacity-40 uppercase">${n}</p><h4 class="text-2xl font-black">${(i.stock || 0).toFixed(2)}m</h4></div>`).join("")}</div>`;
        }

        if(window.currentView === "gastos") {
            html = `<div class="card-pro"><h2 class="text-lg font-black text-red-500 italic mb-3 text-center uppercase">Gastos Operativos</h2>
                <input type="date" id="fG" value="${new Date().toISOString().split('T')[0]}">
                <input id="gNom" placeholder="Ej: Pago Local"><input id="gMon" type="number" placeholder="Monto $">
                <button onclick="saveGasto()" class="btn-main !from-red-600 !to-red-800 mt-2">Registrar Gasto</button></div>
            <div class="space-y-2">${gM.map(g => `<div class="card-pro !py-3 flex justify-between items-center"><div class="text-[10px] uppercase font-bold">
                <p class="opacity-30">${new Date(g.id).toLocaleDateString()}</p>${g.name}</div><div class="flex items-center gap-2 font-black text-red-400">$${g.amount.toFixed(2)}
                <button onclick="editGasto(${g.id})" class="text-blue-400">✏️</button><button onclick="delGasto(${g.id})" class="text-red-600">🗑️</button></div></div>`).join("")}</div>`;
        }

        if(window.currentView === "cobros") {
            let deudas = (window.state.ventas || []).filter(v => !v.pagado);
            html = deudas.map(v => `<div class="card-pro flex justify-between items-center border-l-4 border-amber-500">
                <div><b class="text-xs font-black uppercase">${v.cliente}</b><br><span class="text-red-400 text-[10px] font-black uppercase italic">Saldo: $${(v.total - (v.abonado || 0)).toFixed(2)}</span></div>
                <div class="flex gap-2"><button onclick="ws('${v.telefono}', ${(v.total-(v.abonado||0))})" class="bg-green-600 p-3 rounded-xl shadow-lg">📱</button>
                <button onclick="abono(${v.id})" class="bg-blue-600 px-3 py-2 rounded-xl text-[10px] font-black uppercase italic">Cobrar</button></div></div>`).join("") || '<p class="text-center py-20 opacity-30 italic uppercase font-bold text-xs">Sin facturas pendientes</p>';
        }

        if(window.currentView === "config") {
            html = `<div class="card-pro text-center">
                <h2 class="text-lg font-black text-slate-400 mb-4 uppercase italic leading-none">Catálogo</h2>
                <input id="newM" placeholder="Nuevo Material"><button onclick="addMat()" class="btn-main !from-slate-600 !to-slate-800 mt-2">Crear Material</button>
                <input id="newS" class="mt-4" placeholder="Nuevo Servicio"><button onclick="addSer()" class="btn-main !from-indigo-600 !to-indigo-800 mt-2">Crear Servicio</button>
                <hr class="my-8 opacity-10">
                <button onclick="resetData()" class="w-full bg-red-900/10 text-red-600 p-4 rounded-xl text-[10px] font-black uppercase border border-red-900/30 tracking-widest">⚠️ Resetear Todo el Sistema</button>
            </div>`;
        }
        app.innerHTML = html;
    };

    // Funciones de Lógica
    window.addCart = () => {
        let m = document.getElementById("pS").value, s = document.getElementById("sS").value, t = document.getElementById("tC").value;
        let p = (t === "detal") ? 9 : (t === "mayor") ? 10 : parseFloat(document.getElementById("pL").value) || 0;
        let d = (m && s) ? m + " + " + s : m || s;
        if(d) { cart.push({ d, p, mat: m }); renderCart(); }
    };
    function renderCart() {
        document.getElementById("cart-list").innerHTML = cart.map((c, i) => `<div class="flex justify-between border-b border-white/5 py-1"><span>${c.d}</span><b>$${c.p.toFixed(2)} <button onclick="cart.splice(${i},1);renderCart()" class="text-red-500">×</button></b></div>`).join("");
        document.getElementById("total-disp").innerText = "TOTAL: $" + cart.reduce((a,b)=>a+b.p,0).toFixed(2);
    }
    window.finalizarVenta = async () => {
        let cli = document.getElementById("cli").value, tel = document.getElementById("tel").value, fec = document.getElementById("fV").value;
        if(!cli || !cart.length) return alert("Faltan datos");
        cart.forEach(c => { if(c.mat && window.state.inventario[c.mat]) window.state.inventario[c.mat].stock -= 1; });
        window.state.ventas.push({ id: new Date(fec+"T12:00:00").getTime(), cliente: cli.toUpperCase(), telefono: tel, total: cart.reduce((a,b)=>a+b.p,0), abonado: 0, pagado: false });
        await window.sync(); cart = []; setView('reportes');
    };
    window.saveInv = async () => {
        let m = document.getElementById("mInv").value, q = parseFloat(document.getElementById("qInv").value), p = parseFloat(document.getElementById("pInv").value), f = document.getElementById("fC").value;
        if(m && q && p) {
            window.state.inventario[m].stock += q;
            if(!window.state.comprasInversion) window.state.comprasInversion = [];
            window.state.comprasInversion.push({ id: new Date(f+"T12:00:00").getTime(), amount: q*p });
            await window.sync(); setView('reportes');
        }
    };
    window.saveGasto = async () => {
        let n = document.getElementById("gNom").value, m = parseFloat(document.getElementById("gMon").value), f = document.getElementById("fG").value;
        if(n && m) { window.state.gastos.push({ id: new Date(f+"T12:00:00").getTime(), name: n.toUpperCase(), amount: m }); await window.sync(); render(); }
    };
    window.delGasto = async (id) => { if(confirm("¿Eliminar?")){ window.state.gastos = window.state.gastos.filter(g => g.id !== id); await window.sync(); render(); } };
    window.editGasto = (id) => {
        let g = window.state.gastos.find(x => x.id === id);
        let n = prompt("Concepto:", g.name); let a = parseFloat(prompt("Monto:", g.amount));
        if(n && a) { g.name = n.toUpperCase(); g.amount = a; window.sync(); render(); }
    };
    window.addMat = async () => { let n = document.getElementById("newM").value.toUpperCase(); if(n) { if(!window.state.inventario) window.state.inventario = {}; window.state.inventario[n] = {stock: 0}; await window.sync(); render(); } };
    window.addSer = async () => { let n = document.getElementById("newS").value.toUpperCase(); if(n) { if(!window.state.serviciosExtra) window.state.serviciosExtra = []; window.state.serviciosExtra.push(n); await window.sync(); render(); } };
    window.abono = async (id) => { let v = window.state.ventas.find(x => x.id === id); let m = parseFloat(prompt(`Deuda: $${(v.total-v.abonado).toFixed(2)}. Abono?`)); if(m) { v.abonado = (v.abonado||0) + m; if(v.abonado >= v.total) v.pagado = true; await window.sync(); render(); } };
    window.ws = (t, d) => window.open(`https://api.whatsapp.com/send?phone=${t}&text=GhostPrint: Saldo pendiente $${d.toFixed(2)}`, '_blank');
    window.resetData = async () => { if(confirm("¿RESET TOTAL?")){ window.state = { ventas: [], gastos: [], inventario: {}, serviciosExtra: [], comprasInversion: [] }; await window.sync(); location.reload(); } };

    render();
</script>
</body>
</html>
