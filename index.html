<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GhostPrint MASTER v23.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { background-color: #030308; color: #f8fafc; font-family: 'Inter', sans-serif; padding-bottom: 100px; }
        .card-pro { background: #111122; border: 1px solid #2d2d44; border-radius: 20px; padding: 18px; margin-bottom: 12px; }
        nav { background: rgba(10, 10, 20, 0.95); display: flex; gap: 8px; overflow-x: auto; padding: 14px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #334155; }
        .btn-nav { background: #1e1e30; color: #64748b; padding: 12px 18px; border-radius: 14px; font-size: 10px; font-weight: 800; white-space: nowrap; cursor: pointer; text-transform: uppercase; }
        .active { background: #7c3aed !important; color: white !important; }
        input, select { background: #070712; border: 1px solid #334155; color: white; padding: 14px; border-radius: 14px; width: 100%; margin: 6px 0; font-weight: 700; outline: none; }
        .btn-main { background: linear-gradient(135deg, #7c3aed 0%, #4c1d95 100%); color: white; padding: 16px; border-radius: 16px; width: 100%; font-weight: 900; text-transform: uppercase; cursor: pointer; border: none; }
        #bill-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:200; padding:20px; align-items: center; justify-content: center; }
        .ghost-glow { filter: drop-shadow(0 0 10px #7c3aed); }
    </style>
</head>
<body>

<div class="p-4 flex justify-between items-center bg-[#0a0a14] border-b border-white/5">
    <div class="flex items-center gap-3">
        <span class="text-4xl ghost-glow">👻</span>
        <div><h1 class="text-xl font-black italic text-purple-500 leading-none">GHOST PRINT</h1><p class="text-[8px] font-black opacity-40 uppercase">Omni-System v23.0</p></div>
    </div>
</div>

<nav>
    <div onclick="setView('inicio')" class="btn-nav active" id="n-inicio">📊 ADMIN</div>
    <div onclick="setView('ventas')" class="btn-nav" id="n-ventas">💵 Ventas</div>
    <div onclick="setView('cobros')" class="btn-nav" id="n-cobros">⏳ Cobros</div>
    <div onclick="setView('compras')" class="btn-nav" id="n-compras">🛒 Compras</div>
    <div onclick="setView('inventario')" class="btn-nav" id="n-inventario">📦 Stock</div>
    <div onclick="setView('catalogo')" class="btn-nav" id="n-catalogo">⚙️ Config</div>
</nav>

<div id="app" class="p-4 max-w-2xl mx-auto"></div>

<div id="bill-modal" onclick="closeBill()">
    <div class="bg-white p-6 rounded-3xl w-full max-w-xs text-black shadow-2xl relative" onclick="event.stopPropagation()">
        <h2 class="text-2xl font-black italic text-purple-600 text-center uppercase">GHOST PRINT</h2>
        <div class="border-t border-dashed my-4 border-gray-300"></div>
        <p id="b-monto" class="text-5xl font-black text-purple-700 text-center my-2"></p>
        <p id="b-cli" class="text-xl font-black uppercase text-center"></p>
        <p id="b-det" class="text-[10px] text-gray-400 text-center mb-4 italic"></p>
        <button id="btn-wa" class="btn-main !from-green-600 !to-green-800 text-white">WHATSAPP</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI", authDomain: "ghost-print-contabilidad.firebaseapp.com", projectId: "ghost-print-contabilidad", storageBucket: "ghost-print-contabilidad.firebasestorage.app", messagingSenderId: "867057362556", appId: "1:867057362556:web:6bd2a461817219a4000bf9" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const docRef = db.collection("sistema").doc("datos_principales");

    window.state = JSON.parse(localStorage.getItem('gp_v23_0')) || { ventas: [], inventario: {}, compras: [], servicios: ["DISEÑO", "INSTALACIÓN"] };

    window.sync = async function() { localStorage.setItem('gp_v23_0', JSON.stringify(window.state)); await docRef.set(window.state); };
    docRef.onSnapshot(doc => { if(doc.exists) { window.state = doc.data(); render(); } });

    window.setView = function(v) { window.currentView = v; document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active')); document.getElementById('n-'+v).classList.add('active'); render(); };

    window.render = function() {
        const app = document.getElementById("app");
        const inv = window.state.inventario || {};
        const vM = window.state.ventas || [];

        if(window.currentView === "inicio") {
            const cobrado = vM.reduce((a, b) => a + (Number(b.abonado) || (b.pagado ? b.total : 0)), 0);
            const porCobrar = vM.reduce((a, b) => a + (b.pagado ? 0 : (b.total - (b.abonado||0))), 0);
            app.innerHTML = `
                <div class="card-pro text-center bg-gradient-to-br from-purple-900 to-black">
                    <p class="text-[10px] font-black opacity-60 uppercase">Caja Real (Cobrado)</p>
                    <h2 class="text-6xl font-black italic">$${cobrado.toFixed(2)}</h2>
                </div>
                <div class="card-pro border-l-4 border-orange-500">
                    <p class="text-[10px] opacity-40 font-black uppercase">Pendiente por Cobrar</p>
                    <b class="text-3xl text-orange-400">$${porCobrar.toFixed(2)}</b>
                </div>
            `;
        }

        if(window.currentView === "ventas") {
            app.innerHTML = `
                <div class="card-pro">
                    <h2 class="text-lg font-black italic text-purple-500 mb-4 uppercase">Facturación</h2>
                    <input id="cli" placeholder="CLIENTE">
                    <input id="tel" type="number" placeholder="WHATSAPP">
                    <div class="bg-white/5 p-4 rounded-xl mt-4 border border-white/5">
                        <select id="sMat" onchange="calcVenta()">
                            <option value="">-- MATERIAL --</option>
                            ${Object.keys(inv).map(m=>`<option value="${m}">${m}</option>`).join("")}
                        </select>
                        <div class="flex gap-2">
                            <select id="sModo" class="w-1/3" onchange="calcVenta()">
                                <option value="M2">M2</option>
                                <option value="ML">ML</option>
                            </select>
                            <input id="sCant" type="number" placeholder="Cantidad" class="w-2/3" oninput="calcVenta()">
                        </div>
                        <p id="sPreview" class="text-[10px] font-black text-purple-400 my-2 uppercase"></p>
                        <input id="sPrecio" type="number" placeholder="Precio Final $">
                        <button onclick="addCart()" class="btn-main !p-3 mt-2 text-xs">+ AÑADIR TRABAJO</button>
                    </div>
                    <div id="listaVenta" class="mt-4 space-y-1 text-xs"></div>
                    <div id="totalVenta" class="text-5xl font-black text-center my-6">$0.00</div>
                    <button onclick="finalizarVenta()" class="btn-main">GUARDAR VENTA</button>
                </div>
            `;
        }

        if(window.currentView === "cobros") {
            const deudas = vM.filter(v => !v.pagado);
            app.innerHTML = `<div class="space-y-2">${deudas.reverse().map(v => `
                <div class="card-pro flex justify-between items-center border-l-4 border-orange-500">
                    <div><b class="uppercase">${v.cliente}</b><br><span class="text-orange-400 font-black text-xs">DEBE: $${(v.total - (v.abonado||0)).toFixed(2)}</span></div>
                    <button onclick="abonar('${v.id}')" class="bg-purple-600 px-4 py-2 rounded-xl font-black text-[10px] uppercase">Cobrar</button>
                </div>`).join("")}</div>`;
        }

        if(window.currentView === "compras") {
            app.innerHTML = `
                <div class="card-pro">
                    <h2 class="text-lg font-black italic text-blue-400 mb-4 uppercase">Cargar Stock</h2>
                    <select id="cMat"><option value="">-- SELECCIONAR --</option>${Object.keys(inv).map(m=>`<option value="${m}">${m}</option>`).join("")}</select>
                    <input id="cCant" type="number" placeholder="Metros Lineales Comprados">
                    <input id="cCosto" type="number" placeholder="Costo Unitario ($)">
                    <input id="cVenta" type="number" placeholder="Precio Venta Sugerido ($)">
                    <button onclick="saveCompra()" class="btn-main !bg-blue-600 mt-4">ALIMENTAR SISTEMA</button>
                </div>
            `;
        }

        if(window.currentView === "inventario") {
            app.innerHTML = `<div class="space-y-2">${Object.entries(inv).map(([n, i]) => `
                <div class="card-pro flex justify-between items-center">
                    <div><b class="text-purple-400 uppercase text-xs">${n}</b><br><span class="text-3xl font-black">${i.stock} <small class="text-xs opacity-50 text-white">ML</small></span></div>
                    <div class="text-right text-[10px] font-bold opacity-40 uppercase">Venta: $${i.precio}/u<br>Ancho: ${i.ancho}m</div>
                </div>`).join("")}</div>`;
        }

        if(window.currentView === "catalogo") {
            app.innerHTML = `<div class="card-pro">
                <input id="nMat" placeholder="Nombre (Ej: VINIL)">
                <input id="aMat" type="number" step="0.01" placeholder="Ancho (Ej: 1.52)">
                <button onclick="addBase()" class="btn-main mt-2">CREAR BASE</button>
                <div class="mt-4 space-y-2">${Object.keys(inv).map(m=>`<div class="flex justify-between bg-white/5 p-2 rounded-lg text-xs"><span>${m}</span><button onclick="delMat('${m}')" class="text-red-500">Eliminar</button></div>`).join("")}</div>
            </div>`;
        }
    };

    window.calcVenta = () => {
        const m = document.getElementById("sMat").value;
        const modo = document.getElementById("sModo").value;
        const cant = parseFloat(document.getElementById("sCant").value) || 0;
        const info = window.state.inventario[m];
        if(info) {
            let total = 0;
            if(modo === "ML") {
                total = cant * info.precio;
                document.getElementById("sPreview").innerText = `${cant} Metros Lineales`;
            } else {
                let area = cant * info.ancho;
                total = area * info.precio;
                document.getElementById("sPreview").innerText = `${area.toFixed(2)} Metros Cuadrados`;
            }
            document.getElementById("sPrecio").value = total.toFixed(2);
        }
    };

    let cart = [];
    window.addCart = () => {
        const m = document.getElementById("sMat").value;
        const p = parseFloat(document.getElementById("sPrecio").value) || 0;
        const c = parseFloat(document.getElementById("sCant").value) || 0;
        if(m && p) {
            cart.push({ m, p, c });
            document.getElementById("totalVenta").innerText = "$" + cart.reduce((a,b)=>a+b.p,0).toFixed(2);
            document.getElementById("listaVenta").innerHTML += `<div class="flex justify-between border-b border-white/5 py-1 uppercase"><span>${m}</span><b>$${p}</b></div>`;
        }
    };

    window.finalizarVenta = async () => {
        const cli = document.getElementById("cli").value;
        if(!cli || !cart.length) return;
        cart.forEach(i => { if(window.state.inventario[i.m]) window.state.inventario[i.m].stock -= i.c; });
        window.state.ventas.push({ id: Date.now(), cliente: cli.toUpperCase(), telefono: document.getElementById("tel").value, total: cart.reduce((a,b)=>a+b.p,0), abonado: 0, pagado: false, items: [...cart] });
        await window.sync(); cart=[]; setView('inicio');
    };

    window.saveCompra = async () => {
        const m = document.getElementById("cMat").value, c = parseFloat(document.getElementById("cCant").value), v = parseFloat(document.getElementById("cVenta").value);
        if(m && c) {
            window.state.inventario[m].stock += c;
            window.state.inventario[m].precio = v;
            await window.sync(); setView('inventario');
        }
    };

    window.addBase = async () => {
        const n = document.getElementById("nMat").value.toUpperCase(), a = parseFloat(document.getElementById("aMat").value);
        if(n && a) { window.state.inventario[n] = { stock: 0, precio: 0, ancho: a }; await window.sync(); render(); }
    };

    window.delMat = async (m) => { if(confirm("¿Eliminar?")) { delete window.state.inventario[m]; await window.sync(); render(); } };
    window.abonar = async (id) => { const v = window.state.ventas.find(x => x.id == id); let m = parseFloat(prompt(`Saldo: $${(v.total-v.abonado).toFixed(2)}. ¿Abono?`)); if(m>0){ v.abonado += m; if(v.abonado >= v.total) v.pagado = true; await window.sync(); render(); } };
    window.closeBill = () => document.getElementById("bill-modal").style.display = "none";

    window.currentView = "inicio";
    render();
</script>
</body>
</html>
