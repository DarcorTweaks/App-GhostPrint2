<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostPrint PRO - Sistema Integral 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .btn { background: #6d28d9; color: white; padding: 10px 16px; border-radius: 10px; cursor: pointer; font-weight: 600; border: none; transition: all 0.2s; }
        .btn:hover { background: #5b21b6; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(109, 40, 217, 0.3); }
        .card { background: white; padding: 20px; margin: 12px 0; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); border: 1px solid #f1f1f1; }
        input, select { border: 1px solid #e2e8f0; padding: 12px; margin: 8px 0; border-radius: 12px; width: 100%; font-size: 14px; }
        input:focus { outline: 2px solid #6d28d9; border-color: transparent; }
        label { font-size: 11px; color: #94a3b8; font-weight: 800; text-transform: uppercase; display: block; margin-bottom: -4px; margin-left: 4px; }
        .hidden { display: none; }
        .nav-active { border-bottom: 3px solid white; opacity: 1 !important; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800">

<div class="bg-gradient-to-r from-purple-900 to-indigo-800 text-white p-5 shadow-lg flex justify-between items-center sticky top-0 z-50">
    <div>
        <h1 class="text-2xl font-black italic tracking-tighter uppercase">GhostPrint PRO</h1>
        <p class="text-[10px] opacity-70 font-bold tracking-widest uppercase">Management System v3.0</p>
    </div>
    <div id="sync-status" class="bg-amber-500/20 px-3 py-1 rounded-full text-[10px] font-bold text-amber-200 border border-amber-500/30">
        CONECTANDO...
    </div>
</div>

<div class="p-3 flex gap-2 flex-wrap bg-white/90 backdrop-blur shadow-sm sticky top-[76px] z-40 overflow-x-auto border-b">
    <button onclick="setView('dashboard')" class="btn text-xs px-4">Dashboard</button>
    <button onclick="setView('ventas')" class="btn text-xs px-4 bg-indigo-600">Nueva Venta</button>
    <button onclick="setView('cobranzas')" class="btn text-xs px-4">Cobranzas/WS</button>
    <button onclick="setView('compras')" class="btn text-xs px-4">Catálogo/Stock</button>
    <button onclick="setView('gastos')" class="btn text-xs px-4">Gastos</button>
    <button onclick="setView('inventario')" class="btn text-xs px-4">Inventario</button>
    <button onclick="setView('reporte')" class="btn text-xs px-4 bg-purple-100 text-purple-700 font-bold">Reportes</button>
</div>

<div id="app" class="p-4 max-w-5xl mx-auto pb-20"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI",
    authDomain: "ghost-print-contabilidad.firebaseapp.com",
    projectId: "ghost-print-contabilidad",
    storageBucket: "ghost-print-contabilidad.firebasestorage.app",
    messagingSenderId: "867057362556",
    appId: "1:867057362556:web:6bd2a461817219a4000bf9"
};

const appF = initializeApp(firebaseConfig);
const db = getFirestore(appF);
const docRef = doc(db, "sistema", "datos_principales");

// INVENTARIO DE SEGURIDAD (ANTI-ERRORES)
const DEFAULT_INVENTARIO = {
    "VINIL GLOSSY": {stock: 68, costo: 3.00},
    "BANNER": {stock: 175, costo: 3.60},
    "KIT DE TINTA": {stock: 400, costo: 0.45},
    "VINIL CLEAR GLOSSY BRILLANTE": {stock: 50, costo: 3.00},
    "VINIL CLEAR GLOSSY MATE": {stock: 50, costo: 3.00}
};

window.state = { 
    ventas: [], 
    gastos: [], 
    serviciosExtra: [], 
    inventario: DEFAULT_INVENTARIO, 
    historialCompras: [] 
};
window.view = "dashboard";

// ESCUCHA DE DATOS EN TIEMPO REAL
onSnapshot(docRef, (snap) => {
    const status = document.getElementById("sync-status");
    if (snap.exists()) {
        const d = snap.data();
        window.state.ventas = d.ventas || [];
        window.state.gastos = d.gastos || [];
        window.state.serviciosExtra = d.serviciosExtra || [];
        window.state.historialCompras = d.historialCompras || [];
        if (d.inventario && Object.keys(d.inventario).length > 0) {
            window.state.inventario = d.inventario;
        }
        status.innerText = "SINCRONIZADO ✓";
        status.className = "bg-green-500/20 px-3 py-1 rounded-full text-[10px] font-bold text-green-300 border border-green-500/30";
    } else {
        window.save();
        status.innerText = "INICIADO ✓";
    }
    render();
}, (error) => {
    console.error(error);
    document.getElementById("sync-status").innerText = "ERROR DE RED";
});

window.save = async () => { await setDoc(docRef, window.state); };
window.setView = (v) => { window.view = v; render(); };

// CÁLCULO DE PRECIOS AUTOMÁTICO
window.calcularTotal = () => {
    let p = document.getElementById("producto")?.value;
    let t = document.getElementById("tipoCliente")?.value;
    let c = parseFloat(document.getElementById("cantidad")?.value) || 0;
    let pre = 0;

    if (t === "libre") {
        document.getElementById("divPrecioLibre")?.classList.remove("hidden");
        pre = parseFloat(document.getElementById("precioLibreInput")?.value) || 0;
    } else {
        document.getElementById("divPrecioLibre")?.classList.add("hidden");
        if (p && (p.includes("VINIL") || p.includes("BANNER"))) {
            pre = (t === "mayorista_lineal") ? 10 : 9;
        } else {
            let costo = window.state.inventario[p]?.costo || 0;
            pre = costo > 0 ? costo * 2.5 : 10;
        }
    }
    if(document.getElementById("total")) document.getElementById("total").innerText = (c * pre).toFixed(2);
};

// RENDERIZADO DE VISTAS
window.render = function() {
    let app = document.getElementById("app");
    let html = "";

    if(window.view === "dashboard"){
        let vT = window.state.ventas.reduce((a,b) => a + b.total, 0);
        let gT = window.state.gastos.reduce((a,b) => a + (b.amount || 0), 0);
        html = `
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="card border-l-4 border-green-500">Facturación Total<br><b class="text-3xl text-green-700">$${vT.toFixed(2)}</b></div>
            <div class="card border-l-4 border-red-500">Gastos Realizados<br><b class="text-3xl text-red-600">$${gT.toFixed(2)}</b></div>
            <div class="card bg-slate-900 text-white text-center">Utilidad<br><b class="text-3xl font-black text-purple-400 font-italic">$${(vT-gT).toFixed(2)}</b></div>
        </div>`;
    }

    if(window.view === "ventas"){
        let hoy = new Date().toISOString().split('T')[0];
        let tItem = document.getElementById("tipoItem")?.value || "material";
        html = `<h2 class="text-xl font-bold italic mb-2">💰 NUEVA VENTA</h2>
        <div class="card">
            <label>Fecha</label><input id="fv" type="date" value="${hoy}">
            <label>Cliente</label><input id="cli" placeholder="Nombre completo">
            <label>WhatsApp (Ej: 58412...)</label><input id="tel" type="number" placeholder="Número del cliente">
            <div class="grid grid-cols-2 gap-2">
                <div><label>Categoría</label><select id="tipoItem" onchange="render()"><option value="material" ${tItem=='material'?'selected':''}>Material</option><option value="servicio" ${tItem=='servicio'?'selected':''}>Servicio</option></select></div>
                <div><label>Tarifa</label><select id="tipoCliente" onchange="window.calcularTotal()"><option value="mayorista_lineal">Lineal ($10)</option><option value="detal_m2">M2 ($9)</option><option value="libre">Manual</option></select></div>
            </div>
            <div id="divPrecioLibre" class="hidden"><label>Precio Manual</label><input id="precioLibreInput" type="number" oninput="window.calcularTotal()"></div>
            <label>Producto/Servicio</label>
            <select id="producto" onchange="window.calcularTotal()">${(tItem=="servicio" ? ["DISEÑO","IMPRESIÓN","INSTALACION", ...window.state.serviciosExtra] : Object.keys(window.state.inventario)).map(p=>`<option value="${p}">${p}</option>`).join("")}</select>
            <label>Cantidad</label><input id="cantidad" type="number" value="1" oninput="window.calcularTotal()">
            <div class="text-center py-8 bg-slate-100 rounded-2xl my-4 border-2 border-dashed border-slate-300">
                <p class="text-[10px] text-slate-400 font-bold">TOTAL A PAGAR</p>
                <b class="text-5xl text-slate-800">$<span id="total">0.00</span></b>
            </div>
            <button onclick="regVenta()" class="btn w-full py-4 text-xl shadow-lg">CONFIRMAR VENTA</button>
        </div>`;
    }

    if(window.view === "cobranzas"){
        html = `<h2 class="text-xl font-bold mb-4">🧾 CONTROL DE COBRANZAS</h2>`;
        let pend = window.state.ventas.filter(v=>!v.pagado).slice().reverse();
        if(pend.length === 0) html += `<div class="card text-center opacity-40 py-10">No hay deudas pendientes.</div>`;
        pend.forEach(v => {
            let deuda = (v.total - v.abonado).toFixed(2);
            html += `<div class="card border-l-8 border-amber-500">
                <div class="flex justify-between items-start">
                    <div><span class="text-[10px] font-bold text-slate-400">${v.fecha}</span><h3 class="text-lg font-black uppercase text-indigo-900">${v.cliente}</h3><p class="text-xs">${v.producto} - Falta: <b class="text-red-500">$${deuda}</b></p></div>
                    <button onclick="enviarWhatsApp(${v.id})" class="bg-green-600 text-white px-3 py-2 rounded-xl text-[10px] font-black hover:bg-green-700">WS COBRO</button>
                </div>
                <div class="grid grid-cols-4 gap-1 mt-4">
                    <button onclick="abonar(${v.id})" class="bg-blue-600 text-white p-2 rounded-lg text-[9px] font-bold">ABONAR</button>
                    <button onclick="liquidar(${v.id})" class="bg-green-700 text-white p-2 rounded-lg text-[9px] font-bold">LIQUIDAR</button>
                    <button onclick="editarVenta(${v.id})" class="bg-amber-500 text-white p-2 rounded-lg text-[9px] font-bold">EDITAR</button>
                    <button onclick="eliminarVenta(${v.id})" class="bg-red-500 text-white p-2 rounded-lg text-[9px] font-bold">BORRAR</button>
                </div>
            </div>`;
        });
    }

    if(window.view === "compras"){
        let hoy = new Date().toISOString().split('T')[0];
        html = `<h2 class="text-xl font-bold">🛠️ CATÁLOGO Y STOCK</h2>
        <div class="card border-l-8 border-orange-500 bg-orange-50/20">
            <label class="text-orange-700">FECHA DE SURTIDO</label><input id="fc" type="date" value="${hoy}">
            <label>MATERIAL A SURTIR</label><select id="cp">${Object.keys(window.state.inventario).map(p=>`<option>${p}</option>`).join("")}</select>
            <label>CANTIDAD QUE ENTRA</label><input id="cq" type="number" placeholder="Ej: 50">
            <button onclick="surtir()" class="btn w-full bg-orange-600 mt-2">ACTUALIZAR STOCK</button>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
            <div class="card border-t-4 border-green-500"><h3>+ Servicio</h3><input id="nsv" placeholder="Nombre Servicio"><button onclick="addServ()" class="btn w-full bg-green-600 mt-2 text-xs">Añadir</button></div>
            <div class="card border-t-4 border-blue-500"><h3>+ Material</h3><input id="nm" placeholder="Nombre Material"><button onclick="addMat()" class="btn w-full bg-blue-600 mt-2 text-xs">Añadir</button></div>
        </div>`;
    }

    if(window.view === "inventario"){
        html = `<h2 class="text-xl font-bold">📦 INVENTARIO EN TIEMPO REAL</h2>` + Object.entries(window.state.inventario).map(([k,v])=>`
        <div class="card"><div class="flex justify-between font-black text-indigo-900 uppercase italic"><span>${k}</span><button onclick="borrarProd('${k}')" class="text-red-300 text-xs hover:text-red-500">ELIMINAR</button></div>
        <div class="grid grid-cols-2 gap-4 mt-2"><div><label>Stock</label><input id="s-${k}" value="${v.stock}"></div><div><label>Costo Unitario</label><input id="c-${k}" value="${v.costo}"></div></div>
        <button onclick="updInv('${k}')" class="btn w-full mt-2 text-xs bg-slate-800">GUARDAR CAMBIOS</button></div>`).join("");
    }

    if(window.view === "gastos"){
        let hoy = new Date().toISOString().split('T')[0];
        html = `<h2 class="text-xl font-bold">💸 EGRESOS / GASTOS</h2><div class="card border-l-8 border-red-500">
            <label>Fecha</label><input id="fg" type="date" value="${hoy}">
            <label>Motivo</label><input id="gn" placeholder="Ej: Compra de tintas, Alquiler...">
            <label>Monto $</label><input id="ga" type="number" placeholder="0.00">
            <button onclick="regGasto()" class="btn w-full mt-2 bg-red-600">REGISTRAR GASTO</button></div>
            <h3 class="font-bold text-xs mt-4">ÚLTIMOS 5 GASTOS:</h3>
            ${window.state.gastos.slice(-5).reverse().map(g=>`<div class="card py-2 text-xs flex justify-between"><span><b>${g.fecha}</b> ${g.name}</span><b class="text-red-500">-$${g.amount}</b></div>`).join("")}`;
    }

    if(window.view === "reporte"){
        const meses = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
        let dataMes = {};
        window.state.ventas.forEach(v => {
            let k = meses[parseInt(v.fecha.split("-")[1])-1] + " " + v.fecha.split("-")[0];
            if(!dataMes[k]) dataMes[k] = {v:0, g:0, a:0}; dataMes[k].v += v.total; dataMes[k].a += v.abonado;
        });
        window.state.gastos.forEach(g => {
            let k = meses[parseInt(g.fecha.split("-")[1])-1] + " " + g.fecha.split("-")[0];
            if(!dataMes[k]) dataMes[k] = {v:0, g:0, a:0}; dataMes[k].g += g.amount;
        });
        html = `<h2 class="font-black text-xl italic mb-4">📈 REPORTE DE CRECIMIENTO</h2><div class="card"><canvas id="graficaGhost" height="150"></canvas></div>`;
        Object.entries(dataMes).reverse().forEach(([m, d]) => {
            html += `<div class="card border-t-8 border-purple-600">
                <div class="flex justify-between mb-4"><b class="text-xl italic">${m}</b> <span class="bg-purple-100 text-purple-700 px-3 py-1 rounded-full font-bold text-xs">Utilidad: $${(d.v-d.g).toFixed(2)}</span></div>
                <div class="grid grid-cols-3 gap-2 text-center">
                    <div class="bg-green-50 p-2 rounded">Facturado<br><b class="text-green-600">$${d.v.toFixed(2)}</b></div>
                    <div class="bg-red-50 p-2 rounded">Gastos<br><b class="text-red-600">$${d.g.toFixed(2)}</b></div>
                    <div class="bg-blue-50 p-2 rounded">Caja Real<br><b class="text-blue-600">$${d.a.toFixed(2)}</b></div>
                </div>
            </div>`;
        });
        setTimeout(() => {
            const ctx = document.getElementById('graficaGhost');
            if(ctx) new Chart(ctx, { 
                type: 'line', 
                data: { 
                    labels: Object.keys(dataMes), 
                    datasets: [{ label: 'Ventas $', data: Object.values(dataMes).map(x=>x.v), borderColor: '#6d28d9', backgroundColor: 'rgba(109,40,217,0.1)', fill: true, tension: 0.4 }] 
                },
                options: { plugins: { legend: { display: false } } }
            });
        }, 200);
    }

    app.innerHTML = html;
    if(window.view === "ventas") window.calcularTotal();
};

// --- LOGICA DE BOTONES Y ACCIONES ---
window.regVenta = async () => {
    const cli = document.getElementById("cli").value;
    const tot = parseFloat(document.getElementById("total").innerText);
    const prod = document.getElementById("producto").value;
    const fecha = document.getElementById("fv").value;
    const tel = document.getElementById("tel").value;
    if(!cli || tot <= 0) return alert("Por favor completa los datos.");
    window.state.ventas.push({id:Date.now(), fecha, cliente:cli.toUpperCase(), telefono:tel, producto:prod, total:tot, pagado:false, abonado:0});
    await window.save(); alert("Venta registrada!"); setView('cobranzas');
};

window.enviarWhatsApp = (id) => {
    let v = window.state.ventas.find(x => x.id === id);
    let tel = v.telefono || prompt("Introduce el teléfono del cliente:");
    if(tel) {
        let msj = `Hola *${v.cliente}*, te saluda *GhostPrint* 👻. Te recordamos tu saldo pendiente de *$${(v.total-v.abonado).toFixed(2)}* por el trabajo de *${v.producto}*. ¡Saludos!`;
        window.open(`https://api.whatsapp.com/send?phone=${tel}&text=${encodeURIComponent(msj)}`, '_blank');
    }
};

window.surtir = async () => {
    let p = document.getElementById("cp").value, q = parseFloat(document.getElementById("cq").value) || 0, f = document.getElementById("fc").value;
    if(q>0){ 
        window.state.inventario[p].stock += q; 
        window.state.historialCompras.push({fecha:f, item:p, cant:q}); 
        await window.save(); alert("Stock actualizado."); render(); 
    }
};

window.addServ = async () => { let n = document.getElementById("nsv").value.toUpperCase(); if(n){ window.state.serviciosExtra.push(n); await window.save(); render(); } };
window.addMat = async () => { let n = document.getElementById("nm").value.toUpperCase(); if(n){ window.state.inventario[n] = {stock:0, costo:0}; await window.save(); render(); } };
window.updInv = async (k) => { 
    window.state.inventario[k].stock = parseFloat(document.getElementById(`s-${k}`).value); 
    window.state.inventario[k].costo = parseFloat(document.getElementById(`c-${k}`).value); 
    await window.save(); alert("Cambios guardados."); 
};
window.borrarProd = async (k) => { if(confirm('¿Borrar este material?')) { delete window.state.inventario[k]; await window.save(); render(); } };
window.regGasto = async () => { 
    let n = document.getElementById("gn").value, a = parseFloat(document.getElementById("ga").value), f = document.getElementById("fg").value; 
    if(n&&a){ window.state.gastos.push({id:Date.now(), fecha:f, name:n.toUpperCase(), amount:a}); await window.save(); render(); } 
};
window.abonar = async (id) => { 
    let v = window.state.ventas.find(x => x.id === id); 
    let m = parseFloat(prompt(`¿Cuánto abonará? (Debe $${(v.total-v.abonado).toFixed(2)}):`)); 
    if(m){ v.abonado += m; if(v.abonado >= v.total) v.pagado = true; await window.save(); render(); } 
};
window.liquidar = async (id) => { 
    let v = window.state.ventas.find(x => x.id === id); 
    v.abonado = v.total; v.pagado = true; await window.save(); render(); 
};
window.eliminarVenta = async (id) => { 
    if(confirm("¿Eliminar esta venta para siempre?")) { 
        window.state.ventas = window.state.ventas.filter(v=>v.id!==id); 
        await window.save(); render(); 
    } 
};
window.editarVenta = async (id) => { 
    let v = window.state.ventas.find(x => x.id === id); 
    let n = prompt("Nuevo nombre cliente:", v.cliente), t = prompt("Nuevo monto total:", v.total); 
    if(n&&t){ v.cliente = n.toUpperCase(); v.total = parseFloat(t); await window.save(); render(); } 
};

// INICIO
window.render();
</script>
</body>
</html>
