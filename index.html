<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GhostPrint PRO v20.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { background-color: #030308; color: #f8fafc; font-family: 'Inter', sans-serif; padding-bottom: 100px; }
        .card-pro { background: #111122; border: 1px solid #2d2d44; border-radius: 20px; padding: 18px; margin-bottom: 12px; }
        nav { background: rgba(10, 10, 20, 0.95); display: flex; gap: 8px; overflow-x: auto; padding: 14px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #334155; }
        .btn-nav { background: #1e1e30; color: #64748b; padding: 12px 18px; border-radius: 14px; font-size: 10px; font-weight: 800; white-space: nowrap; cursor: pointer; text-transform: uppercase; }
        .active { background: #7c3aed !important; color: white !important; }
        input, select { background: #070712; border: 1px solid #334155; color: white; padding: 14px; border-radius: 14px; width: 100%; margin: 6px 0; font-weight: 700; outline: none; }
        .btn-main { background: linear-gradient(135deg, #7c3aed 0%, #4c1d95 100%); color: white; padding: 16px; border-radius: 16px; width: 100%; font-weight: 900; text-transform: uppercase; cursor: pointer; border: none; }
        #bill-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:200; padding:20px; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<nav>
    <div onclick="setView('inicio')" class="btn-nav active" id="n-inicio">📊 Dashboard</div>
    <div onclick="setView('ventas')" class="btn-nav" id="n-ventas">💵 Ventas</div>
    <div onclick="setView('cobros')" class="btn-nav" id="n-cobros">⏳ Cuentas</div>
    <div onclick="setView('gastos')" class="btn-nav" id="n-gastos">💸 Gastos</div>
    <div onclick="setView('compras')" class="btn-nav" id="n-compras">🛒 Compras</div>
    <div onclick="setView('inventario')" class="btn-nav" id="n-inventario">📦 Stock</div>
    <div onclick="setView('catalogo')" class="btn-nav" id="n-catalogo">⚙️ Config</div>
</nav>

<div id="app" class="p-4 max-w-2xl mx-auto"></div>

<div id="bill-modal" onclick="closeBill()">
    <div class="bg-white p-6 rounded-3xl w-full max-w-xs text-black" onclick="event.stopPropagation()">
        <h2 class="text-center font-black text-purple-600 uppercase">GhostPrint PRO</h2>
        <div class="border-t border-dashed my-4 border-gray-300"></div>
        <p class="text-[10px] font-bold opacity-40 uppercase italic">Cliente:</p>
        <p id="b-cli" class="text-xl font-black uppercase mb-4 text-gray-800"></p>
        <p class="text-[10px] font-bold opacity-40 uppercase italic">Saldo Pendiente:</p>
        <p id="b-monto" class="text-4xl font-black text-purple-700"></p>
        <button id="btn-wa" class="btn-main !from-green-600 !to-green-800 mt-6 shadow-lg shadow-green-900/20">ENVIAR WHATSAPP</button>
        <button onclick="closeBill()" class="w-full text-gray-400 font-bold py-2 mt-2">Cerrar</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI", authDomain: "ghost-print-contabilidad.firebaseapp.com", projectId: "ghost-print-contabilidad", storageBucket: "ghost-print-contabilidad.firebasestorage.app", messagingSenderId: "867057362556", appId: "1:867057362556:web:6bd2a461817219a4000bf9" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const docRef = db.collection("sistema").doc("datos_principales");

    window.state = JSON.parse(localStorage.getItem('gp_v20_3')) || { ventas: [], gastos: [], inventario: {}, serviciosExtra: ["DISEÑO", "MONTAJE", "OJALETES"], comprasInversion: [] };
    window.currentView = "inicio";

    window.sync = async function() { localStorage.setItem('gp_v20_3', JSON.stringify(window.state)); await docRef.set(window.state); };
    docRef.onSnapshot(doc => { if(doc.exists) { window.state = doc.data(); render(); } });

    window.setView = function(v) {
        window.currentView = v;
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
        document.getElementById('n-' + v).classList.add('active');
        render();
    };

    window.render = function() {
        const app = document.getElementById("app");
        const vM = window.state.ventas || [];
        const gM = window.state.gastos || [];
        const cM = window.state.comprasInversion || [];

        const tVendido = vM.reduce((a, b) => a + Number(b.total), 0);
        const tCobrado = vM.reduce((a, b) => a + (Number(b.abonado) || (b.pagado ? b.total : 0)), 0);
        const tGastos = gM.reduce((a, b) => a + Number(b.amount), 0);
        const tCompras = cM.reduce((a, b) => a + Number(b.amount), 0);
        const tDeuda = vM.filter(v => !v.pagado).reduce((a, b) => a + (b.total - (b.abonado || 0)), 0);
        
        // Cálculo de valor actual en stock (Inversión - costo de lo vendido)
        // Por ahora lo dejamos como inversión total cargada para no complicar el costo unitario
        const cajaRealEfectivo = tCobrado - tGastos - tCompras;
        const gananciaProyectada = tVendido - tGastos;

        if(window.currentView === "inicio") {
            app.innerHTML = `
                <div class="card-pro !bg-gradient-to-br !from-purple-600 !to-indigo-900 border-none shadow-xl">
                    <p class="text-[10px] font-black text-center uppercase opacity-70 italic tracking-widest">Balance Caja (Mano)</p>
                    <h2 class="text-6xl font-black text-center italic mt-2 leading-none">$${cajaRealEfectivo.toFixed(2)}</h2>
                </div>
                <div class="card-pro">
                    <h3 class="text-xs font-black uppercase text-purple-400 mb-4 italic">Administración Real</h3>
                    <div class="space-y-3 text-sm italic">
                        <div class="flex justify-between border-b border-white/5 pb-2"><span class="opacity-60">Total Ventas:</span><b class="text-white">$${tVendido.toFixed(2)}</b></div>
                        <div class="flex justify-between text-blue-400"><span>Activo en Stock:</span><b>$${tCompras.toFixed(2)}</b></div>
                        <div class="flex justify-between text-red-400 border-b border-white/5 pb-2"><span>Gastos Fijos:</span><b>-$${tGastos.toFixed(2)}</b></div>
                        <div class="pt-1 flex justify-between font-black text-xl italic"><span class="text-green-400">Utilidad Proyectada:</span><b class="text-green-400">$${gananciaProyectada.toFixed(2)}</b></div>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="card-pro text-center"><p class="text-[8px] opacity-40 uppercase">A Cobrar</p><b class="text-xl text-orange-400">$${tDeuda.toFixed(0)}</b></div>
                    <div class="card-pro text-center"><p class="text-[8px] opacity-40 uppercase">Egresos Mes</p><b class="text-xl text-red-300">$${(tGastos+tCompras).toFixed(0)}</b></div>
                </div>`;
        }

        if(window.currentView === "ventas") {
            app.innerHTML = `<div class="card-pro"><h2 class="text-lg font-black uppercase italic mb-4">Nueva Venta</h2><input id="cli" placeholder="CLIENTE"><input id="tel" type="number" placeholder="WHATSAPP"><div class="bg-white/5 p-4 rounded-xl mt-3"><div class="grid grid-cols-2 gap-2"><select id="pS"><option value="">Material...</option>${Object.keys(window.state.inventario || {}).map(m=>`<option value="${m}">${m}</option>`).join("")}</select><select id="sS"><option value="">Servicio...</option>${(window.state.serviciosExtra || []).map(s=>`<option value="${s}">${s}</option>`).join("")}</select></div><input id="qV" type="number" placeholder="Cantidad" value="1"><select id="tC" onchange="document.getElementById('pL').classList.toggle('hidden', this.value !== 'libre')"><option value="detal">DETAL ($9)</option><option value="mayor">MAYOR ($10)</option><option value="libre">PRECIO LIBRE</option></select><input id="pL" class="hidden" type="number" placeholder="Precio $"><button onclick="addCart()" class="btn-main !p-3 mt-3">+ Añadir</button></div><div id="cart-list" class="mt-4 space-y-1 text-xs italic"></div><div id="total-disp" class="text-4xl font-black text-center my-6 italic leading-none font-black italic">$0.00</div><button onclick="finalizarVenta()" class="btn-main shadow-lg">Registrar</button></div>`;
        }

        if(window.currentView === "gastos") {
            app.innerHTML = `
                <div class="card-pro border-t-4 border-red-600"><h2 class="text-lg font-black uppercase italic mb-4">Nuevo Gasto</h2><input id="dG" placeholder="¿En qué gastaste?"><input id="aG" type="number" placeholder="Monto $"><button onclick="saveGasto()" class="btn-main !bg-red-600 mt-4">Guardar</button></div>
                <h3 class="text-[10px] font-black uppercase opacity-40 ml-2 mb-2 italic">Historial de Gastos</h3>
                <div class="space-y-1">${gM.slice(-15).reverse().map(g=>`<div class="card-pro !py-3 flex justify-between text-xs border-l-2 border-red-500"><span>${g.desc}</span><b class="text-red-400">-$${g.amount}</b></div>`).join("")}</div>`;
        }

        if(window.currentView === "compras") {
            app.innerHTML = `<div class="card-pro border-t-4 border-blue-600"><h2 class="text-lg font-black uppercase italic mb-4">Entrada Material</h2><select id="mInv"><option value="">Material...</option>${Object.keys(window.state.inventario || {}).map(m=>`<option value="${m}">${m}</option>`).join("")}</select><input id="qInv" type="number" placeholder="Cantidad"><input id="pInv" type="number" placeholder="Precio Unidad $"><button onclick="saveInv()" class="btn-main !bg-blue-600 mt-4">Cargar Stock</button></div><div class="mt-4 space-y-1">${cM.slice(-10).reverse().map(c=>`<div class="card-pro !py-3 flex justify-between text-xs border-l-2 border-blue-500"><span>${c.material} (${c.qty})</span><b class="text-blue-400">$${c.amount}</b></div>`).join("")}</div>`;
        }

        if(window.currentView === "cobros") {
            const deudas = vM.filter(v => !v.pagado);
            app.innerHTML = `<div class="card-pro !bg-orange-600/10 text-center mb-6"><p class="text-[10px] font-black uppercase text-orange-500">Saldo por Cobrar</p><h3 class="text-4xl font-black italic text-orange-400 mt-1">$${tDeuda.toFixed(2)}</h3></div>
            <div class="space-y-3">${deudas.reverse().map(v => `<div class="card-pro border-l-4 border-purple-500 flex justify-between items-center"><div><b class="text-sm uppercase">${v.cliente}</b><br><span class="text-orange-400 text-xs font-black italic">Debe: $${(v.total - (v.abonado||0)).toFixed(2)}</span></div><div class="flex gap-2">
            <button onclick="editVenta(${v.id})" class="bg-white/5 p-2 rounded-xl text-xs">✏️</button>
            <button onclick="showBill('${v.cliente}', ${(v.total-(v.abonado||0))}, '${v.telefono}')" class="bg-green-600 p-2 rounded-xl">📋</button>
            <button onclick="abbonoMultiple('${v.cliente}')" class="bg-purple-600 px-3 py-2 rounded-xl text-[10px] font-black uppercase italic italic">Cobrar</button></div></div>`).join("")}</div>`;
        }

        if(window.currentView === "inventario") {
            app.innerHTML = `<div class="space-y-3">${Object.entries(window.state.inventario || {}).map(([n, i]) => `<div class="card-pro border-l-4 ${i.stock < 5 ? 'border-red-500' : 'border-green-500'} flex justify-between items-center"><div><p class="text-[9px] font-black opacity-50 uppercase">${n}</p><h4 class="text-3xl font-black italic">${(i.stock || 0).toFixed(2)}</h4></div><div class="flex flex-col gap-2"><button onclick="registrarMerma('${n}')" class="bg-orange-600/20 text-orange-400 p-2 rounded-xl text-[9px] font-black uppercase">⚠ Merma</button><div class="flex gap-1"><button onclick="editMatInv('${n}')" class="bg-white/5 p-2 rounded-lg text-[9px]">EDIT</button><button onclick="delMatInv('${n}')" class="bg-red-600/10 text-red-500 p-2 rounded-lg text-[9px]">X</button></div></div></div>`).join("")}</div>`;
        }

        if(window.currentView === "catalogo") {
            app.innerHTML = `<div class="card-pro"><h2 class="text-xs font-black opacity-40 mb-4 uppercase">Configuración</h2><input id="newM" placeholder="Material"><button onclick="addMat()" class="btn-main !p-3 mb-4">Añadir</button><hr class="border-white/5 my-4"><input id="newS" placeholder="Servicio"><button onclick="addServicio()" class="btn-main !p-3">Añadir</button></div>`;
        }
    };

    // FUNCIONES CORE
    window.showBill = (cli, mon, tel) => {
        document.getElementById('b-cli').innerText = cli;
        document.getElementById('b-monto').innerText = "$" + mon.toFixed(2);
        document.getElementById('bill-modal').style.display = 'flex';
        document.getElementById('btn-wa').onclick = () => window.open(`https://api.whatsapp.com/send?phone=${tel}&text=*GHOSTPRINT PRO*%0A*Saldo:* $${mon.toFixed(2)}`, '_blank');
    };
    window.closeBill = () => document.getElementById('bill-modal').style.display = 'none';
    window.saveGasto = async () => { const d = document.getElementById("dG").value, a = parseFloat(document.getElementById("aG").value); if(d && a) { window.state.gastos.push({ id: Date.now(), desc: d.toUpperCase(), amount: a }); await window.sync(); setView('inicio'); } };
    window.saveInv = async () => { const m = document.getElementById("mInv").value, q = parseFloat(document.getElementById("qInv").value), p = parseFloat(document.getElementById("pInv").value); if(m && q) { window.state.inventario[m].stock += q; window.state.comprasInversion.push({ id: Date.now(), material: m, amount: (q * p), qty: q }); await window.sync(); setView('inicio'); } };
    window.addMat = async () => { let n = document.getElementById("newM").value.toUpperCase(); if(n) { window.state.inventario[n] = {stock: 0}; await window.sync(); render(); } };
    window.addServicio = async () => { let s = document.getElementById("newS").value.toUpperCase(); if(s) { window.state.serviciosExtra.push(s); await window.sync(); render(); } };
    window.editVenta = (id) => { let v = window.state.ventas.find(x => x.id === id); let nTot = prompt("Monto total:", v.total); if(nTot) v.total = parseFloat(nTot); window.sync(); render(); };
    window.abbonoMultiple = async (name) => { let m = parseFloat(prompt(`Pago de ${name}:`)); if(!m) return; let vCli = window.state.ventas.filter(v => v.cliente === name && !v.pagado); vCli.forEach(v => { if(m <= 0) return; let p = v.total - (v.abonado||0); if(m >= p) { v.abonado = v.total; v.pagado = true; m -= p; } else { v.abonado = (v.abonado||0) + m; m = 0; } }); await window.sync(); render(); };
    
    let cart = [];
    window.addCart = () => { let m = document.getElementById("pS").value, s = document.getElementById("sS").value, q = parseFloat(document.getElementById("qV").value) || 1, t = document.getElementById("tC").value, p = (t === "detal") ? 9 : (t === "mayor") ? 10 : parseFloat(document.getElementById("pL").value) || 0, d = (m && s) ? m + " + " + s : m || s; if(d) { cart.push({ d, p: (p*q), mat: m, qtyV: q }); document.getElementById("cart-list").innerHTML = cart.map(c => `<div class="flex justify-between"><span>${c.d}</span><b>$${c.p}</b></div>`).join(""); document.getElementById("total-disp").innerText = "$" + cart.reduce((a,b)=>a+b.p,0).toFixed(2); } };
    
    window.finalizarVenta = async () => { 
        let cli = document.getElementById("cli").value; if(!cli || !cart.length) return; 
        cart.forEach(c => { 
            if(c.mat && window.state.inventario[c.mat]) { 
                window.state.inventario[c.mat].stock -= c.qtyV; // AQUÍ SE RESTA EL STOCK FÍSICO
            } 
        }); 
        window.state.ventas.push({ id: Date.now(), cliente: cli.toUpperCase(), telefono: document.getElementById("tel").value, total: cart.reduce((a,b)=>a+b.p,0), abonado: 0, pagado: false }); 
        await window.sync(); cart = []; setView('inicio'); 
    };

    window.registrarMerma = async (mat) => { let q = parseFloat(prompt(`Merma ${mat}:`)); if(q > 0) { window.state.inventario[mat].stock -= q; await window.sync(); render(); } };
    window.editMatInv = async (old) => { let n = prompt("Nuevo nombre:", old); if(n) { window.state.inventario[n.toUpperCase()] = window.state.inventario[old]; delete window.state.inventario[old]; await window.sync(); render(); } };
    window.delMatInv = async (n) => { if(confirm(`¿Eliminar ${n}?`)){ delete window.state.inventario[n]; await window.sync(); render(); } };

    render();
</script>
</body>
</html>
