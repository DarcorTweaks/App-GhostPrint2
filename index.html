<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostPrint ERP v8.9 - REGISTRO POR FECHA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0a14; color: #e2e8f0; font-family: system-ui; padding-bottom: 100px; }
        header { background: linear-gradient(to right, #4c1d95, #000); padding: 15px; text-align: center; font-weight: 900; }
        nav { background: #1e1e2f; display: flex; gap: 5px; overflow-x: auto; padding: 10px; position: sticky; top: 0; z-index: 100; border-bottom: 2px solid #6d28d9; }
        .btn { background: #6d28d9; color: white; padding: 10px 14px; border-radius: 8px; font-size: 10px; font-weight: 800; text-transform: uppercase; white-space: nowrap; }
        .card { background: white; padding: 18px; margin: 15px 0; border-radius: 15px; color: #1e293b; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
        input, select { border: 2px solid #e2e8f0; padding: 12px; margin: 5px 0; border-radius: 10px; width: 100%; font-weight: 700; background: #f8fafc; color: #0f172a; }
        label { font-size: 10px; font-weight: 900; color: #64748b; text-transform: uppercase; margin-left: 5px; }
        .input-fecha { background: #fff7ed !important; border: 2px solid #f97316 !important; }
    </style>
</head>
<body>

<header>GhostPrint ERP v8.9</header>

<nav>
    <button onclick="setView('ventas')" class="btn !bg-green-600">💵 Vender</button>
    <button onclick="setView('compras')" class="btn !bg-blue-600">📦 Compras</button>
    <button onclick="setView('gastos')" class="btn !bg-red-600">📉 Gastos</button>
    <button onclick="setView('reportes')" class="btn !bg-indigo-600">📊 Reportes</button>
    <button onclick="setView('config')" class="btn !bg-slate-600">⚙️ Catálogo</button>
</nav>

<div id="app" class="p-4 max-w-2xl mx-auto"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI",
    authDomain: "ghost-print-contabilidad.firebaseapp.com",
    projectId: "ghost-print-contabilidad",
    storageBucket: "ghost-print-contabilidad.firebasestorage.app",
    messagingSenderId: "867057362556",
    appId: "1:867057362556:web:6bd2a461817219a4000bf9"
};

const appF = initializeApp(firebaseConfig);
const db = getFirestore(appF);
const docRef = doc(db, "sistema", "datos_principales");

window.state = { ventas: [], gastos: [], inventario: {}, serviciosExtra: [], comprasInversion: [] };
window.view = "ventas";
let carritoVenta = [];
let fechaHoy = new Date().toISOString().split('T')[0];

window.save = async () => { await setDoc(docRef, window.state); };
window.setView = (v) => { window.view = v; render(); };

onSnapshot(docRef, (snap) => {
    if (snap.exists()) { window.state = snap.data(); render(); }
});

window.render = function() {
    let app = document.getElementById("app");
    let html = "";

    if(window.view === "ventas"){
        html = `<div class="card">
            <h2 class="font-black italic border-b mb-4">REGISTRAR VENTA</h2>
            <label>Fecha de Venta</label>
            <input type="date" id="fVenta" class="input-fecha" value="${fechaHoy}">
            
            <input id="cliV" placeholder="NOMBRE DEL CLIENTE" class="mt-2">
            <input id="telV" type="number" placeholder="WHATSAPP">
            
            <div class="grid grid-cols-2 gap-2 mt-2">
                <select id="pSel"><option value="">- Material -</option>${Object.keys(window.state.inventario).map(p=>`<option value="${p}">${p}</option>`).join("")}</select>
                <select id="sSel"><option value="">- Servicio -</option>${(window.state.serviciosExtra || []).map(s=>`<option value="${s}">${s}</option>`).join("")}</select>
            </div>
            
            <div class="flex gap-2 items-end">
                <div class="w-1/2"><label>Cant/Metros</label><input id="cQty" type="number" value="1" step="0.01"></div>
                <button onclick="addCar()" class="btn !bg-blue-600 h-[50px] mb-[5px] w-1/2">+ AÑADIR</button>
            </div>
            
            <div id="listaCarrito" class="mt-4 border-t pt-2 border-dashed"></div>
            <div id="totalVenta" class="bg-slate-900 text-white p-4 text-center text-2xl font-black rounded-xl mt-3 italic">TOTAL: $0.00</div>
            <button onclick="saveVenta()" class="btn w-full !bg-green-600 py-4 mt-4 text-sm">GUARDAR VENTA CON FECHA SELECCIONADA</button>
        </div>`;
    }

    if(window.view === "compras"){
        html = `<div class="card">
            <h2 class="font-black italic border-b mb-4 uppercase">Compra de Material</h2>
            <label>Fecha de Compra</label>
            <input type="date" id="fCompra" class="input-fecha" value="${fechaHoy}">
            
            <label class="mt-2 block">Material</label>
            <select id="mCom">${Object.keys(window.state.inventario).map(p=>`<option value="${p}">${p}</option>`).join("")}</select>
            
            <div class="grid grid-cols-2 gap-2">
                <div><label>Metros</label><input id="qCom" type="number" placeholder="0.00"></div>
                <div><label>Total Invertido $</label><input id="vCom" type="number" placeholder="0.00"></div>
            </div>
            <button onclick="saveCompra()" class="btn w-full !bg-blue-700 mt-2 py-4">REGISTRAR COMPRA</button>
        </div>`;
    }

    if(window.view === "gastos"){
        html = `<div class="card">
            <h2 class="font-black italic border-b mb-4 uppercase">Gasto Operativo</h2>
            <label>Fecha del Gasto</label>
            <input type="date" id="fGasto" class="input-fecha" value="${fechaHoy}">
            
            <input id="gNom" placeholder="MOTIVO (Comida, Luz, etc.)" class="mt-2">
            <input id="gMon" type="number" placeholder="MONTO $">
            <button onclick="saveGasto()" class="btn w-full !bg-red-600 mt-2 py-4">REGISTRAR GASTO</button>
        </div>`;
    }

    if(window.view === "reportes"){
        // Filtro para ver reportes por fecha
        html = `<div class="card !bg-indigo-900 text-white">
            <label class="text-white opacity-70">Ver Reporte del Día:</label>
            <input type="date" id="fRep" class="!bg-white !text-black" value="${fechaHoy}" onchange="renderReporte(this.value)">
        </div>
        <div id="resumenReporte"></div>`;
        setTimeout(() => renderReporte(fechaHoy), 10);
    }

    if(window.view === "config"){
        html = `<div class="card">
            <h3 class="font-black italic">CONFIGURACIÓN DE CATÁLOGO</h3>
            <input id="nP" placeholder="Nuevo Material (Ej: LONA)"><button onclick="addCat('p')" class="btn w-full mb-4">Añadir Material</button>
            <input id="nS" placeholder="Nuevo Servicio (Ej: DISEÑO)"><button onclick="addCat('s')" class="btn w-full !bg-purple-600">Añadir Servicio</button>
        </div>`;
    }

    app.innerHTML = html;
};

// --- LOGICA DE PROCESAMIENTO ---

window.addCar = () => {
    let p = document.getElementById("pSel").value, s = document.getElementById("sSel").value, q = parseFloat(document.getElementById("cQty").value);
    if(!p && !s) return;
    let pre = 9; // Por defecto detallado para el ejemplo rápido
    carritoVenta.push({ nombre: (p && s ? p+"+"+s : p||s).toUpperCase(), qty: q, sub: q*pre, prod: p });
    let div = document.getElementById("listaCarrito");
    div.innerHTML += `<div class="flex justify-between text-xs font-bold border-b py-2 uppercase"><span>${q} x ${carritoVenta[carritoVenta.length-1].nombre}</span><b>$${(q*pre).toFixed(2)}</b></div>`;
    document.getElementById("totalVenta").innerText = "TOTAL: $" + carritoVenta.reduce((a,b)=>a+b.sub,0).toFixed(2);
};

window.saveVenta = async () => {
    let f = document.getElementById("fVenta").value;
    let cli = document.getElementById("cliV").value;
    if(!cli || !carritoVenta.length) return alert("Faltan datos");
    
    // El ID es la fecha seleccionada + la hora actual para que sea único pero respete el día
    let timestamp = new Date(f + "T" + new Date().toLocaleTimeString('en-GB')).getTime();
    
    carritoVenta.forEach(i => { if(i.prod) window.state.inventario[i.prod].stock -= i.qty; });
    window.state.ventas.push({id: timestamp, cliente: cli.toUpperCase(), total: carritoVenta.reduce((a,b)=>a+b.sub,0)});
    await window.save(); carritoVenta=[]; setView('reportes');
};

window.saveCompra = async () => {
    let f = document.getElementById("fCompra").value;
    let m = document.getElementById("mCom").value, q = parseFloat(document.getElementById("qCom").value), v = parseFloat(document.getElementById("vCom").value);
    let timestamp = new Date(f + "T" + new Date().toLocaleTimeString('en-GB')).getTime();
    
    if(q>0){ 
        window.state.inventario[m].stock += q; 
        if(!window.state.comprasInversion) window.state.comprasInversion=[]; 
        window.state.comprasInversion.push({id: timestamp, name: m, amount: v}); 
        await window.save(); setView('reportes');
    }
};

window.saveGasto = async () => {
    let f = document.getElementById("fGasto").value;
    let n = document.getElementById("gNom").value, m = parseFloat(document.getElementById("gMon").value);
    let timestamp = new Date(f + "T" + new Date().toLocaleTimeString('en-GB')).getTime();
    
    if(n && m){ 
        window.state.gastos.push({id: timestamp, name: n.toUpperCase(), amount: m}); 
        await window.save(); setView('reportes');
    }
};

window.renderReporte = (fecha) => {
    const filtrar = (lista) => (lista || []).filter(i => new Date(i.id).toISOString().split('T')[0] === fecha);
    let vD = filtrar(window.state.ventas), gD = filtrar(window.state.gastos), iD = filtrar(window.state.comprasInversion);
    let tV = vD.reduce((a,b)=>a+b.total,0), tG = gD.reduce((a,b)=>a+b.amount,0), tI = iD.reduce((a,b)=>a+b.amount,0);
    
    document.getElementById("resumenReporte").innerHTML = `
        <div class="card !bg-slate-900 text-white text-center border-l-8 border-green-500">
            <p class="text-[10px] uppercase font-bold text-slate-400">Utilidad Neta (${fecha})</p>
            <h2 class="text-4xl font-black italic">$${(tV-tG).toFixed(2)}</h2>
        </div>
        <div class="card">
            <h3 class="font-black text-xs border-b mb-2 uppercase">Ventas</h3>
            ${vD.map(v=>`<div class="flex justify-between py-1 border-b text-xs"><span>${v.cliente}</span><b>$${v.total.toFixed(2)}</b></div>`).join("") || "Sin ventas"}
            <h3 class="font-black text-xs border-b mb-2 mt-4 uppercase text-red-500">Gastos</h3>
            ${gD.map(g=>`<div class="flex justify-between py-1 border-b text-xs"><span>${g.name}</span><b>$${g.amount.toFixed(2)}</b></div>`).join("") || "Sin gastos"}
            <h3 class="font-black text-xs border-b mb-2 mt-4 uppercase text-blue-500">Inversión Material</h3>
            ${iD.map(i=>`<div class="flex justify-between py-1 border-b text-xs"><span>${i.name}</span><b>$${i.amount.toFixed(2)}</b></div>`).join("") || "Sin compras"}
        </div>`;
};

window.addCat = async (t) => {
    let n = document.getElementById(t==='p'?'nP':'nS').value.toUpperCase();
    if(t==='p') window.state.inventario[n]={stock:0}; else window.state.serviciosExtra.push(n);
    await window.save(); render();
};

render();
</script>
</body>
</html>
