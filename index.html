<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GhostPrint PRO v22.7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { background-color: #030308; color: #f8fafc; font-family: 'Inter', sans-serif; padding-bottom: 100px; }
        .card-pro { background: #111122; border: 1px solid #2d2d44; border-radius: 20px; padding: 18px; margin-bottom: 12px; }
        nav { background: rgba(10, 10, 20, 0.95); display: flex; gap: 8px; overflow-x: auto; padding: 14px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #334155; }
        .btn-nav { background: #1e1e30; color: #64748b; padding: 12px 18px; border-radius: 14px; font-size: 10px; font-weight: 800; white-space: nowrap; cursor: pointer; text-transform: uppercase; }
        .active { background: #7c3aed !important; color: white !important; }
        input, select { background: #070712; border: 1px solid #334155; color: white; padding: 14px; border-radius: 14px; width: 100%; margin: 6px 0; font-weight: 700; outline: none; }
        .btn-main { background: linear-gradient(135deg, #7c3aed 0%, #4c1d95 100%); color: white; padding: 16px; border-radius: 16px; width: 100%; font-weight: 900; text-transform: uppercase; cursor: pointer; border: none; }
        #bill-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:200; padding:20px; align-items: center; justify-content: center; }
        .ghost-glow { filter: drop-shadow(0 0 12px #7c3aed); }
    </style>
</head>
<body>

<div class="p-4 flex justify-between items-center bg-[#0a0a14] border-b border-white/5">
    <div class="flex items-center gap-3">
        <span class="text-4xl ghost-glow">👻</span>
        <div><h1 class="text-xl font-black italic text-purple-500 leading-none">GHOST PRINT</h1><p class="text-[8px] font-black opacity-40 uppercase tracking-[2px]">FULL PRECISION v22.7</p></div>
    </div>
</div>

<nav>
    <div onclick="setView('inicio')" class="btn-nav active" id="n-inicio">📊 ADMIN</div>
    <div onclick="setView('ventas')" class="btn-nav" id="n-ventas">💵 Ventas</div>
    <div onclick="setView('cobros')" class="btn-nav" id="n-cobros">⏳ Cuentas</div>
    <div onclick="setView('gastos')" class="btn-nav" id="n-gastos">💸 Gastos</div>
    <div onclick="setView('compras')" class="btn-nav" id="n-compras">🛒 Compras</div>
    <div onclick="setView('inventario')" class="btn-nav" id="n-inventario">📦 Stock</div>
    <div onclick="setView('catalogo')" class="btn-nav" id="n-catalogo">⚙️ Config</div>
</nav>

<div id="app" class="p-4 max-w-2xl mx-auto"></div>

<div id="bill-modal" onclick="closeBill()">
    <div class="bg-white p-6 rounded-3xl w-full max-w-xs text-black shadow-2xl relative" onclick="event.stopPropagation()">
        <div class="text-center mb-2"><span class="text-4xl opacity-80" style="filter: drop-shadow(0 0 5px #7c3aed)">👻</span></div>
        <h2 class="text-2xl font-black italic text-purple-600 text-center uppercase">GHOST PRINT</h2>
        <div class="border-t border-dashed my-4 border-gray-300"></div>
        <p id="b-monto" class="text-5xl font-black text-purple-700 text-center my-2"></p>
        <p id="b-cli" class="text-xl font-black uppercase mb-4 text-center"></p>
        <p id="b-det" class="text-[11px] font-bold text-gray-500 italic text-center mb-4"></p>
        <button id="btn-wa" class="btn-main !from-green-600 !to-green-800 text-white">ENVIAR WHATSAPP</button>
        <button onclick="closeBill()" class="w-full text-gray-400 font-bold py-2 mt-2">Cerrar</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI", authDomain: "ghost-print-contabilidad.firebaseapp.com", projectId: "ghost-print-contabilidad", storageBucket: "ghost-print-contabilidad.firebasestorage.app", messagingSenderId: "867057362556", appId: "1:867057362556:web:6bd2a461817219a4000bf9" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const docRef = db.collection("sistema").doc("datos_principales");

    window.state = JSON.parse(localStorage.getItem('gp_v22_7')) || { ventas: [], gastos: [], inventario: {}, serviciosExtra: [], comprasInversion: [] };
    const fmtFecha = (f) => { if(!f) return "S/F"; const [y, m, d] = f.split("-"); return `${d}/${m}`; }

    window.sync = async function() { localStorage.setItem('gp_v22_7', JSON.stringify(window.state)); await docRef.set(window.state); };
    docRef.onSnapshot(doc => { if(doc.exists) { window.state = doc.data(); render(); } });

    window.setView = function(v) {
        window.currentView = v;
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
        document.getElementById('n-' + v).classList.add('active');
        render();
    };

    window.render = function() {
        const app = document.getElementById("app");
        const inv = window.state.inventario || {};
        const vM = window.state.ventas || [];
        const gM = window.state.gastos || [];
        const cM = window.state.comprasInversion || [];

        if(window.currentView === "inicio") {
            const totalCobrado = vM.reduce((a, b) => a + (Number(b.abonado) || (b.pagado ? b.total : 0)), 0);
            const totalCostoReal = cM.reduce((a, b) => a + Number(b.amount), 0);
            const totalGastosFijos = gM.reduce((a, b) => a + Number(b.amount), 0);
            
            let valorVentaTotalStock = 0;
            Object.values(inv).forEach(data => {
                valorVentaTotalStock += (data.stock * (data.ancho || 1) * (data.precio || 0));
            });

            app.innerHTML = `
                <div class="card-pro bg-gradient-to-br from-purple-900 to-black border-none text-center shadow-2xl relative overflow-hidden">
                    <p class="text-[10px] font-black uppercase opacity-60 tracking-widest">Valor de Venta en Estante</p>
                    <h2 class="text-6xl font-black italic">$${valorVentaTotalStock.toFixed(2)}</h2>
                </div>
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <div class="card-pro border-l-4 border-blue-500"><p class="text-[9px] opacity-40 font-black uppercase">Costo Material</p><b class="text-xl">$${totalCostoReal.toFixed(2)}</b></div>
                    <div class="card-pro border-l-4 border-green-500"><p class="text-[9px] opacity-40 font-black uppercase">Utilidad Proyectada</p><b class="text-xl">$${(valorVentaTotalStock - totalCostoReal).toFixed(2)}</b></div>
                </div>
                <div class="card-pro bg-[#0a0a14]"><p class="text-[10px] font-black opacity-40 uppercase mb-2">Flujo de Caja (Cobrado - Gastos)</p><h3 class="text-2xl font-black italic">$${(totalCobrado - totalGastosFijos).toFixed(2)}</h3></div>
            `;
        }

        if(window.currentView === "ventas") {
            app.innerHTML = `
                <div class="card-pro">
                    <h2 class="text-lg font-black uppercase italic mb-4">Nueva Venta</h2>
                    <input type="date" id="fV" value="${new Date().toISOString().split('T')[0]}">
                    <input id="cli" placeholder="CLIENTE">
                    <input id="tel" type="number" placeholder="WHATSAPP">
                    <div class="bg-white/5 p-4 rounded-xl mt-3">
                        <select id="pS" onchange="updateCalcVenta()">
                            <option value="">Material...</option>
                            ${Object.keys(inv).map(m=>`<option value="${m}">${m}</option>`).join("")}
                        </select>
                        <input id="qV" type="number" step="0.01" placeholder="Largo (Metros)" oninput="updateCalcVenta()">
                        <div id="calcPreview" class="text-[10px] font-bold text-purple-400 mb-2 uppercase"></div>
                        <input id="pL" type="number" placeholder="Precio Final $">
                        <button onclick="addCart()" class="btn-main !p-3 mt-3">+ AÑADIR AL TRABAJO</button>
                    </div>
                    <div id="cart-list" class="mt-4"></div>
                    <div id="total-disp" class="text-5xl font-black text-center my-6 text-purple-400">$0.00</div>
                    <button onclick="finalizarVenta()" class="btn-main">GUARDAR Y REGISTRAR</button>
                </div>
            `;
        }

        if(window.currentView === "cobros") {
            const deudas = vM.filter(v => !v.pagado);
            app.innerHTML = `<div class="space-y-2">${deudas.reverse().map(v => `<div class="card-pro border-l-4 border-purple-500 flex justify-between items-center"><div><b class="text-xs uppercase">${v.cliente}</b><br><span class="text-orange-400 text-[10px] font-black italic">DEBE: $${(v.total - (v.abonado||0)).toFixed(2)}</span></div><div class="flex gap-1"><button onclick="showBill('${v.cliente}', ${(v.total-(v.abonado||0))}, '${v.telefono}', 'TRABAJO PENDIENTE')" class="bg-green-600 p-2 rounded-lg text-xs">📋</button><button onclick="abonoM('${v.cliente}')" class="bg-purple-600 px-3 py-1 rounded-lg text-[9px] font-black uppercase">Cobrar</button></div></div>`).join("")}</div>`;
        }

        if(window.currentView === "gastos") {
            app.innerHTML = `<div class="card-pro"><input type="date" id="fG" value="${new Date().toISOString().split('T')[0]}"><input id="dG" placeholder="Descripción Gasto"><input id="aG" type="number" placeholder="Monto $"><button onclick="saveGasto()" class="btn-main !bg-red-600 mt-4">GUARDAR GASTO</button></div>`;
        }

        if(window.currentView === "compras") {
            app.innerHTML = `<div class="card-pro"><input type="date" id="fC" value="${new Date().toISOString().split('T')[0]}"><select id="mInv"><option value="">Material...</option>${Object.keys(inv).map(m=>`<option value="${m}">${m}</option>`).join("")}</select><input id="qInv" type="number" placeholder="Metros Comprados"><input id="pInv" type="number" placeholder="Costo Total de Compra $"><button onclick="saveInv()" class="btn-main !bg-blue-600 mt-4">CARGAR STOCK</button></div>`;
        }

        if(window.currentView === "inventario") {
            app.innerHTML = `<div class="space-y-2">${Object.entries(inv).map(([n, i]) => {
                const m2 = (i.stock * (i.ancho || 1)).toFixed(2);
                return `<div class="card-pro flex justify-between items-center ${i.stock < 10 ? 'border-red-600' : ''}"><div><p class="text-[9px] font-black opacity-50 uppercase">${n}</p><h4 class="text-3xl font-black italic">${i.stock} <span class="text-sm">ML</span></h4><p class="text-[10px] text-purple-400 font-bold">EQUIVALE A: ${m2} M^2</p></div><button onclick="registrarMerma('${n}')" class="bg-orange-600/20 p-2 rounded-lg text-[9px] font-black text-orange-400">MERMA</button></div>`
            }).join("")}</div>`;
        }

        if(window.currentView === "catalogo") {
            app.innerHTML = `<div class="card-pro"><h2 class="text-xs font-black opacity-40 mb-4 uppercase italic">Configuración de Materiales</h2><input id="nMat" placeholder="Nombre (Ej: VINIL)"><input id="pMat" type="number" placeholder="Precio Venta x M2 ($)"><input id="aMat" type="number" step="0.01" placeholder="Ancho del Rollo (Ej: 1.52)"><button onclick="addMat()" class="btn-main mt-2">GUARDAR CONFIG</button><div class="mt-6 space-y-2">${Object.entries(inv).map(([n, d]) => `<div class="flex justify-between items-center bg-white/5 p-3 rounded-xl border border-white/10"><div><b>${n}</b><br><span class="text-[10px] opacity-50">$${d.precio}/M2 | Ancho: ${d.ancho}m</span></div><button onclick="delMat('${n}')" class="text-red-500 font-bold px-2">X</button></div>`).join("")}</div></div>`;
        }
    };

    // --- FUNCIONES MOTOR ---
    window.updateCalcVenta = () => {
        const m = document.getElementById("pS").value;
        const q = parseFloat(document.getElementById("qV").value) || 0;
        const info = window.state.inventario[m];
        if(info && q) {
            const m2 = q * info.ancho;
            const sugerido = m2 * info.precio;
            document.getElementById("calcPreview").innerText = `${m2.toFixed(2)} M2 totales | Sugerido: $${sugerido.toFixed(2)}`;
            document.getElementById("pL").value = sugerido.toFixed(2);
        }
    };

    let cart = [];
    window.addCart = () => {
        const m = document.getElementById("pS").value;
        const q = parseFloat(document.getElementById("qV").value) || 0;
        const p = parseFloat(document.getElementById("pL").value) || 0;
        if(m && q) {
            cart.push({ d: `${m} (${q}ml)`, p, mat: m, qtyV: q });
            document.getElementById("total-disp").innerText = "$" + cart.reduce((a,b)=>a+b.p,0).toFixed(2);
            document.getElementById("cart-list").innerHTML += `<div class="text-xs italic py-1 border-b border-white/5 flex justify-between"><span>${m} x ${q}m</span><b>$${p}</b></div>`;
        }
    };

    window.finalizarVenta = async () => {
        let cli = document.getElementById("cli").value;
        if(!cli || !cart.length) return;
        cart.forEach(c => { if(window.state.inventario[c.mat]) window.state.inventario[c.mat].stock -= c.qtyV; });
        window.state.ventas.push({ id: Date.now(), fecha: document.getElementById('fV').value, cliente: cli.toUpperCase(), telefono: document.getElementById("tel").value, total: cart.reduce((a,b)=>a+b.p,0), abonado: 0, pagado: false, items: [...cart] });
        await window.sync(); cart = []; setView('inicio');
    };

    window.saveGasto = async () => {
        const d = document.getElementById("dG").value;
        const a = parseFloat(document.getElementById("aG").value);
        if(d && a) { window.state.gastos.push({ id: Date.now(), fecha: document.getElementById('fG').value, desc: d.toUpperCase(), amount: a }); await window.sync(); setView('inicio'); }
    };

    window.saveInv = async () => {
        const m = document.getElementById("mInv").value, q = parseFloat(document.getElementById("qInv").value), p = parseFloat(document.getElementById("pInv").value);
        if(m && q) { 
            window.state.inventario[m].stock += q; 
            window.state.comprasInversion.push({ id: Date.now(), fecha: document.getElementById('fC').value, material: m, amount: p, qty: q });
            await window.sync(); setView('inicio'); 
        }
    };

    window.addMat = async () => {
        const n = document.getElementById("nMat").value.toUpperCase(), p = parseFloat(document.getElementById("pMat").value), a = parseFloat(document.getElementById("aMat").value);
        if(n && p && a) { window.state.inventario[n] = { stock: window.state.inventario[n]?.stock || 0, precio: p, ancho: a }; await window.sync(); render(); }
    };

    window.delMat = async (m) => { if(confirm("¿Eliminar?")) { delete window.state.inventario[m]; await window.sync(); render(); } };
    window.showBill = (cli, mon, tel, det) => { document.getElementById('b-cli').innerText = cli; document.getElementById('b-monto').innerText = "$" + mon.toFixed(2); document.getElementById('b-det').innerText = det; document.getElementById('bill-modal').style.display = 'flex'; document.getElementById('btn-wa').onclick = () => window.open(`https://api.whatsapp.com/send?phone=${tel}&text=👻 *GHOSTPRINT*%0A*CLIENTE:* ${cli}%0A*DEUDA:* $${mon.toFixed(2)}`, '_blank'); };
    window.closeBill = () => document.getElementById('bill-modal').style.display = 'none';
    window.abonoM = async (name) => { let m = parseFloat(prompt(`Pago de ${name}:`)); if(m > 0) { let vCli = window.state.ventas.find(v => v.cliente === name && !v.pagado); if(vCli) { vCli.abonado += m; if(vCli.abonado >= vCli.total) vCli.pagado = true; } await window.sync(); render(); } };
    window.registrarMerma = async (mat) => { let q = parseFloat(prompt(`ML de merma:`)); if(q > 0) { window.state.inventario[mat].stock -= q; await window.sync(); render(); } };

    window.currentView = "inicio";
    render();
</script>
</body>
</html>
