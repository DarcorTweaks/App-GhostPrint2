<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostPrint PRO 2026 - ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .btn { background: #6d28d9; color: white; padding: 10px 14px; border-radius: 12px; cursor: pointer; font-weight: 700; border: none; transition: 0.2s; text-transform: uppercase; font-size: 10px; }
        .btn:hover { background: #5b21b6; transform: translateY(-1px); }
        .card { background: white; padding: 15px; margin: 10px 0; border-radius: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #f1f1f1; }
        input, select { border: 1px solid #e2e8f0; padding: 10px; margin: 5px 0; border-radius: 10px; width: 100%; font-size: 14px; background: #f8fafc; }
        label { font-size: 9px; color: #64748b; font-weight: 800; text-transform: uppercase; margin-left: 4px; display: block; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 pb-24">

<div class="bg-gradient-to-r from-purple-900 to-indigo-800 text-white p-4 shadow-lg flex justify-between items-center sticky top-0 z-50">
    <h1 class="text-xl font-black italic uppercase tracking-tighter">GhostPrint PRO</h1>
    <div id="sync-status" class="bg-amber-500/20 px-3 py-1 rounded-full text-[10px] font-bold text-amber-200 border border-amber-500/30">CONECTANDO...</div>
</div>

<div class="p-2 flex gap-2 overflow-x-auto bg-white/90 backdrop-blur shadow-sm sticky top-[68px] z-40 border-b">
    <button onclick="setView('dashboard')" class="btn">Inicio</button>
    <button onclick="setView('ventas')" class="btn bg-indigo-600">Venta</button>
    <button onclick="setView('cobranzas')" class="btn border-2 border-amber-500 !text-amber-600 !bg-white">Cobros</button>
    <button onclick="setView('gastos')" class="btn">Gastos/Compras</button>
    <button onclick="setView('compras')" class="btn">Inventario</button>
    <button onclick="setView('reportes')" class="btn !bg-purple-100 !text-purple-700">Reporte Pro</button>
</div>

<div id="app" class="p-4 max-w-4xl mx-auto"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI",
    authDomain: "ghost-print-contabilidad.firebaseapp.com",
    projectId: "ghost-print-contabilidad",
    storageBucket: "ghost-print-contabilidad.firebasestorage.app",
    messagingSenderId: "867057362556",
    appId: "1:867057362556:web:6bd2a461817219a4000bf9"
};

const appF = initializeApp(firebaseConfig);
const db = getFirestore(appF);
const docRef = doc(db, "sistema", "datos_principales");

const defaultState = {
    ventas: [], gastos: [], 
    inventario: {
        "VINIL GLOSSY": {stock: 0},
        "BANNER": {stock: 0},
        "VINIL MATE": {stock: 0},
        "MICROPERFORADO": {stock: 0}
    },
    serviciosExtra: ["DISEÑO GRÁFICO", "INSTALACIÓN"]
};

window.state = JSON.parse(JSON.stringify(defaultState));
window.view = "dashboard";

onSnapshot(docRef, (snap) => {
    if (snap.exists()) {
        window.state = { ...window.state, ...snap.data() };
        document.getElementById("sync-status").innerText = "SINCRONIZADO ✓";
        document.getElementById("sync-status").className = "bg-green-600 text-white px-3 py-1 rounded-full text-[10px] font-bold";
    } else { window.save(); }
    render();
});

window.save = async () => { await setDoc(docRef, window.state); };
window.setView = (v) => { window.view = v; render(); };

window.calcularVenta = () => {
    let p = document.getElementById("prod").value, t = document.getElementById("tipoCli").value, c = parseFloat(document.getElementById("cant").value) || 0, pre = 0;
    if (t === "libre") { document.getElementById("divLibre").classList.remove("hidden"); pre = parseFloat(document.getElementById("pLibre").value) || 0; }
    else {
        document.getElementById("divLibre").classList.add("hidden");
        pre = (window.state.inventario[p]) ? (t === "mayor" ? 10 : 9) : 12;
    }
    document.getElementById("totalVenta").innerText = (c * pre).toFixed(2);
};

window.render = function() {
    let app = document.getElementById("app"), html = "";

    if(window.view === "dashboard"){
        let vT = window.state.ventas.reduce((a,b) => a + b.total, 0);
        let gT = window.state.gastos.reduce((a,b) => a + b.amount, 0);
        html = `<div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-6">
            <div class="card bg-green-50">Ventas Totales<br><b class="text-2xl text-green-700">$${vT.toFixed(2)}</b></div>
            <div class="card bg-red-50">Gastos/Compras<br><b class="text-2xl text-red-600">$${gT.toFixed(2)}</b></div>
            <div class="card bg-slate-900 text-white text-center">Neto<br><b class="text-2xl text-purple-400">$${(vT-gT).toFixed(2)}</b></div>
        </div><div class="card"><canvas id="mainChart" height="180"></canvas></div>`;
        setTimeout(() => {
            new Chart(document.getElementById('mainChart'), {
                type: 'line',
                data: { labels: window.state.ventas.slice(-5).map(v => v.cliente), datasets: [{ label: 'Últimas Ventas', data: window.state.ventas.slice(-5).map(v => v.total), borderColor: '#6366f1', tension: 0.3 }] }
            });
        }, 100);
    }

    if(window.view === "ventas"){
        html = `<h2>NUEVA VENTA</h2><div class="card">
            <label>Cliente</label><input id="cli" placeholder="Nombre">
            <label>WhatsApp</label><input id="tel" type="number" placeholder="58...">
            <label>Producto</label><select id="prod" onchange="calcularVenta()">
                ${Object.keys(window.state.inventario).map(p=>`<option value="${p}">${p}</option>`).join("")}
                ${window.state.serviciosExtra.map(s=>`<option value="${s}">${s}</option>`).join("")}
            </select>
            <label>Tarifa</label><select id="tipoCli" onchange="calcularVenta()"><option value="mayor">Mayorista ($10)</option><option value="detal">Detal ($9)</option><option value="libre">Venta Libre</option></select>
            <div id="divLibre" class="hidden"><label>Precio Manual</label><input id="pLibre" type="number" oninput="calcularVenta()"></div>
            <label>Cantidad (Metros/Unid)</label><input id="cant" type="number" value="1" oninput="calcularVenta()">
            <div class="p-4 bg-indigo-50 rounded-xl my-4 text-center italic"><b>TOTAL A PAGAR: $<span id="totalVenta">0.00</span></b></div>
            <button onclick="regVenta()" class="btn w-full bg-indigo-700 py-4 shadow-lg">Registrar y Descontar Stock</button></div>`;
    }

    if(window.view === "cobranzas"){
        html = `<h2>CONTROL DE COBROS</h2>`;
        window.state.ventas.filter(v=>!v.pagado).slice().reverse().forEach(v => {
            html += `<div class="card border-l-8 border-amber-500 flex justify-between items-center">
                <div><b>${v.cliente}</b><br><small class="text-red-500 font-bold">DEBE: $${(v.total-v.abonado).toFixed(2)}</small></div>
                <div class="flex gap-1">
                    <button onclick="enviarWS(${v.id})" class="bg-green-600 text-white p-2 rounded-lg text-[8px]">WS</button>
                    <button onclick="abonar(${v.id})" class="bg-blue-600 text-white p-2 rounded-lg text-[8px]">ABONO</button>
                    <button onclick="liquidar(${v.id})" class="bg-green-700 text-white p-2 rounded-lg text-[8px]">PAGÓ</button>
                    <button onclick="borrarV(${v.id})" class="bg-red-500 text-white p-2 rounded-lg text-[8px]">X</button>
                </div></div>`;
        });
    }

    if(window.view === "gastos"){
        html = `<h2>GASTOS Y COMPRAS DE MATERIAL</h2><div class="card">
            <label>Tipo de Gasto</label>
            <select id="tipoGasto" onchange="toggleCompra()">
                <option value="general">Gasto General (Comida, Local, etc)</option>
                <option value="compra">Compra de Material (Suma al Stock)</option>
            </select>
            <div id="divCompra" class="hidden">
                <label>Material Comprado</label>
                <select id="matCompra">${Object.keys(window.state.inventario).map(p=>`<option value="${p}">${p}</option>`).join("")}</select>
                <label>Cantidad Comprada (Metros)</label><input id="cantCompra" type="number" placeholder="0">
            </div>
            <label>Concepto/Motivo</label><input id="gn" placeholder="Ej: Pago de Alquiler">
            <label>Monto $</label><input id="ga" type="number" placeholder="0.00">
            <button onclick="regGasto()" class="btn w-full mt-2 bg-red-600 shadow-md">Registrar Egreso</button></div>
            ${window.state.gastos.slice().reverse().map(g=>`<div class="card py-2 flex justify-between border-l-4 border-red-400">
                <div><small class="font-bold">${g.name}</small><br><b>$${g.amount}</b></div>
                <button onclick="borrarGasto(${g.id})" class="text-red-500 text-[10px] font-black">BORRAR</button></div>`).join("")}`;
    }

    if(window.view === "compras"){
        html = `<h2>ESTADO DEL INVENTARIO</h2>
        <div class="grid grid-cols-2 gap-2">${Object.entries(window.state.inventario).map(([n, i]) => `
            <div class="card ${i.stock < 5 ? 'bg-red-50 border-red-200' : ''}">
                <small class="font-bold">${n}</small><br>
                <b class="text-xl ${i.stock < 5 ? 'text-red-600' : 'text-slate-800'}">${i.stock.toFixed(2)} m</b>
            </div>`).join("")}</div>
        <div class="card"><label>Nuevo Material en Catálogo</label><input id="nm" placeholder="Nombre"><button onclick="addMat()" class="btn w-full bg-blue-600 mt-2">Añadir</button></div>`;
    }

    if(window.view === "reportes"){
        let clientes = {}, materiales = {};
        window.state.ventas.forEach(v => {
            clientes[v.cliente] = (clientes[v.cliente] || 0) + v.total;
            materiales[v.producto] = (materiales[v.producto] || 0) + 1;
        });
        let topC = Object.entries(clientes).sort((a,b)=>b[1]-a[1]).slice(0,3);
        html = `<h2>REPORTE DE RENDIMIENTO</h2>
            <div class="card bg-indigo-900 text-white"><h3>TOP CLIENTES (Facturación)</h3>
            ${topC.map(([n, t]) => `<div class="flex justify-between border-b border-indigo-800 py-2"><span>${n}</span><b>$${t.toFixed(2)}</b></div>`).join("")}</div>
            <div class="card"><h3>USO DE MATERIALES (Frecuencia)</h3>
            ${Object.entries(materiales).map(([n, c]) => `<div class="flex justify-between py-1"><span>${n}</span><b>${c} veces</b></div>`).join("")}</div>`;
    }

    app.innerHTML = html;
    if(window.view === "ventas") calcularVenta();
};

// LOGICA DE NEGOCIO
window.toggleCompra = () => {
    let t = document.getElementById("tipoGasto").value;
    document.getElementById("divCompra").className = (t === "compra") ? "block" : "hidden";
};

window.regVenta = async () => {
    let c = document.getElementById("cli").value, t = parseFloat(document.getElementById("totalVenta").innerText), p = document.getElementById("prod").value, tel = document.getElementById("tel").value, cant = parseFloat(document.getElementById("cant").value);
    if(c && t > 0){
        // Descontar Stock si es un material
        if(window.state.inventario[p]) {
            if(window.state.inventario[p].stock < cant) return alert("¡STOCK INSUFICIENTE!");
            window.state.inventario[p].stock -= cant;
        }
        window.state.ventas.push({id:Date.now(), fecha:new Date().toISOString(), cliente:c.toUpperCase(), producto:p, total:t, abonado:0, pagado:false, telefono:tel});
        await window.save(); setView('cobranzas');
    }
};

window.regGasto = async () => {
    let n = document.getElementById("gn").value, a = parseFloat(document.getElementById("ga").value), t = document.getElementById("tipoGasto").value;
    if(n && a > 0){
        if(t === "compra") {
            let mat = document.getElementById("matCompra").value;
            let cq = parseFloat(document.getElementById("cantCompra").value);
            window.state.inventario[mat].stock += cq;
            n = `[COMPRA STOCK] ${mat} (${cq}m)`;
        }
        window.state.gastos.push({id:Date.now(), name:n.toUpperCase(), amount:a, fecha:new Date().toISOString()});
        await window.save(); render();
    }
};

window.enviarWS = (id) => {
    let v = window.state.ventas.find(x => x.id === id);
    if(v.telefono) window.open(`https://api.whatsapp.com/send?phone=${v.telefono}&text=Hola *${v.cliente}*, tienes un saldo de *$${(v.total-v.abonado).toFixed(2)}* pendiente en *GhostPrint* 👻.`, '_blank');
};

window.abonar = async (id) => {
    let v = window.state.ventas.find(x => x.id === id), m = parseFloat(prompt(`Debe $${(v.total-v.abonado).toFixed(2)}. ¿Abono?`));
    if(m){ v.abonado += m; if(v.abonado >= v.total) v.pagado = true; await window.save(); render(); }
};

window.addMat = async () => {
    let n = document.getElementById("nm").value.toUpperCase();
    if(n){ window.state.inventario[n] = {stock:0}; await window.save(); render(); }
};

window.borrarGasto = async (id) => { if(confirm("¿Borrar?")){ window.state.gastos = window.state.gastos.filter(g => g.id !== id); await window.save(); render(); } };
window.liquidar = async (id) => { let v = window.state.ventas.find(x => x.id === id); v.abonado = v.total; v.pagado = true; await window.save(); render(); };
window.borrarV = async (id) => { if(confirm("¿Borrar?")){ window.state.ventas = window.state.ventas.filter(v=>v.id!==id); await window.save(); render(); } };

render();
</script>
</body>
</html>
