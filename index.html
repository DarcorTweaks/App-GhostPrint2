<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostPrint ERP v3 - Professional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .btn { background: #6d28d9; color: white; padding: 10px 14px; border-radius: 12px; cursor: pointer; font-weight: 700; border: none; transition: 0.2s; text-transform: uppercase; font-size: 10px; }
        .btn:hover { background: #4c1d95; transform: scale(0.98); }
        .card { background: white; padding: 15px; margin: 10px 0; border-radius: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #f1f1f1; }
        input, select { border: 1px solid #e2e8f0; padding: 10px; margin: 5px 0; border-radius: 10px; width: 100%; font-size: 14px; background: #f8fafc; }
        label { font-size: 9px; color: #64748b; font-weight: 800; text-transform: uppercase; display: block; margin-top: 5px; }
        .badge-red { background: #fee2e2; color: #dc2626; padding: 2px 8px; border-radius: 8px; font-size: 9px; font-weight: 900; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 pb-24">

<div class="bg-gradient-to-r from-purple-900 via-indigo-900 to-black text-white p-4 shadow-xl flex justify-between items-center sticky top-0 z-50">
    <div>
        <h1 class="text-xl font-black italic tracking-tighter uppercase">GhostPrint ERP</h1>
        <p id="sync-status" class="text-[8px] font-bold text-amber-400 uppercase tracking-widest">Sincronizando...</p>
    </div>
</div>

<div class="p-2 flex gap-2 overflow-x-auto bg-white/90 backdrop-blur shadow-sm sticky top-[68px] z-40 border-b">
    <button onclick="setView('dashboard')" class="btn">🏠 Inicio</button>
    <button onclick="setView('ventas')" class="btn !bg-green-600">💵 Vender</button>
    <button onclick="setView('cobranzas')" class="btn !bg-amber-500">⏳ Cobros</button>
    <button onclick="setView('compras')" class="btn !bg-blue-600">📦 Compras</button>
    <button onclick="setView('gastos')" class="btn !bg-red-600">📉 Gastos</button>
    <button onclick="setView('config')" class="btn !bg-slate-700">⚙️ Catálogo</button>
    <button onclick="setView('reportes')" class="btn !bg-indigo-600">📊 Reportes</button>
</div>

<div id="app" class="p-4 max-w-4xl mx-auto"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI",
    authDomain: "ghost-print-contabilidad.firebaseapp.com",
    projectId: "ghost-print-contabilidad",
    storageBucket: "ghost-print-contabilidad.firebasestorage.app",
    messagingSenderId: "867057362556",
    appId: "1:867057362556:web:6bd2a461817219a4000bf9"
};

const appF = initializeApp(firebaseConfig);
const db = getFirestore(appF);
const docRef = doc(db, "sistema", "datos_principales");

const defaultState = {
    ventas: [], gastos: [], 
    inventario: {
        "VINIL GLOSSY": {stock: 0}, "BANNER": {stock: 0}, "VINIL MATE": {stock: 0},
        "MICROPERFORADO": {stock: 0}, "VINIL TRANSPARENTE": {stock: 0}, "TELA": {stock: 0}
    },
    serviciosExtra: ["DISEÑO GRÁFICO", "INSTALACIÓN", "IMPRESIÓN SOLA", "RECORTE DE VINIL"]
};

window.state = JSON.parse(JSON.stringify(defaultState));
window.view = "dashboard";

onSnapshot(docRef, (snap) => {
    if (snap.exists()) {
        window.state = { ...window.state, ...snap.data() };
        document.getElementById("sync-status").innerText = "Sincronizado ✓";
        document.getElementById("sync-status").classList.replace("text-amber-400", "text-green-400");
    } else { window.save(); }
    render();
});

window.save = async () => { await setDoc(docRef, window.state); };
window.setView = (v) => { window.view = v; render(); };

window.calcularVenta = () => {
    let p = document.getElementById("prod").value, t = document.getElementById("tipoCli").value, c = parseFloat(document.getElementById("cant").value) || 0, pre = 0;
    if (t === "libre") { document.getElementById("divLibre").classList.remove("hidden"); pre = parseFloat(document.getElementById("pLibre").value) || 0; }
    else {
        document.getElementById("divLibre").classList.add("hidden");
        // Lógica de precio: Si es material 10/9, si es servicio 12 base (editable)
        pre = (window.state.inventario[p]) ? (t === "mayor" ? 10 : 9) : 12;
    }
    document.getElementById("totalVenta").innerText = (c * pre).toFixed(2);
};

window.render = function() {
    let app = document.getElementById("app"), html = "";

    if(window.view === "dashboard"){
        let vT = window.state.ventas.reduce((a,b) => a + b.total, 0);
        let gT = window.state.gastos.reduce((a,b) => a + b.amount, 0);
        html = `<div class="grid grid-cols-1 md:grid-cols-3 gap-3">
            <div class="card bg-green-50">Ingresos Brutos<br><b class="text-2xl text-green-700">$${vT.toFixed(2)}</b></div>
            <div class="card bg-red-50">Egresos Totales<br><b class="text-2xl text-red-600">$${gT.toFixed(2)}</b></div>
            <div class="card bg-slate-900 text-white italic">Ganancia Neta<br><b class="text-2xl text-purple-400 font-black">$${(vT-gT).toFixed(2)}</b></div>
        </div><div class="card"><canvas id="mainChart" height="200"></canvas></div>`;
        setTimeout(() => {
            new Chart(document.getElementById('mainChart'), {
                type: 'bar',
                data: { labels: ['Ventas', 'Gastos'], datasets: [{ label: '$ USD', data: [vT, gT], backgroundColor: ['#22c55e', '#ef4444'] }] }
            });
        }, 100);
    }

    if(window.view === "ventas"){
        html = `<h2>FACTURAR</h2><div class="card">
            <label>Cliente</label><input id="cli" placeholder="Nombre">
            <label>WhatsApp</label><input id="tel" type="number" placeholder="58...">
            <label>Seleccionar Ítem</label>
            <select id="prod" onchange="calcularVenta()">
                <option value="">-- SELECCIONE --</option>
                <optgroup label="MATERIALES (Descontar Stock)">
                    ${Object.keys(window.state.inventario).map(p=>`<option value="${p}">${p}</option>`).join("")}
                </optgroup>
                <optgroup label="SERVICIOS (Solo Mano de Obra)">
                    ${window.state.serviciosExtra.map(s=>`<option value="${s}">${s}</option>`).join("")}
                </optgroup>
            </select>
            <label>Tarifa</label><select id="tipoCli" onchange="calcularVenta()"><option value="mayor">Mayorista ($10)</option><option value="detal">Detal ($9)</option><option value="libre">Manual</option></select>
            <div id="divLibre" class="hidden"><label>Monto $</label><input id="pLibre" type="number" oninput="calcularVenta()"></div>
            <label>Cantidad</label><input id="cant" type="number" value="1" oninput="calcularVenta()">
            <div class="p-4 bg-slate-100 rounded-xl my-4 text-center font-black">TOTAL: $<span id="totalVenta">0.00</span></div>
            <button onclick="regVenta()" class="btn w-full bg-indigo-700 py-4 shadow-xl">Confirmar Venta</button></div>`;
    }

    if(window.view === "cobranzas"){
        html = `<h2>DEUDAS</h2>`;
        window.state.ventas.filter(v=>!v.pagado).slice().reverse().forEach(v => {
            html += `<div class="card border-l-8 border-amber-500 flex justify-between items-center">
                <div><b>${v.cliente}</b><br><small class="text-red-600 font-bold">DEBE: $${(v.total-(v.abonado||0)).toFixed(2)}</small></div>
                <div class="flex gap-1">
                    <button onclick="enviarWS(${v.id})" class="bg-green-600 text-white p-2 rounded-lg text-[8px]">WS</button>
                    <button onclick="abonar(${v.id})" class="bg-blue-600 text-white p-2 rounded-lg text-[8px]">ABONAR</button>
                    <button onclick="liquidar(${v.id})" class="bg-green-700 text-white p-2 rounded-lg text-[8px]">PAGÓ</button>
                    <button onclick="borrarV(${v.id})" class="bg-red-500 text-white p-2 rounded-lg text-[8px]">X</button>
                </div></div>`;
        });
    }

    if(window.view === "compras"){
        html = `<h2>COMPRAS DE MATERIAL</h2><div class="card bg-blue-50">
            <label>Material</label><select id="matC">${Object.keys(window.state.inventario).map(p=>`<option value="${p}">${p}</option>`).join("")}</select>
            <label>Cantidad (Metros)</label><input id="canC" type="number">
            <label>Costo Total $</label><input id="monC" type="number">
            <button onclick="regCompra()" class="btn w-full bg-blue-700 mt-2">Sumar Stock</button></div>
            <h3 class="mt-4 font-bold">INVENTARIO REAL</h3><div class="grid grid-cols-2 gap-2">${Object.entries(window.state.inventario).map(([n, i]) => `
            <div class="card !m-0"><b>${n}</b><br><span class="text-xl">${(i.stock||0).toFixed(2)}</span>m</div>`).join("")}</div>`;
    }

    if(window.view === "gastos"){
        html = `<h2>OTROS GASTOS</h2><div class="card">
            <label>Concepto</label><input id="gn" placeholder="Ej: Pago Local">
            <label>Monto $</label><input id="ga" type="number">
            <button onclick="regGasto()" class="btn w-full bg-red-600 mt-2">Registrar</button></div>
            ${window.state.gastos.slice().reverse().map(g=>`<div class="card py-2 flex justify-between"><div><small>${g.name}</small><br><b>$${g.amount}</b></div><button onclick="borrarGasto(${g.id})" class="text-red-500">X</button></div>`).join("")}`;
    }

    if(window.view === "config"){
        html = `<h2>CONFIGURACIÓN</h2>
            <div class="card"><label>Nuevo Material</label><input id="newMat"><button onclick="addItem('mat')" class="btn bg-blue-600 mt-2">Agregar</button></div>
            <div class="card"><label>Nuevo Servicio</label><input id="newServ"><button onclick="addItem('serv')" class="btn bg-purple-600 mt-2">Agregar</button></div>
            <div class="card"><h3>Gestionar</h3>
            ${Object.keys(window.state.inventario).map(m=>`<div class="flex justify-between py-1 border-b"><small>${m}</small><button onclick="deleteItem('mat','${m}')" class="text-red-400">Eliminar</button></div>`).join("")}
            ${window.state.serviciosExtra.map(s=>`<div class="flex justify-between py-1 border-b"><small>${s}</small><button onclick="deleteItem('serv','${s}')" class="text-red-400">Eliminar</button></div>`).join("")}
            </div>`;
    }

    if(window.view === "reportes"){
        let vT = window.state.ventas.reduce((a,b)=>a+b.total,0);
        let gT = window.state.gastos.reduce((a,b)=>a+b.amount,0);
        html = `<h2>BALANCE DETALLADO</h2>
            <div class="card bg-green-100 border-green-300"><b>Ventas Brutas:</b> $${vT.toFixed(2)}</div>
            <div class="card bg-red-100 border-red-300"><b>Gastos/Compras:</b> $${gT.toFixed(2)}</div>
            <div class="card bg-slate-800 text-white font-black italic"><b>UTILIDAD FINAL: $${(vT-gT).toFixed(2)}</b></div>
            <div class="card"><h3>TOP CLIENTES</h3>
            ${Object.entries(window.state.ventas.reduce((a,b)=>{a[b.cliente]=(a[b.cliente]||0)+b.total;return a;},{})).sort((a,b)=>b[1]-a[1]).map(([n,t])=>`<div class="flex justify-between py-1 border-b"><span>${n}</span><b>$${t.toFixed(2)}</b></div>`).join("")}
            </div>`;
    }

    app.innerHTML = html;
    if(window.view === "ventas") calcularVenta();
};

window.regVenta = async () => {
    let c = document.getElementById("cli").value, t = parseFloat(document.getElementById("totalVenta").innerText), p = document.getElementById("prod").value, can = parseFloat(document.getElementById("cant").value);
    if(c && t > 0){
        if(window.state.inventario[p]) {
            if(window.state.inventario[p].stock < can) return alert("ERROR: Stock insuficiente de " + p);
            window.state.inventario[p].stock -= can;
        }
        window.state.ventas.push({id:Date.now(), cliente:c.toUpperCase(), producto:p, total:t, abonado:0, pagado:false, telefono:document.getElementById("tel").value, fecha:new Date().toISOString()});
        await window.save(); setView('cobranzas');
    }
};

window.regCompra = async () => {
    let m = document.getElementById("matC").value, q = parseFloat(document.getElementById("canC").value), mon = parseFloat(document.getElementById("monC").value);
    if(q > 0 && mon > 0){
        window.state.inventario[m].stock += q;
        window.state.gastos.push({id:Date.now(), name: `COMPRA: ${m} (${q}m)`, amount: mon, fecha: new Date().toISOString()});
        await window.save(); render();
    }
};

window.regGasto = async () => {
    let n = document.getElementById("gn").value, a = parseFloat(document.getElementById("ga").value);
    if(n && a > 0){ window.state.gastos.push({id:Date.now(), name:n.toUpperCase(), amount:a, fecha:new Date().toISOString()}); await window.save(); render(); }
};

window.addItem = async (tipo) => {
    if(tipo === 'mat') { let n = document.getElementById("newMat").value.toUpperCase(); if(n) window.state.inventario[n] = {stock:0}; }
    else { let n = document.getElementById("newServ").value.toUpperCase(); if(n) window.state.serviciosExtra.push(n); }
    await window.save(); render();
};

window.deleteItem = async (tipo, item) => {
    if(tipo === 'mat') delete window.state.inventario[item];
    else window.state.serviciosExtra = window.state.serviciosExtra.filter(s => s !== item);
    await window.save(); render();
};

window.enviarWS = (id) => {
    let v = window.state.ventas.find(x => x.id === id);
    if(v.telefono) window.open(`https://api.whatsapp.com/send?phone=${v.telefono}&text=Hola *${v.cliente}*, tienes un pendiente de *$${(v.total-(v.abonado||0)).toFixed(2)}* en *GhostPrint* 👻.`, '_blank');
};

window.abonar = async (id) => {
    let v = window.state.ventas.find(x => x.id === id), m = parseFloat(prompt(`Debe $${(v.total-(v.abonado||0)).toFixed(2)}. ¿Abono?`));
    if(m){ v.abonado = (v.abonado || 0) + m; if(v.abonado >= v.total) v.pagado = true; await window.save(); render(); }
};

window.liquidar = async (id) => { let v = window.state.ventas.find(x => x.id === id); v.abonado = v.total; v.pagado = true; await window.save(); render(); };
window.borrarV = async (id) => { if(confirm("¿Borrar?")){ window.state.ventas = window.state.ventas.filter(v=>v.id!==id); await window.save(); render(); } };
window.borrarGasto = async (id) => { if(confirm("¿Borrar?")){ window.state.gastos = window.state.gastos.filter(g=>g.id!==id); await window.save(); render(); } };

render();
</script>
</body>
</html>
