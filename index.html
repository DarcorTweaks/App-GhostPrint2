<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostPrint ERP v10.8 - RESTAURACIÓN TOTAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #0a0a14; color: #e2e8f0; font-family: system-ui; padding-bottom: 100px; }
        header { background: linear-gradient(to right, #4c1d95, #000); padding: 15px; text-align: center; border-bottom: 3px solid #6d28d9; }
        nav { background: #1e1e2f; display: flex; gap: 8px; overflow-x: auto; padding: 10px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #4c1d95; }
        .btn { background: #6d28d9; color: white; padding: 10px 14px; border-radius: 12px; font-size: 10px; font-weight: 800; text-transform: uppercase; white-space: nowrap; cursor: pointer; border:none; }
        .card { background: white; padding: 18px; margin: 12px 0; border-radius: 20px; color: #1e293b; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        input, select { border: 2px solid #e2e8f0; padding: 10px; margin: 5px 0; border-radius: 10px; width: 100%; font-weight: 700; color: #0f172a; background: #f8fafc; }
        label { font-size: 9px; font-weight: 900; color: #64748b; text-transform: uppercase; margin-left: 4px; display: block; }
    </style>
</head>
<body>

<header><h1 class="text-xl font-black italic text-purple-400">GHOSTPRINT v10.8</h1></header>

<nav>
    <button onclick="setView('dashboard')" class="btn">🏠 Inicio</button>
    <button onclick="setView('ventas')" class="btn !bg-green-600">💵 Vender</button>
    <button onclick="setView('reportes')" class="btn !bg-indigo-600">📊 Reportes</button>
    <button onclick="setView('compras')" class="btn !bg-blue-600">📦 Compras</button>
    <button onclick="setView('gastos')" class="btn !bg-red-600">📉 Gastos</button>
    <button onclick="setView('cobranzas')" class="btn !bg-amber-500">⏳ Cobros</button>
    <button onclick="setView('config')" class="btn !bg-slate-700">⚙️ Catálogo</button>
</nav>

<div id="app" class="p-4 max-w-2xl mx-auto"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI",
    authDomain: "ghost-print-contabilidad.firebaseapp.com",
    projectId: "ghost-print-contabilidad",
    storageBucket: "ghost-print-contabilidad.firebasestorage.app",
    messagingSenderId: "867057362556",
    appId: "1:867057362556:web:6bd2a461817219a4000bf9"
};

const appF = initializeApp(firebaseConfig);
const db = getFirestore(appF);
const docRef = doc(db, "sistema", "datos_principales");

window.state = { ventas: [], gastos: [], inventario: {}, serviciosExtra: [], comprasInversion: [] };
window.view = "dashboard";
let carritoVenta = [];
let fechaHoy = new Date().toISOString().split('T')[0];

window.save = async () => { await setDoc(docRef, window.state); };
window.setView = (v) => { window.view = v; render(); };

onSnapshot(docRef, (snap) => {
    if (snap.exists()) { 
        const data = snap.data();
        window.state = {
            ventas: data.ventas || [],
            gastos: data.gastos || [],
            inventario: data.inventario || {},
            serviciosExtra: data.serviciosExtra || [],
            comprasInversion: data.comprasInversion || []
        };
        render(); 
    }
});

window.render = function() {
    let app = document.getElementById("app");
    if(!app) return;
    let html = "";
    const filtrar = (lista, f) => (lista || []).filter(i => {
        const d = new Date(i.id);
        return !isNaN(d) && d.toISOString().split('T')[0] === f;
    });

    if(window.view === "dashboard"){
        let vH = filtrar(window.state.ventas, fechaHoy);
        let gH = filtrar(window.state.gastos, fechaHoy);
        let iH = filtrar(window.state.comprasInversion, fechaHoy);
        let tV = vH.reduce((a,b)=>a+(b.total||0),0), tG = gH.reduce((a,b)=>a+(b.amount||0),0), tI = iH.reduce((a,b)=>a+(b.amount||0),0);

        html = `
        <div class="card !bg-slate-900 text-white text-center border-l-8 border-purple-500">
            <p class="text-[10px] font-black uppercase text-purple-400 italic">Balance Real Hoy</p>
            <h2 class="text-4xl font-black italic">$${(tV - tG - tI).toFixed(2)}</h2>
            <div class="flex justify-around mt-2 text-[8px] uppercase opacity-60">
                <span>Ventas: $${tV}</span><span>Gastos: $${tG}</span><span>Inversión: $${tI}</span>
            </div>
        </div>
        <div class="card"><canvas id="grafDash" height="150"></canvas></div>`;
        
        setTimeout(() => {
            const ctx = document.getElementById('grafDash');
            if(ctx) {
                new Chart(ctx, {
                    type: 'bar',
                    data: { labels: ['Ventas', 'Gastos', 'Compras'], datasets: [{ data: [tV, tG, tI], backgroundColor: ['#22c55e', '#ef4444', '#3b82f6'] }] },
                    options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
                });
            }
        }, 50);
    }

    if(window.view === "ventas"){
        html = `<div class="card"><h2 class="font-black italic border-b mb-4 uppercase text-purple-600">Venta Nueva</h2><label>Fecha</label><input type="date" id="fVenta" value="${fechaHoy}"><div class="grid grid-cols-2 gap-2"><input id="cliV" placeholder="CLIENTE" oninput="renderCarritoInner()"><input id="telV" type="number" placeholder="WHATSAPP"></div><div class="grid grid-cols-2 gap-2 mt-2"><select id="pSel"><option value="">- Producto -</option>${Object.keys(window.state.inventario).map(p=>`<option value="${p}">${p}</option>`).join("")}</select><select id="sSel"><option value="">- Servicio -</option>${(window.state.serviciosExtra || []).map(s=>`<option value="${s}">${s}</option>`).join("")}</select></div><select id="tCli" onchange="document.getElementById('divL').classList.toggle('hidden', this.value!=='libre')"><option value="detal">DETAL ($9)</option><option value="mayor">MAYOR ($10)</option><option value="libre">PRECIO LIBRE</option></select><div id="divL" class="hidden"><input id="pLibre" type="number" placeholder="Precio $"></div><div class="flex gap-2 items-end"><input id="cQty" type="number" value="1" step="0.01" class="w-1/2"><button onclick="addItem()" class="btn !bg-blue-600 h-[45px] mb-[5px] w-1/2">+ ADD</button></div><div id="listaCarrito" class="mt-4 border-t-2 border-dashed pt-4"></div><div id="totalVenta" class="bg-slate-800 text-white p-4 text-center text-3xl font-black rounded-xl mt-3 italic">TOTAL: $0.00</div><button onclick="saveVenta()" class="btn w-full !bg-green-600 py-4 mt-4 font-black">GUARDAR VENTA</button></div>`;
        setTimeout(() => renderCarritoInner(), 10);
    }

    if(window.view === "reportes"){
        html = `<div class="card bg-slate-900 text-white"><label class="text-white opacity-50 uppercase">Historial:</label><input type="date" id="fRep" value="${fechaHoy}" onchange="renderDetalleRep(this.value)" class="!text-black"></div><div id="areaRep"></div>`;
        setTimeout(() => renderDetalleRep(fechaHoy), 10);
    }

    if(window.view === "compras"){
        html = `<div class="card"><h2 class="font-black border-b mb-4 text-blue-600 uppercase italic">Cargar Inventario</h2><label>Fecha</label><input type="date" id="fCompra" value="${fechaHoy}"><select id="mCom">${Object.keys(window.state.inventario).map(p=>`<option value="${p}">${p}</option>`).join("")}</select><div class="grid grid-cols-2 gap-2"><div><label>Metros</label><input id="qCom" type="number" oninput="calcCostoTotal()"></div><div><label>$/Metro</label><input id="pMet" type="number" oninput="calcCostoTotal()"></div></div><div class="bg-blue-50 p-2 rounded text-center my-2"><b id="vComLabel" class="text-blue-900">$0.00</b></div><button onclick="saveCompra()" class="btn w-full !bg-blue-700 py-3 font-black">REGISTRAR COMPRA</button></div><div class="grid grid-cols-2 gap-2">${Object.entries(window.state.inventario).map(([n, i])=>`<div class="bg-white p-3 rounded-xl border text-center shadow-sm"><b class="text-[9px] uppercase text-slate-500">${n}</b><br><span class="text-2xl font-black text-blue-700">${(i.stock || 0).toFixed(2)}</span></div>`).join("")}</div>`;
    }

    if(window.view === "gastos"){
        html = `<div class="card"><h2 class="font-black border-b mb-4 text-red-600 uppercase">Gastos</h2><label>Fecha</label><input type="date" id="fGasto" value="${fechaHoy}"><input id="gNom" placeholder="Motivo"><input id="gMon" type="number" placeholder="Monto $"><button onclick="saveGasto()" class="btn w-full !bg-red-600 mt-2 py-3">GUARDAR GASTO</button></div>`;
    }

    if(window.view === "config"){
        html = `<div class="card"><h2 class="font-black border-b mb-4 uppercase">Catálogo</h2><label>Material</label><div class="flex gap-2"><input id="nP" placeholder="EJ: LONA"><button onclick="addCat('p')" class="btn">ADD</button></div><label class="mt-4">Servicio</label><div class="flex gap-2"><input id="nS" placeholder="EJ: DISEÑO"><button onclick="addCat('s')" class="btn !bg-purple-600">ADD</button></div></div><div class="grid grid-cols-2 gap-2"><div class="card"><b>PRODS</b>${Object.keys(window.state.inventario).map(n=>`<div class="flex justify-between py-1 border-b text-xs"><span>${n}</span><button onclick="delCat('p','${n}')" class="text-red-500">X</button></div>`).join("")}</div><div class="card"><b>SERVS</b>${(window.state.serviciosExtra || []).map((s,i)=>`<div class="flex justify-between py-1 border-b text-xs"><span>${s}</span><button onclick="delCat('s',${i})" class="text-red-500">X</button></div>`).join("")}</div></div>`;
    }

    app.innerHTML = html;
};

// --- LOGICA ---
window.calcCostoTotal = () => {
    let q = parseFloat(document.getElementById("qCom").value) || 0;
    let p = parseFloat(document.getElementById("pMet").value) || 0;
    document.getElementById("vComLabel").innerText = "$" + (q * p).toFixed(2);
};

window.saveCompra = async () => {
    let q = parseFloat(document.getElementById("qCom").value), p = parseFloat(document.getElementById("pMet").value);
    let total = q * p, m = document.getElementById("mCom").value, f = document.getElementById("fCompra").value;
    if(total > 0) {
        let ts = new Date(f + "T" + new Date().toLocaleTimeString('en-GB')).getTime();
        window.state.inventario[m].stock += q;
        window.state.comprasInversion.push({id: ts, name: m, amount: total});
        await window.save(); setView('dashboard');
    }
};

window.renderDetalleRep = (fecha) => {
    const filtrar = (lista) => (lista || []).filter(i => {
        const d = new Date(i.id);
        return !isNaN(d) && d.toISOString().split('T')[0] === fecha;
    });
    let vD = filtrar(window.state.ventas), gD = filtrar(window.state.gastos), iD = filtrar(window.state.comprasInversion);
    let tV = vD.reduce((a,b)=>a+(b.total||0),0), tG = gD.reduce((a,b)=>a+(b.amount||0),0), tI = iD.reduce((a,b)=>a+(b.amount||0),0);

    document.getElementById("areaRep").innerHTML = `
        <div class="card !bg-slate-900 text-white text-center">
            <p class="text-[10px] uppercase text-purple-400">Utilidad Neta: $${(tV - tG - tI).toFixed(2)}</p>
        </div>
        <div class="card">
            <h3 class="font-black text-xs border-b mb-2 text-green-600">VENTAS</h3>
            ${vD.map(v=>`<div class="flex justify-between py-1 border-b text-[10px]"><b>${v.cliente}</b><span>$${v.total.toFixed(2)}</span></div>`).join("") || "0"}
            <h3 class="font-black text-xs border-b mb-2 mt-4 text-red-500">GASTOS</h3>
            ${gD.map(g=>`<div class="flex justify-between py-1 border-b text-[10px]"><b>${g.name}</b><span>$${g.amount.toFixed(2)}</span></div>`).join("") || "0"}
            <h3 class="font-black text-xs border-b mb-2 mt-4 text-blue-500">COMPRAS</h3>
            ${iD.map(i=>`<div class="flex justify-between py-1 border-b text-[10px]"><b>${i.name}</b><span>$${i.amount.toFixed(2)}</span></div>`).join("") || "0"}
        </div>`;
};

window.addItem = () => {
    let p = document.getElementById("pSel").value, s = document.getElementById("sSel").value, t = document.getElementById("tCli").value, q = parseFloat(document.getElementById("cQty").value) || 0;
    let pre = (t === "detal") ? 9 : (t === "mayor") ? 10 : parseFloat(document.getElementById("pLibre").value) || 0;
    if(p || s) carritoVenta.push({ nombre: (p && s ? p+" + "+s : p||s).toUpperCase(), qty: q, sub: q*pre, pk: p });
    renderCarritoInner();
};

window.renderCarritoInner = () => {
    let div = document.getElementById("listaCarrito"), tot = document.getElementById("totalVenta");
    if(!div) return;
    div.innerHTML = carritoVenta.map((v,i)=>`<div class="flex justify-between py-2 border-b text-[10px] font-black uppercase"><span>${v.qty} ${v.nombre}</span><b>$${v.sub.toFixed(2)}</b></div>`).join("");
    tot.innerText = "TOTAL: $" + carritoVenta.reduce((a,b)=>a+b.sub,0).toFixed(2);
};

window.saveVenta = async () => {
    let f = document.getElementById("fVenta").value, cli = document.getElementById("cliV").value;
    if(!cli || !carritoVenta.length) return alert("Falta info");
    let ts = new Date(f + "T" + new Date().toLocaleTimeString('en-GB')).getTime();
    carritoVenta.forEach(i => { if(i.pk && window.state.inventario[i.pk]) window.state.inventario[i.pk].stock -= i.qty; });
    window.state.ventas.push({id: ts, cliente: cli.toUpperCase(), total: carritoVenta.reduce((a,b)=>a+b.sub,0), pagado: false, telefono: document.getElementById("telV").value});
    await window.save(); carritoVenta = []; setView('dashboard');
};

window.saveGasto = async () => {
    let f = document.getElementById("fGasto").value, n = document.getElementById("gNom").value, m = parseFloat(document.getElementById("gMon").value);
    if(n && m) { 
        let ts = new Date(f + "T" + new Date().toLocaleTimeString('en-GB')).getTime();
        window.state.gastos.push({id: ts, name: n.toUpperCase(), amount: m}); 
        await window.save(); setView('dashboard'); 
    }
};

window.addCat = async (t) => { let n = document.getElementById(t==='p'?'nP':'nS').value.toUpperCase(); if(!n) return; if(t==='p') window.state.inventario[n]={stock:0}; else window.state.serviciosExtra.push(n); await window.save(); render(); };
window.delCat = async (t, k) => { if(confirm("¿Eliminar?")){ if(t==='p') delete window.state.inventario[k]; else window.state.serviciosExtra.splice(k,1); await window.save(); render(); } };

render();
</script>
</body>
</html>
