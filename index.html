<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>GhostPrint PRO</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-100 font-sans">

<div class="bg-gradient-to-r from-purple-700 to-purple-500 text-white p-4 shadow flex justify-between">
    <h1 class="text-xl font-bold">👻 GhostPrint PRO</h1>
    <span id="sync-status">Conectando...</span>
</div>

<div class="p-4 flex gap-2 flex-wrap">
    <button onclick="setView('dashboard')" class="btn">Dashboard</button>
    <button onclick="setView('ventas')" class="btn">Ventas</button>
    <button onclick="setView('cobranzas')" class="btn">Cobranzas</button>
    <button onclick="setView('compras')" class="btn">Compras / Catálogo</button>
    <button onclick="setView('gastos')" class="btn">Gastos</button>
    <button onclick="setView('inventario')" class="btn">Inventario</button>
    <button onclick="setView('reporte')" class="btn">Reporte</button>
</div>

<div id="app" class="p-6 max-w-4xl mx-auto"></div>

<style>
    .btn{background:#6d28d9;color:white;padding:8px 14px;border-radius:8px;cursor:pointer;border:none}
    .btn:hover{background:#5b21b6}
    .card{background:white;padding:15px;margin:10px 0;border-radius:12px;box-shadow:0 4px 10px rgba(0,0,0,0.08)}
    input,select{border:1px solid #ddd;padding:10px;margin:6px 0;border-radius:8px;width:100%}
    label{font-size:13px;color:#555;font-weight:bold}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI",
    authDomain: "ghost-print-contabilidad.firebaseapp.com",
    projectId: "ghost-print-contabilidad",
    storageBucket: "ghost-print-contabilidad.firebasestorage.app",
    messagingSenderId: "867057362556",
    appId: "1:867057362556:web:6bd2a461817219a4000bf9"
};

const appF = initializeApp(firebaseConfig);
const db = getFirestore(appF);
const docRef = doc(db, "sistema", "datos_principales");

// Datos iniciales basados en tu inventario actual
window.state = {
    ventas:[], gastos:[], serviciosExtra: [],
    inventario:{
        "VINIL GLOSSY": {stock: 68, costo: 3.00},
        "BANNER": {stock: 175, costo: 3.60},
        "KIT DE TINTA": {stock: 400, costo: 0.45},
        "VINIL CLEAR GLOSSY BRILLANTE": {stock: 50, costo: 3.00},
        "VINIL CLEAR GLOSSY MATE": {stock: 50, costo: 3.00}
    }
};

onSnapshot(docRef, (snap) => {
    if (snap.exists()) {
        window.state = snap.data();
        document.getElementById("sync-status").innerText = "Sincronizado ✓";
    } else { window.save(); }
    render();
});

window.save = async () => { await setDoc(docRef, window.state); };

window.view = "dashboard";
window.setView = (v) => { window.view = v; render(); };

window.calcularTotal = () => {
    let producto = document.getElementById("producto")?.value;
    let tipoCliente = document.getElementById("tipoCliente")?.value;
    let cantidad = parseFloat(document.getElementById("cantidad")?.value) || 0;
    let precio = 0;

    if (producto && (producto.includes("VINIL") || producto.includes("BANNER"))) {
        // PRECIOS CORREGIDOS: Mayor Lineal $10 | Detal M2 $9
        precio = (tipoCliente === "mayorista_lineal") ? 10 : 9;
    } else {
        let costo = window.state.inventario[producto]?.costo || 0;
        precio = costo > 0 ? costo * 2.5 : 10;
    }
    document.getElementById("total").innerText = (cantidad * precio).toFixed(2);
};

window.render = function() {
    let app = document.getElementById("app");
    if(!app) return;
    let html = "";

    if(window.view === "dashboard"){
        let vT = window.state.ventas.reduce((a,b) => a + b.total, 0);
        let gT = window.state.gastos.reduce((a,b) => a + b.amount, 0);
        html = `<h2>📊 Dashboard</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="card">Ventas: $${vT.toFixed(2)}</div>
            <div class="card text-red-500">Gastos: $${gT.toFixed(2)}</div>
            <div class="card font-bold text-purple-700">Ganancia: $${(vT-gT).toFixed(2)}</div>
        </div>
        <div class="card"><canvas id="grafica"></canvas></div>`;
        app.innerHTML = html;
        new Chart(document.getElementById("grafica"), {type:'bar', data:{labels:['Ventas','Gastos'], datasets:[{label:'Total $', data:[vT, gT], backgroundColor:['#6d28d9','#ef4444']}]}});
        return;
    }

    if(window.view === "ventas"){
        html = `<h2>💰 Ventas</h2><div class="card">
            <input id="cliente" placeholder="Cliente">
            <label>Tarifa</label>
            <select id="tipoCliente" onchange="window.calcularTotal()">
                <option value="mayorista_lineal">Precio Lineal ($10)</option>
                <option value="detal_m2">Precio Detal M2 ($9)</option>
            </select>
            <label>Producto</label>
            <select id="producto" onchange="window.calcularTotal()">${Object.keys(window.state.inventario).map(p=>`<option value="${p}">${p}</option>`).join("")}</select>
            <input id="cantidad" type="number" value="1" oninput="window.calcularTotal()">
            <div class="text-center py-4 bg-slate-100 rounded-lg font-bold text-2xl text-purple-700">TOTAL: $<span id="total">0.00</span></div>
            <button onclick="let t=parseFloat(document.getElementById('total').innerText); window.state.ventas.push({id:Date.now(), cliente:document.getElementById('cliente').value.toUpperCase(), total:t, producto:document.getElementById('producto').value, pagado:false, abonado:0}); window.save();" class="btn w-full mt-2">Guardar Venta</button>
        </div>`;
    }

    if(window.view === "inventario"){
        html = `<h2>📦 Inventario Actual</h2>`;
        html += Object.entries(window.state.inventario).map(([k,v])=>`<div class="card">
            <div class="flex justify-between font-bold text-purple-700"><span>${k}</span> <button onclick="if(confirm('¿Borrar?')){delete window.state.inventario['${k}']; window.save();}" class="text-red-500 text-xs">ELIMINAR</button></div>
            <div class="grid grid-cols-2 gap-2 mt-2">
                <div><label>Stock</label><input id="s-${k}" value="${v.stock}"></div>
                <div><label>Costo</label><input id="c-${k}" value="${v.costo}"></div>
            </div>
            <button onclick="window.state.inventario['${k}'].stock=parseFloat(document.getElementById('s-${k}').value); window.state.inventario['${k}'].costo=parseFloat(document.getElementById('c-${k}').value); window.save(); alert('Actualizado');" class="btn w-full mt-2">Guardar Cambios</button>
        </div>`).join("");
    }

    if(window.view === "compras"){
        html = `<h2>📦 Catálogo y Compras</h2>
        <div class="card border-l-4 border-purple-500"><h3>📥 Surtir Stock</h3>
            <select id="cp">${Object.keys(window.state.inventario).map(p=>`<option>${p}</option>`).join("")}</select>
            <input id="cq" type="number" placeholder="Cantidad">
            <button onclick="let p=document.getElementById('cp').value; window.state.inventario[p].stock+=parseFloat(document.getElementById('cq').value)||0; window.save(); alert('Stock actualizado');" class="btn w-full mt-2">Actualizar Stock</button>
        </div>
        <div class="card border-l-4 border-blue-500"><h3>➕ Nuevo Material</h3>
            <input id="nuevoMat" placeholder="Nombre">
            <input id="nuevoStock" type="number" placeholder="Stock">
            <input id="nuevoCosto" type="number" placeholder="Costo">
            <button onclick="let n=document.getElementById('nuevoMat').value.toUpperCase(); if(n){window.state.inventario[n]={stock:parseFloat(document.getElementById('nuevoStock').value)||0, costo:parseFloat(document.getElementById('nuevoCosto').value)||0}; window.save(); render();}" class="btn w-full mt-2 bg-blue-600">Crear</button>
        </div>`;
    }

    if(window.view === "reporte"){
        let vT = window.state.ventas.reduce((a,b) => a + b.total, 0);
        let gT = window.state.gastos.reduce((a,b) => a + b.amount, 0);
        let caja = window.state.ventas.reduce((a,b) => a + b.abonado, 0) - gT;
        html = `<h2>📊 Reporte Ejecutivo</h2>
        <div class="card text-center py-6">
            <div class="text-xs uppercase text-gray-400 mb-1">Balance Real (Caja)</div>
            <div class="text-5xl font-black text-purple-700">$${caja.toFixed(2)}</div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="card">💰 Ventas Brutas: $${vT.toFixed(2)}</div>
            <div class="card">💸 Gastos: $${gT.toFixed(2)}</div>
            <div class="card font-bold text-green-600">📈 Ganancia Estimada: $${(vT-gT).toFixed(2)}</div>
        </div>`;
    }

    app.innerHTML = html;
    if(window.view === "ventas") window.calcularTotal();
};

window.render();
</script>
</body>
</html>
