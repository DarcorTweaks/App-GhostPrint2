<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>GhostPrint PRO</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-100 font-sans">

<div class="bg-gradient-to-r from-purple-700 to-purple-500 text-white p-4 shadow flex justify-between">
<h1 class="text-xl font-bold">👻 GhostPrint PRO</h1>
<span id="sync-status">Conectando...</span>
</div>

<div class="p-4 flex gap-2 flex-wrap">
<button onclick="setView('dashboard')" class="btn">Dashboard</button>
<button onclick="setView('ventas')" class="btn">Ventas</button>
<button onclick="setView('cobranzas')" class="btn">Cobranzas</button>
<button onclick="setView('compras')" class="btn">Compras / Catálogo</button>
<button onclick="setView('gastos')" class="btn">Gastos</button>
<button onclick="setView('inventario')" class="btn">Inventario</button>
<button onclick="setView('reporte')" class="btn">Reporte</button>
</div>

<div id="app" class="p-6 max-w-4xl mx-auto"></div>

<style>
.btn{background:#6d28d9;color:white;padding:8px 14px;border-radius:8px;cursor:pointer;border:none}
.btn:hover{background:#5b21b6}
.card{background:white;padding:15px;margin:10px 0;border-radius:12px;box-shadow:0 4px 10px rgba(0,0,0,0.08)}
input,select{border:1px solid #ddd;padding:10px;margin:6px 0;border-radius:8px;width:100%}
label{font-size:13px;color:#555;font-weight:bold}
.alert{background:#fee2e2;color:#991b1b;padding:10px;border-radius:8px;margin-bottom:10px}
.hidden{display:none}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI",
    authDomain: "ghost-print-contabilidad.firebaseapp.com",
    projectId: "ghost-print-contabilidad",
    storageBucket: "ghost-print-contabilidad.firebasestorage.app",
    messagingSenderId: "867057362556",
    appId: "1:867057362556:web:6bd2a461817219a4000bf9"
};

const appF = initializeApp(firebaseConfig);
const db = getFirestore(appF);
const docRef = doc(db, "sistema", "datos_principales");

// ===== CONFIG Y STATE ORIGINAL =====
window.margen = 2.5;
window.SERVICIOS_BASE = ["DISEÑO,IMPRECION,INSTALACION","DISEÑO","IMPRESIÓN","DISEÑO, IMPRESIÓN","INSTALACION","POP","DESINTALACION","ROTULACION","LAMINADO","LAMINADO. IMPRESIOM","IMPRESIÓN Y CORTE","VINIL DE ROTULACION","MANO DE OBRA"];

window.state = {
    ventas:[], compras:[], gastos:[], serviciosExtra: [],
    inventario:{
        "VINIL GLOSSY":{stock:68,costo:3},
        "BANNER":{stock:175,costo:3.6},
        "KIT DE TINTA":{stock:400,costo:0.45},
        "VINIL CLEAR GLOSSY BRILLANTE":{stock:50,costo:3},
        "VINIL CLEAR GLOSSY MATE":{stock:50,costo:3}
    }
};

onSnapshot(docRef, (snap) => {
    if (snap.exists()) {
        window.state = snap.data();
        if (!window.state.serviciosExtra) window.state.serviciosExtra = [];
        document.getElementById("sync-status").innerText = "Sincronizado ✓";
    } else { save(); }
    render();
});

async function save() { await setDoc(docRef, window.state); }

window.view = "dashboard";
window.setView = (v) => { window.view = v; render(); };
window.obtenerServicios = () => [...window.SERVICIOS_BASE, ...(window.state.serviciosExtra || [])];

// ===== TUS FUNCIONES DE CALCULO Y VENTAS (SIN CAMBIOS) =====
window.calcularTotal = () => {
    let producto=document.getElementById("producto")?.value;
    let tipoCliente=document.getElementById("tipoCliente")?.value;
    let cantidad=parseFloat(document.getElementById("cantidad")?.value)||0;
    let pLibreInput=document.getElementById("precioLibreInput");
    let precio;
    if(tipoCliente === "libre"){
        document.getElementById("divPrecioLibre")?.classList.remove("hidden");
        precio = parseFloat(pLibreInput.value) || 0;
    } else {
        document.getElementById("divPrecioLibre")?.classList.add("hidden");
        if(producto && (producto.includes("VINIL") || producto.includes("BANNER"))) precio = (tipoCliente=="mayorista" ? 10 : 12);
        else precio = (window.state.inventario[producto]?.costo || 0) * window.margen || 10;
    }
    let totalSpan = document.getElementById("total");
    if(totalSpan) totalSpan.innerText = (cantidad*precio).toFixed(2);
};

window.crearVenta = async () => {
    let cliente=document.getElementById("cliente").value;
    let tipoItem=document.getElementById("tipoItem").value;
    let producto=document.getElementById("producto").value;
    let tipoCliente=document.getElementById("tipoCliente").value;
    let cantidad=parseFloat(document.getElementById("cantidad").value)||1;
    let pLibreValue=parseFloat(document.getElementById("precioLibreInput").value)||0;
    let precio;
    if(tipoCliente === "libre") precio = pLibreValue;
    else {
        if(producto && (producto.includes("VINIL") || producto.includes("BANNER"))) precio = tipoCliente=="mayorista" ? 10 : 12;
        else precio = (window.state.inventario[producto]?.costo || 0) * window.margen || 10;
    }
    if(tipoItem=="material" && window.state.inventario[producto]){
        window.state.inventario[producto].stock -= cantidad;
        if(producto.includes("VINIL") || producto.includes("BANNER")){
            if(window.state.inventario["KIT DE TINTA"]) window.state.inventario["KIT DE TINTA"].stock -= (cantidad * 0.05);
        }
    }
    window.state.ventas.push({id:Date.now(), fecha:new Date().toLocaleDateString(), cliente: cliente.toUpperCase(), producto: tipoCliente === "libre" ? `${producto} (Libre)` : producto, total: cantidad*precio, pagado:false, abonado:0});
    await save();
};

window.eliminarVenta = async (id) => {
    if(!confirm("¿Eliminar registro?")) return;
    window.state.ventas = window.state.ventas.filter(x=>x.id!=id);
    await save();
};

window.abonarVenta = async (id) => {
    let v = window.state.ventas.find(x=>x.id==id);
    let abono = parseFloat(prompt("Monto a abonar:"))||0;
    v.abonado += abono;
    if(v.abonado>=v.total){v.pagado=true; v.abonado = v.total;}
    await save();
};

window.cobrarVenta = async (id) => {
    let v = window.state.ventas.find(v=>v.id==id);
    v.pagado=true; v.abonado = v.total;
    await save();
};

// ===== TUS FUNCIONES DE CATALOGO (RESTAURADAS) =====
window.cargarCostoActual = () => {
    let p = document.getElementById("cp").value;
    if(window.state.inventario[p]) document.getElementById("nc").value = window.state.inventario[p].costo;
};

window.agregarCompra = async () => {
    let p=document.getElementById("cp").value;
    let c=parseFloat(document.getElementById("cq").value)||0;
    let nCosto=parseFloat(document.getElementById("nc").value)||0;
    if(window.state.inventario[p]) {
        window.state.inventario[p].stock += c;
        if(nCosto > 0) window.state.inventario[p].costo = nCosto;
    }
    await save();
    alert("Stock actualizado.");
};

window.crearMaterialCompleto = async () => {
    let n=document.getElementById("nuevoMat").value.toUpperCase().trim();
    let s=parseFloat(document.getElementById("nuevoStock").value)||0;
    let c=parseFloat(document.getElementById("nuevoCosto").value)||0;
    if(n){ window.state.inventario[n]={stock:s,costo:c}; await save(); alert("Material creado."); }
};

window.agregarNuevoServicio = async () => {
    let n=document.getElementById("nuevoServName").value.toUpperCase().trim();
    if(n && !window.SERVICIOS_BASE.includes(n) && !window.state.serviciosExtra.includes(n)){
        window.state.serviciosExtra.push(n); await save(); alert("Servicio agregado.");
    }
};

window.editarServicio = async (i) => {
    let n = prompt("Nuevo nombre:", window.state.serviciosExtra[i]);
    if(n){ window.state.serviciosExtra[i] = n.toUpperCase().trim(); await save(); }
};

window.eliminarServicio = async (i) => {
    if(confirm("¿Eliminar?")){ window.state.serviciosExtra.splice(i,1); await save(); }
};

window.eliminarMaterial = async (p) => {
    if(confirm(`¿Eliminar ${p}?`)){ delete window.state.inventario[p]; await save(); }
};

window.editarMaterial = async (p) => {
    let n = prompt("Nuevo nombre:", p);
    if(n){ let up = n.toUpperCase().trim(); window.state.inventario[up] = window.state.inventario[p]; delete window.state.inventario[p]; await save(); }
};

window.guardarInventario = async (p) => {
    window.state.inventario[p].stock = parseFloat(document.getElementById("s-"+p).value)||0;
    window.state.inventario[p].costo = parseFloat(document.getElementById("c-"+p).value)||0;
    await save();
};

// ===== RENDER EXACTO AL TUYO =====
window.render = function() {
    let app = document.getElementById("app");
    if(!app) return;
    let html="";

    if(window.view=="dashboard"){
        let vT=window.state.ventas.reduce((a,b)=>a+b.total,0);
        let gT=window.state.gastos.reduce((a,b)=>a+b.amount,0);
        let alertas=Object.entries(window.state.inventario).filter(([k,v])=>v.stock<10).map(([k,v])=>`<div class="alert">⚠ ${k} bajo stock (${v.stock.toFixed(2)})</div>`).join("");
        html=`<h2>📊 Dashboard</h2>${alertas}<div class="grid grid-cols-1 md:grid-cols-3 gap-4"><div class="card">Ventas: $${vT.toFixed(2)}</div><div class="card">Gastos: $${gT.toFixed(2)}</div><div class="card font-bold text-purple-700">Ganancia: $${(vT-gT).toFixed(2)}</div></div><div class="card"><canvas id="grafica"></canvas></div>`;
        app.innerHTML = html;
        new Chart(document.getElementById("grafica"),{type:'bar',data:{labels:['Ventas','Gastos'],datasets:[{label:'Balance', data:[vT,gT], backgroundColor:['#6d28d9','#ef4444']}]}});
    }

    if(window.view=="ventas"){
        let tItem = document.getElementById("tipoItem")?.value || "material";
        html=`<h2>💰 Ventas</h2><div class="card"><input id="cliente" placeholder="Nombre del Cliente"><label>Tipo de Item</label><select id="tipoItem" onchange="render()"><option value="material" ${tItem=='material'?'selected':''}>Material</option><option value="servicio" ${tItem=='servicio'?'selected':''}>Servicio</option></select><label>Tarifa</label><select id="tipoCliente" onchange="window.calcularTotal()"><option value="detal">Detal</option><option value="mayorista">Mayorista</option><option value="libre">PRECIO LIBRE</option></select><div id="divPrecioLibre" class="hidden"><input id="precioLibreInput" type="number" oninput="window.calcularTotal()" placeholder="0.00"></div><label>Producto</label><select id="producto" onchange="window.calcularTotal()">${(tItem=="servicio" ? window.obtenerServicios() : Object.keys(window.state.inventario)).map(p=>`<option value="${p}">${p}</option>`).join("")}</select><input id="cantidad" type="number" value="1" oninput="window.calcularTotal()"><div class="bg-slate-100 p-4 rounded-lg text-center my-2">TOTAL: <b class="text-2xl text-purple-700">$<span id="total">0.00</span></b></div><button onclick="window.crearVenta()" class="btn w-full">Guardar Venta</button></div><h3>Últimas Ventas</h3>${window.state.ventas.slice(-10).reverse().map(v=>`<div class="card flex justify-between"><div><b>${v.cliente}</b><br><small>${v.producto}</small></div><b>$${v.total.toFixed(2)}</b></div>`).join("")}`;
        app.innerHTML = html; window.calcularTotal();
    }

    if(window.view=="compras"){
        html=`<h2>📦 Catálogo y Compras</h2><div class="card border-l-4 border-purple-500"><h3>📥 Surtir Stock</h3><select id="cp" onchange="window.cargarCostoActual()">${Object.keys(window.state.inventario).map(p=>`<option>${p}</option>`).join("")}</select><input id="cq" type="number" placeholder="Cantidad"><input id="nc" type="number" placeholder="Costo"><button onclick="window.agregarCompra()" class="btn w-full mt-2">Actualizar Stock</button></div><div class="card border-l-4 border-blue-500"><h3>➕ Nuevo Material</h3><input id="nuevoMat" placeholder="Nombre"><input id="nuevoStock" type="number" placeholder="Stock"><input id="nuevoCosto" type="number" placeholder="Costo"><button onclick="window.crearMaterialCompleto()" class="btn w-full mt-2 bg-blue-600">Guardar Material</button></div><div class="card border-l-4 border-green-500"><h3>➕ Nuevo Servicio</h3><input id="nuevoServName" placeholder="Nombre"><button onclick="window.agregarNuevoServicio()" class="btn w-full mt-2 bg-green-600">Guardar Servicio</button><div class="mt-4">${(window.state.serviciosExtra || []).map((s,i)=>`<div class="flex justify-between p-2 bg-slate-50 border mt-1"><span>${s}</span><div><button onclick="window.editarServicio(${i})" class="text-blue-500 px-2">✏️</button><button onclick="window.eliminarServicio(${i})" class="text-red-500 px-2">🗑️</button></div></div>`).join("")}</div></div>`;
        app.innerHTML = html; window.cargarCostoActual();
    }

    if(window.view=="gastos"){
        html=`<h2>💸 Gastos</h2><div class="card"><input id="gn" placeholder="Concepto"><input id="ga" type="number" placeholder="Monto"><button onclick="let n=document.getElementById('gn').value; let a=parseFloat(document.getElementById('ga').value); if(n&&a){window.state.gastos.push({id:Date.now(),name:n,amount:a,fecha:new Date().toLocaleDateString()});save();}else{alert('Invalido');}" class="btn w-full">Registrar Gasto</button></div>${window.state.gastos.slice(-10).reverse().map(g=>`<div class="card flex justify-between"><span>${g.name}</span><b class="text-red-500">-$${g.amount.toFixed(2)}</b></div>`).join("")}`;
        app.innerHTML = html;
    }

    if(window.view=="inventario"){
        html=`<h2>📦 Inventario Actual</h2>${Object.entries(window.state.inventario).map(([k,v])=>`<div class="card"><div class="flex justify-between"><b>${k}</b><div><button onclick="window.editarMaterial('${k}')" class="text-blue-500 text-xs">✏️</button><button onclick="window.eliminarMaterial('${k}')" class="text-red-500 text-xs">🗑️</button></div></div><div class="grid grid-cols-2 gap-2 mt-2"><div><label>Stock</label><input id="s-${k}" value="${v.stock}"></div><div><label>Costo</label><input id="c-${k}" value="${v.costo}"></div></div><button onclick="window.guardarInventario('${k}')" class="btn w-full mt-2">Guardar</button></div>`).join("")}`;
        app.innerHTML = html;
    }

    if(window.view=="reporte" || window.view=="cobranzas"){
        // Lógica de reportes y cobranzas igual a la original
        if(window.view=="cobranzas"){
            html=`<h2>🧾 Cuentas por Cobrar</h2>${window.state.ventas.filter(v=>!v.pagado).map(v=>`<div class="card flex justify-between"><div><b>${v.cliente}</b><br>Pendiente: $${(v.total-v.abonado).toFixed(2)}</div><div><button onclick="window.abonarVenta(${v.id})" class="btn text-xs">Abonar</button><button onclick="window.cobrarVenta(${v.id})" class="btn text-xs bg-green-600">Liquidar</button></div></div>`).join("") || '<div class="card">No hay deudas.</div>'}`;
        } else {
            let vT=window.state.ventas.reduce((a,b)=>a+b.total,0);
            let gT=window.state.gastos.reduce((a,b)=>a+b.amount,0);
            let cP=window.state.ventas.filter(v=>!v.pagado).reduce((a,b)=>a+(b.total-b.abonado),0);
            html=`<h2>📊 Reporte Ejecutivo</h2><div class="card text-center py-6"><div class="text-5xl font-black text-purple-700">$${(window.state.ventas.reduce((a,b)=>a+b.abonado,0) - gT).toFixed(2)}</div></div><div class="grid grid-cols-2 gap-4"><div class="card">Ventas: $${vT.toFixed(2)}</div><div class="card">Gastos: $${gT.toFixed(2)}</div><div class="card text-red-600">Por Cobrar: $${cP.toFixed(2)}</div><div class="card text-green-600">Ganancia: $${(vT-gT).toFixed(2)}</div></div>`;
        }
        app.innerHTML = html;
    }
};
window.render();
</script>
</body>
</html>
