<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GhostPrint MASTER v26.9</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { background-color: #030308; color: #f8fafc; font-family: 'Inter', sans-serif; padding-bottom: 100px; }
        .card-pro { background: #111122; border: 1px solid #2d2d44; border-radius: 20px; padding: 18px; margin-bottom: 12px; }
        nav { background: rgba(10, 10, 20, 0.95); display: flex; gap: 8px; overflow-x: auto; padding: 14px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #334155; }
        .btn-nav { background: #1e1e30; color: #64748b; padding: 12px 18px; border-radius: 14px; font-size: 10px; font-weight: 800; white-space: nowrap; cursor: pointer; text-transform: uppercase; }
        .active { background: #7c3aed !important; color: white !important; }
        input, select { background: #070712; border: 1px solid #334155; color: white; padding: 14px; border-radius: 14px; width: 100%; margin: 6px 0; font-weight: 700; outline: none; }
        .btn-main { background: linear-gradient(135deg, #7c3aed 0%, #4c1d95 100%); color: white; padding: 16px; border-radius: 16px; width: 100%; font-weight: 900; text-transform: uppercase; cursor: pointer; border: none; }
        .ghost-glow { filter: drop-shadow(0 0 10px #7c3aed); }
        .icon-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 10px; transition: all 0.2s; position: relative; }
        
        /* Tooltip simple (Leyenda) */
        .icon-btn:hover::after {
            content: attr(title);
            position: absolute;
            bottom: 45px;
            left: 50%;
            transform: translateX(-50%);
            background: #7c3aed;
            color: white;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 8px;
            white-space: nowrap;
            z-index: 50;
            font-weight: 900;
        }
    </style>
</head>
<body>

<div class="p-4 flex justify-between items-center bg-[#0a0a14] border-b border-white/5">
    <div class="flex items-center gap-3">
        <span class="text-4xl ghost-glow">👻</span>
        <div>
            <h1 class="text-xl font-black italic text-purple-500 leading-none">GHOST PRINT</h1>
            <p class="text-[8px] font-black opacity-40 uppercase">Master Suite v26.9</p>
        </div>
    </div>
</div>

<nav>
    <div onclick="setView('inicio')" class="btn-nav active" id="n-inicio">📊 ADMIN</div>
    <div onclick="setView('ventas')" class="btn-nav" id="n-ventas">💵 Ventas</div>
    <div onclick="setView('cobrar')" class="btn-nav" id="n-cobrar">📑 Por Cobrar</div>
    <div onclick="setView('compras')" class="btn-nav" id="n-compras">🛒 Compras</div>
    <div onclick="setView('gastos')" class="btn-nav" id="n-gastos">💸 Gastos</div>
    <div onclick="setView('inventario')" class="btn-nav" id="n-inventario">📦 Stock</div>
    <div onclick="setView('catalogo')" class="btn-nav" id="n-catalogo">⚙️ Catálogo</div>
</nav>

<div id="app" class="p-4 max-w-2xl mx-auto"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    // Firebase Config
    const firebaseConfig = { apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI", authDomain: "ghost-print-contabilidad.firebaseapp.com", projectId: "ghost-print-contabilidad", storageBucket: "ghost-print-contabilidad.firebasestorage.app", messagingSenderId: "867057362556", appId: "1:867057362556:web:6bd2a461817219a4000bf9" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const docRef = db.collection("sistema").doc("datos_principales");

    window.state = { ventas: [], inventario: {}, compras: [], gastos: [], servicios: [] };

    window.sync = async function() { 
        await docRef.set(window.state); 
        render(); 
    };
    
    docRef.onSnapshot(doc => { if(doc.exists) { window.state = doc.data(); render(); } });

    window.setView = function(v) { 
        window.currentView = v; 
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active')); 
        document.getElementById('n-'+v)?.classList.add('active'); 
        render(); 
    };

    window.render = function() {
        const app = document.getElementById("app");
        const inv = window.state.inventario || {};
        const today = new Date().toISOString().split('T')[0];

        // --- MÓDULO GASTOS (CON TOTAL E HISTORIAL) ---
        if(window.currentView === "gastos") {
            const listaGastos = window.state.gastos || [];
            const totalEfectivo = listaGastos.reduce((a, b) => a + (Number(b.monto) || 0), 0);

            app.innerHTML = `
                <div class="card-pro text-center bg-red-900/20 border-red-500/30">
                    <p class="text-[10px] opacity-40 uppercase font-black tracking-widest">Total Gastado (Efectivo)</p>
                    <h2 class="text-4xl font-black italic text-red-500">$${totalEfectivo.toFixed(2)}</h2>
                </div>

                <div class="card-pro mt-4">
                    <h2 class="text-xs font-black text-red-400 mb-4 uppercase">Nuevo Gasto</h2>
                    <input id="gDate" type="date" value="${today}">
                    <input id="gDesc" placeholder="DESCRIPCIÓN DEL GASTO">
                    <input id="gMonto" type="number" placeholder="MONTO $">
                    <button onclick="saveGasto()" class="btn-main !from-red-600 !to-red-900 mt-2">GUARDAR GASTO</button>
                </div>

                <div class="mt-6">
                    <h3 class="text-[10px] font-black opacity-30 uppercase mb-4 tracking-widest">Historial Reciente</h3>
                    <div class="space-y-2 max-h-[400px] overflow-y-auto pr-2">
                        ${listaGastos.length > 0 ? [...listaGastos].reverse().map((g, idx) => `
                            <div class="card-pro flex justify-between items-center py-3 bg-white/5 border-white/5 ${g.monto === 0 ? 'opacity-50' : ''}">
                                <div>
                                    <b class="text-[10px] uppercase ${g.monto === 0 ? 'text-orange-400' : 'text-white'}">${g.desc}</b>
                                    <p class="text-[8px] opacity-30">${g.fecha}</p>
                                </div>
                                <div class="text-right">
                                    <span class="text-lg font-black ${g.monto === 0 ? 'text-gray-500' : 'text-red-500'}">
                                        ${g.monto === 0 ? 'MERMA' : '$' + g.monto.toFixed(2)}
                                    </span>
                                </div>
                            </div>
                        `).join("") : '<p class="text-center opacity-20 py-10">Sin movimientos</p>'}
                    </div>
                </div>
            `;
            return;
        }

        // --- MÓDULO STOCK (CON LEYENDAS / TOOLTIPS) ---
        if(window.currentView === "inventario") {
            app.innerHTML = `
                <h2 class="text-[10px] font-black opacity-30 uppercase mb-4 tracking-widest italic">Existencias Actuales</h2>
                <div class="space-y-3">
                    ${Object.entries(inv).map(([n, i]) => `
                        <div class="card-pro flex justify-between items-center ${i.stock < 5 ? 'border-red-500/50 bg-red-900/10' : ''}">
                            <div class="flex-1">
                                <b class="uppercase text-purple-400 text-[10px]">${n}</b>
                                <div class="flex items-baseline gap-1">
                                    <span class="text-3xl font-black italic">${i.stock}</span>
                                    <span class="text-[8px] opacity-40 font-bold uppercase">Metros</span>
                                </div>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="regMerma('${n}')" class="icon-btn bg-red-600/20 text-red-500 border border-red-500/20" title="Cargar Material Dañado">
                                    🗑️
                                </button>
                                <button onclick="editStock('${n}')" class="icon-btn bg-blue-600/20 text-blue-400 border border-blue-500/20" title="Ajuste Manual de Stock">
                                    ✏️
                                </button>
                            </div>
                        </div>
                    `).join("")}
                </div>`;
            return;
        }

        // --- MÓDULO CATALOGO (BLOQUEADO) ---
        if(window.currentView === "catalogo") {
            app.innerHTML = `
                <div class="card-pro border-purple-500/30">
                    <h3 class="text-[10px] font-black opacity-50 mb-4 uppercase text-purple-400">Panel de Configuración Bloqueado</h3>
                    <input id="nMat" placeholder="Nombre de Material">
                    <input id="aMat" type="number" step="0.01" placeholder="Ancho m">
                    <button onclick="crearMat()" class="btn-main mt-2">Registrar en Catálogo</button>
                </div>
                <div class="mt-4 space-y-2 overflow-y-auto max-h-60">
                    ${Object.keys(inv).map(m => `
                        <div class="flex justify-between bg-white/5 p-3 rounded-xl text-[10px] font-black uppercase">
                            <span>${m}</span>
                            <button onclick="delMat('${m}')" class="text-red-500" title="Eliminar del Sistema">BORRAR</button>
                        </div>
                    `).join("")}
                </div>
            `;
            return;
        }

        // Carga genérica para otras vistas
        app.innerHTML = `<p class="text-center py-20 opacity-20 font-black uppercase">Cargando Módulo...</p>`;
        if(window.currentView === "inicio") renderInicio(app);
        if(window.currentView === "ventas") renderVentas(app, inv, today);
    };

    // --- ACCIONES ASEGURADAS ---
    window.saveGasto = async () => {
        const d = document.getElementById("gDesc").value.toUpperCase(), m = parseFloat(document.getElementById("gMonto").value);
        if(d && !isNaN(m)) { 
            window.state.gastos.push({ desc: d, monto: m, fecha: document.getElementById("gDate").value }); 
            await window.sync(); 
        }
    };

    window.regMerma = async (m) => {
        let cant = parseFloat(prompt(`🛑 CARGAR MERMA: ${m}\n¿Cuántos metros se dañaron?`));
        if(!isNaN(cant) && cant > 0) {
            window.state.inventario[m].stock = parseFloat((window.state.inventario[m].stock - cant).toFixed(2));
            window.state.gastos.push({ desc: `[MERMA] ${m}: -${cant}ML`, monto: 0, fecha: new Date().toISOString().split('T')[0] });
            await window.sync();
        }
    };

    window.editStock = async (m) => {
        let n = parseFloat(prompt(`Ajustar Stock Manual: ${m}`, window.state.inventario[m].stock));
        if(!isNaN(n)) { window.state.inventario[m].stock = n; await window.sync(); }
    };

    window.crearMat = async () => {
        const n = document.getElementById("nMat").value.toUpperCase(), a = parseFloat(document.getElementById("aMat").value);
        if(n && a) { window.state.inventario[n] = { stock: 0, precioM2: 0, precioML: 0, ancho: a }; await window.sync(); }
    };

    window.delMat = async (m) => { if(confirm(`¿Borrar ${m}?`)) { delete window.state.inventario[m]; await window.sync(); } };

    function renderInicio(app) {
        const total = (window.state.ventas || []).reduce((a, b) => a + (Number(b.total) || 0), 0);
        app.innerHTML = `<div class="card-pro text-center"><p class="text-[10px] opacity-40 uppercase">Ventas</p><h2 class="text-5xl font-black text-purple-500">$${total.toFixed(2)}</h2></div>`;
    }

    function renderVentas(app, inv, today) {
        app.innerHTML = `<div class="card-pro"><h2 class="text-lg font-black text-purple-500 mb-4 uppercase">Ventas</h2><input id="cli" placeholder="CLIENTE"><select id="vMat">${Object.keys(inv).map(m=>`<option value="${m}">${m}</option>`).join("")}</select><button class="btn-main mt-4">Vender</button></div>`;
    }

    render();
</script>
</body>
</html>
