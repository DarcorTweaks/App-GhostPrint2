<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostPrint ERP v3 - Estable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #0d0d1a; color: #e2e8f0; font-family: system-ui; padding-bottom: 100px; }
        .btn { background: #6d28d9; color: white; padding: 10px; border-radius: 12px; font-weight: 700; text-transform: uppercase; font-size: 10px; cursor: pointer; }
        .card { background: white; padding: 20px; margin: 12px 0; border-radius: 20px; color: #1e293b; }
        input, select { border: 1px solid #e2e8f0; padding: 12px; margin: 8px 0; border-radius: 12px; width: 100%; background: #f8fafc; color: #1e293b; }
        label { font-size: 10px; color: #64748b; font-weight: 800; text-transform: uppercase; display: block; }
        header { background: #1e1b4b; color: white; padding: 16px; position: sticky; top: 0; z-index: 50; }
        nav { padding: 8px; display: flex; gap: 8px; overflow-x: auto; background: rgba(0,0,0,0.2); position: sticky; top: 60px; z-index: 40; }
    </style>
</head>
<body>

<header>
    <h1 class="text-xl font-black italic">GHOSTPRINT ERP</h1>
    <p id="sync-status" class="text-[9px] text-amber-300">CONECTANDO...</p>
</header>

<nav>
    <button onclick="setView('dashboard')" class="btn">🏠 Inicio</button>
    <button onclick="setView('ventas')" class="btn !bg-green-600">💵 Vender</button>
    <button onclick="setView('cobranzas')" class="btn !bg-amber-500">⏳ Cobros</button>
    <button onclick="setView('compras')" class="btn !bg-blue-600">📦 Compras</button>
    <button onclick="setView('config')" class="btn !bg-slate-700">⚙️ Catálogo</button>
</nav>

<div id="app" class="p-4 max-w-4xl mx-auto"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI",
    authDomain: "ghost-print-contabilidad.firebaseapp.com",
    projectId: "ghost-print-contabilidad",
    storageBucket: "ghost-print-contabilidad.firebasestorage.app",
    messagingSenderId: "867057362556",
    appId: "1:867057362556:web:6bd2a461817219a4000bf9"
};

const appF = initializeApp(firebaseConfig);
const db = getFirestore(appF);
const docRef = doc(db, "sistema", "datos_principales");

window.state = { ventas: [], gastos: [], inventario: {}, serviciosExtra: [] };
window.view = "dashboard";
let carritoVenta = [];

onSnapshot(docRef, (snap) => {
    if (snap.exists()) { 
        window.state = snap.data(); 
        document.getElementById("sync-status").innerText = "SINCRONIZADO ✓"; 
        render();
    }
});

window.save = async () => { await setDoc(docRef, window.state); };
window.setView = (v) => { window.view = v; render(); };

window.render = function() {
    const app = document.getElementById("app");
    if(!app) return;
    let html = "";
    const mesActual = new Date().getMonth();

    if(window.view === "dashboard"){
        const vM = (window.state.ventas || []).filter(v=>new Date(v.id).getMonth()===mesActual).reduce((a,b)=>a+b.total,0);
        html = `<div class="card"><h2>Ventas del Mes</h2><b class="text-3xl text-green-600">$${vM.toFixed(2)}</b></div>`;
    }

    if(window.view === "ventas"){
        html = `<div class="card">
            <label>Cliente</label><input id="cliV" placeholder="Nombre">
            <div class="grid grid-cols-2 gap-2">
                <div><label>Material</label><select id="pSel"><option value="">--</option>${Object.keys(window.state.inventario).map(p=>`<option value="${p}">${p}</option>`).join("")}</select></div>
                <div><label>Servicio</label><select id="sSel"><option value="">--</option>${(window.state.serviciosExtra || []).map(s=>`<option value="${s}">${s}</option>`).join("")}</select></div>
            </div>
            <label>Tarifa</label><select id="tCli" onchange="render()"><option value="detal">Detal ($9)</option><option value="mayor">Mayor ($10)</option><option value="libre">Manual</option></select>
            <div id="divLibre" class="${document.getElementById('tCli')?.value==='libre'?'':'hidden'}"><label>Precio $</label><input id="pMan" type="number" value="0"></div>
            <label>Cantidad</label><input id="cQty" type="number" value="1">
            <button onclick="addItemCarrito()" class="btn w-full !bg-blue-600 mt-2">Añadir</button>
            <div class="mt-4">${carritoVenta.map((v,i)=>`<div class="flex justify-between border-b py-1 text-xs"><span>${v.qty}x ${v.nombre}</span><b>$${v.sub.toFixed(2)}</b></div>`).join("")}</div>
            <div class="p-4 bg-slate-900 text-white text-center font-bold mt-2 rounded-xl">TOTAL: $${carritoVenta.reduce((a,b)=>a+b.sub,0).toFixed(2)}</div>
            <button onclick="procesarV()" class="btn w-full !bg-green-600 mt-4">Generar Venta</button></div>`;
    }

    if(window.view === "cobranzas"){
        html = `<h2 class="text-white mb-2 font-bold">POR COBRAR</h2>${(window.state.ventas || []).filter(v=>!v.pagado).map(v=>`<div class="card flex justify-between italic"><span>${v.cliente}</span><b>$${(v.total - (v.abonado || 0)).toFixed(2)}</b></div>`).join("")}`;
    }

    if(window.view === "config"){
        html = `<div class="card"><label>Nuevo Material</label><input id="nP"><button onclick="addC('p')" class="btn w-full">Guardar</button></div>`;
    }

    app.innerHTML = html;
};

window.addItemCarrito = () => {
    const p = document.getElementById("pSel").value;
    const s = document.getElementById("sSel").value;
    const t = document.getElementById("tCli").value;
    const q = parseFloat(document.getElementById("cQty").value) || 0;
    let pre = 0;

    if(t === "libre") {
        pre = parseFloat(document.getElementById("pMan").value) || 0;
    } else {
        pre = (p) ? (t === "mayor" ? 10 : 9) : 12;
    }

    if(q > 0) {
        carritoVenta.push({ nombre: p || s || "Venta", qty: q, sub: q * pre });
        render();
    }
};

window.procesarV = async () => {
    const c = document.getElementById("cliV").value;
    if(!c || carritoVenta.length === 0) return alert("Faltan datos");
    const total = carritoVenta.reduce((a,b)=>a+b.sub, 0);
    window.state.ventas.push({ id: Date.now(), cliente: c, total: total, pagado: false, abonado: 0, items: [...carritoVenta] });
    carritoVenta = [];
    await window.save();
    setView('dashboard');
};

window.addC = async (type) => {
    const n = document.getElementById("nP").value.toUpperCase();
    if(n) {
        if(type === 'p') window.state.inventario[n] = { stock: 0, costo: 0 };
        await window.save();
        render();
    }
};

render();
</script>
</body>
</html>
