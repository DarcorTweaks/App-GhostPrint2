<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>GhostPrint PRO - WhatsApp Billing</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
    .btn{background:#6d28d9;color:white;padding:10px 16px;border-radius:10px;cursor:pointer;font-weight:600;border:none}
    .btn:hover{background:#5b21b6;transform:translateY(-1px)}
    .card{background:white;padding:20px;margin:12px 0;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,0.05);border:1px solid #f1f1f1}
    input,select{border:1px solid #e2e8f0;padding:12px;margin:8px 0;border-radius:12px;width:100%}
    label{font-size:11px;color:#94a3b8;font-weight:800;text-transform:uppercase;display:block;margin-bottom:-4px;margin-left:4px}
</style>
</head>
<body class="bg-slate-50 font-sans text-slate-800">

<div class="bg-gradient-to-r from-purple-800 to-indigo-700 text-white p-5 shadow-lg flex justify-between items-center sticky top-0 z-50">
    <div>
        <h1 class="text-2xl font-black italic tracking-tighter uppercase">GhostPrint PRO</h1>
        <p class="text-[10px] opacity-70 font-bold tracking-widest text-right">Notificaciones Activas 2026</p>
    </div>
    <span id="sync-status" class="bg-white/20 px-3 py-1 rounded-full text-[10px] font-bold tracking-tighter">Sincronizado</span>
</div>

<div class="p-3 flex gap-2 flex-wrap bg-white/90 backdrop-blur shadow-sm sticky top-[72px] z-40 overflow-x-auto">
    <button onclick="setView('dashboard')" class="btn text-xs text-nowrap">Dashboard</button>
    <button onclick="setView('ventas')" class="btn text-xs bg-indigo-600 text-nowrap">Nueva Venta</button>
    <button onclick="setView('cobranzas')" class="btn text-xs text-nowrap border-2 border-green-400">Cobranzas / WhatsApp</button>
    <button onclick="setView('reporte')" class="btn text-xs bg-purple-100 text-purple-700 text-nowrap">Reportes</button>
</div>

<div id="app" class="p-4 max-w-5xl mx-auto pb-10"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI",
    authDomain: "ghost-print-contabilidad.firebaseapp.com",
    projectId: "ghost-print-contabilidad",
    storageBucket: "ghost-print-contabilidad.firebasestorage.app",
    messagingSenderId: "867057362556",
    appId: "1:867057362556:web:6bd2a461817219a4000bf9"
};

const appF = initializeApp(firebaseConfig);
const db = getFirestore(appF);
const docRef = doc(db, "sistema", "datos_principales");

window.state = { ventas: [], gastos: [], serviciosExtra: [], inventario: {}, historialCompras: [] };
window.view = "dashboard";

onSnapshot(docRef, (snap) => {
    if (snap.exists()) {
        const d = snap.data();
        window.state = {
            ventas: d.ventas || [],
            gastos: d.gastos || [],
            serviciosExtra: d.serviciosExtra || [],
            inventario: d.inventario || {},
            historialCompras: d.historialCompras || []
        };
    }
    render();
});

window.save = async () => { await setDoc(docRef, window.state); };
window.setView = (v) => { window.view = v; render(); };

window.render = function() {
    let app = document.getElementById("app");
    let html = "";

    if(window.view === "dashboard"){
        let vT = window.state.ventas.reduce((a,b) => a + b.total, 0);
        let gT = window.state.gastos.reduce((a,b) => a + (b.amount || 0), 0);
        html = `<div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="card bg-green-50 text-green-700">Facturación Total<br><b class="text-2xl font-black italic">$${vT.toFixed(2)}</b></div>
            <div class="card bg-red-50 text-red-600">Gastos Totales<br><b class="text-2xl font-black italic">$${gT.toFixed(2)}</b></div>
            <div class="card bg-purple-700 text-white text-center italic">Utilidad Real<br><b class="text-2xl font-black italic">$${(vT-gT).toFixed(2)}</b></div>
        </div>`;
    }

    if(window.view === "ventas"){
        let hoy = new Date().toISOString().split('T')[0];
        html = `<h2>💰 Registrar Venta</h2><div class="card">
            <label>Fecha</label><input id="fv" type="date" value="${hoy}">
            <label>Cliente</label><input id="cli" placeholder="Nombre">
            <label>Teléfono (Opcional - Ej: 58412...)</label><input id="tel" type="number" placeholder="Para notificaciones">
            <div class="grid grid-cols-2 gap-2">
                <div><label>Tarifa</label><select id="tipoCliente"><option value="mayorista_lineal">Lineal ($10)</option><option value="detal_m2">M2 ($9)</option></select></div>
                <div><label>Item</label><select id="producto">${Object.keys(window.state.inventario).map(p=>`<option value="${p}">${p}</option>`).join("")}</select></div>
            </div>
            <label>Cantidad</label><input id="cantidad" type="number" value="1">
            <button onclick="regVenta()" class="btn w-full py-4 bg-indigo-600 mt-4">GUARDAR VENTA</button>
        </div>`;
    }

    if(window.view === "cobranzas"){
        html = `<h2 class="font-bold mb-4 italic text-purple-800">🧾 Control de Cobranzas y WhatsApp</h2>`;
        window.state.ventas.filter(v => !v.pagado).slice().reverse().forEach(v => {
            let resta = (v.total - v.abonado).toFixed(2);
            html += `<div class="card border-l-8 border-amber-500 bg-amber-50/30">
                <div class="flex justify-between items-start">
                    <div>
                        <span class="text-[9px] bg-white px-2 py-0.5 rounded font-bold text-gray-500">${v.fecha}</span>
                        <h3 class="font-black text-indigo-900 uppercase text-lg">${v.cliente}</h3>
                        <p class="text-xs text-gray-400 italic">${v.producto} - Falta cobrar: <b class="text-red-500">$${resta}</b></p>
                    </div>
                    <button onclick="enviarWhatsApp(${v.id})" class="bg-green-500 text-white px-4 py-2 rounded-xl flex items-center gap-2 hover:bg-green-600 shadow-md">
                        <span class="text-xs font-black">COBRAR</span>
                    </button>
                </div>
                <div class="grid grid-cols-3 gap-2 mt-4">
                    <button onclick="abonar(${v.id})" class="bg-blue-500 text-white text-[10px] p-2 rounded-lg font-bold">ABONAR</button>
                    <button onclick="liquidar(${v.id})" class="bg-green-700 text-white text-[10px] p-2 rounded-lg font-bold">LIQUIDAR</button>
                    <button onclick="eliminarVenta(${v.id})" class="bg-red-400 text-white text-[10px] p-2 rounded-lg font-bold">BORRAR</button>
                </div>
            </div>`;
        });
    }

    app.innerHTML = html;
};

// --- FUNCIÓN DE WHATSAPP ---
window.enviarWhatsApp = (id) => {
    let v = window.state.ventas.find(x => x.id === id);
    let resta = (v.total - v.abonado).toFixed(2);
    let tel = v.telefono || "";
    
    // Si no tiene teléfono, lo pedimos en el momento
    if(!tel) {
        tel = prompt("Introduce el número de WhatsApp del cliente (Ej: 584121234567):");
        if(!tel) return;
    }

    let msj = `Hola *${v.cliente}*, te saluda *GhostPrint* 👻. Te escribimos para recordarte tu saldo pendiente de *$${resta}* por el trabajo de *${v.producto}*. ¡Feliz día!`;
    let url = `https://api.whatsapp.com/send?phone=${tel}&text=${encodeURIComponent(msj)}`;
    window.open(url, '_blank');
};

// --- BASE ---
window.regVenta = async () => {
    const cli = document.getElementById("cli").value;
    const prod = document.getElementById("producto").value;
    const cant = parseFloat(document.getElementById("cantidad").value) || 0;
    const tel = document.getElementById("tel").value;
    const fecha = document.getElementById("fv").value;
    const tipo = document.getElementById("tipoCliente").value;
    
    let pre = (tipo === "mayorista_lineal") ? 10 : 9;
    let tot = cant * pre;

    if(!cli || tot <= 0) return alert("Datos incompletos");
    
    window.state.ventas.push({
        id: Date.now(), 
        fecha: fecha, 
        cliente: cli.toUpperCase(), 
        telefono: tel,
        producto: prod, 
        total: tot, 
        pagado: false, 
        abonado: 0
    });
    
    await window.save(); alert("Venta registrada con éxito"); setView('cobranzas');
};

window.liquidar = async (id) => {
    let v = window.state.ventas.find(x => x.id === id);
    v.abonado = v.total; v.pagado = true; await window.save(); render();
};

window.abonar = async (id) => {
    let v = window.state.ventas.find(x => x.id === id);
    let m = parseFloat(prompt(`Abono (Debe $${(v.total-v.abonado).toFixed(2)}):`));
    if(m){ v.abonado += m; if(v.abonado >= v.total) v.pagado = true; await window.save(); render(); }
};

window.eliminarVenta = async (id) => { if(confirm("¿Eliminar?")) { window.state.ventas = window.state.ventas.filter(v=>v.id!==id); await window.save(); render(); }};

window.render();
</script>
</body>
</html>
