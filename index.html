<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GhostPrint MASTER v27.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { background-color: #030308; color: #f8fafc; font-family: 'Inter', sans-serif; padding-bottom: 100px; }
        .card-pro { background: #111122; border: 1px solid #2d2d44; border-radius: 20px; padding: 18px; margin-bottom: 12px; }
        nav { background: rgba(10, 10, 20, 0.95); display: flex; gap: 8px; overflow-x: auto; padding: 14px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #334155; }
        .btn-nav { background: #1e1e30; color: #64748b; padding: 12px 18px; border-radius: 14px; font-size: 10px; font-weight: 800; white-space: nowrap; cursor: pointer; text-transform: uppercase; }
        .active { background: #7c3aed !important; color: white !important; }
        input, select { background: #070712; border: 1px solid #334155; color: white; padding: 14px; border-radius: 14px; width: 100%; margin: 6px 0; font-weight: 700; outline: none; }
        .btn-main { background: linear-gradient(135deg, #7c3aed 0%, #4c1d95 100%); color: white; padding: 16px; border-radius: 16px; width: 100%; font-weight: 900; text-transform: uppercase; cursor: pointer; border: none; }
        .alert-low { border: 2px solid #ef4444 !important; background: rgba(239, 68, 68, 0.1) !important; }
        .ghost-glow { filter: drop-shadow(0 0 10px #7c3aed); }
        .icon-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 10px; transition: all 0.2s; position: relative; }
        
        /* Tooltip / Leyenda */
        .icon-btn:hover::after {
            content: attr(title);
            position: absolute;
            bottom: 42px;
            left: 50%;
            transform: translateX(-50%);
            background: #7c3aed;
            color: white;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 8px;
            white-space: nowrap;
            z-index: 50;
            font-weight: 900;
        }
        .badge-debt { background: rgba(239, 68, 68, 0.1); color: #ef4444; padding: 2px 8px; border-radius: 6px; font-size: 9px; font-weight: 900; }
        .badge-paid { background: rgba(34, 197, 94, 0.1); color: #22c55e; padding: 2px 8px; border-radius: 6px; font-size: 9px; font-weight: 900; }
    </style>
</head>
<body>

<div class="p-4 flex justify-between items-center bg-[#0a0a14] border-b border-white/5">
    <div class="flex items-center gap-3">
        <span class="text-4xl ghost-glow">👻</span>
        <div><h1 class="text-xl font-black italic text-purple-500 leading-none">GHOST PRINT</h1><p class="text-[8px] font-black opacity-40 uppercase tracking-widest">Master Suite v27.2</p></div>
    </div>
</div>

<nav>
    <div onclick="setView('inicio')" class="btn-nav active" id="n-inicio">📊 ADMIN</div>
    <div onclick="setView('ventas')" class="btn-nav" id="n-ventas">💵 Ventas</div>
    <div onclick="setView('cobrar')" class="btn-nav" id="n-cobrar">📑 CxC</div>
    <div onclick="setView('compras')" class="btn-nav" id="n-compras">🛒 Compras</div>
    <div onclick="setView('gastos')" class="btn-nav" id="n-gastos">💸 Gastos</div>
    <div onclick="setView('inventario')" class="btn-nav" id="n-inventario">📦 Stock</div>
    <div onclick="setView('catalogo')" class="btn-nav" id="n-catalogo">⚙️ Config</div>
</nav>

<div id="app" class="p-4 max-w-2xl mx-auto"></div>

<div id="receiptModal" class="fixed inset-0 bg-black/90 z-[200] hidden flex items-center justify-center p-4">
    <div class="bg-white text-black p-6 rounded-2xl w-full max-w-sm shadow-2xl relative overflow-hidden">
        <div class="text-center mb-4">
             <span class="text-4xl">👻</span>
             <h2 class="text-xl font-black italic leading-none">GHOST PRINT</h2>
             <p class="text-[8px] font-bold uppercase tracking-tighter">Soluciones Gráficas Profesionales</p>
        </div>
        <div id="receiptContent" class="text-[11px] font-mono border-t border-dashed border-black pt-4"></div>
        <div class="mt-6 flex gap-2 no-print">
            <button onclick="closeReceipt()" class="flex-1 bg-gray-200 p-3 rounded-xl font-bold">Cerrar</button>
            <button onclick="shareReceipt()" class="flex-1 bg-purple-600 text-white p-3 rounded-xl font-bold">Compartir</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI", authDomain: "ghost-print-contabilidad.firebaseapp.com", projectId: "ghost-print-contabilidad", storageBucket: "ghost-print-contabilidad.firebasestorage.app", messagingSenderId: "867057362556", appId: "1:867057362556:web:6bd2a461817219a4000bf9" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const docRef = db.collection("sistema").doc("datos_principales");

    const SERVICIOS_POR_DEFECTO = ["DISEÑO", "IMPRESIÓN", "DISEÑO E IMPRESIÓN", "INSTALACIÓN", "POP", "DESINSTALACIÓN", "ROTULACIÓN", "LAMINADO", "LAMINADO E IMPRESIÓN", "IMPRESIÓN Y CORTE", "VINIL DE ROTULACIÓN"];

    window.state = { ventas: [], inventario: {}, compras: [], gastos: [], servicios: SERVICIOS_POR_DEFECTO };

    window.sync = async function() { 
        await docRef.set(window.state); 
        render(); 
    };
    
    docRef.onSnapshot(doc => { 
        if(doc.exists) { 
            window.state = doc.data(); 
            render(); 
        } 
    });

    window.setView = function(v) { 
        window.currentView = v; 
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active')); 
        document.getElementById('n-'+v)?.classList.add('active'); 
        render(); 
    };

    window.render = function() {
        const app = document.getElementById("app");
        const inv = window.state.inventario || {};
        const serv = window.state.servicios || SERVICIOS_POR_DEFECTO;
        const today = new Date().toISOString().split('T')[0];

        // --- INICIO / ADMIN ---
        if(window.currentView === "inicio") {
            const vM = window.state.ventas || [];
            const gM = window.state.gastos || [];
            const cM = window.state.compras || [];
            const totalVentas = vM.reduce((a, b) => a + (Number(b.total) || 0), 0);
            const totalGastos = gM.reduce((a, b) => a + (Number(b.monto) || 0), 0);
            const totalCompras = cM.reduce((a, b) => a + (Number(b.c * b.co) || 0), 0);

            app.innerHTML = `
                <div class="card-pro text-center bg-gradient-to-br from-purple-900/40 to-[#111122]">
                    <p class="text-[10px] opacity-40 uppercase font-black tracking-widest text-purple-300">Ventas Totales</p>
                    <h2 class="text-5xl font-black italic text-purple-500">$${totalVentas.toFixed(2)}</h2>
                </div>
                <div class="grid grid-cols-2 gap-4 mt-4">
                    <div class="card-pro text-center bg-red-900/10"><p class="text-[9px] opacity-40 uppercase font-black">Gastos</p><h2 class="text-2xl font-black text-red-500">$${totalGastos.toFixed(2)}</h2></div>
                    <div class="card-pro text-center bg-blue-900/10"><p class="text-[9px] opacity-40 uppercase font-black">Compras</p><h2 class="text-2xl font-black text-blue-500">$${totalCompras.toFixed(2)}</h2></div>
                </div>
                <div class="card-pro text-center border-green-500/20 bg-green-500/5 mt-4">
                    <p class="text-[10px] opacity-40 uppercase font-black">Utilidad Estimada</p>
                    <h2 class="text-4xl font-black italic text-green-500">$${(totalVentas - totalGastos - totalCompras).toFixed(2)}</h2>
                </div>
            `;
        }

        // --- VENTAS ---
        else if(window.currentView === "ventas") {
            const filtradas = (window.state.ventas || []).filter(v => v.fecha === today);
            app.innerHTML = `
                <div class="card-pro">
                    <h2 class="text-lg font-black italic text-purple-500 mb-4 uppercase">Facturación</h2>
                    <input id="vDate" type="date" value="${today}">
                    <div class="grid grid-cols-2 gap-2"><input id="cli" placeholder="CLIENTE"><input id="wha" type="tel" placeholder="WHATSAPP"></div>
                    <div class="bg-white/5 p-4 rounded-xl mt-4 border border-white/10">
                        <select id="vMat" onchange="updateVentaUI()">
                            <option value="">-- SELECCIONAR --</option>
                            <optgroup label="MATERIALES">${Object.keys(inv).map(m=>`<option value="${m}">${m}</option>`).join("")}</optgroup>
                            <optgroup label="SERVICIOS">${serv.map(s=>`<option value="${s}">${s}</option>`).join("")}</optgroup>
                        </select>
                        <div class="flex gap-2">
                            <select id="vTipo" onchange="updateVentaUI()" class="w-1/3"><option value="M2">M2</option><option value="ML">ML</option><option value="UNID">UNID</option></select>
                            <input id="vCant" type="number" placeholder="CANT" oninput="updateVentaUI()" class="w-2/3">
                        </div>
                        <input id="vPrec" type="number" placeholder="PRECIO $">
                        <button onclick="addItem()" class="btn-main !p-3 mt-3 text-[10px]">+ AÑADIR A LISTA</button>
                    </div>
                    <div id="vLista" class="mt-4 space-y-1"></div>
                    <div id="vTotal" class="text-5xl font-black text-center my-6">$0.00</div>
                    <input id="vAbono" type="number" placeholder="ABONO INICIAL $" class="mb-4">
                    <button onclick="saveVenta()" class="btn-main">GUARDAR VENTA</button>
                </div>
            `;
            cart = [];
        }

        // --- GASTOS (HISTORIAL Y TOTAL INTEGRADO) ---
        else if(window.currentView === "gastos") {
            const listG = window.state.gastos || [];
            const totalG = listG.reduce((a, b) => a + (Number(b.monto) || 0), 0);
            app.innerHTML = `
                <div class="card-pro text-center bg-red-900/20 border-red-500/30">
                    <p class="text-[10px] opacity-40 uppercase font-black tracking-widest">Total Gastado</p>
                    <h2 class="text-4xl font-black italic text-red-500">$${totalG.toFixed(2)}</h2>
                </div>
                <div class="card-pro mt-4">
                    <h2 class="text-xs font-black text-red-400 mb-4 uppercase">Nuevo Gasto</h2>
                    <input id="gDate" type="date" value="${today}">
                    <input id="gDesc" placeholder="DESCRIPCIÓN">
                    <input id="gMonto" type="number" placeholder="MONTO $">
                    <button onclick="saveGasto()" class="btn-main !from-red-600 !to-red-900 mt-2">GUARDAR GASTO</button>
                </div>
                <div class="mt-6">
                    <h3 class="text-[10px] font-black opacity-30 uppercase mb-4 tracking-widest">Historial de Salidas</h3>
                    <div class="space-y-2 max-h-[350px] overflow-y-auto pr-1">
                        ${listG.slice().reverse().map(g => `
                            <div class="card-pro flex justify-between items-center py-3 bg-white/5 border-white/5">
                                <div><b class="text-[10px] uppercase ${g.monto==0?'text-orange-400':'text-white'}">${g.desc}</b><p class="text-[8px] opacity-30">${g.fecha}</p></div>
                                <div class="text-right"><span class="text-lg font-black ${g.monto==0?'text-gray-500':'text-red-500'}">${g.monto==0?'MERMA':'$'+g.monto}</span></div>
                            </div>`).join("")}
                    </div>
                </div>
            `;
        }

        // --- STOCK (CON MERMA BLOQUEADA) ---
        else if(window.currentView === "inventario") {
            app.innerHTML = `
                <h2 class="text-[10px] font-black opacity-30 uppercase mb-4 tracking-widest italic">Existencias en Stock</h2>
                <div class="space-y-2">
                    ${Object.entries(inv).map(([n, i]) => `
                        <div class="card-pro flex justify-between items-center ${i.stock < 5 ? 'alert-low' : ''}">
                            <div><b class="uppercase text-purple-400 text-[10px] tracking-widest">${n}</b><br><span class="text-3xl font-black italic">${i.stock} <small class="text-xs opacity-40 font-normal">ML</small></span></div>
                            <div class="flex gap-2">
                                <button onclick="regMerma('${n}')" class="icon-btn bg-red-600/20 text-red-500" title="Cargar Merma (Dañado)">🗑️</button>
                                <button onclick="editStock('${n}')" class="icon-btn bg-blue-600/20 text-blue-400" title="Ajuste Manual de Stock">✏️</button>
                                <button onclick="delMat('${n}')" class="icon-btn bg-white/5 text-gray-500">❌</button>
                            </div>
                        </div>`).join("")}
                </div>`;
        }

        // --- OTROS MÓDULOS (CXC, COMPRAS, CONFIG) ---
        else if(window.currentView === "cobrar") renderCxC(app);
        else if(window.currentView === "compras") renderCompras(app, inv, today);
        else if(window.currentView === "catalogo") renderConfig(app, inv, serv);
    };

    // --- ACCIONES BLOQUEADAS Y FUNCIONALES ---
    window.regMerma = async (m) => {
        let cant = parseFloat(prompt(`🛑 CARGAR MERMA: ${m}\n¿Cuántos metros se dañaron?`));
        if(!isNaN(cant) && cant > 0) {
            window.state.inventario[m].stock = parseFloat((window.state.inventario[m].stock - cant).toFixed(2));
            window.state.gastos.push({ desc: `[MERMA] ${m}: -${cant}ML`, monto: 0, fecha: new Date().toISOString().split('T')[0] });
            await window.sync();
        }
    };

    window.saveGasto = async () => {
        const d = document.getElementById("gDesc").value.toUpperCase(), m = parseFloat(document.getElementById("gMonto").value), f = document.getElementById("gDate").value;
        if(d && !isNaN(m)) { window.state.gastos.push({ desc: d, monto: m, fecha: f }); await window.sync(); }
    };

    // --- RESTO DE FUNCIONES (Siguen igual que v26.5) ---
    window.updateVentaUI = () => {
        const m = document.getElementById("vMat").value, t = document.getElementById("vTipo").value, c = parseFloat(document.getElementById("vCant").value) || 0;
        const info = window.state.inventario[m];
        if(info) {
            let p = (t === "ML") ? c * info.precioML : (t === "M2") ? c * info.precioM2 : 0;
            if(p > 0) document.getElementById("vPrec").value = p.toFixed(2);
        }
    };

    let cart = [];
    window.addItem = () => {
        const m = document.getElementById("vMat").value, p = parseFloat(document.getElementById("vPrec").value) || 0, c = parseFloat(document.getElementById("vCant").value) || 0;
        if(m && p) {
            cart.push({ m, p, c });
            document.getElementById("vTotal").innerText = "$" + cart.reduce((a,b)=>a+b.p,0).toFixed(2);
            document.getElementById("vLista").innerHTML += `<div class="flex justify-between bg-white/5 p-3 rounded-lg text-[10px] font-black uppercase border-l-2 border-purple-500"><span>${m}</span><b class="text-purple-400">$${p}</b></div>`;
        }
    };

    window.saveVenta = async () => {
        if(!cart.length) return;
        cart.forEach(i => { if(window.state.inventario[i.m]) window.state.inventario[i.m].stock -= i.c; });
        window.state.ventas.push({ id: Date.now(), cliente: document.getElementById("cli").value.toUpperCase(), whatsapp: document.getElementById("wha").value, items: cart, total: cart.reduce((a,b)=>a+b.p,0), abono: parseFloat(document.getElementById("vAbono").value) || 0, fecha: document.getElementById("vDate").value });
        await window.sync(); setView('inicio');
    };

    function renderCxC(app) {
        const deudores = (window.state.ventas || []).filter(v => v.total > v.abono);
        app.innerHTML = `<h2 class="text-lg font-black italic text-red-500 mb-4 uppercase">Cuentas por Cobrar</h2><div class="space-y-3">${deudores.map(v=>`<div class="card-pro border-l-4 border-red-500 flex justify-between items-center"><div><b class="text-xs uppercase">${v.cliente}</b><p class="text-lg font-black text-red-500">$${(v.total-v.abono).toFixed(2)}</p></div><button onclick="abonar(${v.id})" class="bg-green-600/20 text-green-500 p-2 rounded-xl text-[10px] font-black">ABONAR</button></div>`).join("")}</div>`;
    }

    function renderCompras(app, inv, today) {
        app.innerHTML = `<div class="card-pro"><h2 class="text-lg font-black text-blue-400 mb-4 uppercase">Carga de Rollos</h2><input id="cDate" type="date" value="${today}"><select id="cMat">${Object.keys(inv).map(m=>`<option value="${m}">${m}</option>`).join("")}</select><input id="cCant" type="number" placeholder="Metros"><input id="cCosto" type="number" placeholder="Costo ML $"><button onclick="saveCompra()" class="btn-main !bg-blue-600 mt-4">INGRESAR</button></div>`;
    }

    window.saveCompra = async () => {
        const m = document.getElementById("cMat").value, c = parseFloat(document.getElementById("cCant").value);
        if(m && c) { window.state.inventario[m].stock += c; window.state.compras.push({ m, c, co: parseFloat(document.getElementById("cCosto").value) || 0, f: document.getElementById("cDate").value }); await window.sync(); }
    };

    function renderConfig(app, inv, serv) {
        app.innerHTML = `<div class="card-pro"><h3 class="text-[10px] font-black opacity-50 mb-4 uppercase text-purple-400">Nuevo Material</h3><input id="nMat" placeholder="NOMBRE"><input id="aMat" type="number" step="0.01" placeholder="ANCHO"><button onclick="crearMat()" class="btn-main mt-2">AÑADIR</button></div>`;
    }

    window.crearMat = async () => {
        const n = document.getElementById("nMat").value.toUpperCase(), a = parseFloat(document.getElementById("aMat").value);
        if(n && a) { window.state.inventario[n] = { stock: 0, precioM2: 0, precioML: 0, ancho: a }; await window.sync(); }
    };
    
    window.editStock = async (m) => {
        let n = parseFloat(prompt(`Ajustar Stock: ${m}`, window.state.inventario[m].stock));
        if(!isNaN(n)) { window.state.inventario[m].stock = n; await window.sync(); }
    };

    window.delMat = async (m) => { if(confirm(`¿Borrar ${m}?`)) { delete window.state.inventario[m]; await window.sync(); } };

    window.currentView = "inicio";
    render();
</script>
</body>
</html>
