<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>GhostPrint PRO</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-100 font-sans">

<div class="bg-gradient-to-r from-purple-700 to-purple-500 text-white p-4 shadow flex justify-between items-center">
    <div>
        <h1 class="text-xl font-bold">👻 GhostPrint PRO</h1>
        <p class="text-xs opacity-80">Gestión de Inventario y Finanzas</p>
    </div>
    <span id="sync-status" class="bg-purple-800 px-3 py-1 rounded-full text-xs">Conectando...</span>
</div>

<div class="p-4 flex gap-2 flex-wrap bg-white shadow-sm sticky top-0 z-10">
    <button onclick="setView('dashboard')" class="btn">Dashboard</button>
    <button onclick="setView('ventas')" class="btn">Ventas</button>
    <button onclick="setView('cobranzas')" class="btn">Cobranzas</button>
    <button onclick="setView('compras')" class="btn">Catálogo/Servicios</button>
    <button onclick="setView('gastos')" class="btn">Gastos</button>
    <button onclick="setView('inventario')" class="btn">Inventario</button>
    <button onclick="setView('reporte')" class="btn">Reporte</button>
</div>

<div id="app" class="p-6 max-w-4xl mx-auto"></div>

<style>
    .btn{background:#6d28d9;color:white;padding:8px 14px;border-radius:8px;cursor:pointer;transition:all 0.2s}
    .btn:hover{background:#5b21b6;transform:translateY(-1px)}
    .card{background:white;padding:20px;margin:10px 0;border-radius:15px;box-shadow:0 4px 15px rgba(0,0,0,0.05);border:1px solid #eee}
    input,select{border:1px solid #ddd;padding:12px;margin:8px 0;border-radius:10px;width:100%;font-size:14px}
    label{font-size:12px;color:#666;font-weight:bold;text-transform:uppercase;margin-left:4px}
    .hidden{display:none}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI",
    authDomain: "ghost-print-contabilidad.firebaseapp.com",
    projectId: "ghost-print-contabilidad",
    storageBucket: "ghost-print-contabilidad.firebasestorage.app",
    messagingSenderId: "867057362556",
    appId: "1:867057362556:web:6bd2a461817219a4000bf9"
};

const appF = initializeApp(firebaseConfig);
const db = getFirestore(appF);
const docRef = doc(db, "sistema", "datos_principales");

window.state = {
    ventas:[], gastos:[], serviciosExtra: [],
    inventario:{
        "VINIL GLOSSY": {stock: 68, costo: 3.00},
        "BANNER": {stock: 175, costo: 3.60},
        "KIT DE TINTA": {stock: 400, costo: 0.45},
        "VINIL CLEAR GLOSSY BRILLANTE": {stock: 50, costo: 3.00},
        "VINIL CLEAR GLOSSY MATE": {stock: 50, costo: 3.00}
    }
};

onSnapshot(docRef, (snap) => {
    if (snap.exists()) {
        const data = snap.data();
        window.state.ventas = data.ventas || [];
        window.state.gastos = data.gastos || [];
        window.state.serviciosExtra = data.serviciosExtra || [];
        window.state.inventario = data.inventario || window.state.inventario;
        document.getElementById("sync-status").innerText = "Sincronizado ✓";
    } else { window.save(); }
    render();
});

window.save = async () => { await setDoc(docRef, window.state); };
window.view = "dashboard";
window.setView = (v) => { window.view = v; render(); };

window.calcularTotal = () => {
    let producto = document.getElementById("producto")?.value;
    let tipoCliente = document.getElementById("tipoCliente")?.value;
    let cantidad = parseFloat(document.getElementById("cantidad")?.value) || 0;
    let precio = 0;

    if (tipoCliente === "libre") {
        document.getElementById("divPrecioLibre").classList.remove("hidden");
        precio = parseFloat(document.getElementById("precioLibreInput").value) || 0;
    } else {
        document.getElementById("divPrecioLibre").classList.add("hidden");
        if (producto && (producto.includes("VINIL") || producto.includes("BANNER"))) {
            precio = (tipoCliente === "mayorista_lineal") ? 10 : 9;
        } else {
            let costo = window.state.inventario[producto]?.costo || 0;
            precio = costo > 0 ? costo * 2.5 : 10;
        }
    }
    document.getElementById("total").innerText = (cantidad * precio).toFixed(2);
};

window.render = function() {
    let app = document.getElementById("app");
    if(!app) return;
    let html = "";

    if(window.view === "dashboard"){
        let vT = window.state.ventas.reduce((a,b) => a + b.total, 0);
        let gT = window.state.gastos.reduce((a,b) => a + (b.amount || 0), 0);
        html = `<h2>📊 Dashboard</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="card border-b-4 border-green-500">Ventas Totales: <br><b class="text-2xl">$${vT.toFixed(2)}</b></div>
            <div class="card border-b-4 border-red-500">Gastos: <br><b class="text-2xl text-red-500">$${gT.toFixed(2)}</b></div>
            <div class="card border-b-4 border-purple-500">Ganancia: <br><b class="text-2xl text-purple-700">$${(vT-gT).toFixed(2)}</b></div>
        </div>
        <div class="card"><canvas id="grafica"></canvas></div>`;
        app.innerHTML = html;
        new Chart(document.getElementById("grafica"), {type:'bar', data:{labels:['Ventas','Gastos'], datasets:[{label:'$', data:[vT, gT], backgroundColor:['#6d28d9','#ef4444']}]}});
        return;
    }

    if(window.view === "ventas"){
        let tItem = document.getElementById("tipoItem")?.value || "material";
        html = `<h2>💰 Nueva Venta</h2><div class="card">
            <label>Cliente</label><input id="cliente" placeholder="Nombre del cliente">
            <label>¿Qué vendes?</label>
            <select id="tipoItem" onchange="render()"><option value="material" ${tItem=='material'?'selected':''}>Material de Inventario</option><option value="servicio" ${tItem=='servicio'?'selected':''}>Servicio Técnico/Diseño</option></select>
            <label>Tarifa</label>
            <select id="tipoCliente" onchange="window.calcularTotal()"><option value="mayorista_lineal">Precio Lineal ($10)</option><option value="detal_m2">Precio Detal M2 ($9)</option><option value="libre">PRECIO LIBRE (MANUAL)</option></select>
            
            <div id="divPrecioLibre" class="hidden">
                <label>Descripción del trabajo manual</label><input id="descLibre" placeholder="Ej: Rotulación de local">
                <label>Precio Unitario</label><input id="precioLibreInput" type="number" oninput="window.calcularTotal()" placeholder="0.00">
            </div>

            <label>Producto/Servicio</label>
            <select id="producto" onchange="window.calcularTotal()">${(tItem=="servicio" ? ["DISEÑO","IMPRESIÓN","INSTALACION", ...window.state.serviciosExtra] : Object.keys(window.state.inventario)).map(p=>`<option value="${p}">${p}</option>`).join("")}</select>
            <label>Cantidad (Mts o Unidades)</label><input id="cantidad" type="number" value="1" oninput="window.calcularTotal()">
            <div class="text-center py-6 bg-purple-50 rounded-xl my-4"><p class="text-xs text-purple-400 uppercase font-bold">Total a Cobrar</p><b class="text-4xl text-purple-700">$<span id="total">0.00</span></b></div>
            <button onclick="registrarVentaCompleta()" class="btn w-full py-4 text-lg font-bold">Confirmar Venta</button>
        </div>`;
    }

    if(window.view === "compras") {
        html = `<h2>📦 Catálogo y Servicios</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="card border-l-4 border-green-500">
                <h3 class="font-bold mb-4">➕ Agregar Nuevo Servicio</h3>
                <label>Nombre del Servicio</label>
                <input id="nuevoServName" placeholder="Ej: LAMINADO UV">
                <button onclick="let n=document.getElementById('nuevoServName').value.toUpperCase(); if(n){window.state.serviciosExtra.push(n); window.save(); render(); alert('Servicio Añadido');}" class="btn w-full mt-2 bg-green-600">Añadir al Menú</button>
            </div>
            <div class="card border-l-4 border-blue-500">
                <h3 class="font-bold mb-4">➕ Nuevo Material</h3>
                <input id="nuevoMat" placeholder="Nombre del material">
                <div class="flex gap-2">
                    <input id="nuevoStock" type="number" placeholder="Stock">
                    <input id="nuevoCosto" type="number" placeholder="Costo">
                </div>
                <button onclick="let n=document.getElementById('nuevoMat').value.toUpperCase(); if(n){window.state.inventario[n]={stock:parseFloat(document.getElementById('nuevoStock').value)||0, costo:parseFloat(document.getElementById('nuevoCosto').value)||0}; window.save(); render();}" class="btn w-full mt-2 bg-blue-600">Registrar Material</button>
            </div>
        </div>
        <div class="card">
            <h3 class="font-bold mb-2 text-purple-700">Actualizar Stock Existente</h3>
            <select id="cp">${Object.keys(window.state.inventario).map(p=>`<option>${p}</option>`).join("")}</select>
            <input id="cq" type="number" placeholder="Cantidad a sumar">
            <button onclick="let p=document.getElementById('cp').value; window.state.inventario[p].stock+=parseFloat(document.getElementById('cq').value)||0; window.save(); alert('Stock actualizado');" class="btn w-full mt-2">Sumar al Inventario</button>
        </div>`;
    }

    if(window.view === "cobranzas"){
        html = `<h2>🧾 Cuentas por Cobrar</h2>`;
        let deudas = window.state.ventas.filter(v=>!v.pagado);
        if(deudas.length === 0) html += `<div class="card text-center text-gray-400">Todo está cobrado.</div>`;
        else html += deudas.map(v=>`<div class="card flex justify-between items-center"><div><b class="text-purple-700">${v.cliente}</b><br><small>${v.producto}</small></div><div class="text-right"><b>$${(v.total-v.abonado).toFixed(2)}</b><br><button onclick="abonarVenta(${v.id})" class="text-xs text-blue-600 font-bold">ABONAR/PAGAR</button></div></div>`).join("");
    }

    if(window.view === "inventario"){
        html = `<h2>📦 Inventario Real</h2>` + Object.entries(window.state.inventario).map(([k,v])=>`<div class="card"><div class="flex justify-between font-bold text-purple-700"><span>${k}</span><button onclick="if(confirm('¿Borrar?')){delete window.state.inventario['${k}']; window.save();}" class="text-red-400 text-xs">🗑️</button></div><div class="grid grid-cols-2 gap-4 mt-2"><div><label>En Stock</label><input id="s-${k}" value="${v.stock}"></div><div><label>Costo $</label><input id="c-${k}" value="${v.costo}"></div></div><button onclick="window.state.inventario['${k}'].stock=parseFloat(document.getElementById('s-${k}').value); window.state.inventario['${k}'].costo=parseFloat(document.getElementById('c-${k}').value); window.save(); alert('Actualizado');" class="btn w-full mt-2 text-xs">Guardar Cambios</button></div>`).join("");
    }

    if(window.view === "gastos"){
        html = `<h2>💸 Registro de Gastos</h2><div class="card"><label>Concepto</label><input id="gn" placeholder="Ej: Pago de Luz, Almuerzo..."><label>Monto $</label><input id="ga" type="number" placeholder="0.00"><button onclick="registrarGasto()" class="btn w-full mt-2">Guardar Gasto</button></div><h3 class="font-bold mt-4">Últimos Gastos</h3>${window.state.gastos.slice(-10).reverse().map(g=>`<div class="card flex justify-between py-2 text-sm"><span>${g.name}</span><b class="text-red-500">-$${g.amount.toFixed(2)}</b></div>`).join("")}`;
    }

    if(window.view === "reporte"){
        let vT = window.state.ventas.reduce((a,b) => a + b.total, 0);
        let gT = window.state.gastos.reduce((a,b) => a + (b.amount || 0), 0);
        let caja = window.state.ventas.reduce((a,b) => a + (b.abonado || 0), 0) - gT;
        html = `<h2>📊 Reporte Financiero</h2>
        <div class="card text-center py-8 bg-gradient-to-br from-purple-700 to-purple-900 text-white shadow-xl">
            <div class="text-xs uppercase opacity-70 mb-2 tracking-widest font-bold">Balance Real en Caja</div>
            <div class="text-6xl font-black">$${caja.toFixed(2)}</div>
        </div>
        <div class="card"><b>Total Ventas:</b> <span class="float-right text-green-600">$${vT.toFixed(2)}</span></div>
        <div class="card"><b>Total Gastos:</b> <span class="float-right text-red-500">-$${gT.toFixed(2)}</span></div>
        <div class="card font-bold text-lg"><b>Utilidad Neta:</b> <span class="float-right text-purple-700">$${(vT-gT).toFixed(2)}</span></div>`;
    }

    app.innerHTML = html;
    if(window.view === "ventas") window.calcularTotal();
};

// FUNCIONES DE ACCIÓN
window.registrarVentaCompleta = async () => {
    let cli = document.getElementById("cliente").value;
    let tot = parseFloat(document.getElementById("total").innerText);
    let prod = document.getElementById("producto").value;
    let tipo = document.getElementById("tipoCliente").value;
    let desc = document.getElementById("descLibre")?.value;

    if(!cli || tot <= 0) return alert("Faltan datos de la venta");

    window.state.ventas.push({
        id: Date.now(),
        fecha: new Date().toLocaleDateString(),
        cliente: cli.toUpperCase(),
        producto: tipo === "libre" ? desc : prod,
        total: tot,
        pagado: false,
        abonado: 0
    });
    
    await window.save();
    alert("¡Venta Registrada con éxito!");
    window.setView('dashboard');
};

window.registrarGasto = async () => {
    let n = document.getElementById("gn").value;
    let a = parseFloat(document.getElementById("ga").value);
    if(n && a){
        window.state.gastos.push({id:Date.now(), name:n.toUpperCase(), amount:a});
        await window.save();
        render();
    }
};

window.abonarVenta = async (id) => {
    let v = window.state.ventas.find(x => x.id === id);
    let m = parseFloat(prompt(`Monto para abonar a ${v.cliente} (Deuda: $${(v.total-v.abonado).toFixed(2)}):`));
    if(m){
        v.abonado += m;
        if(v.abonado >= v.total) v.pagado = true;
        await window.save();
        render();
    }
};

window.render();
</script>
</body>
</html>
