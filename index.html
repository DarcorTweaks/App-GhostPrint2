<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GhostPrint MASTER v29.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=JetBrains+Mono:wght@500&display=swap');
        
        :root {
            --bg-dark: #05050a;
            --card-bg: #0f0f1e;
            --accent: #8b5cf6;
        }

        body { 
            background-color: var(--bg-dark); 
            color: #f1f5f9; 
            font-family: 'Inter', sans-serif; 
            padding-bottom: 80px; 
            -webkit-tap-highlight-color: transparent;
        }

        .card-pro { 
            background: var(--card-bg); 
            border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 24px; 
            padding: 20px; 
            margin-bottom: 16px; 
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
        }

        nav { 
            background: rgba(5, 5, 10, 0.8); 
            backdrop-filter: blur(12px);
            display: flex; 
            gap: 10px; 
            overflow-x: auto; 
            padding: 15px; 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            border-bottom: 1px solid rgba(139, 92, 246, 0.2); 
        }

        .btn-nav { 
            background: rgba(255,255,255,0.03); 
            color: #94a3b8; 
            padding: 10px 20px; 
            border-radius: 12px; 
            font-size: 11px; 
            font-weight: 800; 
            white-space: nowrap; 
            border: 1px solid transparent;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .active { 
            background: var(--accent) !important; 
            color: white !important; 
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.4);
        }
        
        input, select { 
            background: #000000 !important; 
            border: 1px solid #1e293b !important; 
            color: white !important; 
            padding: 14px !important; 
            border-radius: 12px !important; 
            font-weight: 600 !important;
        }

        .btn-main { 
            background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%); 
            transition: transform 0.1s active;
        }

        .alert-low { border: 2px solid #ef4444 !important; background: rgba(239, 68, 68, 0.05) !important; }
        .ghost-glow { filter: drop-shadow(0 0 8px rgba(139, 92, 246, 0.8)); }
        
        /* Custom Receipt Aesthetic */
        .receipt-paper {
            background: #ffffff;
            color: #1a1a1a;
            font-family: 'JetBrains+Mono', monospace;
            position: relative;
        }
        .receipt-paper::after {
            content: ""; position: absolute; bottom: -10px; left: 0; width: 100%; height: 10px;
            background: linear-gradient(-45deg, #ffffff 5px, transparent 0), linear-gradient(45deg, #ffffff 5px, transparent 0);
            background-size: 10px 10px;
        }
    </style>
</head>
<body>

<div class="p-6 flex justify-between items-center border-b border-white/5 bg-[#05050a]">
    <div class="flex items-center gap-4">
        <div class="w-12 h-12 bg-purple-600/20 rounded-2xl flex items-center justify-center text-3xl ghost-glow">👻</div>
        <div>
            <h1 class="text-2xl font-black italic tracking-tighter text-white leading-none">GHOST<span class="text-purple-500">PRINT</span></h1>
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                <p class="text-[9px] font-bold opacity-50 uppercase tracking-[0.3em]">System v29.0 • Online</p>
            </div>
        </div>
    </div>
</div>

<nav id="mainNav" class="no-scrollbar">
    <div onclick="setView('inicio')" class="btn-nav active" id="n-inicio">📊 DASHBOARD</div>
    <div onclick="setView('ventas')" class="btn-nav" id="n-ventas">💵 NUEVA VENTA</div>
    <div onclick="setView('cobrar')" class="btn-nav" id="n-cobrar">📑 CUENTAS</div>
    <div onclick="setView('compras')" class="btn-nav" id="n-compras">🛒 COMPRAS</div>
    <div onclick="setView('gastos')" class="btn-nav" id="n-gastos">💸 GASTOS</div>
    <div onclick="setView('inventario')" class="btn-nav" id="n-inventario">📦 STOCK</div>
    <div onclick="setView('catalogo')" class="btn-nav" id="n-catalogo">⚙️ AJUSTES</div>
</nav>

<div id="app" class="p-4 max-w-2xl mx-auto"></div>

<div id="receiptModal" class="fixed inset-0 bg-black/95 z-[200] hidden flex items-center justify-center p-4 backdrop-blur-sm">
    <div class="receipt-paper p-8 w-full max-w-sm shadow-2xl rounded-t-sm">
        <div class="text-center mb-6">
             <div class="text-4xl mb-2">👻</div>
             <h2 class="text-2xl font-black italic leading-none text-black">GHOST PRINT</h2>
             <p class="text-[10px] font-bold uppercase tracking-widest opacity-70">Graphic Studio Solutions</p>
        </div>
        <div id="receiptContent" class="text-[12px] border-t-2 border-black border-dashed pt-6"></div>
        <div class="mt-8 flex gap-3 no-print">
            <button onclick="closeReceipt()" class="flex-1 bg-gray-100 p-4 rounded-xl font-black text-xs uppercase">Cerrar</button>
            <button onclick="shareReceipt()" class="flex-1 bg-green-600 text-white p-4 rounded-xl font-black text-xs uppercase flex items-center justify-center gap-2">
                WhatsApp
            </button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    // Tu configuración de Firebase se mantiene intacta
    const firebaseConfig = { apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI", authDomain: "ghost-print-contabilidad.firebaseapp.com", projectId: "ghost-print-contabilidad", storageBucket: "ghost-print-contabilidad.firebasestorage.app", messagingSenderId: "867057362556", appId: "1:867057362556:web:6bd2a461817219a4000bf9" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const docRef = db.collection("sistema").doc("datos_principales");

    const SERVICIOS_DEFECTO = ["DISEÑO", "IMPRESIÓN", "DISEÑO E IMPRESIÓN", "INSTALACIÓN", "POP", "ROTULACIÓN", "LAMINADO", "IMPRESIÓN Y CORTE"];

    window.state = { ventas: [], inventario: {}, compras: [], gastos: [], servicios: SERVICIOS_DEFECTO };
    window.currentView = 'inicio';
    window.cart = [];

    window.sync = async function() { await docRef.set(window.state); render(); };
    docRef.onSnapshot(doc => { if(doc.exists) { window.state = doc.data(); render(); } });

    window.setView = function(v) { 
        window.currentView = v; 
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active')); 
        document.getElementById('n-'+v)?.classList.add('active'); 
        if(v === 'ventas') window.cart = []; 
        render(); 
    };

    window.render = function() {
        const app = document.getElementById("app");
        const inv = window.state.inventario || {};
        const serv = window.state.servicios || SERVICIOS_DEFECTO;
        const today = new Date().toISOString().split('T')[0];

        if(window.currentView === 'inicio') {
            const vM = window.state.ventas || [];
            const gM = window.state.gastos || [];
            const cM = window.state.compras || [];
            const now = new Date();
            const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
            
            const filterByMonth = (arr, dateKey) => arr.filter(item => new Date(item[dateKey] || item.fecha || item.f) >= startOfMonth);

            const currentVentas = filterByMonth(vM, 'fecha');
            const currentGastos = filterByMonth(gM, 'fecha');
            
            const totalVentas = currentVentas.reduce((a, b) => a + (Number(b.total) || 0), 0);
            const totalAbonos = currentVentas.reduce((a, b) => a + (Number(b.abono) || 0), 0);
            const totalGastos = currentGastos.reduce((a, b) => a + (Number(b.monto) || 0), 0);
            const totalCaja = totalAbonos - totalGastos;
            const totalDeuda = totalVentas - totalAbonos;

            app.innerHTML = `
                <div class="grid grid-cols-1 gap-4 mb-6">
                    <div class="card-pro bg-gradient-to-br from-purple-600 to-indigo-800 border-none relative overflow-hidden">
                        <div class="relative z-10">
                            <p class="text-[10px] font-black uppercase tracking-[0.2em] text-white/60 mb-1">Efectivo Disponible</p>
                            <h2 class="text-5xl font-black italic text-white">$${totalCaja.toLocaleString()}</h2>
                            <div class="mt-4 pt-4 border-t border-white/10 flex justify-between text-[10px] font-bold">
                                <span>COBROS: $${totalAbonos}</span>
                                <span class="text-white/50">GASTOS: $${totalGastos}</span>
                            </div>
                        </div>
                        <div class="absolute -right-4 -bottom-4 text-8xl opacity-10">💰</div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="card-pro border-l-4 border-green-500">
                        <p class="text-[9px] font-black opacity-40 uppercase">Ventas Mes</p>
                        <h3 class="text-2xl font-black text-white">$${totalVentas.toLocaleString()}</h3>
                    </div>
                    <div class="card-pro border-l-4 border-red-500">
                        <p class="text-[9px] font-black opacity-40 uppercase">Cuentas Pendientes</p>
                        <h3 class="text-2xl font-black text-red-500">$${totalDeuda.toLocaleString()}</h3>
                    </div>
                </div>

                <div class="card-pro">
                    <h4 class="text-[10px] font-black opacity-40 uppercase mb-4 tracking-widest">Resumen de Inventario</h4>
                    ${Object.entries(inv).slice(0, 3).map(([n, i]) => `
                        <div class="flex justify-between items-center mb-3">
                            <span class="text-xs font-bold uppercase text-slate-400">${n}</span>
                            <span class="text-xs font-black ${i.stock < 5 ? 'text-red-500' : 'text-white'}">${i.stock.toFixed(1)} ML</span>
                        </div>
                    `).join("")}
                    <button onclick="setView('inventario')" class="w-full mt-2 py-2 text-[9px] font-black uppercase text-purple-400 border border-purple-500/20 rounded-lg">Ver todo el stock</button>
                </div>
            `;
        }
        
        else if(window.currentView === 'ventas') {
            app.innerHTML = `
                <div class="card-pro">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-black italic text-purple-500 uppercase tracking-tighter">Facturación</h2>
                        <input id="vDate" type="date" value="${today}" class="!w-auto !p-2 !text-xs !m-0">
                    </div>
                    
                    <div class="space-y-3">
                        <div class="grid grid-cols-2 gap-3">
                            <input id="cli" placeholder="NOMBRE DEL CLIENTE" class="uppercase">
                            <input id="wha" type="tel" placeholder="WHATSAPP">
                        </div>
                        
                        <div class="bg-white/5 p-4 rounded-3xl border border-white/5">
                            <select id="vMat" onchange="updateVentaUI()" class="mb-2">
                                <option value="">SELECCIONAR PRODUCTO/SERVICIO</option>
                                <optgroup label="MATERIALES">${Object.keys(inv).map(m=>`<option value="${m}">${m}</option>`).join("")}</optgroup>
                                <optgroup label="SERVICIOS">${serv.map(s=>`<option value="${s}">${s}</option>`).join("")}</optgroup>
                            </select>
                            <div class="flex gap-2">
                                <select id="vTipo" onchange="updateVentaUI()" class="w-1/3"><option value="M2">M2</option><option value="ML">ML</option><option value="UNID">UNID</option></select>
                                <input id="vCant" type="number" placeholder="CANT" oninput="updateVentaUI()" class="w-2/3">
                            </div>
                            <input id="vPrec" type="number" placeholder="PRECIO TOTAL $" class="text-2xl text-purple-400 font-black">
                            <button onclick="addItem()" class="w-full bg-white/10 hover:bg-white/20 text-white py-3 rounded-xl font-black text-xs uppercase transition-all mt-2">+ AÑADIR A LA LISTA</button>
                        </div>
                    </div>

                    <div id="vLista" class="mt-6 space-y-2">
                        ${window.cart.map((item, idx) => `
                            <div class="flex justify-between items-center bg-white/5 p-4 rounded-2xl border border-white/5 animate-in slide-in-from-right-4">
                                <div>
                                    <div class="text-[12px] font-black uppercase text-purple-400">${item.m}</div>
                                    <div class="text-[10px] opacity-40 font-bold">${item.c} ${item.t}</div>
                                </div>
                                <div class="flex items-center gap-4">
                                    <b class="text-lg font-black text-white">$${item.p.toFixed(2)}</b>
                                    <button onclick="removeItem(${idx})" class="w-8 h-8 flex items-center justify-center bg-red-500/10 text-red-500 rounded-lg">✕</button>
                                </div>
                            </div>
                        `).join("")}
                    </div>

                    <div class="my-8 text-center">
                        <p class="text-[10px] font-black opacity-30 uppercase mb-1">Total a Cobrar</p>
                        <div id="vTotalDisplay" class="text-7xl font-black italic tracking-tighter text-white">$${window.cart.reduce((a,b)=>a+b.p, 0).toFixed(2)}</div>
                    </div>

                    <div class="grid grid-cols-1 gap-4">
                        <div class="relative">
                            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-green-500 font-black">$</span>
                            <input id="vAbono" type="number" placeholder="¿CUÁNTO ABONA?" class="!pl-8 !text-2xl !bg-green-500/5 !border-green-500/30 text-green-500 font-black">
                        </div>
                        <button onclick="saveVenta()" class="btn-main text-white py-5 rounded-2xl font-black text-lg uppercase shadow-2xl shadow-purple-500/20">REGISTRAR VENTA 👻</button>
                    </div>
                </div>
            `;
        }

        else if(window.currentView === 'cobrar') renderPorCobrar(app);
        else if(window.currentView === 'compras') renderCompras(app, inv, today);
        else if(window.currentView === 'gastos') renderGastos(app, today);
        else if(window.currentView === 'inventario') renderInventario(app, inv);
        else if(window.currentView === 'catalogo') renderCatalogo(app, inv, serv);
    };

    // --- REUTILIZACIÓN DE FUNCIONES LÓGICAS (SIN CAMBIOS) ---
    // Se mantienen todas tus funciones: saveCompra, editCompra, delCompra, renderPorCobrar, 
    // renderGastos, saveGasto, delGasto, renderInventario, renderCatalogo, etc.
    // Solo se actualiza el estilo visual dentro de ellas para que coincida.

    function renderPorCobrar(app) {
        const ventas = window.state.ventas || [];
        const deudoresMap = {};
        ventas.forEach(v => {
            const deuda = v.total - v.abono;
            if (deuda > 0.01) {
                if (!deudoresMap[v.cliente]) deudoresMap[v.cliente] = { nombre: v.cliente, whatsapp: v.whatsapp, totalDeuda: 0, facturas: [] };
                deudoresMap[v.cliente].totalDeuda += deuda;
                deudoresMap[v.cliente].facturas.push(v);
            }
        });
        const listaDeudores = Object.values(deudoresMap).sort((a, b) => b.totalDeuda - a.totalDeuda);
        app.innerHTML = `
            <h2 class="text-sm font-black italic text-red-500 mb-6 uppercase tracking-widest">Cuentas por Cobrar</h2>
            <div class="space-y-4">
                ${listaDeudores.length === 0 ? '<div class="card-pro text-center opacity-30 py-10 font-black uppercase text-xs">¡Todo cobrado! ✅</div>' : ''}
                ${listaDeudores.map(d => `
                    <div class="card-pro !p-0 overflow-hidden border-l-4 border-red-600">
                        <div class="p-5 bg-white/5 flex justify-between items-center">
                            <div>
                                <b class="text-base uppercase text-white font-black">${d.nombre}</b>
                                <p class="text-[10px] text-red-400 font-bold">TOTAL DEUDA: $${d.totalDeuda.toFixed(2)}</p>
                            </div>
                            <button onclick="window.open('https://wa.me/${d.whatsapp}')" class="bg-green-600/20 p-3 rounded-xl">📱</button>
                        </div>
                        <div class="p-4 space-y-3 bg-black/20">
                            ${d.facturas.map(f => `
                                <div class="bg-white/5 rounded-2xl p-4 border border-white/5">
                                    <div class="flex justify-between items-center">
                                        <div>
                                            <div class="text-[10px] font-black text-purple-500">REF: ${f.id.toString().slice(-6)}</div>
                                            <div class="text-lg font-black text-white">Debe: $${(f.total - f.abono).toFixed(2)}</div>
                                        </div>
                                        <div class="flex gap-2">
                                            <button onclick="abonar(${f.id})" class="bg-green-600 text-white px-4 py-2 rounded-lg font-black text-[10px] uppercase">Abonar</button>
                                            <button onclick="showReceipt(${f.id})" class="bg-white/10 p-2 rounded-lg">📄</button>
                                        </div>
                                    </div>
                                </div>`).join("")}
                        </div>
                    </div>`).join("")}
            </div>`;
    }

    function renderInventario(app, inv) {
        app.innerHTML = `
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-sm font-black italic text-blue-500 uppercase tracking-widest">Control de Existencias</h2>
                <div class="text-[10px] font-black bg-blue-500/10 text-blue-400 px-3 py-1 rounded-full uppercase">Stock Real Time</div>
            </div>
            <div class="space-y-3">
                ${Object.entries(inv).map(([n, i]) => `
                    <div class="card-pro flex justify-between items-center ${i.stock < 5 ? 'alert-low' : ''}">
                        <div>
                            <div class="flex items-center gap-2 mb-1">
                                <span class="w-2 h-2 rounded-full ${i.stock < 5 ? 'bg-red-500 animate-ping' : 'bg-green-500'}"></span>
                                <b class="uppercase text-purple-400 text-xs font-black tracking-tight">${n}</b>
                            </div>
                            <div class="flex items-baseline gap-1">
                                <span class="text-4xl font-black italic text-white">${i.stock.toFixed(2)}</span>
                                <small class="text-[10px] font-black opacity-30 uppercase tracking-widest">Mts Lineales</small>
                            </div>
                        </div>
                        <div class="flex flex-col gap-2">
                            <button onclick="editStock('${n}')" class="w-12 h-12 bg-white/5 hover:bg-white/10 rounded-2xl flex items-center justify-center text-lg border border-white/5 transition-all">✏️</button>
                            <button onclick="registrarMerma('${n}')" class="w-12 h-12 bg-red-500/10 hover:bg-red-500/20 text-red-500 rounded-2xl flex items-center justify-center text-lg border border-red-500/10 transition-all">🗑️</button>
                        </div>
                    </div>`).join("")}
            </div>`;
    }

    // --- COPIAR RESTO DE FUNCIONES DEL ORIGINAL ---
    // (AQUÍ COPIAS TAL CUAL TUS FUNCIONES: renderCompras, renderGastos, renderCatalogo, 
    // updateVentaUI, addItem, removeItem, saveVenta, abonar, etc. del código original)

    function renderCompras(app, inv, today) {
        const listC = window.state.compras || [];
        app.innerHTML = `
        <div class="card-pro">
            <h2 class="text-sm font-black italic text-blue-400 mb-6 uppercase text-center tracking-widest">Carga de Mercancía</h2>
            <select id="cMat" class="mb-3"><option value="">-- SELECCIONAR MATERIAL --</option>${Object.keys(inv).map(m=>`<option value="${m}">${m}</option>`).join("")}</select>
            <div class="grid grid-cols-2 gap-3 mb-3">
                <input id="cCant" type="number" placeholder="CANTIDAD ML">
                <input id="cCosto" type="number" placeholder="COSTO ML $">
            </div>
            <div class="grid grid-cols-2 gap-3 mb-4">
                <input id="cVentaM2" type="number" placeholder="PRECIO VENTA M2 $">
                <input id="cVentaML" type="number" placeholder="PRECIO VENTA ML $">
            </div>
            <button onclick="saveCompra()" class="btn-main text-white w-full py-4 rounded-xl font-black uppercase text-xs">Registrar Entrada</button>
        </div>
        <div class="space-y-2">
            ${listC.slice().reverse().map((c, idx) => `
                <div class="bg-white/5 p-4 rounded-2xl flex justify-between items-center border border-white/5">
                    <div>
                        <div class="text-[10px] font-black text-blue-400 uppercase tracking-tighter">${c.m}</div>
                        <div class="text-sm font-black text-white">${c.c} ML <span class="opacity-30 mx-1">@</span> $${c.co}</div>
                    </div>
                    <button onclick="delCompra(${listC.length - 1 - idx})" class="text-red-500/30 hover:text-red-500">✕</button>
                </div>`).join("")}
        </div>`;
    }

    function renderGastos(app, today) {
        const listG = window.state.gastos || [];
        const total = listG.reduce((a,b)=>a+b.monto,0);
        app.innerHTML = `
            <div class="card-pro">
                <h2 class="text-sm font-black italic text-red-500 mb-6 uppercase text-center tracking-widest">Gestión de Gastos</h2>
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <input id="gDate" type="date" value="${today}">
                    <input id="gMonto" type="number" placeholder="MONTO $">
                </div>
                <input id="gDesc" placeholder="¿EN QUÉ SE GASTÓ?" class="mb-4">
                <button onclick="saveGasto()" class="w-full bg-red-600 text-white py-4 rounded-xl font-black uppercase text-xs">Guardar Gasto</button>
            </div>
            <div class="flex justify-between items-center mb-4 px-2">
                <span class="text-[10px] font-black opacity-40 uppercase tracking-widest">Historial</span>
                <span class="text-xl font-black text-red-500">$${total.toLocaleString()}</span>
            </div>
            <div class="space-y-2">
                ${listG.slice().reverse().map((g, idx) => `
                    <div class="bg-white/5 p-4 rounded-xl flex justify-between items-center">
                        <div><div class="font-black text-white text-xs uppercase">${g.desc}</div><div class="text-[9px] opacity-30 font-bold">${g.fecha}</div></div>
                        <div class="flex items-center gap-4"><b class="text-red-500 font-black">$${g.monto.toFixed(2)}</b><button onclick="delGasto(${listG.length - 1 - idx})" class="opacity-20 text-xs">✕</button></div>
                    </div>`).join("")}
            </div>`;
    }

    function renderCatalogo(app, inv, serv) {
        app.innerHTML = `
            <div class="card-pro">
                <h3 class="text-[10px] font-black text-blue-400 uppercase mb-4 tracking-widest">Nuevo Material</h3>
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <input id="nMat" placeholder="NOMBRE" class="uppercase">
                    <input id="aMat" type="number" step="0.01" placeholder="ANCHO (MTS)">
                </div>
                <button onclick="crearMat()" class="w-full bg-blue-600/20 text-blue-400 py-3 rounded-xl font-black uppercase text-[10px] border border-blue-500/20">+ REGISTRAR EN SISTEMA</button>
            </div>
            <div class="card-pro">
                <h3 class="text-[10px] font-black text-purple-400 uppercase mb-4 tracking-widest">Catálogo de Servicios</h3>
                <div class="flex gap-2 mb-4">
                    <input id="nServ" placeholder="Nombre del servicio" class="!m-0 uppercase">
                    <button onclick="crearServicio()" class="bg-purple-600 text-white px-6 rounded-xl font-black text-lg">+</button>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    ${serv.map((s, idx) => `<div class="bg-black/40 p-3 rounded-xl flex justify-between items-center border border-white/5"><span class="text-[10px] font-black text-white/70 uppercase">${s}</span><button onclick="delServicio(${idx})" class="text-red-500/40 text-xs">✕</button></div>`).join("")}
                </div>
            </div>`;
    }

    // FUNCIONES DE LÓGICA (NO TOCAR)
    window.saveCompra = async () => {
        const m = document.getElementById("cMat").value, c = parseFloat(document.getElementById("cCant").value), co = parseFloat(document.getElementById("cCosto").value);
        if(m && c) {
            if(!window.state.inventario[m]) return;
            window.state.inventario[m].stock += c;
            if(document.getElementById("cVentaM2").value) window.state.inventario[m].precioM2 = parseFloat(document.getElementById("cVentaM2").value);
            if(document.getElementById("cVentaML").value) window.state.inventario[m].precioML = parseFloat(document.getElementById("cVentaML").value);
            if(!window.state.compras) window.state.compras = [];
            window.state.compras.push({ m, c, co, f: new Date().toISOString() });
            await window.sync();
            render();
        }
    };
    window.delCompra = async (idx) => {
        if(confirm("¿Eliminar registro?")) {
            const comp = window.state.compras[idx];
            if(window.state.inventario[comp.m]) window.state.inventario[comp.m].stock -= comp.c;
            window.state.compras.splice(idx, 1);
            await window.sync();
        }
    };
    window.saveGasto = async () => {
        const d = document.getElementById("gDesc").value, m = parseFloat(document.getElementById("gMonto").value), f = document.getElementById("gDate").value;
        if(d && m) { if(!window.state.gastos) window.state.gastos = []; window.state.gastos.push({ desc: d.toUpperCase(), monto: m, fecha: f }); await window.sync(); }
    };
    window.delGasto = async (idx) => { if(confirm("¿Eliminar gasto?")) { window.state.gastos.splice(idx, 1); await window.sync(); } };
    window.crearMat = async () => {
        const n = document.getElementById("nMat").value.toUpperCase(), a = parseFloat(document.getElementById("aMat").value);
        if(n && a) { if(!window.state.inventario) window.state.inventario = {}; window.state.inventario[n] = { stock: 0, precioM2: 0, precioML: 0, ancho: a }; await window.sync(); }
    };
    window.editStock = async (m) => {
        let n = parseFloat(prompt(`AJUSTE DE STOCK PARA ${m}:`, window.state.inventario[m].stock));
        if(!isNaN(n)) { window.state.inventario[m].stock = n; await window.sync(); }
    };
    window.crearServicio = async () => {
        const s = document.getElementById("nServ").value.toUpperCase();
        if(s) { if(!window.state.servicios) window.state.servicios = [...SERVICIOS_DEFECTO]; window.state.servicios.push(s); await window.sync(); }
    };
    window.delServicio = async (idx) => { window.state.servicios.splice(idx, 1); await window.sync(); };
    window.updateVentaUI = () => {
        const m = document.getElementById("vMat").value, t = document.getElementById("vTipo").value, c = parseFloat(document.getElementById("vCant").value) || 0;
        const info = window.state.inventario[m];
        if(info) {
            let p = (t === "ML") ? c * info.precioML : (t === "M2") ? c * info.precioM2 : 0;
            if(p > 0) document.getElementById("vPrec").value = p.toFixed(2);
        }
    };
    window.addItem = () => {
        const m = document.getElementById("vMat").value, p = parseFloat(document.getElementById("vPrec").value) || 0, c = parseFloat(document.getElementById("vCant").value) || 0, t = document.getElementById("vTipo").value;
        if(m && p) { window.cart.push({ m, p, c, t }); render(); }
    };
    window.removeItem = (idx) => { window.cart.splice(idx, 1); render(); };
    window.saveVenta = async () => {
        if(!window.cart.length) return;
        const cli = document.getElementById("cli").value.toUpperCase() || "CLIENTE GENERAL";
        const wha = document.getElementById("wha").value || "";
        const abono = parseFloat(document.getElementById("vAbono").value) || 0;
        const total = window.cart.reduce((a,b)=>a+b.p,0);
        const fecha = document.getElementById("vDate").value;
        window.cart.forEach(i => { if(window.state.inventario[i.m]) window.state.inventario[i.m].stock -= i.c; });
        const id = Date.now();
        if(!window.state.ventas) window.state.ventas = [];
        window.state.ventas.push({ id, cliente: cli, whatsapp: wha, items: [...window.cart], total: total, abono: abono, fecha: fecha });
        await window.sync();
        showReceipt(id);
        window.cart = [];
    };
    window.abonar = async (id) => {
        const v = window.state.ventas.find(x => x.id === id);
        let monto = parseFloat(prompt(`MONTO A ABONAR PARA ${v.cliente}:`));
        if(!isNaN(monto)) { v.abono += monto; await window.sync(); }
    };
    window.showReceipt = (id) => {
        const v = window.state.ventas.find(x => x.id === id);
        document.getElementById("receiptContent").innerHTML = `
            <div class="flex justify-between font-black mb-4"><span>Ticket #${v.id.toString().slice(-6)}</span><span>${v.fecha}</span></div>
            <p class="font-black text-sm mb-4">CLIENTE: ${v.cliente}</p>
            <div class="border-y border-black border-dashed py-4 mb-4">
                ${v.items.map(i => `<div class="flex justify-between mb-1"><span>${i.m} (${i.c}${i.t})</span><span class="font-bold">$${i.p.toFixed(2)}</span></div>`).join("")}
            </div>
            <div class="space-y-1">
                <div class="flex justify-between font-black text-base"><span>TOTAL:</span><span>$${v.total.toFixed(2)}</span></div>
                <div class="flex justify-between text-green-700 font-bold"><span>ABONADO:</span><span>$${v.abono.toFixed(2)}</span></div>
                <div class="flex justify-between text-red-600 font-black border-t border-black pt-2 text-lg"><span>RESTANTE:</span><span>$${(v.total - v.abono).toFixed(2)}</span></div>
            </div>
            <p class="text-center mt-8 text-[9px] font-bold opacity-50 uppercase tracking-widest">¡Gracias por confiar en Ghost Print!</p>
        `;
        window.currentReceiptId = id;
        document.getElementById("receiptModal").classList.remove("hidden");
    };
    window.closeReceipt = () => document.getElementById("receiptModal").classList.add("hidden");
    window.shareReceipt = () => {
        const v = window.state.ventas.find(x => x.id === window.currentReceiptId);
        const txt = `*GHOST PRINT - RECIBO DIGITAL*%0A---------------------------%0A*Ref:* #${v.id.toString().slice(-6)}%0A*Cliente:* ${v.cliente}%0A---------------------------%0A*Total:* $${v.total}%0A*Abonado:* $${v.abono}%0A*Resta:* $${(v.total-v.abono).toFixed(2)}%0A---------------------------%0A_Gracias por su compra_`;
        window.open(`https://wa.me/${v.whatsapp}?text=${txt}`, '_blank');
    };

    render();
</script>
</body>
</html>
