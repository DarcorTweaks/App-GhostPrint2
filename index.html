<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GhostPrint</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white">

<div id="app"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = { apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI", authDomain: "ghost-print-contabilidad.firebaseapp.com", projectId: "ghost-print-contabilidad" };
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const docRef = db.collection("sistema").doc("datos_principales");

window.state = { ventas: [] };
window.currentView = 'cobrar';

docRef.onSnapshot(doc => {
    if(doc.exists) {
        window.state = doc.data();
        render();
    }
});

window.sync = async () => {
    await docRef.set(window.state);
};

function render(){
    if(window.currentView === 'cobrar'){
        renderPorCobrar(document.getElementById("app"));
    }
}

function renderPorCobrar(app) {
    const ventas = window.state.ventas || [];
    const deudoresMap = {};

    ventas.forEach(v => {
        const deuda = v.total - v.abono;
        if (deuda > 0.01) {
            if (!deudoresMap[v.cliente]) {
                deudoresMap[v.cliente] = { nombre: v.cliente, totalDeuda: 0, facturas: [] };
            }
            deudoresMap[v.cliente].totalDeuda += deuda;
            deudoresMap[v.cliente].facturas.push(v);
        }
    });

    const listaDeudores = Object.values(deudoresMap);

    app.innerHTML = `
        <h1 class="text-2xl mb-4">POR COBRAR</h1>
        ${listaDeudores.map(d => `
            <div class="mb-4 border p-3">
                <b>${d.nombre}</b> - $${d.totalDeuda}

                ${d.facturas.map(f => `
                    <div class="mt-2 p-2 border">
                        Factura #${f.id}

                        <div class="flex gap-2 mt-2">
                            <button onclick="abonar(${f.id})">Abonar</button>
                            <button onclick="liquidar(${f.id})">Liquidar</button>
                            <button onclick="editarFactura(${f.id})">Editar</button>
                            <button onclick="eliminarFactura(${f.id})" style="color:red;">🗑️</button>
                        </div>
                    </div>
                `).join("")}

            </div>
        `).join("")}
    `;
}

/* FUNCIONES EXISTENTES */
window.abonar = async (id) => {
    const v = window.state.ventas.find(x => x.id === id);
    let monto = parseFloat(prompt("Abono:"));
    if(!isNaN(monto)) {
        v.abono += monto;
        await window.sync();
    }
};

window.liquidar = async (id) => {
    const v = window.state.ventas.find(x => x.id === id);
    v.abono = v.total;
    await window.sync();
};

window.editarFactura = async (id) => {
    const v = window.state.ventas.find(x => x.id === id);
    let nT = parseFloat(prompt("Total:", v.total));
    let nA = parseFloat(prompt("Abono:", v.abono));
    if(!isNaN(nT)) v.total = nT;
    if(!isNaN(nA)) v.abono = nA;
    await window.sync();
};

/* 🔴 NUEVO BOTON FUNCIONANDO */
window.eliminarFactura = async (id) => {
    if(confirm("¿Eliminar esta factura?")) {
        const index = window.state.ventas.findIndex(v => v.id === id);
        if(index !== -1) {
            window.state.ventas.splice(index, 1);
            await window.sync();
        }
    }
};

render();
</script>

</body>
</html>
