<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GhostPrint PRO v18.7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { background-color: #05050a; color: #f8fafc; font-family: 'Inter', sans-serif; padding-bottom: 100px; }
        .card-pro { background: #111122; border: 1px solid #2d2d44; border-radius: 24px; padding: 20px; margin-bottom: 12px; position: relative; overflow: hidden; }
        nav { background: rgba(5, 5, 10, 0.9); backdrop-filter: blur(10px); display: flex; gap: 8px; overflow-x: auto; padding: 14px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #1e293b; }
        .btn-nav { background: #1e1e30; color: #64748b; padding: 12px 18px; border-radius: 16px; font-size: 10px; font-weight: 800; white-space: nowrap; cursor: pointer; text-transform: uppercase; border: 1px solid transparent; }
        .active { background: #7c3aed !important; color: white !important; border-color: #a78bfa; box-shadow: 0 0 15px rgba(124, 58, 237, 0.3); }
        input, select { background: #0c0c1d; border: 1px solid #334155; color: white; padding: 14px; border-radius: 16px; width: 100%; margin: 6px 0; font-weight: 700; outline: none; transition: 0.3s; }
        input:focus { border-color: #7c3aed; box-shadow: 0 0 10px rgba(124, 58, 237, 0.2); }
        .btn-main { background: linear-gradient(135deg, #7c3aed 0%, #4c1d95 100%); color: white; padding: 18px; border-radius: 20px; width: 100%; font-weight: 900; text-transform: uppercase; cursor: pointer; border: none; shadow: 0 10px 20px rgba(0,0,0,0.3); }
        
        /* Gráfica Circular Simple */
        .circle-chart { width: 120px; height: 120px; border-radius: 50%; background: conic-gradient(#7c3aed var(--p), #1e1e30 0); display: flex; align-items: center; justify-content: center; margin: 0 auto; position: relative; }
        .circle-chart::after { content: ""; position: absolute; width: 90px; height: 90px; background: #111122; border-radius: 50%; }
        .circle-val { position: relative; z-index: 10; font-weight: 900; font-size: 20px; }
    </style>
</head>
<body>

<header class="p-6 bg-[#05050a] flex justify-between items-center border-b border-white/5">
    <div class="flex items-center"><span class="text-3xl mr-3">👻</span><h1 class="text-2xl font-black italic uppercase tracking-tighter">GhostPrint <span class="text-purple-500">PRO</span></h1></div>
</header>

<nav id="main-nav">
    <div onclick="setView('inicio')" class="btn-nav active" id="n-inicio">🏠 Inicio</div>
    <div onclick="setView('ventas')" class="btn-nav" id="n-ventas">💵 Ventas</div>
    <div onclick="setView('inventario')" class="btn-nav" id="n-inventario">📦 Stock</div>
    <div onclick="setView('reportes')" class="btn-nav" id="n-reportes">📊 Análisis</div>
    <div onclick="setView('cobros')" class="btn-nav" id="n-cobros">⏳ Cuentas</div>
    <div onclick="setView('gastos')" class="btn-nav" id="n-gastos">💸 Gastos</div>
    <div onclick="setView('compras')" class="btn-nav" id="n-compras">🛒 Carga</div>
    <div onclick="setView('catalogo')" class="btn-nav" id="n-catalogo">⚙️ Config</div>
</nav>

<div id="app" class="p-4 max-w-2xl mx-auto"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI", authDomain: "ghost-print-contabilidad.firebaseapp.com", projectId: "ghost-print-contabilidad", storageBucket: "ghost-print-contabilidad.firebasestorage.app", messagingSenderId: "867057362556", appId: "1:867057362556:web:6bd2a461817219a4000bf9" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const docRef = db.collection("sistema").doc("datos_principales");

    window.state = JSON.parse(localStorage.getItem('gp_v18_7')) || { ventas: [], gastos: [], inventario: {}, serviciosExtra: ["OJALETES", "DISEÑO", "MONTAJE", "CORTE"], comprasInversion: [], mermas: [] };
    window.currentView = "inicio";
    let cart = [];

    window.sync = async function() {
        localStorage.setItem('gp_v18_7', JSON.stringify(window.state));
        await docRef.set(window.state).catch(e => console.log("Offline Sync"));
    };

    docRef.onSnapshot(doc => { if(doc.exists) { window.state = doc.data(); render(); } });

    window.setView = function(v) {
        window.currentView = v;
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
        document.getElementById('n-' + v).classList.add('active');
        render();
    };

    window.render = function() {
        const app = document.getElementById("app");
        const mesActual = new Date().getMonth();
        const vM = (window.state.ventas || []).filter(v => new Date(v.id).getMonth() === mesActual);
        const gM = (window.state.gastos || []).filter(g => new Date(g.id).getMonth() === mesActual);
        const cM = (window.state.comprasInversion || []).filter(c => new Date(c.id).getMonth() === mesActual);

        const totalVendido = vM.reduce((a, b) => a + b.total, 0);
        const totalCobrado = vM.reduce((a, b) => a + (Number(b.abonado) || (b.pagado ? b.total : 0)), 0);
        const totalGastos = gM.reduce((a, b) => a + Number(b.amount), 0);
        const totalStock = cM.reduce((a, b) => a + Number(b.amount), 0);
        const utilidadCaja = totalCobrado - totalGastos - totalStock;

        if(window.currentView === "inicio") {
            app.innerHTML = `
                <div class="card-pro !bg-gradient-to-br !from-purple-600 !to-indigo-900 border-none shadow-2xl">
                    <div class="relative z-10">
                        <p class="text-[11px] font-black text-purple-200 uppercase tracking-[3px] text-center italic">Efectivo Disponible</p>
                        <h2 class="text-7xl font-black text-white italic text-center mt-2 leading-none">$${utilidadCaja.toFixed(2)}</h2>
                        <div class="flex justify-between mt-6 px-4">
                            <div class="text-center"><p class="text-[9px] font-black uppercase opacity-60">Cobros</p><b class="text-lg">$${totalCobrado.toFixed(0)}</b></div>
                            <div class="text-center"><p class="text-[9px] font-black uppercase opacity-60">Egresos</p><b class="text-lg">$${(totalGastos + totalStock).toFixed(0)}</b></div>
                        </div>
                    </div>
                    <div class="absolute -right-10 -bottom-10 text-[150px] opacity-10 italic font-black">GP</div>
                </div>
                
                <div class="grid grid-cols-2 gap-3">
                    <div class="card-pro !bg-white/5 border-white/10">
                        <p class="text-[10px] font-black opacity-40 uppercase">Ventas Brutas</p>
                        <h4 class="text-2xl font-black italic text-purple-400 mt-1">$${totalVendido.toFixed(0)}</h4>
                    </div>
                    <div class="card-pro !bg-white/5 border-white/10">
                        <p class="text-[10px] font-black opacity-40 uppercase">Por Cobrar</p>
                        <h4 class="text-2xl font-black italic text-orange-400 mt-1">$${(totalVendido - totalCobrado).toFixed(0)}</h4>
                    </div>
                </div>`;
        }

        if(window.currentView === "reportes") {
            const egresos = totalGastos + totalStock;
            const perc = egresos > 0 ? Math.min((totalCobrado / egresos) * 100, 100) : 0;
            
            app.innerHTML = `
                <div class="card-pro text-center">
                    <p class="text-[10px] font-black uppercase tracking-widest text-purple-400 mb-6">Meta de Rentabilidad</p>
                    <div class="circle-chart" style="--p: ${perc}%">
                        <div class="circle-val italic">${perc.toFixed(0)}%</div>
                    </div>
                    <p class="mt-6 text-xs font-bold opacity-60 uppercase">Cobrado vs Gastos/Stock</p>
                    <div class="flex justify-center gap-4 mt-2">
                        <b class="text-green-400">$${totalCobrado.toFixed(0)}</b>
                        <span class="opacity-20">/</span>
                        <b class="text-red-400">$${egresos.toFixed(0)}</b>
                    </div>
                </div>

                <div class="card-pro">
                    <p class="text-[10px] font-black uppercase opacity-40 mb-4 italic">Resumen Administrativo</p>
                    <div class="space-y-3">
                        <div class="flex justify-between text-sm"><span>Utilidad Bruta</span><b class="text-green-400">$${(totalVendido - egresos).toFixed(2)}</b></div>
                        <div class="flex justify-between text-sm"><span>Inversión en Mercancía</span><b>$${totalStock.toFixed(2)}</b></div>
                        <div class="flex justify-between text-sm"><span>Gastos Operativos</span><b>$${totalGastos.toFixed(2)}</b></div>
                    </div>
                </div>`;
        }

        if(window.currentView === "inventario") {
            app.innerHTML = `<div class="space-y-3">${Object.entries(window.state.inventario || {}).map(([n, i]) => `
                <div class="card-pro border-l-4 ${i.stock < 5 ? 'border-red-500 shadow-lg shadow-red-900/10' : 'border-green-500'}">
                    <div class="flex justify-between items-center">
                        <div><p class="text-[10px] font-black opacity-50 uppercase tracking-tighter">${n}</p><h4 class="text-4xl font-black italic">${(i.stock || 0).toFixed(2)}</h4></div>
                        <div class="flex flex-col gap-2">
                            <button onclick="registrarMerma('${n}')" class="bg-orange-500/20 text-orange-400 border border-orange-500/30 px-3 py-2 rounded-xl text-[9px] font-black uppercase italic">⚠ Merma</button>
                            <div class="flex gap-1">
                                <button onclick="editMatInv('${n}')" class="bg-white/5 p-2 rounded-lg text-[9px] font-black">EDIT</button>
                                <button onclick="delMatInv('${n}')" class="bg-red-600/10 text-red-500 p-2 rounded-lg text-[9px] font-black">X</button>
                            </div>
                        </div>
                    </div>
                </div>`).join("")}</div>`;
        }

        if(window.currentView === "gastos") {
            app.innerHTML = `
                <div class="card-pro border-t-4 border-red-600 bg-red-950/5">
                    <h2 class="text-xl font-black uppercase italic mb-4 text-red-500 tracking-tighter">Registrar Gasto</h2>
                    <input id="dG" placeholder="Descripción del gasto...">
                    <input id="aG" type="number" placeholder="Monto $">
                    <button onclick="saveGasto()" class="btn-main !from-red-600 !to-red-900 mt-4 shadow-lg shadow-red-900/20">Guardar Egreso</button>
                </div>
                <div class="mt-6 space-y-2">
                    <p class="text-[10px] font-black uppercase opacity-40 ml-2 italic">Últimos Movimientos</p>
                    ${(window.state.gastos || []).slice(-8).reverse().map(g=>`<div class="card-pro !py-3 !px-5 flex justify-between items-center border-l-2 border-red-600/30 bg-white/[0.02]"><span class="text-xs font-bold uppercase">${g.desc}</span><b class="text-red-400 italic">-$${g.amount}</b></div>`).join("")}
                </div>`;
        }

        if(window.currentView === "compras") {
            app.innerHTML = `
                <div class="card-pro border-t-4 border-blue-600 bg-blue-950/5">
                    <h2 class="text-xl font-black uppercase italic mb-4 text-blue-500 tracking-tighter">Cargar Stock</h2>
                    <select id="mInv"><option value="">Seleccionar Material...</option>${Object.keys(window.state.inventario || {}).map(m=>`<option value="${m}">${m}</option>`).join("")}</select>
                    <div class="grid grid-cols-2 gap-2"><input id="qInv" type="number" placeholder="Cant."><input id="pInv" type="number" placeholder="Precio Un. $"></div>
                    <button onclick="saveInv()" class="btn-main !from-blue-600 !to-blue-900 mt-4 shadow-lg shadow-blue-900/20">Confirmar Carga</button>
                </div>
                <div class="mt-6 space-y-2">
                    <p class="text-[10px] font-black uppercase opacity-40 ml-2 italic">Historial de Inversión</p>
                    ${(window.state.comprasInversion || []).slice(-8).reverse().map(c=>`<div class="card-pro !py-3 !px-5 flex justify-between items-center border-l-2 border-blue-600/30 bg-white/[0.02]"><span class="text-xs font-bold uppercase">${c.material} (${c.qty})</span><b class="text-blue-400 italic">+$${c.amount}</b></div>`).join("")}
                </div>`;
        }

        if(window.currentView === "ventas") {
            app.innerHTML = `<div class="card-pro"><h2 class="text-xl font-black uppercase italic mb-4 tracking-tighter">Nueva Venta</h2><input id="cli" placeholder="NOMBRE DEL CLIENTE"><input id="tel" type="number" placeholder="WHATSAPP"><div class="bg-white/5 p-5 rounded-2xl mt-4 border border-white/5"><div class="grid grid-cols-2 gap-3"><select id="pS"><option value="">Material...</option>${Object.keys(window.state.inventario || {}).map(m=>`<option value="${m}">${m}</option>`).join("")}</select><select id="sS"><option value="">Servicio...</option>${(window.state.serviciosExtra || []).map(s=>`<option value="${s}">${s}</option>`).join("")}</select></div><div class="grid grid-cols-2 gap-3 mt-1"><input id="qV" type="number" placeholder="Cant." value="1"><select id="tC" onchange="document.getElementById('pL').classList.toggle('hidden', this.value !== 'libre')"><option value="detal">DETAL ($9)</option><option value="mayor">MAYOR ($10)</option><option value="libre">PRECIO LIBRE</option></select></div><input id="pL" class="hidden" type="number" placeholder="Precio Especial $"><button onclick="addCart()" class="w-full bg-white/10 hover:bg-white/20 py-3 rounded-xl text-[10px] font-black uppercase mt-4 transition">+ Añadir a la Lista</button></div><div id="cart-list" class="mt-6 space-y-2"></div><div id="total-disp" class="text-5xl font-black text-center my-8 italic text-purple-500">$0.00</div><button onclick="finalizarVenta()" class="btn-main">Procesar Venta</button></div>`;
        }

        if(window.currentView === "cobros") {
            const deudas = (window.state.ventas || []).filter(v => !v.pagado);
            app.innerHTML = `<div class="space-y-3">${deudas.map(v => `<div class="card-pro flex justify-between items-center border-l-4 border-orange-500 bg-orange-950/5"><div><b class="text-sm uppercase font-black">${v.cliente}</b><br><span class="text-orange-400 text-xs font-black italic">Saldo: $${(v.total - (v.abonado||0)).toFixed(2)}</span></div><div class="flex gap-2"><button onclick="abono(${v.id})" class="bg-purple-600 px-5 py-3 rounded-xl text-[10px] font-black uppercase shadow-lg shadow-purple-900/20">Cobrar</button></div></div>`).join("") || '<div class="text-center py-20 opacity-20 font-black italic">TODO COBRADO</div>'}</div>`;
        }

        if(window.currentView === "catalogo") {
            app.innerHTML = `<div class="card-pro"><h2 class="text-xs font-black uppercase opacity-40 mb-6 tracking-[3px] text-center italic font-black">Configuración</h2><p class="text-[10px] font-black uppercase mb-2 ml-2">Materiales</p><input id="newM" placeholder="Nombre (Ej: VINIL)"><button onclick="addMat()" class="btn-main !p-3 mb-6 !from-gray-700 !to-gray-900">Añadir</button><p class="text-[10px] font-black uppercase mb-2 ml-2">Servicios</p><input id="newS" placeholder="Servicio (Ej: CORTE)"><button onclick="addServicio()" class="btn-main !p-3 !from-gray-700 !to-gray-900">Añadir</button></div>`;
        }
    };

    // FUNCIONES (Misma lógica, no se rompe nada)
    window.registrarMerma = async (mat) => { let q = parseFloat(prompt(`¿Cuánto se dañó de ${mat}?`)); if(q > 0) { window.state.inventario[mat].stock -= q; if(!window.state.mermas) window.state.mermas = []; window.state.mermas.push({id: Date.now(), mat, q}); await window.sync(); render(); } };
    window.saveInv = async () => { const m = document.getElementById("mInv").value, q = parseFloat(document.getElementById("qInv").value), p = parseFloat(document.getElementById("pInv").value); if(m && q) { window.state.inventario[m].stock += q; window.state.comprasInversion.push({ id: Date.now(), material: m, amount: (q * p), qty: q }); await window.sync(); setView('inicio'); } };
    window.saveGasto = async () => { const d = document.getElementById("dG").value, a = parseFloat(document.getElementById("aG").value); if(d && a) { window.state.gastos.push({ id: Date.now(), desc: d.toUpperCase(), amount: a }); await window.sync(); setView('inicio'); } };
    window.addCart = () => { let m = document.getElementById("pS").value, s = document.getElementById("sS").value, q = parseFloat(document.getElementById("qV").value) || 1, t = document.getElementById("tC").value, p = (t === "detal") ? 9 : (t === "mayor") ? 10 : parseFloat(document.getElementById("pL").value) || 0, d = (m && s) ? m + " + " + s : m || s; if(d) { cart.push({ d, p: (p*q), mat: m, qtyV: q }); renderCart(); } };
    function renderCart() { document.getElementById("cart-list").innerHTML = cart.map(c => `<div class="flex justify-between bg-white/5 p-2 rounded-lg text-xs"><span>${c.d}</span><b>$${c.p}</b></div>`).join(""); document.getElementById("total-disp").innerText = "$" + cart.reduce((a,b)=>a+b.p,0).toFixed(2); }
    window.finalizarVenta = async () => { let cli = document.getElementById("cli").value; if(!cli || !cart.length) return; cart.forEach(c => { if(c.mat) window.state.inventario[c.mat].stock -= c.qtyV; }); window.state.ventas.push({ id: Date.now(), cliente: cli.toUpperCase(), telefono: document.getElementById("tel").value, total: cart.reduce((a,b)=>a+b.p,0), abonado: 0, pagado: false }); await window.sync(); cart = []; setView('inicio'); };
    window.abono = async (id) => { let v = window.state.ventas.find(x => x.id === id); let m = parseFloat(prompt(`Saldo actual: $${(v.total-v.abonado).toFixed(2)}. ¿Cuánto abona?`)); if(m) { v.abonado = (Number(v.abonado)||0) + m; if(v.abonado >= v.total) v.pagado = true; await window.sync(); render(); } };
    window.addMat = async () => { let n = document.getElementById("newM").value.toUpperCase(); if(n) { window.state.inventario[n] = {stock: 0}; await window.sync(); render(); } };
    window.addServicio = async () => { let s = document.getElementById("newS").value.toUpperCase(); if(s) { window.state.serviciosExtra.push(s); await window.sync(); render(); } };
    window.editMatInv = async (old) => { let n = prompt("Nuevo nombre:", old); if(n) { window.state.inventario[n.toUpperCase()] = window.state.inventario[old]; delete window.state.inventario[old]; await window.sync(); render(); } };
    window.delMatInv = async (n) => { if(confirm(`¿Eliminar ${n} permanentemente?`)){ delete window.state.inventario[n]; await window.sync(); render(); } };

    render();
</script>
</body>
</html>
