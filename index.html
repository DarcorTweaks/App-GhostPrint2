<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GhostPrint MASTER v28.9.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { background-color: #030308; color: #f8fafc; font-family: 'Inter', sans-serif; padding-bottom: 100px; }
        .card-pro { background: #111122; border: 1px solid #2d2d44; border-radius: 20px; padding: 18px; margin-bottom: 12px; }
        nav { background: rgba(10, 10, 20, 0.95); display: flex; gap: 8px; overflow-x: auto; padding: 14px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #334155; }
        .btn-nav { background: #1e1e30; color: #64748b; padding: 12px 18px; border-radius: 14px; font-size: 10px; font-weight: 800; white-space: nowrap; cursor: pointer; text-transform: uppercase; }
        .active { background: #7c3aed !important; color: white !important; }
        
        input, select { background: #070712; border: 1px solid #334155; color: white; padding: 16px; border-radius: 14px; width: 100%; margin: 8px 0; font-size: 16px; font-weight: 700; outline: none; }
        input::placeholder { font-size: 14px; opacity: 0.5; }
        
        .btn-main { background: linear-gradient(135deg, #7c3aed 0%, #4c1d95 100%); color: white; padding: 18px; border-radius: 18px; width: 100%; font-weight: 900; text-transform: uppercase; cursor: pointer; border: none; font-size: 14px; }
        .alert-low { border: 2px solid #ef4444 !important; background: rgba(239, 68, 68, 0.1) !important; }
        .ghost-glow { filter: drop-shadow(0 0 10px #7c3aed); }
        .icon-btn-lg { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; border-radius: 12px; transition: all 0.2s; cursor: pointer; font-size: 18px; }
        ::-webkit-calendar-picker-indicator { filter: invert(1); }
        
        .chart-bar { height: 8px; border-radius: 4px; background: #2d2d44; overflow: hidden; margin: 8px 0; }
        .chart-fill { height: 100%; transition: width 0.5s ease-in-out; }
    </style>
</head>
<body>

<div class="p-4 flex justify-between items-center bg-[#0a0a14] border-b border-white/5">
    <div class="flex items-center gap-3">
        <span class="text-4xl ghost-glow">👻</span>
        <div>
            <h1 class="text-xl font-black italic text-purple-500 leading-none">GHOST PRINT</h1>
            <p class="text-[8px] font-black opacity-40 uppercase tracking-widest text-purple-300">Master Suite v28.9.1</p>
        </div>
    </div>
</div>

<nav id="mainNav">
    <div onclick="setView('inicio')" class="btn-nav active" id="n-inicio">📊 CONTROL</div>
    <div onclick="setView('ventas')" class="btn-nav" id="n-ventas">💵 Ventas</div>
    <div onclick="setView('cobrar')" class="btn-nav" id="n-cobrar">📑 POR COBRAR</div>
    <div onclick="setView('compras')" class="btn-nav" id="n-compras">🛒 Compras</div>
    <div onclick="setView('gastos')" class="btn-nav" id="n-gastos">💸 Gastos</div>
    <div onclick="setView('inventario')" class="btn-nav" id="n-inventario">📦 Stock</div>
    <div onclick="setView('catalogo')" class="btn-nav" id="n-catalogo">⚙️ CATALOGO</div>
</nav>

<div id="app" class="p-4 max-w-2xl mx-auto"></div>

<div id="receiptModal" class="fixed inset-0 bg-black/90 z-[200] hidden flex items-center justify-center p-4">
    <div class="bg-white text-black p-6 rounded-2xl w-full max-w-sm shadow-2xl relative overflow-hidden">
        <div class="text-center mb-4">
             <span class="text-4xl">👻</span>
             <h2 class="text-xl font-black italic leading-none text-purple-600">GHOST PRINT</h2>
             <p class="text-[8px] font-bold uppercase tracking-tighter">Recibo de Venta</p>
        </div>
        <div id="receiptContent" class="text-[11px] font-mono border-t border-dashed border-black pt-4"></div>
        <div class="mt-6 flex gap-2 no-print">
            <button onclick="closeReceipt()" class="flex-1 bg-gray-200 p-3 rounded-xl font-bold">Cerrar</button>
            <button onclick="shareReceipt()" class="flex-1 bg-purple-600 text-white p-3 rounded-xl font-bold">WhatsApp</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI", authDomain: "ghost-print-contabilidad.firebaseapp.com", projectId: "ghost-print-contabilidad", storageBucket: "ghost-print-contabilidad.firebasestorage.app", messagingSenderId: "867057362556", appId: "1:867057362556:web:6bd2a461817219a4000bf9" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const docRef = db.collection("sistema").doc("datos_principales");

    const SERVICIOS_DEFECTO = ["DISEÑO", "IMPRESIÓN", "DISEÑO E IMPRESIÓN", "INSTALACIÓN", "POP", "ROTULACIÓN", "LAMINADO", "IMPRESIÓN Y CORTE"];

    window.state = { ventas: [], inventario: {}, compras: [], gastos: [], servicios: SERVICIOS_DEFECTO };
    window.currentView = 'inicio';
    window.cart = [];

    window.sync = async function() { await docRef.set(window.state); render(); };
    docRef.onSnapshot(doc => { if(doc.exists) { window.state = doc.data(); render(); } });

    window.setView = function(v) { 
        window.currentView = v; 
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active')); 
        document.getElementById('n-'+v)?.classList.add('active'); 
        if(v === 'ventas') window.cart = []; 
        render(); 
    };

    window.render = function() {
        const app = document.getElementById("app");
        const inv = window.state.inventario || {};
        const serv = window.state.servicios || SERVICIOS_DEFECTO;
        const today = new Date().toISOString().split('T')[0];

        if(window.currentView === 'inicio') {
            const vM = window.state.ventas || [];
            const gM = window.state.gastos || [];
            const now = new Date();
            const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
            const currentVentas = vM.filter(v => new Date(v.fecha) >= startOfMonth);
            const totalVentas = currentVentas.reduce((a, b) => a + (Number(b.total) || 0), 0);
            const totalAbonos = currentVentas.reduce((a, b) => a + (Number(b.abono) || 0), 0);
            const totalGastos = (window.state.gastos || []).filter(g => new Date(g.fecha) >= startOfMonth).reduce((a, b) => a + (Number(b.monto) || 0), 0);
            const totalCaja = totalAbonos - totalGastos;

            app.innerHTML = `
                <div class="card-pro text-center bg-gradient-to-br from-green-900/40 to-[#111122] border-green-500/30">
                    <p class="text-[10px] opacity-60 uppercase font-black tracking-widest text-green-300">Total Real en Caja</p>
                    <h2 class="text-5xl font-black italic text-green-400">$${totalCaja.toLocaleString()}</h2>
                </div>
                <div class="grid grid-cols-2 gap-4 mt-2">
                    <div class="card-pro text-center"><p class="text-[9px] opacity-40 uppercase">Ventas Mes</p><h2 class="text-xl font-black text-purple-500">$${totalVentas.toLocaleString()}</h2></div>
                    <div class="card-pro text-center"><p class="text-[9px] opacity-40 uppercase">Por Cobrar</p><h2 class="text-xl font-black text-red-500">$${(totalVentas - totalAbonos).toLocaleString()}</h2></div>
                </div>
            `;
        }

        else if(window.currentView === 'ventas') {
            app.innerHTML = `
                <div class="card-pro">
                    <h2 class="text-xl font-black italic text-purple-500 mb-6 uppercase text-center">Nueva Venta</h2>
                    <input id="vDate" type="date" value="${today}">
                    <div class="grid grid-cols-2 gap-2">
                        <input id="cli" placeholder="NOMBRE CLIENTE" class="uppercase border-2 border-purple-500/30">
                        <input id="wha" type="tel" placeholder="WHATSAPP">
                    </div>
                    
                    <div class="bg-white/5 p-4 rounded-2xl border border-white/10 mt-2">
                        <select id="vMat" onchange="updateVentaUI()">
                            <option value="">-- SELECCIONE --</option>
                            <optgroup label="MATERIAL">${Object.keys(inv).map(m=>`<option value="${m}">${m}</option>`).join("")}</optgroup>
                            <optgroup label="SERVICIO">${serv.map(s=>`<option value="${s}">${s}</option>`).join("")}</optgroup>
                        </select>
                        <div class="flex gap-2">
                            <select id="vTipo" onchange="updateVentaUI()"><option value="M2">M2</option><option value="ML">ML</option><option value="UNID">UNID</option></select>
                            <input id="vCant" type="number" placeholder="CANT" oninput="updateVentaUI()">
                        </div>
                        <input id="vPrec" type="number" placeholder="PRECIO $">
                        <button onclick="addItem()" class="btn-main !bg-purple-600/20 !text-purple-400 !py-3 mt-2">+ AGREGAR</button>
                    </div>

                    <div id="vLista" class="mt-4 space-y-2">
                        ${window.cart.map((item, idx) => `
                            <div class="flex justify-between items-center bg-white/5 p-3 rounded-xl border-l-4 border-purple-500">
                                <div class="text-[11px]">
                                    <div class="font-black uppercase text-white">${item.m} <span class="text-purple-400 ml-1 italic">— ${item.t}</span></div>
                                    <div class="opacity-40">Cant: ${item.c}</div>
                                </div>
                                <div class="flex items-center gap-3">
                                    <b class="text-white">$${item.p.toFixed(2)}</b>
                                    <button onclick="removeItem(${idx})" class="text-red-500">✕</button>
                                </div>
                            </div>
                        `).join("")}
                    </div>

                    <div class="text-4xl font-black text-center my-6">$${window.cart.reduce((a,b)=>a+b.p, 0).toFixed(2)}</div>
                    <input id="vAbono" type="number" placeholder="ABONO $" class="text-2xl text-green-500 text-center bg-transparent border-none">
                    <button onclick="saveVenta()" class="btn-main py-4 mt-2">GUARDAR Y FINALIZAR</button>
                </div>
            `;
        }

        else if(window.currentView === 'cobrar') renderPorCobrar(app);
        else if(window.currentView === 'compras') renderCompras(app, inv, today);
        else if(window.currentView === 'gastos') renderGastos(app, today);
        else if(window.currentView === 'inventario') renderInventario(app, inv);
        else if(window.currentView === 'catalogo') renderCatalogo(app, inv, serv);
    };

    function renderPorCobrar(app) {
        const ventas = window.state.ventas || [];
        const deudores = {};
        ventas.forEach(v => {
            const d = v.total - v.abono;
            if (d > 0.01) {
                if (!deudores[v.cliente]) deudores[v.cliente] = { nombre: v.cliente, deuda: 0, lista: [] };
                deudores[v.cliente].deuda += d;
                deudores[v.cliente].lista.push(v);
            }
        });
        app.innerHTML = `
            <h2 class="text-lg font-black italic text-red-500 mb-4 uppercase">Cuentas por Cobrar</h2>
            <div class="space-y-4">
                ${Object.values(deudores).map(d => `
                    <div class="card-pro border-l-4 border-red-600">
                        <div class="flex justify-between items-center mb-2">
                            <div><span class="text-[8px] opacity-40 block">CLIENTE:</span><b class="uppercase text-white text-lg">${d.nombre}</b></div>
                            <div class="text-2xl font-black text-red-500">$${d.deuda.toFixed(2)}</div>
                        </div>
                        <div class="space-y-2 mt-2">
                            ${d.lista.map(f => `
                                <div class="bg-black/40 p-3 rounded-lg flex justify-between items-center text-[10px]">
                                    <div><div class="text-purple-400 font-black">${f.fecha}</div><div>${f.items.map(i=>i.m).join(", ")}</div></div>
                                    <div class="flex gap-2">
                                        <button onclick="liquidar(${f.id})" class="bg-green-600/20 text-green-500 px-3 py-1 rounded-lg font-black uppercase">Liquidar</button>
                                        <button onclick="showReceipt(${f.id})" class="bg-white/10 p-1 rounded">📄</button>
                                    </div>
                                </div>`).join("")}
                        </div>
                    </div>`).join("")}
            </div>`;
    }

    function renderCompras(app, inv, today) {
        const list = window.state.compras || [];
        app.innerHTML = `
            <div class="card-pro">
                <h2 class="text-center font-black text-blue-400 uppercase mb-4">Carga de Mercancía</h2>
                <select id="cMat"><option value="">-- SELECCIONAR MATERIAL --</option>${Object.keys(inv).map(m=>`<option value="${m}">${m}</option>`).join("")}</select>
                <div class="grid grid-cols-2 gap-2">
                    <input id="cCant" type="number" placeholder="ML">
                    <input id="cCosto" type="number" placeholder="COSTO ML $">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <input id="cVentaM2" type="number" placeholder="VENTA M2 $">
                    <input id="cVentaML" type="number" placeholder="VENTA ML $">
                </div>
                <button onclick="saveCompra()" class="btn-main !bg-blue-600 mt-4">CARGAR AL STOCK</button>
            </div>
            <div class="space-y-2">
                ${list.slice(-10).reverse().map(c => `<div class="bg-white/5 p-3 rounded-xl flex justify-between text-xs"><span>${c.m}</span><b class="text-blue-400">+${c.c} ML</b></div>`).join("")}
            </div>`;
    }

    function renderGastos(app, today) {
        const list = window.state.gastos || [];
        app.innerHTML = `
            <div class="card-pro">
                <h2 class="text-center font-black text-red-500 uppercase mb-4">Registro de Gastos</h2>
                <input id="gDate" type="date" value="${today}">
                <input id="gDesc" placeholder="DESCRIPCIÓN">
                <input id="gMonto" type="number" placeholder="MONTO $">
                <button onclick="saveGasto()" class="btn-main mt-2">GUARDAR GASTO</button>
            </div>
            <div class="space-y-1">
                ${list.slice(-20).reverse().map((g, idx) => `
                    <div class="bg-white/5 p-3 rounded-xl flex justify-between text-[11px] items-center">
                        <div><div class="font-black">${g.desc}</div><div class="opacity-30">${g.fecha}</div></div>
                        <b class="text-red-400">$${g.monto}</b>
                    </div>`).join("")}
            </div>`;
    }

    function renderInventario(app, inv) {
        app.innerHTML = `
            <div class="space-y-3">
                ${Object.entries(inv).map(([n, i]) => `
                    <div class="card-pro flex justify-between items-center border-l-4 ${i.stock < 5 ? 'border-red-600 alert-low' : 'border-blue-600'}">
                        <div><b class="uppercase text-purple-400 text-[11px] font-black">${n}</b><br><span class="text-3xl font-black">${i.stock.toFixed(2)} ML</span></div>
                        <div class="flex gap-2">
                            <button onclick="editStock('${n}')" class="icon-btn-lg bg-blue-600/20 text-blue-400">✏️</button>
                        </div>
                    </div>`).join("")}
            </div>`;
    }

    function renderCatalogo(app, inv, serv) {
        app.innerHTML = `
            <div class="card-pro">
                <h3 class="text-xs font-black text-blue-400 uppercase mb-4">Crear Material</h3>
                <input id="nMat" placeholder="NOMBRE">
                <input id="aMat" type="number" step="0.01" placeholder="ANCHO (Mts)">
                <button onclick="crearMat()" class="btn-main !py-3 !bg-blue-600/20">+ REGISTRAR</button>
            </div>
            <div class="card-pro">
                <h3 class="text-xs font-black text-purple-400 uppercase mb-4">Crear Servicio</h3>
                <input id="nServ" placeholder="NOMBRE SERVICIO">
                <button onclick="crearServicio()" class="btn-main !py-3 !bg-purple-600/20">+ REGISTRAR</button>
            </div>`;
    }

    // --- LOGICA DE FUNCIONES ---

    window.updateVentaUI = () => {
        const m = document.getElementById("vMat").value, t = document.getElementById("vTipo").value, c = parseFloat(document.getElementById("vCant").value) || 0;
        const info = window.state.inventario[m];
        if(info) {
            let p = (t === "ML") ? c * info.precioML : (t === "M2") ? c * info.precioM2 : 0;
            if(p > 0) document.getElementById("vPrec").value = p.toFixed(2);
        }
    };

    window.addItem = () => {
        const m = document.getElementById("vMat").value, p = parseFloat(document.getElementById("vPrec").value) || 0, c = parseFloat(document.getElementById("vCant").value) || 0, t = document.getElementById("vTipo").value;
        if(m && p) { window.cart.push({ m, p, c, t }); render(); }
    };

    window.removeItem = (idx) => { window.cart.splice(idx, 1); render(); };

    window.saveVenta = async () => {
        const cliName = document.getElementById("cli").value.trim();
        if(!cliName) { alert("⚠️ ERROR: ESCRIBE EL NOMBRE DEL CLIENTE"); return; }
        if(!window.cart.length) return;

        const abono = parseFloat(document.getElementById("vAbono").value) || 0;
        const total = window.cart.reduce((a,b)=>a+b.p,0);
        const fecha = document.getElementById("vDate").value;
        const wha = document.getElementById("wha").value || "";
        const id = Date.now();

        window.cart.forEach(i => { if(window.state.inventario[i.m]) window.state.inventario[i.m].stock -= i.c; });

        if(!window.state.ventas) window.state.ventas = [];
        window.state.ventas.push({ id, cliente: cliName.toUpperCase(), whatsapp: wha, items: [...window.cart], total, abono, fecha });
        
        await window.sync();
        window.cart = [];
        showReceipt(id);
    };

    window.saveCompra = async () => {
        const m = document.getElementById("cMat").value, c = parseFloat(document.getElementById("cCant").value), co = parseFloat(document.getElementById("cCosto").value);
        if(m && c) {
            window.state.inventario[m].stock += c;
            if(document.getElementById("cVentaM2").value) window.state.inventario[m].precioM2 = parseFloat(document.getElementById("cVentaM2").value);
            if(document.getElementById("cVentaML").value) window.state.inventario[m].precioML = parseFloat(document.getElementById("cVentaML").value);
            if(!window.state.compras) window.state.compras = [];
            window.state.compras.push({ m, c, co, f: new Date().toISOString() });
            await window.sync();
        }
    };

    window.saveGasto = async () => {
        const d = document.getElementById("gDesc").value, m = parseFloat(document.getElementById("gMonto").value), f = document.getElementById("gDate").value;
        if(d && m) { if(!window.state.gastos) window.state.gastos = []; window.state.gastos.push({ desc: d, monto: m, fecha: f }); await window.sync(); }
    };

    window.crearMat = async () => {
        const n = document.getElementById("nMat").value.toUpperCase(), a = parseFloat(document.getElementById("aMat").value);
        if(n && a) { if(!window.state.inventario) window.state.inventario = {}; window.state.inventario[n] = { stock: 0, precioM2: 0, precioML: 0, ancho: a }; await window.sync(); }
    };

    window.crearServicio = async () => {
        const s = document.getElementById("nServ").value.toUpperCase();
        if(s) { if(!window.state.servicios) window.state.servicios = [...SERVICIOS_DEFECTO]; window.state.servicios.push(s); await window.sync(); }
    };

    window.liquidar = async (id) => {
        const v = window.state.ventas.find(x => x.id === id);
        if(confirm("¿Liquidar deuda completa?")) { v.abono = v.total; await window.sync(); }
    };

    window.editStock = async (m) => {
        let n = parseFloat(prompt(`NUEVO STOCK PARA ${m}:`, window.state.inventario[m].stock));
        if(!isNaN(n)) { window.state.inventario[m].stock = n; await window.sync(); }
    };

    window.showReceipt = (id) => {
        const v = window.state.ventas.find(x => x.id === id);
        document.getElementById("receiptContent").innerHTML = `
            <div class="flex justify-between font-bold border-b border-black mb-2"><span>#${v.id.toString().slice(-6)}</span><span>${v.fecha}</span></div>
            <p class="font-black uppercase">${v.cliente}</p>
            <div class="border-y border-dashed border-black my-4 py-2">
                ${v.items.map(i => `<div class="flex justify-between"><span>${i.m} (${i.t})</span><span>$${i.p.toFixed(2)}</span></div>`).join("")}
            </div>
            <div class="flex justify-between font-black text-lg"><span>TOTAL:</span><span>$${v.total.toFixed(2)}</span></div>
            <div class="flex justify-between"><span>PAGADO:</span><span>$${v.abono.toFixed(2)}</span></div>
            <div class="flex justify-between text-red-600 font-black border-t border-black"><span>DEBE:</span><span>$${(v.total - v.abono).toFixed(2)}</span></div>
        `;
        window.currentReceiptId = id;
        document.getElementById("receiptModal").classList.remove("hidden");
    };

    window.closeReceipt = () => document.getElementById("receiptModal").classList.add("hidden");
    window.shareReceipt = () => {
        const v = window.state.ventas.find(x => x.id === window.currentReceiptId);
        const txt = `*GHOST PRINT*%0A*Cliente:* ${v.cliente}%0A*Total:* $${v.total}%0A*Debe:* $${v.total-v.abono}`;
        window.open(`https://wa.me/${v.whatsapp}?text=${txt}`, '_blank');
    };

    render();
</script>
</body>
</html>
