<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GhostPrint MASTER v28.9.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { background-color: #030308; color: #f8fafc; font-family: 'Inter', sans-serif; padding-bottom: 100px; }
        .card-pro { background: #111122; border: 1px solid #2d2d44; border-radius: 20px; padding: 18px; margin-bottom: 12px; }
        nav { background: rgba(10, 10, 20, 0.95); display: flex; gap: 8px; overflow-x: auto; padding: 14px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #334155; }
        .btn-nav { background: #1e1e30; color: #64748b; padding: 12px 18px; border-radius: 14px; font-size: 10px; font-weight: 800; white-space: nowrap; cursor: pointer; text-transform: uppercase; }
        .active { background: #7c3aed !important; color: white !important; }
        input, select { background: #070712; border: 1px solid #334155; color: white; padding: 16px; border-radius: 14px; width: 100%; margin: 8px 0; font-size: 16px; font-weight: 700; outline: none; }
        .btn-main { background: linear-gradient(135deg, #7c3aed 0%, #4c1d95 100%); color: white; padding: 18px; border-radius: 18px; width: 100%; font-weight: 900; text-transform: uppercase; cursor: pointer; border: none; font-size: 14px; }
        .ghost-glow { filter: drop-shadow(0 0 10px #7c3aed); }
    </style>
</head>
<body>

<div class="p-4 flex justify-between items-center bg-[#0a0a14] border-b border-white/5">
    <div class="flex items-center gap-3">
        <span class="text-4xl ghost-glow">👻</span>
        <div>
            <h1 class="text-xl font-black italic text-purple-500 leading-none">GHOST PRINT</h1>
            <p class="text-[8px] font-black opacity-40 uppercase tracking-widest text-purple-300">Master Suite v28.9.1</p>
        </div>
    </div>
</div>

<nav id="mainNav">
    <div onclick="setView('inicio')" class="btn-nav active" id="n-inicio">📊 CONTROL</div>
    <div onclick="setView('ventas')" class="btn-nav" id="n-ventas">💵 Ventas</div>
    <div onclick="setView('cobrar')" class="btn-nav" id="n-cobrar">📑 POR COBRAR</div>
    <div onclick="setView('compras')" class="btn-nav" id="n-compras">🛒 Compras</div>
    <div onclick="setView('gastos')" class="btn-nav" id="n-gastos">💸 Gastos</div>
    <div onclick="setView('inventario')" class="btn-nav" id="n-inventario">📦 Stock</div>
    <div onclick="setView('catalogo')" class="btn-nav" id="n-catalogo">⚙️ CATALOGO</div>
</nav>

<div id="app" class="p-4 max-w-2xl mx-auto"></div>

<div id="receiptModal" class="fixed inset-0 bg-black/90 z-[200] hidden flex items-center justify-center p-4">
    <div class="bg-white text-black p-6 rounded-2xl w-full max-w-sm shadow-2xl relative">
        <div id="receiptContent" class="text-[11px] font-mono border-t border-dashed border-black pt-4"></div>
        <div class="mt-6 flex gap-2 no-print">
            <button onclick="closeReceipt()" class="flex-1 bg-gray-200 p-3 rounded-xl font-bold">Cerrar</button>
            <button onclick="shareReceipt()" class="flex-1 bg-purple-600 text-white p-3 rounded-xl font-bold">WhatsApp</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI", authDomain: "ghost-print-contabilidad.firebaseapp.com", projectId: "ghost-print-contabilidad", storageBucket: "ghost-print-contabilidad.firebasestorage.app", messagingSenderId: "867057362556", appId: "1:867057362556:web:6bd2a461817219a4000bf9" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const docRef = db.collection("sistema").doc("datos_principales");

    const SERVICIOS_DEFECTO = ["DISEÑO", "IMPRESIÓN", "DISEÑO E IMPRESIÓN", "INSTALACIÓN", "POP", "ROTULACIÓN", "LAMINADO", "IMPRESIÓN Y CORTE"];
    window.state = { ventas: [], inventario: {}, compras: [], gastos: [], servicios: SERVICIOS_DEFECTO };
    window.currentView = 'inicio';
    window.cart = [];

    window.sync = async function() { await docRef.set(window.state); render(); };
    docRef.onSnapshot(doc => { if(doc.exists) { window.state = doc.data(); render(); } });

    window.setView = function(v) { 
        window.currentView = v; 
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active')); 
        document.getElementById('n-'+v)?.classList.add('active'); 
        if(v === 'ventas') window.cart = []; 
        render(); 
    };

    window.render = function() {
        const app = document.getElementById("app");
        const inv = window.state.inventario || {};
        const serv = window.state.servicios || SERVICIOS_DEFECTO;
        const today = new Date().toISOString().split('T')[0];

        if(window.currentView === 'inicio') {
            const vM = window.state.ventas || [];
            const gM = window.state.gastos || [];
            const tV = vM.reduce((a,b) => a + (Number(b.total) || 0), 0);
            const tA = vM.reduce((a,b) => a + (Number(b.abono) || 0), 0);
            const tG = gM.reduce((a,b) => a + (Number(b.monto) || 0), 0);
            app.innerHTML = `
                <div class="card-pro text-center border-green-500/30">
                    <p class="text-[10px] opacity-60 uppercase font-black">Caja Real</p>
                    <h2 class="text-5xl font-black text-green-400">$${(tA - tG).toFixed(2)}</h2>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="card-pro text-center"><p class="text-[9px] opacity-40 uppercase">Facturado</p><h2 class="text-2xl font-black text-purple-500">$${tV.toFixed(2)}</h2></div>
                    <div class="card-pro text-center"><p class="text-[9px] opacity-40 uppercase">Por Cobrar</p><h2 class="text-2xl font-black text-red-500">$${(tV - tA).toFixed(2)}</h2></div>
                </div>
            `;
        }

        else if(window.currentView === 'ventas') {
            app.innerHTML = `
                <div class="card-pro">
                    <h2 class="text-xl font-black italic text-purple-500 mb-6 uppercase text-center">Punto de Venta</h2>
                    <input id="vDate" type="date" value="${today}" class="mb-4">
                    <div class="grid grid-cols-2 gap-2 mb-4">
                        <input id="cli" placeholder="CLIENTE" class="!m-0 uppercase" value="${window.pCli || ''}" oninput="window.pCli = this.value">
                        <input id="wha" type="tel" placeholder="WHA" class="!m-0" value="${window.pWha || ''}" oninput="window.pWha = this.value">
                    </div>
                    <div class="bg-white/5 p-4 rounded-2xl border border-white/10">
                        <select id="vMat" onchange="updateVentaUI()">
                            <option value="">-- ITEM --</option>
                            <optgroup label="MATERIALES">${Object.keys(inv).map(m=>`<option value="${m}">${m}</option>`).join("")}</optgroup>
                            <optgroup label="SERVICIOS">${serv.map(s=>`<option value="${s}">${s}</option>`).join("")}</optgroup>
                        </select>
                        <div class="flex gap-2">
                            <select id="vModo" onchange="updateVentaUI()">
                                <option value="detal">DETAL</option>
                                <option value="mayor">MAYOR</option>
                                <option value="libre">LIBRE</option>
                            </select>
                            <input id="vCant" type="number" placeholder="CANT" oninput="updateVentaUI()">
                        </div>
                        <input id="vPrec" type="number" placeholder="PRECIO TOTAL $" class="text-purple-400 font-black text-xl">
                        <button onclick="addItem()" class="btn-main !py-3 mt-2">+ AGREGAR</button>
                    </div>
                    <div id="vLista" class="mt-4 space-y-2">
                        ${window.cart.map((item, idx) => `
                            <div class="flex justify-between items-center bg-white/5 p-3 rounded-xl">
                                <div class="text-[11px]"><b>${item.m}</b> (x${item.c})</div>
                                <div class="flex items-center gap-3"><b>$${item.p.toFixed(2)}</b><button onclick="removeItem(${idx})" class="text-red-500 font-bold">✕</button></div>
                            </div>
                        `).join("")}
                    </div>
                    <div class="text-5xl font-black text-center my-6 text-white">$${window.cart.reduce((a,b)=>a+b.p, 0).toFixed(2)}</div>
                    <input id="vAbono" type="number" placeholder="ABONO $" class="text-center text-green-500 text-2xl border-green-500/20">
                    <button onclick="saveVenta()" class="btn-main mt-4">FINALIZAR VENTA</button>
                </div>
            `;
        }

        else if(window.currentView === 'compras') {
            app.innerHTML = `
                <div class="card-pro">
                    <h2 class="text-lg font-black italic text-blue-400 mb-4 uppercase text-center">Configurar Precios y Stock</h2>
                    <select id="cMat"><option value="">-- SELECCIONAR --</option>${Object.keys(inv).map(m=>`<option value="${m}">${m}</option>`).join("")}</select>
                    <input id="cCant" type="number" placeholder="SUMAR AL STOCK">
                    <div class="grid grid-cols-2 gap-2">
                        <input id="cVentaDetal" type="number" placeholder="PRECIO DETAL ($)">
                        <input id="cVentaMayor" type="number" placeholder="PRECIO MAYOR ($)">
                    </div>
                    <button onclick="saveCompra()" class="btn-main !bg-blue-600 mt-4">GUARDAR</button>
                </div>
            `;
        }

        else if(window.currentView === 'cobrar') renderPorCobrar(app);
        else if(window.currentView === 'gastos') renderGastos(app, today);
        else if(window.currentView === 'inventario') renderInventario(app, inv);
        else if(window.currentView === 'catalogo') renderCatalogo(app, inv, serv);
    };

    window.updateVentaUI = () => {
        const m = document.getElementById("vMat").value;
        const modo = document.getElementById("vModo").value;
        const c = parseFloat(document.getElementById("vCant").value) || 0;
        const info = window.state.inventario[m];
        if(info && modo !== "libre") {
            let pUnit = (modo === "detal") ? (info.precioDetal || 0) : (info.precioMayor || 0);
            document.getElementById("vPrec").value = (pUnit * c).toFixed(2);
        }
    };

    window.addItem = () => {
        const m = document.getElementById("vMat").value;
        const p = parseFloat(document.getElementById("vPrec").value) || 0;
        const c = parseFloat(document.getElementById("vCant").value) || 0;
        const modo = document.getElementById("vModo").value;
        if(m && p) {
            window.cart.push({ m, p, c, modo: modo.toUpperCase() });
            render();
        }
    };

    window.removeItem = (idx) => { window.cart.splice(idx, 1); render(); };

    window.saveVenta = async () => {
        const cli = document.getElementById("cli").value.trim();
        if(!cli || !window.cart.length) return;
        const abono = parseFloat(document.getElementById("vAbono").value) || 0;
        const total = window.cart.reduce((a,b)=>a+b.p,0);
        const id = Date.now();
        window.cart.forEach(i => { if(window.state.inventario[i.m]) window.state.inventario[i.m].stock -= i.c; });
        window.state.ventas.push({ id, cliente: cli.toUpperCase(), whatsapp: document.getElementById("wha").value, items: [...window.cart], total, abono, fecha: document.getElementById("vDate").value });
        await window.sync();
        showReceipt(id);
        window.cart = []; window.pCli = ""; window.pWha = "";
    };

    window.saveCompra = async () => {
        const m = document.getElementById("cMat").value;
        const c = parseFloat(document.getElementById("cCant").value) || 0;
        if(m) {
            window.state.inventario[m].stock += c;
            const pd = parseFloat(document.getElementById("cVentaDetal").value);
            const pm = parseFloat(document.getElementById("cVentaMayor").value);
            if(pd) window.state.inventario[m].precioDetal = pd;
            if(pm) window.state.inventario[m].precioMayor = pm;
            await window.sync();
            alert("Actualizado");
        }
    };

    function renderPorCobrar(app) {
        const ventas = window.state.ventas || [];
        const deudores = ventas.filter(v => (v.total - v.abono) > 0.01);
        app.innerHTML = `<h2 class="text-red-500 font-black mb-4 uppercase">Por Cobrar</h2>` + 
            deudores.map(v => `<div class="card-pro flex justify-between">
                <span><b>${v.cliente}</b></span>
                <div class="text-right">
                    <b class="text-red-500">$${(v.total - v.abono).toFixed(2)}</b><br>
                    <button onclick="liquidar(${v.id})" class="text-[9px] text-green-500">LIQUIDAR</button>
                </div>
            </div>`).join("");
    }
    window.liquidar = async (id) => {
        const v = window.state.ventas.find(x => x.id === id);
        if(v) { v.abono = v.total; await window.sync(); }
    };

    function renderGastos(app, today) {
        app.innerHTML = `<div class="card-pro"><h2 class="text-red-500 font-black">GASTOS</h2>
        <input id="gD" placeholder="DESC"><input id="gM" type="number" placeholder="$">
        <button onclick="sG()" class="btn-main !bg-red-600">GUARDAR</button></div>`;
    }
    window.sG = async () => {
        const d = document.getElementById("gD").value, m = parseFloat(document.getElementById("gM").value);
        if(d && m) { window.state.gastos.push({ desc: d.toUpperCase(), monto: m, fecha: new Date().toISOString().split('T')[0] }); await window.sync(); }
    };

    function renderInventario(app, inv) {
        app.innerHTML = Object.entries(inv).map(([n, i]) => `<div class="card-pro flex justify-between">
            <span>${n}</span><b>${i.stock.toFixed(2)}</b>
        </div>`).join("");
    }

    function renderCatalogo(app, inv, serv) {
        app.innerHTML = `<div class="card-pro"><input id="nMat" placeholder="NUEVO MATERIAL"><button onclick="cM()" class="btn-main">+ REGISTRAR</button></div>`;
    }
    window.cM = async () => {
        const n = document.getElementById("nMat").value.toUpperCase();
        if(n) { window.state.inventario[n] = { stock: 0, precioDetal: 0, precioMayor: 0 }; await window.sync(); }
    };

    window.showReceipt = (id) => {
        const v = window.state.ventas.find(x => x.id === id);
        document.getElementById("receiptContent").innerHTML = `
            <div class="text-center font-black">GHOST PRINT</div>
            <div class="flex justify-between border-b border-black text-[9px]"><span>#${id.toString().slice(-6)}</span><span>${v.fecha}</span></div>
            <p class="font-black uppercase mt-2">${v.cliente}</p>
            <div class="border-y border-dashed border-black my-2 py-2">
                ${v.items.map(i => `<div class="flex justify-between"><span>${i.m} (x${i.c})</span><span>$${i.p.toFixed(2)}</span></div>`).join("")}
            </div>
            <div class="flex justify-between font-black"><span>TOTAL:</span><span>$${v.total.toFixed(2)}</span></div>
            <div class="flex justify-between"><span>ABONO:</span><span>$${v.abono.toFixed(2)}</span></div>
            <div class="flex justify-between text-red-600 font-black border-t border-black"><span>DEBE:</span><span>$${(v.total - v.abono).toFixed(2)}</span></div>
        `;
        window.cId = id;
        document.getElementById("receiptModal").classList.remove("hidden");
    };
    window.closeReceipt = () => document.getElementById("receiptModal").classList.add("hidden");
    window.shareReceipt = () => {
        const v = window.state.ventas.find(x => x.id === window.cId);
        const txt = `*GHOST PRINT*%0ACliente: ${v.cliente}%0ATotal: $${v.total}%0ADebe: $${(v.total-v.abono).toFixed(2)}`;
        window.open(`https://wa.me/${v.whatsapp}?text=${txt}`);
    };

    render();
</script>
</body>
</html>
