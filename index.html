<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostPrint ERP v3 - Total Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d0d1a; color: #e2e8f0; font-family: system-ui; padding-bottom: 96px; }
        .btn { background: #6d28d9; color: white; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 700; border: none; text-transform: uppercase; font-size: 10px; }
        .card { background: white; padding: 20px; margin: 12px 0; border-radius: 20px; color: #1e293b; box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        input, select { border: 1px solid #e2e8f0; padding: 12px; margin: 8px 0; border-radius: 12px; width: 100%; background: #f8fafc; color: #1e293b; font-weight: 600; }
        label { font-size: 10px; color: #64748b; font-weight: 800; text-transform: uppercase; display: block; margin-top: 8px; }
        header { background: #1e1b4b; color: white; padding: 16px; position: sticky; top: 0; z-index: 50; border-bottom: 2px solid #6d28d9; }
        nav { padding: 8px; display: flex; gap: 8px; overflow-x: auto; background: rgba(0,0,0,0.5); position: sticky; top: 60px; z-index: 40; }
    </style>
</head>
<body>

<header>
    <h1 class="text-xl font-black italic">GHOSTPRINT ERP</h1>
    <p id="sync-status" class="text-[9px] text-amber-300">CONECTANDO...</p>
</header>

<nav>
    <button onclick="setView('dashboard')" class="btn">🏠 Inicio</button>
    <button onclick="setView('ventas')" class="btn !bg-green-600">💵 Vender</button>
    <button onclick="setView('cobranzas')" class="btn !bg-amber-500">⏳ Cobros</button>
    <button onclick="setView('config')" class="btn !bg-slate-700">⚙️ Catálogo</button>
</nav>

<div id="app" class="p-4 max-w-4xl mx-auto"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI",
    authDomain: "ghost-print-contabilidad.firebaseapp.com",
    projectId: "ghost-print-contabilidad",
    storageBucket: "ghost-print-contabilidad.firebasestorage.app",
    messagingSenderId: "867057362556",
    appId: "1:867057362556:web:6bd2a461817219a4000bf9"
};

const appF = initializeApp(firebaseConfig);
const db = getFirestore(appF);
const docRef = doc(db, "sistema", "datos_principales");

window.state = { ventas: [], gastos: [], inventario: {}, serviciosExtra: [] };
window.view = "dashboard";
let carritoVenta = [];

onSnapshot(docRef, (snap) => {
    if (snap.exists()) { 
        window.state = snap.data();
        // Proteccion contra datos nulos
        if (!window.state.inventario) window.state.inventario = {};
        if (!window.state.serviciosExtra) window.state.serviciosExtra = [];
        if (!window.state.ventas) window.state.ventas = [];
        
        document.getElementById("sync-status").innerText = "CONECTADO ✓"; 
        render(); 
    }
});

window.save = async () => { await setDoc(docRef, window.state); };
window.setView = (v) => { window.view = v; render(); };

window.render = function() {
    const app = document.getElementById("app");
    if(!app) return;
    let html = "";
    const mesIdx = new Date().getMonth();

    if(window.view === "dashboard"){
        const vM = (window.state.ventas || []).filter(v => new Date(v.id).getMonth() === mesIdx).reduce((a,b)=>a+b.total,0);
        html = `<div class="card"><h2 class="text-slate-400 font-bold text-xs uppercase">Ventas Abril</h2><b class="text-4xl text-green-600">$${vM.toFixed(2)}</b></div>`;
    }

    if(window.view === "ventas"){
        html = `<div class="card">
            <h2 class="font-black mb-4 uppercase text-purple-700">Nueva Venta</h2>
            <label>Nombre Cliente</label><input id="cliV" placeholder="Ej: Juan Pérez">
            
            <div class="grid grid-cols-2 gap-2">
                <div>
                    <label>Material</label>
                    <select id="pSel"><option value="">-- Ninguno --</option>${Object.keys(window.state.inventario).map(p=>`<option value="${p}">${p}</option>`).join("")}</select>
                </div>
                <div>
                    <label>Servicio</label>
                    <select id="sSel"><option value="">-- Ninguno --</option>${window.state.serviciosExtra.map(s=>`<option value="${s}">${s}</option>`).join("")}</select>
                </div>
            </div>

            <label>Tipo de Tarifa</label>
            <select id="tCli" onchange="document.getElementById('divLibre').style.display = (this.value==='libre'?'block':'none')">
                <option value="detal">Tarifa Detal ($9)</option>
                <option value="mayor">Tarifa Mayor ($10)</option>
                <option value="libre">Tarifa Libre (Manual)</option>
            </select>

            <div id="divLibre" style="display:none" class="bg-amber-50 p-2 rounded-lg border border-amber-200 mt-2">
                <label>Precio por Metro/Unidad $</label>
                <input id="pMan" type="number" step="0.01" value="0">
            </div>

            <label>Cantidad / Metros</label>
            <input id="cQty" type="number" step="0.01" value="1">

            <button onclick="addItemCarrito()" class="btn w-full !bg-indigo-600 mt-4 shadow-lg">+ AGREGAR ITEM</button>
            
            <div class="mt-4 border-t pt-2">
                ${carritoVenta.map((v,i)=>`<div class="flex justify-between py-2 border-b text-sm"><span><b>${v.qty}x</b> ${v.nombre}</span><b>$${v.sub.toFixed(2)}</b></div>`).join("")}
            </div>
            
            <div class="p-4 bg-slate-900 text-white text-center font-black mt-4 rounded-2xl text-2xl">TOTAL: $${carritoVenta.reduce((a,b)=>a+b.sub,0).toFixed(2)}</div>
            <button onclick="procesarV()" class="btn w-full !bg-green-600 mt-4 py-4 text-sm shadow-xl">FINALIZAR VENTA</button>
        </div>`;
    }

    if(window.view === "cobranzas"){
        html = `<h2 class="font-bold text-white mb-4">PENDIENTES</h2>${window.state.ventas.filter(v=>!v.pagado).reverse().map(v=>`<div class="card flex justify-between items-center"><div><b>${v.cliente}</b><br><span class="text-red-500 font-bold">$${(v.total-(v.abonado||0)).toFixed(2)}</span></div><button onclick="abonarV(${v.id})" class="btn !bg-blue-600 !p-2 text-[8px]">ABONAR</button></div>`).join("")}`;
    }

    if(window.view === "config"){
        html = `<div class="card">
            <label>Registrar Material</label><input id="nP" placeholder="Ej: VINIL">
            <button onclick="addC('p')" class="btn w-full !bg-blue-600 mt-2">Guardar</button>
            <hr class="my-6">
            <label>Registrar Servicio</label><input id="nS" placeholder="Ej: DISEÑO">
            <button onclick="addC('s')" class="btn w-full !bg-purple-600 mt-2">Guardar</button>
        </div>`;
    }

    app.innerHTML = html;
};

window.addItemCarrito = () => {
    const p = document.getElementById("pSel").value;
    const s = document.getElementById("sSel").value;
    const t = document.getElementById("tCli").value;
    const q = parseFloat(document.getElementById("cQty").value) || 0;
    
    if(q <= 0) return alert("Cantidad no válida");

    let nombre = (p && s) ? `${p} + ${s}` : (p || s || "Venta");
    let pre = 0;

    if(t === "libre") {
        pre = parseFloat(document.getElementById("pMan").value) || 0;
    } else {
        // LÓGICA DE PRECIOS: Si hay material seleccionado, aplica 9 o 10.
        pre = (p) ? (t === "mayor" ? 10 : 9) : 12;
    }

    carritoVenta.push({ nombre: nombre.toUpperCase(), qty: q, sub: q * pre });
    render();
};

window.procesarV = async () => {
    const c = document.getElementById("cliV").value;
    if(!c || carritoVenta.length === 0) return alert("Falta cliente o productos");
    window.state.ventas.push({ id: Date.now(), cliente: c.toUpperCase(), total: carritoVenta.reduce((a,b)=>a+b.sub,0), abonado:0, pagado:false, items: [...carritoVenta] });
    carritoVenta = [];
    await window.save();
    setView('dashboard');
};

window.addC = async (type) => {
    if(type === 'p') {
        const n = document.getElementById("nP").value.toUpperCase();
        if(n) window.state.inventario[n] = { stock: 0, costo: 0 };
    } else {
        const n = document.getElementById("nS").value.toUpperCase();
        if(n) window.state.serviciosExtra.push(n);
    }
    await window.save();
    render();
};

window.abonarV = async (id) => {
    let v = window.state.ventas.find(x=>x.id===id);
    let m = parseFloat(prompt("¿Cuánto abona?"));
    if(m) { 
        v.abonado = (v.abonado || 0) + m; 
        if(v.abonado >= v.total) v.pagado = true; 
        await window.save(); render(); 
    }
};

render();
</script>
</body>
</html>
