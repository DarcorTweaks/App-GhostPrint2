<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostPrint ERP v12.4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0a14; color: #e2e8f0; font-family: system-ui; padding-bottom: 100px; }
        header { background: linear-gradient(to right, #4c1d95, #000); padding: 15px; position: relative; border-bottom: 3px solid #6d28d9; }
        nav { background: #1e1e2f; display: flex; gap: 8px; overflow-x: auto; padding: 10px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #4c1d95; }
        .btn { background: #6d28d9; color: white; padding: 10px 14px; border-radius: 12px; font-size: 10px; font-weight: 800; text-transform: uppercase; white-space: nowrap; cursor: pointer; border:none; }
        .card { background: white; padding: 18px; margin: 12px 0; border-radius: 20px; color: #1e293b; shadow: 0 10px 25px rgba(0,0,0,0.5); }
        input, select { border: 2px solid #e2e8f0; padding: 10px; margin: 5px 0; border-radius: 10px; width: 100%; font-weight: 700; color: #0f172a; background: #f8fafc; }
        #status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body>

<header>
    <h1 class="text-xl font-black italic text-purple-400 text-center uppercase tracking-widest">GhostPrint v12.4</h1>
    <div id="conn-status" class="absolute top-4 right-4 text-[9px] font-bold flex items-center bg-black/40 px-2 py-1 rounded-full">
        <span id="status-dot" class="bg-red-500 animate-pulse"></span> <span id="status-text">OFFLINE</span>
    </div>
</header>

<nav>
    <button onclick="setView('dashboard')" class="btn">🏠 Inicio</button>
    <button onclick="setView('ventas')" class="btn !bg-green-600">💵 Vender</button>
    <button onclick="setView('reportes')" class="btn !bg-indigo-600">📊 Reportes</button>
    <button onclick="setView('compras')" class="btn !bg-blue-600">📦 Stock</button>
    <button onclick="setView('gastos')" class="btn !bg-red-600">📉 Gastos</button>
    <button onclick="setView('cobranzas')" class="btn !bg-amber-500">⏳ Cobros</button>
    <button onclick="setView('config')" class="btn !bg-slate-700">⚙️ Catálogo</button>
</nav>

<div id="app" class="p-4 max-w-2xl mx-auto"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI",
    authDomain: "ghost-print-contabilidad.firebaseapp.com",
    projectId: "ghost-print-contabilidad",
    storageBucket: "ghost-print-contabilidad.firebasestorage.app",
    messagingSenderId: "867057362556",
    appId: "1:867057362556:web:6bd2a461817219a4000bf9"
};

const appF = initializeApp(firebaseConfig);
const db = getFirestore(appF);
const docRef = doc(db, "sistema", "datos_principales");

window.state = { ventas: [], gastos: [], inventario: {}, serviciosExtra: [], comprasInversion: [] };
window.view = "dashboard";
let fHoy = new Date().toLocaleDateString('en-CA');

const esEsteMes = (id) => {
    if(!id) return false;
    const d = new Date(id);
    const hoy = new Date();
    return d.getMonth() === hoy.getMonth() && d.getFullYear() === hoy.getFullYear();
};

window.save = async () => { 
    try {
        await setDoc(docRef, window.state); 
    } catch (e) { alert("Error al guardar: " + e.message); }
};

window.setView = (v) => { window.view = v; render(); };

// DETECTOR DE CONEXIÓN
onSnapshot(docRef, (snap) => {
    const dot = document.getElementById("status-dot");
    const text = document.getElementById("status-text");
    if (snap.exists()) { 
        window.state = snap.data(); 
        dot.classList.replace("bg-red-500", "bg-green-500");
        dot.classList.remove("animate-pulse");
        text.innerText = "NUBE OK";
        render(); 
    }
}, (error) => {
    document.getElementById("status-text").innerText = "ERROR DE LLAVES";
});

window.render = function() {
    let app = document.getElementById("app");
    if(!app) return;
    let html = "";

    if(window.view === "dashboard"){
        let vM = (window.state.ventas || []).filter(i => esEsteMes(i.id));
        let gM = (window.state.gastos || []).filter(i => esEsteMes(i.id));
        let cM = (window.state.comprasInversion || []).filter(i => esEsteMes(i.id));
        
        let tV = vM.reduce((a,b)=>a+(b.total||0),0);
        let tG = gM.reduce((a,b)=>a+(b.amount||0),0);
        let tI = cM.reduce((a,b)=>a+(b.amount||0),0);
        let ganancia = tV - tG - tI;

        html = `
        <div class="card !bg-slate-900 text-white border-b-8 ${ganancia >= 0 ? 'border-green-500' : 'border-red-500'}">
            <p class="text-[10px] uppercase font-black text-purple-400 italic">Ganancia Neta (Mes Actual)</p>
            <h2 class="text-5xl font-black italic">$${ganancia.toFixed(2)}</h2>
        </div>
        <div class="grid grid-cols-3 gap-2 mt-4 text-center">
            <div class="bg-white p-3 rounded-2xl shadow-lg border-t-4 border-green-500">
                <p class="text-[8px] font-black text-slate-400">VENTAS</p>
                <b class="text-xl text-slate-800">$${tV.toFixed(2)}</b>
            </div>
            <div class="bg-white p-3 rounded-2xl shadow-lg border-t-4 border-red-500">
                <p class="text-[8px] font-black text-slate-400">GASTOS</p>
                <b class="text-xl text-slate-800">$${tG.toFixed(2)}</b>
            </div>
            <div class="bg-white p-3 rounded-2xl shadow-lg border-t-4 border-blue-500">
                <p class="text-[8px] font-black text-slate-400">INVERSIÓN</p>
                <b class="text-xl text-slate-800">$${tI.toFixed(2)}</b>
            </div>
        </div>`;
    }

    if(window.view === "ventas"){
        html = `<div class="card"><h2 class="font-black text-green-600 border-b mb-2 italic">GENERAR VENTA</h2>
            <input type="date" id="fV" value="${fHoy}">
            <input id="cli" placeholder="NOMBRE DEL CLIENTE">
            <input id="tel" type="number" placeholder="WHATSAPP">
            <div class="bg-slate-100 p-3 rounded-xl border-2 border-slate-200 mt-2">
                <div class="grid grid-cols-2 gap-2">
                    <select id="pS"><option value="">- Material -</option>${Object.keys(window.state.inventario || {}).map(p=>`<option value="${p}">${p}</option>`).join("")}</select>
                    <select id="sS"><option value="">- Servicio -</option>${(window.state.serviciosExtra || []).map(s=>`<option value="${s}">${s}</option>`).join("")}</select>
                </div>
                <select id="tC" onchange="document.getElementById('pL').classList.toggle('hidden', this.value!=='libre')">
                    <option value="detal">DETAL ($9)</option><option value="mayor">MAYOR ($10)</option><option value="libre">PRECIO LIBRE</option>
                </select>
                <input id="pL" class="hidden" type="number" placeholder="Precio manual $">
                <div class="flex gap-2 mt-1"><input id="q" type="number" value="1" step="0.1"><button onclick="addItem()" class="btn !bg-blue-600 w-full">+ AÑADIR</button></div>
            </div>
            <div id="cartDetail" class="mt-4 border-t pt-2 text-[11px] font-bold text-slate-500 italic">Carrito Vacío</div>
            <div id="tV" class="bg-slate-800 text-white p-3 text-center text-3xl font-black rounded-xl mt-2 italic shadow-lg">TOTAL: $0.00</div>
            <button onclick="saveVenta()" class="btn w-full !bg-green-600 py-5 mt-2 font-black shadow-xl">GUARDAR Y REGISTRAR</button>
        </div>`;
    }

    if(window.view === "reportes"){
        let vM = (window.state.ventas || []).filter(i => esEsteMes(i.id));
        let clientes = {};
        vM.forEach(v => { clientes[v.cliente] = (clientes[v.cliente] || 0) + v.total; });
        let top = Object.entries(clientes).sort((a,b) => b[1] - a[1]).slice(0, 5);

        html = `<div class="card bg-indigo-900 text-white text-center py-2"><h2 class="font-black italic">TOP VENTAS DEL MES</h2></div>
        <div class="card">
            ${top.map(([n, t]) => `<div class="flex justify-between py-2 border-b font-bold text-sm"><span>${n}</span><span class="text-indigo-600 font-black">$${t.toFixed(2)}</span></div>`).join("") || '<p class="text-center italic opacity-50">Nada que mostrar</p>'}
        </div>`;
    }

    if(window.view === "config"){
        html = `<div class="card"><h2 class="font-black border-b mb-4 uppercase text-xs">Ajustes del Sistema</h2>
            <div class="flex gap-2"><input id="nP" placeholder="MATERIAL"><button onclick="cat('p')" class="btn">ADD</button></div>
            <div class="flex gap-2 mt-2"><input id="nS" placeholder="SERVICIO"><button onclick="cat('s')" class="btn !bg-purple-600">ADD</button></div>
            <button onclick="wipeOut()" class="btn !bg-red-700 w-full mt-10 p-4">BORRAR DATOS BASURA Y RESETEAR</button>
        </div>`;
    }

    app.innerHTML = html;
};

// --- LÓGICA DE NEGOCIO ---
let cart = [];
window.addItem = () => {
    let p = document.getElementById("pS").value, s = document.getElementById("sS").value, t = document.getElementById("tC").value, q = parseFloat(document.getElementById("q").value) || 0;
    let pre = (t === "detal") ? 9 : (t === "mayor") ? 10 : parseFloat(document.getElementById("pL").value) || 0;
    if(p || s) cart.push({ item: (p && s ? p+" + "+s : p||s).toUpperCase(), qty: q, price: pre, sub: q*pre });
    
    document.getElementById("cartDetail").innerHTML = "PEDIDO ACTUAL:<br>" + cart.map((c, i) => `
        <div class="flex justify-between border-b py-2 text-slate-800 uppercase">
            <span>${c.qty}x ${c.item}</span>
            <b>$${c.sub.toFixed(2)} <button onclick="delItem(${i})" class="text-red-500 ml-2 text-lg">×</button></b>
        </div>`).join("");
    document.getElementById("tV").innerText = "TOTAL: $" + cart.reduce((a,b)=>a+b.sub,0).toFixed(2);
};

window.delItem = (i) => { cart.splice(i, 1); addItem(); if(!cart.length) document.getElementById("cartDetail").innerText="Carrito Vacío"; };

window.saveVenta = async () => {
    let cli = document.getElementById("cli").value, tel = document.getElementById("tel").value, fec = document.getElementById("fV").value;
    if(!cli || !cart.length) return alert("Falta cliente o productos");
    window.state.ventas.push({ id: new Date(fec+"T12:00:00").getTime(), cliente: cli.toUpperCase(), telefono: tel, total: cart.reduce((a,b)=>a+b.sub,0), pagado: false });
    await window.save(); cart = []; setView('dashboard');
};

window.cat = async (t) => { 
    let val = document.getElementById(t==='p'?'nP':'nS').value.toUpperCase();
    if(!val) return;
    if(t==='p') { if(!window.state.inventario) window.state.inventario={}; window.state.inventario[val]={stock:0}; }
    else { if(!window.state.serviciosExtra) window.state.serviciosExtra=[]; window.state.serviciosExtra.push(val); }
    await window.save(); render();
};

window.wipeOut = async () => {
    if(confirm("¿RESET TOTAL? Esto limpia los $12.60 y todo lo demás.")){
        window.state.ventas = []; window.state.gastos = []; window.state.comprasInversion = [];
        await window.save(); setView('dashboard');
    }
};

render();
</script>
</body>
</html>
