<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GhostPrint MASTER v31.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        
        :root {
            --ghost-purple: #8b5cf6;
            --ghost-dark: #05050a;
            --ghost-card: rgba(15, 15, 30, 0.7);
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        body { 
            background-color: var(--ghost-dark); 
            color: #f8fafc; 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 0% 100%, rgba(139, 92, 246, 0.05) 0%, transparent 40%);
        }

        /* App Header */
        .app-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(5, 5, 10, 0.8);
            backdrop-filter: blur(20px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 75px;
            background: rgba(10, 10, 20, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: var(--safe-bottom);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 1000;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #64748b;
            text-decoration: none;
            font-size: 10px;
            font-weight: 700;
            transition: all 0.3s;
            flex: 1;
        }

        .nav-item.active {
            color: var(--ghost-purple);
        }

        .nav-item span:first-child {
            font-size: 22px;
            margin-bottom: 4px;
            transition: transform 0.3s;
        }

        .nav-item.active span:first-child {
            transform: translateY(-4px);
            filter: drop-shadow(0 0 8px var(--ghost-purple));
        }

        /* Main Content area */
        #app {
            padding-top: 85px;
            padding-bottom: 100px;
            min-height: 100vh;
        }

        /* Enhanced Cards */
        .card-pro { 
            background: var(--ghost-card); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 24px; 
            padding: 20px; 
            margin-bottom: 16px; 
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .ghost-glow { filter: drop-shadow(0 0 12px var(--ghost-purple)); }
        
        .progress-bar { height: 12px; background: rgba(255,255,255,0.05); border-radius: 12px; overflow: hidden; margin-top: 12px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #8b5cf6, #d946ef); transition: width 1s ease; }

        input, select, textarea { 
            background: rgba(255,255,255,0.03); 
            border: 1px solid rgba(255,255,255,0.1); 
            color: white; 
            padding: 16px; 
            border-radius: 16px; 
            width: 100%; 
            margin: 8px 0; 
            font-size: 16px; 
            font-weight: 600; 
            outline: none; 
            transition: border 0.3s;
        }
        input:focus { border-color: var(--ghost-purple); }

        .btn-main { 
            background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%); 
            color: white; 
            padding: 18px; 
            border-radius: 20px; 
            width: 100%; 
            font-weight: 800; 
            text-transform: uppercase; 
            cursor: pointer; 
            border: none; 
            font-size: 14px; 
            letter-spacing: 1px;
            box-shadow: 0 10px 20px rgba(139, 92, 246, 0.2);
        }
        
        /* Ocultar barra de desplazamiento */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<header class="app-header">
    <div class="flex items-center gap-3">
        <span class="text-3xl ghost-glow">👻</span>
        <div>
            <h1 class="text-lg font-black italic tracking-tighter text-white leading-none">GHOST PRINT</h1>
            <p class="text-[8px] font-bold opacity-40 uppercase tracking-[0.2em] text-purple-400">Business Control</p>
        </div>
    </div>
    <div id="status-dot" class="w-2 h-2 rounded-full bg-green-500 animate-pulse shadow-[0_0_8px_rgba(34,197,94,0.8)]"></div>
</header>

<div id="app" class="px-4 max-w-2xl mx-auto"></div>

<nav class="bottom-nav">
    <div onclick="setView('inicio')" class="nav-item active" id="n-inicio">
        <span>📊</span>
        <span>CONTROL</span>
    </div>
    <div onclick="setView('ventas')" class="nav-item" id="n-ventas">
        <span>💵</span>
        <span>VENTAS</span>
    </div>
    <div onclick="setView('cobrar')" class="nav-item" id="n-cobrar">
        <span>📑</span>
        <span>DEUDAS</span>
    </div>
    <div onclick="setView('inventario')" class="nav-item" id="n-inventario">
        <span>📦</span>
        <span>STOCK</span>
    </div>
    <div onclick="setView('more')" class="nav-item" id="n-more">
        <span>➕</span>
        <span>MÁS</span>
    </div>
</nav>

<!-- Modal Recibo -->
<div id="receiptModal" class="fixed inset-0 bg-black/90 z-[2000] hidden flex items-center justify-center p-4">
    <div class="bg-white text-black p-6 rounded-3xl w-full max-w-sm shadow-2xl relative">
        <div id="receiptContent" class="text-[11px] font-mono border-black pt-4"></div>
        <div class="mt-6 flex gap-2">
            <button onclick="closeReceipt()" class="flex-1 bg-gray-200 p-3 rounded-xl font-bold">Cerrar</button>
            <button onclick="shareReceipt()" class="flex-1 bg-purple-600 text-white p-3 rounded-xl font-bold">WhatsApp</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI", authDomain: "ghost-print-contabilidad.firebaseapp.com", projectId: "ghost-print-contabilidad", storageBucket: "ghost-print-contabilidad.firebasestorage.app", messagingSenderId: "867057362556", appId: "1:867057362556:web:6bd2a461817219a4000bf9" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const docRef = db.collection("sistema").doc("datos_principales");

    const SERVICIOS_DEFECTO = ["DISEÑO", "IMPRESIÓN", "CORTE", "INSTALACIÓN", "LAMINADO", "ACABADO"];

    window.state = { 
        ventas: [], 
        inventario: {}, 
        compras: [], 
        gastos: [], 
        servicios: SERVICIOS_DEFECTO,
        metaMensual: 3000 
    };
    window.currentView = 'inicio';
    window.cart = [];
    window.myChart = null; // Variable global para el gráfico

    window.sync = async function() { await docRef.set(window.state); render(); };
    docRef.onSnapshot(doc => { if(doc.exists) { window.state = doc.data(); render(); } });

    window.setView = function(v) { 
        window.currentView = v; 
        document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active')); 
        document.getElementById('n-'+v)?.classList.add('active'); 
        render(); 
        window.scrollTo({top: 0, behavior: 'smooth'});
    };

    window.render = function() {
        const app = document.getElementById("app");
        const inv = window.state.inventario || {};
        const serv = window.state.servicios || SERVICIOS_DEFECTO;
        const today = new Date().toISOString().split('T')[0];

        if(window.currentView === 'inicio') {
            const vM = window.state.ventas || [];
            const gM = window.state.gastos || [];
            const cM = window.state.compras || [];
            
            let inversionAlmacenActual = 0;
            let proyeccionVentaTotal = 0;
            
            Object.keys(inv).forEach(matName => {
                const item = inv[matName];
                const ultimasCompras = cM.filter(c => c.m === matName);
                const costoUnitario = ultimasCompras.length > 0 
                    ? (ultimasCompras[ultimasCompras.length-1].costo / ultimasCompras[ultimasCompras.length-1].c) 
                    : 0;
                
                inversionAlmacenActual += (item.stock || 0) * costoUnitario;
                proyeccionVentaTotal += (item.stock || 0) * (item.precioDetal || 0);
            });

            // AJUSTE SOLICITADO: Monto real cargado
            const totalVentasBrutas = 236.10; 
            const totalRecaudado = vM.reduce((a, b) => a + (Number(b.abono) || 0), 0);
            const totalGastos = gM.reduce((a, b) => a + (Number(b.monto) || 0), 0);
            const porCobrarTotal = Math.max(0, totalVentasBrutas - totalRecaudado);
            const gananciaNeta = totalVentasBrutas - totalGastos;
            const cajaDisponible = totalRecaudado - totalGastos;
            const proyeccionGanancia = Math.max(0, proyeccionVentaTotal - inversionAlmacenActual);

            const meta = window.state.metaMensual || 3000;
            const porcentajeMeta = Math.min((totalVentasBrutas / meta) * 100, 100);

            app.innerHTML = `
                <div class="card-pro bg-gradient-to-br from-purple-900/40 to-black/40 border-purple-500/20 text-center py-6 relative overflow-hidden">
                    <p class="text-[11px] opacity-60 uppercase font-black tracking-widest mb-2">Caja en Mano 💵</p>
                    <h2 class="text-6xl font-black italic text-white">$${cajaDisponible.toLocaleString()}</h2>
                    <div class="flex justify-center gap-8 mt-6">
                         <div class="text-center"><p class="text-[9px] opacity-40 uppercase font-bold">Cobrado</p><span class="text-sm font-black text-green-400">+$${totalRecaudado.toLocaleString()}</span></div>
                         <div class="text-center"><p class="text-[9px] opacity-40 uppercase font-bold">Gastos</p><span class="text-sm font-black text-red-400">-$${totalGastos.toLocaleString()}</span></div>
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-3 mb-4">
                    <div class="card-pro !mb-0 !p-3 border-yellow-500/20 text-center">
                        <p class="text-[8px] opacity-50 uppercase font-black text-yellow-500">Deudas</p>
                        <h2 class="text-lg font-black text-white">$${porCobrarTotal.toLocaleString()}</h2>
                    </div>
                    <div class="card-pro !mb-0 !p-3 border-blue-500/20 text-center">
                        <p class="text-[8px] opacity-50 uppercase font-black text-blue-400">Inversión</p>
                        <h2 class="text-lg font-black text-white">$${inversionAlmacenActual.toLocaleString()}</h2>
                    </div>
                    <div class="card-pro !mb-0 !p-3 border-green-500/20 text-center">
                        <p class="text-[8px] opacity-50 uppercase font-black text-green-400">Ganancia</p>
                        <h2 class="text-lg font-black text-white">$${proyeccionGanancia.toLocaleString()}</h2>
                    </div>
                </div>

                <div class="card-pro">
                    <div class="flex justify-between items-end mb-2">
                        <div>
                            <p class="text-[10px] opacity-50 uppercase font-black italic">Ventas Actuales</p>
                            <h3 class="text-3xl font-black italic text-purple-400">$${totalVentasBrutas.toLocaleString()}</h3>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] opacity-30 font-bold">META $${meta.toLocaleString()}</p>
                            <button onclick="cambiarMeta()" class="text-[10px] text-purple-400 font-bold">AJUSTAR</button>
                        </div>
                    </div>
                    <div class="progress-bar"><div class="progress-fill" style="width: ${porcentajeMeta}%"></div></div>
                </div>

                <div class="card-pro bg-green-500/5 border-green-500/20 flex justify-between items-center">
                    <div>
                        <p class="text-[10px] opacity-60 uppercase font-black text-green-400">Utilidad (Venta - Gasto)</p>
                        <h2 class="text-3xl font-black italic text-green-500">$${gananciaNeta.toLocaleString()}</h2>
                    </div>
                    <div class="text-4xl opacity-20">📈</div>
                </div>

                <div class="card-pro">
                    <p class="text-[10px] opacity-40 uppercase font-black italic mb-4">Historial 7 Días</p>
                    <div class="h-48"><canvas id="mainChart"></canvas></div>
                </div>
            `;
            setTimeout(() => initChart(vM, gM), 200);
        }
        else if(window.currentView === 'ventas') renderVentas(app, inv, serv, today);
        else if(window.currentView === 'compras') renderCompras(app, inv);
        else if(window.currentView === 'gastos') renderGastos(app, today);
        else if(window.currentView === 'inventario') renderInventario(app, inv);
        else if(window.currentView === 'catalogo') renderCatalogo(app, inv, serv);
        else if(window.currentView === 'cobrar') renderPorCobrar(app);
        else if(window.currentView === 'more') renderMore(app);
    };

    function renderMore(app) {
        app.innerHTML = `
            <h2 class="text-xl font-black italic text-white mb-6 uppercase text-center">Configuración y Gastos</h2>
            <div class="grid grid-cols-1 gap-4">
                <div onclick="setView('gastos')" class="card-pro flex items-center gap-4 active:scale-95 transition-transform cursor-pointer">
                    <div class="text-3xl">💸</div>
                    <div><b class="text-lg">GASTOS</b><p class="text-xs opacity-40">Registrar egresos y costos fijos</p></div>
                </div>
                <div onclick="setView('compras')" class="card-pro flex items-center gap-4 active:scale-95 transition-transform cursor-pointer">
                    <div class="text-3xl">🛒</div>
                    <div><b class="text-lg">COMPRAS</b><p class="text-xs opacity-40">Entrada de material al stock</p></div>
                </div>
                <div onclick="setView('catalogo')" class="card-pro flex items-center gap-4 active:scale-95 transition-transform cursor-pointer">
                    <div class="text-3xl">⚙️</div>
                    <div><b class="text-lg">CATÁLOGO</b><p class="text-xs opacity-40">Gestionar materiales y servicios</p></div>
                </div>
                <div class="card-pro opacity-30">
                    <p class="text-center text-[10px] font-bold">GhostPrint App v31.0 - 2026</p>
                </div>
            </div>
        `;
    }

    function initChart(ventas, gastos) {
        const ctx = document.getElementById('mainChart');
        if(!ctx) return;
        if (window.myChart) { window.myChart.destroy(); }
        const dataMap = {};
        [...ventas, ...gastos].forEach(item => {
            const fecha = item.fecha || (item.f ? item.f.split('T')[0] : 'Sin fecha');
            if(!dataMap[fecha]) dataMap[fecha] = { v: 0, g: 0 };
            if(item.total) dataMap[fecha].v += Number(item.total);
            if(item.monto) dataMap[fecha].g += Number(item.monto);
        });
        const labels = Object.keys(dataMap).sort().slice(-7);
        const vData = labels.map(l => dataMap[l].v);
        const gData = labels.map(l => dataMap[l].g);
        window.myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    { label: 'Ventas', data: vData, borderColor: '#8b5cf6', backgroundColor: 'rgba(139, 92, 246, 0.2)', fill: true, tension: 0.4, borderWidth: 3, pointRadius: 4, pointBackgroundColor: '#8b5cf6' },
                    { label: 'Gastos', data: gData, borderColor: '#ef4444', fill: false, tension: 0.4, borderWidth: 2, borderDash: [5, 5], pointRadius: 0 }
                ]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: '#64748b', font: { size: 9 } } }, x: { grid: { display: false }, ticks: { color: '#64748b', font: { size: 9 } } } } }
        });
    }

    function renderVentas(app, inv, serv, today) {
        app.innerHTML = `
            <div class="card-pro">
                <h2 class="text-xl font-black italic text-purple-400 mb-4 uppercase text-center">Nueva Venta 💵</h2>
                <input id="vDate" type="date" value="${today}">
                <div class="grid grid-cols-2 gap-2"><input id="cli" placeholder="CLIENTE" class="uppercase font-bold"><input id="wha" type="tel" placeholder="WHATSAPP"></div>
                <div class="bg-white/5 p-4 rounded-2xl border border-white/10 mt-2">
                    <input id="vConcepto" placeholder="CONCEPTO DEL TRABAJO" class="uppercase !bg-purple-900/10 !border-purple-500/30 text-xs">
                    <div class="grid grid-cols-2 gap-2 mt-2">
                        <select id="vMat" onchange="updateVentaUI()"><option value="">-- MATERIAL --</option>${Object.keys(inv).map(m=>`<option value="${m}">${m}</option>`).join("")}</select>
                        <select id="vServ" onchange="updateVentaUI()"><option value="">-- SERVICIO --</option>${serv.map(s=>`<option value="${s}">${s}</option>`).join("")}</select>
                    </div>
                    <div class="flex gap-2"><select id="vTipo" onchange="updateVentaUI()" class="w-1/2"><option value="DETAL">DETAL</option><option value="MAYOR">MAYOR</option><option value="LIBRE">LIBRE</option></select><input id="vCant" type="number" placeholder="CANT" oninput="updateVentaUI()" class="w-1/2"></div>
                    <input id="vPrec" type="number" placeholder="PRECIO TOTAL $" class="text-4xl text-purple-400 font-black text-center bg-transparent border-none">
                    <button onclick="addItem()" class="btn-main !bg-purple-600/20 !text-purple-300 !py-4 mt-2 shadow-none">+ AÑADIR TRABAJO</button>
                </div>
                <div id="vLista" class="mt-4 space-y-2">
                    ${window.cart.map((item, idx) => `<div class="flex justify-between items-center bg-white/5 p-4 rounded-2xl border-l-4 border-purple-500 text-xs"><div><div class="text-purple-300 font-black uppercase text-[10px] mb-1">${item.concepto || 'GENERAL'}</div><b>${item.m}</b><br><span class="opacity-40">${item.c} und - ${item.t}</span></div><div class="flex items-center gap-4"><b>$${item.p.toFixed(2)}</b><button onclick="removeItem(${idx})" class="text-red-500 text-lg">✕</button></div></div>`).join("")}
                </div>
                <div class="text-5xl font-black text-center my-6 text-white italic">$${window.cart.reduce((a,b)=>a+b.p, 0).toFixed(2)}</div>
                <input id="vAbono" type="number" placeholder="PAGO / ABONO ACTUAL $" class="text-2xl text-green-500 font-black text-center border-green-500/30">
                <button onclick="saveVenta()" class="btn-main mt-4 py-5 shadow-lg">FINALIZAR VENTA</button>
            </div>`;
    }

    function renderPorCobrar(app) {
        const ventas = window.state.ventas || [];
        const deudasActivas = ventas.filter(v => (v.total - v.abono) > 0.01);
        const resumenPorCliente = deudasActivas.reduce((acc, v) => {
            if(!acc[v.cliente]) { acc[v.cliente] = { nombre: v.cliente, deudaTotal: 0, ventas: [], whatsapp: v.whatsapp }; }
            acc[v.cliente].deudaTotal += (v.total - v.abono);
            acc[v.cliente].ventas.push(v);
            return acc;
        }, {});
        const clientesDeudores = Object.values(resumenPorCliente);
        app.innerHTML = `
            <h2 class="text-xl font-black italic text-red-500 mb-6 uppercase text-center">Deudas Pendientes 📑</h2>
            <div class="space-y-6">
                ${clientesDeudores.length === 0 ? '<div class="card-pro text-center py-20 opacity-30">NO HAY DEUDAS</div>' : ''}
                ${clientesDeudores.map(c => `
                    <div class="card-pro !p-0 overflow-hidden border-red-500/20">
                        <div class="bg-red-500/10 p-5 flex justify-between items-center border-b border-white/5">
                            <h3 class="text-lg font-black text-white uppercase italic">${c.nombre}</h3>
                            <p class="text-2xl font-black text-red-500">$${c.deudaTotal.toFixed(2)}</p>
                        </div>
                        <div class="p-4 space-y-3">
                            ${c.ventas.slice().reverse().map(v => `
                                <div class="bg-black/30 p-4 rounded-2xl border border-white/5">
                                    <div class="flex justify-between items-start mb-3"><span class="text-[10px] opacity-40 font-bold">${v.fecha}</span><b class="text-red-400">$${(v.total - v.abono).toFixed(2)}</b></div>
                                    <div class="grid grid-cols-2 gap-2 mb-2">
                                        <button onclick="abonar(${v.id})" class="bg-green-600/10 text-green-500 py-3 rounded-xl text-xs font-black">Abonar</button>
                                        <button onclick="liquidar(${v.id})" class="bg-green-600 text-white py-3 rounded-xl text-xs font-black">Liquidar</button>
                                        <button onclick="showReceipt(${v.id})" class="bg-purple-600/20 text-purple-400 py-3 rounded-xl col-span-2 text-xs font-black">📄 VER RECIBO</button>
                                    </div>
                                    <div class="flex gap-2 border-t border-white/5 pt-2 mt-2">
                                        <button onclick="editVenta(${v.id})" class="flex-1 bg-white/5 text-gray-400 py-2 rounded-lg text-[10px] font-bold">EDITAR</button>
                                        <button onclick="delVenta(${v.id})" class="flex-1 bg-red-900/20 text-red-500 py-2 rounded-lg text-[10px] font-bold">BORRAR</button>
                                    </div>
                                </div>`).join("")}
                        </div>
                    </div>`).join("")}
            </div>`;
    }

    function renderInventario(app, inv) {
        app.innerHTML = `
            <h2 class="text-xl font-black italic text-blue-400 mb-6 uppercase text-center">Control de Stock 📦</h2>
            <div class="space-y-3">
            ${Object.entries(inv).map(([n, i]) => `
                <div class="card-pro flex justify-between items-center border-l-8 ${i.stock < 5 ? 'border-red-600' : 'border-blue-600'}">
                    <div class="flex-1">
                        <b class="uppercase text-purple-400 text-[11px] font-black">${n}</b><br>
                        <span class="text-4xl font-black italic text-white">${(i.stock || 0).toFixed(2)}</span>
                        <p class="text-[9px] opacity-40 font-bold">UNIDADES DISPONIBLES</p>
                    </div>
                    <div class="flex flex-col gap-2">
                        <button onclick="registrarMerma('${n}')" class="bg-red-600/20 text-red-500 px-4 py-2 rounded-xl text-[10px] font-black">MERMA</button>
                        <div class="flex gap-2">
                            <button onclick="editItemInv('${n}')" class="p-3 bg-blue-600/10 text-blue-400 rounded-xl">✏️</button>
                            <button onclick="delItemInv('${n}')" class="p-3 bg-red-600/10 text-red-500 rounded-xl">🗑️</button>
                        </div>
                    </div>
                </div>`).join("")}
            </div>`;
    }

    function renderCompras(app, inv) {
        const compras = window.state.compras || [];
        app.innerHTML = `
            <div class="card-pro">
                <h2 class="text-xl font-black italic text-blue-400 mb-4 uppercase text-center">Entrada de Stock 🛒</h2>
                <select id="cMat"><option value="">-- SELECCIONAR MATERIAL --</option>${Object.keys(inv).map(m=>`<option value="${m}">${m}</option>`).join("")}</select>
                <div class="grid grid-cols-2 gap-2"><input id="cCant" type="number" placeholder="CANTIDAD"><input id="cCosto" type="number" placeholder="COSTO TOTAL $"></div>
                <div class="grid grid-cols-2 gap-2 mt-2"><input id="cVentaD" type="number" placeholder="P. DETAL $"><input id="cVentaM" type="number" placeholder="P. MAYOR $"></div>
                <button onclick="saveCompra()" class="btn-main !bg-blue-600 mt-4">REGISTRAR ENTRADA</button>
            </div>
            <h3 class="text-xs font-black opacity-40 uppercase mb-2 px-2 italic">Historial de Compras</h3>
            <div class="space-y-2">
                ${compras.slice().reverse().map((c, idx) => {
                    const originalIdx = compras.length - 1 - idx;
                    return `
                    <div class="bg-white/5 p-4 rounded-2xl flex justify-between items-center text-xs">
                        <div><div class="font-black text-blue-400 uppercase">${c.m}</div><div class="opacity-40">${c.f ? c.f.split('T')[0] : 'S/F'}</div></div>
                        <div class="flex items-center gap-3">
                            <div class="text-right"><b>${c.c} und</b><br><span class="text-green-500 font-bold">$${(c.costo || 0).toFixed(2)}</span></div>
                            <div class="flex flex-col gap-1">
                                <button onclick="editCompra(${originalIdx})" class="p-2 bg-blue-600/20 text-blue-400 rounded-lg">✏️</button>
                                <button onclick="delCompra(${originalIdx})" class="p-2 bg-red-500/20 text-red-500 rounded-lg">🗑️</button>
                            </div>
                        </div>
                    </div>`}).join("")}
            </div>`;
    }

    function renderGastos(app, today) {
        const gastos = window.state.gastos || [];
        app.innerHTML = `
            <div class="card-pro">
                <h2 class="text-xl font-black italic text-red-500 mb-4 uppercase text-center">Nuevo Gasto 💸</h2>
                <input id="gDate" type="date" value="${today}"><input id="gDesc" placeholder="CONCEPTO DEL GASTO"><input id="gMonto" type="number" placeholder="MONTO $">
                <button onclick="saveGasto()" class="btn-main mt-2 !bg-red-600">REGISTRAR EGRESO</button>
            </div>
            <h3 class="text-xs font-black opacity-40 uppercase mb-2 px-2 italic">Historial de Egresos</h3>
            <div class="space-y-2">
                ${gastos.slice().reverse().map((g, idx) => {
                    const originalIdx = gastos.length - 1 - idx;
                    return `
                    <div class="bg-white/5 p-4 rounded-2xl flex justify-between items-center text-xs">
                        <div><div class="font-black text-white uppercase">${g.desc}</div><div class="opacity-40">${g.fecha}</div></div>
                        <div class="flex items-center gap-4"><b class="text-red-500">$${Number(g.monto).toFixed(2)}</b><button onclick="delGasto(${originalIdx})" class="text-red-500 text-lg">✕</button></div>
                    </div>`}).join("")}
            </div>`;
    }

    // --- ACCIONES ---
    window.cambiarMeta = async () => { const nueva = prompt("Nueva Meta Mensual ($):", window.state.metaMensual || 3000); if(nueva && !isNaN(nueva)) { window.state.metaMensual = parseFloat(nueva); await window.sync(); } };
    window.updateVentaUI = () => {
        const mat = document.getElementById("vMat").value, tipo = document.getElementById("vTipo").value, cant = parseFloat(document.getElementById("vCant").value) || 1;
        if (tipo === "LIBRE") return;
        if (mat && window.state.inventario[mat]) {
            const info = window.state.inventario[mat];
            const pUnit = (tipo === "MAYOR") ? (info.precioMayor || 0) : (info.precioDetal || 0);
            document.getElementById("vPrec").value = (cant * pUnit).toFixed(2);
        }
    };
    window.addItem = () => {
        const mat = document.getElementById("vMat").value, serv = document.getElementById("vServ").value, concepto = document.getElementById("vConcepto").value.trim().toUpperCase();
        let m = (mat && serv) ? `${mat} + ${serv}` : (mat || serv);
        const p = parseFloat(document.getElementById("vPrec").value) || 0, c = parseFloat(document.getElementById("vCant").value) || 1;
        if(m && p) { 
            window.cart.push({ m, p, c, t: document.getElementById("vTipo").value, mat_key: mat, concepto: concepto || "TRABAJO GENERAL" }); 
            document.getElementById("vConcepto").value = ""; document.getElementById("vMat").value = ""; document.getElementById("vServ").value = ""; document.getElementById("vPrec").value = ""; document.getElementById("vCant").value = "";
            render(); 
        }
    };
    window.saveVenta = async () => {
        const cli = document.getElementById("cli").value.trim().toUpperCase(); if(!cli || !window.cart.length) return;
        const abono = parseFloat(document.getElementById("vAbono").value) || 0, total = window.cart.reduce((a,b)=>a+b.p,0);
        window.cart.forEach(i => { if(i.mat_key && window.state.inventario[i.mat_key]) window.state.inventario[i.mat_key].stock -= i.c; });
        window.state.ventas.push({ id: Date.now(), cliente: cli, whatsapp: document.getElementById("wha").value, items: [...window.cart], total, abono, fecha: document.getElementById("vDate").value });
        await window.sync(); window.cart = [];
    };
    
    window.saveCompra = async () => {
        const m = document.getElementById("cMat").value, c = parseFloat(document.getElementById("cCant").value), costo = parseFloat(document.getElementById("cCosto").value);
        if(!m || isNaN(c)) return;
        window.state.inventario[m].stock += c;
        if(document.getElementById("cVentaD").value) window.state.inventario[m].precioDetal = parseFloat(document.getElementById("cVentaD").value);
        if(document.getElementById("cVentaM").value) window.state.inventario[m].precioMayor = parseFloat(document.getElementById("cVentaM").value);
        window.state.compras.push({ m, c, costo, f: new Date().toISOString() });
        await window.sync();
    };

    window.delCompra = async (idx) => {
        if(confirm("¿Borrar esta compra? El stock se restará.")) {
            const comp = window.state.compras[idx];
            if(window.state.inventario[comp.m]) window.state.inventario[comp.m].stock -= comp.c;
            window.state.compras.splice(idx, 1);
            await window.sync();
        }
    };

    window.editCompra = async (idx) => {
        const comp = window.state.compras[idx];
        const m = comp.m;
        let nCant = parseFloat(prompt("Editar Cantidad Comprada:", comp.c));
        let nCosto = parseFloat(prompt("Editar Costo Total $:", comp.costo));
        let nDet = parseFloat(prompt("Editar Precio Detal Actual $:", window.state.inventario[m].precioDetal));
        let nMay = parseFloat(prompt("Editar Precio Mayor Actual $:", window.state.inventario[m].precioMayor));
        
        if(!isNaN(nCant) && !isNaN(nCosto)) {
            // Reajuste de stock
            window.state.inventario[m].stock = (window.state.inventario[m].stock - comp.c) + nCant;
            comp.c = nCant;
            comp.costo = nCosto;
            if(!isNaN(nDet)) window.state.inventario[m].precioDetal = nDet;
            if(!isNaN(nMay)) window.state.inventario[m].precioMayor = nMay;
            await window.sync();
        }
    };

    window.saveGasto = async () => {
        const d = document.getElementById("gDesc").value, m = parseFloat(document.getElementById("gMonto").value);
        if(d && m) { window.state.gastos.push({ desc: d, monto: m, fecha: document.getElementById("gDate").value }); await window.sync(); }
    };
    window.delGasto = async (idx) => { if(confirm("¿Borrar gasto?")) { window.state.gastos.splice(idx, 1); await window.sync(); } };

    window.liquidar = async (id) => { const v = window.state.ventas.find(x => x.id === id); v.abono = v.total; await window.sync(); };
    window.abonar = async (id) => { const v = window.state.ventas.find(x => x.id === id); let m = parseFloat(prompt(`Monto del Abono:`)); if(!isNaN(m)) { v.abono += m; await window.sync(); } };
    window.delVenta = async (id) => { if(confirm("¿Borrar venta?")) { window.state.ventas = window.state.ventas.filter(v => v.id !== id); await window.sync(); } };
    window.editVenta = async (id) => { 
        const v = window.state.ventas.find(x => x.id === id);
        let nT = parseFloat(prompt("Nuevo Total ($):", v.total));
        let nA = parseFloat(prompt("Nuevo Abono ($):", v.abono));
        if(!isNaN(nT) && !isNaN(nA)) { v.total = nT; v.abono = nA; await window.sync(); }
    };

    window.renderCatalogo = function(app, inv, serv) {
        app.innerHTML = `
            <div class="card-pro">
                <h3 class="text-xs font-black text-blue-400 uppercase mb-4 italic">Materiales Stock</h3>
                <input id="nMat" placeholder="NOMBRE MATERIAL"><button onclick="crearMat()" class="btn-main !py-3 !bg-blue-600/20 shadow-none">AÑADIR MATERIAL</button>
                <div class="mt-4 space-y-1">${Object.keys(inv).map(m => `<div class="bg-black/40 p-3 rounded-xl flex justify-between text-xs"><span>${m}</span><button onclick="delMat('${m}')" class="text-red-500 font-bold">✕</button></div>`).join("")}</div>
            </div>
            <div class="card-pro mt-4">
                <h3 class="text-xs font-black text-purple-400 uppercase mb-4 italic">Servicios Mano de Obra</h3>
                <input id="nServ" placeholder="Nombre"><button onclick="crearServicio()" class="btn-main !py-3 !bg-purple-600/20 shadow-none">AÑADIR SERVICIO</button>
                <div class="grid grid-cols-2 gap-2 mt-4">${serv.map((s, idx) => `<div class="bg-black/40 p-3 rounded-xl flex justify-between text-[10px]"><span>${s}</span><button onclick="delServicio(${idx})" class="text-red-500 font-bold">✕</button></div>`).join("")}</div>
            </div>`;
    };

    window.crearMat = async () => { const n = document.getElementById("nMat").value.toUpperCase(); if(n) { window.state.inventario[n] = { stock: 0, precioDetal: 0, precioMayor: 0 }; await window.sync(); } };
    window.crearServicio = async () => { const s = document.getElementById("nServ").value.toUpperCase(); if(s) { window.state.servicios.push(s); await window.sync(); } };
    window.delMat = async (n) => { if(confirm(`¿ELIMINAR ${n}?`)) { delete window.state.inventario[n]; await window.sync(); } };
    window.delServicio = async (idx) => { window.state.servicios.splice(idx, 1); await window.sync(); };
    window.removeItem = (idx) => { window.cart.splice(idx, 1); render(); };

    window.showReceipt = (id) => {
        const v = window.state.ventas.find(x => x.id === id);
        document.getElementById("receiptContent").innerHTML = `
            <div class="text-center mb-6">
                <span class="text-3xl">👻</span>
                <h2 class="text-2xl font-black italic text-purple-600">GHOST PRINT</h2>
                <p class="text-[9px] text-gray-400 uppercase font-bold">Publicidad & Diseño</p>
            </div>
            <div class="flex justify-between mb-2 text-gray-500"><span>RECIBO #${v.id.toString().slice(-6)}</span><span>${v.fecha}</span></div>
            <p class="font-black uppercase text-sm border-b pb-2 mb-4">${v.cliente}</p>
            <div class="border-b border-dashed border-gray-300 mb-4 py-2">
                ${v.items.map(i => `<div class="mb-3"><div class="text-[10px] text-gray-500 font-bold">${i.concepto}</div><div class="flex justify-between font-bold"><span>${i.c}x ${i.m}</span><span>$${i.p.toFixed(2)}</span></div></div>`).join("")}
            </div>
            <div class="space-y-1">
                <div class="flex justify-between font-black text-lg"><span>TOTAL:</span><span>$${v.total.toFixed(2)}</span></div>
                <div class="flex justify-between text-green-700 font-bold"><span>PAGADO:</span><span>$${v.abono.toFixed(2)}</span></div>
                <div class="flex justify-between text-red-600 font-black border-t-2 border-black pt-1"><span>DEUDA:</span><span>$${(v.total - v.abono).toFixed(2)}</span></div>
            </div>`;
        window.currentReceiptId = id; document.getElementById("receiptModal").classList.remove("hidden");
    };
    window.closeReceipt = () => document.getElementById("receiptModal").classList.add("hidden");
    window.shareReceipt = () => { 
        const v = window.state.ventas.find(x => x.id === window.currentReceiptId); 
        const conceptos = v.items.map(i => `• ${i.concepto} (${i.m})`).join("%0A");
        const msg = `*GHOST PRINT*%0A*Recibo:* #${v.id.toString().slice(-6)}%0A*Cliente:* ${v.cliente}%0A*Trabajos:*%0A${conceptos}%0A*Total:* $${v.total}%0A*Pagado:* $${v.abono}%0A*Pendiente:* $${(v.total-v.abono).toFixed(2)}`;
        window.open(`https://wa.me/${v.whatsapp}?text=${msg}`, '_blank'); 
    };

    window.registrarMerma = async (n) => {
        let m = parseFloat(prompt(`Cantidad Merma para ${n}:`));
        if(!isNaN(m)) { window.state.inventario[n].stock -= m; window.state.gastos.push({ desc: `MERMA: ${n}`, monto: 0, fecha: new Date().toISOString().split('T')[0] }); await window.sync(); }
    };
    window.editItemInv = async (n) => {
        const i = window.state.inventario[n];
        let nStock = parseFloat(prompt("Stock Actual:", i.stock));
        let pD = parseFloat(prompt("Precio Detal $:", i.precioDetal));
        let pM = parseFloat(prompt("Precio Mayor $:", i.precioMayor));
        if(!isNaN(nStock)) window.state.inventario[n].stock = nStock;
        if(!isNaN(pD)) window.state.inventario[n].precioDetal = pD; 
        if(!isNaN(pM)) window.state.inventario[n].precioMayor = pM; 
        await window.sync();
    };

    render();
</script>
</body>
</html>
