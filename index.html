<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GhostPrint MASTER v28.9.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { background-color: #030308; color: #f8fafc; font-family: 'Inter', sans-serif; padding-bottom: 100px; }
        .card-pro { background: #111122; border: 1px solid #2d2d44; border-radius: 20px; padding: 18px; margin-bottom: 12px; }
        nav { background: rgba(10, 10, 20, 0.95); display: flex; gap: 8px; overflow-x: auto; padding: 14px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #334155; }
        .btn-nav { background: #1e1e30; color: #64748b; padding: 12px 18px; border-radius: 14px; font-size: 10px; font-weight: 800; white-space: nowrap; cursor: pointer; text-transform: uppercase; }
        .active { background: #7c3aed !important; color: white !important; }
        
        input, select { background: #070712; border: 1px solid #334155; color: white; padding: 16px; border-radius: 14px; width: 100%; margin: 8px 0; font-size: 16px; font-weight: 700; outline: none; }
        input::placeholder { font-size: 14px; opacity: 0.5; }
        
        .btn-main { background: linear-gradient(135deg, #7c3aed 0%, #4c1d95 100%); color: white; padding: 18px; border-radius: 18px; width: 100%; font-weight: 900; text-transform: uppercase; cursor: pointer; border: none; font-size: 14px; }
        .alert-low { border: 2px solid #ef4444 !important; background: rgba(239, 68, 68, 0.1) !important; }
        .ghost-glow { filter: drop-shadow(0 0 10px #7c3aed); }
        .icon-btn-lg { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; border-radius: 12px; transition: all 0.2s; cursor: pointer; font-size: 18px; }
        ::-webkit-calendar-picker-indicator { filter: invert(1); }
        
        .chart-bar { height: 8px; border-radius: 4px; background: #2d2d44; overflow: hidden; margin: 8px 0; }
        .chart-fill { height: 100%; transition: width 0.5s ease-in-out; }
    </style>
</head>
<body>

<div class="p-4 flex justify-between items-center bg-[#0a0a14] border-b border-white/5">
    <div class="flex items-center gap-3">
        <span class="text-4xl ghost-glow">👻</span>
        <div>
            <h1 class="text-xl font-black italic text-purple-500 leading-none">GHOST PRINT</h1>
            <p class="text-[8px] font-black opacity-40 uppercase tracking-widest text-purple-300">Master Suite v28.9.1</p>
        </div>
    </div>
</div>

<nav id="mainNav">
    <div onclick="setView('inicio')" class="btn-nav active" id="n-inicio">📊 CONTROL</div>
    <div onclick="setView('ventas')" class="btn-nav" id="n-ventas">💵 Ventas</div>
    <div onclick="setView('cobrar')" class="btn-nav" id="n-cobrar">📑 POR COBRAR</div>
    <div onclick="setView('compras')" class="btn-nav" id="n-compras">🛒 Compras</div>
    <div onclick="setView('gastos')" class="btn-nav" id="n-gastos">💸 Gastos</div>
    <div onclick="setView('inventario')" class="btn-nav" id="n-inventario">📦 Stock</div>
    <div onclick="setView('catalogo')" class="btn-nav" id="n-catalogo">⚙️ CATALOGO</div>
</nav>

<div id="app" class="p-4 max-w-2xl mx-auto"></div>

<div id="receiptModal" class="fixed inset-0 bg-black/90 z-[200] hidden flex items-center justify-center p-4">
    <div class="bg-white text-black p-6 rounded-2xl w-full max-w-sm shadow-2xl relative overflow-hidden">
        <div class="text-center mb-4">
             <span class="text-4xl">👻</span>
             <h2 class="text-xl font-black italic leading-none text-purple-600">GHOST PRINT</h2>
             <p class="text-[8px] font-bold uppercase tracking-tighter">Soluciones Gráficas Profesionales</p>
        </div>
        <div id="receiptContent" class="text-[11px] font-mono border-t border-dashed border-black pt-4"></div>
        <div class="mt-6 flex gap-2 no-print">
            <button onclick="closeReceipt()" class="flex-1 bg-gray-200 p-3 rounded-xl font-bold">Cerrar</button>
            <button onclick="shareReceipt()" class="flex-1 bg-purple-600 text-white p-3 rounded-xl font-bold">WhatsApp</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI", authDomain: "ghost-print-contabilidad.firebaseapp.com", projectId: "ghost-print-contabilidad", storageBucket: "ghost-print-contabilidad.firebasestorage.app", messagingSenderId: "867057362556", appId: "1:867057362556:web:6bd2a461817219a4000bf9" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const docRef = db.collection("sistema").doc("datos_principales");

    window.state = { ventas: [], inventario: {}, compras: [], gastos: [], servicios: ["DISEÑO", "IMPRESIÓN", "DISEÑO E IMPRESIÓN", "INSTALACIÓN", "POP", "ROTULACIÓN", "LAMINADO", "IMPRESIÓN Y CORTE"] };
    window.currentView = 'inicio';
    window.cart = [];

    window.sync = async function() { await docRef.set(window.state); render(); };
    docRef.onSnapshot(doc => { if(doc.exists) { window.state = doc.data(); render(); } });

    window.setView = function(v) { 
        window.currentView = v; 
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active')); 
        document.getElementById('n-'+v)?.classList.add('active'); 
        render(); 
    };

    window.render = function() {
        const app = document.getElementById("app");
        const inv = window.state.inventario || {};
        const serv = window.state.servicios || [];
        const today = new Date().toISOString().split('T')[0];

        if(window.currentView === 'inicio') {
            const vM = window.state.ventas || [];
            const gM = window.state.gastos || [];
            const now = new Date();
            const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
            const curV = vM.filter(i => new Date(i.fecha) >= startOfMonth);
            const curG = gM.filter(i => new Date(i.fecha) >= startOfMonth);
            const tV = curV.reduce((a, b) => a + (Number(b.total) || 0), 0);
            const tA = curV.reduce((a, b) => a + (Number(b.abono) || 0), 0);
            const tG = curG.reduce((a, b) => a + (Number(b.monto) || 0), 0);
            const totalCaja = tA - tG;
            const totalDeuda = tV - tA;
            const cobroPct = tV > 0 ? (tA / tV) * 100 : 0;
            const gastoPct = tV > 0 ? Math.min((tG / tV) * 100, 100) : 0;

            app.innerHTML = `
                <div class="card-pro text-center bg-gradient-to-br from-green-900/40 to-[#111122] border-green-500/30">
                    <p class="text-[10px] opacity-60 uppercase font-black text-green-300">Total en Caja</p>
                    <h2 class="text-5xl font-black italic text-green-400">$${totalCaja.toLocaleString()}</h2>
                </div>
                <div class="card-pro bg-[#16162a]">
                    <div class="mb-4">
                        <div class="flex justify-between text-[10px] font-black uppercase mb-1"><span class="text-purple-400">Cobro</span><span>${cobroPct.toFixed(0)}%</span></div>
                        <div class="chart-bar"><div class="chart-fill bg-purple-500" style="width: ${cobroPct}%"></div></div>
                    </div>
                    <div>
                        <div class="flex justify-between text-[10px] font-black uppercase mb-1"><span class="text-red-400">Gastos</span><span>${gastoPct.toFixed(0)}%</span></div>
                        <div class="chart-bar"><div class="chart-fill bg-red-500" style="width: ${gastoPct}%"></div></div>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="card-pro text-center border-purple-500/20"><p class="text-[9px] opacity-40 uppercase font-black">Facturado</p><h2 class="text-2xl font-black text-purple-500">$${tV.toLocaleString()}</h2></div>
                    <div class="card-pro text-center border-red-500/20"><p class="text-[9px] opacity-40 uppercase font-black">Por Cobrar</p><h2 class="text-2xl font-black text-red-500">$${totalDeuda.toLocaleString()}</h2></div>
                </div>`;
        }

        else if(window.currentView === 'ventas') {
            app.innerHTML = `
                <div class="card-pro">
                    <h2 class="text-xl font-black italic text-purple-500 mb-6 uppercase text-center">Punto de Venta</h2>
                    <input id="vDate" type="date" value="${today}">
                    <div class="grid grid-cols-2 gap-2">
                        <input id="cli" placeholder="CLIENTE" class="uppercase">
                        <input id="wha" type="tel" placeholder="WHA">
                    </div>
                    <div class="bg-white/5 p-4 rounded-2xl border border-white/10 mt-2">
                        <select id="vMat" onchange="updateVentaUI()">
                            <option value="">-- PRODUCTO --</option>
                            <optgroup label="MATERIALES">${Object.keys(inv).map(m=>`<option value="${m}">${m}</option>`).join("")}</optgroup>
                            <optgroup label="SERVICIOS">${serv.map(s=>`<option value="${s}">${s}</option>`).join("")}</optgroup>
                        </select>
                        <div class="flex gap-2">
                            <select id="vTipo" onchange="updateVentaUI()" class="w-1/3"><option value="M2">M2</option><option value="ML">ML</option><option value="UNID">UNID</option></select>
                            <input id="vCant" type="number" placeholder="CANT" oninput="updateVentaUI()" class="w-2/3">
                        </div>
                        <input id="vPrec" type="number" placeholder="PRECIO TOTAL $">
                        <button onclick="addItem()" class="btn-main !py-3 mt-2">+ AGREGAR</button>
                    </div>
                    <div class="mt-4 space-y-2">${window.cart.map((item, idx) => `<div class="flex justify-between items-center bg-white/5 p-3 rounded-xl"><span>${item.m}</span><b>$${item.p}</b><button onclick="removeItem(${idx})">✕</button></div>`).join("")}</div>
                    <div class="text-5xl font-black text-center my-6">$${window.cart.reduce((a,b)=>a+b.p, 0).toFixed(2)}</div>
                    <input id="vAbono" type="number" placeholder="ABONO $" class="text-center text-green-500 text-2xl">
                    <button onclick="saveVenta()" class="btn-main mt-4">FINALIZAR VENTA</button>
                </div>`;
        }

        else if(window.currentView === 'cobrar') {
            const deudores = {};
            (window.state.ventas || []).forEach(v => {
                const d = v.total - v.abono;
                if(d > 0.01) {
                    if(!deudores[v.cliente]) deudores[v.cliente] = { t:0, f:[] };
                    deudores[v.cliente].t += d; deudores[v.cliente].f.push(v);
                }
            });
            app.innerHTML = `
                <h2 class="text-lg font-black italic text-red-500 mb-4 uppercase">Cuentas por Cobrar</h2>
                ${Object.entries(deudores).map(([nom, d]) => `
                    <div class="card-pro !bg-[#16162a] p-0 overflow-hidden border-l-4 border-red-600 mb-4">
                        <div class="p-4 bg-white/5 flex justify-between items-center border-b border-white/5">
                            <div>
                                <p class="text-[8px] opacity-40 uppercase font-black">CLIENTE</p>
                                <b class="text-4xl uppercase text-yellow-400 font-black tracking-tighter leading-none">${nom}</b>
                            </div>
                            <div class="text-right">
                                <p class="text-[8px] opacity-40 uppercase font-black">DEUDA</p>
                                <div class="text-2xl font-black text-red-500">$${d.t.toFixed(2)}</div>
                            </div>
                        </div>
                        <div class="p-3 space-y-2">
                            ${d.f.map(f => `
                                <div class="bg-black/40 rounded-xl p-3 border border-white/5">
                                    <div class="flex justify-between text-[11px] mb-1"><span class="text-purple-400 font-black">#${f.id.toString().slice(-6)}</span><b>$${(f.total-f.abono).toFixed(2)}</b></div>
                                    <div class="text-[9px] text-white/40 uppercase mb-2 italic">${f.items.map(i => `• ${i.m}`).join(', ')}</div>
                                    <div class="flex gap-1"><button onclick="abonar(${f.id})" class="flex-1 bg-green-600/20 text-green-500 py-2 rounded-xl text-[10px] font-black uppercase">Abonar</button><button onclick="liquidar(${f.id})" class="flex-1 bg-purple-600/20 text-purple-400 py-2 rounded-xl text-[10px] font-black uppercase">Liquidar</button><button onclick="editarFactura(${f.id})" class="p-2">✏️</button><button onclick="showReceipt(${f.id})" class="p-2">📄</button><button onclick="eliminarVenta(${f.id})" class="p-2 text-red-500">🗑️</button></div>
                                </div>`).join("")}
                        </div>
                    </div>`).join("")}`;
        }

        else if(window.currentView === 'compras') {
            app.innerHTML = `<div class="card-pro"><h2 class="text-lg font-black italic text-blue-400 mb-4 uppercase">Carga Stock</h2><select id="cMat"><option value="">-- MATERIAL --</option>${Object.keys(inv).map(m=>`<option value="${m}">${m}</option>`).join("")}</select><div class="grid grid-cols-2 gap-2"><input id="cCant" type="number" placeholder="ML"><input id="cCosto" type="number" placeholder="COSTO $"></div><div class="grid grid-cols-2 gap-2"><input id="cVentaM2" type="number" placeholder="VTA M2 $"><input id="cVentaML" type="number" placeholder="VTA ML $"></div><button onclick="saveCompra()" class="btn-main !bg-blue-600 mt-4">CARGAR</button></div>`;
        }

        else if(window.currentView === 'gastos') {
            const listG = window.state.gastos || [];
            app.innerHTML = `<div class="card-pro"><h2 class="text-lg font-black italic text-red-500 mb-4 uppercase">Gastos</h2><input id="gDate" type="date" value="${today}"><input id="gDesc" placeholder="DESCRIPCIÓN"><input id="gMonto" type="number" placeholder="MONTO $"><button onclick="saveGasto()" class="btn-main mt-2">GUARDAR</button></div>
            <div class="space-y-1">${listG.slice().reverse().map((g, idx) => `<div class="bg-white/5 p-4 rounded-xl flex justify-between items-center text-[10px] uppercase"><div><div class="font-black text-white">${g.desc}</div><div class="opacity-30">${g.fecha}</div></div><b class="text-red-400">$${g.monto.toFixed(2)}</b><button onclick="delGasto(${listG.length-1-idx})" class="opacity-20">✕</button></div>`).join("")}</div>`;
        }

        else if(window.currentView === 'inventario') {
            app.innerHTML = `<div class="space-y-3">${Object.entries(inv).map(([n, i]) => `<div class="card-pro flex justify-between items-center border-l-4 ${i.stock < 5 ? 'border-red-600 alert-low' : 'border-blue-600'}"><div><b class="uppercase text-purple-400 text-[11px] font-black">${n}</b><br><span class="text-4xl font-black italic text-white">${i.stock.toFixed(2)} <small class="text-[10px] opacity-40">ML</small></span></div><div class="flex gap-2"><button onclick="registrarMerma('${n}')" class="icon-btn-lg bg-red-600/20 text-red-400">📤</button><button onclick="editStock('${n}')" class="icon-btn-lg bg-blue-600/20 text-blue-400">✏️</button></div></div>`).join("")}</div>`;
        }

        else if(window.currentView === 'catalogo') {
            app.innerHTML = `<div class="card-pro"><h3 class="text-xs font-black text-blue-400 mb-4 uppercase">Nuevo Material</h3><input id="nMat" placeholder="NOMBRE"><input id="aMat" type="number" step="0.01" placeholder="ANCHO"><button onclick="crearMat()" class="btn-main !py-3 !bg-blue-600/20">+ REGISTRAR</button></div>
            <div class="card-pro mt-4"><h3 class="text-xs font-black text-purple-400 mb-4 uppercase">Servicios</h3><div class="flex gap-2"><input id="nServ" placeholder="Nombre" class="!m-0 text-sm"><button onclick="crearServicio()" class="btn-main !w-auto !px-4">+</button></div></div>`;
        }
    };

    // FUNCIONES LOGICA ORIGINALES RECUPERADAS
    window.updateVentaUI = () => {
        const m = document.getElementById("vMat").value, t = document.getElementById("vTipo").value, c = parseFloat(document.getElementById("vCant").value) || 0;
        const info = window.state.inventario[m];
        if(info) { let p = (t === "ML") ? c * info.precioML : (t === "M2") ? c * info.precioM2 : 0; if(p > 0) document.getElementById("vPrec").value = p.toFixed(2); }
    };
    window.addItem = () => {
        const m = document.getElementById("vMat").value, p = parseFloat(document.getElementById("vPrec").value) || 0, c = parseFloat(document.getElementById("vCant").value) || 0, t = document.getElementById("vTipo").value;
        if(m && p) { window.cart.push({ m, p, c, t }); render(); }
    };
    window.removeItem = (idx) => { window.cart.splice(idx, 1); render(); };
    window.saveVenta = async () => {
        const cli = document.getElementById("cli").value.toUpperCase() || "FINAL", abono = parseFloat(document.getElementById("vAbono").value) || 0, total = window.cart.reduce((a,b)=>a+b.p,0), id = Date.now();
        window.cart.forEach(i => { if(window.state.inventario[i.m]) window.state.inventario[i.m].stock -= i.c; });
        window.state.ventas.push({ id, cliente: cli, whatsapp: document.getElementById("wha").value, items: [...window.cart], total, abono, fecha: document.getElementById("vDate").value });
        window.cart = []; await window.sync(); showReceipt(id);
    };
    window.registrarMerma = async (m) => { const mer = parseFloat(prompt(`Merma (${m}):`)); if(mer > 0) { window.state.inventario[m].stock -= mer; await window.sync(); } };
    window.editStock = async (m) => { const n = parseFloat(prompt(`Stock (${m}):`, window.state.inventario[m].stock)); if(!isNaN(n)) { window.state.inventario[m].stock = n; await window.sync(); } };
    window.crearMat = async () => { const n = document.getElementById("nMat").value.toUpperCase(), a = parseFloat(document.getElementById("aMat").value); if(n && a) { window.state.inventario[n] = { stock: 0, precioM2: 0, precioML: 0, ancho: a }; await window.sync(); } };
    window.crearServicio = async () => { const s = document.getElementById("nServ").value.toUpperCase(); if(s) { window.state.servicios.push(s); await window.sync(); } };
    window.abonar = async (id) => { const v = window.state.ventas.find(x => x.id === id); let m = parseFloat(prompt(`Abono:`)); if(!isNaN(m)) { v.abono += m; await window.sync(); } };
    window.liquidar = async (id) => { const v = window.state.ventas.find(x => x.id === id); if(confirm("¿Liquidar?")) { v.abono = v.total; await window.sync(); } };
    window.editarFactura = async (id) => { const v = window.state.ventas.find(x => x.id === id); let t = parseFloat(prompt("Total:", v.total)), a = parseFloat(prompt("Abono:", v.abono)); if(!isNaN(t)) v.total = t; if(!isNaN(a)) v.abono = a; await window.sync(); };
    window.eliminarVenta = async (id) => { if(confirm("¿Borrar?")) { window.state.ventas = window.state.ventas.filter(x => x.id !== id); await window.sync(); } };
    window.saveCompra = async () => {
        const m = document.getElementById("cMat").value, c = parseFloat(document.getElementById("cCant").value);
        if(m && c) {
            window.state.inventario[m].stock += c;
            if(document.getElementById("cVentaM2").value) window.state.inventario[m].precioM2 = parseFloat(document.getElementById("cVentaM2").value);
            if(document.getElementById("cVentaML").value) window.state.inventario[m].precioML = parseFloat(document.getElementById("cVentaML").value);
            window.state.compras.push({ m, c, f: new Date().toISOString() }); await window.sync();
        }
    };
    window.saveGasto = async () => {
        const d = document.getElementById("gDesc").value, m = parseFloat(document.getElementById("gMonto").value);
        if(d && m) { window.state.gastos.push({ desc: d, monto: m, fecha: document.getElementById("gDate").value }); await window.sync(); }
    };
    window.delGasto = async (i) => { window.state.gastos.splice(i, 1); await window.sync(); };
    window.showReceipt = (id) => {
        const v = window.state.ventas.find(x => x.id === id);
        document.getElementById("receiptContent").innerHTML = `<div class="flex justify-between font-bold border-b border-black mb-2"><span>#${v.id.toString().slice(-6)}</span><span>${v.fecha}</span></div><p class="font-black uppercase">${v.cliente}</p><div class="border-y border-dashed border-black my-4 py-2">${v.items.map(i => `<div class="flex justify-between"><span>${i.m}</span><span>$${i.p.toFixed(2)}</span></div>`).join("")}</div><div class="flex justify-between font-black text-lg"><span>TOTAL:</span><span>$${v.total.toFixed(2)}</span></div><div class="flex justify-between text-green-700 font-bold"><span>PAGADO:</span><span>$${v.abono.toFixed(2)}</span></div><div class="flex justify-between text-red-600 font-black border-t border-black"><span>DEBE:</span><span>$${(v.total-v.abono).toFixed(2)}</span></div>`;
        window.currentReceiptId = id; document.getElementById("receiptModal").classList.remove("hidden");
    };
    window.closeReceipt = () => document.getElementById("receiptModal").classList.add("hidden");
    window.shareReceipt = () => { const v = window.state.ventas.find(x => x.id === window.currentReceiptId); const txt = `*GHOST PRINT*%0A*Cliente:* ${v.cliente}%0A*Debe:* $${(v.total-v.abono).toFixed(2)}`; window.open(`https://wa.me/${v.whatsapp}?text=${txt}`, '_blank'); };

    render();
</script>
</body>
</html>
