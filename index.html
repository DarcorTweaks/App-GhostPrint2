<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostPrint ERP v6.8 - Timeline Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background-color: #0d0d1a;
            background-image: radial-gradient(at 10% 10%, rgba(109, 40, 217, 0.2) 0px, transparent 50%), radial-gradient(at 90% 90%, rgba(79, 70, 229, 0.15) 0px, transparent 50%);
            background-attachment: fixed; background-size: cover;
            font-family: ui-sans-serif, system-ui; color: #e2e8f0; padding-bottom: 96px;
        }
        .btn { background: #6d28d9; color: white; padding: 10px 14px; border-radius: 12px; cursor: pointer; font-weight: 700; border: none; transition: 0.2s; text-transform: uppercase; font-size: 10px; }
        .card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(5px); padding: 20px; margin: 12px 0; border-radius: 20px; color: #1e293b; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        input, select { border: 1px solid #e2e8f0; padding: 12px; margin: 8px 0; border-radius: 12px; width: 100%; background: #f8fafc; color: #1e293b; font-weight: 600; }
        header { background: linear-gradient(to right, #4c1d95, #000); color: white; padding: 16px; display: flex; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
        nav { padding: 8px; display: flex; gap: 8px; overflow-x: auto; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); position: sticky; top: 72px; z-index: 40; }
    </style>
</head>
<body>

<header>
    <div>
        <h1 class="text-2xl font-black italic uppercase text-purple-400">GhostPrint ERP</h1>
        <p id="sync-status" class="text-[9px] font-bold text-amber-300 uppercase italic">Conectando...</p>
    </div>
</header>

<nav>
    <button onclick="setView('dashboard')" class="btn">🏠 Inicio</button>
    <button onclick="setView('ventas')" class="btn !bg-green-600">💵 Vender</button>
    <button onclick="setView('cobranzas')" class="btn !bg-amber-500">⏳ Cobros</button>
    <button onclick="setView('compras')" class="btn !bg-blue-600">📦 Stock</button>
    <button onclick="setView('gastos')" class="btn !bg-red-600">📉 Gastos</button>
    <button onclick="setView('reportes')" class="btn !bg-indigo-600">📊 Reportes</button>
    <button onclick="setView('config')" class="btn !bg-slate-700">⚙️ Catálogo</button>
</nav>

<div id="app" class="p-4 max-w-4xl mx-auto"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI",
    authDomain: "ghost-print-contabilidad.firebaseapp.com",
    projectId: "ghost-print-contabilidad",
    storageBucket: "ghost-print-contabilidad.firebasestorage.app",
    messagingSenderId: "867057362556",
    appId: "1:867057362556:web:6bd2a461817219a4000bf9"
};

const appF = initializeApp(firebaseConfig);
const db = getFirestore(appF);
const docRef = doc(db, "sistema", "datos_principales");

window.state = { ventas: [], gastos: [], inventario: {}, serviciosExtra: [], mermas: [] };
window.view = "dashboard";
window.reportMonth = new Date().getMonth();
window.reportYear = new Date().getFullYear();
let carritoVenta = [];

// Helper para fechas
const fmtDate = (ts) => {
    let d = new Date(ts);
    return `${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getFullYear()}`;
};

onSnapshot(docRef, (snap) => {
    if (snap.exists()) { 
        window.state = snap.data();
        document.getElementById("sync-status").innerText = "En Línea ✓"; 
        render();
    }
});

window.save = async () => { await setDoc(docRef, window.state); };
window.setView = (v) => { window.view = v; render(); };

window.render = function() {
    let app = document.getElementById("app");
    if(!app) return;
    let html = "";

    if(window.view === "dashboard"){
        let totalV = window.state.ventas.reduce((a,b)=>a+b.total,0);
        let totalG = window.state.gastos.reduce((a,b)=>a+b.amount,0);
        let dineroC = window.state.ventas.reduce((a,b)=>a+(b.abonado || 0), 0);
        html = `
        <div class="grid grid-cols-2 gap-3 mb-3">
            <div class="card !m-0 bg-green-600 text-white text-center p-4"><p class="text-[9px] font-bold uppercase opacity-80">Caja Real</p><b class="text-xl">$${dineroC.toFixed(2)}</b></div>
            <div class="card !m-0 bg-amber-500 text-white text-center p-4"><p class="text-[9px] font-bold uppercase opacity-80">Por Cobrar</p><b class="text-xl">$${(totalV - dineroC).toFixed(2)}</b></div>
        </div>
        <div class="card !m-0 mb-4 bg-slate-900 border-l-8 border-purple-500 p-4">
            <p class="text-purple-400 text-[9px] font-black uppercase">Balance Neto</p>
            <h2 class="text-white text-3xl font-black italic">$${(totalV - totalG).toFixed(2)}</h2>
        </div>
        <div class="card"><canvas id="chartDash" height="180"></canvas></div>`;
        setTimeout(() => initDashChart(totalV, totalG, dineroC), 100);
    }

    if(window.view === "ventas"){
        html = `<div class="card"><h2 class="font-black mb-4 uppercase text-purple-700 italic border-b pb-2 text-sm">Punto de Venta</h2>
            <input id="cliV" placeholder="NOMBRE DEL CLIENTE">
            <input id="telV" type="number" placeholder="WHATSAPP (Ej: 58412...)">
            <div class="grid grid-cols-2 gap-2">
                <select id="pSel"><option value="">-- Material --</option>${Object.keys(window.state.inventario).map(p=>`<option value="${p}">${p}</option>`).join("")}</select>
                <select id="sSel"><option value="">-- Servicio --</option>${window.state.serviciosExtra.map(s=>`<option value="${s}">${s}</option>`).join("")}</select>
            </div>
            <select id="tCli"><option value="detal">DETAL ($9) - m²</option><option value="mayor">MAYOR ($10) - ML</option><option value="libre">LIBRE - Unidad</option></select>
            <input id="cQty" type="number" value="1" step="0.01">
            <button onclick="addItemCarrito()" class="btn w-full !bg-blue-600 mt-2">+ AÑADIR</button>
            <div id="listaCarrito" class="mt-4 border-t pt-2 space-y-1 text-xs"></div>
            <div id="totalVenta" class="p-3 bg-slate-800 text-white text-center font-bold mt-2 rounded-xl text-xl uppercase italic">Total: $0.00</div>
            <button onclick="procesarV()" class="btn w-full bg-green-600 mt-4 py-4 font-black">REGISTRAR VENTA</button></div>`;
        setTimeout(() => renderCarritoInner(), 10);
    }

    if(window.view === "cobranzas"){
        html = `${window.state.ventas.filter(v=>!v.pagado).reverse().map(v=>`
            <div class="card flex justify-between items-center border-l-4 border-amber-500">
                <div>
                    <span class="text-[8px] font-black text-slate-400 uppercase">${fmtDate(v.id)}</span><br>
                    <b class="uppercase text-xs">${v.cliente}</b><br>
                    <small class="text-red-600 font-bold italic">Debe: $${(v.total-(v.abonado||0)).toFixed(2)}</small>
                </div>
                <div class="flex gap-1">
                    <button onclick="enviarWS(${v.id})" class="bg-green-600 text-white p-2 rounded text-[8px] font-bold">WS</button>
                    <button onclick="abonarV(${v.id})" class="bg-blue-600 text-white p-2 rounded text-[8px] font-bold">ABONO</button>
                    <button onclick="borrarV(${v.id})" class="bg-red-500 text-white px-2 rounded font-black italic text-[16px]">×</button>
                </div>
            </div>`).join("")}`;
    }

    if(window.view === "gastos"){
        html = `<div class="card"><input id="gNom" placeholder="DESCRIPCIÓN"><input id="gMon" type="number" placeholder="MONTO $"><button onclick="regG()" class="btn w-full bg-red-600 mt-2">Cargar Gasto</button></div>
        ${window.state.gastos.slice().reverse().map(g=>`
            <div class="card flex justify-between py-2 border-l-4 border-red-500">
                <div>
                    <span class="text-[8px] font-black text-slate-400 uppercase">${fmtDate(g.id)}</span><br>
                    <small class="uppercase font-bold">${g.name}</small><br>
                    <b>$${g.amount.toFixed(2)}</b>
                </div>
                <button onclick="borrarG(${g.id})" class="text-red-500 font-bold text-xs">X</button>
            </div>`).join("")}`;
    }

    if(window.view === "reportes"){
        let fVentas = window.state.ventas.filter(v => { let d = new Date(v.id); return d.getMonth() == window.reportMonth && d.getFullYear() == window.reportYear; });
        let fGastos = window.state.gastos.filter(g => { let d = new Date(g.id); return d.getMonth() == window.reportMonth && d.getFullYear() == window.reportYear; });
        let totalV = fVentas.reduce((a,b)=>a+b.total, 0);
        let totalG = fGastos.reduce((a,b)=>a+b.amount, 0);
        let clientMap = fVentas.reduce((a, b) => { a[b.cliente] = (a[b.cliente] || 0) + b.total; return a; }, {});
        let sortedClients = Object.entries(clientMap).sort((a,b) => b[1] - a[1]).slice(0, 5);

        html = `
        <div class="card bg-indigo-900 text-white p-4">
            <div class="grid grid-cols-2 gap-2">
                <select onchange="window.reportMonth=this.value; render();" class="!m-0 !py-1 !text-xs">
                    ${['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'].map((m,i)=>`<option value="${i}" ${window.reportMonth==i?'selected':''}>${m}</option>`).join("")}
                </select>
                <select onchange="window.reportYear=this.value; render();" class="!m-0 !py-1 !text-xs">
                    <option value="2026" selected>2026</option><option value="2025">2025</option>
                </select>
            </div>
        </div>
        <div class="grid grid-cols-2 gap-2">
            <div class="card !m-0 text-center border-b-4 border-green-500"><p class="text-[9px] font-bold uppercase">Ventas</p><b class="text-lg">$${totalV.toFixed(2)}</b></div>
            <div class="card !m-0 text-center border-b-4 border-red-500"><p class="text-[9px] font-bold uppercase">Gastos</p><b class="text-lg text-red-600">$${totalG.toFixed(2)}</b></div>
        </div>
        <div class="card mt-3"><h3 class="font-black uppercase text-[10px] mb-2 border-b">Top Clientes Mes</h3>
            ${sortedClients.map(([n, t]) => `<div class="flex justify-between py-1 text-[11px] border-b"><span>${n}</span><b>$${t.toFixed(2)}</b></div>`).join("") || '<p class="text-[10px] text-center italic">Sin datos</p>'}
        </div>`;
    }

    if(window.view === "compras"){
        html = `<div class="card border-l-4 border-blue-600"><h3 class="font-black text-[10px] uppercase mb-2">Cargar Stock</h3>
            <select id="mCom">${Object.keys(window.state.inventario).map(p=>`<option value="${p}">${p}</option>`).join("")}</select>
            <input id="qCom" type="number" placeholder="Metros"><input id="vCom" type="number" placeholder="Costo $"><button onclick="regCom()" class="btn w-full bg-blue-700 mt-2">Cargar</button>
        </div>
        <div class="card border-l-4 border-red-600 mt-4"><h3 class="font-black text-[10px] uppercase mb-2 text-red-700">Merma</h3>
            <select id="mMerma">${Object.keys(window.state.inventario).map(p=>`<option value="${p}">${p}</option>`).join("")}</select>
            <input id="qMerma" type="number" placeholder="Metros"><input id="rMerma" placeholder="Motivo"><button onclick="regMerma()" class="btn w-full bg-red-600 mt-2">Descontar</button>
        </div>
        <div class="grid grid-cols-2 gap-2 mt-4">${Object.entries(window.state.inventario).map(([n,i])=>`<div class="card !m-0 p-3 bg-white text-center"><b class="text-[9px] uppercase text-slate-500">${n}</b><br><span class="text-blue-700 font-black text-lg">${(i.stock || 0).toFixed(2)}</span></div>`).join("")}</div>`;
    }

    if(window.view === "config"){
        html = `<div class="card"><h2 class="font-black uppercase text-blue-700 mb-2 text-[10px]">Materiales</h2>
            <input id="nP" placeholder="EJ: BANNER 1.37"><button onclick="addC('p')" class="btn bg-blue-600 mt-1 w-full">Guardar</button>
            <div class="mt-4 space-y-1">${Object.entries(window.state.inventario).map(([n,i])=>`<div class="flex justify-between items-center p-2 bg-white rounded-lg text-[10px] uppercase border font-bold"><span>${n}</span><div class="flex gap-2"><button onclick="editStock('${n}')" class="text-blue-600 font-bold uppercase">Stock</button><button onclick="deleteMaterial('${n}')" class="text-red-500 font-bold">X</button></div></div>`).join("")}</div>
        </div><div class="card mt-4"><h2 class="font-black uppercase text-purple-700 mb-2 text-[10px]">Servicios</h2>
            <input id="nS" placeholder="EJ: DISEÑO"><button onclick="addC('s')" class="btn bg-purple-600 mt-1 w-full">Guardar</button>
            <div class="mt-4 space-y-1">${window.state.serviciosExtra.map((s, idx) => `<div class="flex justify-between items-center p-2 bg-white rounded-lg text-[10px] uppercase border font-bold"><span>${s}</span><button onclick="deleteServicio(${idx})" class="text-red-500 font-bold">X</button></div>`).join("")}</div>
        </div>`;
    }

    app.innerHTML = html;
};

// --- LOGICA RE-VINCULADA ---
window.initDashChart = (v, g, c) => {
    new Chart(document.getElementById('chartDash'), {
        type: 'bar',
        data: { labels: ['Ventas', 'Gastos', 'Caja'], datasets: [{ data: [v, g, c], backgroundColor: ['#6d28d9', '#ef4444', '#22c55e'], borderRadius: 8 }] },
        options: { plugins: { legend: { display: false } } }
    });
};

window.addItemCarrito = () => {
    let p = document.getElementById("pSel").value, s = document.getElementById("sSel").value, t = document.getElementById("tCli").value, c = parseFloat(document.getElementById("cQty").value) || 0;
    if(!p && !s) return;
    let uni = (t === "detal") ? "m²" : (t === "mayor" ? "ML" : "Und");
    let pre = (t === "detal") ? 9 : (t === "mayor" ? 10 : 12);
    let nom = (p && s) ? `${p} + ${s}` : (p || s);
    carritoVenta.push({ nombre: nom.toUpperCase(), qty: c, unidad: uni, sub: c * pre, esProd: !!p, prodKey: p });
    renderCarritoInner();
};

window.renderCarritoInner = () => {
    let div = document.getElementById("listaCarrito"), totalDiv = document.getElementById("totalVenta");
    if(!div) return;
    div.innerHTML = carritoVenta.map((v,i)=>`<div class="flex justify-between py-1 border-b bg-white px-2 rounded"><span><b>${v.qty}${v.unidad}</b> - ${v.nombre}</span><button onclick="removeItemCarrito(${i})" class="text-red-500 font-bold px-2 text-[14px]">×</button></div>`).join("");
    totalDiv.innerText = `TOTAL: $${carritoVenta.reduce((a,b)=>a+b.sub,0).toFixed(2)}`;
};

window.removeItemCarrito = (i) => { carritoVenta.splice(i, 1); renderCarritoInner(); };

window.procesarV = async () => {
    let cliente = document.getElementById("cliV").value.toUpperCase();
    let telefono = document.getElementById("telV").value;
    if(!cliente || carritoVenta.length === 0) return alert("Faltan datos");
    
    let keyT = Object.keys(window.state.inventario).find(k => k.toUpperCase().includes("TINTA"));
    carritoVenta.forEach(i => {
        if (i.esProd && i.prodKey && window.state.inventario[i.prodKey]) {
            window.state.inventario[i.prodKey].stock -= i.qty;
            if (keyT && i.prodKey.toUpperCase() !== keyT.toUpperCase()) window.state.inventario[keyT].stock -= i.qty;
        }
    });
    
    window.state.ventas.push({
        id: Date.now(), 
        cliente, 
        telefono,
        total: carritoVenta.reduce((a,b)=>a+b.sub, 0), 
        abonado: 0, 
        pagado: false, 
        items: [...carritoVenta]
    });
    await window.save(); 
    carritoVenta = []; 
    setView('cobranzas');
};

window.enviarWS = (id) => {
    let v = window.state.ventas.find(x => x.id === id);
    if(!v.telefono) return alert("No hay teléfono guardado");
    let msg = `Hola ${v.cliente}, de GhostPrint. Te escribimos para recordarte que tienes un pendiente de *$${(v.total-(v.abonado||0)).toFixed(2)}*. Quedamos atentos, ¡saludos!`;
    window.open(`https://api.whatsapp.com/send?phone=${v.telefono}&text=${encodeURIComponent(msg)}`, '_blank');
};

window.regCom = async () => {
    let m = document.getElementById("mCom").value, q = parseFloat(document.getElementById("qCom").value), v = parseFloat(document.getElementById("vCom").value);
    if(q > 0) { window.state.inventario[m].stock += q; window.state.gastos.push({id:Date.now(), name:`COMPRA: ${m}`, amount: v}); await window.save(); render(); }
};
window.regMerma = async () => {
    let m = document.getElementById("mMerma").value, q = parseFloat(document.getElementById("qMerma").value), r = document.getElementById("rMerma").value || "Sin motivo";
    if(m && q > 0) { window.state.inventario[m].stock -= q; window.state.mermas.push({id:Date.now(), name:m, qty:q, reason:r.toUpperCase()}); await window.save(); render(); }
};
window.addC = async (t) => {
    if(t==='p'){ let n=document.getElementById("nP").value.toUpperCase(); if(n) window.state.inventario[n]={stock:0}; }
    else { let n=document.getElementById("nS").value.toUpperCase(); if(n) window.state.serviciosExtra.push(n); }
    await window.save(); render();
};
window.deleteMaterial = async (n) => { if(confirm(`Eliminar ${n}?`)) { delete window.state.inventario[n]; await window.save(); render(); } };
window.deleteServicio = async (i) => { if(confirm(`Eliminar?`)) { window.state.serviciosExtra.splice(i,1); await window.save(); render(); } };
window.editStock = async (n) => { let v = parseFloat(prompt(`Stock de ${n}:`, window.state.inventario[n].stock)); if(!isNaN(v)){ window.state.inventario[n].stock = v; await window.save(); render(); } };
window.regG = async () => {
    let n = document.getElementById("gNom").value, m = parseFloat(document.getElementById("gMon").value);
    if(n && m) { window.state.gastos.push({id:Date.now(), name:n.toUpperCase(), amount: m}); await window.save(); render(); }
};
window.abonarV = async (id) => {
    let v = window.state.ventas.find(x=>x.id===id), m = parseFloat(prompt("¿Monto?"));
    if(m){ v.abonado += m; if(v.abonado >= v.total) v.pagado = true; await window.save(); render(); }
};
window.borrarV = async (id) => {
    if(confirm("¿Anular?")){
        let vIdx = window.state.ventas.findIndex(x => x.id === id);
        let venta = window.state.ventas[vIdx];
        let keyT = Object.keys(window.state.inventario).find(k => k.toUpperCase().includes("TINTA"));
        venta.items.forEach(i => {
            if (i.esProd && i.prodKey && window.state.inventario[i.prodKey]) {
                window.state.inventario[i.prodKey].stock += i.qty;
                if (keyT && i.prodKey.toUpperCase() !== keyT.toUpperCase()) window.state.inventario[keyT].stock += i.qty;
            }
        });
        window.state.ventas.splice(vIdx, 1); await window.save(); render();
    }
};
window.borrarG = async (id) => { if(confirm("¿Borrar?")){ window.state.gastos=window.state.gastos.filter(x=>x.id!==id); await window.save(); render(); } };

render();
</script>
</body>
</html>
