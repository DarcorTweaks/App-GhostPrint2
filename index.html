<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GhostPrint MASTER v29.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=JetBrains+Mono:wght@500&display=swap');
        :root { --bg-dark: #05050a; --card-bg: #0f0f1e; --accent: #8b5cf6; }
        body { background-color: var(--bg-dark); color: #f1f5f9; font-family: 'Inter', sans-serif; padding-bottom: 80px; -webkit-tap-highlight-color: transparent; }
        .card-pro { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; padding: 20px; margin-bottom: 16px; }
        nav { background: rgba(5, 5, 10, 0.8); backdrop-filter: blur(12px); display: flex; gap: 10px; overflow-x: auto; padding: 15px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(139, 92, 246, 0.2); }
        .btn-nav { background: rgba(255,255,255,0.03); color: #94a3b8; padding: 10px 20px; border-radius: 12px; font-size: 11px; font-weight: 800; white-space: nowrap; transition: all 0.3s; }
        .active { background: var(--accent) !important; color: white !important; box-shadow: 0 0 20px rgba(139, 92, 246, 0.4); }
        input, select { background: #000000 !important; border: 1px solid #1e293b !important; color: white !important; padding: 14px !important; border-radius: 12px !important; font-weight: 600 !important; width: 100%; }
        .btn-main { background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%); }
        .alert-low { border: 2px solid #ef4444 !important; background: rgba(239, 68, 68, 0.05) !important; }
        .receipt-paper { background: #ffffff; color: #1a1a1a; font-family: 'JetBrains+Mono', monospace; position: relative; }
    </style>
</head>
<body>

<div class="p-6 flex justify-between items-center border-b border-white/5 bg-[#05050a]">
    <div class="flex items-center gap-4">
        <div class="w-12 h-12 bg-purple-600/20 rounded-2xl flex items-center justify-center text-3xl">👻</div>
        <div>
            <h1 class="text-2xl font-black italic tracking-tighter text-white leading-none">GHOST<span class="text-purple-500">PRINT</span></h1>
            <p class="text-[9px] font-bold opacity-50 uppercase tracking-[0.3em]">System v29.2 • Online</p>
        </div>
    </div>
</div>

<nav id="mainNav">
    <div onclick="setView('inicio')" class="btn-nav active" id="n-inicio">📊 DASHBOARD</div>
    <div onclick="setView('ventas')" class="btn-nav" id="n-ventas">💵 NUEVA VENTA</div>
    <div onclick="setView('cobrar')" class="btn-nav" id="n-cobrar">📑 CUENTAS</div>
    <div onclick="setView('compras')" class="btn-nav" id="n-compras">🛒 COMPRAS</div>
    <div onclick="setView('gastos')" class="btn-nav" id="n-gastos">💸 GASTOS</div>
    <div onclick="setView('inventario')" class="btn-nav" id="n-inventario">📦 STOCK</div>
    <div onclick="setView('catalogo')" class="btn-nav" id="n-catalogo">⚙️ AJUSTES</div>
</nav>

<div id="app" class="p-4 max-w-2xl mx-auto"></div>

<div id="receiptModal" class="fixed inset-0 bg-black/95 z-[200] hidden flex items-center justify-center p-4">
    <div class="receipt-paper p-8 w-full max-w-sm shadow-2xl">
        <div id="receiptContent" class="text-[12px]"></div>
        <div class="mt-8 flex gap-3">
            <button onclick="closeReceipt()" class="flex-1 bg-gray-100 p-4 rounded-xl font-black text-xs uppercase text-black">Cerrar</button>
            <button onclick="shareReceipt()" class="flex-1 bg-green-600 text-white p-4 rounded-xl font-black text-xs uppercase">WhatsApp</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI", authDomain: "ghost-print-contabilidad.firebaseapp.com", projectId: "ghost-print-contabilidad", storageBucket: "ghost-print-contabilidad.firebasestorage.app", messagingSenderId: "867057362556", appId: "1:867057362556:web:6bd2a461817219a4000bf9" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const docRef = db.collection("sistema").doc("datos_principales");

    window.state = { ventas: [], inventario: {}, compras: [], gastos: [], servicios: [] };
    window.currentView = 'inicio';
    window.cart = [];

    window.sync = async function() { await docRef.set(window.state); render(); };
    docRef.onSnapshot(doc => { if(doc.exists) { window.state = doc.data(); render(); } });

    window.setView = function(v) { 
        window.currentView = v; 
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active')); 
        document.getElementById('n-'+v)?.classList.add('active'); 
        render(); 
    };

    window.render = function() {
        const app = document.getElementById("app");
        const inv = window.state.inventario || {};
        const today = new Date().toISOString().split('T')[0];

        if(window.currentView === 'inicio') {
            // Dashboard (Se mantiene el que te gustó)
            const vM = window.state.ventas || [];
            const gM = window.state.gastos || [];
            const totalAbonos = vM.reduce((a, b) => a + (Number(b.abono) || 0), 0);
            const totalGastos = gM.reduce((a, b) => a + (Number(b.monto) || 0), 0);
            app.innerHTML = `
                <div class="card-pro bg-gradient-to-br from-purple-600 to-indigo-800 border-none">
                    <p class="text-[10px] font-black uppercase tracking-[0.2em] text-white/60 mb-1">Efectivo Disponible</p>
                    <h2 class="text-5xl font-black italic text-white">$${(totalAbonos - totalGastos).toLocaleString()}</h2>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="card-pro border-l-4 border-green-500">
                        <p class="text-[9px] font-black opacity-40 uppercase">Ventas Totales</p>
                        <h3 class="text-2xl font-black text-white">$${vM.reduce((a,b)=>a+b.total,0).toLocaleString()}</h3>
                    </div>
                    <div class="card-pro border-l-4 border-red-500">
                        <p class="text-[9px] font-black opacity-40 uppercase">Pendiente</p>
                        <h3 class="text-2xl font-black text-red-500">$${(vM.reduce((a,b)=>a+b.total,0) - totalAbonos).toLocaleString()}</h3>
                    </div>
                </div>
            `;
        }

        else if(window.currentView === 'ventas') {
            // Nueva Venta (No se toca)
            app.innerHTML = `
                <div class="card-pro">
                    <h2 class="text-xl font-black italic text-purple-500 mb-6 uppercase tracking-tighter">Facturación</h2>
                    <div class="space-y-3">
                        <input id="vDate" type="date" value="${today}" class="mb-2">
                        <input id="cli" placeholder="NOMBRE DEL CLIENTE" class="uppercase">
                        <input id="wha" type="tel" placeholder="WHATSAPP">
                        <div class="bg-white/5 p-4 rounded-3xl border border-white/5">
                            <select id="vMat" onchange="updateVentaUI()"><option value="">SELECCIONAR PRODUCTO</option>${Object.keys(inv).map(m=>`<option value="${m}">${m}</option>`).join("")}</select>
                            <div class="flex gap-2 mt-2">
                                <select id="vTipo" class="w-1/3"><option value="M2">M2</option><option value="ML">ML</option><option value="UNID">UNID</option></select>
                                <input id="vCant" type="number" placeholder="CANT" oninput="updateVentaUI()" class="w-2/3">
                            </div>
                            <input id="vPrec" type="number" placeholder="PRECIO $" class="text-2xl text-purple-400 font-black mt-2">
                            <button onclick="addItem()" class="w-full bg-white/10 text-white py-3 rounded-xl font-black text-xs uppercase mt-2">+ AÑADIR</button>
                        </div>
                    </div>
                    <div id="vLista" class="mt-4 space-y-2">${window.cart.map((item, idx) => `<div class="flex justify-between bg-white/5 p-3 rounded-xl border border-white/5"><span class="text-xs uppercase font-bold">${item.m}</span><b class="text-purple-400">$${item.p}</b></div>`).join("")}</div>
                    <div class="my-6 text-center"><p class="text-[10px] font-black opacity-30 uppercase">Total</p><div class="text-6xl font-black text-white">$${window.cart.reduce((a,b)=>a+b.p, 0)}</div></div>
                    <input id="vAbono" type="number" placeholder="ABONO $" class="mb-4">
                    <button onclick="saveVenta()" class="btn-main w-full text-white py-5 rounded-2xl font-black text-lg uppercase">REGISTRAR VENTA 👻</button>
                </div>`;
        }

        else if(window.currentView === 'cobrar') {
            // Cuentas (No se toca, incluye el botón eliminar que pediste)
            renderPorCobrar(app);
        }

        else if(window.currentView === 'compras') {
            // RESTAURADO: Botones de editar y diseño original de nombres
            const listC = window.state.compras || [];
            app.innerHTML = `
                <div class="card-pro">
                    <h2 class="text-sm font-black italic text-blue-400 mb-6 uppercase text-center tracking-widest">Carga de Mercancía</h2>
                    <select id="cMat" class="mb-3"><option value="">-- SELECCIONAR MATERIAL --</option>${Object.keys(inv).map(m=>`<option value="${m}">${m}</option>`).join("")}</select>
                    <div class="grid grid-cols-2 gap-3 mb-3"><input id="cCant" type="number" placeholder="CANT ML"><input id="cCosto" type="number" placeholder="COSTO $"></div>
                    <button onclick="saveCompra()" class="btn-main text-white w-full py-4 rounded-xl font-black uppercase text-xs">Registrar Entrada</button>
                </div>
                <div class="space-y-2">
                    ${listC.slice().reverse().map((c, idx) => {
                        const realIdx = listC.length - 1 - idx;
                        return `
                        <div class="bg-white/5 p-4 rounded-2xl flex justify-between items-center border border-white/5">
                            <div>
                                <div class="text-[10px] font-black text-blue-400 uppercase tracking-tighter">${c.m}</div>
                                <div class="text-sm font-black text-white">${c.c} ML / $${c.co}</div>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="editCompra(${realIdx})" class="text-blue-400 text-xs font-black">EDITAR</button>
                                <button onclick="delCompra(${realIdx})" class="text-red-500 text-xs font-black">✕</button>
                            </div>
                        </div>`;
                    }).join("")}
                </div>`;
        }

        else if(window.currentView === 'inventario') {
            // STOCK: Alerta ajustada a 0 para tintas/kits
            app.innerHTML = `
                <h2 class="text-sm font-black italic text-blue-500 mb-6 uppercase tracking-widest text-center">Control de Stock</h2>
                <div class="space-y-3">
                    ${Object.entries(inv).map(([n, i]) => `
                        <div class="card-pro flex justify-between items-center ${i.stock <= 0 ? 'alert-low' : ''}">
                            <div>
                                <b class="uppercase text-purple-400 text-xs font-black tracking-tight">${n}</b>
                                <div class="text-4xl font-black italic text-white">${i.stock.toFixed(2)} <span class="text-xs opacity-30">ML</span></div>
                            </div>
                            <button onclick="editStock('${n}')" class="w-12 h-12 bg-white/5 rounded-2xl flex items-center justify-center text-lg">✏️</button>
                        </div>`).join("")}
                </div>`;
        }

        else if(window.currentView === 'catalogo') {
            // AJUSTES: Restaurada la lista de materiales
            const serv = window.state.servicios || [];
            app.innerHTML = `
                <div class="card-pro">
                    <h3 class="text-[10px] font-black text-blue-400 uppercase mb-4 tracking-widest">Nuevo Material</h3>
                    <div class="grid grid-cols-2 gap-3 mb-3"><input id="nMat" placeholder="NOMBRE" class="uppercase"><input id="aMat" type="number" placeholder="ANCHO"></div>
                    <button onclick="crearMat()" class="w-full bg-blue-600/20 text-blue-400 py-3 rounded-xl font-black uppercase text-[10px] border border-blue-500/20">+ REGISTRAR</button>
                </div>
                
                <div class="card-pro">
                    <h3 class="text-[10px] font-black text-blue-400 uppercase mb-4 tracking-widest">Lista de Materiales Registrados</h3>
                    <div class="space-y-2">
                        ${Object.keys(inv).map(m => `
                            <div class="flex justify-between items-center bg-black/40 p-3 rounded-xl border border-white/5">
                                <span class="text-[10px] font-black text-white/70 uppercase">${m} (${inv[m].ancho}m)</span>
                                <button onclick="eliminarMaterial('${m}')" class="text-red-500/40 text-xs">ELIMINAR</button>
                            </div>
                        `).join("")}
                    </div>
                </div>

                <div class="card-pro">
                    <h3 class="text-[10px] font-black text-purple-400 uppercase mb-4 tracking-widest">Servicios</h3>
                    <div class="flex gap-2 mb-4"><input id="nServ" placeholder="Nombre" class="uppercase"><button onclick="crearServicio()" class="bg-purple-600 text-white px-6 rounded-xl font-black">+</button></div>
                    <div class="grid grid-cols-2 gap-2">
                        ${serv.map((s, idx) => `<div class="bg-black/40 p-3 rounded-xl flex justify-between items-center border border-white/5"><span class="text-[10px] font-black text-white/70 uppercase">${s}</span><button onclick="delServicio(${idx})" class="text-red-500/40 text-xs">✕</button></div>`).join("")}
                    </div>
                </div>`;
        }
    };

    // FUNCIONES DE LÓGICA RESTAURADAS
    window.editCompra = async (idx) => {
        const c = window.state.compras[idx];
        let nC = parseFloat(prompt("Nueva Cantidad ML:", c.c));
        let nCo = parseFloat(prompt("Nuevo Costo:", c.co));
        if(!isNaN(nC)) {
            window.state.inventario[c.m].stock = (window.state.inventario[c.m].stock - c.c) + nC;
            c.c = nC;
            c.co = nCo;
            await window.sync();
        }
    };

    window.eliminarMaterial = async (m) => {
        if(confirm(`¿Seguro que quieres borrar ${m} del sistema?`)) {
            delete window.state.inventario[m];
            await window.sync();
        }
    };

    window.renderPorCobrar = function(app) {
        const ventas = window.state.ventas || [];
        const lista = ventas.filter(v => (v.total - v.abono) > 0.01);
        app.innerHTML = `
            <h2 class="text-sm font-black italic text-red-500 mb-6 uppercase tracking-widest text-center">Cuentas Pendientes</h2>
            <div class="space-y-3">
                ${lista.map(f => `
                    <div class="card-pro border-l-4 border-red-600">
                        <div class="flex justify-between items-center mb-4">
                            <div>
                                <b class="uppercase text-white font-black">${f.cliente}</b>
                                <div class="text-xl font-black text-red-500">Debe: $${(f.total - f.abono).toFixed(2)}</div>
                            </div>
                            <button onclick="window.open('https://wa.me/${f.whatsapp}')" class="bg-green-600/20 p-3 rounded-xl">📱</button>
                        </div>
                        <div class="flex gap-1">
                            <button onclick="abonar(${f.id})" class="flex-1 bg-green-600 text-white py-2 rounded-lg font-black text-[10px] uppercase">Abonar</button>
                            <button onclick="liquidar(${f.id})" class="flex-1 bg-purple-600 text-white py-2 rounded-lg font-black text-[10px] uppercase">Liquidar</button>
                            <button onclick="eliminarVenta(${f.id})" class="bg-red-600 text-white px-4 rounded-lg font-black text-[10px]">🗑️</button>
                            <button onclick="showReceipt(${f.id})" class="bg-white/10 p-2 rounded-lg">📄</button>
                        </div>
                    </div>`).join("")}
            </div>`;
    };

    // Funciones básicas compartidas
    window.saveCompra = async () => {
        const m = document.getElementById("cMat").value, c = parseFloat(document.getElementById("cCant").value), co = parseFloat(document.getElementById("cCosto").value);
        if(m && c) {
            window.state.inventario[m].stock += c;
            if(!window.state.compras) window.state.compras = [];
            window.state.compras.push({ m, c, co, f: new Date().toISOString() });
            await window.sync();
        }
    };
    window.delCompra = async (idx) => { if(confirm("¿Eliminar registro?")) { const comp = window.state.compras[idx]; window.state.inventario[comp.m].stock -= comp.c; window.state.compras.splice(idx, 1); await window.sync(); } };
    window.crearMat = async () => { const n = document.getElementById("nMat").value.toUpperCase(), a = parseFloat(document.getElementById("aMat").value); if(n && a) { window.state.inventario[n] = { stock: 0, precioM2: 0, precioML: 0, ancho: a }; await window.sync(); } };
    window.crearServicio = async () => { const s = document.getElementById("nServ").value.toUpperCase(); if(s) { if(!window.state.servicios) window.state.servicios = []; window.state.servicios.push(s); await window.sync(); } };
    window.delServicio = async (idx) => { window.state.servicios.splice(idx, 1); await window.sync(); };
    window.editStock = async (m) => { let n = parseFloat(prompt(`Nuevo Stock para ${m}:`, window.state.inventario[m].stock)); if(!isNaN(n)) { window.state.inventario[m].stock = n; await window.sync(); } };
    window.addItem = () => { const m = document.getElementById("vMat").value, p = parseFloat(document.getElementById("vPrec").value) || 0, c = parseFloat(document.getElementById("vCant").value) || 0; if(m && p) { window.cart.push({ m, p, c, t: document.getElementById("vTipo").value }); render(); } };
    window.saveVenta = async () => {
        const total = window.cart.reduce((a,b)=>a+b.p,0), abono = parseFloat(document.getElementById("vAbono").value) || 0;
        const id = Date.now();
        window.cart.forEach(i => { if(window.state.inventario[i.m]) window.state.inventario[i.m].stock -= i.c; });
        window.state.ventas.push({ id, cliente: document.getElementById("cli").value.toUpperCase(), whatsapp: document.getElementById("wha").value, items: [...window.cart], total, abono, fecha: document.getElementById("vDate").value });
        window.cart = [];
        await window.sync();
    };
    window.abonar = async (id) => { const v = window.state.ventas.find(x => x.id === id); let m = parseFloat(prompt("Monto:")); if(!isNaN(m)) { v.abono += m; await window.sync(); } };
    window.liquidar = async (id) => { const v = window.state.ventas.find(x => x.id === id); if(confirm("¿Liquidar?")) { v.abono = v.total; await window.sync(); } };
    window.eliminarVenta = async (id) => { if(confirm("¿Eliminar? Se devuelve el stock.")) { const idx = window.state.ventas.findIndex(v=>v.id===id); window.state.ventas[idx].items.forEach(i=>{ if(window.state.inventario[i.m]) window.state.inventario[i.m].stock += i.c; }); window.state.ventas.splice(idx,1); await window.sync(); } };
    window.showReceipt = (id) => {
        const v = window.state.ventas.find(x => x.id === id);
        document.getElementById("receiptContent").innerHTML = `<h2 class="text-center font-black text-xl mb-4 italic">GHOST PRINT</h2><p class="font-bold">CLIENTE: ${v.cliente}</p><div class="border-y border-dashed border-black my-4 py-2">${v.items.map(i=>`<div class="flex justify-between"><span>${i.m}</span><span>$${i.p}</span></div>`).join("")}</div><div class="flex justify-between font-black text-lg"><span>TOTAL:</span><span>$${v.total}</span></div><div class="flex justify-between text-green-700"><span>PAGADO:</span><span>$${v.abono}</span></div><div class="flex justify-between text-red-600 font-black"><span>DEBE:</span><span>$${(v.total-v.abono).toFixed(2)}</span></div>`;
        window.currentReceiptId = id; document.getElementById("receiptModal").classList.remove("hidden");
    };
    window.closeReceipt = () => document.getElementById("receiptModal").classList.add("hidden");
    window.shareReceipt = () => { const v = window.state.ventas.find(x => x.id === window.currentReceiptId); const txt = `*GHOST PRINT*%0A*Cliente:* ${v.cliente}%0A*Total:* $${v.total}%0A*Abonado:* $${v.abono}%0A*Resta:* $${(v.total-v.abono).toFixed(2)}`; window.open(`https://wa.me/${v.whatsapp}?text=${txt}`); };

    render();
</script>
</body>
</html>
