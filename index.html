<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GhostPrint PRO v18.5 - Definitiva</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { background-color: #030308; color: #f8fafc; font-family: 'Inter', sans-serif; padding-bottom: 100px; }
        .card-pro { background: #111122; border: 1px solid #2d2d44; border-radius: 20px; padding: 18px; margin-bottom: 12px; }
        nav { background: rgba(10, 10, 20, 0.95); display: flex; gap: 8px; overflow-x: auto; padding: 14px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #334155; }
        .btn-nav { background: #1e1e30; color: #64748b; padding: 12px 18px; border-radius: 14px; font-size: 10px; font-weight: 800; white-space: nowrap; cursor: pointer; text-transform: uppercase; }
        .active { background: #7c3aed !important; color: white !important; }
        input, select { background: #070712; border: 1px solid #334155; color: white; padding: 14px; border-radius: 14px; width: 100%; margin: 6px 0; font-weight: 700; outline: none; }
        .btn-main { background: linear-gradient(135deg, #7c3aed 0%, #4c1d95 100%); color: white; padding: 16px; border-radius: 16px; width: 100%; font-weight: 900; text-transform: uppercase; cursor: pointer; border: none; }
        #bill-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:200; padding:20px; }
        .bill-card { background: white; color: black; border-radius: 25px; padding: 25px; max-width: 350px; margin: 0 auto; }
    </style>
</head>
<body>

<header class="p-5 bg-[#0a0a1a] flex justify-between items-center border-b border-white/5">
    <div class="flex items-center"><span class="text-2xl mr-2">👻</span><h1 class="text-xl font-black italic uppercase italic">GhostPrint <span class="text-purple-500">PRO</span></h1></div>
</header>

<nav>
    <div onclick="setView('inicio')" class="btn-nav active" id="n-inicio">🏠 Inicio</div>
    <div onclick="setView('ventas')" class="btn-nav" id="n-ventas">💵 Ventas</div>
    <div onclick="setView('inventario')" class="btn-nav" id="n-inventario">📦 Stock</div>
    <div onclick="setView('reportes')" class="btn-nav" id="n-reportes">📊 Análisis</div>
    <div onclick="setView('cobros')" class="btn-nav" id="n-cobros">⏳ Cuentas</div>
    <div onclick="setView('gastos')" class="btn-nav" id="n-gastos">💸 Gastos</div>
    <div onclick="setView('compras')" class="btn-nav" id="n-compras">🛒 Carga</div>
    <div onclick="setView('catalogo')" class="btn-nav" id="n-catalogo">⚙️ Config</div>
</nav>

<div id="app" class="p-4 max-w-2xl mx-auto"></div>

<div id="bill-modal">
    <div class="bill-card shadow-2xl">
        <div class="text-center">
            <h2 class="text-xl font-black italic uppercase italic">GhostPrint <span class="text-purple-600">PRO</span></h2>
            <p id="b-fecha" class="text-[10px] font-bold text-gray-400"></p>
        </div>
        <div class="border-t-2 dashed border-gray-100 my-4"></div>
        <p class="text-[10px] uppercase font-black text-gray-400">Cliente:</p>
        <p id="b-cli" class="text-lg font-black uppercase text-gray-800"></p>
        <p class="text-[10px] uppercase font-black text-gray-400 mt-4">Saldo Pendiente:</p>
        <p id="b-monto" class="text-4xl font-black text-purple-700"></p>
        <div class="border-t-2 dashed border-gray-100 my-4"></div>
        <button id="btn-wa" class="btn-main !from-green-600 !to-green-800 mb-2">ENVIAR WHATSAPP</button>
        <button onclick="closeBill()" class="w-full text-gray-400 font-bold py-2">Cerrar</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI", authDomain: "ghost-print-contabilidad.firebaseapp.com", projectId: "ghost-print-contabilidad", storageBucket: "ghost-print-contabilidad.firebasestorage.app", messagingSenderId: "867057362556", appId: "1:867057362556:web:6bd2a461817219a4000bf9" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const docRef = db.collection("sistema").doc("datos_principales");

    window.state = JSON.parse(localStorage.getItem('gp_v18_5')) || { ventas: [], gastos: [], inventario: {}, serviciosExtra: ["OJALETES", "DISEÑO", "MONTAJE", "CORTE"], comprasInversion: [] };
    window.currentView = "inicio";
    let cart = [];

    window.sync = async function() {
        localStorage.setItem('gp_v18_5', JSON.stringify(window.state));
        await docRef.set(window.state).catch(e => console.log("Error sync"));
    };

    docRef.onSnapshot(doc => { if(doc.exists) { window.state = doc.data(); render(); } });

    window.setView = function(v) {
        window.currentView = v;
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
        document.getElementById('n-' + v).classList.add('active');
        render();
    };

    window.render = function() {
        const app = document.getElementById("app");
        const mesActual = new Date().getMonth();
        const vM = (window.state.ventas || []).filter(v => new Date(v.id).getMonth() === mesActual);
        const gM = (window.state.gastos || []).filter(g => new Date(g.id).getMonth() === mesActual);
        const cM = (window.state.comprasInversion || []).filter(c => new Date(c.id).getMonth() === mesActual);

        const tCobrado = vM.reduce((a, b) => a + (Number(b.abonado) || (b.pagado ? b.total : 0)), 0);
        const tGastos = gM.reduce((a, b) => a + Number(b.amount), 0) + cM.reduce((a, b) => a + Number(b.amount), 0);
        const utilidad = tCobrado - tGastos;

        if(window.currentView === "inicio") {
            app.innerHTML = `<div class="card-pro !bg-gradient-to-br !from-purple-600 !to-indigo-900 border-none"><p class="text-[10px] font-black text-center uppercase italic opacity-80">Efectivo Real en Caja</p><h2 class="text-6xl font-black text-center italic mt-2">$${utilidad.toFixed(2)}</h2></div><div class="grid grid-cols-2 gap-3"><div class="card-pro text-center"><p class="text-[8px] opacity-40 uppercase">Cobros Mes</p><b class="text-xl">$${tCobrado.toFixed(0)}</b></div><div class="card-pro text-center"><p class="text-[8px] opacity-40 uppercase">Gastos/Stock</p><b class="text-xl text-red-400">$${tGastos.toFixed(0)}</b></div></div>`;
        }

        if(window.currentView === "ventas") {
            app.innerHTML = `<div class="card-pro"><h2 class="text-lg font-black uppercase italic mb-4">Nueva Venta</h2><input id="cli" placeholder="CLIENTE"><input id="tel" type="number" placeholder="WHATSAPP"><div class="bg-white/5 p-4 rounded-xl mt-3"><div class="grid grid-cols-2 gap-2"><select id="pS"><option value="">Material...</option>${Object.keys(window.state.inventario || {}).map(m=>`<option value="${m}">${m}</option>`).join("")}</select><select id="sS"><option value="">Servicio...</option>${(window.state.serviciosExtra || []).map(s=>`<option value="${s}">${s}</option>`).join("")}</select></div><input id="qV" type="number" placeholder="Cantidad" value="1"><select id="tC" onchange="document.getElementById('pL').classList.toggle('hidden', this.value !== 'libre')"><option value="detal">DETAL ($9)</option><option value="mayor">MAYOR ($10)</option><option value="libre">PRECIO LIBRE</option></select><input id="pL" class="hidden" type="number" placeholder="Monto Personalizado $"><button onclick="addCart()" class="btn-main !p-3 mt-3">+ Añadir Producto</button></div><div id="cart-list" class="mt-4 space-y-1 text-xs"></div><div id="total-disp" class="text-4xl font-black text-center my-6 italic">$0.00</div><button onclick="finalizarVenta()" class="btn-main">Guardar Venta</button></div>`;
        }

        if(window.currentView === "cobros") {
            const deudas = (window.state.ventas || []).filter(v => !v.pagado);
            app.innerHTML = `<div class="space-y-3">${deudas.map(v => `<div class="card-pro flex justify-between items-center border-l-4 border-orange-500"><div><b class="text-xs uppercase">${v.cliente}</b><br><span class="text-orange-400 text-xs font-black">Debe: $${(v.total - (v.abonado||0)).toFixed(2)}</span></div><div class="flex gap-2"><button onclick="showBill('${v.cliente}', ${(v.total-(v.abonado||0))}, '${v.telefono}')" class="bg-green-600 p-3 rounded-xl">📋</button><button onclick="abono(${v.id})" class="bg-purple-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase">Cobrar</button></div></div>`).join("") || '<p class="text-center py-10 opacity-30">SIN CUENTAS POR COBRAR</p>'}</div>`;
        }

        if(window.currentView === "catalogo") {
            app.innerHTML = `<div class="card-pro"><h2 class="text-xs font-black uppercase opacity-50 mb-4">Añadir al Catálogo</h2><input id="newM" placeholder="Nombre Material (Ej: BANNER)"><button onclick="addMat()" class="btn-main !p-3 mb-4">Guardar Material</button><input id="newS" placeholder="Nombre Servicio (Ej: OJALETES)"><button onclick="addServicio()" class="btn-main !p-3">Guardar Servicio</button></div>`;
        }

        if(window.currentView === "inventario") {
            app.innerHTML = `<div class="space-y-3">${Object.entries(window.state.inventario || {}).map(([n, i]) => `
                <div class="card-pro border-l-4 ${i.stock < 5 ? 'border-red-500' : 'border-green-500'}">
                    <div class="flex justify-between items-center">
                        <div><p class="text-[9px] font-black opacity-50 uppercase">${n}</p><h4 class="text-3xl font-black">${(i.stock || 0).toFixed(2)}</h4></div>
                        <div class="flex gap-2"><button onclick="editMatInv('${n}')" class="bg-white/5 p-2 rounded-xl text-[9px] font-black">EDITAR</button><button onclick="delMatInv('${n}')" class="bg-red-600/10 text-red-500 p-2 rounded-xl text-[9px] font-black">X</button></div>
                    </div>
                </div>`).join("")}</div>`;
        }
        
        if(window.currentView === "gastos") {
            app.innerHTML = `<div class="card-pro"><h2 class="text-lg font-black uppercase italic mb-4">Gasto</h2><input id="dG" placeholder="Descripción"><input id="aG" type="number" placeholder="Monto $"><button onclick="saveGasto()" class="btn-main mt-4">Guardar Gasto</button></div><div class="space-y-2 opacity-50 text-[10px] uppercase font-black px-2">${(window.state.gastos || []).slice(-5).reverse().map(g=>`<div class="flex justify-between border-b border-white/5 py-1"><span>${g.desc}</span><span>$${g.amount}</span></div>`).join("")}</div>`;
        }
    };

    // LOGICA DE NEGOCIO
    window.addCart = () => {
        let m = document.getElementById("pS").value, s = document.getElementById("sS").value, q = parseFloat(document.getElementById("qV").value) || 1, t = document.getElementById("tC").value;
        let p = (t === "detal") ? 9 : (t === "mayor") ? 10 : parseFloat(document.getElementById("pL").value) || 0;
        let d = (m && s) ? m + " + " + s : m || s;
        if(d) { cart.push({ d, p: (p*q), mat: m, qtyV: q }); renderCart(); }
    };
    function renderCart() { document.getElementById("cart-list").innerHTML = cart.map(c => `<div class="flex justify-between"><span>${c.d}</span><b>$${c.p}</b></div>`).join(""); document.getElementById("total-disp").innerText = "$" + cart.reduce((a,b)=>a+b.p,0).toFixed(2); }
    
    window.finalizarVenta = async () => {
        let cli = document.getElementById("cli").value;
        if(!cli || !cart.length) return;
        cart.forEach(c => { if(c.mat && window.state.inventario[c.mat]) window.state.inventario[c.mat].stock -= c.qtyV; });
        window.state.ventas.push({ id: Date.now(), cliente: cli.toUpperCase(), telefono: document.getElementById("tel").value, total: cart.reduce((a,b)=>a+b.p,0), abonado: 0, pagado: false });
        await window.sync(); cart = []; setView('inicio');
    };

    window.abono = async (id) => {
        let v = window.state.ventas.find(x => x.id === id);
        let m = parseFloat(prompt(`Saldo: $${(v.total-v.abonado).toFixed(2)}. ¿Abono?`));
        if(m) { v.abonado = (Number(v.abonado)||0) + m; if(v.abonado >= v.total) v.pagado = true; await window.sync(); render(); }
    };

    window.showBill = (cli, mon, tel) => {
        document.getElementById('b-cli').innerText = cli;
        document.getElementById('b-monto').innerText = "$" + mon.toFixed(2);
        document.getElementById('b-fecha').innerText = new Date().toLocaleDateString();
        document.getElementById('bill-modal').style.display = 'block';
        document.getElementById('btn-wa').onclick = () => {
            const msg = `*GHOSTPRINT PRO*%0A*Cliente:* ${cli}%0A*Saldo Pendiente:* $${mon.toFixed(2)}%0A_Favor reportar su pago._`;
            window.open(`https://api.whatsapp.com/send?phone=${tel}&text=${msg}`, '_blank');
        };
    };
    window.closeBill = () => document.getElementById('bill-modal').style.display = 'none';

    window.addMat = async () => { let n = document.getElementById("newM").value.toUpperCase(); if(n) { if(!window.state.inventario) window.state.inventario = {}; window.state.inventario[n] = {stock: 0}; await window.sync(); render(); } };
    window.addServicio = async () => { let s = document.getElementById("newS").value.toUpperCase(); if(s) { if(!window.state.serviciosExtra) window.state.serviciosExtra = []; window.state.serviciosExtra.push(s); await window.sync(); render(); } };
    window.delMatInv = async (n) => { if(confirm(`Eliminar ${n}?`)){ delete window.state.inventario[n]; await window.sync(); render(); } };
    window.editMatInv = async (old) => { let n = prompt("Nuevo nombre:", old); if(n) { window.state.inventario[n.toUpperCase()] = window.state.inventario[old]; delete window.state.inventario[old]; await window.sync(); render(); } };
    window.saveGasto = async () => { const d = document.getElementById("dG").value, a = parseFloat(document.getElementById("aG").value); if(d && a) { window.state.gastos.push({ id: Date.now(), desc: d.toUpperCase(), amount: a }); await window.sync(); setView('inicio'); } };

    render();
</script>
</body>
</html>
