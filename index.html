<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostPrint PRO v12.7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #05050a; color: #e2e8f0; font-family: 'Inter', sans-serif; padding-bottom: 40px; }
        header { background: #1e1e2f; padding: 15px; border-bottom: 3px solid #6d28d9; }
        nav { background: #11111d; display: flex; gap: 8px; overflow-x: auto; padding: 12px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #334155; }
        .btn-nav { background: #26263d; color: #94a3b8; padding: 10px 14px; border-radius: 12px; font-size: 10px; font-weight: 800; white-space: nowrap; }
        .active { background: #6d28d9 !important; color: white !important; }
        .card-pro { background: #161625; border: 1px solid #2d2d44; border-radius: 20px; padding: 18px; margin-bottom: 12px; }
        input, select { background: #0a0a14; border: 1px solid #334155; color: white; padding: 12px; border-radius: 12px; width: 100%; margin: 5px 0; font-weight: 700; }
        .btn-main { background: linear-gradient(to right, #6d28d9, #4c1d95); color: white; padding: 16px; border-radius: 16px; width: 100%; font-weight: 900; }
    </style>
</head>
<body>

<header class="flex justify-between items-center">
    <div>
        <h1 class="text-xl font-black italic text-purple-400 uppercase tracking-tighter">GhostPrint PRO</h1>
        <p class="text-[8px] font-bold opacity-50">SISTEMA DE CONTROL v12.7</p>
    </div>
    <div id="conn-status" class="flex items-center gap-2 bg-black/40 px-3 py-1 rounded-full border border-white/5">
        <div id="status-dot" class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></div>
        <span id="status-text" class="text-[9px] font-black text-white uppercase">Sin Internet</span>
    </div>
</header>

<nav id="main-nav">
    <button onclick="setView('dashboard')" class="btn-nav active">🏠 INICIO</button>
    <button onclick="setView('ventas')" class="btn-nav">💵 VENTAS</button>
    <button onclick="setView('reportes')" class="btn-nav">📊 REPORTES</button>
    <button onclick="setView('compras')" class="btn-nav">📦 STOCK</button>
    <button onclick="setView('gastos')" class="btn-nav">📉 GASTOS</button>
    <button onclick="setView('cobranzas')" class="btn-nav">⏳ COBROS</button>
    <button onclick="setView('config')" class="btn-nav">⚙️ CONFIG</button>
</nav>

<div id="app" class="p-4 max-w-xl mx-auto"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI",
    authDomain: "ghost-print-contabilidad.firebaseapp.com",
    projectId: "ghost-print-contabilidad",
    storageBucket: "ghost-print-contabilidad.firebasestorage.app",
    messagingSenderId: "867057362556",
    appId: "1:867057362556:web:6bd2a461817219a4000bf9"
};

const appF = initializeApp(firebaseConfig);
const db = getFirestore(appF);
const docRef = doc(db, "sistema", "datos_principales");

window.state = { ventas: [], gastos: [], inventario: {}, serviciosExtra: [], comprasInversion: [] };
window.view = "dashboard";
let selMes = new Date().getMonth();

const esMes = (id) => new Date(id).getMonth() === selMes;

window.save = async () => { await setDoc(docRef, window.state); };
window.setView = (v) => { window.view = v; render(); };

onSnapshot(docRef, (snap) => {
    if (snap.exists()) { 
        window.state = snap.data(); 
        document.getElementById("status-dot").classList.replace("bg-red-500", "bg-green-500");
        document.getElementById("status-dot").classList.remove("animate-pulse");
        document.getElementById("status-text").innerText = "CONECTADO";
        render(); 
    }
});

window.render = function() {
    let app = document.getElementById("app");
    if(!app) return;
    let html = "";

    if(window.view === "dashboard"){
        let vM = (window.state.ventas || []).filter(i => esMes(i.id));
        let gM = (window.state.gastos || []).filter(i => esMes(i.id));
        let cM = (window.state.comprasInversion || []).filter(i => esMes(i.id));
        
        let tV = vM.reduce((a,b)=>a+(b.total||0),0);
        let tG = gM.reduce((a,b)=>a+(b.amount||0),0);
        let tI = cM.reduce((a,b)=>a+(b.amount||0),0);
        let neta = tV - tG - tI;

        html = `
        <div class="card-pro border-l-4 border-purple-500">
            <p class="text-[9px] font-black text-purple-400 uppercase tracking-widest">Balance Neto del Mes</p>
            <h2 class="text-5xl font-black italic text-white">$${neta.toFixed(2)}</h2>
        </div>
        <div class="grid grid-cols-1 gap-2">
            <div class="bg-green-600/20 p-4 rounded-2xl flex justify-between"><span>Ventas</span><b class="text-green-400">$${tV.toFixed(2)}</b></div>
            <div class="bg-red-600/20 p-4 rounded-2xl flex justify-between"><span>Gastos</span><b class="text-red-400">-$${tG.toFixed(2)}</b></div>
            <div class="bg-blue-600/20 p-4 rounded-2xl flex justify-between"><span>Inversión</span><b class="text-blue-400">-$${tI.toFixed(2)}</b></div>
        </div>`;
    }

    if(window.view === "ventas"){
        html = `<div class="card-pro">
            <h2 class="text-lg font-black text-purple-400 mb-3 italic">REGISTRAR VENTA</h2>
            <input type="date" id="fV" value="${new Date().toLocaleDateString('en-CA')}">
            <input id="cli" placeholder="CLIENTE">
            <input id="tel" type="number" placeholder="WHATSAPP">
            <div class="bg-white/5 p-3 rounded-xl mt-3 border border-white/10">
                <div class="grid grid-cols-2 gap-2">
                    <select id="pS"><option value="">Material...</option>${Object.keys(window.state.inventario || {}).map(p=>`<option value="${p}">${p}</option>`).join("")}</select>
                    <select id="sS"><option value="">Servicio...</option>${(window.state.serviciosExtra || []).map(s=>`<option value="${s}">${s}</option>`).join("")}</select>
                </div>
                <select id="tC" onchange="document.getElementById('pL').classList.toggle('hidden', this.value!=='libre')">
                    <option value="detal">DETAL ($9)</option><option value="mayor">MAYOR ($10)</option><option value="libre">LIBRE</option>
                </select>
                <input id="pL" class="hidden" type="number" placeholder="Precio $">
                <div class="flex gap-2"><input id="q" type="number" value="1" step="0.1" class="!w-1/3"><button onclick="addI()" class="btn-main !p-3">+ AÑADIR</button></div>
            </div>
            <div id="lC" class="mt-4 space-y-1"></div>
            <div id="tV" class="text-2xl font-black text-center my-4">TOTAL: $0.00</div>
            <button onclick="saveV()" class="btn-main">GUARDAR VENTA</button>
        </div>`;
    }

    if(window.view === "reportes"){
        let vM = (window.state.ventas || []).filter(i => esMes(i.id));
        html = `<div class="card-pro text-center">
            <h2 class="font-black text-white italic">REPORTE DETALLADO</h2>
            <select onchange="selMes=parseInt(this.value);render();" class="!w-1/2 mx-auto !py-1">
                ${['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Sept','Oct','Nov','Dic'].map((m,i)=>`<option value="${i}" ${selMes==i?'selected':''}>${m}</option>`).join("")}
            </select>
        </div>
        <div class="card-pro">
            <p class="text-xs font-bold text-slate-400 mb-2 uppercase">Historial de Ventas</p>
            ${vM.map(v=>`<div class="flex justify-between py-2 border-b border-white/5 text-[10px]">
                <span>${new Date(v.id).toLocaleDateString()} - ${v.cliente}</span>
                <b class="text-purple-400">$${v.total.toFixed(2)}</b>
            </div>`).join("") || '<p class="text-center opacity-30 italic py-4">Sin datos este mes</p>'}
        </div>`;
    }

    if(window.view === "compras"){
        html = `<div class="card-pro">
            <h2 class="text-lg font-black text-blue-400 italic mb-3 uppercase">Stock e Inversión</h2>
            <input type="date" id="fC" value="${new Date().toLocaleDateString('en-CA')}">
            <select id="mC">${Object.keys(window.state.inventario || {}).map(p=>`<option value="${p}">${p}</option>`).join("")}</select>
            <div class="grid grid-cols-2 gap-2">
                <input id="qC" type="number" placeholder="Metros" oninput="calcC()">
                <input id="pM" type="number" placeholder="$/m" oninput="calcC()">
            </div>
            <div id="resC" class="text-center p-2 text-blue-400 font-black">INVERSIÓN: $0.00</div>
            <button onclick="saveC()" class="btn-main !from-blue-600 !to-blue-800">CARGAR STOCK</button>
        </div>
        <div class="grid grid-cols-2 gap-2">
            ${Object.entries(window.state.inventario || {}).map(([n, i])=>`<div class="card-pro text-center">
                <p class="text-[8px] font-black text-slate-400 uppercase">${n}</p>
                <h4 class="text-xl font-black">${(i.stock || 0).toFixed(2)}m</h4>
                <button onclick="adjStock('${n}')" class="text-blue-500 text-[9px] font-bold underline">Corregir</button>
            </div>`).join("")}
        </div>`;
    }

    if(window.view === "gastos"){
        let gM = (window.state.gastos || []).filter(i => esMes(i.id)).reverse();
        html = `<div class="card-pro">
            <h2 class="text-lg font-black text-red-500 italic mb-3">GASTOS</h2>
            <input type="date" id="fG" value="${new Date().toLocaleDateString('en-CA')}">
            <input id="gN" placeholder="Concepto del gasto">
            <input id="gM" type="number" placeholder="Monto $">
            <button onclick="saveG()" class="btn-main !from-red-600 !to-red-800 mt-2">REGISTRAR GASTO</button>
        </div>
        <div class="space-y-2">
            ${gM.map(g=>`<div class="card-pro !py-3 flex justify-between items-center text-xs">
                <span>${g.name}</span><b>$${g.amount}</b><button onclick="del('g',${g.id})" class="text-red-500 font-black ml-4">×</button>
            </div>`).join("")}
        </div>`;
    }

    if(window.view === "cobranzas"){
        let deudas = (window.state.ventas || []).filter(v=>!v.pagado);
        html = `<div class="card-pro border-amber-500/50"><h2 class="text-lg font-black text-amber-500 uppercase italic">Pendientes</h2></div>
        ${deudas.map(v=>`<div class="card-pro flex justify-between items-center border-l-4 border-amber-500">
            <div><b class="text-sm uppercase">${v.cliente}</b><br><span class="text-red-400 font-bold text-xs">Faltan: $${(v.total-(v.abonado||0)).toFixed(2)}</span></div>
            <div class="flex gap-2"><button onclick="ws('${v.telefono}',${v.total-(v.abonado||0)})" class="bg-green-600 p-3 rounded-xl">📱</button>
            <button onclick="abono(${v.id})" class="bg-blue-600 px-4 py-2 rounded-xl text-[10px] font-black">ABONO</button></div>
        </div>`).join("") || '<p class="text-center py-10 opacity-30 italic">Todo cobrado.</p>';
    }

    if(window.view === "config"){
        html = `<div class="card-pro">
            <h2 class="text-lg font-black text-slate-400 italic mb-4 uppercase">Configuración</h2>
            <div class="flex gap-2"><input id="nP" placeholder="Nuevo Material"><button onclick="cat('p')" class="bg-purple-600 px-4 rounded-xl font-black">+</button></div>
            <div class="flex gap-2 mt-2"><input id="nS" placeholder="Nuevo Servicio"><button onclick="cat('s')" class="bg-indigo-600 px-4 rounded-xl font-black">+</button></div>
        </div>
        <button onclick="resetGeneral()" class="w-full text-red-700 font-black text-[10px] mt-10 tracking-widest uppercase">⚠️ Resetear Datos</button>`;
    }

    app.innerHTML = html;
};

// --- LOGICA ---
let cart = [];
window.addI = () => {
    let p = document.getElementById("pS").value, s = document.getElementById("sS").value, t = document.getElementById("tC").value, q = parseFloat(document.getElementById("q").value) || 0;
    let pre = (t === "detal") ? 9 : (t === "mayor") ? 10 : parseFloat(document.getElementById("pL").value) || 0;
    if(p || s) cart.push({ item: (p && s ? p+" + "+s : p||s).toUpperCase(), qty: q, price: pre, sub: q*pre, material: p });
    document.getElementById("lC").innerHTML = cart.map((c, i) => `<div class="bg-white/5 p-2 rounded-lg flex justify-between text-[11px]"><span>${c.qty}x ${c.item}</span><b>$${c.sub.toFixed(2)} <button onclick="delI(${i})" class="text-red-500">×</button></b></div>`).join("");
    document.getElementById("tV").innerText = "TOTAL: $" + cart.reduce((a,b)=>a+b.sub,0).toFixed(2);
};
window.delI = (i) => { cart.splice(i, 1); addI(); if(!cart.length) document.getElementById("lC").innerHTML=""; };
window.saveV = async () => {
    let cli = document.getElementById("cli").value, tel = document.getElementById("tel").value, fec = document.getElementById("fV").value;
    if(!cli || !cart.length) return alert("Faltan datos");
    cart.forEach(it => { if(it.material && window.state.inventario[it.material]) window.state.inventario[it.material].stock -= it.qty; });
    window.state.ventas.push({ id: new Date(fec+"T12:00:00").getTime(), cliente: cli.toUpperCase(), telefono: tel, total: cart.reduce((a,b)=>a+b.sub,0), abonado: 0, pagado: false });
    await window.save(); cart = []; setView('dashboard');
};
window.calcC = () => { document.getElementById("resC").innerText = "INVERSIÓN: $" + ((parseFloat(document.getElementById("qC").value)||0)*(parseFloat(document.getElementById("pM").value)||0)).toFixed(2); };
window.saveC = async () => {
    let q = parseFloat(document.getElementById("qC").value), p = parseFloat(document.getElementById("pM").value), m = document.getElementById("mC").value, f = document.getElementById("fC").value;
    if(q > 0 && p > 0) {
        window.state.inventario[m].stock += q;
        if(!window.state.comprasInversion) window.state.comprasInversion = [];
        window.state.comprasInversion.push({id: new Date(f+"T12:00:00").getTime(), name: `Rollo ${m}`, amount: q*p});
        await window.save(); setView('dashboard');
    }
};
window.saveG = async () => {
    let f = document.getElementById("fG").value, n = document.getElementById("gN").value, m = parseFloat(document.getElementById("gM").value);
    if(n && m) { window.state.gastos.push({id: new Date(f+"T12:00:00").getTime(), name: n.toUpperCase(), amount: m}); await window.save(); render(); }
};
window.del = async (type, id) => { if(confirm("¿Borrar?")){ if(type==='g') window.state.gastos = window.state.gastos.filter(x=>x.id!==id); await window.save(); render(); } };
window.abono = async (id) => { let v = window.state.ventas.find(x=>x.id===id), m = parseFloat(prompt("Monto abono?")); if(m){ v.abonado = (v.abonado||0) + m; if(v.abonado >= v.total) v.pagado = true; await window.save(); render(); } };
window.ws = (tel, d) => window.open(`https://api.whatsapp.com/send?phone=${tel}&text=Hola, tienes un pendiente de $${d.toFixed(2)} en GhostPrint.`, '_blank');
window.adjStock = async (n) => { let a = parseFloat(prompt("Stock real?", window.state.inventario[n].stock)); if(!isNaN(a)){ window.state.inventario[n].stock = a; await window.save(); render(); } };
window.cat = async (t) => { 
    let n = document.getElementById(t==='p'?'nP':'nS').value.toUpperCase(); if(!n) return;
    if(t==='p') { if(!window.state.inventario) window.state.inventario={}; window.state.inventario[n]={stock:0}; } 
    else { if(!window.state.serviciosExtra) window.state.serviciosExtra=[]; window.state.serviciosExtra.push(n); } 
    await window.save(); render(); 
};
window.resetGeneral = async () => { if(confirm("¿BORRAR TODO?")){ window.state.ventas = []; window.state.gastos = []; window.state.comprasInversion = []; await window.save(); setView('dashboard'); } };

render();
</script>
</body>
</html>
