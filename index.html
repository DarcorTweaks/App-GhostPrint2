<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GhostPrint PRO v19.4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { background-color: #030308; color: #f8fafc; font-family: 'Inter', sans-serif; padding-bottom: 100px; }
        .card-pro { background: #111122; border: 1px solid #2d2d44; border-radius: 20px; padding: 18px; margin-bottom: 12px; }
        nav { background: rgba(10, 10, 20, 0.95); display: flex; gap: 8px; overflow-x: auto; padding: 14px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #334155; }
        .btn-nav { background: #1e1e30; color: #64748b; padding: 12px 18px; border-radius: 14px; font-size: 10px; font-weight: 800; white-space: nowrap; cursor: pointer; text-transform: uppercase; }
        .active { background: #7c3aed !important; color: white !important; }
        input, select { background: #070712; border: 1px solid #334155; color: white; padding: 14px; border-radius: 14px; width: 100%; margin: 6px 0; font-weight: 700; outline: none; }
        .btn-main { background: linear-gradient(135deg, #7c3aed 0%, #4c1d95 100%); color: white; padding: 16px; border-radius: 16px; width: 100%; font-weight: 900; text-transform: uppercase; cursor: pointer; border: none; }
        .bar-bg { background: #1e1e30; height: 12px; border-radius: 10px; overflow: hidden; }
        .bar-fill { background: #7c3aed; height: 100%; border-radius: 10px; transition: width 0.5s; }
    </style>
</head>
<body>

<header class="p-5 bg-[#0a0a1a] flex justify-between items-center border-b border-white/5">
    <div class="flex items-center"><span class="text-2xl mr-2">👻</span><h1 class="text-xl font-black italic uppercase">GhostPrint <span class="text-purple-500">PRO</span></h1></div>
</header>

<nav>
    <div onclick="setView('inicio')" class="btn-nav active" id="n-inicio">🏠 Inicio</div>
    <div onclick="setView('ventas')" class="btn-nav" id="n-ventas">💵 Ventas</div>
    <div onclick="setView('inventario')" class="btn-nav" id="n-inventario">📦 Stock</div>
    <div onclick="setView('reportes')" class="btn-nav" id="n-reportes">📊 Análisis</div>
    <div onclick="setView('cobros')" class="btn-nav" id="n-cobros">⏳ Cuentas</div>
    <div onclick="setView('gastos')" class="btn-nav" id="n-gastos">💸 Gastos</div>
    <div onclick="setView('compras')" class="btn-nav" id="n-compras">🛒 Compras</div>
</nav>

<div id="app" class="p-4 max-w-2xl mx-auto"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI", authDomain: "ghost-print-contabilidad.firebaseapp.com", projectId: "ghost-print-contabilidad", storageBucket: "ghost-print-contabilidad.firebasestorage.app", messagingSenderId: "867057362556", appId: "1:867057362556:web:6bd2a461817219a4000bf9" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const docRef = db.collection("sistema").doc("datos_principales");

    window.state = JSON.parse(localStorage.getItem('gp_v19_4')) || { ventas: [], gastos: [], inventario: {}, serviciosExtra: ["OJALETES", "DISEÑO", "MONTAJE", "CORTE"], comprasInversion: [] };
    window.currentView = "inicio";

    window.sync = async function() { localStorage.setItem('gp_v19_4', JSON.stringify(window.state)); await docRef.set(window.state); };
    docRef.onSnapshot(doc => { if(doc.exists) { window.state = doc.data(); render(); } });

    window.setView = function(v) {
        window.currentView = v;
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
        document.getElementById('n-' + v).classList.add('active');
        render();
    };

    window.render = function() {
        const app = document.getElementById("app");
        const vM = (window.state.ventas || []);
        const gM = (window.state.gastos || []);
        const cM = (window.state.comprasInversion || []);

        const totalVendido = vM.reduce((a, b) => a + Number(b.total), 0);
        const totalCobrado = vM.reduce((a, b) => a + (Number(b.abonado) || (b.pagado ? b.total : 0)), 0);
        const totalGastos = gM.reduce((a, b) => a + Number(b.amount), 0);
        const totalStock = cM.reduce((a, b) => a + Number(b.amount), 0);
        const deudaTotal = vM.filter(v => !v.pagado).reduce((a, b) => a + (b.total - (b.abonado || 0)), 0);
        const neta = totalCobrado - totalGastos - totalStock;
        const proyectada = (totalVendido - totalGastos - totalStock);

        if(window.currentView === "inicio") {
            app.innerHTML = `<div class="card-pro !bg-gradient-to-br !from-purple-600 !to-indigo-900 border-none shadow-xl"><p class="text-[10px] font-black text-center uppercase opacity-70 italic">Caja Real</p><h2 class="text-6xl font-black text-center italic mt-2">$${neta.toFixed(2)}</h2></div><div class="grid grid-cols-2 gap-3"><div class="card-pro"><p class="text-[8px] opacity-40 uppercase">Vendido</p><b class="text-xl">$${totalVendido.toFixed(0)}</b></div><div class="card-pro"><p class="text-[8px] opacity-40 uppercase text-green-400">Cobrado</p><b class="text-xl">$${totalCobrado.toFixed(0)}</b></div><div class="card-pro"><p class="text-[8px] opacity-40 uppercase text-red-400">Egresos</p><b class="text-xl">-$${(totalGastos + totalStock).toFixed(0)}</b></div><div class="card-pro"><p class="text-[8px] opacity-40 uppercase text-orange-400">Cuentas</p><b class="text-xl">$${deudaTotal.toFixed(0)}</b></div></div>`;
        }

        if(window.currentView === "reportes") {
            const perc = totalVendido > 0 ? (neta / totalVendido) * 100 : 0;
            app.innerHTML = `
                <div class="card-pro"><h3 class="text-xs font-black uppercase text-purple-400 mb-4 italic tracking-widest">Estado Financiero</h3>
                    <div class="space-y-3 text-sm italic">
                        <div class="flex justify-between"><span>Ventas Totales:</span><b class="text-white">$${totalVendido.toFixed(2)}</b></div>
                        <div class="flex justify-between text-blue-400"><span>Compras Material:</span><b>-$${totalStock.toFixed(2)}</b></div>
                        <div class="flex justify-between text-red-400"><span>Gastos Fijos:</span><b>-$${totalGastos.toFixed(2)}</b></div>
                        <div class="border-t border-white/10 pt-2 flex justify-between font-black text-purple-500 text-lg"><span>Ganancia Neta Actual:</span><b>$${neta.toFixed(2)}</b></div>
                        <div class="flex justify-between font-black text-orange-400 border-b border-white/5 pb-2"><span>Ganancia Proyectada:</span><b>$${proyectada.toFixed(2)}</b></div>
                    </div>
                    <p class="text-[9px] uppercase opacity-40 mt-4 mb-1">Rendimiento de Caja</p>
                    <div class="bar-bg"><div class="bar-fill" style="width: ${perc}%"></div></div>
                </div>`;
        }

        if(window.currentView === "gastos") {
            app.innerHTML = `
                <div class="card-pro border-t-4 border-red-600"><h2 class="text-lg font-black uppercase italic mb-4">Registrar Gasto</h2><input id="dG" placeholder="Descripción"><input id="aG" type="number" placeholder="Monto $"><button onclick="saveGasto()" class="btn-main !bg-red-600 mt-4">Guardar</button></div>
                <h3 class="text-[10px] font-black uppercase opacity-40 ml-2 mb-2 italic">Historial de Gastos</h3>
                <div class="space-y-1">${gM.slice(-10).reverse().map(g=>`<div class="card-pro !py-3 flex justify-between text-xs border-l-2 border-red-500"><span>${g.desc}</span><b class="text-red-400">-$${g.amount}</b></div>`).join("")}</div>`;
        }

        if(window.currentView === "compras") {
            app.innerHTML = `
                <div class="card-pro border-t-4 border-blue-600"><h2 class="text-lg font-black uppercase italic mb-4">Compra Material</h2><select id="mInv"><option value="">Material...</option>${Object.keys(window.state.inventario || {}).map(m=>`<option value="${m}">${m}</option>`).join("")}</select><input id="qInv" type="number" placeholder="Cantidad"><input id="pInv" type="number" placeholder="Precio Unidad $"><button onclick="saveInv()" class="btn-main !bg-blue-600 mt-4">Guardar</button></div>
                <h3 class="text-[10px] font-black uppercase opacity-40 ml-2 mb-2 italic">Historial de Compras</h3>
                <div class="space-y-1">${cM.slice(-10).reverse().map(c=>`<div class="card-pro !py-3 flex justify-between text-xs border-l-2 border-blue-500"><span>${c.material} (${c.qty})</span><b class="text-blue-400">$${c.amount}</b></div>`).join("")}</div>`;
        }

        if(window.currentView === "cobros") {
            const deudas = vM.filter(v => !v.pagado);
            app.innerHTML = `<div class="card-pro !bg-orange-600/10 text-center mb-6"><p class="text-[10px] font-black uppercase text-orange-500">Total por Cobrar</p><h3 class="text-4xl font-black italic text-orange-400 mt-1">$${deudaTotal.toFixed(2)}</h3></div>
            <div class="space-y-3">${deudas.reverse().map(v => `<div class="card-pro border-l-4 border-purple-500 flex justify-between items-center"><div><b class="text-sm uppercase">${v.cliente}</b><br><span class="text-orange-400 text-xs font-black italic">Debe: $${(v.total - (v.abonado||0)).toFixed(2)}</span></div><div class="flex gap-2"><button onclick="editVenta(${v.id})" class="bg-white/5 p-2 rounded-xl text-xs">✏️</button><button onclick="abonoMultiple('${v.cliente}')" class="bg-purple-600 px-3 py-2 rounded-xl text-[10px] font-black uppercase italic italic">Cobrar</button></div></div>`).join("")}</div>`;
        }

        if(window.currentView === "ventas") {
            app.innerHTML = `<div class="card-pro"><h2 class="text-lg font-black uppercase italic mb-4">Nueva Venta</h2><input id="cli" placeholder="CLIENTE"><input id="tel" type="number" placeholder="WHATSAPP"><div class="bg-white/5 p-4 rounded-xl mt-3"><div class="grid grid-cols-2 gap-2"><select id="pS"><option value="">Material...</option>${Object.keys(window.state.inventario || {}).map(m=>`<option value="${m}">${m}</option>`).join("")}</select><select id="sS"><option value="">Servicio...</option>${(window.state.serviciosExtra || []).map(s=>`<option value="${s}">${s}</option>`).join("")}</select></div><input id="qV" type="number" placeholder="Cant." value="1"><select id="tC" onchange="document.getElementById('pL').classList.toggle('hidden', this.value !== 'libre')"><option value="detal">DETAL ($9)</option><option value="mayor">MAYOR ($10)</option><option value="libre">LIBRE</option></select><input id="pL" class="hidden" type="number" placeholder="Precio $"><button onclick="addCart()" class="btn-main !p-3 mt-3">+ Añadir</button></div><div id="cart-list" class="mt-4 space-y-1 text-xs"></div><div id="total-disp" class="text-4xl font-black text-center my-6 italic">$0.00</div><button onclick="finalizarVenta()" class="btn-main">Registrar</button></div>`;
        }

        if(window.currentView === "inventario") {
            app.innerHTML = `<div class="space-y-3">${Object.entries(window.state.inventario || {}).map(([n, i]) => `<div class="card-pro border-l-4 ${i.stock < 5 ? 'border-red-500' : 'border-green-500'} flex justify-between items-center"><div><p class="text-[9px] font-black opacity-50 uppercase">${n}</p><h4 class="text-3xl font-black italic">${(i.stock || 0).toFixed(2)}</h4></div><div class="flex flex-col gap-2"><button onclick="registrarMerma('${n}')" class="bg-orange-600/20 text-orange-400 p-2 rounded-xl text-[9px] font-black uppercase">⚠ Merma</button><div class="flex gap-1"><button onclick="editMatInv('${n}')" class="bg-white/5 p-2 rounded-lg text-[9px]">EDIT</button><button onclick="delMatInv('${n}')" class="bg-red-600/10 text-red-500 p-2 rounded-lg text-[9px]">X</button></div></div></div>`).join("")}</div>`;
        }
    };

    window.saveGasto = async () => { const d = document.getElementById("dG").value, a = parseFloat(document.getElementById("aG").value); if(d && a) { window.state.gastos.push({ id: Date.now(), desc: d.toUpperCase(), amount: a }); await window.sync(); setView('inicio'); } };
    window.saveInv = async () => { const m = document.getElementById("mInv").value, q = parseFloat(document.getElementById("qInv").value), p = parseFloat(document.getElementById("pInv").value); if(m && q) { window.state.inventario[m].stock += q; window.state.comprasInversion.push({ id: Date.now(), material: m, amount: (q * p), qty: q }); await window.sync(); setView('inicio'); } };
    window.editVenta = (id) => { let v = window.state.ventas.find(x => x.id === id); let nTot = prompt("Nuevo total:", v.total); if(nTot) v.total = parseFloat(nTot); window.sync(); render(); };
    window.abonoMultiple = async (name) => { let m = parseFloat(prompt(`Pago de ${name}:`)); if(!m) return; let vCli = window.state.ventas.filter(v => v.cliente === name && !v.pagado); vCli.forEach(v => { if(m <= 0) return; let p = v.total - (v.abonado||0); if(m >= p) { v.abonado = v.total; v.pagado = true; m -= p; } else { v.abonado = (v.abonado||0) + m; m = 0; } }); await window.sync(); render(); };
    let cart = [];
    window.addCart = () => { let m = document.getElementById("pS").value, s = document.getElementById("sS").value, q = parseFloat(document.getElementById("qV").value) || 1, t = document.getElementById("tC").value, p = (t === "detal") ? 9 : (t === "mayor") ? 10 : parseFloat(document.getElementById("pL").value) || 0, d = (m && s) ? m + " + " + s : m || s; if(d) { cart.push({ d, p: (p*q), mat: m, qtyV: q }); document.getElementById("cart-list").innerHTML = cart.map(c => `<div class="flex justify-between"><span>${c.d}</span><b>$${c.p}</b></div>`).join(""); document.getElementById("total-disp").innerText = "$" + cart.reduce((a,b)=>a+b.p,0).toFixed(2); } };
    window.finalizarVenta = async () => { let cli = document.getElementById("cli").value; if(!cli || !cart.length) return; cart.forEach(c => { if(c.mat) window.state.inventario[c.mat].stock -= c.qtyV; }); window.state.ventas.push({ id: Date.now(), cliente: cli.toUpperCase(), telefono: document.getElementById("tel").value, total: cart.reduce((a,b)=>a+b.p,0), abonado: 0, pagado: false }); await window.sync(); cart = []; setView('inicio'); };
    window.registrarMerma = async (mat) => { let q = parseFloat(prompt(`Merma ${mat}:`)); if(q > 0) { window.state.inventario[mat].stock -= q; await window.sync(); render(); } };
    window.editMatInv = async (old) => { let n = prompt("Nombre:", old); if(n) { window.state.inventario[n.toUpperCase()] = window.state.inventario[old]; delete window.state.inventario[old]; await window.sync(); render(); } };
    window.delMatInv = async (n) => { if(confirm(`Eliminar ${n}?`)){ delete window.state.inventario[n]; await window.sync(); render(); } };

    render();
</script>
</body>
</html>
