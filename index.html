<script>
    const firebaseConfig = { apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI", authDomain: "ghost-print-contabilidad.firebaseapp.com", projectId: "ghost-print-contabilidad", storageBucket: "ghost-print-contabilidad.firebasestorage.app", messagingSenderId: "867057362556", appId: "1:867057362556:web:6bd2a461817219a4000bf9" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const docRef = db.collection("sistema").doc("datos_principales");

    const SERVICIOS_DEFECTO = ["DISEÑO", "IMPRESIÓN", "DISEÑO E IMPRESIÓN", "INSTALACIÓN", "POP", "ROTULACIÓN", "LAMINADO", "IMPRESIÓN Y CORTE"];

    window.state = { ventas: [], inventario: {}, compras: [], gastos: [], servicios: SERVICIOS_DEFECTO };
    window.currentView = 'inicio';
    window.cart = [];

    window.sync = async function() { await docRef.set(window.state); render(); };
    docRef.onSnapshot(doc => { if(doc.exists) { window.state = doc.data(); render(); } });

    window.setView = function(v) { 
        window.currentView = v; 
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active')); 
        document.getElementById('n-'+v)?.classList.add('active'); 
        if(v === 'ventas') window.cart = []; 
        render(); 
    };

    window.render = function() {
        const app = document.getElementById("app");
        const inv = window.state.inventario || {};
        const serv = window.state.servicios || SERVICIOS_DEFECTO;
        const today = new Date().toISOString().split('T')[0];

        if(window.currentView === 'inicio') {
            app.innerHTML = `<div class="card-pro text-center">Dashboard OK</div>`;
        }

        else if(window.currentView === 'ventas') {
            app.innerHTML = `<div class="card-pro text-center">Ventas OK</div>`;
        }

        else if(window.currentView === 'cobrar') renderPorCobrar(app);
        else if(window.currentView === 'compras') app.innerHTML = `<div class="card-pro">Compras</div>`;
        else if(window.currentView === 'gastos') app.innerHTML = `<div class="card-pro">Gastos</div>`;
        else if(window.currentView === 'inventario') app.innerHTML = `<div class="card-pro">Inventario</div>`;
        else if(window.currentView === 'catalogo') app.innerHTML = `<div class="card-pro">Catalogo</div>`;
    };

    function renderPorCobrar(app) {
        const ventas = window.state.ventas || [];
        const deudoresMap = {};

        ventas.forEach(v => {
            const deuda = v.total - v.abono;
            if (deuda > 0.01) {
                if (!deudoresMap[v.cliente]) deudoresMap[v.cliente] = { nombre: v.cliente, totalDeuda: 0, facturas: [] };
                deudoresMap[v.cliente].totalDeuda += deuda;
                deudoresMap[v.cliente].facturas.push(v);
            }
        });

        const listaDeudores = Object.values(deudoresMap);

        app.innerHTML = `
            <h2>POR COBRAR</h2>
            ${listaDeudores.map(d => `
                <div>
                    <b>${d.nombre}</b> - $${d.totalDeuda}
                    ${d.facturas.map(f => `
                        <div>
                            Factura #${f.id}
                            <button onclick="abonar(${f.id})">Abonar</button>
                            <button onclick="liquidar(${f.id})">Liquidar</button>
                            <button onclick="editarFactura(${f.id})">Editar</button>
                            <button onclick="eliminarFactura(${f.id})">🗑️</button>
                        </div>
                    `).join("")}
                </div>
            `).join("")}
        `;
    }

    window.eliminarFactura = async (id) => {
        if(confirm("¿Eliminar esta factura?")) {
            const index = window.state.ventas.findIndex(v => v.id === id);
            if(index !== -1) {
                window.state.ventas.splice(index, 1);
                await window.sync();
            }
        }
    };

    window.abonar = async (id) => {
        const v = window.state.ventas.find(x => x.id === id);
        let monto = parseFloat(prompt("Abono:"));
        if(!isNaN(monto)) { v.abono += monto; await window.sync(); }
    };

    window.liquidar = async (id) => {
        const v = window.state.ventas.find(x => x.id === id);
        v.abono = v.total;
        await window.sync();
    };

    window.editarFactura = async (id) => {
        const v = window.state.ventas.find(x => x.id === id);
        let nT = parseFloat(prompt("Total:", v.total));
        let nA = parseFloat(prompt("Abono:", v.abono));
        if(!isNaN(nT)) v.total = nT;
        if(!isNaN(nA)) v.abono = nA;
        await window.sync();
    };

    render();
</script>
