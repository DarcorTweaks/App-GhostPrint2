<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostPrint ERP v3 - Professional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .btn { background: #6d28d9; color: white; padding: 10px 14px; border-radius: 12px; cursor: pointer; font-weight: 700; border: none; transition: 0.2s; text-transform: uppercase; font-size: 10px; }
        .btn:hover { background: #4c1d95; transform: scale(0.98); }
        .card { background: white; padding: 15px; margin: 10px 0; border-radius: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #f1f1f1; }
        input, select { border: 1px solid #e2e8f0; padding: 10px; margin: 5px 0; border-radius: 10px; width: 100%; font-size: 14px; background: #f8fafc; }
        label { font-size: 9px; color: #64748b; font-weight: 800; text-transform: uppercase; display: block; margin-top: 5px; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #eee; font-size: 12px; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 pb-24">

<div class="bg-gradient-to-r from-purple-900 via-indigo-900 to-black text-white p-4 shadow-xl flex justify-between items-center sticky top-0 z-50">
    <div>
        <h1 class="text-xl font-black italic tracking-tighter uppercase">GhostPrint ERP</h1>
        <p id="sync-status" class="text-[8px] font-bold text-amber-400 uppercase tracking-widest">Sincronizando...</p>
    </div>
</div>

<div class="p-2 flex gap-2 overflow-x-auto bg-white/90 backdrop-blur shadow-sm sticky top-[68px] z-40 border-b">
    <button onclick="setView('dashboard')" class="btn">🏠 Inicio</button>
    <button onclick="setView('ventas')" class="btn !bg-green-600">💵 Vender</button>
    <button onclick="setView('cobranzas')" class="btn !bg-amber-500">⏳ Cobros</button>
    <button onclick="setView('compras')" class="btn !bg-blue-600">📦 Compras</button>
    <button onclick="setView('gastos')" class="btn !bg-red-600">📉 Gastos</button>
    <button onclick="setView('config')" class="btn !bg-slate-700">⚙️ Catálogo</button>
    <button onclick="setView('reportes')" class="btn !bg-indigo-600">📊 Reportes</button>
</div>

<div id="app" class="p-4 max-w-4xl mx-auto"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI",
    authDomain: "ghost-print-contabilidad.firebaseapp.com",
    projectId: "ghost-print-contabilidad",
    storageBucket: "ghost-print-contabilidad.firebasestorage.app",
    messagingSenderId: "867057362556",
    appId: "1:867057362556:web:6bd2a461817219a4000bf9"
};

const appF = initializeApp(firebaseConfig);
const db = getFirestore(appF);
const docRef = doc(db, "sistema", "datos_principales");

const defaultState = {
    ventas: [], gastos: [], carrito: [],
    inventario: {
        "VINIL GLOSSY": {stock: 68, costo: 3.00}, "BANNER": {stock: 175, costo: 3.60},
        "KIT DE TINTA": {stock: 400, costo: 0.45}, "VINIL CLEAR GLOSSY BRILLANTE": {stock: 50, costo: 3.00},
        "VINIL CLEAR GLOSSY MATE": {stock: 50, costo: 3.00}, "VINIL BLACKOUT": {stock: 0, costo: 3.50},
        "VINIL BLANCO": {stock: 0, costo: 3.00}, "BANNER 137": {stock: 0, costo: 3.60},
        "BANNER 180": {stock: 0, costo: 4.00}, "CLEAR BRILLANTE": {stock: 0, costo: 3.00},
        "CLEAR MATE": {stock: 0, costo: 3.00}, "HOJA BLANCA": {stock: 0, costo: 0.05},
        "PAPEL FOTOGRAFICO": {stock: 0, costo: 0.50}, "PAPEL GLASSE": {stock: 0, costo: 0.30},
        "RETAZOS": {stock: 0, costo: 0.00}, "OTROS": {stock: 0, costo: 0.00}
    },
    serviciosExtra: [
        "DISEÑO, IMPRECION, INSTALACION", "DISEÑO", "IMPRESIÓN", "DISEÑO, IMPRESIÓN", 
        "INSTALACION", "POP", "DESINTALACION", "ROTULACION", "LAMINADO", 
        "LAMINADO. IMPRESIOM", "IMPRESIÓN Y CORTE", "VINIL DE ROTULACION"
    ]
};

window.state = JSON.parse(JSON.stringify(defaultState));
window.view = "dashboard";
let currentCarrito = [];

onSnapshot(docRef, (snap) => {
    if (snap.exists()) {
        window.state = { ...window.state, ...snap.data() };
        document.getElementById("sync-status").innerText = "Sincronizado ✓";
    } else { window.save(); }
    render();
});

window.save = async () => { await setDoc(docRef, window.state); };
window.setView = (v) => { window.view = v; render(); };

window.agregarAlCarrito = () => {
    let p = document.getElementById("prodSel").value;
    let s = document.getElementById("servSel").value;
    let t = document.getElementById("tipoCli").value;
    let cant = parseFloat(document.getElementById("cant").value) || 0;
    let item = p || s;
    if(!item || cant <= 0) return alert("Selecciona algo y pon cantidad");

    let pre = (window.state.inventario[item]) ? (t === "mayor" ? 10 : 9) : 12;
    if(t === "libre") pre = parseFloat(document.getElementById("pLibre").value) || 0;

    currentCarrito.push({ nombre: item, cantidad: cant, precio: pre, subtotal: cant * pre, esProducto: !!window.state.inventario[item] });
    document.getElementById("prodSel").value = "";
    document.getElementById("servSel").value = "";
    render();
};

window.render = function() {
    let app = document.getElementById("app"), html = "";

    if(window.view === "dashboard"){
        let vT = window.state.ventas.reduce((a,b) => a + b.total, 0);
        let gT = window.state.gastos.reduce((a,b) => a + b.amount, 0);
        html = `<div class="grid grid-cols-1 md:grid-cols-3 gap-3">
            <div class="card bg-green-50">Ventas<br><b class="text-2xl text-green-700">$${vT.toFixed(2)}</b></div>
            <div class="card bg-red-50">Egresos<br><b class="text-2xl text-red-600">$${gT.toFixed(2)}</b></div>
            <div class="card bg-slate-900 text-white italic">Ganancia<br><b class="text-2xl text-purple-400 font-black">$${(vT-gT).toFixed(2)}</b></div>
        </div>`;
    }

    if(window.view === "ventas"){
        html = `<h2>FACTURACIÓN</h2><div class="card">
            <label>Cliente</label><input id="cli" placeholder="Nombre">
            <label>WhatsApp</label><input id="tel" type="number" placeholder="58...">
            <div class="grid grid-cols-2 gap-2">
                <div><label>Productos</label><select id="prodSel" onchange="document.getElementById('servSel').value=''"><option value="">-- Ver Productos --</option>${Object.keys(window.state.inventario).map(p=>`<option value="${p}">${p}</option>`).join("")}</select></div>
                <div><label>Servicios</label><select id="servSel" onchange="document.getElementById('prodSel').value=''"><option value="">-- Ver Servicios --</option>${window.state.serviciosExtra.map(s=>`<option value="${s}">${s}</option>`).join("")}</select></div>
            </div>
            <label>Precio</label><select id="tipoCli" onchange="render()"><option value="mayor">Mayorista</option><option value="detal">Detal</option><option value="libre">Manual</option></select>
            <div id="divLibre" class="${document.getElementById("tipoCli")?.value==='libre'?'':'hidden'}"><input id="pLibre" type="number" placeholder="Monto $"></div>
            <label>Cantidad</label><input id="cant" type="number" value="1">
            <button onclick="agregarAlCarrito()" class="btn w-full !bg-blue-600 mt-2">+ Añadir a la lista</button>
            <div class="mt-4 border-t pt-2">
                ${currentCarrito.map((c, idx) => `<div class="item-row"><span>${c.cantidad} x ${c.nombre}</span><b>$${c.subtotal.toFixed(2)}</b><button onclick="currentCarrito.splice(${idx},1);render()" class="text-red-500">X</button></div>`).join("")}
            </div>
            <div class="p-4 bg-slate-800 text-white rounded-xl my-4 text-center font-bold">TOTAL VENTA: $${currentCarrito.reduce((a,b)=>a+b.subtotal,0).toFixed(2)}</div>
            <button onclick="confirmarVenta()" class="btn w-full bg-green-600 py-4">PROCESAR FACTURA</button></div>`;
    }

    if(window.view === "cobranzas"){
        html = `<h2>CONTROL DE COBROS</h2>`;
        window.state.ventas.filter(v=>!v.pagado).slice().reverse().forEach(v => {
            html += `<div class="card border-l-8 border-amber-500">
                <div class="flex justify-between items-start">
                    <div><b>${v.cliente}</b><br><small class="text-red-600 font-bold">Resta: $${(v.total-(v.abonado||0)).toFixed(2)}</small></div>
                    <div class="flex gap-1">
                        <button onclick="enviarWS(${v.id})" class="bg-green-600 text-white p-2 rounded-lg text-[8px]">WS</button>
                        <button onclick="abonar(${v.id})" class="bg-blue-600 text-white p-2 rounded-lg text-[8px]">ABONAR</button>
                        <button onclick="liquidar(${v.id})" class="bg-green-700 text-white p-2 rounded-lg text-[8px]">PAGÓ</button>
                        <button onclick="borrarV(${v.id})" class="bg-red-500 text-white p-2 rounded-lg text-[8px]">BORRAR</button>
                    </div>
                </div></div>`;
        });
    }

    if(window.view === "compras"){
        html = `<h2>INVENTARIO</h2><div class="grid grid-cols-2 gap-2">${Object.entries(window.state.inventario).map(([n, i]) => `<div class="card !m-0"><b>${n}</b><br><span class="text-lg text-blue-700 font-black">${(i.stock||0).toFixed(2)}m</span></div>`).join("")}</div>`;
    }

    if(window.view === "reportes"){
        let vT = window.state.ventas.reduce((a,b)=>a+b.total,0);
        let gT = window.state.gastos.reduce((a,b)=>a+b.amount,0);
        html = `<h2>REPORTE FINANCIERO</h2><div class="card bg-slate-900 text-white font-black italic">UTILIDAD TOTAL: $${(vT-gT).toFixed(2)}</div>`;
    }

    app.innerHTML = html;
};

window.confirmarVenta = async () => {
    let cli = document.getElementById("cli").value;
    if(!cli || currentCarrito.length === 0) return alert("Falta cliente o productos");
    
    let total = currentCarrito.reduce((a,b)=>a+b.subtotal,0);
    currentCarrito.forEach(item => {
        if(item.esProducto) {
            window.state.inventario[item.nombre].stock -= item.cantidad;
            let costo = window.state.inventario[item.nombre].costo * item.cantidad;
            window.state.gastos.push({id:Date.now()+Math.random(), name:`COSTO: ${item.nombre}`, amount:costo, fecha:new Date().toISOString()});
        }
    });

    window.state.ventas.push({id:Date.now(), cliente:cli.toUpperCase(), total:total, abonado:0, pagado:false, telefono:document.getElementById("tel").value, fecha:new Date().toISOString()});
    currentCarrito = [];
    await window.save(); setView('cobranzas');
};

window.enviarWS = (id) => {
    let v = window.state.ventas.find(x => x.id === id);
    if(v.telefono) window.open(`https://api.whatsapp.com/send?phone=${v.telefono}&text=Hola *${v.cliente}*, tienes un saldo de *$${(v.total-(v.abonado||0)).toFixed(2)}* en *GhostPrint* 👻.`, '_blank');
};

window.abonar = async (id) => {
    let v = window.state.ventas.find(x => x.id === id), m = parseFloat(prompt(`Deuda: $${(v.total-(v.abonado||0)).toFixed(2)}. ¿Abono?`));
    if(m){ v.abonado = (v.abonado || 0) + m; if(v.abonado >= v.total) v.pagado = true; await window.save(); render(); }
};

window.liquidar = async (id) => { let v = window.state.ventas.find(x => x.id === id); v.abonado = v.total; v.pagado = true; await window.save(); render(); };
window.borrarV = async (id) => { if(confirm("¿Seguro de borrar esta venta?")){ window.state.ventas = window.state.ventas.filter(v=>v.id!==id); await window.save(); render(); } };

render();
</script>
</body>
</html>
