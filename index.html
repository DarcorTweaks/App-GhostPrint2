<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GhostPrint MASTER v23.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { background-color: #030308; color: #f8fafc; font-family: 'Inter', sans-serif; padding-bottom: 100px; }
        .card-pro { background: #111122; border: 1px solid #2d2d44; border-radius: 20px; padding: 18px; margin-bottom: 12px; }
        nav { background: rgba(10, 10, 20, 0.95); display: flex; gap: 8px; overflow-x: auto; padding: 14px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #334155; }
        .btn-nav { background: #1e1e30; color: #64748b; padding: 12px 18px; border-radius: 14px; font-size: 10px; font-weight: 800; white-space: nowrap; cursor: pointer; text-transform: uppercase; }
        .active { background: #7c3aed !important; color: white !important; }
        input, select { background: #070712; border: 1px solid #334155; color: white; padding: 14px; border-radius: 14px; width: 100%; margin: 6px 0; font-weight: 700; outline: none; }
        .btn-main { background: linear-gradient(135deg, #7c3aed 0%, #4c1d95 100%); color: white; padding: 16px; border-radius: 16px; width: 100%; font-weight: 900; text-transform: uppercase; cursor: pointer; border: none; }
        .ghost-glow { filter: drop-shadow(0 0 10px #7c3aed); }
    </style>
</head>
<body>

<div class="p-4 flex justify-between items-center bg-[#0a0a14] border-b border-white/5">
    <div class="flex items-center gap-3">
        <span class="text-4xl ghost-glow">👻</span>
        <div><h1 class="text-xl font-black italic text-purple-500 leading-none">GHOST PRINT</h1><p class="text-[8px] font-black opacity-40 uppercase">History Master v23.2</p></div>
    </div>
</div>

<nav>
    <div onclick="setView('inicio')" class="btn-nav active" id="n-inicio">📊 ADMIN</div>
    <div onclick="setView('ventas')" class="btn-nav" id="n-ventas">💵 Ventas</div>
    <div onclick="setView('compras')" class="btn-nav" id="n-compras">🛒 Compras</div>
    <div onclick="setView('inventario')" class="btn-nav" id="n-inventario">📦 Stock</div>
    <div onclick="setView('catalogo')" class="btn-nav" id="n-catalogo">⚙️ Config</div>
</nav>

<div id="app" class="p-4 max-w-2xl mx-auto"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI", authDomain: "ghost-print-contabilidad.firebaseapp.com", projectId: "ghost-print-contabilidad", storageBucket: "ghost-print-contabilidad.firebasestorage.app", messagingSenderId: "867057362556", appId: "1:867057362556:web:6bd2a461817219a4000bf9" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const docRef = db.collection("sistema").doc("datos_principales");

    window.state = JSON.parse(localStorage.getItem('gp_v23_2')) || { ventas: [], inventario: {}, compras: [], servicios: ["DISEÑO"] };

    window.sync = async function() { localStorage.setItem('gp_v23_2', JSON.stringify(window.state)); await docRef.set(window.state); };
    docRef.onSnapshot(doc => { if(doc.exists) { window.state = doc.data(); render(); } });

    window.setView = function(v) { window.currentView = v; document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active')); document.getElementById('n-'+v).classList.add('active'); render(); };

    window.render = function() {
        const app = document.getElementById("app");
        const inv = window.state.inventario || {};
        const cM = window.state.compras || [];

        if(window.currentView === "inicio") {
            const vM = window.state.ventas || [];
            const cobrado = vM.reduce((a, b) => a + (Number(b.total) || 0), 0);
            app.innerHTML = `<div class="card-pro text-center"><p class="text-[10px] opacity-40 uppercase">Ventas Totales</p><h2 class="text-6xl font-black italic text-purple-500">$${cobrado.toFixed(2)}</h2></div>`;
        }

        if(window.currentView === "compras") {
            app.innerHTML = `
                <div class="card-pro">
                    <h2 class="text-lg font-black italic text-blue-400 mb-4 uppercase text-center">Registrar Compra</h2>
                    <select id="cMat"><option value="">-- ELEGIR MATERIAL --</option>${Object.keys(inv).map(m=>`<option value="${m}">${m}</option>`).join("")}</select>
                    <input id="cCant" type="number" placeholder="Metros Lineales Comprados">
                    <input id="cCosto" type="number" placeholder="Costo Metro Lineal $">
                    <input id="cVenta" type="number" placeholder="Nuevo Precio Venta Sugerido ($M2 o ML)">
                    <button onclick="saveCompra()" class="btn-main !from-blue-600 !to-blue-900 mt-4">CARGAR AL STOCK</button>
                </div>

                <div class="mt-8">
                    <h3 class="text-xs font-black opacity-30 uppercase tracking-widest mb-4">Historial de Compras Recientes</h3>
                    <div class="space-y-2">
                        ${cM.slice(-10).reverse().map(c => {
                            const info = inv[c.m] || {ancho: 1.52};
                            const costoM2 = (c.co / info.ancho).toFixed(2);
                            return `
                            <div class="card-pro bg-white/5 border-none flex justify-between items-center">
                                <div>
                                    <b class="text-blue-400 uppercase text-[11px]">${c.m}</b>
                                    <p class="text-2xl font-black">${c.c} <small class="text-xs opacity-50">ML</small></p>
                                    <p class="text-[9px] font-bold opacity-40">${c.f || 'S/F'}</p>
                                </div>
                                <div class="text-right">
                                    <p class="text-xs font-black text-white">$${c.co}/ML</p>
                                    <p class="text-[9px] font-black text-blue-300">COSTO M²: $${costoM2}</p>
                                </div>
                            </div>`;
                        }).join("")}
                    </div>
                </div>
            `;
        }

        if(window.currentView === "ventas") {
            app.innerHTML = `
                <div class="card-pro">
                    <h2 class="text-lg font-black italic text-purple-500 mb-4 uppercase">Facturación</h2>
                    <input id="cli" placeholder="NOMBRE DEL CLIENTE">
                    <div class="bg-white/5 p-4 rounded-xl mt-4 border border-white/10">
                        <select id="vMat" onchange="updateVentaUI()">
                            <option value="">-- MATERIAL --</option>
                            ${Object.keys(inv).map(m=>`<option value="${m}">${m}</option>`).join("")}
                        </select>
                        <div class="flex gap-2">
                            <select id="vTipo" onchange="updateVentaUI()" class="w-1/3"><option value="M2">M2</option><option value="ML">ML</option></select>
                            <input id="vCant" type="number" placeholder="Cantidad" oninput="updateVentaUI()" class="w-2/3">
                        </div>
                        <p id="vCalc" class="text-[10px] font-black text-purple-400 my-2 uppercase"></p>
                        <input id="vPrec" type="number" placeholder="Precio Final $">
                        <button onclick="addItem()" class="btn-main !p-3 mt-3 text-xs">+ AÑADIR A LISTA</button>
                    </div>
                    <div id="vLista" class="mt-4 space-y-1"></div>
                    <div id="vTotal" class="text-5xl font-black text-center my-6">$0.00</div>
                    <button onclick="saveVenta()" class="btn-main">FINALIZAR ORDEN</button>
                </div>
            `;
        }

        if(window.currentView === "inventario") {
            app.innerHTML = `<div class="space-y-2">${Object.entries(inv).map(([n, i]) => `
                <div class="card-pro flex justify-between items-center">
                    <div><b class="uppercase text-purple-400 text-xs">${n}</b><br><span class="text-3xl font-black">${i.stock} <small class="text-xs opacity-40">ML</small></span></div>
                    <div class="text-right text-[10px] font-bold opacity-40">ANCHO: ${i.ancho}m<br>PRECIO: $${i.precio}/u</div>
                </div>`).join("")}</div>`;
        }

        if(window.currentView === "catalogo") {
            app.innerHTML = `<div class="card-pro">
                <h3 class="text-xs font-black opacity-40 mb-3 uppercase italic text-center">Base de Datos de Materiales</h3>
                <input id="nMat" placeholder="Nombre (Ej: VINIL)">
                <input id="aMat" type="number" step="0.01" placeholder="Ancho del Rollo (Ej: 1.52)">
                <button onclick="crearMat()" class="btn-main mt-2">REGISTRAR BASE</button>
                <div class="mt-6 border-t border-white/5 pt-4">
                    ${Object.keys(inv).map(m=>`<div class="flex justify-between items-center p-2 text-xs"><span>${m}</span><button onclick="delMat('${m}')" class="text-red-600 font-bold">BORRAR</button></div>`).join("")}
                </div>
            </div>`;
        }
    };

    window.updateVentaUI = () => {
        const m = document.getElementById("vMat").value;
        const t = document.getElementById("vTipo").value;
        const c = parseFloat(document.getElementById("vCant").value) || 0;
        const info = window.state.inventario[m];
        if(info) {
            let final = 0;
            if(t === "ML") { final = c * info.precio; document.getElementById("vCalc").innerText = `${c} Metros x $${info.precio}`; }
            else { let m2 = c * info.ancho; final = m2 * info.precio; document.getElementById("vCalc").innerText = `${m2.toFixed(2)} M² Totales x $${info.precio}`; }
            document.getElementById("vPrec").value = final.toFixed(2);
        }
    };

    let cart = [];
    window.addItem = () => {
        const m = document.getElementById("vMat").value, p = parseFloat(document.getElementById("vPrec").value) || 0, c = parseFloat(document.getElementById("vCant").value) || 0;
        if(m && p) { cart.push({ m, p, c }); document.getElementById("vTotal").innerText = "$" + cart.reduce((a,b)=>a+b.p,0).toFixed(2); document.getElementById("vLista").innerHTML += `<div class="flex justify-between bg-white/5 p-2 rounded-lg text-xs"><span>${m}</span><b>$${p}</b></div>`; }
    };

    window.saveVenta = async () => {
        if(!cart.length) return;
        cart.forEach(i => { if(window.state.inventario[i.m]) window.state.inventario[i.m].stock -= i.c; });
        window.state.ventas.push({ id: Date.now(), cliente: document.getElementById("cli").value.toUpperCase(), total: cart.reduce((a,b)=>a+b.p,0) });
        await window.sync(); cart = []; setView('inicio');
    };

    window.saveCompra = async () => {
        const m = document.getElementById("cMat").value, c = parseFloat(document.getElementById("cCant").value), co = parseFloat(document.getElementById("cCosto").value), v = parseFloat(document.getElementById("cVenta").value);
        if(m && c) {
            window.state.inventario[m].stock += c;
            window.state.inventario[m].precio = v;
            if(!window.state.compras) window.state.compras = [];
            window.state.compras.push({ m, c, co, f: new Date().toLocaleDateString() });
            await window.sync(); render();
        }
    };

    window.crearMat = async () => {
        const n = document.getElementById("nMat").value.toUpperCase(), a = parseFloat(document.getElementById("aMat").value);
        if(n && a) { window.state.inventario[n] = { stock: 0, precio: 0, ancho: a }; await window.sync(); setView('compras'); }
    };

    window.delMat = async (m) => { if(confirm("¿Seguro?")) { delete window.state.inventario[m]; await window.sync(); render(); } };

    window.currentView = "inicio";
    render();
</script>
</body>
</html>
