<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GhostPrint MASTER v28.9.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { background-color: #030308; color: #f8fafc; font-family: 'Inter', sans-serif; padding-bottom: 100px; }
        .card-pro { background: #111122; border: 1px solid #2d2d44; border-radius: 20px; padding: 18px; margin-bottom: 12px; }
        nav { background: rgba(10, 10, 20, 0.95); display: flex; gap: 8px; overflow-x: auto; padding: 14px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #334155; }
        .btn-nav { background: #1e1e30; color: #64748b; padding: 12px 18px; border-radius: 14px; font-size: 10px; font-weight: 800; white-space: nowrap; cursor: pointer; text-transform: uppercase; }
        .active { background: #7c3aed !important; color: white !important; }
        input, select { background: #070712; border: 1px solid #334155; color: white; padding: 16px; border-radius: 14px; width: 100%; margin: 8px 0; font-size: 16px; font-weight: 700; outline: none; }
        .btn-main { background: linear-gradient(135deg, #7c3aed 0%, #4c1d95 100%); color: white; padding: 18px; border-radius: 18px; width: 100%; font-weight: 900; text-transform: uppercase; cursor: pointer; border: none; font-size: 14px; }
        .chart-bar { height: 8px; border-radius: 4px; background: #2d2d44; overflow: hidden; margin: 8px 0; }
        .chart-fill { height: 100%; transition: width 0.5s ease-in-out; }
    </style>
</head>
<body>

<div class="p-4 flex justify-between items-center bg-[#0a0a14] border-b border-white/5">
    <div class="flex items-center gap-3">
        <span class="text-4xl">👻</span>
        <div>
            <h1 class="text-xl font-black italic text-purple-500 leading-none">GHOST PRINT</h1>
            <p class="text-[8px] font-black opacity-40 uppercase tracking-widest text-purple-300">Master Suite v28.9.1</p>
        </div>
    </div>
</div>

<nav id="mainNav">
    <div onclick="setView('inicio')" class="btn-nav active" id="n-inicio">📊 CONTROL</div>
    <div onclick="setView('ventas')" class="btn-nav" id="n-ventas">💵 Ventas</div>
    <div onclick="setView('cobrar')" class="btn-nav" id="n-cobrar">📑 POR COBRAR</div>
    <div onclick="setView('compras')" class="btn-nav" id="n-compras">🛒 Compras</div>
    <div onclick="setView('gastos')" class="btn-nav" id="n-gastos">💸 Gastos</div>
    <div onclick="setView('inventario')" class="btn-nav" id="n-inventario">📦 Stock</div>
    <div onclick="setView('catalogo')" class="btn-nav" id="n-catalogo">⚙️ CATALOGO</div>
</nav>

<div id="app" class="p-4 max-w-2xl mx-auto"></div>

<div id="receiptModal" class="fixed inset-0 bg-black/90 z-[200] hidden flex items-center justify-center p-4">
    <div class="bg-white text-black p-6 rounded-2xl w-full max-w-sm shadow-2xl">
        <div id="receiptContent" class="text-[11px] font-mono"></div>
        <div class="mt-6 flex gap-2">
            <button onclick="closeReceipt()" class="flex-1 bg-gray-200 p-3 rounded-xl font-bold">Cerrar</button>
            <button onclick="shareReceipt()" class="flex-1 bg-purple-600 text-white p-3 rounded-xl font-bold">WhatsApp</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI", authDomain: "ghost-print-contabilidad.firebaseapp.com", projectId: "ghost-print-contabilidad", storageBucket: "ghost-print-contabilidad.firebasestorage.app", messagingSenderId: "867057362556", appId: "1:867057362556:web:6bd2a461817219a4000bf9" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const docRef = db.collection("sistema").doc("datos_principales");

    window.state = { ventas: [], inventario: {}, compras: [], gastos: [], servicios: ["DISEÑO", "IMPRESIÓN", "INSTALACIÓN"] };
    window.currentView = 'inicio';
    window.cart = [];

    window.sync = async function() { await docRef.set(window.state); render(); };
    docRef.onSnapshot(doc => { if(doc.exists) { window.state = doc.data(); render(); } });

    window.setView = function(v) { 
        window.currentView = v; 
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active')); 
        document.getElementById('n-'+v)?.classList.add('active'); 
        render(); 
    };

    window.render = function() {
        const app = document.getElementById("app");
        const inv = window.state.inventario || {};
        const today = new Date().toISOString().split('T')[0];

        if(window.currentView === 'inicio') {
            app.innerHTML = `<h2 class="text-xl font-black italic text-purple-500 mb-4 uppercase">Panel de Control</h2><p class="opacity-40">Bienvenido al sistema Ghost Print.</p>`;
        }

        else if(window.currentView === 'ventas') {
            app.innerHTML = `
                <div class="card-pro">
                    <h2 class="text-xl font-black italic text-purple-500 mb-6 uppercase text-center">Punto de Venta</h2>
                    <input id="vDate" type="date" value="${today}" class="mb-4">
                    <div class="grid grid-cols-2 gap-2 mb-4">
                        <input id="cli" placeholder="NOMBRE DEL CLIENTE" class="!m-0 text-sm uppercase">
                        <input id="wha" type="tel" placeholder="WHATSAPP (Ej: 58412...)" class="!m-0 text-sm">
                    </div>
                    <div class="bg-white/5 p-4 rounded-2xl border border-white/10">
                        <select id="vMat" onchange="updateVentaUI()" class="text-sm">
                            <option value="">-- PRODUCTO/SERVICIO --</option>
                            ${Object.keys(inv).map(m=>`<option value="${m}">${m}</option>`).join("")}
                        </select>
                        <div class="flex gap-2">
                            <select id="vTipo" onchange="updateVentaUI()" class="w-1/3"><option value="M2">M2</option><option value="ML">ML</option><option value="UNID">UNID</option></select>
                            <input id="vCant" type="number" placeholder="CANT" oninput="updateVentaUI()" class="w-2/3">
                        </div>
                        <input id="vPrec" type="number" placeholder="PRECIO TOTAL $" class="text-xl text-purple-400">
                        <button onclick="addItem()" class="btn-main !bg-purple-600/20 border border-purple-500/30 !text-purple-400 mt-2">+ AGREGAR ITEM</button>
                    </div>
                    <div id="vLista" class="mt-4 space-y-2">
                        ${window.cart.map((item, idx) => `<div class="flex justify-between bg-white/5 p-3 rounded-xl border-l-4 border-purple-500"><div><div class="text-xs font-black uppercase">${item.m}</div><div class="text-[10px] opacity-40">${item.c} ${item.t}</div></div><b>$${item.p.toFixed(2)}</b></div>`).join("")}
                    </div>
                    <div class="text-5xl font-black text-center my-6">$${window.cart.reduce((a,b)=>a+b.p, 0).toFixed(2)}</div>
                    <input id="vAbono" type="number" placeholder="CUÁNTO ABONA? $" class="text-2xl text-green-500 font-black text-center">
                    <button onclick="saveVenta()" class="btn-main mt-4">FINALIZAR Y GUARDAR</button>
                </div>
            `;
        }

        else if(window.currentView === 'cobrar') {
            const ventas = window.state.ventas || [];
            app.innerHTML = `
                <h2 class="text-lg font-black italic text-red-500 mb-4 uppercase">Cuentas por Cobrar</h2>
                <div class="space-y-4">
                    ${ventas.filter(v => (v.total - v.abono) > 0.01).map(f => `
                        <div class="card-pro border-l-4 border-red-600">
                            <div class="flex justify-between items-start mb-2">
                                <div>
                                    <div class="font-black text-white uppercase mb-1">${f.cliente}</div> 
                                    <div class="text-[10px] font-black text-purple-400">#${f.id.toString().slice(-6)}</div>
                                    <div class="text-[10px] opacity-40">${f.fecha}</div>
                                </div>
                                <div class="text-right">
                                    <div class="font-black text-red-500 text-lg">Debe: $${(f.total - f.abono).toFixed(2)}</div>
                                    <div class="text-[10px] opacity-30">Total: $${f.total}</div>
                                </div>
                            </div>
                            <div class="flex gap-1 justify-between mt-3">
                                <button onclick="abonar(${f.id})" class="flex-1 bg-green-600/20 text-green-500 py-2 rounded-xl font-black uppercase text-[10px]">Abonar</button>
                                <button onclick="liquidar(${f.id})" class="flex-1 bg-purple-600/20 text-purple-400 py-2 rounded-xl font-black uppercase text-[10px]">Liquidar</button>
                                <button onclick="showReceipt(${f.id})" class="p-2 text-white">📄</button>
                            </div>
                        </div>`).join("")}
                </div>`;
        }
        // ... (resto de renders: compras, gastos, etc.)
    };

    window.updateVentaUI = () => {
        const m = document.getElementById("vMat").value, t = document.getElementById("vTipo").value, c = parseFloat(document.getElementById("vCant").value) || 0;
        const info = window.state.inventario[m];
        if(info) {
            let p = (t === "ML") ? c * (info.precioML || 0) : (t === "M2") ? c * (info.precioM2 || 0) : 0;
            if(p > 0) document.getElementById("vPrec").value = p.toFixed(2);
        }
    };

    window.addItem = () => {
        const m = document.getElementById("vMat").value, p = parseFloat(document.getElementById("vPrec").value) || 0, c = parseFloat(document.getElementById("vCant").value) || 0, t = document.getElementById("vTipo").value;
        if(m && p) { window.cart.push({ m, p, c, t }); render(); }
    };

    window.saveVenta = async () => {
        if(!window.cart.length) return;
        
        // CORRECCIÓN AQUÍ: Captura el nombre correctamente
        const nombreInput = document.getElementById("cli").value.trim();
        const whaInput = document.getElementById("wha").value.trim();
        
        const cli = nombreInput.toUpperCase() || "SIN NOMBRE";
        const wha = whaInput || "";
        const abono = parseFloat(document.getElementById("vAbono").value) || 0;
        const total = window.cart.reduce((a,b)=>a+b.p,0);
        const fecha = document.getElementById("vDate").value;

        window.cart.forEach(i => { if(window.state.inventario[i.m]) window.state.inventario[i.m].stock -= i.c; });

        const id = Date.now();
        if(!window.state.ventas) window.state.ventas = [];
        window.state.ventas.push({ id, cliente: cli, whatsapp: wha, items: [...window.cart], total: total, abono: abono, fecha: fecha });
        
        await window.sync();
        showReceipt(id);
        window.cart = [];
    };

    window.abonar = async (id) => {
        const v = window.state.ventas.find(x => x.id === id);
        let monto = parseFloat(prompt(`Abono para ${v.cliente}:`));
        if(!isNaN(monto)) { v.abono += monto; await window.sync(); }
    };

    window.liquidar = async (id) => {
        const v = window.state.ventas.find(x => x.id === id);
        if(confirm(`¿Liquidar deuda de ${v.cliente}?`)) { v.abono = v.total; await window.sync(); }
    };

    window.showReceipt = (id) => {
        const v = window.state.ventas.find(x => x.id === id);
        document.getElementById("receiptContent").innerHTML = `
            <h2 class="text-center font-black">GHOST PRINT</h2>
            <p class="text-center mb-4">Recibo de Venta</p>
            <div class="flex justify-between mb-2"><span>#${v.id.toString().slice(-6)}</span><span>${v.fecha}</span></div>
            <p class="font-black uppercase">CLIENTE: ${v.cliente}</p>
            <hr class="my-2 border-black">
            ${v.items.map(i => `<div class="flex justify-between"><span>${i.m}</span><span>$${i.p.toFixed(2)}</span></div>`).join("")}
            <hr class="my-2 border-black">
            <div class="flex justify-between font-black"><span>TOTAL:</span><span>$${v.total.toFixed(2)}</span></div>
            <div class="flex justify-between"><span>ABONADO:</span><span>$${v.abono.toFixed(2)}</span></div>
            <div class="flex justify-between font-black text-red-600"><span>DEBE:</span><span>$${(v.total - v.abono).toFixed(2)}</span></div>
        `;
        window.currentReceiptId = id;
        document.getElementById("receiptModal").classList.remove("hidden");
    };

    window.closeReceipt = () => document.getElementById("receiptModal").classList.add("hidden");
    window.shareReceipt = () => {
        const v = window.state.ventas.find(x => x.id === window.currentReceiptId);
        const txt = `*GHOST PRINT*%0A*Recibo:* #${v.id}%0A*Cliente:* ${v.cliente}%0A*Total:* $${v.total}%0A*Debe:* $${v.total-v.abono}`;
        window.open(`https://wa.me/${v.whatsapp}?text=${txt}`, '_blank');
    };

    render();
</script>
</body>
</html>
