<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostPrint ERP v6.1 - Report Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background-color: #0d0d1a;
            background-image: radial-gradient(at 10% 10%, rgba(109, 40, 217, 0.2) 0px, transparent 50%), radial-gradient(at 90% 90%, rgba(79, 70, 229, 0.15) 0px, transparent 50%);
            background-attachment: fixed; background-size: cover;
            font-family: ui-sans-serif, system-ui; color: #e2e8f0; padding-bottom: 96px;
        }
        .btn { background: #6d28d9; color: white; padding: 10px 14px; border-radius: 12px; cursor: pointer; font-weight: 700; border: none; transition: 0.2s; text-transform: uppercase; font-size: 10px; }
        .card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(5px); padding: 20px; margin: 12px 0; border-radius: 20px; color: #1e293b; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        input, select { border: 1px solid #e2e8f0; padding: 12px; margin: 8px 0; border-radius: 12px; width: 100%; background: #f8fafc; color: #1e293b; font-weight: 600; }
        label { font-size: 10px; color: #64748b; font-weight: 800; text-transform: uppercase; display: block; margin-top: 8px; }
        header { background: linear-gradient(to right, #4c1d95, #000); color: white; padding: 16px; display: flex; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
        nav { padding: 8px; display: flex; gap: 8px; overflow-x: auto; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); position: sticky; top: 72px; z-index: 40; }
    </style>
</head>
<body>

<header>
    <div>
        <h1 class="text-2xl font-black italic uppercase text-purple-400">GhostPrint ERP</h1>
        <p id="sync-status" class="text-[9px] font-bold text-amber-300 uppercase italic">Sincronizando...</p>
    </div>
</header>

<nav>
    <button onclick="setView('dashboard')" class="btn">🏠 Inicio</button>
    <button onclick="setView('ventas')" class="btn !bg-green-600">💵 Vender</button>
    <button onclick="setView('cobranzas')" class="btn !bg-amber-500">⏳ Cobros</button>
    <button onclick="setView('compras')" class="btn !bg-blue-600">📦 Compra/Stock</button>
    <button onclick="setView('gastos')" class="btn !bg-red-600">📉 Gastos</button>
    <button onclick="setView('reportes')" class="btn !bg-indigo-600">📊 Reportes</button>
    <button onclick="setView('config')" class="btn !bg-slate-700">⚙️ Config</button>
</nav>

<div id="app" class="p-4 max-w-4xl mx-auto"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI",
    authDomain: "ghost-print-contabilidad.firebaseapp.com",
    projectId: "ghost-print-contabilidad",
    storageBucket: "ghost-print-contabilidad.firebasestorage.app",
    messagingSenderId: "867057362556",
    appId: "1:867057362556:web:6bd2a461817219a4000bf9"
};

const appF = initializeApp(firebaseConfig);
const db = getFirestore(appF);
const docRef = doc(db, "sistema", "datos_principales");

window.state = { ventas: [], gastos: [], inventario: {}, serviciosExtra: [] };
window.view = "dashboard";
let carritoVenta = [];

onSnapshot(docRef, (snap) => {
    if (snap.exists()) { 
        window.state = snap.data();
        window.state.inventario = window.state.inventario || {};
        window.state.serviciosExtra = window.state.serviciosExtra || [];
        window.state.ventas = window.state.ventas || [];
        window.state.gastos = window.state.gastos || [];
        document.getElementById("sync-status").innerText = "Sincronizado ✓"; 
        render();
    }
});

window.save = async () => { await setDoc(docRef, window.state); };
window.setView = (v) => { window.view = v; render(); };

window.render = function() {
    let app = document.getElementById("app"), html = "";
    if(!app) return;

    // --- CÁLCULOS GENERALES ---
    let totalVendido = window.state.ventas.reduce((a,b)=>a+b.total,0);
    let totalGastos = window.state.gastos.reduce((a,b)=>a+b.amount,0);
    let dineroCobrado = window.state.ventas.reduce((a,b)=>a+(b.abonado || 0), 0);
    let deudasPendientes = totalVendido - dineroCobrado;

    if(window.view === "dashboard"){
        let meta = 500; // Valor de ejemplo
        let porc = (totalVendido / meta) * 100;
        html = `
        <div class="grid grid-cols-2 gap-3 mb-4">
            <div class="card !m-0 bg-green-600 text-white text-center">
                <p class="text-[9px] font-bold uppercase">Caja (Real)</p>
                <b class="text-xl">$${dineroCobrado.toFixed(2)}</b>
            </div>
            <div class="card !m-0 bg-amber-500 text-white text-center">
                <p class="text-[9px] font-bold uppercase">Por Cobrar</p>
                <b class="text-xl">$${deudasPendientes.toFixed(2)}</b>
            </div>
        </div>
        <div class="card !m-0 mb-4 bg-slate-900 border-l-8 border-purple-500 p-4">
            <p class="text-purple-400 text-[9px] font-black uppercase">Ganancia Bruta (Ventas - Gastos)</p>
            <h2 class="text-white text-3xl font-black italic">$${(totalVendido - totalGastos).toFixed(2)}</h2>
        </div>
        <div class="card"><canvas id="chartDash" height="180"></canvas></div>`;
        setTimeout(() => initDashChart(totalVendido, totalGastos, dineroCobrado), 100);
    }

    if(window.view === "reportes"){
        // Lógica de mejores clientes
        let clientMap = window.state.ventas.reduce((a, b) => { a[b.cliente] = (a[b.cliente] || 0) + b.total; return a; }, {});
        let sortedClients = Object.entries(clientMap).sort((a,b) => b[1] - a[1]).slice(0, 5);

        html = `
        <div class="card bg-indigo-900 text-white font-black text-center uppercase italic mb-4 text-xs">Análisis de Inventario y Ventas</div>
        <div class="card"><canvas id="chartPie" height="250"></canvas></div>
        
        <div class="card mt-4">
            <h3 class="font-black uppercase text-purple-700 text-[11px] mb-3 border-b">Top 5 Clientes (Fidelidad)</h3>
            ${sortedClients.map(([name, total]) => `
                <div class="flex justify-between py-1 border-b text-xs">
                    <span class="font-bold uppercase">${name}</span>
                    <span class="text-green-600 font-bold">$${total.toFixed(2)}</span>
                </div>
            `).join("") || '<p class="text-center text-slate-400 text-[10px]">Sin datos de clientes</p>'}
        </div>

        <div class="card mt-4 bg-red-50">
            <h3 class="font-black uppercase text-red-700 text-[11px] mb-3 border-b">Resumen de Deudas</h3>
            <div class="flex justify-between font-bold text-sm">
                <span>TOTAL EN LA CALLE:</span>
                <span class="text-red-600">$${deudasPendientes.toFixed(2)}</span>
            </div>
        </div>`;
        setTimeout(() => initReportCharts(), 100);
    }

    // --- VISTAS RESTANTES (MANTENIENDO LÓGICA) ---
    if(window.view === "ventas"){
        html = `<div class="card"><h2 class="font-black mb-4 uppercase text-purple-700 italic border-b pb-2">Venta</h2>
            <label>Cliente</label><input id="cliV" placeholder="NOMBRE"><label>WhatsApp</label><input id="telV" type="number" placeholder="58...">
            <div class="grid grid-cols-2 gap-2">
                <div><label>Material</label><select id="pSel"><option value="">-- Ninguno --</option>${Object.keys(window.state.inventario).map(p=>`<option value="${p}">${p}</option>`).join("")}</select></div>
                <div><label>Servicio</label><select id="sSel"><option value="">-- Ninguno --</option>${window.state.serviciosExtra.map(s=>`<option value="${s}">${s}</option>`).join("")}</select></div>
            </div>
            <label>Tarifa</label><select id="tCli"><option value="detal">DETAL ($9) - m²</option><option value="mayor">MAYOR ($10) - ML</option><option value="libre">LIBRE - Unidad</option></select>
            <label>Cantidad</label><input id="cQty" type="number" value="1" step="0.01">
            <button onclick="addItemCarrito()" class="btn w-full !bg-blue-600 mt-2">+ AÑADIR</button>
            <div id="listaCarrito" class="mt-4 border-t pt-2 space-y-1 text-xs"></div>
            <div id="totalVenta" class="p-3 bg-slate-800 text-white text-center font-bold mt-2 rounded-xl text-xl uppercase italic">Total: $0.00</div>
            <button onclick="procesarV()" class="btn w-full bg-green-600 mt-4 py-4 font-black">FINALIZAR</button></div>`;
        setTimeout(() => renderCarritoInner(), 10);
    }

    if(window.view === "cobranzas"){
        html = `${window.state.ventas.filter(v=>!v.pagado).reverse().map(v=>`
            <div class="card flex justify-between items-center border-l-4 border-amber-500">
                <div><b class="uppercase">${v.cliente}</b><br><small class="text-red-600 font-bold italic">Debe: $${(v.total-(v.abonado||0)).toFixed(2)}</small></div>
                <div class="flex gap-1"><button onclick="enviarWS(${v.id})" class="bg-green-600 text-white p-2 rounded text-[8px] font-bold">WS</button><button onclick="abonarV(${v.id})" class="bg-blue-600 text-white p-2 rounded text-[8px] font-bold">ABONO</button><button onclick="borrarV(${v.id})" class="bg-red-500 text-white p-2 rounded text-[8px] font-bold italic">X</button></div>
            </div>`).join("")}`;
    }

    if(window.view === "compras"){
        html = `<div class="card bg-blue-50"><label>Insumo</label><select id="mCom">${Object.keys(window.state.inventario).map(p=>`<option value="${p}">${p}</option>`).join("")}</select><label>Cantidad</label><input id="qCom" type="number"><label>Inversión $</label><input id="vCom" type="number"><button onclick="regCom()" class="btn w-full bg-blue-700 mt-2">Cargar Stock</button></div>
        <div class="grid grid-cols-2 gap-2 mt-4">${Object.entries(window.state.inventario).map(([n,i])=>`<div class="card !m-0 p-3 flex justify-between items-center"><div><b class="text-[9px] uppercase">${n}</b><br><span class="text-blue-700 font-bold text-lg">${(i.stock || 0).toFixed(2)}</span></div><button onclick="editStock('${n}')" class="text-blue-500 font-bold text-[9px]">EDIT</button></div>`).join("")}</div>`;
    }

    if(window.view === "gastos"){
        html = `<div class="card"><label>Descripción</label><input id="gNom"><label>Monto $</label><input id="gMon" type="number"><button onclick="regG()" class="btn w-full bg-red-600 mt-2">Cargar Gasto</button></div>
        ${window.state.gastos.slice().reverse().map(g=>`<div class="card flex justify-between py-2 border-l-4 border-red-500"><div><small class="uppercase font-bold">${g.name}</small><br><b>$${g.amount.toFixed(2)}</b></div><button onclick="borrarG(${g.id})" class="text-red-500 font-bold text-xs">X</button></div>`).join("")}`;
    }

    if(window.view === "config"){
        html = `<div class="card"><label>Nuevo Material</label><input id="nP"><button onclick="addC('p')" class="btn bg-blue-600 mt-2 w-full uppercase">Guardar Material</button><hr class="my-6"><label>Nuevo Servicio</label><input id="nS"><button onclick="addC('s')" class="btn bg-purple-600 mt-2 w-full uppercase">Guardar Servicio</button></div>`;
    }

    app.innerHTML = html;
};

// --- GRÁFICOS ---
window.initDashChart = (v, g, c) => {
    new Chart(document.getElementById('chartDash'), {
        type: 'bar',
        data: { labels: ['Vendido', 'Gastado', 'Cobrado'], datasets: [{ data: [v, g, c], backgroundColor: ['#6d28d9', '#ef4444', '#22c55e'], borderRadius: 8 }] },
        options: { plugins: { legend: { display: false } } }
    });
};

window.initReportCharts = () => {
    let items = window.state.ventas.map(v => v.items || []).flat();
    if (items.length === 0) return;
    let dataMap = items.reduce((a, b) => { a[b.nombre] = (a[b.nombre] || 0) + b.sub; return a; }, {});
    new Chart(document.getElementById('chartPie'), {
        type: 'doughnut',
        data: { labels: Object.keys(dataMap), datasets: [{ data: Object.values(dataMap), backgroundColor: ['#6d28d9', '#22c55e', '#3b82f6', '#f59e0b', '#ec4899'], borderWidth: 0 }] },
        options: { plugins: { legend: { position: 'bottom', labels: { font: { size: 10, weight: 'bold' } } } } }
    });
};

// --- FUNCIONES MOTOR ---
window.addItemCarrito = () => {
    let p = document.getElementById("pSel").value, s = document.getElementById("sSel").value, t = document.getElementById("tCli").value, c = parseFloat(document.getElementById("cQty").value) || 0;
    if(!p && !s) return;
    let uni = "Und", pre = 12;
    if(t === "detal") { pre = 9; uni = "m²"; } else if(t === "mayor") { pre = 10; uni = "ML"; }
    let nom = (p && s) ? `${p} + ${s}` : (p || s);
    carritoVenta.push({ nombre: nom.toUpperCase(), qty: c, unidad: uni, sub: c * pre, esProd: !!p, prodKey: p });
    renderCarritoInner();
};

window.renderCarritoInner = () => {
    let div = document.getElementById("listaCarrito"), totalDiv = document.getElementById("totalVenta");
    if(!div) return;
    div.innerHTML = carritoVenta.map((v,i)=>`<div class="flex justify-between py-1 border-b bg-white px-2 rounded"><span><b>${v.qty}${v.unidad}</b> - ${v.nombre}</span><button onclick="removeItemCarrito(${i})" class="text-red-500 font-bold px-2">X</button></div>`).join("");
    totalDiv.innerText = `TOTAL: $${carritoVenta.reduce((a,b)=>a+b.sub,0).toFixed(2)}`;
};

window.removeItemCarrito = (i) => { carritoVenta.splice(i, 1); renderCarritoInner(); };

window.procesarV = async () => {
    let cliente = document.getElementById("cliV").value.toUpperCase();
    if(!cliente || carritoVenta.length === 0) return alert("Faltan datos");
    let keyT = Object.keys(window.state.inventario).find(k => k.toUpperCase().includes("TINTA"));
    carritoVenta.forEach(i => {
        if (i.esProd && i.prodKey && window.state.inventario[i.prodKey]) {
            window.state.inventario[i.prodKey].stock -= i.qty;
            if (keyT && i.prodKey.toUpperCase() !== keyT.toUpperCase()) window.state.inventario[keyT].stock -= i.qty;
        }
    });
    window.state.ventas.push({id:Date.now(), cliente, total: carritoVenta.reduce((a,b)=>a+b.sub, 0), abonado:0, pagado:false, items: [...carritoVenta]});
    await window.save(); carritoVenta = []; alert("Venta Exitosa"); setView('cobranzas');
};

window.borrarV = async (id) => {
    if(confirm("¿Anular?")){
        let vIdx = window.state.ventas.findIndex(x => x.id === id);
        let venta = window.state.ventas[vIdx];
        let keyT = Object.keys(window.state.inventario).find(k => k.toUpperCase().includes("TINTA"));
        venta.items.forEach(i => {
            if (i.esProd && i.prodKey && window.state.inventario[i.prodKey]) {
                window.state.inventario[i.prodKey].stock += i.qty;
                if (keyT && i.prodKey.toUpperCase() !== keyT.toUpperCase()) window.state.inventario[keyT].stock += i.qty;
            }
        });
        window.state.ventas.splice(vIdx, 1); await window.save(); render();
    }
};

window.regCom = async () => {
    let m = document.getElementById("mCom").value, q = parseFloat(document.getElementById("qCom").value), v = parseFloat(document.getElementById("vCom").value);
    if(q > 0) { window.state.inventario[m].stock += q; window.state.gastos.push({id:Date.now(), name:`COMPRA: ${m}`, amount: v}); await window.save(); render(); }
};

window.regG = async () => {
    let n = document.getElementById("gNom").value, m = parseFloat(document.getElementById("gMon").value);
    if(n && m) { window.state.gastos.push({id:Date.now(), name:n.toUpperCase(), amount: m}); await window.save(); render(); }
};

window.addC = async (t) => {
    if(t==='p'){ let n=document.getElementById("nP").value.toUpperCase(); if(n) window.state.inventario[n]={stock:0}; }
    else { let n=document.getElementById("nS").value.toUpperCase(); if(n) window.state.serviciosExtra.push(n); }
    await window.save(); render();
};

window.editStock = async (n) => { let v = parseFloat(prompt(`Ajustar ${n}:`, window.state.inventario[n].stock)); if(!isNaN(v)){ window.state.inventario[n].stock = v; await window.save(); render(); } };
window.borrarG = async (id) => { if(confirm("¿Borrar?")){ window.state.gastos=window.state.gastos.filter(x=>x.id!==id); await window.save(); render(); } };
window.enviarWS = (id) => {
    let v = window.state.ventas.find(x => x.id === id);
    let msg = `GhostPrint: Hola ${v.cliente}, resta *$${(v.total-(v.abonado||0)).toFixed(2)}*.`;
    window.open(`https://api.whatsapp.com/send?phone=${v.telefono}&text=${encodeURIComponent(msg)}`, '_blank');
};
window.abonarV = async (id) => {
    let v = window.state.ventas.find(x=>x.id===id), m = parseFloat(prompt("¿Monto?"));
    if(m){ v.abonado += m; if(v.abonado >= v.total) v.pagado = true; await window.save(); render(); }
};

render();
</script>
</body>
</html>
