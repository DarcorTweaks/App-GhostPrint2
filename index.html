<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GhostPrint PRO v18.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { background-color: #030308; color: #f8fafc; font-family: 'Inter', sans-serif; padding-bottom: 100px; }
        .card-pro { background: #111122; border: 1px solid #2d2d44; border-radius: 24px; padding: 20px; margin-bottom: 12px; }
        nav { background: rgba(10, 10, 20, 0.95); display: flex; gap: 8px; overflow-x: auto; padding: 14px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #334155; }
        .btn-nav { background: #1e1e30; color: #64748b; padding: 12px 18px; border-radius: 14px; font-size: 10px; font-weight: 800; white-space: nowrap; cursor: pointer; text-transform: uppercase; }
        .active { background: #7c3aed !important; color: white !important; box-shadow: 0 0 20px rgba(124, 58, 237, 0.4); }
        input, select { background: #070712; border: 1px solid #334155; color: white; padding: 14px; border-radius: 14px; width: 100%; margin: 6px 0; font-weight: 700; outline: none; }
        .btn-main { background: linear-gradient(135deg, #7c3aed 0%, #4c1d95 100%); color: white; padding: 18px; border-radius: 18px; width: 100%; font-weight: 900; text-transform: uppercase; cursor: pointer; border: none; }
        .stock-bar { height: 8px; border-radius: 10px; background: #1e1e30; margin-top: 10px; overflow: hidden; }
        .stock-fill { height: 100%; transition: width 0.5s ease; }
        #bill-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:200; padding:20px; overflow-y: auto; }
        .bill-card { background: white; color: black; border-radius: 25px; padding: 25px; max-width: 350px; margin: 0 auto; }
    </style>
</head>
<body>

<header class="p-5 bg-[#0a0a1a] border-b border-white/5 flex justify-between items-center">
    <div class="flex items-center">
        <span class="text-2xl mr-2">👻</span>
        <h1 class="text-xl font-black italic text-white uppercase tracking-tighter">GhostPrint <span class="text-purple-500">PRO</span></h1>
    </div>
    <span class="text-[8px] font-black uppercase bg-purple-500/20 text-purple-400 px-3 py-1.5 rounded-full border border-purple-500/30">v18.3</span>
</header>

<nav id="main-nav">
    <div onclick="setView('inicio')" class="btn-nav active" id="n-inicio">🏠 Inicio</div>
    <div onclick="setView('ventas')" class="btn-nav" id="n-ventas">💵 Ventas</div>
    <div onclick="setView('inventario')" class="btn-nav" id="n-inventario">📦 Stock</div>
    <div onclick="setView('reportes')" class="btn-nav" id="n-reportes">📊 Análisis</div>
    <div onclick="setView('cobros')" class="btn-nav" id="n-cobros">⏳ Cuentas</div>
    <div onclick="setView('gastos')" class="btn-nav" id="n-gastos">💸 Gastos</div>
    <div onclick="setView('compras')" class="btn-nav" id="n-compras">🛒 Carga</div>
    <div onclick="setView('catalogo')" class="btn-nav" id="n-catalogo">⚙️ Config</div>
</nav>

<div id="app" class="p-4 max-w-2xl mx-auto"></div>

<div id="bill-modal">
    <div class="bill-card">
        <div class="text-center">
            <span class="text-4xl">👻</span>
            <h2 class="text-xl font-black italic uppercase tracking-tighter mt-1">GhostPrint <span class="text-purple-600">PRO</span></h2>
            <p id="b-fecha" class="text-[9px] font-black text-gray-400 uppercase"></p>
        </div>
        <div class="border-t-2 dashed border-gray-200 my-4"></div>
        <p class="text-[9px] uppercase font-black text-gray-400">Cliente:</p>
        <p id="b-cli" class="text-lg font-black uppercase text-gray-800 mb-4"></p>
        <p class="text-[9px] uppercase font-black text-gray-400">Saldo Pendiente:</p>
        <p id="b-monto" class="text-4xl font-black text-purple-700"></p>
        <div class="border-t-2 dashed border-gray-200 my-4"></div>
        <button id="btn-wa" class="btn-main !from-green-600 !to-green-800 flex justify-center items-center gap-2 italic font-black mb-2 text-sm">📱 WHATSAPP</button>
        <button onclick="closeBill()" class="btn-main !from-gray-800 !to-black text-xs">CERRAR</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI",
        authDomain: "ghost-print-contabilidad.firebaseapp.com",
        projectId: "ghost-print-contabilidad",
        storageBucket: "ghost-print-contabilidad.firebasestorage.app",
        messagingSenderId: "867057362556",
        appId: "1:867057362556:web:6bd2a461817219a4000bf9"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const docRef = db.collection("sistema").doc("datos_principales");

    window.state = JSON.parse(localStorage.getItem('gp_v18_3')) || { ventas: [], gastos: [], inventario: {}, serviciosExtra: ["OJALETES", "DISEÑO", "MONTAJE", "CORTE"], comprasInversion: [], mermas: [] };
    window.currentView = "inicio";
    let cart = [];

    window.sync = async function() {
        localStorage.setItem('gp_v18_3', JSON.stringify(window.state));
        await docRef.set(window.state).catch(e => console.log("Offline"));
    };

    docRef.onSnapshot(doc => { if(doc.exists) { window.state = doc.data(); render(); } });

    window.setView = function(v) {
        window.currentView = v;
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
        const target = document.getElementById('n-' + v);
        if(target) target.classList.add('active');
        render();
    };

    window.render = function() {
        const app = document.getElementById("app");
        const mesActual = new Date().getMonth();
        const anioActual = new Date().getFullYear();
        
        const filterDate = (arr) => (arr || []).filter(i => { const d = new Date(i.id); return d.getMonth() === mesActual && d.getFullYear() === anioActual; });
        const vM = filterDate(window.state.ventas);
        const gM = filterDate(window.state.gastos);
        const cM = filterDate(window.state.comprasInversion);

        const totalVendido = vM.reduce((a, b) => a + (Number(b.total) || 0), 0);
        const totalCobrado = vM.reduce((a, b) => a + (Number(b.abonado) || (b.pagado ? b.total : 0)), 0);
        const totalGastos = gM.reduce((a, b) => a + (Number(b.amount) || 0), 0);
        const totalStock = cM.reduce((a, b) => a + (Number(b.amount) || 0), 0);
        const porCobrar = totalVendido - totalCobrado;
        const utilidadCaja = totalCobrado - totalGastos - totalStock;

        if(window.currentView === "inicio") {
            app.innerHTML = `
                <div class="card-pro !bg-gradient-to-br !from-purple-600 !to-indigo-900 border-none shadow-xl">
                    <p class="text-[10px] font-black text-purple-200 uppercase tracking-widest text-center italic">Caja Disponible</p>
                    <h2 class="text-6xl font-black text-white italic text-center my-2 leading-none">$${utilidadCaja.toFixed(2)}</h2>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="card-pro text-center"><p class="text-[8px] font-black opacity-40 uppercase">Ventas Mes</p><b class="text-xl">$${totalVendido.toFixed(0)}</b></div>
                    <div class="card-pro text-center"><p class="text-[8px] font-black opacity-40 uppercase">Inversión Stock</p><b class="text-xl text-blue-400">$${totalStock.toFixed(0)}</b></div>
                </div>`;
        }

        if(window.currentView === "inventario") {
            app.innerHTML = `<div class="space-y-3">${Object.entries(window.state.inventario || {}).map(([n, i]) => {
                const cant = i.stock || 0;
                const color = cant <= 0 ? 'bg-red-500' : cant < 5 ? 'bg-orange-500' : 'bg-green-500';
                return `
                <div class="card-pro">
                    <div class="flex justify-between items-center">
                        <div>
                            <p class="text-[9px] font-black opacity-50 uppercase">${n}</p>
                            <h4 class="text-3xl font-black text-white">${cant.toFixed(2)}</h4>
                        </div>
                        <button onclick="registrarMerma('${n}')" class="bg-red-600/20 text-red-500 border border-red-500/30 px-3 py-2 rounded-xl text-[10px] font-black uppercase tracking-tighter">⚠ Merma</button>
                    </div>
                    <div class="stock-bar"><div class="stock-fill ${color}" style="width: ${Math.min(cant*10, 100)}%"></div></div>
                </div>`;
            }).join("")}</div>`;
        }

        if(window.currentView === "reportes") {
            const percMeta = totalGastos > 0 ? Math.min((totalCobrado / totalGastos) * 100, 100) : 0;
            const clientMap = {};
            vM.forEach(v => { clientMap[v.cliente] = (clientMap[v.cliente] || 0) + v.total; });
            const topClientes = Object.entries(clientMap).sort((a,b) => b[1]-a[1]).slice(0, 3);

            app.innerHTML = `
                <div class="space-y-4">
                    <div class="card-pro">
                        <h3 class="text-[10px] font-black uppercase text-purple-400 mb-4 italic tracking-widest text-center">Resumen Administrativo</h3>
                        <div class="space-y-5">
                            <div>
                                <div class="flex justify-between text-[9px] font-black uppercase mb-1"><span>Dinero Cobrado</span> <span>$${totalCobrado.toFixed(0)}</span></div>
                                <div class="w-full bg-white/5 h-2 rounded-full overflow-hidden"><div class="bg-green-500 h-full" style="width: ${(totalCobrado/(totalVendido||1))*100}%"></div></div>
                            </div>
                            <div>
                                <div class="flex justify-between text-[9px] font-black uppercase mb-1"><span>Meta de Gastos</span> <span>$${totalGastos.toFixed(0)}</span></div>
                                <div class="w-full bg-white/5 h-2 rounded-full overflow-hidden"><div class="bg-purple-500 h-full" style="width: ${percMeta}%"></div></div>
                            </div>
                        </div>
                    </div>
                    <div class="card-pro">
                        <h3 class="text-[10px] font-black uppercase opacity-40 mb-3 italic">Top 3 Clientes</h3>
                        <div class="space-y-2">
                            ${topClientes.map(([name, total], i) => `<div class="flex justify-between text-xs font-bold uppercase"><span>${i+1}. ${name}</span><span>$${total.toFixed(2)}</span></div>`).join("") || '<p class="text-center opacity-30 text-xs">Sin registros</p>'}
                        </div>
                    </div>
                    <div class="card-pro border-white/5 bg-white/5">
                        <div class="space-y-2 text-[11px] font-bold uppercase italic opacity-70">
                            <div class="flex justify-between"><span>Vendido:</span><span>$${totalVendido.toFixed(2)}</span></div>
                            <div class="flex justify-between"><span>Deuda Clientes:</span><span class="text-orange-400">$${porCobrar.toFixed(2)}</span></div>
                        </div>
                    </div>
                </div>`;
        }

        if(window.currentView === "ventas") {
            app.innerHTML = `<div class="card-pro"><input type="date" id="fV" value="${new Date().toISOString().split('T')[0]}"><input id="cli" placeholder="CLIENTE"><input id="tel" type="number" placeholder="WHATSAPP"><div class="bg-white/5 p-4 rounded-xl mt-3 border border-white/10"><div class="grid grid-cols-2 gap-2"><select id="pS"><option value="">Material...</option>${Object.keys(window.state.inventario || {}).map(m=>`<option value="${m}">${m}</option>`).join("")}</select><select id="sS"><option value="">Servicio...</option>${(window.state.serviciosExtra || []).map(s=>`<option value="${s}">${s}</option>`).join("")}</select></div><input id="qV" type="number" placeholder="Cantidad" value="1"><select id="tC" onchange="document.getElementById('pL').classList.toggle('hidden', this.value !== 'libre')"><option value="detal">DETAL ($9)</option><option value="mayor">MAYOR ($10)</option><option value="libre">PRECIO LIBRE</option></select><input id="pL" class="hidden" type="number" placeholder="Monto $"><button onclick="addCart()" class="btn-main !p-3 mt-3">+ Añadir</button></div><div id="cart-list" class="mt-4 space-y-2 text-[10px]"></div><div id="total-disp" class="text-4xl font-black text-center my-6 italic">Total: $0.00</div><button onclick="finalizarVenta()" class="btn-main">Guardar Venta</button></div>`;
        }
        if(window.currentView === "cobros") {
            const d = (window.state.ventas || []).filter(v => !v.pagado);
            app.innerHTML = d.map(v => `<div class="card-pro flex justify-between items-center border-l-4 border-orange-500"><div><b class="text-xs uppercase font-black">${v.cliente}</b><br><span class="text-orange-400 text-xs font-black">Debe: $${(v.total - (v.abonado || 0)).toFixed(2)}</span></div><div class="flex gap-2"><button onclick="showBill('${v.cliente}', ${(v.total-(v.abonado||0))}, '${v.telefono}')" class="bg-green-600 p-3 rounded-xl">📋</button><button onclick="abono(${v.id})" class="bg-blue-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase">Abonar</button></div></div>`).join("") || '<p class="text-center py-20 opacity-30 font-black">TODO AL DÍA</p>';
        }
        if(window.currentView === "gastos") {
            app.innerHTML = `<div class="card-pro border-t-4 border-red-500"><h2 class="text-lg font-black uppercase mb-4 italic text-center">Nuevo Gasto</h2><input type="date" id="fG" value="${new Date().toISOString().split('T')[0]}"><input id="dG" placeholder="Descripción"><input id="aG" type="number" placeholder="Monto $"><button onclick="saveGasto()" class="btn-main mt-4 !bg-red-600">Guardar Gasto</button></div>`;
        }
        if(window.currentView === "compras") {
            app.innerHTML = `<div class="card-pro border-t-4 border-blue-500"><h2 class="text-lg font-black uppercase mb-4 italic text-center">Carga de Stock</h2><input type="date" id="fC" value="${new Date().toISOString().split('T')[0]}"><select id="mInv"><option value="">Material...</option>${Object.keys(window.state.inventario || {}).map(m=>`<option value="${m}">${m}</option>`).join("")}</select><div class="grid grid-cols-2 gap-2"><input id="qInv" type="number" placeholder="Cant"><input id="pInv" type="number" placeholder="Precio Un."></div><button onclick="saveInv()" class="btn-main mt-4">Guardar Stock</button></div>`;
        }
        if(window.currentView === "catalogo") {
            app.innerHTML = `<div class="card-pro"><input id="newM" placeholder="Nuevo Material"><button onclick="addMat()" class="btn-main !p-3">Añadir Material</button><hr class="my-4 border-white/5"><input id="newS" placeholder="Nuevo Servicio"><button onclick="addServicio()" class="btn-main !p-3">Añadir Servicio</button></div>`;
        }
    };

    // FUNCIONES CORE (SIN CAMBIOS)
    window.registrarMerma = async (material) => { let cant = parseFloat(prompt(`Cantidad dañada de ${material}:`)); if(cant && cant > 0) { if(window.state.inventario[material].stock >= cant) { window.state.inventario[material].stock -= cant; if(!window.state.mermas) window.state.mermas = []; window.state.mermas.push({ id: Date.now(), material, cant }); await window.sync(); render(); } else { alert("Stock insuficiente."); } } };
    window.saveInv = async () => { const m = document.getElementById("mInv").value, q = parseFloat(document.getElementById("qInv").value), p = parseFloat(document.getElementById("pInv").value), f = document.getElementById("fC").value; if(m && q && p) { if(!window.state.inventario[m]) window.state.inventario[m] = {stock:0}; window.state.inventario[m].stock += q; if(!window.state.comprasInversion) window.state.comprasInversion = []; window.state.comprasInversion.push({ id: new Date(f+"T12:00:00").getTime(), material: m, amount: (q * p), qty: q }); await window.sync(); setView('inicio'); } };
    window.saveGasto = async () => { const d = document.getElementById("dG").value, a = parseFloat(document.getElementById("aG").value), f = document.getElementById("fG").value; if(d && a) { if(!window.state.gastos) window.state.gastos = []; window.state.gastos.push({ id: new Date(f+"T12:00:00").getTime(), desc: d.toUpperCase(), amount: a }); await window.sync(); setView('inicio'); } };
    window.showBill = (cliente, monto, telf) => { const fechaStr = new Date().toLocaleDateString(); document.getElementById('b-cli').innerText = cliente; document.getElementById('b-monto').innerText = "$" + monto.toFixed(2); document.getElementById('b-fecha').innerText = fechaStr; document.getElementById('bill-modal').style.display = 'block'; document.getElementById('btn-wa').onclick = () => { const msg = `*GHOSTPRINT PRO*%0A*Fecha:* ${fechaStr}%0A*Cliente:* ${cliente}%0A*Saldo Pendiente:* $${monto.toFixed(2)}`; window.open(`https://api.whatsapp.com/send?phone=${telf}&text=${msg}`, '_blank'); }; };
    window.closeBill = () => { document.getElementById('bill-modal').style.display = 'none'; };
    window.abono = async (id) => { let v = window.state.ventas.find(x => x.id === id); let m = parseFloat(prompt(`Abono para ${v.cliente}?`)); if(m) { v.abonado = (Number(v.abonado)||0) + m; if(v.abonado >= v.total) v.pagado = true; await window.sync(); render(); } };
    window.addMat = async () => { let n = document.getElementById("newM").value.toUpperCase(); if(n) { if(!window.state.inventario) window.state.inventario = {}; window.state.inventario[n] = {stock: 0}; await window.sync(); render(); } };
    window.addServicio = async () => { let s = document.getElementById("newS").value.toUpperCase(); if(s) { if(!window.state.serviciosExtra) window.state.serviciosExtra = []; window.state.serviciosExtra.push(s); await window.sync(); render(); } };
    window.addCart = () => { let m = document.getElementById("pS").value, s = document.getElementById("sS").value, q = parseFloat(document.getElementById("qV").value) || 1, t = document.getElementById("tC").value; let p = (t === "detal") ? 9 : (t === "mayor") ? 10 : parseFloat(document.getElementById("pL").value) || 0; let d = (m && s) ? m + " + " + s : m || s; if(d) { cart.push({ d, p: (p*q), mat: m, qtyV: q }); renderCart(); } };
    function renderCart() { document.getElementById("cart-list").innerHTML = cart.map((c, i) => `<div class="flex justify-between py-1 uppercase font-bold text-white/50"><span>${c.d}</span><b>$${c.p}</b></div>`).join(""); document.getElementById("total-disp").innerText = "Total: $" + cart.reduce((a,b)=>a+b.p,0).toFixed(2); }
    window.finalizarVenta = async () => { let cli = document.getElementById("cli").value, tel = document.getElementById("tel").value, fec = document.getElementById("fV").value; if(!cli || !cart.length) return; cart.forEach(c => { if(c.mat && window.state.inventario[c.mat]) window.state.inventario[c.mat].stock -= c.qtyV; }); window.state.ventas.push({ id: new Date(fec+"T12:00:00").getTime(), cliente: cli.toUpperCase(), telefono: tel, total: cart.reduce((a,b)=>a+b.p,0), abonado: 0, pagado: false }); await window.sync(); cart = []; setView('inicio'); };

    render();
</script>
</body>
</html>
