<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GhostPrint PRO v22.8</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { background-color: #030308; color: #f8fafc; font-family: 'Inter', sans-serif; padding-bottom: 100px; }
        .card-pro { background: #111122; border: 1px solid #2d2d44; border-radius: 20px; padding: 18px; margin-bottom: 12px; }
        nav { background: rgba(10, 10, 20, 0.95); display: flex; gap: 8px; overflow-x: auto; padding: 14px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #334155; }
        .btn-nav { background: #1e1e30; color: #64748b; padding: 12px 18px; border-radius: 14px; font-size: 10px; font-weight: 800; white-space: nowrap; cursor: pointer; text-transform: uppercase; }
        .active { background: #7c3aed !important; color: white !important; }
        input, select { background: #070712; border: 1px solid #334155; color: white; padding: 14px; border-radius: 14px; width: 100%; margin: 6px 0; font-weight: 700; outline: none; }
        .btn-main { background: linear-gradient(135deg, #7c3aed 0%, #4c1d95 100%); color: white; padding: 16px; border-radius: 16px; width: 100%; font-weight: 900; text-transform: uppercase; cursor: pointer; border: none; }
        #bill-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:200; padding:20px; align-items: center; justify-content: center; }
        .ghost-glow { filter: drop-shadow(0 0 12px #7c3aed); }
    </style>
</head>
<body>

<div class="p-4 flex justify-between items-center bg-[#0a0a14] border-b border-white/5">
    <div class="flex items-center gap-3">
        <span class="text-4xl ghost-glow">👻</span>
        <div><h1 class="text-xl font-black italic text-purple-500 leading-none">GHOST PRINT</h1><p class="text-[8px] font-black opacity-40 uppercase">Hybrid Engine v22.8</p></div>
    </div>
</div>

<nav>
    <div onclick="setView('inicio')" class="btn-nav active" id="n-inicio">📊 ADMIN</div>
    <div onclick="setView('ventas')" class="btn-nav" id="n-ventas">💵 Ventas</div>
    <div onclick="setView('cobros')" class="btn-nav" id="n-cobros">⏳ Cuentas</div>
    <div onclick="setView('inventario')" class="btn-nav" id="n-inventario">📦 Stock</div>
    <div onclick="setView('catalogo')" class="btn-nav" id="n-catalogo">⚙️ Config</div>
</nav>

<div id="app" class="p-4 max-w-2xl mx-auto"></div>

<div id="bill-modal" onclick="closeBill()">
    <div class="bg-white p-6 rounded-3xl w-full max-w-xs text-black shadow-2xl relative" onclick="event.stopPropagation()">
        <div class="text-center mb-2"><span class="text-4xl opacity-80" style="filter: drop-shadow(0 0 5px #7c3aed)">👻</span></div>
        <h2 class="text-2xl font-black italic text-purple-600 text-center uppercase leading-none">GHOST PRINT</h2>
        <div class="border-t border-dashed my-4 border-gray-300"></div>
        <p id="b-monto" class="text-5xl font-black text-purple-700 text-center my-2"></p>
        <p id="b-cli" class="text-xl font-black uppercase mb-1 text-center"></p>
        <p id="b-det" class="text-[10px] font-bold text-gray-400 italic text-center mb-4 uppercase"></p>
        <button id="btn-wa" class="btn-main !from-green-600 !to-green-800 text-white">ENVIAR WHATSAPP</button>
        <button onclick="closeBill()" class="w-full text-gray-400 font-bold py-2 mt-2">Cerrar</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI", authDomain: "ghost-print-contabilidad.firebaseapp.com", projectId: "ghost-print-contabilidad", storageBucket: "ghost-print-contabilidad.firebasestorage.app", messagingSenderId: "867057362556", appId: "1:867057362556:web:6bd2a461817219a4000bf9" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const docRef = db.collection("sistema").doc("datos_principales");

    window.state = JSON.parse(localStorage.getItem('gp_v22_8')) || { ventas: [], gastos: [], inventario: {}, serviciosExtra: ["DISEÑO", "INSTALACIÓN", "MONTAJE"], comprasInversion: [] };

    window.sync = async function() { localStorage.setItem('gp_v22_8', JSON.stringify(window.state)); await docRef.set(window.state); };
    docRef.onSnapshot(doc => { if(doc.exists) { window.state = doc.data(); render(); } });

    window.setView = function(v) {
        window.currentView = v;
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
        if(document.getElementById('n-' + v)) document.getElementById('n-' + v).classList.add('active');
        render();
    };

    window.render = function() {
        const app = document.getElementById("app");
        const inv = window.state.inventario || {};
        const vM = window.state.ventas || [];
        const serv = window.state.serviciosExtra || [];

        if(window.currentView === "inicio") {
            const totalCobrado = vM.reduce((a, b) => a + (Number(b.abonado) || (b.pagado ? b.total : 0)), 0);
            const totalBruto = vM.reduce((a, b) => a + Number(b.total), 0);
            const totalDeuda = totalBruto - totalCobrado;

            app.innerHTML = `
                <div class="card-pro bg-gradient-to-br from-purple-900 to-black border-none text-center shadow-2xl relative overflow-hidden">
                    <p class="text-[10px] font-black uppercase opacity-60 tracking-widest text-shadow">Recaudado Real (Caja)</p>
                    <h2 class="text-6xl font-black italic">$${totalCobrado.toFixed(2)}</h2>
                </div>
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <div class="card-pro border-l-4 border-orange-500 bg-orange-500/5"><p class="text-[9px] opacity-40 font-black uppercase">Por Cobrar</p><b class="text-xl text-orange-400">$${totalDeuda.toFixed(2)}</b></div>
                    <div class="card-pro border-l-4 border-purple-500 bg-purple-500/5"><p class="text-[9px] opacity-40 font-black uppercase">Total Ventas</p><b class="text-xl">$${totalBruto.toFixed(2)}</b></div>
                </div>
            `;
        }

        if(window.currentView === "ventas") {
            app.innerHTML = `
                <div class="card-pro">
                    <h2 class="text-lg font-black uppercase italic mb-4">Nueva Orden</h2>
                    <input id="cli" placeholder="CLIENTE / NEGOCIO">
                    <input id="tel" type="number" placeholder="TELÉFONO WHATSAPP">
                    
                    <div class="bg-white/5 p-4 rounded-xl mt-4 border border-white/5">
                        <p class="text-[9px] font-black opacity-30 mb-2 uppercase italic text-center">Configurar Item</p>
                        <select id="selMat" onchange="updateVentaLogic()">
                            <option value="">-- SELECCIONAR MATERIAL --</option>
                            ${Object.keys(inv).map(m=>`<option value="${m}">${m}</option>`).join("")}
                            <option value="SERVICIO">-- SOLO SERVICIO / OTRO --</option>
                        </select>
                        
                        <div id="boxMat" class="hidden">
                            <input id="cantMetros" type="number" step="0.01" placeholder="Metros Lineales" oninput="updateVentaLogic()">
                            <p id="labelM2" class="text-[10px] font-black text-purple-400 mb-2 px-1"></p>
                        </div>

                        <select id="selServ">
                            <option value="">Sin servicio adicional...</option>
                            ${serv.map(s=>`<option value="${s}">${s}</option>`).join("")}
                        </select>

                        <input id="precioFinal" type="number" placeholder="PRECIO FINAL $ (VENTA LIBRE)">
                        <button onclick="addItem()" class="btn-main !p-3 mt-3 text-xs">+ AÑADIR A LA LISTA</button>
                    </div>

                    <div id="cart-items" class="mt-4 space-y-1"></div>
                    <div id="total-venta" class="text-5xl font-black text-center my-6 text-purple-500">$0.00</div>
                    <button onclick="saveVenta()" class="btn-main">PROCESAR TRABAJO 👻</button>
                </div>
            `;
        }

        if(window.currentView === "cobros") {
            const deudas = vM.filter(v => !v.pagado);
            app.innerHTML = `<div class="space-y-2">${deudas.reverse().map(v => `
                <div class="card-pro border-l-4 border-orange-500 flex justify-between items-center">
                    <div><b class="text-xs uppercase">${v.cliente}</b><br><span class="text-orange-400 text-[10px] font-black italic">SALDO: $${(v.total - (v.abonado||0)).toFixed(2)}</span></div>
                    <div class="flex gap-1">
                        <button onclick="showBill('${v.cliente}', ${(v.total-(v.abonado||0))}, '${v.telefono}', '${v.items.map(i=>i.d).join(", ")}')" class="bg-green-600 p-2 rounded-lg text-xs">📋</button>
                        <button onclick="cobrarAbono('${v.id}')" class="bg-purple-600 px-3 py-1 rounded-lg text-[9px] font-black uppercase">Cobrar</button>
                    </div>
                </div>`).join("")}</div>`;
        }

        if(window.currentView === "inventario") {
            app.innerHTML = `
                <div class="card-pro mb-4">
                    <h2 class="text-xs font-black opacity-40 mb-3 uppercase italic">Cargar Nuevo Stock</h2>
                    <select id="mInv"><option value="">Material...</option>${Object.keys(inv).map(m=>`<option value="${m}">${m}</option>`).join("")}</select>
                    <input id="qInv" type="number" placeholder="Metros Lineales Comprados">
                    <input id="pInv" type="number" placeholder="Costo Total de la Compra $">
                    <button onclick="saveStock()" class="btn-main !bg-blue-600 mt-2">REGISTRAR COMPRA</button>
                </div>
                <div class="space-y-2">${Object.entries(inv).map(([n, i]) => `
                <div class="card-pro flex justify-between items-center">
                    <div><p class="text-[9px] font-black opacity-50 uppercase">${n}</p><h4 class="text-3xl font-black italic">${i.stock} <span class="text-sm">ML</span></h4></div>
                    <p class="text-right text-[10px] font-bold text-purple-400 uppercase">Equivale a:<br>${(i.stock * (i.ancho||1)).toFixed(2)} M^2</p>
                </div>`).join("")}</div>`;
        }

        if(window.currentView === "catalogo") {
            app.innerHTML = `
                <div class="card-pro">
                    <h2 class="text-xs font-black opacity-40 mb-4 uppercase italic">Configuración</h2>
                    <input id="nMat" placeholder="Nombre Material (Ej: VINIL)">
                    <input id="pMat" type="number" placeholder="Precio x M2 ($)">
                    <input id="aMat" type="number" step="0.01" placeholder="Ancho (Ej: 1.52)">
                    <button onclick="addMat()" class="btn-main mt-2 text-xs">AÑADIR MATERIAL</button>
                    <div class="mt-4 border-t border-white/5 pt-4 space-y-2">
                        ${Object.entries(inv).map(([n, d]) => `<div class="flex justify-between items-center bg-white/5 p-3 rounded-xl"><span><b>${n}</b> <small class="opacity-40">($${d.precio}/M2)</small></span><button onclick="delMat('${n}')" class="text-red-500">×</button></div>`).join("")}
                    </div>
                </div>
            `;
        }
    };

    // --- LÓGICA DE NEGOCIO ---
    window.updateVentaLogic = () => {
        const mat = document.getElementById("selMat").value;
        const metros = parseFloat(document.getElementById("cantMetros").value) || 0;
        const box = document.getElementById("boxMat");
        const label = document.getElementById("labelM2");
        const priceInput = document.getElementById("precioFinal");

        if(mat && mat !== "SERVICIO") {
            box.classList.remove("hidden");
            const info = window.state.inventario[mat];
            const m2 = metros * info.ancho;
            label.innerText = `Total: ${m2.toFixed(2)} M^2 (Sugerido: $${(m2 * info.precio).toFixed(2)})`;
            if(!priceInput.value || priceInput.dataset.auto === "true") {
                priceInput.value = (m2 * info.precio).toFixed(2);
                priceInput.dataset.auto = "true";
            }
        } else {
            box.classList.add("hidden");
            label.innerText = "";
        }
    };

    let cart = [];
    window.addItem = () => {
        const mat = document.getElementById("selMat").value;
        const serv = document.getElementById("selServ").value;
        const precio = parseFloat(document.getElementById("precioFinal").value) || 0;
        const metros = parseFloat(document.getElementById("cantMetros").value) || 0;
        
        if(precio > 0) {
            const desc = (mat && mat !== "SERVICIO" ? `${mat} (${metros}m)` : "") + (serv ? ` + ${serv}` : "");
            cart.push({ d: desc, p: precio, mat: mat === "SERVICIO" ? null : mat, qty: metros });
            document.getElementById("total-venta").innerText = "$" + cart.reduce((a,b)=>a+b.p,0).toFixed(2);
            document.getElementById("cart-items").innerHTML += `<div class="flex justify-between bg-white/5 p-2 rounded-lg text-[11px] uppercase font-bold"><span>${desc}</span><b>$${precio}</b></div>`;
        }
    };

    window.saveVenta = async () => {
        const cli = document.getElementById("cli").value;
        if(!cli || !cart.length) return;
        cart.forEach(item => { if(item.mat && window.state.inventario[item.mat]) window.state.inventario[item.mat].stock -= item.qty; });
        window.state.ventas.push({ id: Date.now(), cliente: cli.toUpperCase(), telefono: document.getElementById("tel").value, total: cart.reduce((a,b)=>a+b.p,0), abonado: 0, pagado: false, items: [...cart] });
        await window.sync(); cart = []; setView('inicio');
    };

    window.saveStock = async () => {
        const m = document.getElementById("mInv").value, q = parseFloat(document.getElementById("qInv").value), p = parseFloat(document.getElementById("pInv").value);
        if(m && q) { 
            window.state.inventario[m].stock += q; 
            window.state.comprasInversion.push({ id: Date.now(), amount: p, material: m, qty: q });
            await window.sync(); render(); 
        }
    };

    window.addMat = async () => {
        const n = document.getElementById("nMat").value.toUpperCase(), p = parseFloat(document.getElementById("pMat").value), a = parseFloat(document.getElementById("aMat").value);
        if(n && p && a) { window.state.inventario[n] = { stock: 0, precio: p, ancho: a }; await window.sync(); render(); }
    };

    window.delMat = async (m) => { if(confirm("Eliminar material?")) { delete window.state.inventario[m]; await window.sync(); render(); } };
    window.cobrarAbono = async (id) => { const v = window.state.ventas.find(x => x.id == id); let m = parseFloat(prompt(`Saldo pendiente: $${(v.total - v.abonado).toFixed(2)}. ¿Cuánto paga?`)); if(m > 0) { v.abonado += m; if(v.abonado >= v.total) v.pagado = true; await window.sync(); render(); } };
    window.showBill = (cli, mon, tel, det) => { document.getElementById('b-cli').innerText = cli; document.getElementById('b-monto').innerText = "$" + mon.toFixed(2); document.getElementById('b-det').innerText = det; document.getElementById('bill-modal').style.display = 'flex'; document.getElementById('btn-wa').onclick = () => window.open(`https://api.whatsapp.com/send?phone=${tel}&text=👻 *GHOSTPRINT*%0A*CLIENTE:* ${cli}%0A*DETALLE:* ${det}%0A*SALDO:* $${mon.toFixed(2)}`, '_blank'); };
    window.closeBill = () => document.getElementById('bill-modal').style.display = 'none';

    window.currentView = "inicio";
    render();
</script>
</body>
</html>
