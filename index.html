<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>GhostPrint PRO - Final Stable</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
    .btn{background:#6d28d9;color:white;padding:10px 16px;border-radius:10px;cursor:pointer;font-weight:600;border:none}
    .btn:hover{background:#5b21b6;transform:translateY(-1px)}
    .card{background:white;padding:20px;margin:12px 0;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,0.05);border:1px solid #f1f1f1}
    input,select{border:1px solid #e2e8f0;padding:12px;margin:8px 0;border-radius:12px;width:100%}
    label{font-size:11px;color:#94a3b8;font-weight:800;text-transform:uppercase;display:block;margin-bottom:-4px;margin-left:4px}
    .stock-low{color:#ef4444;font-weight:bold;animation:pulse 2s infinite}
    @keyframes pulse{0%{opacity:1}50%{opacity:0.5}100%{opacity:1}}
    .hidden{display:none}
</style>
</head>
<body class="bg-slate-50 font-sans text-slate-800">

<div class="bg-gradient-to-r from-purple-800 to-indigo-700 text-white p-5 shadow-lg flex justify-between items-center sticky top-0 z-50">
    <div>
        <h1 class="text-2xl font-black italic">GHOSTPRINT PRO</h1>
        <p class="text-[10px] uppercase opacity-70 font-bold tracking-widest">Sistema de Control 2026</p>
    </div>
    <span id="sync-status" class="bg-white/20 px-3 py-1 rounded-full text-[10px] font-bold">Iniciando...</span>
</div>

<div class="p-3 flex gap-2 flex-wrap bg-white/90 backdrop-blur shadow-sm sticky top-[72px] z-40">
    <button onclick="setView('dashboard')" class="btn text-sm">Dashboard</button>
    <button onclick="setView('ventas')" class="btn text-sm bg-indigo-600">Ventas</button>
    <button onclick="setView('cobranzas')" class="btn text-sm">Cobranzas</button>
    <button onclick="setView('compras')" class="btn text-sm">Catálogo</button>
    <button onclick="setView('gastos')" class="btn text-sm">Gastos</button>
    <button onclick="setView('inventario')" class="btn text-sm">Inventario</button>
    <button onclick="setView('reporte')" class="btn text-sm">Reporte</button>
</div>

<div id="app" class="p-4 max-w-5xl mx-auto"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI",
    authDomain: "ghost-print-contabilidad.firebaseapp.com",
    projectId: "ghost-print-contabilidad",
    storageBucket: "ghost-print-contabilidad.firebasestorage.app",
    messagingSenderId: "867057362556",
    appId: "1:867057362556:web:6bd2a461817219a4000bf9"
};

const appF = initializeApp(firebaseConfig);
const db = getFirestore(appF);
const docRef = doc(db, "sistema", "datos_principales");

// Datos base para que nunca esté vacío
window.state = {
    ventas: [], 
    gastos: [], 
    serviciosExtra: [],
    inventario: {
        "VINIL GLOSSY": {stock: 68, costo: 3.00},
        "BANNER": {stock: 175, costo: 3.60},
        "KIT DE TINTA": {stock: 400, costo: 0.45},
        "VINIL CLEAR GLOSSY BRILLANTE": {stock: 50, costo: 3.00},
        "VINIL CLEAR GLOSSY MATE": {stock: 50, costo: 3.00}
    }
};

window.view = "dashboard";
window.filtroDashboard = "total";

// Sincronización Real
onSnapshot(docRef, (snap) => {
    if (snap.exists()) {
        const data = snap.data();
        window.state.ventas = data.ventas || [];
        window.state.gastos = data.gastos || [];
        window.state.serviciosExtra = data.serviciosExtra || [];
        // Si hay inventario en Firebase, lo usamos, si no, dejamos el base
        if (data.inventario && Object.keys(data.inventario).length > 0) {
            window.state.inventario = data.inventario;
        }
        document.getElementById("sync-status").innerText = "Sincronizado ✓";
    }
    render();
});

window.save = async () => { await setDoc(docRef, window.state); };
window.setView = (v) => { window.view = v; render(); };

window.calcularTotal = () => {
    let prod = document.getElementById("producto")?.value;
    let tipo = document.getElementById("tipoCliente")?.value;
    let cant = parseFloat(document.getElementById("cantidad")?.value) || 0;
    let prec = 0;

    if (tipo === "libre") {
        document.getElementById("divPrecioLibre").classList.remove("hidden");
        prec = parseFloat(document.getElementById("precioLibreInput").value) || 0;
    } else {
        document.getElementById("divPrecioLibre").classList.add("hidden");
        if (prod && (prod.includes("VINIL") || prod.includes("BANNER"))) {
            prec = (tipo === "mayorista_lineal") ? 10 : 9;
        } else {
            let costo = window.state.inventario[prod]?.costo || 0;
            prec = costo > 0 ? costo * 2.5 : 10;
        }
    }
    document.getElementById("total").innerText = (cant * prec).toFixed(2);
};

window.render = function() {
    let app = document.getElementById("app");
    if(!app) return;
    let html = "";

    if(window.view === "dashboard"){
        let vT = window.state.ventas.reduce((a,b) => a + b.total, 0);
        let gT = window.state.gastos.reduce((a,b) => a + (b.amount || 0), 0);
        html = `<h2 class="text-xl font-bold mb-4">📊 Balance</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="card bg-green-50 text-green-700">Ventas<br><b class="text-2xl font-black">$${vT.toFixed(2)}</b></div>
            <div class="card bg-red-50 text-red-600">Gastos<br><b class="text-2xl font-black">$${gT.toFixed(2)}</b></div>
            <div class="card bg-purple-700 text-white text-center">Ganancia<br><b class="text-2xl font-black">$${(vT-gT).toFixed(2)}</b></div>
        </div>
        <div class="card"><canvas id="grafica"></canvas></div>`;
        app.innerHTML = html;
        setTimeout(() => {
            new Chart(document.getElementById("grafica"), {type:'bar', data:{labels:['Ventas','Gastos'], datasets:[{label:'$', data:[vT, gT], backgroundColor:['#10b981','#ef4444']}]}});
        }, 100);
        return;
    }

    if(window.view === "ventas"){
        let tItem = document.getElementById("tipoItem")?.value || "material";
        html = `<h2>💰 Nueva Venta</h2><div class="card">
            <label>Cliente</label><input id="cli" placeholder="Nombre">
            <div class="grid grid-cols-2 gap-2">
                <div><label>Tipo</label><select id="tipoItem" onchange="render()"><option value="material" ${tItem=='material'?'selected':''}>Material</option><option value="servicio" ${tItem=='servicio'?'selected':''}>Servicio</option></select></div>
                <div><label>Tarifa</label><select id="tipoCliente" onchange="window.calcularTotal()"><option value="mayorista_lineal">Lineal ($10)</option><option value="detal_m2">M2 ($9)</option><option value="libre">Manual</option></select></div>
            </div>
            <div id="divPrecioLibre" class="hidden"><label>Precio Unitario</label><input id="precioLibreInput" type="number" oninput="window.calcularTotal()"></div>
            <label>Item</label>
            <select id="producto" onchange="window.calcularTotal()">${(tItem=="servicio" ? ["DISEÑO","IMPRESIÓN","INSTALACION", ...window.state.serviciosExtra] : Object.keys(window.state.inventario)).map(p=>`<option value="${p}">${p}</option>`).join("")}</select>
            <label>Cantidad</label><input id="cantidad" type="number" value="1" oninput="window.calcularTotal()">
            <div class="text-center py-6 bg-slate-900 text-white rounded-2xl my-4"><p class="text-[10px] opacity-50">Total</p><b class="text-4xl">$<span id="total">0.00</span></b></div>
            <button onclick="regVenta()" class="btn w-full py-4 bg-indigo-600">REGISTRAR</button>
        </div>`;
    }

    if(window.view === "inventario"){
        html = `<h2>📦 Inventario Real</h2>` + Object.entries(window.state.inventario).map(([k,v])=>`
        <div class="card ${v.stock < 10 ? 'border-red-200' : ''}">
            <div class="flex justify-between font-bold text-purple-800"><span>${k}</span><button onclick="borrarProd('${k}')" class="text-red-400 text-xs">🗑️</button></div>
            <div class="grid grid-cols-2 gap-4 mt-2">
                <div><label>Stock</label><input id="s-${k}" value="${v.stock}" class="${v.stock < 10 ? 'stock-low' : ''}"></div>
                <div><label>Costo $</label><input id="c-${k}" value="${v.costo}"></div>
            </div>
            <button onclick="updInv('${k}')" class="btn w-full mt-2 text-xs bg-slate-800">Guardar</button>
        </div>`).join("");
    }

    if(window.view === "compras") {
        html = `<h2>⚙️ Catálogo</h2>
        <div class="card border-l-8 border-green-500"><h3>Añadir Servicio</h3><input id="nsv" placeholder="Nombre..."><button onclick="addServ()" class="btn w-full bg-green-600 mt-2">Añadir</button></div>
        <div class="card border-l-8 border-blue-500"><h3>Nuevo Material</h3><input id="nm" placeholder="Nombre"><div class="flex gap-2"><input id="ns" type="number" placeholder="Stock"><input id="nc" type="number" placeholder="Costo"></div><button onclick="addMat()" class="btn w-full bg-blue-600 mt-2">Crear</button></div>`;
    }

    if(window.view === "gastos"){
        html = `<h2>💸 Gastos</h2><div class="card"><input id="gn" placeholder="Motivo"><input id="ga" type="number" placeholder="Monto"><button onclick="regGasto()" class="btn w-full mt-2">Guardar</button></div>${window.state.gastos.slice(-5).reverse().map(g=>`<div class="card py-2 text-sm"><span>${g.name}</span> <b class="float-right text-red-500">-$${g.amount}</b></div>`).join("")}`;
    }

    if(window.view === "cobranzas"){
        html = `<h2>🧾 Cobranzas</h2>${window.state.ventas.filter(v=>!v.pagado).map(v=>`<div class="card flex justify-between"><div><b>${v.cliente}</b><br><small>$${(v.total-v.abonado).toFixed(2)} pendiente</small></div><button onclick="abonar(${v.id})" class="btn text-xs bg-indigo-500">Abonar</button></div>`).join("") || '<p class="p-4">Sin deudas.</p>'}`;
    }

    if(window.view === "reporte"){
        let vT = window.state.ventas.reduce((a,b) => a + b.total, 0);
        let gT = window.state.gastos.reduce((a,b) => a + (b.amount || 0), 0);
        let caja = window.state.ventas.reduce((a,b) => a + (b.abonado || 0), 0) - gT;
        html = `<div class="card bg-slate-900 text-white text-center py-10 rounded-3xl"><p class="text-xs opacity-60">Efectivo Real</p><h1 class="text-6xl font-black italic">$${caja.toFixed(2)}</h1></div>`;
    }

    app.innerHTML = html;
    if(window.view === "ventas") window.calcularTotal();
};

// --- ACCIONES ---
window.regVenta = async () => {
    const cli = document.getElementById("cli").value;
    const tot = parseFloat(document.getElementById("total").innerText);
    const prod = document.getElementById("producto").value;
    if(!cli || tot <= 0) return alert("Faltan datos");
    window.state.ventas.push({id:Date.now(), fecha:new Date().toLocaleDateString(), cliente:cli.toUpperCase(), producto:prod, total:tot, pagado:false, abonado:0});
    await window.save(); alert("Venta ok"); render();
};

window.updInv = async (k) => {
    window.state.inventario[k].stock = parseFloat(document.getElementById(`s-${k}`).value);
    window.state.inventario[k].costo = parseFloat(document.getElementById(`c-${k}`).value);
    await window.save(); alert("Actualizado");
};

window.borrarProd = async (k) => {
    if(confirm('¿Borrar?')) { delete window.state.inventario[k]; await window.save(); render(); }
};

window.addServ = async () => {
    let n = document.getElementById("nsv").value.toUpperCase();
    if(n){ window.state.serviciosExtra.push(n); await window.save(); render(); }
};

window.addMat = async () => {
    let n = document.getElementById("nm").value.toUpperCase();
    if(n){ window.state.inventario[n] = {stock:parseFloat(document.getElementById("ns").value)||0, costo:parseFloat(document.getElementById("nc").value)||0}; await window.save(); render(); }
};

window.regGasto = async () => {
    let n = document.getElementById("gn").value; let a = parseFloat(document.getElementById("ga").value);
    if(n&&a){ window.state.gastos.push({id:Date.now(), name:n.toUpperCase(), amount:a}); await window.save(); render(); }
};

window.abonar = async (id) => {
    let v = window.state.ventas.find(x => x.id === id);
    let m = parseFloat(prompt(`Monto (Deuda: $${(v.total-v.abonado).toFixed(2)}):`));
    if(m){ v.abonado += m; if(v.abonado >= v.total) v.pagado = true; await window.save(); render(); }
};

window.render();
</script>
</body>
</html>
