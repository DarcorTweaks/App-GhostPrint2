<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostPrint ERP v3 - Estable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background-color: #0d0d1a;
            background-image: radial-gradient(at 10% 10%, rgba(109, 40, 217, 0.2) 0px, transparent 50%), radial-gradient(at 90% 90%, rgba(79, 70, 229, 0.15) 0px, transparent 50%);
            background-attachment: fixed; background-size: cover;
            font-family: ui-sans-serif, system-ui; color: #e2e8f0; padding-bottom: 96px;
        }
        .btn { background: #6d28d9; color: white; padding: 10px 14px; border-radius: 12px; cursor: pointer; font-weight: 700; border: none; transition: 0.2s; text-transform: uppercase; font-size: 10px; }
        .card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(5px); padding: 20px; margin: 12px 0; border-radius: 20px; color: #1e293b; }
        input, select { border: 1px solid #e2e8f0; padding: 12px; margin: 8px 0; border-radius: 12px; width: 100%; background: #f8fafc; color: #1e293b; }
        label { font-size: 10px; color: #64748b; font-weight: 800; text-transform: uppercase; display: block; margin-top: 8px; }
        header { background: linear-gradient(to right, #4c1d95, #000); color: white; padding: 16px; display: flex; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
        nav { padding: 8px; display: flex; gap: 8px; overflow-x: auto; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); position: sticky; top: 72px; z-index: 40; }
    </style>
</head>
<body>

<header>
    <div>
        <h1 class="text-2xl font-black italic uppercase">GhostPrint ERP</h1>
        <p id="sync-status" class="text-[9px] font-bold text-amber-300 uppercase">Sincronizando...</p>
    </div>
</header>

<nav>
    <button onclick="setView('dashboard')" class="btn">🏠 Inicio</button>
    <button onclick="setView('ventas')" class="btn !bg-green-600">💵 Vender</button>
    <button onclick="setView('cobranzas')" class="btn !bg-amber-500">⏳ Cobros</button>
    <button onclick="setView('compras')" class="btn !bg-blue-600">📦 Compras</button>
    <button onclick="setView('config')" class="btn !bg-slate-700">⚙️ Catálogo</button>
</nav>

<div id="app" class="p-4 max-w-4xl mx-auto"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI",
    authDomain: "ghost-print-contabilidad.firebaseapp.com",
    projectId: "ghost-print-contabilidad",
    storageBucket: "ghost-print-contabilidad.firebasestorage.app",
    messagingSenderId: "867057362556",
    appId: "1:867057362556:web:6bd2a461817219a4000bf9"
};

const appF = initializeApp(firebaseConfig);
const db = getFirestore(appF);
const docRef = doc(db, "sistema", "datos_principales");

window.state = { ventas: [], gastos: [], inventario: {}, serviciosExtra: [] };
window.view = "dashboard";
let carritoVenta = [];

onSnapshot(docRef, (snap) => {
    if (snap.exists()) { 
        window.state = snap.data(); 
        document.getElementById("sync-status").innerText = "Sincronizado ✓"; 
    }
    render();
});

window.save = async () => { await setDoc(docRef, window.state); };
window.setView = (v) => { window.view = v; render(); };

window.render = function() {
    let app = document.getElementById("app");
    if(!app) return;
    let html = "";
    
    // Filtro para el mes actual
    const mesActual = new Date().getMonth();
    const ventasMes = (window.state.ventas || []).filter(v => new Date(v.id).getMonth() === mesActual);
    let totalVentas = ventasMes.reduce((a,b) => a + b.total, 0);

    if(window.view === "dashboard"){
        html = `<div class="card text-center">Ventas Abril<br><b class="text-4xl text-green-600 font-black">$${totalVentas.toFixed(2)}</b></div>`;
    }

    if(window.view === "ventas"){
        html = `<div class="card">
            <h2 class="font-black mb-4 uppercase">Facturar</h2>
            <label>Cliente</label><input id="cliV" placeholder="Nombre">
            <div class="grid grid-cols-2 gap-2">
                <div><label>Material</label><select id="pSel"><option value="">--</option>${Object.keys(window.state.inventario || {}).map(p=>`<option value="${p}">${p}</option>`).join("")}</select></div>
                <div><label>Servicio</label><select id="sSel"><option value="">--</option>${(window.state.serviciosExtra || []).map(s=>`<option value="${s}">${s}</option>`).join("")}</select></div>
            </div>
            <label>Tarifa</label>
            <select id="tCli" onchange="document.getElementById('divLibre').style.display = (this.value==='libre'?'block':'none')">
                <option value="detal">Detal ($9)</option>
                <option value="mayor">Mayor ($10)</option>
                <option value="libre">Manual / Libre</option>
            </select>
            <div id="divLibre" style="display:none">
                <label>Precio Unitario $</label><input id="pMan" type="number" value="0">
            </div>
            <label>Cantidad</label><input id="cQty" type="number" value="1">
            <button onclick="addItemCarrito()" class="btn w-full !bg-blue-600 mt-2">Añadir</button>
            <div class="mt-4">${carritoVenta.map((v,i)=>`<div class="flex justify-between border-b py-1 text-xs"><span>${v.qty}x ${v.nombre}</span><b>$${v.sub.toFixed(2)}</b></div>`).join("")}</div>
            <div class="p-3 bg-slate-800 text-white text-center font-bold mt-2 rounded-xl text-xl">TOTAL: $${carritoVenta.reduce((a,b)=>a+b.sub,0).toFixed(2)}</div>
            <button onclick="procesarV()" class="btn w-full !bg-green-600 mt-4 py-4">Procesar Factura</button>
        </div>`;
    }

    if(window.view === "cobranzas"){
        html = `<h2 class="font-bold text-white mb-2">CUENTAS POR COBRAR</h2>${(window.state.ventas || []).filter(v=>!v.pagado).reverse().map(v=>`<div class="card flex justify-between items-center border-l-4 border-amber-500"><div><b class="uppercase">${v.cliente}</b><br><small class="text-red-600 font-bold">Resta: $${(v.total-(v.abonado||0)).toFixed(2)}</small></div><button onclick="abonarV(${v.id})" class="bg-blue-600 text-white p-2 rounded text-[8px] font-bold">ABONAR</button></div>`).join("")}`;
    }

    if(window.view === "config"){
        html = `<div class="card"><label>Material</label><input id="nP"><button onclick="addC('p')" class="btn w-full">Guardar</button></div>`;
    }

    app.innerHTML = html;
};

window.addItemCarrito = () => {
    const p = document.getElementById("pSel").value;
    const s = document.getElementById("sSel").value;
    const t = document.getElementById("tCli").value;
    const q = parseFloat(document.getElementById("cQty").value) || 0;
    const item = p || s || "VENTA";
    
    let pre = 0;
    if(t === "libre"){
        pre = parseFloat(document.getElementById("pMan").value) || 0;
    } else {
        // Lógica de 9 y 10 corregida
        pre = (p) ? (t === "mayor" ? 10 : 9) : 12;
    }

    if(q > 0) {
        carritoVenta.push({ nombre: item, qty: q, sub: q * pre });
        render();
    }
};

window.procesarV = async () => {
    const c = document.getElementById("cliV").value;
    if(!c || carritoVenta.length === 0) return alert("Faltan datos");
    const total = carritoVenta.reduce((a,b)=>a+b.sub, 0);
    window.state.ventas.push({ id: Date.now(), cliente: c.toUpperCase(), total: total, abonado: 0, pagado: false, items: [...carritoVenta] });
    carritoVenta = [];
    await window.save();
    setView('dashboard');
};

window.addC = async (type) => {
    const n = document.getElementById("nP").value.toUpperCase();
    if(n) {
        if(!window.state.inventario) window.state.inventario = {};
        window.state.inventario[n] = { stock: 0, costo: 0 };
        await window.save();
        render();
    }
};

window.abonarV = async (id) => {
    let v = window.state.ventas.find(x=>x.id===id);
    let m = parseFloat(prompt("Monto abono?"));
    if(m){ 
        v.abonado = (v.abonado || 0) + m; 
        if(v.abonado >= v.total) v.pagado = true; 
        await window.save(); render(); 
    }
};

render();
</script>
</body>
</html>
