<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>GhostPrint PRO</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-100 font-sans">

<div class="bg-gradient-to-r from-purple-700 to-purple-500 text-white p-4 shadow flex justify-between">
<h1 class="text-xl font-bold">👻 GhostPrint PRO</h1>
<span id="sync-status">Conectando...</span>
</div>

<div class="p-4 flex gap-2 flex-wrap">
<button onclick="setView('dashboard')" class="btn">Dashboard</button>
<button onclick="setView('ventas')" class="btn">Ventas</button>
<button onclick="setView('cobranzas')" class="btn">Cobranzas</button>
<button onclick="setView('compras')" class="btn">Compras / Catálogo</button>
<button onclick="setView('gastos')" class="btn">Gastos</button>
<button onclick="setView('inventario')" class="btn">Inventario</button>
<button onclick="setView('reporte')" class="btn">Reporte</button>
</div>

<div id="app" class="p-6 max-w-4xl mx-auto"></div>

<style>
.btn{background:#6d28d9;color:white;padding:8px 14px;border-radius:8px;cursor:pointer;border:none}
.btn:hover{background:#5b21b6}
.card{background:white;padding:15px;margin:10px 0;border-radius:12px;box-shadow:0 4px 10px rgba(0,0,0,0.08)}
input,select{border:1px solid #ddd;padding:10px;margin:6px 0;border-radius:8px;width:100%}
label{font-size:13px;color:#555;font-weight:bold}
.alert{background:#fee2e2;color:#991b1b;padding:10px;border-radius:8px;margin-bottom:10px}
.hidden{display:none}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI",
    authDomain: "ghost-print-contabilidad.firebaseapp.com",
    projectId: "ghost-print-contabilidad",
    storageBucket: "ghost-print-contabilidad.firebasestorage.app",
    messagingSenderId: "867057362556",
    appId: "1:867057362556:web:6bd2a461817219a4000bf9"
};

const appF = initializeApp(firebaseConfig);
const db = getFirestore(appF);
const docRef = doc(db, "sistema", "datos_principales");

window.margen = 2.5;
window.SERVICIOS_BASE = ["DISEÑO,IMPRECION,INSTALACION","DISEÑO","IMPRESIÓN","DISEÑO, IMPRESIÓN","INSTALACION","POP","DESINTALACION","ROTULACION","LAMINADO","LAMINADO. IMPRESIOM","IMPRESIÓN Y CORTE","VINIL DE ROTULACION","MANO DE OBRA"];

window.state = {
    ventas:[], compras:[], gastos:[], serviciosExtra: [],
    inventario:{}
};

onSnapshot(docRef, (snap) => {
    if (snap.exists()) {
        window.state = snap.data();
        document.getElementById("sync-status").innerText = "Sincronizado ✓";
    } else { window.save(); }
    render();
});

window.save = async () => { await setDoc(docRef, window.state); };

window.view = "dashboard";
window.setView = (v) => { window.view = v; render(); };
window.obtenerServicios = () => [...window.SERVICIOS_BASE, ...(window.state.serviciosExtra || [])];

// --- LÓGICA DE PRECIOS MEJORADA ---
window.calcularTotal = () => {
    let producto=document.getElementById("producto")?.value;
    let tipoCliente=document.getElementById("tipoCliente")?.value;
    let cantidad=parseFloat(document.getElementById("cantidad")?.value)||0;
    let precio = 0;

    if(tipoCliente === "libre") {
        document.getElementById("divPrecioLibre")?.classList.remove("hidden");
        precio = parseFloat(document.getElementById("precioLibreInput").value) || 0;
    } else {
        document.getElementById("divPrecioLibre")?.classList.add("hidden");
        // Regla: Mayorista $10, Detal $12 para Viniles y Banner
        if(producto && (producto.includes("VINIL") || producto.includes("BANNER"))) {
            precio = (tipoCliente=="mayorista" ? 10 : 12);
        } else {
            let costo = window.state.inventario[producto]?.costo || 0;
            precio = costo > 0 ? costo * window.margen : 10;
        }
    }
    document.getElementById("total").innerText = (cantidad*precio).toFixed(2);
};

// --- ACCIONES DE VENTAS (EDITAR Y BORRAR) ---
window.crearVenta = async () => {
    let cliente=document.getElementById("cliente").value;
    let producto=document.getElementById("producto").value;
    let cantidad=parseFloat(document.getElementById("cantidad").value)||1;
    let total = parseFloat(document.getElementById("total").innerText);
    
    window.state.ventas.push({
        id:Date.now(), 
        fecha:new Date().toLocaleDateString(), 
        cliente: cliente.toUpperCase(), 
        producto, 
        total, 
        pagado:false, 
        abonado:0
    });
    await window.save();
};

window.borrarVenta = async (id) => {
    if(confirm("¿Seguro que quieres borrar esta venta?")) {
        window.state.ventas = window.state.ventas.filter(v => v.id !== id);
        await window.save();
    }
};

window.editarVenta = async (id) => {
    let v = window.state.ventas.find(x => x.id === id);
    let nuevoC = prompt("Nuevo nombre del cliente:", v.cliente);
    let nuevoT = prompt("Nuevo total ($):", v.total);
    if(nuevoC) v.cliente = nuevoC.toUpperCase();
    if(nuevoT) v.total = parseFloat(nuevoT);
    await window.save();
};

// --- ACCIONES DE INVENTARIO ---
window.guardarInventario = async (p) => {
    let s = parseFloat(document.getElementById("s-"+p).value);
    let c = parseFloat(document.getElementById("c-"+p).value);
    window.state.inventario[p].stock = s;
    window.state.inventario[p].costo = c;
    await window.save();
    alert("Guardado en la nube");
};

window.registrarGasto = async () => {
    let n=document.getElementById('gn').value;
    let a=parseFloat(document.getElementById('ga').value);
    if(n&&a){
        window.state.gastos.push({id:Date.now(),name:n,amount:a,fecha:new Date().toLocaleDateString()});
        await window.save();
    }
};

window.render = function() {
    let app = document.getElementById("app");
    if(!app) return;
    let html="";

    if(window.view=="dashboard"){
        let vT=window.state.ventas.reduce((a,b)=>a+b.total,0);
        let gT=window.state.gastos.reduce((a,b)=>a+b.amount,0);
        html=`<h2>📊 Dashboard</h2><div class="grid grid-cols-1 md:grid-cols-3 gap-4"><div class="card">Ventas: $${vT.toFixed(2)}</div><div class="card">Gastos: $${gT.toFixed(2)}</div><div class="card font-bold text-purple-700">Ganancia: $${(vT-gT).toFixed(2)}</div></div>`;
        app.innerHTML = html;
    }

    if(window.view=="ventas"){
        let tItem = document.getElementById("tipoItem")?.value || "material";
        html=`<h2>💰 Ventas</h2><div class="card">
            <input id="cliente" placeholder="Cliente">
            <select id="tipoItem" onchange="render()"><option value="material" ${tItem=='material'?'selected':''}>Material</option><option value="servicio" ${tItem=='servicio'?'selected':''}>Servicio</option></select>
            <select id="tipoCliente" onchange="window.calcularTotal()"><option value="detal">Detal ($12)</option><option value="mayorista">Mayorista ($10)</option><option value="libre">Precio Manual</option></select>
            <div id="divPrecioLibre" class="hidden"><input id="precioLibreInput" type="number" oninput="window.calcularTotal()" placeholder="0.00"></div>
            <select id="producto" onchange="window.calcularTotal()">${(tItem=="servicio" ? window.obtenerServicios() : Object.keys(window.state.inventario)).map(p=>`<option value="${p}">${p}</option>`).join("")}</select>
            <input id="cantidad" type="number" value="1" oninput="window.calcularTotal()">
            <div class="text-center py-2">TOTAL: <b class="text-2xl text-purple-700">$<span id="total">0.00</span></b></div>
            <button onclick="window.crearVenta()" class="btn w-full">Guardar Venta</button>
        </div>
        <h3 class="mt-4 font-bold text-gray-600 uppercase text-sm">Últimos Movimientos</h3>
        ${window.state.ventas.slice(-10).reverse().map(v=>`<div class="card flex justify-between items-center">
            <div><b>${v.cliente}</b><br><small>${v.producto}</small></div>
            <div class="flex items-center gap-2">
                <b>$${v.total.toFixed(2)}</b>
                <button onclick="window.editarVenta(${v.id})" class="text-blue-500">✏️</button>
                <button onclick="window.borrarVenta(${v.id})" class="text-red-500">🗑️</button>
            </div>
        </div>`).join("")}`;
        app.innerHTML = html; window.calcularTotal();
    }

    if(window.view=="inventario"){
        html=`<h2>📦 Inventario Real</h2>${Object.entries(window.state.inventario).map(([k,v])=>`<div class="card">
            <div class="font-bold text-purple-700 mb-2">${k}</div>
            <div class="grid grid-cols-2 gap-2">
                <div><label>Stock</label><input id="s-${k}" type="number" value="${v.stock}"></div>
                <div><label>Costo</label><input id="c-${k}" type="number" value="${v.costo}"></div>
            </div>
            <button onclick="window.guardarInventario('${k}')" class="btn w-full mt-2 text-xs">Actualizar en Nube</button>
        </div>`).join("")}`;
        app.innerHTML = html;
    }

    if(window.view=="gastos"){
        html=`<h2>💸 Gastos</h2><div class="card"><input id="gn" placeholder="Concepto"><input id="ga" type="number" placeholder="Monto"><button onclick="window.registrarGasto()" class="btn w-full">Registrar</button></div>${window.state.gastos.slice(-10).reverse().map(g=>`<div class="card flex justify-between"><span>${g.name}</span><b>-$${g.amount.toFixed(2)}</b></div>`).join("")}`;
        app.innerHTML = html;
    }

    if(window.view=="compras"){
        html=`<h2>📦 Catálogo</h2><div class="card border-l-4 border-blue-500"><h3>➕ Nuevo Material</h3><input id="nuevoMat" placeholder="Nombre"><input id="nuevoStock" type="number" placeholder="Stock Inicial"><input id="nuevoCosto" type="number" placeholder="Costo"><button onclick="let n=document.getElementById('nuevoMat').value.toUpperCase(); if(n){window.state.inventario[n]={stock:parseFloat(document.getElementById('nuevoStock').value)||0, costo:parseFloat(document.getElementById('nuevoCosto').value)||0}; window.save(); render();}" class="btn w-full mt-2 bg-blue-600">Crear Material</button></div>`;
        app.innerHTML = html;
    }

    if(window.view=="cobranzas"){
        html=`<h2>🧾 Cobranzas</h2>${window.state.ventas.filter(v=>!v.pagado).map(v=>`<div class="card flex justify-between"><div><b>${v.cliente}</b><br>Falta: $${(v.total-v.abonado).toFixed(2)}</div><button onclick="let a=parseFloat(prompt('Abono:'))||0; v.abonado+=a; if(v.abonado>=v.total)v.pagado=true; window.save();" class="btn text-xs">Abonar</button></div>`).join("") || '<div class="card">Todo al día.</div>'}`;
        app.innerHTML = html;
    }

    if(window.view=="reporte"){
        let vT=window.state.ventas.reduce((a,b)=>a+b.total,0);
        let gT=window.state.gastos.reduce((a,b)=>a+b.amount,0);
        let caja=window.state.ventas.reduce((a,b)=>a+b.abonado,0) - gT;
        html=`<h2>📊 Reporte</h2><div class="card text-center py-6"><div class="text-xs text-gray-400">EFECTIVO EN CAJA</div><div class="text-5xl font-black text-purple-700">$${caja.toFixed(2)}</div></div><div class="card">Ventas Totales: $${vT.toFixed(2)}<br>Gastos: $${gT.toFixed(2)}</div>`;
        app.innerHTML = html;
    }
};

window.render();
</script>
</body>
</html>
