<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostPrint PRO - Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-100 font-sans text-sm">

<div class="bg-gradient-to-r from-purple-700 to-purple-500 text-white p-4 shadow flex justify-between items-center">
    <h1 class="text-xl font-bold">👻 GhostPrint PRO</h1>
    <div id="status" class="text-[10px] bg-purple-800 px-2 py-1 rounded">Conectando...</div>
</div>

<div class="p-3 flex gap-2 flex-wrap justify-center bg-white shadow-sm border-b">
    <button onclick="setView('dashboard')" class="btn-nav">Inicio</button>
    <button onclick="setView('ventas')" class="btn-nav">Ventas</button>
    <button onclick="setView('cobranzas')" class="btn-nav">Cobranzas</button>
    <button onclick="setView('compras')" class="btn-nav">Compras</button>
    <button onclick="setView('inventario')" class="btn-nav">Inventario</button>
</div>

<div id="app" class="p-4 max-w-4xl mx-auto"></div>

<style>
    .btn-nav{background:#f3e8ff;color:#6d28d9;padding:6px 12px;border-radius:6px;font-weight:bold;font-size:12px;border:none}
    .btn-main{background:#6d28d9;color:white;padding:12px;border-radius:8px;width:100%;font-weight:bold;margin-top:10px;border:none}
    .card{background:white;padding:15px;margin-bottom:12px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
    input,select{border:1px solid #ddd;padding:10px;margin:4px 0;border-radius:8px;width:100%}
    label{font-size:11px;color:#666;font-weight:bold;text-transform:uppercase}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI",
    authDomain: "ghost-print-contabilidad.firebaseapp.com",
    projectId: "ghost-print-contabilidad",
    storageBucket: "ghost-print-contabilidad.firebasestorage.app",
    messagingSenderId: "867057362556",
    appId: "1:867057362556:web:6bd2a461817219a4000bf9"
};

const appF = initializeApp(firebaseConfig);
const db = getFirestore(appF);
const docRef = doc(db, "sistema", "datos_principales");

window.state = {
    ventas:[],
    compras:[],
    gastos:[],
    inventario:{
        "VINIL GLOSSY":{stock:68,costo:3},
        "BANNER":{stock:175,costo:3.6},
        "KIT DE TINTA":{stock:400,costo:0.45}
    }
};

onSnapshot(docRef, (snap) => {
    if (snap.exists()) {
        window.state = snap.data();
        document.getElementById("status").innerText = "Sincronizado ✓";
        document.getElementById("status").style.background = "#059669";
    } else {
        save();
    }
    render();
});

async function save() {
    await setDoc(docRef, window.state);
}

window.setView = (v) => { window.view = v; render(); };

window.crearVenta = async () => {
    let cli = document.getElementById("cli").value;
    let prod = document.getElementById("prod").value;
    let cant = parseFloat(document.getElementById("cant").value) || 0;
    let pre = parseFloat(document.getElementById("pre").value) || 0;
    
    if(!cli || cant <= 0) return alert("Faltan datos");

    window.state.ventas.push({
        id: Date.now(),
        fecha: new Date().toLocaleDateString(),
        cliente: cli.toUpperCase(),
        producto: prod,
        total: cant * pre,
        pagado: false
    });
    
    if(window.state.inventario[prod]) window.state.inventario[prod].stock -= cant;
    await save();
};

window.registrarCompra = async () => {
    let prod = document.getElementById("c_prod").value;
    let cant = parseFloat(document.getElementById("c_cant").value) || 0;
    if(cant <= 0) return;
    if(window.state.inventario[prod]) window.state.inventario[prod].stock += cant;
    await save();
    alert("Stock subido");
};

window.view = "dashboard";

function render() {
    let app = document.getElementById("app");
    if(!app) return;
    let html = "";

    if(window.view == "dashboard") {
        let vT = window.state.ventas.reduce((a,b)=>a+b.total,0);
        html = `<div class="card text-center">
            <label>Ventas Totales</label>
            <p class="text-3xl font-black text-purple-700">$${vT.toFixed(2)}</p>
        </div>`;
    }

    if(window.view == "ventas") {
        html = `<div class="card">
            <label>Cliente</label><input id="cli">
            <label>Producto</label><select id="prod">${Object.keys(window.state.inventario).map(p=>`<option>${p}</option>`).join("")}</select>
            <label>Cantidad</label><input id="cant" type="number">
            <label>Precio $</label><input id="pre" type="number">
            <button onclick="crearVenta()" class="btn-main">GUARDAR VENTA</button>
        </div>`;
    }

    if(window.view == "compras") {
        html = `<div class="card">
            <h2 class="font-bold mb-3">Surtir Material</h2>
            <select id="c_prod">${Object.keys(window.state.inventario).map(p=>`<option>${p}</option>`).join("")}</select>
            <input id="c_cant" type="number" placeholder="Metros que llegaron">
            <button onclick="registrarCompra()" class="btn-main">SUMAR AL INVENTARIO</button>
        </div>`;
    }

    if(window.view == "inventario") {
        html = `<h2 class="font-bold mb-4 text-center">ALMACÉN</h2>
        ${Object.entries(window.state.inventario).map(([k,v])=>`
            <div class="card flex justify-between">
                <b>${k}</b>
                <span class="text-purple-700 font-bold">${v.stock.toFixed(2)} m/unid</span>
            </div>
        `).join("")}`;
    }

    app.innerHTML = html;
}
</script>
</body>
</html>
