<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Ghost Print PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --p:#7B3FA0;--p2:#9B5FC0;--p3:#5a2878;--o:#F07020;--o2:#f59340;
  --g:#22c55e;--r:#ef4444;--y:#f59e0b;
  --ink:#0d0810;--ink2:#160e1d;--ink3:#211530;
  --bd:rgba(255,255,255,.10);--tx:#f7f3ff;--mt:rgba(247,243,255,.56);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:17px}
body{background:var(--ink);color:var(--tx);font-family:"DM Sans",sans-serif;overflow-x:hidden;min-height:100vh;line-height:1.35}
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 90% 55% at 50% -8%,rgba(123,63,160,.30),transparent 60%),radial-gradient(ellipse 55% 40% at 95% 85%,rgba(240,112,32,.08),transparent 60%)}

/* HEADER */
#hdr{position:fixed;top:0;left:0;right:0;z-index:100;height:64px;padding:0 16px;display:none;align-items:center;justify-content:space-between;background:rgba(13,8,16,.95);border-bottom:1px solid var(--bd);backdrop-filter:blur(20px)}
.logo-badge{width:42px;height:42px;border-radius:11px;background:linear-gradient(135deg,var(--p),var(--o));display:flex;align-items:center;justify-content:center;font-family:"Bebas Neue";font-size:17px;color:#fff;letter-spacing:1px;flex-shrink:0}
.logo-img{height:44px;width:auto;object-fit:contain;flex-shrink:0;filter:drop-shadow(0 2px 6px rgba(0,0,0,.4))}
.hb{font-family:"Bebas Neue";font-size:19px;letter-spacing:1.5px;line-height:1}
.hs{font-size:10px;letter-spacing:.1em;color:var(--mt);font-weight:600}
.ub{background:rgba(123,63,160,.28);border:1px solid rgba(123,63,160,.45);border-radius:999px;padding:6px 13px;font-size:12px;font-weight:800;letter-spacing:.04em;color:#fff;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dot{width:9px;height:9px;border-radius:50%;background:var(--g);box-shadow:0 0 8px var(--g);animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* NAV */
#nav{position:fixed;bottom:0;left:0;right:0;z-index:100;height:76px;background:rgba(13,8,16,.97);border-top:1px solid var(--bd);backdrop-filter:blur(20px);display:none;align-items:center;justify-content:space-around;padding-bottom:env(safe-area-inset-bottom,0)}
.nb{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;height:100%;padding:8px 2px;border:none;background:none;color:rgba(247,243,255,.38);cursor:pointer;font-family:"DM Sans";font-size:10.5px;font-weight:700}
.nb .ic{font-size:22px;transition:transform .18s cubic-bezier(.34,1.56,.64,1);display:block}
.nb.on{color:var(--p2)}
.nb.on .ic{transform:translateY(-3px) scale(1.12);filter:drop-shadow(0 0 7px var(--p))}
.nb:active{opacity:.6}

#app{position:relative;z-index:1;padding:80px 14px 96px;max-width:560px;margin:0 auto}

/* CARDS */
.c{background:rgba(28,19,42,.78);border:1px solid var(--bd);border-radius:20px;padding:20px;margin-bottom:14px;backdrop-filter:blur(8px);position:relative;overflow:hidden}
.c::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent)}
.cp{border-color:rgba(123,63,160,.35);background:rgba(123,63,160,.09)}
.co{border-color:rgba(240,112,32,.28);background:rgba(240,112,32,.06)}
.cg{border-color:rgba(34,197,94,.25);background:rgba(34,197,94,.06)}
.cr{border-color:rgba(239,68,68,.25);background:rgba(239,68,68,.06)}
.cy{border-color:rgba(245,158,11,.25);background:rgba(245,158,11,.06)}

.pt{font-family:"Bebas Neue";font-size:30px;letter-spacing:1.5px;line-height:1;margin-bottom:2px}
.ps{font-size:11px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--mt)}
.bn{font-family:"Bebas Neue";font-size:52px;letter-spacing:-1px;line-height:1}
.bns{font-family:"Bebas Neue";font-size:30px;letter-spacing:-1px;line-height:1}
.mo{font-family:"JetBrains Mono";font-size:12px;color:var(--mt)}

/* FORMS */
.lbl{font-size:12px;font-weight:800;color:var(--mt);text-transform:uppercase;letter-spacing:.06em;margin:10px 0 6px;display:block}
.inp{width:100%;background:rgba(255,255,255,.05);border:1.5px solid var(--bd);border-radius:14px;color:var(--tx);padding:16px 15px;font-size:17px;font-family:"DM Sans";font-weight:600;outline:none;transition:border-color .2s;margin:0 0 12px;-webkit-appearance:none;min-height:54px}
.inp:focus{border-color:var(--p2);background:rgba(123,63,160,.08)}
.inp::placeholder{color:rgba(247,243,255,.24);font-weight:500}
select.inp{cursor:pointer}
.hint{font-size:12px;color:var(--mt);margin:-8px 0 12px}

.btn{display:block;width:100%;padding:17px;border:none;border-radius:15px;font-family:"DM Sans";font-size:16px;font-weight:800;letter-spacing:.02em;cursor:pointer;transition:transform .12s,opacity .12s;min-height:56px}
.btn:active{transform:scale(.97);opacity:.85}
.bp{background:linear-gradient(135deg,var(--p),var(--p3));color:#fff;box-shadow:0 5px 20px rgba(123,63,160,.4)}
.bo{background:linear-gradient(135deg,var(--o),#c45010);color:#fff;box-shadow:0 5px 20px rgba(240,112,32,.32)}
.bs{background:rgba(255,255,255,.07);border:1.5px solid var(--bd);color:var(--tx)}
.bgr{background:rgba(34,197,94,.14);border:1.5px solid rgba(34,197,94,.35);color:var(--g)}
.br{background:rgba(239,68,68,.14);border:1.5px solid rgba(239,68,68,.32);color:#f87171}
.by{background:rgba(245,158,11,.14);border:1.5px solid rgba(245,158,11,.32);color:var(--y)}
.bsm{width:auto;display:inline-block;padding:10px 15px;font-size:13px;border-radius:12px;min-height:44px}

.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.g4{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
@media(min-width:420px){.g4{grid-template-columns:repeat(5,1fr)}}

.tile{background:rgba(255,255,255,.05);border:1.5px solid var(--bd);border-radius:15px;padding:15px}
.tlbl{font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--mt);margin-bottom:6px}
.prog{height:8px;background:rgba(255,255,255,.07);border-radius:999px;overflow:hidden;margin-top:10px}
.progf{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--p),var(--o));transition:width .8s ease}
.pill{display:inline-block;padding:5px 12px;border-radius:999px;font-size:10px;font-weight:800;letter-spacing:.05em;text-transform:uppercase}
.pg{background:rgba(34,197,94,.16);color:var(--g);border:1px solid rgba(34,197,94,.3)}
.pr{background:rgba(239,68,68,.16);color:#f87171;border:1px solid rgba(239,68,68,.3)}
.pp{background:rgba(123,63,160,.22);color:var(--p2);border:1px solid rgba(123,63,160,.35)}
.sr{border-radius:16px;padding:16px;margin-bottom:10px;border:1.5px solid var(--bd);background:rgba(255,255,255,.035);position:relative}
.sr.paid{border-color:rgba(34,197,94,.3);background:rgba(34,197,94,.05)}
.sr.debt{border-color:rgba(239,68,68,.25);background:rgba(239,68,68,.05)}
.dv{height:1px;background:var(--bd);margin:14px 0}
.ci{display:flex;justify-content:space-between;align-items:center;padding:13px 14px;background:rgba(255,255,255,.05);border:1.5px solid var(--bd);border-radius:13px;margin-bottom:8px;gap:10px}

.tst{position:fixed;top:74px;left:50%;transform:translateX(-50%) translateY(-8px);background:var(--ink3);border:1px solid var(--bd);color:var(--tx);padding:12px 20px;border-radius:999px;font-size:13px;font-weight:800;z-index:999;opacity:0;pointer-events:none;transition:all .22s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;max-width:92vw;box-shadow:0 10px 30px rgba(0,0,0,.4)}
.tst.on{opacity:1;transform:translateX(-50%) translateY(0)}

.ov{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:200;display:none;align-items:center;justify-content:center;padding:14px;backdrop-filter:blur(12px)}
.ov.open{display:flex}
.ob{background:var(--ink2);border:1px solid var(--bd);border-radius:22px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto}

.pdot{width:15px;height:15px;border-radius:50%;border:2px solid rgba(255,255,255,.2);transition:all .18s cubic-bezier(.34,1.56,.64,1)}
.pdot.on{background:var(--o);border-color:var(--o);box-shadow:0 0 12px var(--o);transform:scale(1.25)}
.key{width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid var(--bd);font-family:"Bebas Neue";font-size:27px;color:var(--tx);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .1s;user-select:none}
.key:active{background:var(--p);border-color:var(--p);transform:scale(.88);box-shadow:0 0 18px rgba(123,63,160,.6)}

.mc{background:rgba(255,255,255,.04);border:1.5px solid var(--bd);border-radius:15px;padding:15px;margin-bottom:9px}
.qb{background:rgba(255,255,255,.05);border:1.5px solid var(--bd);border-radius:15px;padding:16px 8px;text-align:center;cursor:pointer;transition:transform .15s cubic-bezier(.34,1.56,.64,1);min-height:78px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
.qb:active{transform:scale(.93)}
.ae{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:rgba(34,197,94,.06);border:1px solid rgba(34,197,94,.18);border-radius:11px;margin-bottom:6px}

.fa{animation:fadeUp .3s ease both}
.fa1{animation-delay:.05s}.fa2{animation-delay:.1s}.fa3{animation-delay:.14s}.fa4{animation-delay:.18s}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.ch{position:relative;height:210px}.ch2{position:relative;height:230px}
::-webkit-scrollbar{display:none}
.sec{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:14px;gap:10px}
.empty{text-align:center;padding:40px 16px;border:1.5px dashed rgba(255,255,255,.12);border-radius:16px;color:var(--mt);font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.step{display:flex;align-items:center;gap:9px;margin:2px 0 10px}
.stepn{width:26px;height:26px;border-radius:50%;background:var(--p);color:#fff;font-family:"Bebas Neue";font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.stept{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--tx)}
.badge-role{display:inline-block;padding:3px 10px;border-radius:8px;font-size:10px;font-weight:800;text-transform:uppercase;background:rgba(96,165,250,.16);color:#60a5fa;border:1px solid rgba(96,165,250,.3)}
.profitline{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--bd);font-size:14px}
.profitline:last-child{border-bottom:none}
@media(max-width:380px){#app{padding:74px 10px 92px}.bn{font-size:42px}.key{width:64px;height:64px;font-size:23px}}
</style>
</head>
<body>
<div class="tst" id="tst"></div>
<header id="hdr">
  <div style="display:flex;align-items:center;gap:11px">
    <img class="logo-img" id="hdrLogo" alt="Ghost Print">
    <div><div class="hb">Ghost Print</div><div class="hs">Studio Pro</div></div>
  </div>
  <div style="display:flex;align-items:center;gap:9px">
    <span class="ub" id="ubadge">ADMIN</span>
    <div class="dot"></div>
  </div>
</header>
<div id="app"></div>
<nav id="nav"></nav>

<div class="ov" id="recModal">
  <div class="ob">
    <div id="recContent"></div>
    <div style="padding:16px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px">
      <button class="btn bs bsm" onclick="closeRec()">Cerrar</button>
      <button class="btn bp bsm" onclick="shareWA()">WhatsApp</button>
      <button class="btn bo bsm" onclick="shareImg()">Imagen</button>
    </div>
  </div>
</div>

// ===== COSTO PROMEDIO / GANANCIA REAL =====
function avgCost(matKey){
  if(!matKey)return 0;
  var hist=(S.compras||[]).filter(function(c){return c.m===matKey;});
  var qty=hist.reduce(function(a,c){return a+n(c.c);},0);
  var cost=hist.reduce(function(a,c){return a+n(c.costo);},0);
  return qty>0?cost/qty:0;
}
function itemCost(item){
  if(!item.mat_key||item.mat_key.trim()==="")return 0;
  return avgCost(item.mat_key)*n(item.c);
}
function ventaCOGS(v){return (v.items||[]).reduce(function(a,it){return a+itemCost(it);},0);}

var VIEWS_ADMIN=["inicio","ventas","historial","cobrar","meses","inventario","compras","gastos","cuadre","reportes","catalogo","usdt","empleados","more"];
var VIEWS_EMP=["ventas","historial","more"];
function canAccess(v){return user.rol==="MAESTRO"?true:VIEWS_EMP.indexOf(v)>-1;}

window.go=function(v){
  if(!unlocked)return;
  if(!canAccess(v))v="ventas";
  view=v;
  buildNav();
  render();
};

window.pressKey=function(d){if(pinBuf.length<4){pinBuf+=d;updDots();if(pinBuf.length===4)setTimeout(checkPin,180);}};
window.delKey=function(){pinBuf=pinBuf.slice(0,-1);updDots();};
function updDots(){document.querySelectorAll(".pdot").forEach(function(d,i){d.classList.toggle("on",i<pinBuf.length);});}
function checkPin(){
  if(pinBuf===MASTER){user={nombre:"ADMIN",rol:"MAESTRO"};unlock();return;}
  var emp=(S.empleados||DEFAULT_EMP).find(function(w){return w.pin===pinBuf;});
  if(emp){user={nombre:emp.nombre,rol:"VENDEDOR"};unlock();}
  else{pinBuf="";updDots();toast("PIN INCORRECTO","#f87171");}
}
function unlock(){
  unlocked=true;
  $("hdr").style.display="flex";$("nav").style.display="flex";
  $("ubadge").textContent=user.nombre;
  view=user.rol==="MAESTRO"?"inicio":"ventas";
  buildNav();render();toast("Bienvenido, "+user.nombre,"#22c55e");
}
window.logout=function(){if(confirm("Cerrar sesion?")){unlocked=false;pinBuf="";$("hdr").style.display="none";$("nav").style.display="none";render();}};

  nav.innerHTML=items.map(function(it){return '<button class="nb'+(view===it.v?' on':'')+'" id="n-'+it.v+'" onclick="go(\''+it.v+'\')"><span class="ic">'+it.ic+'</span>'+it.t+'</button>';}).join("");
}

// ===== ESTADISTICAS MENSUALES (con ganancia real) =====
function mStats(){
  var months={};
  function get(m){if(!months[m])months[m]={facturado:0,cobrado:0,cogs:0,gastos:0,deuda:0,tickets:0};return months[m];}
  (S.ventas||[]).forEach(function(v){
    var m=(v.fecha||"").slice(0,7)||"SIN FECHA";var r=get(m);
    r.facturado+=n(v.total);r.cobrado+=n(v.abono);r.deuda+=sDebt(v);r.tickets++;r.cogs+=ventaCOGS(v);
  });
  (S.gastos||[]).forEach(function(g){
    var m=(g.fecha||"").slice(0,7)||"SIN FECHA";get(m).gastos+=n(g.monto);
  });
  Object.values(months).forEach(function(r){r.gananciaBruta=r.facturado-r.cogs;r.gananciaReal=r.cobrado-r.cogs-r.gastos;});
  return Object.entries(months).sort(function(a,b){return b[0].localeCompare(a[0]);});
}

window.saveVenta=async function(){
  var cli=($("vCli")&&$("vCli").value||"").trim().toUpperCase();
  if(!cli){toast("Ingresa el nombre del cliente","#f87171");return;}
  if(!cart.length){toast("El carrito esta vacio","#f87171");return;}
  var tot=cart.reduce(function(a,i){return a+n(i.p);},0);
  var abonoRaw=$("vAbono")&&$("vAbono").value;
  var abono=abonoRaw===""||abonoRaw===undefined?tot:Math.min(n(abonoRaw),tot);
  var fecha=$("vDate")&&$("vDate").value||today();
  var metodo=$("vMetodo")&&$("vMetodo").value||"EFECTIVO";
  var wha=$("vWha")&&$("vWha").value||"";
  var falt=cart.filter(function(i){return i.mat_key&&i.mat_key.trim()!==""&&S.inventario[i.mat_key]&&n(S.inventario[i.mat_key].stock)<n(i.c);});
  if(falt.length){var lst=falt.map(function(i){return i.mat_key+": stock "+n(S.inventario[i.mat_key].stock).toFixed(1)+", necesitas "+n(i.c).toFixed(1);}).join("\n");if(!confirm("Stock insuficiente:\n\n"+lst+"\n\nRegistrar igual?"))return;}
  cart.forEach(function(item){if(item.mat_key&&item.mat_key.trim()!==""&&S.inventario[item.mat_key]){S.inventario[item.mat_key].stock=n(S.inventario[item.mat_key].stock)-n(item.c);}});
  var hAb=abono>0?[{fecha:fecha,monto:abono,nota:"Abono inicial"}]:[];
  S.ventas.push({id:Date.now(),cliente:cli,vendedor:user.nombre,total:tot,abono:abono,historialAbonos:hAb,fecha:fecha,items:cart.slice(),metodoPago:metodo,whatsapp:wha});
  cart=[];await sync();toast("Venta registrada","#22c55e");
};

window.delVenta=async function(id){var v=S.ventas.find(function(x){return x.id===id;});if(!v)return;if(confirm("Borrar venta y restaurar stock?")){(v.items||[]).forEach(function(item){if(item.mat_key&&item.mat_key.trim()!==""&&S.inventario[item.mat_key]){S.inventario[item.mat_key].stock=n(S.inventario[item.mat_key].stock)+n(item.c);}});S.ventas=S.ventas.filter(function(x){return x.id!==id;});await sync();toast("Venta eliminada y stock restaurado");}};
window.saveCompra=async function(){var m=$("cMat")&&$("cMat").value;var cant=n($("cCant")&&$("cCant").value);var costo=n($("cCosto")&&$("cCosto").value);if(!m){toast("Selecciona material","#f87171");return;}if(!cant){toast("Ingresa cantidad","#f87171");return;}S.inventario[m].stock=n(S.inventario[m].stock)+cant;if($("cDetal")&&$("cDetal").value)S.inventario[m].precioDetal=n($("cDetal").value);if($("cMayor")&&$("cMayor").value)S.inventario[m].precioMayor=n($("cMayor").value);S.compras.push({m:m,c:cant,costo:costo,f:new Date().toISOString()});await sync();toast("Stock cargado","#22c55e");};
window.saveGasto=async function(){var monto=n($("gMonto")&&$("gMonto").value);var desc=($("gDesc")&&$("gDesc").value||"").toUpperCase();if(!monto){toast("Ingresa el monto","#f87171");return;}S.gastos.push({id:Date.now(),cat:$("gCat")&&$("gCat").value||"OTROS",monto:monto,desc:desc,fecha:$("gDate")&&$("gDate").value||today()});await sync();toast("Gasto registrado");};
window.delGasto=async function(id){if(confirm("Eliminar gasto?")){S.gastos=S.gastos.filter(function(g){return g.id!==id;});await sync();}};
window.merma=async function(nm){var cant=prompt("Merma de "+nm+". Cuanto descontar?");if(!cant)return;var v=n(String(cant).replace(",","."));if(!v||isNaN(v)){toast("Valor invalido","#f87171");return;}S.inventario[nm].stock=n(S.inventario[nm].stock)-v;await sync();toast("Merma registrada");};
window.editStk=async function(nm){var nv=prompt("Stock actual: "+n(S.inventario[nm].stock).toFixed(1)+"\nNuevo valor:");if(nv===null)return;S.inventario[nm].stock=n(String(nv).replace(",","."));await sync();toast("Stock actualizado");};
window.delMat=async function(nm){if(confirm("Borrar "+nm+"?")){delete S.inventario[nm];await sync();}};
window.crearMat=async function(){var nm=($("nMat")&&$("nMat").value||"").trim().toUpperCase();if(!nm){toast("Ingresa el nombre","#f87171");return;}S.inventario[nm]={stock:n($("nStock")&&$("nStock").value),precioDetal:n($("nDetal")&&$("nDetal").value),precioMayor:n($("nMayor")&&$("nMayor").value)};await sync();toast("Material creado","#22c55e");};
window.crearServicio=async function(){var nm=($("nServ")&&$("nServ").value||"").trim().toUpperCase();if(!nm){toast("Ingresa el nombre","#f87171");return;}if(!S.servicios)S.servicios=[];if(!S.servicios.includes(nm)){S.servicios.push(nm);await sync();toast("Servicio creado","#22c55e");}else toast("Ya existe");};
window.delServicio=async function(idx){if(confirm("Borrar servicio?")){S.servicios=(S.servicios||[]).filter(function(_,i){return i!==idx;});await sync();}};
window.comprarUSDT=async function(){var bs=n(prompt("Bolivares enviados:"));if(!bs)return;var usdt=n(prompt("USDT recibidos:"));if(!usdt)return;S.comprasUSDT.push({id:Date.now(),fecha:today(),bs:bs,usdt:usdt,usdGastado:bs/(S.tasaBCV||1)});await sync();toast("USDT registrado","#22c55e");};
window.delUSDT=async function(idx){if(confirm("Borrar?")){S.comprasUSDT.splice(idx,1);await sync();}};
window.cambiarMeta=async function(){var m=prompt("Meta mensual $:",S.metaMensual||3000);if(m!==null){S.metaMensual=n(m);await sync();}};
window.cambiarTasa=async function(){var t=prompt("Tasa BCV (Bs. por USD):",S.tasaBCV||0);if(t!==null){S.tasaBCV=n(t);await sync();}};
window.syncBCV=async function(){try{toast("Sincronizando...");var r=await fetch("https://ve.dolarapi.com/v1/dolares/oficial");var d=await r.json();if(d&&d.promedio){S.tasaBCV=n(d.promedio);await sync();toast("BCV: Bs. "+S.tasaBCV.toFixed(2),"#22c55e");}else toast("Sin datos","#f87171");}catch(e){toast("Error BCV","#f87171");}};

// EMPLEADOS
window.crearEmp=async function(){
  var nom=($("eNom")&&$("eNom").value||"").trim().toUpperCase();
  var pin=($("ePin")&&$("ePin").value||"").trim();
  if(!nom){toast("Ingresa el nombre","#f87171");return;}
  if(!/^[0-9]{4}$/.test(pin)){toast("El PIN debe tener 4 numeros","#f87171");return;}
  if(pin===MASTER){toast("Ese PIN esta reservado","#f87171");return;}
  if(!S.empleados)S.empleados=[];
  if(S.empleados.some(function(e){return e.pin===pin;})){toast("Ese PIN ya esta en uso","#f87171");return;}
  S.empleados.push({id:Date.now(),nombre:nom,pin:pin});
  await sync();toast("Empleado agregado","#22c55e");
  if($("eNom"))$("eNom").value="";if($("ePin"))$("ePin").value="";
};
window.editEmp=async function(id){var e=(S.empleados||[]).find(function(x){return x.id===id;});if(!e)return;var nom=prompt("Nombre:",e.nombre);if(nom===null)return;var pin=prompt("PIN (4 digitos):",e.pin);if(pin===null)return;pin=pin.trim();if(!/^[0-9]{4}$/.test(pin)){toast("PIN invalido","#f87171");return;}e.nombre=nom.trim().toUpperCase();e.pin=pin;await sync();toast("Actualizado","#22c55e");};
window.delEmp=async function(id){if(confirm("Quitar este acceso?")){S.empleados=(S.empleados||[]).filter(function(e){return e.id!==id;});await sync();toast("Empleado eliminado");}};

// ===== RECIBO =====
window.showRec=function(id){
  var v=S.ventas.find(function(x){return x.id===id;});if(!v)return;
  recId=id;var tasa=S.tasaBCV||0;var deuda=sDebt(v);
  var totalBs=(n(v.total)*tasa).toLocaleString("es-VE",{minimumFractionDigits:2});
  var iH=(v.items||[]).map(function(it){return '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;padding:9px 0;border-bottom:1px solid #eee"><div style="flex:1"><div style="font-weight:800;font-size:12px">'+safe(it.concepto||"TRABAJO")+'</div><div style="font-size:10px;color:#666;margin-top:1px">'+safe(it.m||it.mat_key||"LIBRE")+' - Cant: '+n(it.c).toFixed(1)+'</div></div><div style="font-weight:900;font-size:13px;flex-shrink:0">$'+money(it.p)+'</div></div>';}).join("");
  $("recContent").innerHTML='<div style="background:#fff;color:#111;font-family:DM Sans,sans-serif">'+
    '<div style="background:#7B3FA0;padding:17px 19px;display:flex;align-items:center;gap:12px">'+
    '<img src="'+LOGO+'" alt="Ghost Print" style="height:52px;width:auto;flex-shrink:0;object-fit:contain">'+
    '<div><div style="font-weight:900;font-size:18px;letter-spacing:1.2px;color:#fff">GHOST PRINT</div><div style="font-size:9px;color:rgba(255,255,255,.65);text-transform:uppercase;letter-spacing:.15em">Publicidad & Soluciones Graficas</div></div></div>'+
    '<div style="background:#F07020;padding:8px;text-align:center"><div style="font-size:12px;font-weight:900;letter-spacing:.15em;color:#fff">RECIBO</div></div>'+
    '<div style="padding:18px 19px">'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px;font-size:11px">'+
    '<div><div style="color:#888;font-size:9px;font-weight:800;text-transform:uppercase">Cliente</div><div style="font-weight:800;margin-top:2px">'+safe(v.cliente)+'</div></div>'+
    '<div><div style="color:#888;font-size:9px;font-weight:800;text-transform:uppercase">Fecha</div><div style="font-weight:700;margin-top:2px">'+v.fecha+'</div></div>'+
    '<div><div style="color:#888;font-size:9px;font-weight:800;text-transform:uppercase">Pago</div><div style="font-weight:700;margin-top:2px">'+(v.metodoPago||"CONTADO")+'</div></div>'+
    '<div><div style="color:#888;font-size:9px;font-weight:800;text-transform:uppercase">Vendedor</div><div style="font-weight:700;margin-top:2px">'+(v.vendedor||"ADMIN")+'</div></div>'+
    '</div>'+
    '<div style="border-top:2px solid #111;padding-top:11px;margin-bottom:11px">'+iH+'</div>'+
    '<div style="display:flex;justify-content:space-between;font-weight:800;font-size:16px;padding:9px 0;border-top:2px solid #111"><span>TOTAL</span><span>$'+money(v.total)+'</span></div>'+
    '<div style="display:flex;justify-content:space-between;font-size:12px;color:#444;padding:4px 0"><span>Abonado</span><span>$'+money(v.abono)+'</span></div>'+
    (deuda>0.01?'<div style="display:flex;justify-content:space-between;font-size:13px;font-weight:900;color:#dc2626;padding:4px 0"><span>PENDIENTE</span><span>$'+money(deuda)+'</span></div>':"")+
    '<div style="margin-top:12px;background:#f8f8f8;border:1px solid #e5e5e5;padding:10px;border-radius:9px;text-align:center">'+
    '<div style="font-size:10px;font-weight:700;color:#888;text-transform:uppercase">Equivalente en Bolivares</div>'+
    '<div style="font-size:16px;font-weight:900;color:#111;margin-top:4px">Bs. '+totalBs+'</div>'+
    '<div style="font-size:9px;color:#888;margin-top:2px">Tasa: '+tasa.toFixed(2)+'</div></div>'+
    '<div style="margin-top:18px;border-top:1px dashed #ccc;padding-top:14px"><div style="width:58%;height:1px;background:#111;margin:30px 0 4px"></div><div style="font-size:10px;color:#888">Firma / Sello del cliente</div></div>'+
    '<div style="text-align:center;margin-top:14px;font-size:10px;color:#888;font-style:italic">Gracias por su confianza! - Ghost Print</div>'+
    '</div></div>';
  $("recModal").classList.add("open");
};
window.closeRec=function(){$("recModal").classList.remove("open");};
window.shareWA=function(){var txt=$("recContent").innerText;window.open("https://wa.me/?text="+encodeURIComponent("*GHOST PRINT - RECIBO*\n"+"-".repeat(26)+"\n\n"+txt+"\n\nGracias por su confianza!"));};

function loadImg(src){return new Promise(function(res,rej){var img=new Image();img.onload=function(){res(img);};img.onerror=rej;img.src=src;});}

window.shareImg=async function(){
  var v=S.ventas.find(function(x){return x.id===recId;});if(!v){toast("Abre un recibo primero","#f87171");return;}
  var W=760,rowH=56,H=Math.max(960,720+((v.items||[]).length*rowH));
  var cv=document.createElement("canvas");cv.width=W;cv.height=H;
  var c=cv.getContext("2d");
  c.fillStyle="#fff";c.fillRect(0,0,W,H);
  c.fillStyle="#7B3FA0";c.fillRect(0,0,W,90);
  try{var li=await loadImg(LOGO);var lh=64,lw=lh*(li.width/li.height);c.drawImage(li,26,13,lw,lh);}catch(e){c.fillStyle="#F07020";c.fillRect(18,20,50,50);c.fillStyle="#fff";c.font="bold 20px Arial";c.fillText("GP",30,52);}
  c.fillStyle="#fff";c.font="bold 26px Arial";c.fillText("GHOST PRINT",132,44);
  c.font="12px Arial";c.fillStyle="rgba(255,255,255,.7)";c.fillText("Publicidad & Soluciones Graficas",132,64);
  c.fillStyle="#F07020";c.fillRect(0,90,W,35);
  c.fillStyle="#fff";c.font="bold 14px Arial";var bt="RECIBO";c.fillText(bt,(W-c.measureText(bt).width)/2,114);
  c.fillStyle="#111";c.font="bold 13px Arial";
  c.fillText("CLIENTE: "+String(v.cliente).toUpperCase(),28,152);c.fillText("FECHA: "+(v.fecha||""),28,174);
  c.fillText("PAGO: "+(v.metodoPago||"CONTADO"),28,196);c.fillText("VENDEDOR: "+(v.vendedor||"ADMIN"),400,152);
  c.strokeStyle="#ddd";c.lineWidth=1;c.beginPath();c.moveTo(28,212);c.lineTo(W-28,212);c.stroke();
  var y=242;
  (v.items||[]).forEach(function(it){c.fillStyle="#111";c.font="bold 13px Arial";c.fillText(String(it.concepto||"TRABAJO").slice(0,54),32,y);c.fillStyle="#555";c.font="11px Arial";c.fillText(String(it.m||it.mat_key||"LIBRE")+" - Cant: "+n(it.c).toFixed(1),32,y+17);c.fillStyle="#111";c.font="bold 16px Arial";c.fillText("$"+money(it.p),W-106,y);c.strokeStyle="#eee";c.lineWidth=1;c.beginPath();c.moveTo(28,y+29);c.lineTo(W-28,y+29);c.stroke();y+=rowH;});
  var ty=y+18;c.fillStyle="#7B3FA0";c.fillRect(28,ty,W-56,34);c.fillStyle="#fff";c.font="bold 18px Arial";c.fillText("TOTAL: $"+money(v.total),36,ty+23);
  c.fillStyle="#555";c.font="13px Arial";c.fillText("Abonado: $"+money(v.abono),36,ty+56);
  var deuda=sDebt(v);if(deuda>0.01){c.fillStyle="#dc2626";c.font="bold 14px Arial";c.fillText("PENDIENTE: $"+money(deuda),36,ty+80);}
  var bsY=ty+106;c.fillStyle="#f8f8f8";c.fillRect(28,bsY,W-56,48);c.strokeStyle="#e0d0f0";c.strokeRect(28,bsY,W-56,48);
  c.fillStyle="#888";c.font="10px Arial";var bsLbl="Equivalente en Bolivares";c.fillText(bsLbl,(W-c.measureText(bsLbl).width)/2,bsY+15);
  var bsVal="Bs. "+(n(v.total)*(S.tasaBCV||0)).toLocaleString("es-VE",{minimumFractionDigits:2});c.fillStyle="#111";c.font="bold 18px Arial";c.fillText(bsVal,(W-c.measureText(bsVal).width)/2,bsY+36);
  c.fillStyle="#7B3FA0";c.fillRect(0,H-32,W,32);c.fillStyle="rgba(255,255,255,.8)";c.font="11px Arial";var ft="Gracias por su confianza! - Ghost Print";c.fillText(ft,(W-c.measureText(ft).width)/2,H-9);
  var blob=await new Promise(function(res){cv.toBlob(res,"image/png",0.96);});
  var file=new File([blob],"RECIBO_GP_"+v.id+".png",{type:"image/png"});
  try{if(navigator.canShare&&navigator.canShare({files:[file]})){await navigator.share({files:[file],title:"Recibo Ghost Print"});return;}throw 0;}
  catch(e){var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=file.name;a.click();URL.revokeObjectURL(a.href);toast("Imagen descargada");}
};

window.exportBK=function(){var a=document.createElement("a");a.href="data:text/json;charset=utf-8,"+encodeURIComponent(JSON.stringify(S));a.download="GHOSTPRINT_"+today()+".json";document.body.appendChild(a);a.click();a.remove();toast("Backup descargado","#22c55e");};
window.importBK=async function(ev){var file=ev.target.files&&ev.target.files[0];if(!file)return;try{var data=JSON.parse(await file.text());if(!data||!Array.isArray(data.ventas)){toast("Backup invalido","#f87171");return;}if(confirm("Restaurar? Se reemplazaran los datos actuales.")){S=norm(data);await sync();toast("Backup restaurado","#22c55e");}}catch(e){toast("Error al leer el archivo","#f87171");}finally{ev.target.value="";}};

// ===== GRAFICOS =====
function initDC(rows){var ctx=$("dChart");if(!ctx)return;if(charts.d){charts.d.destroy();charts.d=null;}charts.d=new Chart(ctx,{type:"bar",data:{labels:rows.map(function(e){return e[0];}),datasets:[{label:"Cobrado",data:rows.map(function(e){return e[1].cobrado;}),backgroundColor:"rgba(34,197,94,.6)",borderColor:"#22c55e",borderWidth:1,borderRadius:5},{label:"Ganancia real",data:rows.map(function(e){return e[1].gananciaReal;}),backgroundColor:"rgba(123,63,160,.55)",borderColor:"#9B5FC0",borderWidth:1,borderRadius:5},{label:"Gastos",data:rows.map(function(e){return e[1].gastos;}),backgroundColor:"rgba(239,68,68,.5)",borderColor:"#ef4444",borderWidth:1,borderRadius:5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:"rgba(247,243,255,.7)",boxWidth:10,font:{size:10,weight:"bold"}}}},scales:{x:{ticks:{color:"rgba(247,243,255,.45)",font:{size:9}},grid:{display:false}},y:{ticks:{color:"rgba(247,243,255,.45)",font:{size:9},callback:function(v){return "$"+money(v);}},grid:{color:"rgba(255,255,255,.05)"}}}}})}
function initRC(rows){var ctx=$("rChart");if(!ctx)return;if(charts.r){charts.r.destroy();charts.r=null;}charts.r=new Chart(ctx,{type:"bar",data:{labels:rows.map(function(e){return e[0];}),datasets:[{label:"Ganancia real",data:rows.map(function(e){return e[1].gananciaReal;}),backgroundColor:"rgba(123,63,160,.55)",borderColor:"#9B5FC0",borderWidth:1,borderRadius:4},{label:"Costo materiales",data:rows.map(function(e){return e[1].cogs;}),backgroundColor:"rgba(245,158,11,.5)",borderColor:"#f59e0b",borderWidth:1,borderRadius:4},{label:"Gastos",data:rows.map(function(e){return e[1].gastos;}),backgroundColor:"rgba(239,68,68,.5)",borderColor:"#ef4444",borderWidth:1,borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:"rgba(247,243,255,.7)",boxWidth:10,font:{size:10,weight:"bold"}}}},scales:{x:{ticks:{color:"rgba(247,243,255,.45)",font:{size:9}},grid:{display:false}},y:{ticks:{color:"rgba(247,243,255,.45)",font:{size:9},callback:function(v){return "$"+money(v);}},grid:{color:"rgba(255,255,255,.05)"}}}}})}

if($("hdrLogo"))$("hdrLogo").src=LOGO;
render();
</script>
