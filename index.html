<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostPrint ESTABLE v13.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #05050a; color: #e2e8f0; font-family: 'Inter', sans-serif; padding-bottom: 60px; }
        header { background: #1e1e2f; padding: 15px; border-bottom: 3px solid #6d28d9; }
        nav { background: #11111d; display: flex; gap: 8px; overflow-x: auto; padding: 12px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #334155; }
        .btn-nav { background: #26263d; color: #94a3b8; padding: 10px 14px; border-radius: 12px; font-size: 10px; font-weight: 800; white-space: nowrap; cursor: pointer; }
        .active { background: #6d28d9 !important; color: white !important; }
        .card-pro { background: #161625; border: 1px solid #2d2d44; border-radius: 20px; padding: 18px; margin-bottom: 12px; }
        input, select { background: #0a0a14; border: 1px solid #334155; color: white; padding: 12px; border-radius: 12px; width: 100%; margin: 5px 0; font-weight: 700; }
        .btn-main { background: linear-gradient(to right, #6d28d9, #4c1d95); color: white; padding: 16px; border-radius: 16px; width: 100%; font-weight: 900; text-transform: uppercase; cursor: pointer; border: none; }
    </style>
</head>
<body>

<header class="flex justify-between items-center">
    <div>
        <h1 class="text-xl font-black italic text-purple-400 tracking-tighter uppercase">GhostPrint PRO</h1>
        <p class="text-[8px] font-bold opacity-50">VERSION ESTABLE v13.1</p>
    </div>
    <div class="bg-black/40 px-3 py-1 rounded-full border border-white/5 flex items-center gap-2">
        <div id="dot" class="w-2 h-2 rounded-full bg-green-500"></div>
        <span id="st-txt" class="text-[9px] font-black uppercase">Online</span>
    </div>
</header>

<nav>
    <div onclick="go('dash')" class="btn-nav active" id="n-dash">🏠 INICIO</div>
    <div onclick="go('ventas')" class="btn-nav" id="n-ventas">💵 VENTAS</div>
    <div onclick="go('reportes')" class="btn-nav" id="n-reportes">📊 REPORTES</div>
    <div onclick="go('stock')" class="btn-nav" id="n-stock">📦 STOCK</div>
    <div onclick="go('gastos')" class="btn-nav" id="n-gastos">📉 GASTOS</div>
    <div onclick="go('cobros')" class="btn-nav" id="n-cobros">⏳ COBROS</div>
    <div onclick="go('config')" class="btn-nav" id="n-config">⚙️ CONFIG</div>
</nav>

<div id="app" class="p-4 max-w-xl mx-auto"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    // 1. CONFIGURACIÓN
    const firebaseConfig = {
        apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI",
        authDomain: "ghost-print-contabilidad.firebaseapp.com",
        projectId: "ghost-print-contabilidad",
        storageBucket: "ghost-print-contabilidad.firebasestorage.app",
        messagingSenderId: "867057362556",
        appId: "1:867057362556:web:6bd2a461817219a4000bf9"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const docRef = db.collection("sistema").doc("datos_principales");

    // 2. ESTADO GLOBAL
    window.state = JSON.parse(localStorage.getItem('ghost_final_cache')) || { ventas: [], gastos: [], inventario: {}, serviciosExtra: [], comprasInversion: [] };
    window.vista = "dash";
    let carrito = [];

    // 3. FUNCIONES DE NAVEGACIÓN
    window.go = function(v) {
        window.vista = v;
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
        const activeBtn = document.getElementById('n-' + v);
        if(activeBtn) activeBtn.classList.add('active');
        render();
    };

    // 4. GUARDADO
    window.push = async function() {
        localStorage.setItem('ghost_final_cache', JSON.stringify(window.state));
        try {
            await docRef.set(window.state);
            document.getElementById('st-txt').innerText = "Sincronizado";
        } catch(e) {
            document.getElementById('st-txt').innerText = "Modo Local";
        }
    };

    // 5. ESCUCHA REALTIME
    docRef.onSnapshot(snap => {
        if(snap.exists) {
            window.state = snap.data();
            localStorage.setItem('ghost_final_cache', JSON.stringify(window.state));
            render();
        }
    });

    // 6. RENDERIZADO PRINCIPAL
    window.render = function() {
        const app = document.getElementById("app");
        const mesActual = new Date().getMonth();
        let html = "";

        if(window.vista === "dash") {
            let vM = (window.state.ventas || []).filter(v => new Date(v.id).getMonth() === mesActual);
            let gM = (window.state.gastos || []).filter(g => new Date(g.id).getMonth() === mesActual);
            let cM = (window.state.comprasInversion || []).filter(c => new Date(c.id).getMonth() === mesActual);
            let tV = vM.reduce((a,b)=>a+(b.total||0),0);
            let tG = gM.reduce((a,b)=>a+(b.amount||0),0);
            let tI = cM.reduce((a,b)=>a+(b.amount||0),0);

            html = `
            <div class="card-pro border-l-4 border-purple-500">
                <p class="text-[9px] font-black text-purple-400 uppercase">Balance del Mes</p>
                <h2 class="text-5xl font-black italic">$${(tV - tG - tI).toFixed(2)}</h2>
            </div>
            <div class="grid grid-cols-1 gap-2">
                <div class="bg-green-900/20 p-4 rounded-2xl flex justify-between"><span>Ventas</span><b class="text-green-400">$${tV.toFixed(2)}</b></div>
                <div class="bg-red-900/20 p-4 rounded-2xl flex justify-between"><span>Gastos</span><b class="text-red-400">-$${tG.toFixed(2)}</b></div>
            </div>`;
        }

        if(window.vista === "ventas") {
            html = `<div class="card-pro">
                <h2 class="text-lg font-black text-purple-400 italic mb-4">NUEVA VENTA</h2>
                <input type="date" id="fV" value="${new Date().toISOString().split('T')[0]}">
                <input id="cli" placeholder="CLIENTE">
                <input id="tel" type="number" placeholder="WHATSAPP">
                <div class="bg-white/5 p-4 rounded-xl mt-3 border border-white/10">
                    <select id="pS"><option value="">Material...</option>${Object.keys(window.state.inventario || {}).map(p=>`<option value="${p}">${p}</option>`).join("")}</select>
                    <select id="tC" onchange="document.getElementById('pL').style.display=(this.value==='libre'?'block':'none')">
                        <option value="detal">DETAL ($9)</option><option value="mayor">MAYOR ($10)</option><option value="libre">PRECIO LIBRE</option>
                    </select>
                    <input id="pL" style="display:none" type="number" placeholder="Monto $">
                    <button onclick="addCar()" class="btn-main !p-3 mt-2">+ AÑADIR PRODUCTO</button>
                </div>
                <div id="lCar" class="mt-4 space-y-2"></div>
                <div id="tVdisp" class="text-2xl font-black text-center my-4 italic">TOTAL: $0.00</div>
                <button onclick="saveVenta()" class="btn-main">GUARDAR TODO</button>
            </div>`;
        }

        if(window.vista === "stock") {
            html = `<div class="card-pro">
                <h2 class="text-lg font-black text-blue-400 mb-3">STOCK</h2>
                <select id="mC">${Object.keys(window.state.inventario || {}).map(p=>`<option value="${p}">${p}</option>`).join("")}</select>
                <div class="grid grid-cols-2 gap-2">
                    <input id="qC" type="number" placeholder="Metros"><input id="pM" type="number" placeholder="$/m">
                </div>
                <button onclick="saveStock()" class="btn-main !from-blue-600 !to-blue-800 mt-2">CARGAR COMPRA</button>
            </div>
            <div class="grid grid-cols-2 gap-2">
                ${Object.entries(window.state.inventario || {}).map(([n, i])=>`<div class="card-pro text-center">
                    <p class="text-[8px] font-black opacity-50 uppercase">${n}</p>
                    <h4 class="text-2xl font-black">${(i.stock || 0).toFixed(2)}m</h4>
                </div>`).join("")}
            </div>`;
        }

        if(window.vista === "gastos") {
            html = `<div class="card-pro"><h2 class="text-lg font-black text-red-500 mb-3 uppercase">Gastos</h2>
                <input id="gN" placeholder="Concepto"><input id="gM" type="number" placeholder="Monto $">
                <button onclick="saveGasto()" class="btn-main !from-red-600 !to-red-800 mt-2">REGISTRAR GASTO</button></div>`;
        }

        if(window.vista === "config") {
            html = `<div class="card-pro">
                <h2 class="text-lg font-black text-slate-400 mb-4 uppercase">Configuración</h2>
                <input id="nP" placeholder="Nombre de nuevo material">
                <button onclick="addMaterial()" class="btn-main !from-slate-600 !to-slate-800 mt-2">AÑADIR MATERIAL</button>
            </div>`;
        }

        app.innerHTML = html;
    };

    // 7. LÓGICA DE BOTONES
    window.addCar = function() {
        let p = document.getElementById("pS").value, t = document.getElementById("tC").value, pre = (t==="detal")?9:(t==="mayor")?10:parseFloat(document.getElementById("pL").value)||0;
        if(p) carrito.push({ item: p, pre: pre });
        document.getElementById("lCar").innerHTML = carrito.map((c, i) => `<div class="bg-white/5 p-2 rounded-lg flex justify-between text-xs"><span>${c.item}</span><b>$${c.pre}</b></div>`).join("");
        document.getElementById("tVdisp").innerText = "TOTAL: $" + carrito.reduce((a,b)=>a+b.pre,0).toFixed(2);
    };

    window.saveVenta = async function() {
        let cli = document.getElementById("cli").value, tel = document.getElementById("tel").value, fec = document.getElementById("fV").value;
        if(!cli || !carrito.length) return alert("Faltan datos");
        let tot = carrito.reduce((a,b)=>a+b.pre,0);
        carrito.forEach(c => { if(window.state.inventario[c.item]) window.state.inventario[c.item].stock -= 1; });
        window.state.ventas.push({ id: new Date(fec+"T12:00:00").getTime(), cliente: cli.toUpperCase(), telefono: tel, total: tot, pagado: false, abonado: 0 });
        await window.push(); carrito = []; window.go('dash');
    };

    window.saveStock = async function() {
        let q = parseFloat(document.getElementById("qC").value), p = parseFloat(document.getElementById("pM").value), m = document.getElementById("mC").value;
        if(q && p) {
            window.state.inventario[m].stock += q;
            if(!window.state.comprasInversion) window.state.comprasInversion = [];
            window.state.comprasInversion.push({ id: Date.now(), amount: q*p });
            await window.push(); window.go('dash');
        }
    };

    window.saveGasto = async function() {
        let n = document.getElementById("gN").value, m = parseFloat(document.getElementById("gM").value);
        if(n && m) {
            window.state.gastos.push({ id: Date.now(), name: n.toUpperCase(), amount: m });
            await window.push(); window.go('dash');
        }
    };

    window.addMaterial = async function() {
        let n = document.getElementById("nP").value.toUpperCase();
        if(n) {
            if(!window.state.inventario) window.state.inventario = {};
            window.state.inventario[n] = { stock: 0 };
            await window.push(); render();
        }
    };

    // ARRANQUE
    render();
</script>
</body>
</html>
