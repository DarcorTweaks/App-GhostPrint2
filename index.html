<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>GhostPrint PRO</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-100 font-sans">

<div class="bg-gradient-to-r from-purple-700 to-purple-500 text-white p-4 shadow flex justify-between">
<h1 class="text-xl font-bold">👻 GhostPrint PRO</h1>
<span id="sync-status">Conectando Nube...</span>
</div>

<div class="p-4 flex gap-2 flex-wrap">
<button onclick="setView('dashboard')" class="btn">Dashboard</button>
<button onclick="setView('ventas')" class="btn">Ventas</button>
<button onclick="setView('cobranzas')" class="btn">Cobranzas</button>
<button onclick="setView('compras')" class="btn">Compras / Catálogo</button>
<button onclick="setView('gastos')" class="btn">Gastos</button>
<button onclick="setView('inventario')" class="btn">Inventario</button>
<button onclick="setView('reporte')" class="btn">Reporte</button>
</div>

<div id="app" class="p-6 max-w-4xl mx-auto"></div>

<style>
.btn{background:#6d28d9;color:white;padding:8px 14px;border-radius:8px;cursor:pointer;border:none}
.btn:hover{background:#5b21b6}
.card{background:white;padding:15px;margin:10px 0;border-radius:12px;box-shadow:0 4px 10px rgba(0,0,0,0.08)}
input,select{border:1px solid #ddd;padding:10px;margin:6px 0;border-radius:8px;width:100%}
label{font-size:13px;color:#555;font-weight:bold}
.alert{background:#fee2e2;color:#991b1b;padding:10px;border-radius:8px;margin-bottom:10px}
.hidden{display:none}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBCm5JlhTxvvtlwjA1EYEtLvxb1AH5v1WI",
    authDomain: "ghost-print-contabilidad.firebaseapp.com",
    projectId: "ghost-print-contabilidad",
    storageBucket: "ghost-print-contabilidad.firebasestorage.app",
    messagingSenderId: "867057362556",
    appId: "1:867057362556:web:6bd2a461817219a4000bf9"
};

const appF = initializeApp(firebaseConfig);
const db = getFirestore(appF);
const docRef = doc(db, "sistema", "datos_principales");

window.margen = 2.5;
window.SERVICIOS_BASE = ["DISEÑO,IMPRECION,INSTALACION","DISEÑO","IMPRESIÓN","DISEÑO, IMPRESIÓN","INSTALACION","POP","DESINTALACION","ROTULACION","LAMINADO","LAMINADO. IMPRESIOM","IMPRESIÓN Y CORTE","VINIL DE ROTULACION","MANO DE OBRA"];

window.state = {
    ventas:[], compras:[], gastos:[], serviciosExtra: [],
    inventario:{"VINIL GLOSSY":{stock:68,costo:3},"BANNER":{stock:175,costo:3.6},"KIT DE TINTA":{stock:400,costo:0.45}}
};

onSnapshot(docRef, (snap) => {
    if (snap.exists()) {
        window.state = snap.data();
        document.getElementById("sync-status").innerText = "Sincronizado ✓";
    } else { save(); }
    render();
});

async function save() { await setDoc(docRef, window.state); }

window.view = "dashboard";
window.setView = (v) => { window.view = v; render(); };
window.obtenerServicios = () => [...window.SERVICIOS_BASE, ...(window.state.serviciosExtra || [])];

// === FUNCIONES DE GASTOS (RESTAURADAS) ===
window.registrarGasto = async () => {
    let n = document.getElementById('gn').value;
    let a = parseFloat(document.getElementById('ga').value);
    if(n && a){
        window.state.gastos.push({id:Date.now(), name:n, amount:a, fecha:new Date().toLocaleDateString()});
        await save();
        alert("Gasto registrado");
    } else { alert("Datos inválidos"); }
};

// === FUNCIONES DE COMPRAS/MATERIALES (RESTAURADAS) ===
window.cargarCostoActual = () => {
    let p = document.getElementById("cp").value;
    if(window.state.inventario[p]) document.getElementById("nc").value = window.state.inventario[p].costo;
};

window.crearMaterialCompleto = async () => {
    let n = document.getElementById("nuevoMat").value.toUpperCase().trim();
    let s = parseFloat(document.getElementById("nuevoStock").value)||0;
    let c = parseFloat(document.getElementById("nuevoCosto").value)||0;
    if(n){
        window.state.inventario[n] = {stock:s, costo:c};
        await save();
        alert("Nuevo material creado");
    }
};

window.agregarCompra = async () => {
    let p = document.getElementById("cp").value;
    let c = parseFloat(document.getElementById("cq").value)||0;
    let nCosto = parseFloat(document.getElementById("nc").value)||0;
    if(window.state.inventario[p]) {
        window.state.inventario[p].stock += c;
        if(nCosto > 0) window.state.inventario[p].costo = nCosto;
        await save();
        alert("Stock actualizado");
    }
};

window.agregarNuevoServicio = async () => {
    let n = document.getElementById("nuevoServName").value.toUpperCase().trim();
    if(n){
        if(!window.state.serviciosExtra) window.state.serviciosExtra = [];
        window.state.serviciosExtra.push(n);
        await save();
        alert("Servicio guardado");
    }
};

// === LÓGICA DE VENTAS ===
window.calcularTotal = () => {
    let producto=document.getElementById("producto")?.value;
    let tipoCliente=document.getElementById("tipoCliente")?.value;
    let cantidad=parseFloat(document.getElementById("cantidad")?.value)||0;
    let pLibreInput=document.getElementById("precioLibreInput");
    let precio;
    if(tipoCliente === "libre"){
        document.getElementById("divPrecioLibre")?.classList.remove("hidden");
        precio = parseFloat(pLibreInput.value) || 0;
    } else {
        document.getElementById("divPrecioLibre")?.classList.add("hidden");
        if(producto && (producto.includes("VINIL") || producto.includes("BANNER"))) precio = (tipoCliente=="mayorista" ? 10 : 12);
        else precio = (window.state.inventario[producto]?.costo || 0) * window.margen || 10;
    }
    document.getElementById("total").innerText = (cantidad*precio).toFixed(2);
};

window.crearVenta = async () => {
    let cliente=document.getElementById("cliente").value;
    let producto=document.getElementById("producto").value;
    let tipoCliente=document.getElementById("tipoCliente").value;
    let cantidad=parseFloat(document.getElementById("cantidad").value)||1;
    let precio;
    if(tipoCliente === "libre") precio = parseFloat(document.getElementById("precioLibreInput").value)||0;
    else {
        if(producto.includes("VINIL") || producto.includes("BANNER")) precio = (tipoCliente=="mayorista" ? 10 : 12);
        else precio = (window.state.inventario[producto]?.costo || 0) * window.margen || 10;
    }
    window.state.ventas.push({id:Date.now(), fecha:new Date().toLocaleDateString(), cliente: cliente.toUpperCase(), producto, total: cantidad*precio, pagado:false, abonado:0});
    await save();
};

window.render = function() {
    let app = document.getElementById("app");
    if(!app) return;
    let html="";

    if(window.view=="dashboard"){
        let vT=window.state.ventas.reduce((a,b)=>a+b.total,0);
        let gT=window.state.gastos.reduce((a,b)=>a+b.amount,0);
        html=`<h2>📊 Dashboard</h2><div class="grid grid-cols-1 md:grid-cols-3 gap-4"><div class="card">Ventas: $${vT.toFixed(2)}</div><div class="card">Gastos: $${gT.toFixed(2)}</div><div class="card font-bold text-purple-700">Ganancia: $${(vT-gT).toFixed(2)}</div></div><div class="card"><canvas id="grafica"></canvas></div>`;
        app.innerHTML = html;
        new Chart(document.getElementById("grafica"),{type:'bar',data:{labels:['Ventas','Gastos'],datasets:[{label:'Balance', data:[vT,gT], backgroundColor:['#6d28d9','#ef4444']}]}});
    }

    if(window.view=="ventas"){
        html=`<h2>💰 Ventas</h2><div class="card"><input id="cliente" placeholder="Nombre del Cliente"><select id="tipoCliente" onchange="window.calcularTotal()"><option value="detal">Detal</option><option value="mayorista">Mayorista</option><option value="libre">PRECIO LIBRE</option></select><div id="divPrecioLibre" class="hidden"><input id="precioLibreInput" type="number" oninput="window.calcularTotal()" placeholder="Precio Manual"></div><select id="producto" onchange="window.calcularTotal()">${Object.keys(window.state.inventario).map(p=>`<option value="${p}">${p}</option>`).join("")}</select><input id="cantidad" type="number" value="1" oninput="window.calcularTotal()"><div class="text-center my-2">TOTAL: <b id="total">0.00</b></div><button onclick="window.crearVenta()" class="btn w-full">Guardar Venta</button></div>`;
        app.innerHTML = html; window.calcularTotal();
    }

    if(window.view=="gastos"){
        html=`<h2>💸 Gastos</h2><div class="card"><input id="gn" placeholder="Concepto"><input id="ga" type="number" placeholder="Monto"><button onclick="window.registrarGasto()" class="btn w-full">Registrar Gasto</button></div>${window.state.gastos.slice(-5).reverse().map(g=>`<div class="card flex justify-between"><span>${g.name}</span><b>-$${g.amount.toFixed(2)}</b></div>`).join("")}`;
        app.innerHTML = html;
    }

    if(window.view=="compras"){
        html=`<h2>📦 Catálogo y Compras</h2>
        <div class="card border-l-4 border-purple-500"><h3>📥 Surtir Stock</h3><select id="cp" onchange="window.cargarCostoActual()">${Object.keys(window.state.inventario).map(p=>`<option>${p}</option>`).join("")}</select><input id="cq" type="number" placeholder="Cantidad"><input id="nc" type="number" placeholder="Costo"><button onclick="window.agregarCompra()" class="btn w-full mt-2">Actualizar Stock</button></div>
        <div class="card border-l-4 border-blue-500"><h3>➕ Nuevo Material</h3><input id="nuevoMat" placeholder="Nombre"><input id="nuevoStock" type="number" placeholder="Stock"><input id="nuevoCosto" type="number" placeholder="Costo"><button onclick="window.crearMaterialCompleto()" class="btn w-full mt-2 bg-blue-600">Guardar Material</button></div>
        <div class="card border-l-4 border-green-500"><h3>➕ Nuevo Servicio</h3><input id="nuevoServName" placeholder="Nombre Servicio"><button onclick="window.agregarNuevoServicio()" class="btn w-full mt-2 bg-green-600">Guardar Servicio</button></div>`;
        app.innerHTML = html; window.cargarCostoActual();
    }

    if(window.view=="inventario"){
        html=`<h2>📦 Inventario</h2>${Object.entries(window.state.inventario).map(([k,v])=>`<div class="card"><b>${k}</b><br>Stock: ${v.stock} | Costo: $${v.costo}</div>`).join("")}`;
        app.innerHTML = html;
    }
};
window.render();
</script>
</body>
</html>
